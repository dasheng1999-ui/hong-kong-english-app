            {
                word: "note",
                meanInText: "指出，写到",
                sentence: "The study noted that Finland was very clean and very safe.",
                sentenceCn: "这份调研指出芬兰十分整洁、安全。",
                fullInfo: "v. 指出，记录 / n.笔记 | 搭配：note that…；take notes；例句：The report notes Finland's natural beauty."
            },
            {
                word: "rate",
                meanInText: "评定，评级",
                sentence: "Finland was rated the world's best country to live in.",
                sentenceCn: "芬兰被评为全球最适合居住的国家。",
                fullInfo: "v. 评定；n.比率 | 搭配：rate sth + 称号；cell phone ownership rate；例句：People rate this trip very highly."
            },
            {
                word: "actually",
                meanInText: "事实上，实际上",
                sentence: "Actually, many Finns say that Santa Claus lives in Lapland.",
                sentenceCn: "事实上，许多芬兰人都说圣诞老人住在拉普兰。",

            {
                word: "wilderness",
                meanInText: "荒野，野外",
                sentence: "allowing you to cook over an open fire and enjoy a true Finnish wilderness experience.",
                sentenceCn: "让你能够篝火烹饪，体验纯正的芬兰荒野之旅。",

            },
            {
                word: "wild",
                meanInText: "野生的，荒野的",
                sentence: "Finland has a lot of wild forests and lakes.",
                sentenceCn: "芬兰拥有大片原始森林与湖泊。",

    }
    // 后续新增卡组，只需要在这里添加新的对象即可，比如：
    // {
    //     name: "新卡组名称",
    //     words: [/* 新单词数组 */]
    // }
];
// =====================================================================================

// 全局状态
let currentWordList = [];
let currentIndex = 0;
let clickStep = 0; // 0仅单词 /1单词+例句 /2单词+例句+释义
let notKnowWords = JSON.parse(localStorage.getItem('notKnowWords')) || [];
let currentGroupName = "";

// 页面切换
function hideAllPages() {
    document.querySelectorAll('.page').forEach(p=>p.classList.add('hidden'));
}
function backHome() {
    hideAllPages();
    document.getElementById('page-home').classList.remove('hidden');
    updateReviewBadge();
}
function goStudyList() {
    hideAllPages();
    document.getElementById('page-study-list').classList.remove('hidden');
    renderGroupCards();
}
function backStudyList() {
    hideAllPages();
    document.getElementById('page-study-list').classList.remove('hidden');
}
function goReview() {
    if(notKnowWords.length === 0) {
        alert("暂无标记为「没记住」的单词！");
        return;
    }
    currentWordList = [...notKnowWords];
    currentGroupName = "待复习单词";
    openWordPage();
}

// 渲染卡组卡片
function renderGroupCards() {
    const container = document.getElementById('group-card-container');
    container.innerHTML = '';
    wordGroups.forEach((group, index) => {
        const card = document.createElement('div');
        card.className = "bg-white p-8 rounded-xl shadow-md text-center text-xl font-medium text-slate-700 border-2 border-blue-400 cursor-pointer";
        card.innerText = group.name;
        card.onclick = () => openWordGroup(index);
        container.appendChild(card);
    });
}

// 打开单词卡组
function openWordGroup(groupIndex) {
    const group = wordGroups[groupIndex];
    currentGroupName = group.name;
    currentWordList = [...group.words];
    openWordPage();
}
function openWordPage() {
    hideAllPages();
    document.getElementById('page-word').classList.remove('hidden');
    document.getElementById('group-title').innerText = currentGroupName;
    currentIndex = 0;
    renderWordCard();
}

// 渲染单词卡片
function renderWordCard() {
    clickStep = 0;
    const wordObj = currentWordList[currentIndex];
    document.getElementById('word-index').innerText = `${currentIndex+1}/${currentWordList.length}`;
    // 重置所有内容
    document.getElementById('word-display').innerText = wordObj.word;
    document.getElementById('sentence-display').classList.add('hidden');
    document.getElementById('sentence-display').innerText = `原文句子：${wordObj.sentence}\n中文翻译：${wordObj.sentenceCn}`;
    document.getElementById('mean-display').classList.add('hidden');
    document.getElementById('mean-display').innerText = `文中释义：${wordObj.meanInText}\n完整信息：${wordObj.fullInfo}`;
    document.getElementById('btn-group').classList.add('hidden');
}

// 点击卡片翻页逻辑
function clickCard() {
    clickStep ++;
    const sentenceDom = document.getElementById('sentence-display');
    const meanDom = document.getElementById('mean-display');
    const btnDom = document.getElementById('btn-group');
    if(clickStep === 1) {
        sentenceDom.classList.remove('hidden');
    } else if(clickStep === 2) {
        meanDom.classList.remove('hidden');
        btnDom.classList.remove('hidden');
    }
}

// 标记单词
function markKnow() {
    const wordObj = currentWordList[currentIndex];
    // 从待复习列表移除
    notKnowWords = notKnowWords.filter(w=>w.word !== wordObj.word);
    saveNotKnow();
    nextWord();
}
function markNotKnow() {
    const wordObj = currentWordList[currentIndex];
    // 去重存入待复习
    const exist = notKnowWords.some(w=>w.word === wordObj.word);
    if(!exist) notKnowWords.push(wordObj);
    saveNotKnow();
    nextWord();
}
// 保存待复习到本地存储
function saveNotKnow() {
    localStorage.setItem('notKnowWords', JSON.stringify(notKnowWords));
    updateReviewBadge();
}
// 更新首页角标
function updateReviewBadge() {
    const badge = document.getElementById('review-badge');
    if(notKnowWords.length > 0) {
        badge.classList.remove('hidden');
        badge.innerText = notKnowWords.length;
    } else {
        badge.classList.add('hidden');
    }
}

// 下一个单词
function nextWord() {
    currentIndex ++;
    if(currentIndex >= currentWordList.length) {
        alert(`${currentGroupName} 单词全部完成！`);
        backStudyList();
        return;
    }
    renderWordCard();
}

// 初始化执行
updateReviewBadge();
</script>
