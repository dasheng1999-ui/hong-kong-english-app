a 表示不感興趣；肯定式表示正合心意。","ex":"Role-playing games are my cup of tea because I like immersing myself in fantasy worlds."},{"phrase":"one's take on sth","zh":"某人對某事的看法","type":"課文短語","sent":"What's everyone's take on VR? Is it just a fad that will soon die out?","note":"take 在此作名詞解「看法」；What's your take on...? 是論壇及口試詢問意見的地道說法。","ex":"I changed my take on mobile games after my brother introduced me to this exciting game."},{"phrase":"for years to come","zh":"在未來多年","type":"寫作句式","sent":"With its numerous possibilities and applications, the cube's appeal will surely last for years to come.","note":"置於句末指影響持續到將來，常與 will / be likely to 連用，適合寫作結尾展望。","ex":"The impact of the Internet on the gaming industry will be present for years to come."},{"phrase":"pull one's hair out (over sth)","zh":"（為某事）抓狂；焦急萬分","type":"口語短語","sent":"Pulling your hair out over a lump of plastic might seem like a stressful pastime, but many people find the process fascinating.","note":"誇張地形容因困難或煩惱而極度焦躁；hair 前用所有格（my/your/her）。","ex":"Last night, I was stuck on the same game level for three hours and nearly pulled my hair out."},{"phrase":"take one's best shot at sth","zh":"盡最大努力嘗試","type":"課文短語","sent":"Over the years, people have continued to take their best shot at solving the cube with fewer moves and faster times.","note":"at 後接名詞或動名詞；口語鼓勵人時可說 Take your best shot!","ex":"I took my best shot at winning the online racing game but still placed last."},{"phrase":"try one's hand at sth","zh":"初次嘗試某事","type":"課文短語","sent":"World records have been broken time and time again, inspiring many more to try their hand at cracking the puzzle.","note":"強調「首次試做」某活動；at 後接名詞或動名詞，hand 用單數。","ex":"I hope to try my hand at a 1000-piece puzzle one day to challenge myself."},{"phrase":"twists and turns","zh":"曲折；波折","type":"課文短語","sent":"After a few twists and turns, Rubik realized it wasn't going to be easy to restore the scrambled cube back to its original state.","note":"既可指實際的扭轉動作，也可比喻情節或經歷的曲折；固定用複數。","ex":"The unexpected twists and turns in the game's storyline make it a lot more captivating and fun to play."},{"phrase":"take turns","zh":"輪流","type":"日常表達","sent":"Mum tried to keep the peace by reminding them to take turns and play nice.","note":"後接 doing sth（take turns rolling the dice）；港生易誤說 take turn（漏 s）。","ex":"The players take turns drawing cards from the stack."},{"phrase":"sign up (for sth)","zh":"報名參加","type":"日常表達","sent":"I'm sure our schoolmates will want to try it out. How can they sign up for the competition?","note":"報名活動用 sign up for + 活動；綜合任務寫推廣網頁時的必用短語。","ex":"Interested students can sign up for the board game competition by email."},{"phrase":"there's no going back","zh":"沒有回頭路；再也回不去了","type":"口語短語","sent":"Once you've tried VR gaming, there's no going back.","note":"there is no + 動名詞 表示「不可能做某事」；常見於強調體驗後的巨大轉變。","ex":"Once you have tasted freshly baked bread, there's no going back to the packaged kind."}]},{"key":"1B_U6","form":"F1","book":"1B","num":6,"theme":"Bon appetit","theme_zh":"祝你好胃口（飲食文化）","words":[{"en":"ingredient","pos":"n.","zh":"食材；材料","cat":"核心詞彙","src":"詞彙練習","sent":"(改編) With shrimp as its main ingredient, the Tom Yum soup also consists of mushrooms, tomatoes and onions.","exam":"選詞填空及聽力食譜題高頻詞；閱讀理解常要求列出 ingredients","err":"拼寫 -ient 結尾易誤作 -iant；main ingredient（主要材料）是常考搭配","coll":"main ingredient; raw ingredients; fresh ingredients","ex1":"The main ingredients of cheese fondue are bread and potatoes.","ex2":"List all the ingredients before you start cooking the dish."},{"en":"spice","pos":"n.","zh":"香料","cat":"核心詞彙","src":"Text 1","sent":"Sichuan is well known for its spicy cuisine, so it goes without saying that its hotpot often has a burning taste of spices.","exam":"詞形轉換：spice (n.) → spicy (adj.)；選詞填空高頻","err":"spice 是名詞、spicy 是形容詞，港生常混用；herbs and spices 常成對出現","coll":"spices and herbs; a taste of spices; add spices","ex1":"The spices and herbs like chilies and lemongrass add so much flavour to the soup.","ex2":"Indian curry uses many different spices."},{"en":"broth","pos":"n.","zh":"肉湯；湯底","cat":"核心詞彙","src":"Text 2","sent":"The broth was rich and flavourful.","exam":"Text 2 句子填充相關考詞；閱讀理解描述題常問 How does the writer describe the broth?","err":"不可數名詞；與 soup 略有不同：broth 指清湯或湯底","coll":"rich broth; a wide range of broth; chicken broth","ex1":"Hong Kong-style hotpot features a wide range of broth.","ex2":"The chef simmered the chicken broth for six hours."},{"en":"soup base","pos":"n.","zh":"湯底","cat":"核心詞彙","src":"Reading Focus","sent":"(改編) She told me using chicken broth plus shrimp as the soup base is the secret to a perfect soup.","exam":"火鍋主題閱讀高頻詞；選詞填空常與 broth、stock 一同出現","err":"兩個單詞分寫；勿與 basement 混淆，base 在此指「基底」","coll":"a spicy soup base; choose a soup base","ex1":"Mala hotpot has a fiery, mouth-numbing soup base.","ex2":"You can choose two different soup bases for your hotpot."},{"en":"dipping sauce","pos":"n.","zh":"蘸醬","cat":"日常實用","src":"Reading Focus","sent":"(改編) Shabu-shabu is served with a dipping sauce that brings out the flavour of the thinly-sliced beef.","exam":"飲食主題詞彙填空常考；dip (v.) → dipping (adj.) 的構詞","err":"dipping 雙寫 p；動詞 dip 解「蘸」，dip the food in the sauce","coll":"a dipping sauce; dip sth in the sauce","ex1":"I enjoy dipping my food in this spicy sauce made with Sichuan peppercorn.","ex2":"The dumplings come with a soy-based dipping sauce."},{"en":"seafood","pos":"n.","zh":"海鮮","cat":"高頻基礎詞","src":"單元評估","sent":"The breathtaking canals of Venice beckoned me to try the famed seafood dishes.","exam":"不可數名詞；閱讀理解及聽力食物分類題高頻","err":"不可數，不能說 seafoods / a seafood；一個單詞不要分寫 sea food","coll":"seafood dishes; fresh seafood","ex1":"Unlike cheese fondue, there is seafood in Hong Kong-style hotpot.","ex2":"This restaurant is famous for its fresh seafood."},{"en":"cuisine","pos":"n.","zh":"菜餚；烹飪風格","cat":"考試重點詞","src":"單元評估","sent":"Last week marked the beginning of my culinary adventure through this magnificent country, and I must say Italian cuisine is nothing short of extraordinary.","exam":"選詞填空原考詞（authentic Thai cuisine）；指某地特色菜式的總稱","err":"法語借詞，拼寫 ui 組合易錯；指菜系時通常不可數（Italian cuisine）","coll":"Italian cuisine; spicy cuisine; authentic cuisine","ex1":"Sichuan is well known for its spicy cuisine.","ex2":"I really miss authentic Thai cuisine after my trip to Bangkok."},{"en":"recipe","pos":"n.","zh":"食譜","cat":"核心詞彙","src":"Text 1","sent":"Legend has it that this restaurant's secret recipe is over 100 years old.","exam":"聽力任務要求完成 recipe；選詞填空高頻詞","err":"讀音三音節 /ˈresəpi/，易照拼寫誤讀；與 receipt（收據）混淆是經典錯誤","coll":"a secret recipe; a family recipe; follow a recipe","ex1":"Let me share my favourite family recipe with all of you.","ex2":"Follow the recipe carefully and your cake will turn out perfect."},{"en":"aroma","pos":"n.","zh":"香氣；香味","cat":"考試重點詞","src":"單元評估","sent":"As soon as I set foot in Rome, the lovely aroma of freshly baked pizza filled the air.","exam":"單元評估同義詞題原考點：與 smell 同義；閱讀理解替換詞高頻","err":"指令人愉快的香氣（褒義）；難聞的氣味用 smell / odour","coll":"the aroma of freshly baked bread; a lovely aroma","ex1":"The aroma of my mum's soup filled the whole flat.","ex2":"Customers were drawn in by the rich aroma of coffee."},{"en":"authentic","pos":"adj.","zh":"地道的；正宗的","cat":"考試重點詞","src":"Text 1","sent":"It goes without saying that local delicacies taste the best when they are made using authentic and traditional recipes.","exam":"選詞填空原考詞；描寫食物寫作的高分形容詞","err":"拼寫 th 組合易漏；與 traditional 近義但 authentic 強調「正宗不摻假」","coll":"authentic cuisine; authentic recipes; authentic flavours","ex1":"This tiny shop serves the most authentic wonton noodles in town.","ex2":"Tourists travel far to taste authentic local dishes."},{"en":"flavourful","pos":"adj.","zh":"味道濃郁的","cat":"考試重點詞","src":"Text 2","sent":"The broth was rich and flavourful.","exam":"Text 2 詞彙填空原考詞；詞形轉換：flavour (n.) → flavourful / flavoursome (adj.)","err":"英式拼寫保留 u（flavour）；「好味」不要總用 delicious，flavourful 更高分","coll":"rich and flavourful; a flavourful soup","ex1":"Thanks to his skilful use of seasoning powder, the chicken was very flavourful and not bland at all.","ex2":"The curry was flavourful without being too spicy."},{"en":"savoury","pos":"adj.","zh":"鹹香的；可口的","cat":"核心詞彙","src":"詞彙練習","sent":"(改編) As you dig inside, the cheesecake tastes savoury, sweet and spicy.","exam":"描述味道的選詞填空高頻詞；與 sweet 相對（鹹味類）","err":"英式拼寫有 u；savoury 指鹹鮮味，不解「可以節省的」","coll":"savoury snacks; sweet and savoury","ex1":"I prefer savoury breakfasts like noodles to sweet ones like pancakes.","ex2":"Shabu-shabu is all savoury, unlike cheesy fondue."},{"en":"tender","pos":"adj.","zh":"（肉質）嫩滑的","cat":"核心詞彙","src":"詞彙練習","sent":"(改編) The way they pan-fried the chicken made the meat so tender that I could chew it easily.","exam":"描述食物口感的選詞填空高頻；與 tough（韌）相對","err":"形容肉「嫩」用 tender，不要直譯 smooth；tender 亦解「溫柔的」","coll":"tender meat; melt-in-the-mouth tender","ex1":"The beef was so tender that it almost melted in my mouth.","ex2":"Slow cooking makes the pork extremely tender."},{"en":"crispy","pos":"adj.","zh":"香脆的","cat":"核心詞彙","src":"單元評估","sent":"I enjoyed a dish of spaghetti carbonara, whose silky strands were coated in a creamy sauce made from eggs, pecorino cheese and crispy pancetta.","exam":"單元評估筆記填空原考詞（crispy pancetta）；描述口感高頻形容詞","err":"與 crisp 通用但 crispy 更口語；勿與 crunchy（鬆脆有聲）完全劃上等號","coll":"crispy skin; thin, crisp crust; crispy pancetta","ex1":"The roast pork has wonderfully crispy skin.","ex2":"I savoured the pizza's thin, crispy crust."},{"en":"filling","pos":"adj.","zh":"令人飽足的","cat":"核心詞彙","src":"詞彙練習","sent":"It was so filling.","exam":"描述食物的選詞填空高頻；作名詞時解「餡料」（the pie's filling）","err":"形容詞「飽肚」與名詞「餡料」同形，須按語境判斷；勿與 feeling 混淆拼寫","coll":"a filling meal; filling and satisfying","ex1":"A bowl of ramen is filling enough for my lunch.","ex2":"The cheese pie was baked to perfection and its filling was very creamy."},{"en":"satisfying","pos":"adj.","zh":"令人滿足的","cat":"考試重點詞","src":"聽力對話","sent":"True! Learning how to bake one is very satisfying.","exam":"詞形轉換：satisfy (v.) → satisfying / satisfied (adj.) → satisfaction (n.)","err":"satisfying 形容事物、satisfied 形容人的感受，港生常互換誤用","coll":"a satisfying meal; deeply satisfying","ex1":"Overall, the meal was satisfying and I could barely stand up and leave.","ex2":"Finishing a difficult recipe by yourself is very satisfying."},{"en":"comforting","pos":"adj.","zh":"令人安慰的；暖心的","cat":"核心詞彙","src":"詞彙練習","sent":"(改編) It was comforting to have a bowl of hot soup in the chilly winter season.","exam":"描述飲食體驗的選詞填空高頻；comfort food（療癒食物）是相關搭配","err":"comforting 形容事物、comforted 形容人；勿與 comfortable（舒適的）混淆","coll":"comforting food; a comforting bowl of soup","ex1":"Hotpot is warm and comforting on a cold winter night.","ex2":"I always serve this dish with rice for a simple, comforting dinner."},{"en":"spicy","pos":"adj.","zh":"辛辣的","cat":"高頻基礎詞","src":"Text 1","sent":"Sichuan is well known for its spicy cuisine, so it goes without saying that its hotpot often has a burning taste of spices.","exam":"詞形轉換：spice → spicy；描述味道的基本形容詞","err":"比較級 spicier 要把 y 變 i；「辣」不要說 hot 以外全用 spicy，二者皆可","coll":"spicy food; a spicy soup base; too spicy for me","ex1":"Audrey's hatred for spicy food runs deep.","ex2":"I am not a fan of spicy food but this cake with chilli sauce was superb."},{"en":"mouth-numbing","pos":"adj.","zh":"麻辣的；令口腔發麻的","cat":"核心詞彙","src":"Reading Focus","sent":"(改編) I find the mouth-numbing sensation of mala hotpot really satisfying.","exam":"火鍋主題特色詞；描述四川麻辣味道的閱讀理解關鍵詞","err":"複合形容詞須有連字號；numb 中的 b 不發音","coll":"a mouth-numbing sensation; mouth-numbing spiciness","ex1":"Sichuan peppercorns give the soup a mouth-numbing kick.","ex2":"The mala hotpot left a mouth-numbing sensation on my tongue."},{"en":"texture","pos":"n.","zh":"口感；質地","cat":"考試重點詞","src":"詞彙練習","sent":"(改編) The rice noodles had a soft and chewy texture with a slight hint of sweetness that I had never tasted before.","exam":"選詞填空原考詞；食評寫作描述口感的必備詞","err":"與 taste（味道）分工不同：texture 指質感（軟硬、煙韌）；拼寫 -ture 結尾","coll":"a soft and chewy texture; a melt-in-the-mouth texture","ex1":"The soft and creamy cheesecake created a melt-in-the-mouth texture.","ex2":"Tofu has a silky texture that goes well with soy sauce."},{"en":"portion","pos":"n.","zh":"一份（食物）；分量","cat":"日常實用","src":"詞彙練習","sent":"(改編) Remember to order less if you come alone though; the portion sizes are too big for a single person.","exam":"選詞填空原考詞；餐廳情境聽力常見（small helpings / portions）","err":"與 part 意思相近但 portion 專指食物分量；portion size 是固定搭配","coll":"portion size; a small portion; a generous portion","ex1":"The portions were massive, even though we had asked for small helpings.","ex2":"This restaurant is famous for its generous portions."},{"en":"nutrient","pos":"n.","zh":"營養素","cat":"考試重點詞","src":"詞彙練習","sent":"(改編) Tom Yum soup actually gives you plenty of nutrients as shrimp and veggies are rich in protein and vitamins.","exam":"選詞填空原考詞；詞族 nutrition / nutritious / nutrient 是詞形轉換考點","err":"常用複數 nutrients；勿與 nutritious（形容詞，有營養的）混用詞性","coll":"plenty of nutrients; be rich in nutrients","ex1":"Vegetables are full of nutrients that keep us healthy.","ex2":"Instant noodles are tasty but contain few nutrients."},{"en":"slurp","pos":"v.","zh":"（出聲地）吸食；啜飲","cat":"口語常用","src":"詞彙練習","sent":"(改編) I slurped down the soup happily after hearing this.","exam":"選詞填空原考詞；日本拉麵文化閱讀材料常見動詞","err":"在日本吸麵出聲是禮貌，在西餐則相反——文化語境題會考；過去式 slurped","coll":"slurp down the soup; slurp noodles","ex1":"In Japan, it is polite to slurp your noodles loudly.","ex2":"He slurped down the hot soup in less than a minute."},{"en":"food critic","pos":"n.","zh":"食評家","cat":"考試重點詞","src":"詞彙練習","sent":"(改編) It turned out that the place is recommended by many food critics on social media.","exam":"選詞填空原考詞；食評（restaurant review）文體的相關角色詞","err":"critic 是人、critical 是形容詞、criticism 是名詞，三者易混","coll":"a famous food critic; be recommended by food critics","ex1":"The food critic gave the new restaurant four stars out of five.","ex2":"Food critics praised the chef's creative use of local ingredients."},{"en":"culinary","pos":"adj.","zh":"烹飪的；飲食的","cat":"考試重點詞","src":"單元評估","sent":"Last week marked the beginning of my culinary adventure through this magnificent country, and I must say Italian cuisine is nothing short of extraordinary.","exam":"單元評估段落填空相關考詞；culinary experience / adventure 是食評高分搭配","err":"只作定語用（culinary experience），不能說 The food is culinary","coll":"a culinary experience; a culinary adventure; culinary delight","ex1":"Food is about where we are, how we feel and what we expect - a multisensory culinary experience.","ex2":"The trip to Italy was an unforgettable culinary adventure."},{"en":"dish","pos":"n.","zh":"菜式；一道菜","cat":"高頻基礎詞","src":"詞彙練習","sent":"(改編) I ordered two of the signature dishes on the menu, a Tom Yum soup and a Pad Thai.","exam":"選詞填空高頻；signature dish（招牌菜）是常考搭配","err":"dish 指菜式也指碟子；複數 dishes；do the dishes 解「洗碗」","coll":"a signature dish; seafood dishes; the main dish","ex1":"The chef described his signature dish by telling us its ingredients.","ex2":"Tomato and egg is an easy yet tasty local dish."},{"en":"menu","pos":"n.","zh":"菜單","cat":"高頻基礎詞","src":"Text 2","sent":"Interestingly, the menu only had 'ramen' and 'buta ramen' (with more pork) on it, plus some drink options.","exam":"閱讀理解細節題常考菜單內容；餐廳情境聽力必備詞","err":"on the menu（在菜單上）介詞用 on 不用 in；複數 menus","coll":"on the menu; order from the menu","ex1":"There's no dish on the menu that takes less than 20 minutes to prepare.","ex2":"The waiter handed us the menu and recommended the daily special."},{"en":"option","pos":"n.","zh":"選擇；選項","cat":"高頻基礎詞","src":"Text 2","sent":"There were not many food options on the menu, as it only had two ramen options and some drinks, but it was well worth it.","exam":"Text 2 句子填充原考詞；詞形轉換：opt (v.) → option (n.) → optional (adj.)","err":"optional 解「可自由選擇的」；港生常把 choice 與 option 混用，二者多可互換","coll":"food options; drink options; have no option","ex1":"The cafe offers several vegetarian options.","ex2":"Sprinkling black pepper on top is optional."},{"en":"queue","pos":"n./v.","zh":"人龍；排隊","cat":"日常實用","src":"Text 2","sent":"So, I was over the moon when my friend suggested eating at Yume Wo Katare, a ramen shop in Cambridge (near Boston) known for its long queue and end-of-meal rituals.","exam":"Text 2 句子填充原考詞（line up in a queue）；香港生活情境高頻詞","err":"拼寫古怪：q-u-e-u-e；動詞用法 queue up for sth；美式用 line up","coll":"a long queue; queue up for food; jump the queue","ex1":"Although I arrived at the restaurant early, there was already a long queue.","ex2":"Hong Kong people are used to queuing up for famous food shops."},{"en":"ritual","pos":"n.","zh":"儀式；例行習慣","cat":"考試重點詞","src":"Text 2","sent":"So, I was over the moon when my friend suggested eating at Yume Wo Katare, a ramen shop in Cambridge (near Boston) known for its long queue and end-of-meal rituals.","exam":"閱讀理解細節題原考點（餐廳以什麼聞名）；文化主題核心詞","err":"與 routine（例行公事）近義，但 ritual 帶儀式感；拼寫勿誤作 ritural","coll":"end-of-meal rituals; a daily ritual; perform a ritual","ex1":"Sharing dreams after the meal is a special ritual at this ramen shop.","ex2":"Having morning tea with dim sum is a weekend ritual for many Hong Kong families."},{"en":"décor","pos":"n.","zh":"裝潢；佈置","cat":"考試重點詞","src":"Text 2","sent":"The décor reminded me of a classroom.","exam":"閱讀理解描述題原考點（How does the writer describe the décor?）；食評寫作環境描寫用詞","err":"法語借詞，重音在第一音節；不可數名詞，不要加 s","coll":"trendy interior décor; shabby décor","ex1":"Restaurants with trendy interior designs draw larger crowds than those with shabby décor.","ex2":"The café's cosy décor makes customers want to stay all afternoon."},{"en":"highlight","pos":"n./v.","zh":"亮點；最精彩部分","cat":"考試重點詞","src":"Text 2","sent":"Another highlight was seeing diners share their dreams after the meal.","exam":"Text 2 詞彙填空原考詞；寫作記事文總結亮點的高分詞","err":"the highlight of + 活動 是固定搭配；動詞用法解「強調、標示」","coll":"the highlight of the trip; a real highlight","ex1":"The water game is known by many as the highlight of the summer camp.","ex2":"Trying street food was the highlight of our Bangkok trip."},{"en":"judge","pos":"v./n.","zh":"評判；裁判","cat":"高頻基礎詞","src":"Text 2","sent":"The chef judged this as 'perfect', and the crowd cheered.","exam":"Text 2 句子填充原考詞（the chefs would judge...）；don't judge a book by its cover 為常見諺語","err":"judge sb/sth as + 評價；名詞「裁判／法官」與動詞同形","coll":"judge the performance; a fair judge","ex1":"The staff judge the customer's 'performance' according to the amount of food left in their bowls.","ex2":"The judges will taste every dish before announcing the winner."},{"en":"recommend","pos":"v.","zh":"推薦","cat":"考試重點詞","src":"Text 2","sent":"It's a good value at $15 a bowl and I highly recommend it!","exam":"閱讀理解引述題原考點（quote 一個短語證明正面評價）；食評結尾常用詞","err":"單 c 雙 m（reccomend✗）；recommend doing sth 或 recommend that sb (should) do","coll":"highly recommend; recommend a restaurant to sb","ex1":"I would recommend this baking class to any baking lover.","ex2":"My friend recommended trying the signature ramen here."},{"en":"atmosphere","pos":"n.","zh":"氣氛；氛圍","cat":"考試重點詞","src":"Text 2","sent":"Overall, the place offers excellent food, a friendly atmosphere, great staff and service.","exam":"食評寫作四大評分角度之一（食物、服務、環境氣氛、價錢）；選詞填空高頻","err":"拼寫長易漏字母（atmosphere 中的 ph 讀 /f/）；此處解「氣氛」，不解「大氣層」","coll":"a friendly atmosphere; a relaxing atmosphere","ex1":"The restaurant serves delicious food in a relaxing, slow-paced atmosphere.","ex2":"Soft music created a warm atmosphere in the café."},{"en":"service","pos":"n.","zh":"服務","cat":"高頻基礎詞","src":"Text 2","sent":"Overall, the place offers excellent food, a friendly atmosphere, great staff and service.","exam":"Text 2 句子填充原考詞（the service was excellent）；食評必用詞","err":"作「服務質素」解時不可數；serve (v.) → service (n.) 詞形轉換常考","coll":"excellent service; customer service; service charge","ex1":"The staff was very kind, so the service was excellent overall.","ex2":"Many Hong Kong restaurants add a ten per cent service charge."},{"en":"boil","pos":"v.","zh":"煮沸；烚","cat":"日常實用","src":"聽力對話","sent":"First, bring a pan of water to boil, then add the prawns and cook them for a few minutes.","exam":"聽力食譜步驟題原考詞；bring...to (the) boil 是烹飪固定表達","err":"boiling water 是「沸水」、boiled water 是「煮過的水」，分詞選擇易錯","coll":"bring water to boil; boiling water; boil the eggs","ex1":"Boil the noodles for three minutes before draining them.","ex2":"The soup is ready once the water starts boiling."},{"en":"peel","pos":"v.","zh":"去皮；剝殼","cat":"日常實用","src":"聽力對話","sent":"Then take the prawns out, let them cool and peel them.","exam":"聽力食譜步驟題原考詞；烹飪動詞系列（peel, chop, mix, stir）常一同出現","err":"與 pill（藥丸）發音長短音之別；peel off 解「剝落」","coll":"peel the prawns; peel the tomatoes; peel off","ex1":"Blanch the tomatoes in hot water so you can peel them effortlessly.","ex2":"Please peel the apples before making the pie."},{"en":"stir","pos":"v.","zh":"攪拌","cat":"日常實用","src":"聽力對話","sent":"After that, toss the prawns into the bowl and stir them in with the sauce.","exam":"聽力食譜高頻動詞；stir-fry（炒）是本單元重點複合詞","err":"現在分詞雙寫 r：stirring；stir-fry 有連字號，指中式「炒」的烹調法","coll":"stir the mixture; stir well; stir-fry the vegetables","ex1":"Add water and stir until well combined.","ex2":"Baking the sponge cake involves a lot of work with all the stirring and mixing."},{"en":"sprinkle","pos":"v.","zh":"撒上","cat":"日常實用","src":"聽力對話","sent":"After the prawns are put in the cups, you may sprinkle them with a little black pepper, but that's optional.","exam":"聽力食譜步驟題原考詞；sprinkle A with B / sprinkle B on A 兩種句型","err":"sprinkling of + 食材（少量撒上的東西）作名詞用法見於課文（a generous sprinkling of mozzarella）","coll":"sprinkle with black pepper; a sprinkling of cheese","ex1":"Sprinkle some sugar on top of the toast.","ex2":"The pizza had a generous sprinkling of melted mozzarella."},{"en":"garnish","pos":"n./v.","zh":"裝飾配菜；點綴","cat":"考試重點詞","src":"聽力對話","sent":"When I make this dish, I always peel all the prawns, although some people may leave one unpeeled per serving and use it as a garnish.","exam":"聽力食譜題原考詞；動詞用法 garnish the dish with herbs","err":"與 furnish（佈置傢俬）拼寫相近；作名詞可數（use it as a garnish）","coll":"use as a garnish; garnish with green onions","ex1":"Garnish the soup with fresh green onions before serving.","ex2":"The chef added a slice of lemon as a garnish."},{"en":"stove","pos":"n.","zh":"爐具；爐頭","cat":"日常實用","src":"詞彙練習","sent":"(改編) Heat a pan to medium heat on the stove. Once it is hot, add olive oil.","exam":"選詞填空原考詞；廚具詞彙系列（pot, pan, stove, burner）常考","err":"on the stove 介詞用 on；與 stove 相關的 burner 指爐頭火位","coll":"on the stove; a gas stove","ex1":"Most Asian hotpot dishes are cooked on a stove.","ex2":"Turn off the stove after you finish cooking."},{"en":"burnt","pos":"adj.","zh":"燒焦的","cat":"日常實用","src":"詞彙練習","sent":"(改編) The eggs easily get burnt. Use a non-stick frying pan or grease one with oil.","exam":"選詞填空原考詞；burn 的過去分詞作形容詞（get burnt）","err":"英式常用 burnt、美式常用 burned；get burnt 是被動意味的常用結構","coll":"get burnt; burnt toast; slightly burnt","ex1":"The toast got burnt because I forgot about it.","ex2":"I could smell something burnt coming from the kitchen."},{"en":"crack","pos":"v.","zh":"打（蛋）；敲裂","cat":"日常實用","src":"詞彙練習","sent":"(改編) Crack 4 eggs into a bowl and whisk.","exam":"選詞填空原考詞；食譜指令句（imperative）常用動詞","err":"crack an egg 是「打蛋」，不要用 break the egg into pieces 的直譯思維","coll":"crack an egg; crack open","ex1":"Crack two eggs into the pan and fry them sunny side up.","ex2":"He cracked the coconut open with a knife."},{"en":"instructor","pos":"n.","zh":"導師；教練","cat":"口語常用","src":"聽力對話","sent":"Our instructor Eva showed us how to do it, she made it look so easy.","exam":"綜合任務筆記題原考詞；詞形轉換：instruct (v.) → instructor (n.) → instructions (n.)","err":"-or 結尾不是 -er；instructions（指示）與 instructor（導師）詞義不同","coll":"a helpful instructor; a baking instructor","ex1":"The instructor patiently repeated the steps of making icing roses.","ex2":"Our swimming instructor taught us water safety first."},{"en":"patient","pos":"adj.","zh":"有耐性的","cat":"高頻基礎詞","src":"聽力對話","sent":"Also, I think she's very patient with her students.","exam":"聽力筆記題原考詞；be patient with sb 搭配常考；名詞 patience","err":"patient 亦解「病人」（名詞）；be patient with 的介詞 with 易漏","coll":"be patient with students; extremely patient","ex1":"A good teacher must be patient with slow learners.","ex2":"Please be patient - the food will be served soon."}],"phrases":[{"phrase":"it goes without saying (that)","zh":"不用說；顯而易見","type":"寫作句式","sent":"Sichuan is well known for its spicy cuisine, so it goes without saying that its hotpot often has a burning taste of spices.","note":"後接 that 子句，用於帶出人所共知的事實；寫作開段引入常識背景時很好用。","ex":"It goes without saying that Hong Kong's dim sum is among the best worldwide."},{"phrase":"legend has it that","zh":"相傳；傳說","type":"寫作句式","sent":"Legend has it that a form of hotpot first appeared more than 3 000 years ago in the Shang Dynasty.","note":"介紹傳說或典故的固定開頭，has 不作變化；適合寫飲食文化與節日來源。","ex":"Legend has it that this noodle recipe was used to bring good fortune in ancient times."},{"phrase":"be in for a surprise","zh":"將會大吃一驚","type":"課文短語","sent":"I was in for another surprise when our ramen arrived. The servings were massive, even though we had asked for small helpings.","note":"指即將遇到意想不到的事（驚喜或驚嚇皆可）；常用 you are in for a surprise 提醒別人。","ex":"If you think baking cookies is a piece of cake, you are in for a surprise."},{"phrase":"jump at the chance","zh":"把握機會；欣然接受","type":"課文短語","sent":"My love for ramen runs deep, so I was over the moon when my friend suggested eating brunch at Yume Wo Katare... I jumped at the chance immediately.","note":"表示毫不猶豫地抓住機會；後可接 to do sth（jumped at the chance to make a reservation）。","ex":"When I heard that this restaurant was offering a 40% discount, I jumped at the chance to make a reservation."},{"phrase":"over the moon","zh":"欣喜若狂","type":"口語短語","sent":"My love for ramen runs deep, so I was over the moon when my friend suggested eating brunch at Yume Wo Katare.","note":"口語表示極度開心，比 very happy 生動；閱讀理解詞義選擇題原考點（= very happy）。","ex":"My sister was over the moon when I surprised her with her favourite dessert."},{"phrase":"run deep","zh":"（感情、信念）深厚","type":"課文短語","sent":"My love for ramen runs deep, so I was over the moon when my friend suggested eating brunch at Yume Wo Katare.","note":"主語多是 love / hatred / belief 等情感名詞；描述強烈情感或信念。","ex":"The love Hong Kong people have for dim sum runs deep."},{"phrase":"all in all","zh":"總的來說","type":"寫作句式","sent":"Food is about where we are, how we feel and what we expect. It is a multisensory experience all in all.","note":"總結全文或段落用，多置句首加逗號；食評結尾總評必備，與 overall 同義。","ex":"All in all, cooking and eating at home can be just as enjoyable as going to a restaurant."},{"phrase":"hard to stomach","zh":"難以接受；難以下嚥","type":"課文短語","sent":"Spence mentions an unusual menu item: crab ice cream. Sounds awful and hard to stomach, right?","note":"字面指食物難吃，引申指壞消息或事實令人難以接受；stomach 在此作動詞。","ex":"The news about my favourite bakery shutting down forever was hard to stomach."},{"phrase":"on the flip side","zh":"另一方面","type":"寫作句式","sent":"Add orange colouring to a cherry beverage, and the drinker will think it tastes like oranges. On the flip side, dye a steak blue and people will be grossed out.","note":"帶出相反的一面，比 on the other hand 口語化；議論文列舉利弊時可交替使用。","ex":"If I move to Japan, I'll get to eat loads of yummy delicacies, but on the flip side, I'll probably feel homesick."},{"phrase":"paint a (some kind of) picture of sth","zh":"描繪出（某種）景象","type":"寫作句式","sent":"A change of name, though, will paint a better picture of the dish - 'creamy crab mousse', anyone?","note":"picture 前可加形容詞（a better/vivid/bleak picture）；寫作描述時的高分表達。","ex":"The chef painted a picture of his signature dish by telling us its ingredients and the inspiration behind it."},{"phrase":"to the very last drop","zh":"喝到最後一滴","type":"課文短語","sent":"I enjoyed it so much that I downed the bowl of ramen to the very last drop of broth.","note":"強調把湯或飲品全部喝光，表示極其喜愛；down 在此作動詞解「一口氣喝完」。","ex":"The soup was so tasty that I finished it to the very last drop."},{"phrase":"(be) a good value","zh":"物有所值","type":"日常表達","sent":"It's a good value at $15 a bowl and I highly recommend it!","note":"評價價錢是否划算；亦常見 good value for money。食評必用表達。","ex":"The set lunch is a good value at only fifty dollars."},{"phrase":"last but not least","zh":"最後但同樣重要的是","type":"口語短語","sent":"Last but not least, we need two cups of lettuce.","note":"列舉最後一項時使用，提示聽眾這項同樣重要；口試及演講常用過渡語。","ex":"Last but not least, remember to serve the dish immediately."},{"phrase":"It's up to you.","zh":"由你決定","type":"口語短語","sent":"Some people may leave one unpeeled per serving and use it as a garnish. It's up to you.","note":"口語表示讓對方自行決定；be up to sb 後亦可接 to do sth。","ex":"You can add more chilli if you like - it's up to you."},{"phrase":"I couldn't agree more.","zh":"我完全同意","type":"口語短語","sent":"I couldn't agree more. She is very helpful indeed.","note":"字面是「不能同意更多」，即百分百同意；小組討論及口試表態常用句。","ex":"I couldn't agree more - this is the best hotpot restaurant in town."},{"phrase":"little by little","zh":"一點一點地；逐漸","type":"日常表達","sent":"When I made the frosting, I had to be very careful and beat in the cream little by little.","note":"強調過程漸進；與 step by step（一步一步）意思相近，皆可用於描述步驟。","ex":"Add the milk little by little while stirring the mixture."}]},{"key":"1B_U7","form":"F1","book":"1B","num":7,"theme":"Come rain or shine","theme_zh":"不論晴雨（天氣與自然災害）","words":[{"en":"climate","pos":"n.","zh":"氣候","cat":"核心詞彙","src":"詞彙練習","sent":"If the current climate situation isn't brought under control, some meteorologists warn that Hong Kong will likely be hit with super typhoons more destructive than Mangkhut.","exam":"選詞填空高頻（climate change / climate crisis）；閱讀理解主旨題核心概念","err":"climate 指長期氣候，weather 指短期天氣，港生常混用；「氣候變化」是 climate change，不要寫 climate changing","coll":"climate change; the climate crisis; a mild climate","ex1":"Hong Kong has a humid climate in summer.","ex2":"Climate change is affecting weather patterns all over the world."},{"en":"global warming","pos":"n.","zh":"全球暖化","cat":"核心詞彙","src":"Text 1","sent":"Thanks to global warming, we are now experiencing more of these events than ever before.","exam":"選詞填空原考詞；閱讀理解因果題常考（bushfires 變多的原因）","err":"不可數名詞，前面不加 a；兩個單詞分寫，不要寫成 globalwarming；warming 尾音 -ing 易漏","coll":"because of global warming; fight global warming; the effects of global warming","ex1":"Global warming is making summers in Hong Kong hotter and longer.","ex2":"We can slow down global warming by using less electricity."},{"en":"heatwave","pos":"n.","zh":"熱浪","cat":"核心詞彙","src":"詞彙練習","sent":"In 2022, numerous European countries experienced the hottest summer ever on record as they were affected by persistent and intense heatwaves.","exam":"選詞填空原考詞；單元評估演講詞填空常與 typhoons、floods 並列為極端天氣事件","err":"可寫作 heatwave 或 heat wave，但課本用連寫；複數 heatwaves 常用（極端天氣多以複數出現）","coll":"a persistent heatwave; be hit by a heatwave; during the heatwave","ex1":"The heatwave lasted for two weeks and many people fell ill.","ex2":"During a heatwave, we should drink more water and stay indoors."},{"en":"typhoon","pos":"n.","zh":"颱風","cat":"核心詞彙","src":"詞彙練習","sent":"Hong Kong will likely be hit with super typhoons more destructive than Mangkhut, which brought a downpour of rain and strong gales that blew down thousands of trees in 2018.","exam":"選詞填空與聽力高頻；聽力對話考點：特別致命的颱風名字不會再用","err":"拼寫 typhoon 的 y 與 oo 易錯（tyfoon✗ / typhon✗）；「八號風球」是 typhoon signal number 8，不要直譯 wind ball","coll":"a super typhoon; typhoon signal; the typhoon season","ex1":"The typhoon blew down many trees and caused floods.","ex2":"Classes are cancelled when typhoon signal number 8 is in effect."},{"en":"hurricane","pos":"n.","zh":"颶風","cat":"核心詞彙","src":"Reading Focus","sent":"(改編) Hurricanes and typhoons are the same kind of storm, but they form in different parts of the world.","exam":"閱讀理解分類題常考：hurricane（大西洋）與 typhoon（太平洋）同類不同名","err":"拼寫 rr 雙寫易漏（huricane✗）；與 typhoon 意思相同，只是地區叫法不同","coll":"a powerful hurricane; hurricane season","ex1":"The hurricane destroyed hundreds of homes along the coast.","ex2":"A hurricane in the Atlantic is the same type of storm as a typhoon in Asia."},{"en":"tornado","pos":"n.","zh":"龍捲風","cat":"考試重點詞","src":"單元評估","sent":"Tornadoes, often referred to as nature's fury, are violent weather phenomena characterized by quickly rotating columns of air.","exam":"單元評估閱讀篇章主題詞；海報填空題原考點（tornado 的外形、速度、破壞力）","err":"複數是 tornadoes（加 -es），港生易漏 e 寫成 tornados；重音在第二音節 tor-NA-do","coll":"a violent tornado; tornado warnings; Tornado Alley","ex1":"The tornado lifted cars into the air and demolished several houses.","ex2":"People should hide in a basement during a tornado."},{"en":"earthquake","pos":"n.","zh":"地震","cat":"高頻基礎詞","src":"聽力對話","sent":"The most powerful earthquake ever recorded was the one in Chile which happened in nineteen sixty.","exam":"聽力是非題原考點（最強地震在智利）；「地震發生」用 an earthquake strikes / happens","err":"一個單詞連寫，不要分寫 earth quake；「發生地震」不要說 happen an earthquake，應說 an earthquake happened","coll":"a powerful earthquake; a mild earthquake; the earthquake struck","ex1":"A mild earthquake shook the city last night, but no one was hurt.","ex2":"The earthquake destroyed many old buildings in the village."},{"en":"tsunami","pos":"n.","zh":"海嘯","cat":"核心詞彙","src":"聽力對話","sent":"While it's possible for the first wave of a tsunami to be the strongest, usually that's not the case.","exam":"聽力是非題原考點（第一波海嘯未必最強）；自然災害分類題常考","err":"來自日語，t 不發音，讀 /tsuːˈnɑːmi/ 近似「su-nami」；拼寫 tsu- 開頭易錯","coll":"a tsunami warning; the waves of a tsunami; trigger a tsunami","ex1":"After the strong earthquake, a tsunami warning was issued for coastal areas.","ex2":"The second and third waves of a tsunami are often bigger than the first."},{"en":"avalanche","pos":"n.","zh":"雪崩","cat":"核心詞彙","src":"聽力對話","sent":"Avalanches can be triggered by bad weather or a person's weight.","exam":"聽力是非題原考點（聲音不能引發雪崩）；搭配 trigger / set off an avalanche","err":"拼寫長且結尾 -che 讀 /ntʃ/ 易錯；電影裏「大叫引發雪崩」是常見誤解，聽力原文特意澄清","coll":"trigger an avalanche; set off an avalanche; be buried in an avalanche","ex1":"The skiers were warned about the risk of an avalanche.","ex2":"Noise is not a strong enough force to set off an avalanche."},{"en":"drought","pos":"n.","zh":"旱災；乾旱","cat":"核心詞彙","src":"聽力對話","sent":"One single rainstorm can never break a drought right away because it takes a lot of rain to restore groundwater to its normal level.","exam":"聽力是非題原考點；搭配 break a drought（解除旱情）須整體記憶","err":"讀音 /draʊt/，gh 不發音，港生易讀錯成 /drɔːt/ 或拼錯成 drougt；與 draught（氣流）拼寫相近","coll":"break a drought; a severe drought; a drought-hit area","ex1":"The drought lasted for months and the farmers lost their crops.","ex2":"It may require months of rain to break a serious drought."},{"en":"landslide","pos":"n.","zh":"山泥傾瀉；山崩","cat":"核心詞彙","src":"Write more","sent":"A terrible landslide that occurred two weeks ago killed 20 people, breaking the record for landslide fatalities.","exam":"寫作句子練習原考詞；香港雨季新聞高頻詞，閱讀理解災害分類常考","err":"一個單詞連寫（land slide✗）；香港官方中文是「山泥傾瀉」，英文新聞多用 landslide / landslip","coll":"a terrible landslide; landslides occurred; trigger a landslide","ex1":"Heavy rain triggered a landslide that blocked the mountain road.","ex2":"Landslides are common in Hong Kong after days of heavy rain."},{"en":"bushfire","pos":"n.","zh":"山火；叢林大火","cat":"核心詞彙","src":"Text 2","sent":"We found out from the carers that bushfires are far worse and are happening more and more these days because of a warming world.","exam":"Text 2 閱讀理解因果題原考點（山火變多因全球暖化）；選詞填空原考詞","err":"一個單詞連寫；bushfire（澳洲叢林大火）與 wildfire / forest fire 為近義詞，閱讀時視作同義替換","coll":"a deadly bushfire; bushfires broke out; escape from a bushfire","ex1":"Billions of animals died in the terrible bushfires in Australia.","ex2":"Hot, dry weather makes bushfires spread very quickly."},{"en":"flood","pos":"n./v.","zh":"水災；淹沒","cat":"高頻基礎詞","src":"聽力對話","sent":"Flooding is indeed the most common natural disaster by far. It makes up more than forty percent of the world's natural disasters.","exam":"聽力是非題原考點（水災是最常見的天災）；Text 1 亦有 there were floods in many places","err":"flood 讀 /flʌd/，oo 讀 /ʌ/ 不讀 /uː/；「發生水浸」可說 there were floods 或 the streets were flooded","coll":"floods in many places; flood-control infrastructure; be flooded","ex1":"Over 60,000 trees were blown down and there were floods in many places.","ex2":"The heavy rain flooded the streets in just an hour."},{"en":"precipitation","pos":"n.","zh":"降水（量）","cat":"考試重點詞","src":"Text 1","sent":"The extreme precipitation, rising temperatures and destructive typhoons that can bring Hong Kong to a halt are just the tip of the iceberg.","exam":"選詞填空原考詞；閱讀理解同義替換：precipitation ≈ rainfall（較正式、科學用語）","err":"拼寫極長，pre-ci-pi-ta-tion 音節易漏；屬天文台等正式用語，日常口語宜用 rain / rainfall","coll":"extreme precipitation; annual precipitation; heavy precipitation","ex1":"The Observatory recorded very high precipitation last month.","ex2":"Extreme precipitation events can cause serious floods in the city."},{"en":"temperature","pos":"n.","zh":"溫度；氣溫","cat":"高頻基礎詞","src":"詞彙練習","sent":"Scientists say that the global average temperature has been rising since the mid-20th century.","exam":"選詞填空原考詞；聽力天氣報告高頻；搭配 temperatures rise / drop","err":"拼寫易漏第二個 e（tempreture✗）；「氣溫上升」用 rise，不用 raise（temperatures rise）","coll":"the average temperature; temperatures rise; a temperature of 35 degrees","ex1":"The temperature reached 35 degrees Celsius yesterday.","ex2":"Global temperatures are rising because of greenhouse gases."},{"en":"atmosphere","pos":"n.","zh":"大氣層；氣氛","cat":"核心詞彙","src":"詞彙練習","sent":"Human activities, like forest destruction and air travel, continue to emit greenhouse gases that trap heat energy from the sun in the atmosphere.","exam":"選詞填空原考詞；閱讀理解中解釋溫室效應的關鍵詞","err":"拼寫 -sphere 結尾易錯（atmosphere ✓ / atmosfere ✗）；另有「氣氛」一義（a happy atmosphere），按上下文判斷","coll":"in the atmosphere; greenhouse gases in the atmosphere; a relaxing atmosphere","ex1":"Greenhouse gases trap heat in the atmosphere and warm the Earth.","ex2":"The atmosphere protects the Earth from the sun's harmful rays."},{"en":"meteorologist","pos":"n.","zh":"氣象學家","cat":"考試重點詞","src":"Text 1","sent":"The bad news is that meteorologists are warning that the worst is yet to come.","exam":"單元評估閱讀原文亦出現（Meteorologists employ advanced radar systems）；閱讀理解 x2":"Rainy days always make me feel a little gloomy."},{"en":"stormy","pos":"adj.","zh":"暴風雨的","cat":"高頻基礎詞","src":"詞彙練習","sent":"When I went to bed last night, the weather didn't seem all that bad, just a little rainy, but when I woke up today, it was properly stormy.","exam":"Word Power 後綴 -y 構詞原考詞：storm (n.) + -y → stormy (adj.)","err":"由名詞加 -y 構成形容詞（storm → stormy），是本單元構詞法考點；勿寫 storming weather","coll":"stormy weather; a stormy night; a stormy sea","ex1":"It was a stormy night and the wind howled outside.","ex2":"The ships stayed in the harbour because of the stormy weather."},{"en":"hazy","pos":"adj.","zh":"朦朧的；有薄霧的","cat":"核心詞彙","src":"Text 2","sent":"For the next few hazy weeks, we stayed at Leia's facility.","exam":"Word Power 後綴 -y 構詞：haze (n.) → hazy（去 e 加 y）；閱讀理解中亦可指記憶模糊","err":"haze 變 hazy 要去 e 再加 y，拼寫轉換易錯；在 Text 2 中兼指煙霧瀰漫與記憶模糊的雙關","coll":"a hazy sky; hazy weather; a hazy memory","ex1":"The city skyline looked hazy because of the smoke.","ex2":"My memory of that stormy night is a little hazy."},{"en":"atypical","pos":"adj.","zh":"非典型的；反常的","cat":"考試重點詞","src":"Reading Focus","sent":"(改編) The atypical weather this autumn has surprised even the meteorologists.","exam":"選詞填空常與 unusual / unseasonal 成同義詞組出現；前綴 a-（不、非）是構詞法考點","err":"前綴 a- + typical，重音在 -typ-；與 untypical 同義，但課本用 atypical；勿誤拆成 a typical（一個典型的）","coll":"atypical weather; an atypical case","ex1":"Snow in Hong Kong would be extremely atypical.","ex2":"The atypical heat in November worried many farmers."},{"en":"unseasonal","pos":"adj.","zh":"不合時令的；反季節的","cat":"考試重點詞","src":"詞彙練習","sent":"It never occurred to me that an unseasonal rainstorm would hit me in autumn.","exam":"選詞填空原考詞；構詞法：un- + season + -al；與 atypical / unusual 為近義詞組","err":"拼寫組合 un-season-al 易漏 -al；指「不屬於該季節的」，不是「沒有季節的」","coll":"unseasonal rain; an unseasonal storm; unseasonal warmth","ex1":"The unseasonal rain ruined our winter picnic plans.","ex2":"Farmers suffered because of the unseasonal cold in spring."},{"en":"severe","pos":"adj. y（毛茸茸的）拼寫相近易混；nature's fury 是擬人比喻，指大自然的狂暴力量","coll":"nature's fury; the fury of the storm; in a fury","ex1":"The seaside village felt the full fury of the typhoon.","ex2":"Tornadoes are often described as nature's fury."},{"en":"demolish","pos":"v.","zh":"摧毀；拆毀","cat":"考試重點詞","src":"單元評估","sent":"Tornadoes possess huge destructive potential, capable of demolishing buildings, uprooting trees and hurling objects with tremendous force.","exam":"單元評估海報填空原考點（demolish buildings）；閱讀理解同義替換：demolish ≈ destroy","err":"拼寫 -ish 結尾（demolish ✓ / demolash ✗）；賓語多為建築物，「摧毀計劃」則用 ruin / wreck","coll":"demolish buildings; be demolished by the storm","ex1":"The tornado demolished several houses in minutes.","ex2":"The old factory was demolished after it was damaged in the storm."},{"en":"uproot","pos":"v.","zh":"連根拔起","cat":"考試重點詞","src":"單元評估","sent":"Tornadoes are extremely powerful, and have been known to demolish buildings, uproot trees and even lift trucks up into the air!","exam":"單元評估海報填空原考點（uproot trees）；構詞法：up + root（把根拔起）","err":"up + root 合成詞，雙 o 只在 root 部分；賓語常是 trees；勿與 blow down（吹倒）混淆——uproot 強調連根拔起","coll":"uproot trees; be uprooted by strong winds","ex1":"Hundreds of trees were uprooted by the super typhoon.","ex2":"The gales were strong enough to uproot old trees in the park."},{"en":"unpredictable","pos":"adj.","zh":"難以預測的","cat":"考試重點詞","src":"單元評估","sent":"Their unpredictable nature poses significant risks to human life.","exam":"單元評估段落填空原考詞；構詞法：un- + predict + -able，是詞形轉換常考組合","err":"三段構詞 un-predict-able 易漏其中一段；名詞是 unpredictability；反義詞 predictable","coll":"unpredictable weather; an unpredictable nature; highly unpredictable","ex1":"Tornadoes are unpredictable, so they can strike suddenly and without warning.","ex2":"The weather in spring is quite unpredictable, so bring an umbrella."},{"en":"vulnerable","pos":"adj.","zh":"易受傷害的；脆弱的","cat":"考試重點詞","src":"單元評估","sent":"Areas such as the central United States, known as 'Tornado Alley,' are particularly vulnerable.","exam":"單元評估閱讀原文考詞；閱讀理解推斷題常考哪些地區／人群最 vulnerable","err":"拼寫 vul-ne-ra-ble 易漏 e；搭配 be vulnerable to sth（易受某事影響），介詞用 to","coll":"be vulnerable to disasters; vulnerable areas; the most vulnerable people","ex1":"Low-lying areas are vulnerable to flooding during heavy rain.","ex2":"Old buildings are more vulnerable to earthquake damage."},{"en":"pouch","pos":"n.","zh":"（袋鼠等的）育兒袋；小袋","cat":"核心詞彙","src":"Text 2","sent":"Three months ago, I was a happy baby in a different type of pouch - my mama's.","exam":"Text 2 閱讀理解細節題原考點（敘事者躲在媽媽的 pouch 裏）","err":"讀 /paʊtʃ/，與 pounch✗ 拼寫易錯；有袋類動物（袋鼠、樹熊）的育兒袋均叫 pouch","coll":"in Mama's pouch; a baby koala in a pouch","ex1":"The baby kangaroo hid in its mother's pouch.","ex2":"Joey poked his head out of Mama's pouch and saw the fire."},{"en":"peer","pos":"v.","zh":"凝視；仔細看","cat":"考試重點詞","src":"Text 2","sent":"Peering out, I could see flames moving at the speed of raging bulls.","exam":"Text 2 詞彙填空原考詞（peered out the window）；閱讀理解同義替換：peer ≈ look carefully","err":"peer 作名詞另解「同輩」（Mama's peers），一詞兩義要按上下文判斷；與 pear（梨）同音易混","coll":"peer out; peer through the window; peer at sth","ex1":"While taking the train, I peered out the window to enjoy the view outside.","ex2":"She peered into the dark room but could see nothing."},{"en":"deadly","pos":"adj.","zh":"致命的","cat":"考試重點詞","src":"Text 2","sent":"I poked my head out of Mama's pouch and saw we were surrounded by deadly fumes.","exam":"Text 2 詞彙填空原考詞（a deadly venom）；聽力對話亦考 the deadliest earthquake","err":"deadly 是形容詞不是副詞，雖以 -ly 結尾；「最致命的」是 the deadliest，比較級變化易錯","coll":"deadly fumes; a deadly disease; the deadliest earthquake","ex1":"This snake is dangerous - it can release a deadly venom.","ex2":"The earthquake in China in the sixteenth century is known as the deadliest in history."},{"en":"rescuer","pos":"n.","zh":"救援人員","cat":"核心詞彙","src":"Text 2","sent":"The rescuers seemed friendly. 'Look, she's got a baby with her! Don't worry, you're safe now.'","exam":"Text 2 段落填空原考點（a friendly rescuer）；詞形轉換：rescue (v./n.) → rescuer (n. 人)","err":"rescue + -er 表示做動作的人；動詞 rescue 後直接接賓語（rescue the koala），不加 for","coll":"a friendly rescuer; rescuers arrived; be saved by rescuers","ex1":"The rescuers saved the koala and her baby from the bushfire.","ex2":"Rescuers worked through the night to find survivors."},{"en":"appreciate","pos":"v.","zh":"感激；欣賞","cat":"考試重點詞","src":"Text 2","sent":"I guess I will always miss Leia and appreciate the second chance at life she gave us.","exam":"Text 2 詞彙填空原考詞；寫作感謝信高頻；後接名詞或動名詞（appreciate your help / doing）","err":"後接動名詞不接不定式（appreciate to do✗）；拼寫雙 p 易漏（apreciate✗）","coll":"appreciate someone's help; appreciate what someone does; greatly appreciate","ex1":"Every year on Mother's Day, I make my mother a card to show her how much I appreciate what she does for our family.","ex2":"I really appreciate your help with my English homework."},{"en":"blaze","pos":"n.","zh":"大火；烈焰","cat":"核心詞彙","src":"Text 2","sent":"'This is the biggest blaze I've ever seen. It could be curtains for us.'","exam":"閱讀理解同義替換：blaze ≈ big fire；詞彙練習亦出現 a blazing fire","err":"與 braze / brace 拼寫相近；形容詞 blazing（a blazing fire）常見於新聞報道","coll":"a huge blaze; fight the blaze; a blazing fire","ex1":"Firefighters took ten hours to put out the blaze.","ex2":"The blaze spread quickly through the dry forest."},{"en":"trigger","pos":"v.","zh":"引發；觸發","cat":"口語常用","src":"聽力對話","sent":"Avalanches can be triggered by bad weather or a person's weight.","exam":"聽力是非題原考詞（Noise can trigger avalanches）；閱讀理解因果題常用動詞","err":"雙 g 拼寫（triger✗）；常用被動式 be triggered by（由……引發）","coll":"trigger an avalanche; trigger a landslide; be triggered by","ex1":"Heavy rain can trigger landslides on steep slopes.","ex2":"The earthquake triggered a huge tsunami."},{"en":"mild","pos":"adj.","zh":"輕微的；溫和的","cat":"口語常用","src":"聽力對話","sent":"Luckily it was just a mild earthquake. I was told later that mild earthquakes are not uncommon in Osaka.","exam":"聽力對話原考詞；描述天氣（mild weather 溫和天氣）與災害程度（a mild earthquake）皆常用","err":"與 wild（野生的）拼寫只差一個字母，聽力易聽混；mild 形容天氣指「不冷不熱」，是正面意思","coll":"a mild earthquake; mild weather; a mild winter","ex1":"Hong Kong has a relatively mild winter compared with northern cities.","ex2":"The mild earthquake shook the windows but caused no damage."},{"en":"forecast","pos":"n./v.","zh":"天氣預報；預測","cat":"日常實用","src":"綜合任務","sent":"According to the weather forecast, it's likely to rain on the day of the field trip even though it might not necessarily be a rainstorm.","exam":"綜合任務筆記原考點（check the weather forecast on the morning of the event）；聽力高頻","err":"動詞過去式同形（forecast - forecast）；「看天氣預報」用 check the forecast，不要說 see the forecast","coll":"the weather forecast; check the forecast; forecast heavy rain","ex1":"Always check the weather forecast before going hiking.","ex2":"The forecast says there will be a downpour this afternoon."},{"en":"umbrella","pos":"n.","zh":"雨傘","cat":"高頻基礎詞","src":"綜合任務","sent":"They should bring along umbrellas so that no one gets soaked when it rains.","exam":"綜合任務電郵寫作要點（remind students to bring along umbrellas）；聽力日常情境高頻","err":"拼寫雙 l 加 a 結尾（umbrela✗）；「帶傘」說 bring / take an umbrella，量詞不用 a pair of","coll":"bring an umbrella; put up an umbrella; forget one's umbrella","ex1":"I forgot my umbrella and got soaked in the downpour.","ex2":"Remember to bring an umbrella because it may rain later."},{"en":"cancel","pos":"v.","zh":"取消","cat":"日常實用","src":"綜合任務","sent":"We will cancel the field trip if typhoon signal number three or higher is in effect.","exam":"綜合任務電郵寫作核心動詞；聽力通告題高頻（活動因天氣取消）","err":"過去式 cancelled（英式雙 l）；「取消活動」用 cancel，「暫停上課」用 suspend，兩詞須分清","coll":"cancel the field trip; be cancelled because of the typhoon; cancel a booking","ex1":"School was cancelled today because of a typhoon.","ex2":"The picnic was cancelled because of the rainstorm warning."},{"en":"scary","pos":"adj.","zh":"嚇人的；可怕的","cat":"口語常用","src":"詞彙練習","sent":"But I started to find the typhoon scary when our building started to sway.","exam":"Word Power 後綴 -y 構詞原考詞：scare (v.) → scary（去 e 加 y）；口語描述感受高頻","err":"scary 形容事物嚇人，scared 形容人感到害怕（I am scared / The storm is scary），港生最常混用","coll":"a scary storm; find sth scary; scary noises","ex1":"The howling wind made scary noises outside my window.","ex2":"Natural disasters are scary because we cannot control them."}],"phrases":[{"phrase":"all the way","zh":"一直；一路上；遠在（強調距離）","type":"課文短語","sent":"My building would shake whenever there were strong gusts. And when you're all the way up on the 23rd floor, that's terrifying!","note":"強調距離之遠或動作貫徹到底；可修飾地點（all the way up on the 23rd floor）或路程（go all the way around）。","ex":"The typhoon struck down a large tree and blocked a main road, so cars must now go all the way around in order to reach the other side."},{"phrase":"all year round","zh":"全年；一年到頭","type":"課文短語","sent":"In 20 years, perhaps winter will be gone completely and it will be shorts and T-shirts all year round!","note":"置於句末表示「整年都如此」；round 不可漏掉，也可寫 all the year round。描述氣候的必用短語。","ex":"In Hong Kong, the weather is relatively mild and warm all year round, even during winter."},{"phrase":"break the record","zh":"打破紀錄","type":"課文短語","sent":"It used to take several decades to break the hourly rainfall record, but the record has already been broken twice in the last two decades.","note":"record 前用 the；被動式 the record has been broken 常見。break 的過去分詞是 broken，時態變化是語法考點。","ex":"The weather today reached 35 degrees Celsius, which broke the city's record for hottest day."},{"phrase":"bring sth to a halt","zh":"使……停頓；使……癱瘓","type":"課文短語","sent":"The extreme precipitation, rising temperatures and destructive typhoons that can bring Hong Kong to a halt are just the tip of the iceberg.","note":"halt 前必須有 a；被動式為 be brought to a halt。描述天災令城市停擺的寫作好句。","ex":"Due to the incoming typhoon, our field trip was brought to a halt and we were sent home early."},{"phrase":"in a sorry state","zh":"狀況惡劣；一片狼藉","type":"課文短語","sent":"The city was in a sorry state in the aftermath. I remember that school was suspended for two days following the storm.","note":"sorry 在此解「糟糕的、可憐的」，不是「抱歉」；可形容地方（the city）或人（I was in a sorry state）。","ex":"The typhoon left the city in a sorry state, with trash and fallen leaves scattered on the street."},{"phrase":"thanks to","zh":"多虧；由於","type":"寫作句式","sent":"Thanks to global warming, we are now experiencing more of these events than ever before.","note":"後接名詞短語，置於句首要加逗號；可帶諷刺語氣（如課文指全球暖化「拜其所賜」），也可表真心感謝。","ex":"Thanks to the observatory's accurate weather predictions, we were able to avoid going to the beach on a rainy day."},{"phrase":"the best/worst is yet to come","zh":"最好／最壞的還在後頭","type":"寫作句式","sent":"The bad news is that meteorologists are warning that the worst is yet to come.","note":"be yet to come 表示「尚未到來」；the worst is yet to come 用於警告情況會更差，the best is yet to come 則是鼓勵語。","ex":"I thought that the rain would be the most inconvenient part of the thunderstorm, but the worst was yet to come - the thunder and lightning were far more horrible!"},{"phrase":"the tip of the iceberg","zh":"冰山一角","type":"課文短語","sent":"The extreme precipitation, rising temperatures and destructive typhoons that can bring Hong Kong to a halt are just the tip of the iceberg.","note":"比喻已見到的只是問題的一小部分；常與 just / only 連用。單元評估選詞填空原考短語。","ex":"Rising sea levels are only the tip of the iceberg in terms of the impact of global warming."},{"phrase":"change one's mind","zh":"改變主意","type":"日常表達","sent":"Leia isn't changing her mind. I finally put my paws down.","note":"mind 用單數；one's 隨主語變化（changed my mind / our minds）。表示放棄原本的想法或計劃。","ex":"I had plans to go hiking this weekend, but after checking the weather forecast, I changed my mind."},{"phrase":"curtains for sb","zh":"某人完蛋了；末日到了","type":"口語短語","sent":"'This is the biggest blaze I've ever seen. It could be curtains for us.'","note":"源自舞台落幕的比喻，指「完蛋、結束」；常用 it could be curtains for... 句式，屬誇張口語。","ex":"Considering how severely the earthquake destroyed the bridge, it could be curtains for this construction project."},{"phrase":"on all fours","zh":"四肢着地；手腳並用地爬","type":"課文短語","sent":"As quick as a flash, she hopped down from the tree and started running on all fours through the bush.","note":"fours 必須用複數（指四肢）；用於描述動物奔跑或人爬行，配動詞 run / crawl / climb。","ex":"The hiking path was steep, rocky and slippery due to the rain, so I had to climb on all fours."},{"phrase":"pure luck","zh":"純屬僥倖；全靠運氣","type":"口語短語","sent":"I guess it was pure luck that we escaped being caught by the wall of fire.","note":"常用句式 it was pure luck that...（……純屬僥倖）；pure 在此強調「完全是」，同義：completely by chance。","ex":"It was pure luck that we managed to return home before the storm made landfall."},{"phrase":"watch one's back","zh":"保持警惕；照應某人","type":"口語短語","sent":"'Welcome to life in the wild again,' says Leia. 'Don't worry - we'll keep watching your back. Go on.'","note":"watch your back 可指「自己小心」，watch someone's back 指「替某人把風、照應某人」；主語為複數時 backs 用複數。","ex":"That country park is known for having many wild boars lurking around, so we must watch our backs when having picnics there."},{"phrase":"ahead of time","zh":"提前；提早","type":"日常表達","sent":"The challenge is to plan thoroughly and make arrangements well ahead of time.","note":"置於句末；可用 well ahead of time 加強語氣（早早地）。同義：in advance。防災與日常計劃皆常用。","ex":"If we want to get better seats, we should arrive at the concert venue ahead of time."},{"phrase":"back on one's feet","zh":"重新站起來；恢復過來","type":"課文短語","sent":"When calamity strikes, bosai is useful in helping us adjust, adapt and get back on our feet as quickly as possible.","note":"與 get 連用：get back on one's feet，指從疾病、災難或困境中恢復；feet 用複數，one's 隨主語變化。","ex":"It took the town a whole year to get back on its feet after the devastating flood."},{"phrase":"as quick as a flash","zh":"快如閃電；一眨眼間","type":"課文短語","sent":"As quick as a flash, she hopped down from the tree and started running on all fours through the bush.","note":"明喻（simile）句式 as...as...；置於句首要加逗號，用於記敘文令動作更生動，是短故事寫作好句。","ex":"As quick as a flash, the cat jumped off the sofa when the thunder clapped."},{"phrase":"scare sb out of one's wits","zh":"把某人嚇得魂飛魄散","type":"口語短語","sent":"A few years ago I experienced an earthquake in Osaka. It scared me out of my wits!","note":"誇張口語，wits 用複數；one's 與賓語一致（scared me out of my wits）。描述受驚經歷的地道說法。","ex":"The sudden clap of thunder scared me out of my wits last night."},{"phrase":"stock up on sth","zh":"儲備；囤積（食物、日用品）","type":"日常表達","sent":"(改編) As a super typhoon is approaching, the government advises all citizens to tape up their windows and stock up on food.","note":"on 後接所儲備的物品（stock up on food / water）；颱風前準備的必用表達，常與 tape up the windows 並列。","ex":"Before the typhoon arrived, we stocked up on food and drinking water."}]},{"key":"1B_U8","form":"F1","book":"1B","num":8,"theme":"Teens go green","theme_zh":"青少年齊環保（綠色生活）","words":[{"en":"carbon footprint","pos":"n.","zh":"碳足跡","cat":"核心詞彙","src":"Text 1","sent":"If not done right, your attempts to do your bit for planet Earth might fall short or even increase your carbon footprint!","exam":"選詞填空原考詞；閱讀理解主旨題核心概念，與 eco-footprint / eco-impact 同義替換","err":"兩個單詞分寫；搭配動詞用 lower / reduce / shrink your carbon footprint，不要說 decrease down","coll":"lower one's carbon footprint; shrink one's carbon footprint; a large carbon footprint","ex1":"Taking public transport helps lower your carbon footprint.","ex2":"Flying frequently can greatly increase your carbon footprint."},{"en":"microplastics","pos":"n.","zh":"微塑膠","cat":"核心詞彙","src":"Text 2","sent":"Microplastics are plastic particles less than five millimetres in diameter.","exam":"Text 2 句子填充原考詞；閱讀理解定義題必考（小於五毫米的塑膠微粒）","err":"前綴 micro-（微小）與 macro-（巨大）是一組反義前綴，閱讀時易看混；常用複數","coll":"microplastics in the ocean; swallow microplastics; shed microplastics","ex1":"Fish often swallow microplastics floating in the sea.","ex2":"Our clothes shed microplastics every time we do the laundry."},{"en":"macroplastics","pos":"n.","zh":"大型塑膠（垃圾）","cat":"核心詞彙","src":"Text 2","sent":"What you might not know is that while such macroplastics (i.e. bigger plastic items) are a serious issue, there are far more microplastics out there.","exam":"Text 2 句子填充原考詞；與 microplastics 成對比出現，選詞填空高頻","err":"macro-（大）與 micro-（小）只差一個字母，抄寫時極易寫錯；指膠樽、發泡膠盒等大件塑膠垃圾","coll":"macroplastics such as styrofoam containers; break down macroplastics","ex1":"Macroplastics such as styrofoam containers take hundreds of years to break down in landfills.","ex2":"Plastic bags and bottles are common macroplastics found on beaches."},{"en":"emission","pos":"n.","zh":"排放（物）","cat":"考試重點詞","src":"單元評估","sent":"This strategy emphasizes energy efficiency, waste reduction and decreasing greenhouse gas emissions.","exam":"單元評估選詞填空與海報填空原考詞（greenhouse gas emissions）；詞形轉換：emit (v.) → emission (n.)","err":"動詞 emit 雙寫 t 變 emitted；名詞常用複數 emissions；勿與 omission（遺漏）混淆","coll":"greenhouse gas emissions; carbon emissions; cut emissions","ex1":"Governments are working together to cut carbon emissions.","ex2":"Exhaust-pipe emissions from cars pollute the air in busy cities."},{"en":"carbon dioxide","pos":"n.","zh":"二氧化碳","cat":"核心詞彙","src":"詞彙練習","sent":"When these fuels are burned, greenhouse gases like carbon dioxide and nitrous oxide are generated.","exam":"單元評估選詞填空原考詞；與 methane（甲烷）並列為溫室氣體，科學閱讀篇章高頻","err":"dioxide 拼寫 di-ox-ide 易漏字母；不可數名詞；縮寫 CO2 與全寫須對應","coll":"carbon dioxide emissions; release carbon dioxide; absorb carbon dioxide","ex1":"Trees help remove carbon dioxide from the atmosphere.","ex2":"Burning fossil fuels releases a large amount of carbon dioxide."},{"en":"fossil fuels","pos":"n.","zh":"化石燃料","cat":"核心詞彙","src":"詞彙練習","sent":"The burning of fossil fuels by coal-fired power plants and petrol-fuelled vehicles amongst other things is the main culprit behind air pollution.","exam":"單元評估選詞填空原考詞；閱讀理解因果題常考（燃燒化石燃料 → 溫室氣體）","err":"fossil 雙 s 單 l（fosil✗）；常用複數 fossil fuels，指煤、石油、天然氣的總稱","coll":"burn fossil fuels; the burning of fossil fuels; limit the use of fossil fuels","ex1":"Burning fossil fuels for electricity adds to global warming.","ex2":"We should use renewable energy instead of fossil fuels."},{"en":"greenhouse effect","pos":"n.","zh":"溫室效應","cat":"核心詞彙","src":"單元評估","sent":"These gases trap heat from the sun in what we call a greenhouse effect, making our planet warmer.","exam":"單元評估演講詞填空原考詞；與 greenhouse gas（溫室氣體）拼法相近，選詞時按語意判斷","err":"greenhouse 連寫一詞；「溫室效應」是 effect（名詞），勿寫 greenhouse affect✗","coll":"the greenhouse effect; add to the greenhouse effect; excessive greenhouse effect","ex1":"Greenhouse gases trap heat and cause the greenhouse effect.","ex2":"Cutting down forests makes the greenhouse effect worse."},{"en":"exhaust pipe","pos":"n.","zh":"排氣管；死氣喉","cat":"核心詞彙","src":"詞彙練習","sent":"In cars, these fumes are released through the exhaust pipe.","exam":"選詞填空原考詞；exhaust-pipe emissions（汽車廢氣排放）是 Text 1 核心搭配","err":"exhaust 的 h 不發音，拼寫易漏 h（exaust✗）；港式口語「死氣喉」寫作時須用英文全稱","coll":"exhaust-pipe emissions; fumes from the exhaust pipe","ex1":"Dark smoke came out of the old bus's exhaust pipe.","ex2":"Exhaust-pipe emissions from petrol-fuelled cars pollute the air."},{"en":"petrol-fuelled","pos":"adj.","zh":"以汽油推動的","cat":"考試重點詞","src":"詞彙練習","sent":"The burning of fossil fuels by coal-fired power plants and petrol-fuelled vehicles is the main culprit behind air pollution.","exam":"選詞填空原考詞；閱讀理解中與 electric vehicles（電動車）成對比","err":"複合形容詞需連字號；英式 petrol＝美式 gas / gasoline；fuelled 英式雙 l","coll":"petrol-fuelled cars; petrol-fuelled vehicles","ex1":"Petrol-fuelled cars produce a lot of exhaust-pipe emissions.","ex2":"Many cities plan to replace petrol-fuelled buses with electric ones."},{"en":"culprit","pos":"n.","zh":"元兇；罪魁禍首","cat":"考試重點詞","src":"單元評估","sent":"Our planet, Earth, is facing some serious problems and modern human activity is the culprit.","exam":"單元評估演講詞填空原考詞；閱讀理解因果題常問 the main culprit behind sth","err":"拼寫 cul-prit 易誤作 culpit✗；本義是罪犯，引申指造成問題的「元兇」，可指事物","coll":"the main culprit; the culprit behind air pollution","ex1":"Fast fashion is a major culprit behind the global waste problem.","ex2":"Burning fossil fuels is the main culprit behind global warming."},{"en":"pollute","pos":"v.","zh":"污染","cat":"高頻基礎詞","src":"詞彙練習","sent":"Everyday items like cosmetics and polyester clothing also contain microplastics, tiny particles that are extremely toxic and polluting to the environment.","exam":"詞形轉換核心詞族：pollute (v.) → pollution (n.) → polluting (adj.)；選詞填空原考 polluting","err":"pollution 不可數，不能寫 pollutions；「污染環境」pollute the environment，介詞不用 to","coll":"pollute the ocean; air pollution; polluting to the environment","ex1":"Factories that pollute the river should be fined.","ex2":"Plastic waste is polluting our oceans and harming sea creatures."},{"en":"generate","pos":"v.","zh":"產生；發（電）","cat":"考試重點詞","src":"詞彙練習","sent":"When these fuels are burned, for example in the engine of a moving taxi, greenhouse gases like carbon dioxide and nitrous oxide are generated.","exam":"選詞填空原考詞（被動式 are generated）；搭配 generate electricity / waste / gases","err":"與 general（普通的）拼寫相近；被動式 be generated 常考；waste generation 是名詞搭配","coll":"generate electricity; generate greenhouse gases; waste generation","ex1":"Hong Kong still burns fossil fuels to generate electricity.","ex2":"The event organizers tried to minimize the waste generated."},{"en":"sustainable","pos":"adj.","zh":"可持續的","cat":"核心詞彙","src":"詞彙練習","sent":"We have the power to make a difference, and if we all pitch in, we will be able to build a sustainable future for more generations to come.","exam":"單元評估選詞填空原考詞；詞形轉換：sustain (v.) → sustainable (adj.) → sustainability (n.)","err":"拼寫 -able 結尾（sustainble✗）；a sustainable future / lifestyle 是固定搭配，形容詞置於名詞前","coll":"a sustainable future; sustainable energy sources; live a sustainable life","ex1":"We should switch to clothing made with sustainably sourced cotton or wool.","ex2":"Green events show the potential for a more sustainable future."},{"en":"single-use","pos":"adj.","zh":"即棄的；一次性使用的","cat":"核心詞彙","src":"單元評估","sent":"These include banning single-use plastics, promoting recycling and offering eco-friendly accommodation options.","exam":"單元評估閱讀列舉題原考點（ban single-use plastics）；選詞填空原考詞（single-use cutlery）","err":"複合形容詞必須有連字號且 use 用單數（single-uses✗）；與 disposable 同義互換是閱讀考點","coll":"single-use plastics; single-use cutlery; ban single-use items","ex1":"Many restaurants no longer provide single-use cutlery.","ex2":"The festival has banned single-use plastics to protect the environment."},{"en":"disposable","pos":"adj.","zh":"用完即棄的","cat":"考試重點詞","src":"Text 2","sent":"A durable, refillable plastic water bottle is far preferable to a disposable one.","exam":"Text 2 句子填充原考詞；詞形轉換：dispose (v.) → disposable (adj.)；與 durable 成對比","err":"dispose 去 e 加 -able；與 disposal（n. 處理）詞性易混；同義詞 single-use","coll":"a disposable water bottle; disposable chopsticks; avoid disposable products","ex1":"Try not to use disposable chopsticks when you eat out.","ex2":"Disposable coffee cups create a huge amount of waste every day."},{"en":"refillable","pos":"adj.","zh":"可再填裝的","cat":"核心詞彙","src":"詞彙練習","sent":"A plastic bottle can be substituted with a refillable water bottle that you can reuse multiple times.","exam":"選詞填空原考詞；構詞法：re-（再）+ fill + -able（可以），是前後綴組合考點","err":"雙 l 拼寫 refillable；與 reusable 意思相近：refillable 強調可再注滿，reusable 強調可重用","coll":"a refillable water bottle; refillable containers; water refilling stations","ex1":"I bring a refillable water bottle to school every day.","ex2":"The sports event set up water refilling stations for runners."},{"en":"durable","pos":"adj.","zh":"耐用的","cat":"考試重點詞","src":"詞彙練習","sent":"By opting for durable products that are built to last, you can cut down on the need for constant replacement and, therefore, waste.","exam":"Text 2 段落填空原考詞（a durable plastic water bottle）；閱讀同義替換：durable ≈ built to last","err":"拼寫 dur-able；港生易與 endure（忍受）混淆——durable 指物品「襟用」","coll":"durable products; a durable water bottle; durable materials","ex1":"Durable products are built to last, so they create less waste.","ex2":"This school bag is expensive but very durable."},{"en":"eco-friendly","pos":"adj.","zh":"環保的；對環境無害的","cat":"核心詞彙","src":"綜合任務","sent":"They will learn how to make eco-friendly cleaning products, such as organic soap and detergent made from coconut oil.","exam":"綜合任務筆記原考點；閱讀同義替換：eco-friendly ≈ green / earth-friendly / environmentally friendly","err":"eco- 後必須有連字號再接 friendly；勿寫 ecofriendly 或 eco friendly；前綴 eco- 表「生態、環保」","coll":"eco-friendly products; eco-friendly habits; an eco-friendly lifestyle","ex1":"Our club promotes eco-friendly habits to students.","ex2":"More shoppers are choosing eco-friendly products these days."},{"en":"eco-conscious","pos":"adj.","zh":"有環保意識的","cat":"考試重點詞","src":"詞彙練習","sent":"(改編) We need to rethink the way we live and try acting in an eco-conscious way every day.","exam":"單元評估選詞填空原考詞；-conscious 後綴（有……意識的）如 health-conscious 是構詞考點","err":"conscious 拼寫極易錯（concious✗，sc 組合勿漏 s）；形容人有環保意識，不形容物品","coll":"an eco-conscious lifestyle; eco-conscious consumers; act in an eco-conscious way","ex1":"Eco-conscious shoppers bring their own bags to the supermarket.","ex2":"The Tour de France has increasingly prioritized eco-consciousness."},{"en":"environmentalist","pos":"n.","zh":"環保人士","cat":"考試重點詞","src":"詞彙練習","sent":"Some environmentalists suggest everyone should switch to a plant-based diet.","exam":"選詞填空原考詞；詞形轉換：environment (n.) → environmental (adj.) → environmentalist (n. 人)","err":"拼寫極長，environ-ment-al-ist 逐段記；-ist 後綴表示「……主義者／從事者」","coll":"a famous environmentalist; environmentalists suggest that...","ex1":"The environmentalist gave a talk about ocean plastic at our school.","ex2":"Environmentalists urge us to consume less and reuse more."},{"en":"lifestyle","pos":"n.","zh":"生活方式","cat":"高頻基礎詞","src":"詞彙練習","sent":"You'll be able to lead a healthier and greener lifestyle without giving up all your favourite foods overnight.","exam":"選詞填空原考詞；搭配 lead / live a green lifestyle；主旨題核心詞（low-carbon lifestyles）","err":"一個單詞連寫（life style✗）；「過某種生活」用動詞 lead / live，不用 have a lifestyle","coll":"a green lifestyle; lead a healthy lifestyle; a low-carbon lifestyle","ex1":"Small changes can make your lifestyle much greener.","ex2":"The zero-waste lifestyle is a new green living trend."},{"en":"diet","pos":"n.","zh":"日常飲食；膳食","cat":"高頻基礎詞","src":"Text 1","sent":"Adopting a green diet rich in plant-based foods may help shrink your eco-footprint.","exam":"單元評估選詞填空原考詞（greener diet）；a plant-based diet（以植物為主的飲食）是核心搭配","err":"diet 指日常飲食習慣，不一定是「減肥」；「轉為素食」說 switch to a plant-based diet","coll":"a plant-based diet; a greener diet; switch to a new diet","ex1":"A greener diet with more vegetables helps cut greenhouse gases.","ex2":"Try going vegetarian one day a week to make your diet greener."},{"en":"consume","pos":"v.","zh":"消耗；消費","cat":"考試重點詞","src":"Text 1","sent":"This way, we can consume less overall to reduce our eco-impact - for real.","exam":"選詞填空原考詞；詞形轉換：consume (v.) → consumption (n.) → consumer (n. 消費者)","err":"名詞 consumption 拼寫變化大（consume → consumption）；consume 可指消耗能源，也指購買使用物品","coll":"consume less; consume energy; reduce consumption","ex1":"The new exhibition halls are expected to consume 10% less energy than traditional venues.","ex2":"We can protect the planet by consuming less and reusing more."},{"en":"substitute","pos":"v.","zh":"代替；取代","cat":"考試重點詞","src":"詞彙練習","sent":"A plastic bottle can be substituted with a refillable water bottle that you can reuse multiple times.","exam":"選詞填空原考詞；搭配 substitute A with/for B 的介詞是常見考點","err":"拼寫 sub-sti-tute 易漏音節；被動式 be substituted with 常用；亦可作名詞解「代替品」","coll":"be substituted with; a substitute for plastic; substitute meat with vegetables","ex1":"Plastic straws can be substituted with paper or metal ones.","ex2":"Tofu is a good substitute for meat in many dishes."},{"en":"dispose","pos":"v.","zh":"丟棄；處置","cat":"考試重點詞","src":"詞彙練習","sent":"Even if you can't avoid using plastics, try to dispose of them in a recycling bin - at least then they can be reused.","exam":"選詞填空原考詞；固定搭配 dispose of sth（處理掉某物），of 不可漏","err":"必須接 of 再接賓語（dispose the rubbish✗ → dispose of the rubbish）；派生詞 disposable（即棄的）","coll":"dispose of rubbish; dispose of plastics properly","ex1":"Please dispose of your rubbish in the correct bins.","ex2":"Old batteries must be disposed of carefully because they are toxic."},{"en":"rethink","pos":"v.","zh":"重新思考；反思","cat":"考試重點詞","src":"詞彙練習","sent":"To conclude, ladies and gentlemen, let's rethink the way we live and be the change we want to see.","exam":"單元評估演講詞填空原考詞；前綴 re-（再次）構詞法考點，與 reuse / recycle 同組","err":"re- 直接加 think，毋須連字號；過去式 rethought 不規則變化易錯","coll":"rethink the way we live; rethink our habits","ex1":"It is time to rethink the way we shop and eat.","ex2":"The company rethought its packaging to reduce plastic waste."},{"en":"reduce","pos":"v.","zh":"減少","cat":"高頻基礎詞","src":"Text 2","sent":"Things may seem bleak, but do not despair. Act! Simply reduce - full stop.","exam":"環保三 R 之首（reduce, reuse, recycle）；單元評估選詞填空原考詞；寫作建議段必用","err":"與 produce 拼寫相近；名詞是 reduction（waste reduction），詞形轉換常考","coll":"reduce waste; reduce our eco-impact; waste reduction","ex1":"The best way to help the ocean is simply to reduce what we use.","ex2":"We can reduce waste by buying only what we need."},{"en":"reuse","pos":"v.","zh":"重複使用","cat":"高頻基礎詞","src":"Text 2","sent":"Next best is to reuse: a durable, refillable plastic water bottle is far preferable to a disposable one.","exam":"環保三 R 之一；構詞法 re- + use；形容詞 reusable（可重用的）亦常考","err":"re- 前綴直接連寫；reuse（動詞）與 reusable（形容詞）詞性要分清（reusable metal straws）","coll":"reuse plastic bottles; reusable bags; reuse multiple times","ex1":"These reusable metal straws sold very well right after their launch.","ex2":"Wash the glass jars so that we can reuse them for storage."},{"en":"recycle","pos":"v.","zh":"回收；循環再造","cat":"高頻基礎詞","src":"Write more","sent":"I hope to do my bit to protect the environment by using less paper and recycling old plastic bottles.","exam":"環保三 R 之一；單元評估閱讀原文考 promoting recycling；a recycling bin（回收箱）是固定搭配","err":"recycle 是動詞，recycling 作名詞或形容詞（recycling bin）；港生常漏 -ing 寫 recycle bin✗","coll":"recycle plastic bottles; a recycling bin; promote recycling","ex1":"Remember to put the cans in the recycling bin.","ex2":"The festival promotes recycling and bans single-use plastics."},{"en":"upcycle","pos":"v.","zh":"升級再造","cat":"核心詞彙","src":"聽力對話","sent":"I upcycled a glass jar into a flower pot by gluing yarn to it.","exam":"聽力圖片排序原考詞（an upcycling workshop）；upcycle A into B 的搭配是筆記題考點","err":"up- + cycle 合成新詞，比 recycle 更進一步：把舊物改造成更有用的新產品；勿與 recycle 混用","coll":"upcycle sth into sth; an upcycling workshop; upcycle used objects","ex1":"We learnt to upcycle old T-shirts into shopping bags.","ex2":"At the upcycling workshop, we turned used objects into new products."},{"en":"toxin","pos":"n.","zh":"毒素","cat":"考試重點詞","src":"Text 2","sent":"Toxins in the water often attach to these particles and travel into the fish's bodies, harming them even more.","exam":"Text 2 閱讀理解細節題原考點（毒素依附微塑膠進入魚體）；詞形轉換：toxin (n.) → toxic (adj.)","err":"toxin 是名詞（毒素），toxic 是形容詞（有毒的），詞性易混；複數 toxins","coll":"toxins in the water; release toxins; toxic waste","ex1":"Toxins from the factory flowed into the river and killed the fish.","ex2":"Microplastics are extremely toxic and polluting to the environment."},{"en":"particle","pos":"n.","zh":"微粒；顆粒","cat":"考試重點詞","src":"Text 2","sent":"So, the average person ingests 40 to 50 thousand plastic particles a year - yummy, no?","exam":"Text 2 閱讀理解數據題原考點；plastic particles 與 microplastics 是同義替換","err":"與 article（文章）拼寫相近易混；particle 指極小的顆粒，常與 tiny 連用","coll":"plastic particles; tiny particles; dust particles","ex1":"Microplastics are tiny plastic particles less than five millimetres in diameter.","ex2":"The mask blocks harmful particles in the air."},{"en":"synthetic","pos":"adj.","zh":"合成的；人造的","cat":"考試重點詞","src":"Text 2","sent":"Lots of clothes we wear contain synthetic materials such as polyester or nylon, and they shed microplastics every time we do our laundry.","exam":"Text 2 段落填空原考詞（contain synthetic materials）；閱讀列舉題考 polyester、nylon 等例子","err":"拼寫 syn-thet-ic，y 的位置易錯；反義概念是 natural materials（如 cotton, wool）","coll":"synthetic materials; synthetic fibres; synthetic clothing","ex1":"Synthetic clothing sheds microplastics in the washing machine.","ex2":"Cotton is natural, while polyester is synthetic."},{"en":"laundry","pos":"n.","zh":"待洗衣物；洗衣","cat":"日常實用","src":"Text 2","sent":"Lots of clothes we wear contain synthetic materials such as polyester or nylon, and they shed microplastics every time we do our laundry.","exam":"固定搭配 do the/one's laundry（洗衣服）是聽力與寫作日常情境高頻","err":"「洗衣服」要說 do the laundry，不能說 wash the laundry clothes；laundry 不可數","coll":"do the laundry; a pile of laundry; laundry detergent","ex1":"I help my mum do the laundry every weekend.","ex2":"Washing clothes less often reduces the microplastics released in the laundry."},{"en":"swallow","pos":"v.","zh":"吞下；吞嚥","cat":"高頻基礎詞","src":"Text 2","sent":"They are so tiny that it is easy for fish to swallow them, and they can damage the fish's health.","exam":"Text 2 閱讀理解細節題原考點（魚類吞下微塑膠）；與 ingest（攝入）為同義替換","err":"雙 l 拼寫（swalow✗）；swallow 亦解「燕子」，一詞兩義按上下文判斷","coll":"swallow microplastics; hard to swallow; swallow food","ex1":"Sea turtles sometimes swallow plastic bags by mistake.","ex2":"Chew your food well before you swallow it."},{"en":"bleak","pos":"adj.","zh":"黯淡的；無望的","cat":"考試重點詞","src":"Text 2","sent":"Things may seem bleak, but do not despair. Act!","exam":"Text 2 詞彙填空原考詞（the future is bright and not bleak at all）；語氣題常考（先悲觀後樂觀的轉折）","err":"與 black（黑色）、break 拼寫相近；paint a bleak picture（描繪悲觀景象）是課文搭配","coll":"a bleak future; things seem bleak; paint a bleak picture","ex1":"We shouldn't lose hope because the future of our planet is bright and not bleak at all.","ex2":"The report paints a bleak picture of ocean pollution."},{"en":"despair","pos":"v./n.","zh":"絕望","cat":"考試重點詞","src":"Text 2","sent":"Things may seem bleak, but do not despair. Act!","exam":"演講文體祈使句原文（do not despair）；閱讀語氣題考點：由悲觀轉為呼籲行動","err":"拼寫 -air 結尾（despare✗）；名詞用法 in despair（絕望地）介詞用 in","coll":"do not despair; in despair; give up in despair","ex1":"Do not despair - small actions can still make a big difference.","ex2":"She was in despair when she failed the test, but she tried again."},{"en":"preferable","pos":"adj.","zh":"更可取的；更好的","cat":"考試重點詞","src":"Text 2","sent":"A durable, refillable plastic water bottle is far preferable to a disposable one.","exam":"Text 2 詞彙填空原考詞；固定搭配 be preferable to（比……更可取），介詞用 to 不用 than","err":"preferable 本身已含比較意味，不要說 more preferable than✗；prefer (v.) → preferable (adj.) 詞形轉換常考","coll":"be preferable to; far preferable; a preferable choice","ex1":"Taking the bus is preferable to driving if you want to cut emissions.","ex2":"A reusable cup is far preferable to a disposable one."},{"en":"mend","pos":"v.","zh":"修補；修復","cat":"考試重點詞","src":"Text 2","sent":"This won't mend matters overnight, but at least you will be doing your part for a plastic-free ocean.","exam":"Text 2 詞彙填空原考詞（mend our relationship）；同義替換：mend ≈ fix / repair","err":"mend 可修補實物（mend clothes）也可修復關係（mend a relationship）；勿與 amend（修訂）混淆","coll":"mend matters; mend a relationship; mend clothes","ex1":"I apologised to my friend and sent her a card in order to try and mend our relationship.","ex2":"Grandma taught me to mend torn clothes instead of throwing them away."},{"en":"tote bag","pos":"n.","zh":"環保袋；帆布側揹袋","cat":"日常實用","src":"Text 2","sent":"Use a tote instead of plastic bags when you shop.","exam":"Text 2 建議段原考點；寫作提建議時可用（use a tote bag instead of plastic bags）","err":"tote 可單獨作名詞（a tote）；讀 /təʊt/；「環保袋」也可說 a reusable shopping bag","coll":"carry a tote bag; use a tote instead of plastic bags","ex1":"Remember to bring a tote bag when you go shopping.","ex2":"If you used to use plastic bags when shopping, just switch to tote bags from now on."},{"en":"mislead","pos":"v.","zh":"誤導","cat":"考試重點詞","src":"Text 3","sent":"Greenwashing refers to companies misleading their customers into believing that their products or services are earth-friendly.","exam":"Text 3 定義題核心詞（greenwashing 的定義）；構詞法：mis-（錯誤）+ lead","err":"過去式 misled 只有一個 l 後加 ed（misleaded✗）；搭配 mislead sb into doing sth","coll":"mislead customers; be misled by advertisements; misleading claims","ex1":"Some advertisements mislead shoppers into thinking the products are green.","ex2":"Don't be misled by the pretty green packaging - read the labels carefully."},{"en":"renewable","pos":"adj.","zh":"可再生的","cat":"考試重點詞","src":"單元評估","sent":"The performing arts festival also powers stages with renewable energy sources, ensuring minimal carbon emissions during the event.","exam":"單元評估單張填空原考點（renewable energy sources）；與 fossil fuels 成對比是閱讀常考","err":"renew + -able，中間的 e 保留（renewable ✓）；renewable energy 指太陽能、風能等","coll":"renewable energy sources; renewable resources","ex1":"Solar and wind power are renewable energy sources.","ex2":"More cities are switching to renewable energy to cut emissions."},{"en":"minimize","pos":"v.","zh":"把……減至最低","cat":"考試重點詞","src":"單元評估","sent":"From music festivals to fairs and sporting events, organizers are embracing eco-friendly initiatives to minimize environmental impact.","exam":"單元評估段落填空原考詞；反義詞 maximize；同義替換：minimize ≈ reduce as much as possible","err":"mini- 開頭雙 i 位置易錯（minimise 英式 / minimize 美式皆可，跟隨課本）；賓語常是 impact / waste / risks","coll":"minimize environmental impact; minimize waste; minimize the damage","ex1":"Organizers minimized waste generation by using refillable bottles.","ex2":"We can minimize our eco-impact by consuming less."},{"en":"initiative","pos":"n.","zh":"倡議；新措施","cat":"考試重點詞","src":"單元評估","sent":"Renowned for its commitment to sustainability, the Glastonbury Festival in the UK incorporates numerous environmental initiatives.","exam":"單元評估閱讀列舉題原考點（列出音樂節的環保措施）；green initiatives 是固定搭配","err":"拼寫 ini-tia-tive 極易錯（initative✗）；take the initiative 另解「主動」，按上下文判斷","coll":"environmental initiatives; green initiatives; launch an initiative","ex1":"The school launched a green initiative to cut paper waste.","ex2":"Eco-friendly initiatives help minimize the impact of big events."},{"en":"awareness","pos":"n.","zh":"意識；認知","cat":"考試重點詞","src":"聽力對話","sent":"He told us the purpose of the event, which was to raise environmental awareness through conservation work.","exam":"聽力筆記題原考點；固定搭配 raise environmental awareness 是演講與寫作必用","err":"不可數名詞；「提高意識」動詞用 raise，不用 rise / increase up；aware (adj.) → awareness (n.) 詞形轉換常考","coll":"raise awareness; environmental awareness; public awareness","ex1":"The campaign aims to raise awareness of plastic pollution.","ex2":"Schools can raise students' environmental awareness through green activities."},{"en":"conservation","pos":"n.","zh":"（自然）保育","cat":"核心詞彙","src":"聽力對話","sent":"The objective of his company was to raise environmental awareness through conservation work and to campaign for a greener future.","exam":"聽力原考詞（conservation work）；詞形轉換：conserve (v.) → conservation (n.)","err":"與 conversation（談話）只差幾個字母，聽力最易聽混；conservation 指保護自然資源","coll":"conservation work; wildlife conservation; energy conservation","ex1":"The group does conservation work to protect wetlands.","ex2":"Wildlife conservation helps endangered animals survive."},{"en":"campaign","pos":"n./v.","zh":"運動；活動；發起運動","cat":"核心詞彙","src":"聽力對話","sent":"I want to support their cause and be part of their green campaign.","exam":"聽力原考詞；作動詞時搭配 campaign for（為……發起運動）；寫作提議活動常用","err":"拼寫 -aign 結尾，g 不發音（campain✗）；「參加活動」用 join / be part of a campaign","coll":"a green campaign; campaign for a greener future; launch a campaign","ex1":"Our school launched a campaign to ban single-use plastics on campus.","ex2":"The organization campaigns for a greener future."},{"en":"volunteer","pos":"n./v.","zh":"義工；自願參與","cat":"高頻基礎詞","src":"聽力對話","sent":"By the end of the event, I decided to sign up to be a volunteer for Eco Power.","exam":"聽力圖片排序原考點（sign up to be a volunteer）；口試與寫作介紹課外活動高頻","err":"拼寫雙 e 結尾 -eer（voluntere✗）；「做義工」說 be / work as a volunteer 或 do voluntary work","coll":"sign up to be a volunteer; a volunteer for an orga
