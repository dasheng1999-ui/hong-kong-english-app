/* ---------- 出題工具 ---------- */
function distractZh(u,w,n=3){
  let pool = u.words.filter(x=>x.en!==w.en && x.zh && x.zh!==w.zh);
  const same = pool.filter(x=>x.pos===w.pos);
  if(same.length>=n) pool=same;
  return shuffle(pool).slice(0,n).map(x=>x.zh);
}
function distractEn(u,w,n=3){
  let pool = u.words.filter(x=>x.en!==w.en);
  const same = pool.filter(x=>x.pos===w.pos);
  if(same.length>=n) pool=same;
  return shuffle(pool).slice(0,n).map(x=>x.en);
}
function sentenceFor(w, alt){
  const base = w.en.split(' ')[0].replace(/[^A-Za-z]/g,'').slice(0,4);
  const re = new RegExp(base,'i');
  const list = alt? [w.ex2,w.ex1,w.sent] : [w.sent,w.ex1,w.ex2];
  return list.filter(s=>s&&re.test(s))[0] || w.sent || w.ex1 || '';
}
function blankOut(s,en){
  const base = en.split(' ')[0].replace(/[^A-Za-z]/g,'');
  const re = new RegExp('\\b'+base.slice(0,Math.max(3,base.length-2))+'[A-Za-z]*','i');
  return re.test(s)? s.replace(re,'_____') : s+' ( _____ )';
}
function hi(s,en){
  const base = en.split(' ')[0].replace(/[^A-Za-z]/g,'');
  const re = new RegExp('(\\b'+base.slice(0,Math.max(3,base.length-2))+'[A-Za-z]*)','i');
  return esc(s).replace(re,'<b>$1</b>');
}

/* ---------- 干擾項生成:錯誤串法 & 錯誤搭配 ---------- */
function misspellings(word, n=3){
  const w = word.toLowerCase(); const out = new Set();
  const add = s => { if(s && s!==w && s.length>1) out.add(s); };
  // 相鄰字母調位
  for(let i=Math.max(1,Math.floor(w.length/2)-1); i<w.length-1 && out.size<8; i++)
    add(w.slice(0,i)+w[i+1]+w[i]+w.slice(i+2));
  // 雙寫/去雙寫
  const dbl = w.match(/(.)\1/); if(dbl) add(w.replace(dbl[0], dbl[1]));
  for(let i=1;i<w.length;i++){ if(w[i]!==w[i-1] && 'lmnprst'.includes(w[i])){ add(w.slice(0,i)+w[i]+w.slice(i)); break; } }
  // ie/ei、tion/sion、母音替換、字尾 e
  if(w.includes('ie')) add(w.replace('ie','ei')); else if(w.includes('ei')) add(w.replace('ei','ie'));
  if(w.includes('tion')) add(w.replace('tion','sion')); else if(w.includes('sion')) add(w.replace('sion','tion'));
  const vow='aeiou';
  for(let i=1;i<w.length && out.size<8;i++){
    if(vow.includes(w[i])){ const alt=vow[(vow.indexOf(w[i])+1)%5]; add(w.slice(0,i)+alt+w.slice(i+1)); }
  }
  if(w.endsWith('e')) add(w.slice(0,-1)); else add(w+'e');
  return shuffle([...out]).slice(0,n);
}
const COLL_VERBS=['make','do','take','have','get','give','keep','say','open','turn','hold','play'];
const COLL_PREPS=['on','in','at','for','with','to','of','by','from','about'];
function collocOptions(w){
  if(!w.coll) return null;
  const phrase = w.coll.split(/[;；]/)[0].trim();
  const toks = phrase.split(/\s+/);
  if(toks.length<2) return null;
  const stem = w.en.split(' ')[0].replace(/[^A-Za-z]/g,'').slice(0,4).toLowerCase();
  let ci=-1, pool=null;
  for(let i=0;i<toks.length;i++){
    const t=toks[i].toLowerCase().replace(/[^a-z]/g,'');
    if(t.startsWith(stem)) continue;               // 目標詞本身
    if(COLL_VERBS.includes(t)){ ci=i; pool=COLL_VERBS; break; }
    if(COLL_PREPS.includes(t)){ ci=i; pool=COLL_PREPS; break; }
  }
  if(ci<0) return null;
  const cur = toks[ci].toLowerCase();
  const wrong = shuffle(pool.filter(x=>x!==cur)).slice(0,3).map(x=>{
    const t2 = toks.slice(); t2[ci]=x; return t2.join(' ');
  });
  return { right: phrase, opts: shuffle([phrase, ...wrong]) };  // 四個選項全部含目標詞
}

/* ---------- 課節生成:嚴格按層出題,唔重複舊難度 ---------- */
let sess = null;
function startSession(forceGi){
  if(!enforceLicense()) return;
  const u = curUnit();
  if(!unitInScope(u)){ alertTip('此單元未開通,請聯絡管理員升級授權'); return; }
  const pos = currentPos(u);
  let gi = (forceGi!==undefined)? forceGi : pos.gi;
  const gws = pos.gs[gi];
  // 揀呢關目前層(復習已完成關卡時,做第3層混合)
  let tier = pos.allDone||groupDone(u,gws)? 3 : [1,2,3].find(t=>tierProgress(u,gws,t).n<gws.length);
  const steps = [];
  const pending = gws.filter(w=>!tierPassed(u,w,tier));
  const target = pending.length? pending : gws;

  if(tier===1){
    let intros=0;
    target.forEach(w=>{
      const p = pget(wid(u,w));
      if(!p.seen && intros<5){ steps.push({t:'intro',w}); steps.push({t:'mcq_zh',w}); intros++; }
      else steps.push({t: p.m===0? 'mcq_zh':'mcq_ctx', w});   // 第2次識義即轉語境,唔會一直裸詞
    });
  } else if(tier===2){
    target.forEach((w,wi)=>{
      const p = pget(wid(u,w));
      if(p.u===0){ steps.push({t:'cloze',w}); return; }
      // 第二次起輪換題型:串字砌/揀串法/聽音辨串/搭配
      const short = w.en.replace(/[^A-Za-z]/gi,'').length<=9;
      const menu = [];
      if(short) menu.push('spell');
      menu.push('spell_pick','listen_pick');
      if(collocOptions(w)) menu.push('colloc');
      steps.push({t: menu[(wi+p.u) % menu.length], w});
    });
  } else {
    // 第3層:短文推義(3-4詞一篇)+ 語境推義
    const seen=new Set(), chunk=[];
    for(const w of target){
      if(chunk.length>=4) break;
      let s = sentenceFor(w);
      if(!s) continue;
      if(seen.has(s.toLowerCase())){ s = sentenceFor(w,true); }
      if(!s || seen.has(s.toLowerCase())) continue;
      seen.add(s.toLowerCase()); chunk.push({w, s});
    }
    if(chunk.length>=3) steps.push({t:'passage', ws:chunk.map(c=>c.w), sents:chunk.map(c=>c.s)});
    const inPass = new Set(chunk.map(c=>c.w.en));
    target.filter(w=>!inPass.has(w.en)).forEach(w=>steps.push({t:'infer',w}));
  }
  // 每輪加一題短語(唔影響層進度,保持新鮮感)
  if(u.phrases.length && tier!==3){
    const p = u.phrases[Math.floor(Math.random()*u.phrases.length)];
    steps.splice(Math.min(4,steps.length),0,{t:'phrase',p});
  }
  document.querySelectorAll('.confetti').forEach(c=>c.remove());
  sess = { steps: steps.slice(0,SESSION_CAP), i:0, right:0, wrong:0, gems:0, gi, tier, t0:Date.now(),
           tierWasDone: tierProgress(u,gws,tier).n===gws.length };
  renderStep(); show('scr-session');
}
function sessHeader(){
  const pct = Math.round(100*sess.i/sess.steps.length);
  return `<div class="topbar" style="padding-top:16px">
    <button class="quitx" onclick="switchTab('home')">✕</button>
    <div class="pbarwrap"><div class="pbar" style="width:${pct}%"></div></div>
    <span class="tierbadge t${sess.tier}">${TIER_ICON[sess.tier]} 第${sess.gi+1}關</span></div>`;
}

/* ---------- 題型渲染 ---------- */
function renderStep(){
  const s = $('#scr-session');
  if(s) s.scrollTop = 0;
  if(sess.i>=sess.steps.length) return safeFinishSession();
  const st = sess.steps[sess.i], u = curUnit();
  if(st.t==='intro'){
    const w=st.w;
    s.innerHTML = sessHeader()+`<div class="pad anim-in center">
      <p class="sub" style="font-weight:800;color:var(--teal-dk)">✨ 新詞見面禮</p>
      <div style="margin:6px 0">${mascotSVG(88,'wow')}</div>
      <div class="bigword">${esc(w.en)}</div>
      <p style="margin:2px 0 8px"><span class="sub">${esc(w.pos)}</span>&nbsp;<span class="zh-big">${esc(w.zh)}</span></p>
      <button class="speak" onclick="speak('${esc(w.en).replace(/'/g,"\\'")}')">🔊</button>
      <div style="height:12px"></div>
      <div class="sent" style="text-align:left">${hi(sentenceFor(w),w.en)}</div>
      ${w.coll?`<p class="sub" style="margin-top:8px">搭配:${esc(w.coll)}</p>`:''}
      <div style="height:20px"></div>
      <button class="btn" onclick="pget(wid(curUnit(),sess.steps[sess.i].w)).seen=true;sess.i++;renderStep()">記住喇,下一步 →</button></div>`;
    speak(w.en); return;
  }
  if(st.t==='spell') return renderSpell(st.w);
  if(st.t==='passage') return renderPassage(st.ws, st.sents);
  let body='';
  if(st.t==='mcq_zh'){
    const w=st.w;
    body = qBody('呢個詞係咩意思?',
      `<div class="center" style="margin-bottom:16px"><span class="bigword">${esc(w.en)}</span>
       <button class="speak" style="vertical-align:middle;margin-left:8px" onclick="speak('${esc(w.en).replace(/'/g,"\\'")}')">🔊</button></div>`,
      shuffle([w.zh,...distractZh(u,w)]), w.zh, w);
  } else if(st.t==='mcq_ctx'){
    const w=st.w;
    body = qBody(`句子入面 <b style="color:var(--coral)">${esc(w.en)}</b> 係咩意思?`,
      `<div class="sent" style="margin-bottom:16px">${hi(sentenceFor(w),w.en)}</div>`,
      shuffle([w.zh,...distractZh(u,w)]), w.zh, w);
  } else if(st.t==='cloze'||st.t==='cloze2'){
    const w=st.w;
    const sent = sentenceFor(w, st.t==='cloze2');
    body = qBody('揀返個啱嘅詞填入空格',
      `<div class="sent" style="margin-bottom:14px">${esc(blankOut(sent,w.en))}</div>
       <p class="sub" style="margin-bottom:10px">提示:${esc(w.zh)}</p>`,
      shuffle([w.en,...distractEn(u,w)]), w.en, w);
  } else if(st.t==='colloc'){
    const w=st.w;
    const co = collocOptions(w);
    if(!co){ sess.steps[sess.i]={t:'spell_pick',w}; return renderStep(); }
    body = qBody(`邊個先係 <b style="color:var(--coral)">${esc(w.en)}</b> 嘅正確搭配?`,
      `<p class="sub" style="margin-bottom:12px">${esc(w.zh)} · 四個都有「${esc(w.en)}」,揀個地道嘅組合</p>`,
      co.opts, co.right, w);
  } else if(st.t==='spell_pick'){
    const w=st.w;
    const word = w.en.replace(/[^A-Za-z]/g,'').toLowerCase();
    const wrong = misspellings(word);
    if(wrong.length<3){ sess.steps[sess.i]={t:'cloze2',w}; return renderStep(); }
    body = qBody('邊個串法先啱?',
      `<p class="sub" style="margin-bottom:12px">${esc(w.zh)} (${esc(w.pos)}) — 睇真啲,得一個啱!</p>`,
      shuffle([word,...wrong]), word, w);
  } else if(st.t==='listen_pick'){
    const w=st.w;
    const word = w.en.replace(/[^A-Za-z]/g,'').toLowerCase();
    const wrong = misspellings(word);
    if(wrong.length<3){ sess.steps[sess.i]={t:'cloze2',w}; return renderStep(); }
    body = qBody('聽發音,揀返正確串法',
      `<div class="center" style="margin-bottom:14px">
        <button class="speak" style="width:64px;height:64px;font-size:28px" onclick="speak('${esc(w.en).replace(/'/g,"\\'")}')">🔊</button>
        <p class="sub" style="margin-top:6px">${esc(w.zh)}</p></div>`,
      shuffle([word,...wrong]), word, w);
    setTimeout(()=>speak(w.en), 350);
  } else if(st.t==='infer'){
    const w=st.w;
    body = qBody(`從句子推斷 <b style="color:var(--coral)">${esc(w.en)}</b> 嘅意思`,
      `<div class="sent" style="margin-bottom:16px">${hi(sentenceFor(w,true),w.en)}</div>`,
      shuffle([w.zh,...distractZh(u,w)]), w.zh, w);
  } else if(st.t==='phrase'){
    const p=st.p;
    const others = shuffle(u.phrases.filter(x=>x.phrase!==p.phrase)).slice(0,3).map(x=>x.zh);
    body = qBody('呢個短語係咩意思?',
      `<div class="center" style="margin-bottom:6px"><span style="font-size:23px;font-weight:900">${esc(p.phrase)}</span></div>
       <p class="sub center" style="margin-bottom:14px">${esc(p.type||'課文短語')}</p>`,
      shuffle([p.zh,...others]), p.zh, null, p);
  }
  s.innerHTML = sessHeader()+`<div class="anim-in">${body}</div>`;
}
function qBody(qtitle, stimulus, opts, answer, w, p){
  window.__answer=answer; window.__w=w||null; window.__p=p||null;
  return `<div class="pad"><h2 style="margin-bottom:14px">${qtitle}</h2>${stimulus}
    <div id="opts">${opts.map(o=>`<button class="choice" onclick="pick(this)">${esc(o)}</button>`).join('')}</div></div>`;
}
function pick(btn){
  const ok = btn.textContent===window.__answer;
  document.querySelectorAll('#opts .choice').forEach(b=>{
    b.classList.add('dim');
    if(b.textContent===window.__answer){ b.classList.remove('dim'); b.classList.add('right'); }
  });
  if(!ok){ btn.classList.remove('dim'); btn.classList.add('wrong'); }
  haptic(); showBanner(ok, window.__w, window.__p);
}

/* ---------- 串字 ---------- */
function renderSpell(w){
  const word = w.en.replace(/[^A-Za-z]/g,'').toLowerCase();
  const letters = shuffle(word.split('').concat(shuffle('abcdefghilmnoprstu'.split('')).slice(0,Math.max(2,10-word.length))));
  window.__spell = {w, word, cur:''};
  $('#scr-session').innerHTML = sessHeader()+`<div class="pad anim-in">
    <h2 style="margin-bottom:6px">串返個詞出嚟</h2>
    <p class="sub" style="margin-bottom:14px">${esc(w.zh)} <button class="speak" style="width:34px;height:34px;font-size:15px" onclick="speak('${esc(w.en).replace(/'/g,"\\'")}')">🔊</button></p>
    <div class="slotrow" id="slots"><span class="sub">點下面啲字母</span></div>
    <div class="tiles" id="tiles">${letters.map((c,i)=>`<button class="tile" id="t${i}" onclick="tapTile(this,'${c}')">${c}</button>`).join('')}</div>
    <div style="height:18px"></div>
    <button class="btn ghost" onclick="spellBack()">⌫ 刪除</button></div>`;
}
function tapTile(btn,c){
  const sp=window.__spell;
  if(sp.cur.length>=sp.word.length) return;
  sp.cur+=c; btn.classList.add('used'); btn.dataset.sl=sp.cur.length; drawSlots();
  if(sp.cur.length===sp.word.length){
    const ok=sp.cur===sp.word;
    setTimeout(()=>showBanner(ok, sp.w, null, ok?null:sp.word),250);
  }
}
function spellBack(){
  const sp=window.__spell; if(!sp.cur) return;
  const n=sp.cur.length; sp.cur=sp.cur.slice(0,-1);
  const t=document.querySelector(`.tile.used[data-sl="${n}"]`);
  if(t){ t.classList.remove('used'); delete t.dataset.sl; } drawSlots();
}
function drawSlots(){
  const sp=window.__spell;
  $('#slots').innerHTML = sp.cur? sp.cur.split('').map(c=>`<span class="slotchar">${c}</span>`).join(''):'<span class="sub">點下面啲字母</span>';
}

/* ---------- 短文推義(第3層) ---------- */
function renderPassage(ws, sents){
  window.__pass = { ws, fills: ws.map(()=>null), checked:false };
  const items = ws.map((w,i)=>blankOut(sents? sents[i] : sentenceFor(w), w.en));
  $('#scr-session').innerHTML = sessHeader()+`<div class="pad anim-in">
    <h2 style="margin-bottom:4px">📖 短文閱讀</h2>
    <p class="sub" style="margin-bottom:12px">讀住呢段文,把詞語放返入啱嘅空格</p>
    <div class="sent" style="margin-bottom:14px;line-height:1.9" id="ptext">
      ${items.map((s,i)=>`<span>${esc(s).replace('_____',`<span class="pblank" data-i="${i}" onclick="passClear(${i})" style="display:inline-block;min-width:76px;border-bottom:3px solid var(--teal);text-align:center;font-weight:900;color:var(--teal-dk);cursor:pointer">&nbsp;</span>`)} </span>`).join('')}
    </div>
    <div class="tiles" id="pchips">
      ${shuffle(ws.map((w,i)=>i)).map(i=>`<button class="tile" style="font-size:16px" id="pc${i}" onclick="passPick(${i})">${esc(ws[i].en)}</button>`).join('')}
    </div>
    <div style="height:18px"></div>
    <button class="btn" id="pcheck" disabled onclick="passCheck()">檢查</button></div>`;
}
function passPick(ci){
  const P=window.__pass; if(P.checked) return;
  const slot=P.fills.indexOf(null); if(slot<0) return;
  P.fills[slot]=ci; document.getElementById('pc'+ci).classList.add('used'); passDraw();
}
function passClear(i){
  const P=window.__pass; if(P.checked) return;
  const ci=P.fills[i]; if(ci===null) return;
  P.fills[i]=null; document.getElementById('pc'+ci).classList.remove('used'); passDraw();
}
function passDraw(){
  const P=window.__pass;
  document.querySelectorAll('.pblank').forEach(b=>{
    const ci=P.fills[+b.dataset.i];
    b.innerHTML = ci===null? '&nbsp;' : esc(P.ws[ci].en);
  });
  $('#pcheck').disabled = P.fills.some(f=>f===null);
}
function passCheck(){
  const P=window.__pass; P.checked=true;
  const u=curUnit(); let allOk=true, wrong=[];
  P.fills.forEach((ci,i)=>{
    const ok=ci===i;
    const b=document.querySelector(`.pblank[data-i="${i}"]`);
    b.style.borderBottomColor = ok?'var(--ok)':'var(--bad)';
    b.style.color = ok?'var(--teal-dk)':'var(--bad-dk)';
    if(!ok) b.innerHTML = esc(P.ws[i].en);
    const pr=pget(wid(u,P.ws[i]));
    if(ok){ pr.r=Math.min(9,pr.r+1); sess.right++; sess.gems+=3; }
    else { pr.wrong=(pr.wrong||0)+1; sess.wrong++; allOk=false; wrong.push(P.ws[i]); }
  });
  haptic();
  const b=$('#banner');
  b.className = allOk?'show':'show bad';
  b.innerHTML = `<h3 style="color:${allOk?'var(--teal-dk)':'var(--bad-dk)'}">${allOk?'✅ 成篇讀晒,勁呀!':'❌ 有幾個位再溫下'}</h3>
    ${wrong.map(w=>`<div style="font-weight:800">${esc(w.en)} = ${esc(w.zh)}</div>`).join('')}
    ${wrong[0]&&wrong[0].err?`<div class="tip">💡 ${esc(wrong[0].err)}</div>`:''}
    <button type="button" class="btn ${allOk?'':'coral'}" data-pass-next="1">繼續</button>`;
}

/* ---------- 回饋 + 層進度 ---------- */
let __bannerBusy = false;
function advancePassageBanner(){
  if(__bannerBusy) return;

  $('#banner').classList.remove('show');

}
function showBanner(ok, w, p, correctSpelling){
  const b=$('#banner');

  if(!ok&&correctSpelling) tip=`<div class="tip">正確串法:<b>${esc(correctSpelling)}</b></div>`+tip;
  b.innerHTML=`<h3 style="color:${ok?'var(--teal-dk)':'var(--bad-dk)'}">${ok?'✅ '+praise[Math.floor(Math.random()*praise.length)]:'❌ 唔緊要,好快再見到佢!'}</h3>

function closeBanner(ok){
  if(__bannerBusy) return;
  __bannerBusy = true;
  $('#banner').classList.remove('show');
  const st=sess.steps[sess.i], u=curUnit();
  if(st.w){
    const pr=pget(wid(u,st.w));
    if(ok){
      if(sess.tier===1) pr.m=Math.min(9,pr.m+1);
      else if(sess.tier===2) pr.u=Math.min(9,pr.u+1);
      else pr.r=Math.min(9,pr.r+1);
      sess.right++; sess.gems+=2;
    } else {
      pr.wrong=(pr.wrong||0)+1; sess.wrong++;
      if(sess.steps.length<SESSION_CAP+3) sess.steps.push({t: sess.tier===1?'mcq_zh': sess.tier===2?'cloze':'infer', w:st.w});
    }
  } else if(st.p){ ok? (sess.right++, sess.gems+=2) : sess.wrong++; }
  sess.i++; renderStep();
  setTimeout(()=>{ __bannerBusy = false; }, 700);
}
function bannerNextFromEvent(e){
  const btn = e.target && e.target.closest ? e.target.closest('[data-banner-next],[data-pass-next]') : null;
  if(!btn) return;
  e.preventDefault();
  if(btn.dataset.passNext) advancePassageBanner();
  else closeBanner(btn.dataset.ok==='1');
}
document.addEventListener('pointerup', bannerNextFromEvent, true);
document.addEventListener('touchend', bannerNextFromEvent, true);
document.addEventListener('click', bannerNextFromEvent, true);

    $('#banner').classList.remove('show');

}
function finishSession(){
  store.gems+=sess.gems; store.doneToday++;
  const mins = Math.max(0.5, Math.round((Date.now()-sess.t0)/6000)/10);
  addMinutes(mins);
  const uu=curUnit();
  store.history.unshift({d:today(), u:uu.book+' U'+uu.num, t:sess.tier, r:sess.right, w:sess.wrong, m:mins});
  if(store.history.length>60) store.history.length=60;
  saveUser();
  const u=curUnit();
  const gs=groups(u), gws=gs[sess.gi];
  const tp=tierProgress(u,gws,sess.tier);
  const tierNowDone = tp.n===tp.total && !sess.tierWasDone;
  const gDone = groupDone(u,gws);
  const total=sess.right+sess.wrong, acc= total?Math.round(100*sess.right/total):100;
  let headline, subline;
  if(gDone && tierNowDone){ headline='👑 第'+(sess.gi+1)+'關 完全通關!'; subline= sess.gi+1<gs.length? '下一關已解鎖,繼續衝!':'成個單元完成晒,勁到爆!'; }
  else if(tierNowDone){ headline='🎊 '+TIER_NAME[sess.tier]+' 完成!'; subline='升級到 '+TIER_NAME[Math.min(3,sess.tier+1)]+',難度升一級!'; }
  else { headline='任務完成! 🎉'; subline='水杯注到 '+tp.pct+'%,就快滿喇!'; }
  $('#scr-done').innerHTML=`<div class="pad center" style="margin-top:4vh">
    ${mascotSVG(140,'happy')}
    <h1 style="margin:14px 0 6px;animation:starpop .5s">${headline}</h1>
    <p class="sub" style="margin-bottom:18px">${subline}</p>
    <div class="cupwrap" style="margin-bottom:18px">
      <div class="cup"><div class="water" style="height:${tp.pct}%"><div class="wave"></div></div><div class="pct">${tp.pct}%</div></div>
      <div style="text-align:left">
        <div style="font-weight:900">第${sess.gi+1}關 · ${TIER_NAME[sess.tier]}</div>
        <div class="sub">搞掂 ${tp.n}/${tp.total} 個詞</div>
        <div class="sub">單元總進度 ${unitPct(u)}%</div></div>
    </div>
    <div style="display:flex;gap:12px;justify-content:center;margin-bottom:22px">
      <div class="card" style="flex:1"><div style="font-size:22px;font-weight:900;color:var(--teal-dk)">${acc}%</div><div class="sub">答對率</div></div>
      <div class="card" style="flex:1"><div style="font-size:22px;font-weight:900;color:var(--coral)">+${sess.gems}</div><div class="sub">寶石</div></div>
    </div>
    <button class="btn" onclick="switchTab('home')">返回關卡地圖</button>
    <div style="height:10px"></div>
    <button class="btn ghost" onclick="startSession()">再嚟一輪 💪</button></div>`;
  show('scr-done');
  if(tierNowDone||gDone){
    try{ confetti(); }catch(err){ console.error('confetti failed', err); }
  }
}
function confetti(){
  const icons=['🎉','⭐','💎','🧋','✨'];
  for(let i=0;i<26;i++){
    const c=el(`<div class="confetti" style="left:${Math.random()*100}%;animation-duration:${1.4+Math.random()*1.6}s;animation-delay:${Math.random()*.7}s">${icons[i%icons.length]}</div>`);
    $('#app').appendChild(c); setTimeout(()=>c.remove(),3600);
  }
}

function renderArcade(){

/* 遊戲1:接珍珠(英→中快反應) */
function gameRain(){
  const ws = learnedWords(8).slice(0,10);
  game = {score:0, life:3, qi:0, ws, drops:[], iv:null, iv2:null, t:60};
  $('#scr-game').innerHTML = gameHeader('🫧 接珍珠', `<span class="chip" id="g-score">0</span><span class="chip" id="g-life">❤️3</span>`)+
   `<div class="pad" style="padding-top:4px">
     <div id="rainzone"></div>
     <div class="card center" style="margin-top:12px;padding:10px"><span class="sub">撳跌緊落嚟、意思係——</span><div id="g-target" style="font-size:20px;font-weight:900;color:var(--teal-dk)"></div></div>
   </div>`;
  nextRainTarget();
  game.iv = setInterval(spawnDrop, 1300);
  game.iv2 = setInterval(()=>{ // move drops
    const zone = $('#rainzone'); if(!zone){ return endGame(); }
    const zh = zone.clientHeight;
    game.drops.forEach(d=>{
      d.y += d.v; d.el.style.top = d.y+'px';
      if(d.y > zh-30){ d.el.remove(); if(d.word===game.target.en){ loseLife(); nextRainTarget(); } game.drops=game.drops.filter(x=>x!==d); }
    });
  }, 50);
  spawnDrop();
}
function nextRainTarget(){
  game.target = game.ws[game.qi % game.ws.length]; game.qi++;
  const t=$('#g-target'); if(t) t.textContent = game.target.zh;
}
function spawnDrop(){
  const zone = $('#rainzone'); if(!zone||!game) return;
  const pool = [game.target, ...shuffle(game.ws.filter(w=>w.en!==game.target.en)).slice(0,2)];
  const w = pool[Math.floor(Math.random()*pool.length)];
  const el = document.createElement('div'); el.className='drop'; el.textContent=w.en;
  el.style.left = (8+Math.random()*60)+'%';
  el.onclick = ()=>{
    if(!game) return;
    if(w.en===game.target.en){ el.classList.add('good'); game.score+=3; $('#g-score').textContent=game.score;
      setTimeout(()=>el.remove(),150); game.drops=game.drops.filter(x=>x.el!==el); speak(w.en); nextRainTarget();
      if(game.score>=30) gameOver('好嘢!珍珠大豐收!🫧', game.score, '英→中反應越嚟越快喇'); }
    else { el.classList.add('bad'); game.score=Math.max(0,game.score-1); $('#g-score').textContent=game.score; loseLife(); }
  };
  zone.appendChild(el);
  game.drops.push({el, y:-40, v: 1.1+Math.random()*1.1, word:w.en});
}
function loseLife(){
  if(!game) return;
  game.life--; const l=$('#g-life'); if(l) l.textContent='❤️'+game.life;
  if(game.life<=0) gameOver('波波接唔切喇~', game.score, '聽日再嚟挑戰高分!');
}

/* 遊戲2:配對翻卡 */
function gameMatch(){
  const ws = learnedWords(6).slice(0,6);
  const cards = shuffle(ws.flatMap((w,i)=>[{t:w.en,k:i},{t:w.zh,k:i}]));
  game = {open:[], matched:0, flips:0, iv:null, iv2:null};
  $('#scr-game').innerHTML = gameHeader('🎴 配對翻卡', `<span class="chip" id="g-flip">0 翻</span>`)+
   `<div class="pad" style="padding-top:4px"><div class="mmgrid">
    ${cards.map((c,i)=>`<div class="mmcard" id="mm${i}" data-k="${c.k}" onclick="flipCard(${i})">波波</div>`).join('')}
   </div><p class="sub center" style="margin-top:12px">英文卡 配 中文卡</p></div>`;
  game.cards = cards;
}
function flipCard(i){
  if(!game) return;
  const el = document.getElementById('mm'+i);
  if(el.classList.contains('open')||el.classList.contains('matched')||game.open.length>=2) return;
  el.classList.add('open'); el.textContent = game.cards[i].t;
  game.open.push(i); game.flips++; $('#g-flip').textContent=game.flips+' 翻';
  if(game.open.length===2){
    const [a,b]=game.open;
    if(game.cards[a].k===game.cards[b].k && a!==b){
      setTimeout(()=>{ document.getElementById('mm'+a).classList.add('matched');
        document.getElementById('mm'+b).classList.add('matched');
        game.open=[]; game.matched++;
        if(game.matched===6){ const score=Math.max(6, 30-(game.flips-12)); gameOver('全部配對成功!🎴', score, `${game.flips} 次翻卡完成,好記性!`); }
      },350);
    } else {
      setTimeout(()=>{ [a,b].forEach(x=>{ const e=document.getElementById('mm'+x); e.classList.remove('open'); e.textContent='波波'; }); game.open=[]; },700);
    }
  }
}

/* 遊戲3:串字快手 */
function gameSpeed(){
  const ws = learnedWords(8).filter(w=>w.en.replace(/[^A-Za-z]/g,'').length<=9);
  game = {score:0, qi:0, ws:shuffle(ws), t:45, iv:null, iv2:null, cur:'', word:''};
  $('#scr-game').innerHTML = gameHeader('⚡ 串字快手', `<span class="chip" id="g-score">0</span>`)+
   `<div class="pad" style="padding-top:4px">
     <div class="timerbar"><div id="g-timer" style="width:100%"></div></div>
     <p class="sub" id="g-hint" style="margin-bottom:10px;font-weight:800;font-size:16px"></p>
     <div class="slotrow" id="slots"></div>
     <div class="tiles" id="tiles"></div>
     <div style="height:14px"></div>
     <div style="display:flex;gap:10px">
       <button class="btn ghost" style="flex:1" onclick="speedBack()">⌫</button>
       <button class="btn ghost" style="flex:1" onclick="speedNext(true)">跳過</button>
     </div></div>`;
  game.iv = setInterval(()=>{
    game.t -= 0.1;
    const tb=$('#g-timer'); if(tb) tb.style.width = Math.max(0, 100*game.t/45)+'%';
    if(game.t<=0) gameOver('時間到!⚡', game.score, `45 秒串啱 ${Math.floor(game.score/5)} 個詞`);
  },100);
  speedNext();
}
function speedNext(skip){
  if(!game) return;
  const w = game.ws[game.qi % game.ws.length]; game.qi++;
  game.w=w; game.word=w.en.replace(/[^A-Za-z]/g,'').toLowerCase(); game.cur='';
  $('#g-hint').textContent = w.zh+' ('+w.pos+')';
  const letters = shuffle(game.word.split('').concat(shuffle('aeionrst'.split('')).slice(0, Math.max(1, 8-game.word.length))));
  $('#tiles').innerHTML = letters.map((c,i)=>`<button class="tile" id="gt${i}" onclick="speedTap(this,'${c}')">${c}</button>`).join('');
  $('#slots').innerHTML = '<span class="sub">串出上面個詞</span>';
  speak(w.en);
}
function speedTap(btn,c){
  if(!game) return;
  if(game.cur.length>=game.word.length) return;
  game.cur+=c; btn.classList.add('used'); btn.dataset.sl=game.cur.length;
  $('#slots').innerHTML = game.cur.split('').map(ch=>`<span class="slotchar">${ch}</span>`).join('');
  if(game.cur.length===game.word.length){
    if(game.cur===game.word){ game.score+=5; $('#g-score').textContent=game.score; setTimeout(()=>speedNext(),250); }
    else { game.cur=''; document.querySelectorAll('#tiles .tile').forEach(t=>{t.classList.remove('used');delete t.dataset.sl;});
      const s=$('#slots'); s.innerHTML='<span class="sub" style="color:var(--bad)">再試一次!</span>'; }
  }
}
function speedBack(){
  if(!game||!game.cur) return;
  const n=game.cur.length; game.cur=game.cur.slice(0,-1);
  const t=document.querySelector(`#tiles .tile.used[data-sl="${n}"]`);
  if(t){ t.classList.remove('used'); delete t.dataset.sl; }
  $('#slots').innerHTML = game.cur? game.cur.split('').map(ch=>`<span class="slotchar">${ch}</span>`).join(''):'<span class="sub">串出上面個詞</span>';
}
