複數；議論文及建議類寫作萬用短語，慎防誤寫 *broaden your horizon","ex":"Broadening your horizons through art and travel can increase your quality of life."},{"phrase":"come to one's mind","zh":"浮現腦海；想到","type":"日常表達","sent":"Tell me what activities come to your mind in the comments section.","note":"主語是「想到的事物」而非人：The idea came to my mind，勿寫 *I came to my mind","ex":"The first activity that comes to my mind when I think of ways to relax is swimming."},{"phrase":"mix and match","zh":"混搭","type":"口語短語","sent":"Well, what you can do is mix and match outfits you already have.","note":"指把現有衣物自由配搭；聆聽（消費、時裝話題）高頻表達，亦可用於其他配搭情境","ex":"If you mix and match outfits you already have, you can create new looks without spending extra money."},{"phrase":"on cloud nine","zh":"樂上雲霄；興高采烈","type":"日常表達","sent":"I was on cloud nine when my sister started secondary school, because I thought that would mean she'd be given more responsibilities.","note":"Word Power 感受類慣用語；be on cloud nine = 極度開心；同組尚有 down in the dumps（情緒低落）等","ex":"She was on cloud nine after winning first prize in the singing contest."}]},{"key":"2B_U6","form":"F2","book":"2B","num":6,"theme":"Own your style","theme_zh":"活出個人風格","words":[{"en":"fashionista","pos":"n.","zh":"潮流達人；時尚愛好者","cat":"核心詞彙","src":"詞彙練習","sent":"In truth, there is only one fashion forecast any budding fashionista needs: The next big trend is you.","exam":"選詞填空常見答案；單元評估對話填空亦有出現，屬本單元主題核心詞","err":"-ista 為外來後綴，指「狂熱愛好者」；港生易誤串成 fashionist；複數為 fashionistas","coll":"a budding fashionista; adventurous fashionistas","ex1":"My cousin is a real fashionista who follows every new trend.","ex2":"Flip-flops are a go-to choice for some fashionistas because of their casual vibe."},{"en":"apparel","pos":"n.","zh":"服裝；衣著","cat":"核心詞彙","src":"詞彙練習","sent":"And believe it or not, some apparel brands are already catching drift of this wisdom.","exam":"選詞填空常見答案；單元評估對話填空原詞；同義詞配對：apparel ≈ clothing","err":"apparel 不可數，勿寫 an apparel / apparels；比 clothes 正式，多用於商業語境如 sports apparel","coll":"apparel brands; sports apparel; children's apparel","ex1":"This shop sells sports apparel for teenagers.","ex2":"Many apparel brands now let customers order customised garments online."},{"en":"garment","pos":"n.","zh":"（一件）衣服","cat":"考試重點詞","src":"詞彙練習","sent":"Big brands have noticed that more and more customers want to buy customised garments.","exam":"單元評估閱讀篇章高頻詞（This traditional Japanese garment...）；選詞填空常考","err":"garment 可數，指「一件衣物」，正式用語；港生易與 apparel（不可數統稱）混用","coll":"a traditional garment; customised garments; the garment industry","ex1":"The kimono is a traditional Japanese garment with vibrant colours.","ex2":"Each garment in the shop is handmade by local designers."},{"en":"eyewear","pos":"n.","zh":"眼鏡類製品","cat":"核心詞彙","src":"詞彙練習","sent":"This goes for eyewear too, as there is an increasing demand for tailor-made glasses and shades with customised frames.","exam":"選詞填空常見答案；Text 1 主題詞（眼鏡作為時尚配飾）","err":"eyewear 不可數，統稱眼鏡產品；「一副眼鏡」是 a pair of glasses，勿寫 an eyewear","coll":"statement eyewear; eyewear trends; minimalist eyewear","ex1":"The brand is famous for its bold and colourful eyewear.","ex2":"Just like clothing and accessories, eyewear trends come and go."},{"en":"frame","pos":"n.","zh":"鏡框","cat":"日常實用","src":"詞彙練習","sent":"This goes for eyewear too, as there is an increasing demand for tailor-made glasses and shades with customised frames.","exam":"選詞填空常見答案；閱讀理解須按上下文判斷是「鏡框」還是「相框、框架」","err":"一副眼鏡有兩個鏡框位，常用複數 frames；勿與 flame（火焰）混淆，串法相近","coll":"customised frames; cat-eye frames; oversized frames","ex1":"She chose round frames for her new glasses.","ex2":"Out-there and of-the-moment frames can make your whole outfit look bold."},{"en":"accessory","pos":"n.","zh":"配飾","cat":"高頻基礎詞","src":"詞彙練習","sent":"Ignore the naysayers who called your butterfly clip hair accessory childish.","exam":"主題詞彙；單元評估引句填空原詞（hair accessories）；串字為聽寫常考","err":"串字難點：雙 c 單 s（accessory）；複數 accessories；hair accessory 指髮飾","coll":"hair accessories; fashion accessories; match accessories with outfits","ex1":"A scarf is a useful accessory in winter.","ex2":"Glasses can be striking fashion accessories because they come in many styles and colours."},{"en":"outfit","pos":"n.","zh":"（一套）服裝","cat":"高頻基礎詞","src":"詞彙練習","sent":"People want their outfits to be one-of-a-kind.","exam":"全單元高頻詞；聆聽及寫作（時裝話題）必識；Write more 例句多次出現","err":"outfit 指「整套衣着」，可數；勿與 uniform（制服）混淆；「一套衫」不是 a suit of clothes","coll":"a stylish outfit; mix and match outfits; choose an outfit","ex1":"She wore a new outfit to the party.","ex2":"You have a knack for creating fashionable outfits on a budget."},{"en":"wardrobe","pos":"n.","zh":"衣櫥；（某人的）全部衣服","cat":"核心詞彙","src":"Text 2","sent":"A wardrobe loan request from Z-Styles Mag","exam":"Text 2 標題關鍵詞；閱讀理解主旨題常涉及；聆聽（時裝話題）常見","err":"除「衣櫃」外亦指「一個人所有的衣服」，如 update one's wardrobe；串字注意 ward-robe","coll":"a wardrobe loan; update one's wardrobe; a capsule wardrobe","ex1":"I need to tidy up my wardrobe this weekend.","ex2":"The magazine sent a wardrobe loan request to borrow the winning fashion items."},{"en":"catwalk","pos":"n.","zh":"時裝天橋","cat":"核心詞彙","src":"詞彙練習","sent":"The world is your catwalk show, darling, and you shouldn't be afraid to strut your stuff, whether that's in an old pair of distressed jeans or a finely tailored suit.","exam":"選詞填空常見答案（catwalk show）；單元評估對話填空原詞","err":"catwalk 是時裝表演的「天橋」，與貓無關，勿按字面直譯；catwalk show = 時裝騷","coll":"a catwalk show; a catwalk model; on the catwalk","ex1":"The models walked down the catwalk in colourful dresses.","ex2":"That catwalk model is dressed in denim from head to toe."},{"en":"trend","pos":"n.","zh":"潮流；趨勢","cat":"高頻基礎詞","src":"詞彙練習","sent":"The big secret we don't usually tell you is that, despite advances in AI predictive technology, we don't really know what the next must-have fashion item will be. Fashion changes much too quickly to be predictable.","exam":"全單元核心詞；fashion trends、the latest trends 為閱讀理解及寫作高頻搭配","err":"「跟上潮流」是 follow / keep up with trends，勿寫 *chase the trend 直譯「追潮流」時注意搭配；trendy 是形容詞","coll":"fashion trends; the latest trends; follow a trend; trends come and go","ex1":"Wide leg trousers are a popular trend among teens.","ex2":"The special feature sheds light on the factors influencing the latest trends."},{"en":"trendy","pos":"adj.","zh":"時髦的；流行的","cat":"口語常用","src":"綜合聆聽","sent":"Obviously, if you're too keen on looking stylish and fashionable all the time, you're going to get yourself lots of trendy items without thinking too much.","exam":"聆聽（潮流話題）高頻；詞形轉換：trend（n.）→ trendy（adj.）","err":"比較級 trendier、最高級 trendiest（y 變 i）；口語色彩較重，正式寫作可用 fashionable","coll":"trendy items; trendy clothes; look trendy","ex1":"This café is very trendy among young people.","ex2":"Buying too many trendy items can easily lead to impulse buying."},{"en":"suit","pos":"n.","zh":"西裝","cat":"高頻基礎詞","src":"詞彙練習","sent":"The world is your catwalk show, darling, and you shouldn't be afraid to strut your stuff, whether that's in an old pair of distressed jeans or a finely tailored suit.","exam":"選詞填空常見答案；閱讀理解原文 Put on a suit and a tie 帶出衣着影響形象的主旨","err":"suit 亦可作動詞解「適合」（suit your needs），閱讀時須按詞性判斷；「一套西裝」是 a suit，不是 a suit of clothes","coll":"a finely tailored suit; put on a suit and a tie; a business suit","ex1":"Dad wears a suit and a tie to work every day.","ex2":"Put on a suit and a tie, and you'll feel and act like a serious businessperson."},{"en":"make-up","pos":"n.","zh":"化妝品；化妝","cat":"日常實用","src":"詞彙練習","sent":"In an effort to stand out, make-up lovers have also been developing bolder looks.","exam":"選詞填空常見答案；主題詞彙（時尚打扮）","err":"make-up 不可數，勿寫 make-ups；「化妝」是 put on / wear make-up，勿寫 *draw make-up","coll":"put on make-up; wear make-up; make-up lovers","ex1":"She never wears make-up to school.","ex2":"Some make-up lovers use body glitter and rhinestones to stand out."},{"en":"must-have","pos":"adj./n.","zh":"必備的；必備品","cat":"口語常用","src":"詞彙練習","sent":"The big secret we don't usually tell you is that, despite advances in AI predictive technology, we don't really know what the next must-have fashion item will be.","exam":"選詞填空常見答案；廣告及雜誌文體常用詞，閱讀理解語氣題可涉及","err":"由情態動詞構成的複合詞，作形容詞用時放名詞前（a must-have item）；亦可直接作名詞（a must-have）","coll":"a must-have fashion item; this season's must-haves","ex1":"A good pair of trainers is a must-have for every student.","ex2":"Magazines love telling readers what the next must-have item will be."},{"en":"sophisticated","pos":"adj.","zh":"精緻高雅的；精密的","cat":"考試重點詞","src":"詞彙練習","sent":"If you join the spread, we will put you in extremely colourful but sophisticated high fashion looks designed by Esther Mo.","exam":"選詞填空常見答案；單元評估對話填空原詞；聆聽對話中形容功能精密（quite sophisticated indeed）","err":"形容人指「見多識廣、有品味」，形容機器指「精密」，一詞多義；串字長，注意 -phis-","coll":"a sophisticated look; sophisticated high fashion; a sophisticated drawing function","ex1":"I like to combine a sophisticated pair of shades with some more playful earrings.","ex2":"The drawing function of Foto Lab is quite sophisticated indeed."},{"en":"unpretentious","pos":"adj.","zh":"不造作的；樸實的","cat":"核心詞彙","src":"詞彙練習","sent":"Like you, Style Spy loves using elements of casualness to make high fashion looks seem unpretentious.","exam":"選詞填空常見答案；構詞法：否定前綴 un- + pretentious（造作的）為詞形轉換考點","err":"褒義詞，指「不扮嘢、自然」；港生易只記 pretend（假裝）而猜錯詞義；串字長需分段記 un-pre-ten-tious","coll":"an unpretentious style; humble and unpretentious","ex1":"I like her unpretentious style of dressing.","ex2":"It's best to choose minimalist eyewear and accessories if you want to keep your look unpretentious."},{"en":"laid-back","pos":"adj.","zh":"悠閒隨意的","cat":"口語常用","src":"Text 1","sent":"Nothing signals a laid-back, low-stress vibe like a straw hat and flip-flops.","exam":"同義詞配對：laid-back ≈ relaxed / easy-going；閱讀理解語氣題常見","err":"固定寫法 laid-back（過去分詞 laid + back），勿寫 *lay-back / *laid back（作定語時要有連字號）","coll":"a laid-back vibe; a laid-back attitude; laid-back clothing","ex1":"My uncle has a very laid-back attitude to life.","ex2":"Businesspeople may wish they could wear something more laid-back to work."},{"en":"carefree","pos":"adj.","zh":"無憂無慮的；不受拘束的","cat":"考試重點詞","src":"詞彙練習","sent":"Our winter issue will be about colour because we want our readers to be more carefree about the colours they choose to wear.","exam":"選詞填空常見答案；單元評估對話填空原詞；構詞法：care + free（無…的）","err":"carefree（無憂無慮）與 careless（粗心大意）意思完全不同，港生極易混淆","coll":"a carefree attitude; feel carefree; carefree about sth","ex1":"The children spent a carefree afternoon at the beach.","ex2":"Be more carefree about the colours you choose to wear."},{"en":"effortlessly","pos":"adv.","zh":"毫不費力地","cat":"考試重點詞","src":"詞彙練習","sent":"We love that your style is effortlessly cool and think you would be a good example for our target audience.","exam":"詞形轉換必考：effort（n.）→ effortless（adj.）→ effortlessly（adv.）；選詞填空常見","err":"effortlessly cool 中副詞修飾形容詞；港生易誤用形容詞 *effortless cool；-less + -ly 雙後綴串法易漏","coll":"effortlessly cool; walk effortlessly; effortlessly stylish","ex1":"She plays the piano effortlessly.","ex2":"The outfit requires a carefree vibe, where you walk down the runway effortlessly."},{"en":"statement","pos":"adj./n.","zh":"搶眼的（單品）；宣示","cat":"核心詞彙","src":"詞彙練習","sent":"If you were to take part, we would also gift you one of Esther's statement eyewear pieces as a thank you.","exam":"選詞填空常見答案；單元評估對話填空原詞；時尚語境中 statement 解「搶眼單品」為閱讀理解考點","err":"statement glasses / statement pieces 指「非常搶眼的單品」，並非「聲明」；make a statement 亦有「彰顯個性」之意","coll":"statement glasses; a statement piece; make a fashion statement","ex1":"Her bright red coat is a real statement piece.","ex2":"Oversized statement glasses are not just for the most adventurous fashionistas anymore."},{"en":"oversized","pos":"adj.","zh":"特大的；寬鬆的","cat":"核心詞彙","src":"Text 1","sent":"Oversized statement glasses are not just for the most adventurous fashionistas anymore.","exam":"主題詞彙（潮流服飾）；構詞法：over-（過度）+ sized 為詞形轉換考點","err":"oversized 已含「過大」之意，勿再加 too / very big；oversized clothing 是潮流寬鬆風格，非「着錯碼」","coll":"oversized clothing; oversized tops; oversized frames","ex1":"Oversized hoodies are very popular among teenagers.","ex2":"The new clothing brand earned a lot thanks to the popularity of its oversized tops, hoodies and loungewear."},{"en":"attitude","pos":"n.","zh":"態度","cat":"高頻基礎詞","src":"詞彙練習","sent":"Your attitude to fashion matches that of our magazine.","exam":"選詞填空常見答案；單元評估對話填空原詞；attitude to/towards sth 搭配常考","err":"介詞用 to 或 towards（attitude to fashion）；港生易受中文影響寫 *attitude of fashion","coll":"attitude to/towards sth; a positive attitude; a work attitude","ex1":"A positive attitude helps you learn better.","ex2":"Casual footwear promotes a low-stress, no-drama work attitude."},{"en":"influence","pos":"v./n.","zh":"影響","cat":"考試重點詞","src":"詞彙練習","sent":"We think you could influence our readers to take more risks with colour.","exam":"選詞填空及單元評估引句填空原詞；詞形轉換：influence → influential（adj.）／influencer（n.）","err":"作動詞直接接賓語（influence sb），勿寫 *influence to sb；作名詞搭配 have an influence on sth","coll":"influence sb to do sth; have an influence on sth; the factors influencing trends","ex1":"The weather can influence our mood.","ex2":"The feature sheds light on the factors influencing the latest fashion trends."},{"en":"chic","pos":"adj.","zh":"時髦優雅的","cat":"核心詞彙","src":"詞彙練習","sent":"It's a very chic shawl from a posh little boutique I chanced by.","exam":"Word Power 外來詞（源自法語）；選詞填空常見答案","err":"讀音 /ʃiːk/（似 sheek），港生極易誤讀成 chick；是形容詞，勿當名詞用","coll":"a chic dress; look chic; effortlessly chic","ex1":"She always looks chic in simple black outfits.","ex2":"The word 'chic' is a loanword that originated from French."},{"en":"boutique","pos":"n.","zh":"精品店；時裝小店","cat":"日常實用","src":"詞彙練習","sent":"It's a very chic shawl from a posh little boutique I chanced by.","exam":"Word Power 外來詞（源自法語）；選詞填空常見答案","err":"讀音 /buːˈtiːk/，重音在後；-que 結尾串法特別，港生易串成 boutic / botique","coll":"a fashion boutique; a posh boutique; a boutique hotel","ex1":"There are many small boutiques in Causeway Bay.","ex2":"She bought a gift for her mum from a posh little boutique in Paris."},{"en":"avant-garde","pos":"adj.","zh":"前衛的","cat":"核心詞彙","src":"詞彙練習","sent":"I also loved Oscar Fraser Li's avant-garde menswear line. The silhouettes and shapes he created were really original and futuristic.","exam":"Word Power 外來詞（源自法語）；選詞填空常見答案；同義概念：original / futuristic","err":"連字號不可漏（avant-garde）；讀音 /ˌævɒ̃ˈɡɑːd/ 按法語習慣，t 不發音","coll":"an avant-garde design; avant-garde fashion; an avant-garde artist","ex1":"The designer is famous for her avant-garde wedding dresses.","ex2":"His avant-garde menswear line looked really original and futuristic."},{"en":"aficionado","pos":"n.","zh":"狂熱愛好者","cat":"考試重點詞","src":"詞彙練習","sent":"I'm not sure that one will catch on but some of the other fashion aficionados in the audience seemed to be digging it.","exam":"Word Power 外來詞（源自西班牙語）；選詞填空常見答案；同義詞配對：aficionado ≈ fan / enthusiast","err":"串字難：a-fi-cio-na-do；複數 aficionados；後接範疇用 of 或直接前置名詞（fashion aficionados）","coll":"fashion aficionados; a football aficionado","ex1":"My brother is a sneaker aficionado with over fifty pairs.","ex2":"The fashion aficionados in the audience loved the new collection."},{"en":"paparazzi","pos":"n.","zh":"狗仔隊","cat":"日常實用","src":"詞彙練習","sent":"There were so many big-named designers there that much of the entrance was blocked by paparazzi.","exam":"Word Power 外來詞（源自意大利語）；選詞填空常見答案","err":"paparazzi 是複數（單數 paparazzo），作主語時動詞用複數；串字注意雙 z","coll":"be followed by paparazzi; paparazzi photos","ex1":"The singer was surrounded by paparazzi at the airport.","ex2":"Much of the entrance to the fashion show was blocked by paparazzi."},{"en":"pyjamas","pos":"n.","zh":"睡衣","cat":"高頻基礎詞","src":"詞彙練習","sent":"The oddest runway trend I noticed was 'casual sleepwear' - pyjamas designed to be worn in public.","exam":"Word Power 外來詞；選詞填空常見答案；聆聽（日常生活）基礎詞","err":"恆用複數 pyjamas；「一套睡衣」是 a pair of pyjamas；英式串法 pyjamas，美式 pajamas","coll":"a pair of pyjamas; wear pyjamas; be in one's pyjamas","ex1":"I change into my pyjamas after dinner.","ex2":"Pyjamas designed to be worn in public were the oddest runway trend that year."},{"en":"request","pos":"n./v.","zh":"請求；要求","cat":"考試重點詞","src":"Text 2","sent":"I am writing on behalf of Z-Styles Mag, an online teen lifestyle magazine, to request the loan of the winning fashion items from this year's Teen Designer of the Year Awards.","exam":"本單元文體（請求信 letter of request）核心詞；寫作必用句式 I am writing to request...","err":"作動詞直接接賓語（request sth），勿寫 *request for sth；作名詞才用 a request for sth；request that 後可接原形動詞","coll":"a letter of request; request the loan of sth; make a request","ex1":"The teacher agreed to our request for more time.","ex2":"Mr Chan requested that the documents be printed out promptly."},{"en":"loan","pos":"n./v.","zh":"借出；貸款","cat":"考試重點詞","src":"Text 2","sent":"I am writing on behalf of Z-Styles Mag, an online teen lifestyle magazine, to request the loan of the winning fashion items from this year's Teen Designer of the Year Awards.","exam":"Text 2 主題詞（a wardrobe loan request）；閱讀理解主旨題考點；搭配 on loan 為 Write more 重點","err":"loan 由物主「借出」，borrow 是「借入」，lend 是動詞「借出」，三者方向港生極易混淆","coll":"request the loan of sth; on loan; take out a loan","ex1":"The library offers a two-week loan for most books.","ex2":"The magazine requested the loan of the winning fashion items for a photo shoot."},{"en":"establish","pos":"v.","zh":"創立；建立","cat":"考試重點詞","src":"Text 2","sent":"Z-Styles Mag was established five years ago and has over 20 000 monthly subscribers, with an average of over 300 000 unique visitors each month.","exam":"課文詞彙填空原題：The photography society was established in 1985...；常以被動式 be established 出現","err":"指機構「成立」多用被動式 was established in + 年份；勿與 build（建造實物）混用；詞形轉換：establishment（n.）","coll":"be established in (year); establish a company; establish a good relationship","ex1":"Our school was established over fifty years ago.","ex2":"The photography society was established in 1985 by a group of photography fanatics in our school."},{"en":"average","pos":"n./adj.","zh":"平均數；平均的；普通的","cat":"考試重點詞","src":"Text 2","sent":"Z-Styles Mag was established five years ago and has over 20 000 monthly subscribers, with an average of over 300 000 unique visitors each month.","exam":"課文詞彙填空原題：Our class scored an average of 75 marks in the Biology exam；聆聽數據題常見","err":"an average of + 數字；on average（平均而言）介詞用 on；作形容詞另解「普普通通」（an average photo-editing app）","coll":"an average of; on average; above/below average","ex1":"Our class scored an average of 75 marks in the Biology exam.","ex2":"The magazine attracts an average of over 300 000 unique visitors each month."},{"en":"currently","pos":"adv.","zh":"現時；目前","cat":"考試重點詞","src":"Text 2","sent":"As all the winning pieces are owned and currently stored by your organization, we would be grateful if you could let our Head Stylist, Ceci Lin, borrow all the items for a photo shoot on 27 February.","exam":"課文詞彙填空原題：We used to have 35 students in our class, but currently we only have 25 students；與現在時態連用為文法考點","err":"currently（現時）與 recently（最近，多配過去式／完成式）時態搭配不同；勿與 current（n. 水流／adj. 現時的）詞性混淆","coll":"be currently stored; currently available; currently under way","ex1":"The shop is currently closed for renovation.","ex2":"We used to have 35 students in our class, but currently we only have 25 students."},{"en":"promptly","pos":"adv.","zh":"迅速地；準時地","cat":"考試重點詞","src":"Text 2","sent":"Ceci and her styling team would return them promptly on 28 February.","exam":"課文詞彙填空原題：Mr Chan requested that the documents be printed out promptly...；同義詞配對：promptly ≈ quickly / immediately","err":"詞形轉換：prompt（adj.）→ promptly（adv.）；prompt 亦可作動詞解「促使」，閱讀須按上下文判斷","coll":"return sth promptly; reply promptly; arrive promptly at 9 am","ex1":"Please return the library books promptly.","ex2":"She promptly reminded me that I've already got a similar skirt at home."},{"en":"additional","pos":"adj.","zh":"額外的；附加的","cat":"考試重點詞","src":"Text 2","sent":"Should you need any additional information, please do not hesitate to contact me via email at frankie_ho@zstylemag.com.","exam":"課文詞彙填空原題：We need to send additional copies of our documents...；正式書信結尾句必用詞","err":"詞形轉換：add（v.）→ addition（n.）→ additional（adj.）；in addition（此外）是另一常考短語，勿混用詞性","coll":"additional information; additional copies; at no additional cost","ex1":"You have to pay for any additional luggage.","ex2":"Should you need any additional information, please do not hesitate to contact me."},{"en":"subscriber","pos":"n.","zh":"訂閱者","cat":"核心詞彙","src":"Text 2","sent":"Z-Styles Mag was established five years ago and has over 20 000 monthly subscribers, with an average of over 300 000 unique visitors each month.","exam":"閱讀理解數據題原詞（more than 20 000 monthly subscribers）；詞形轉換：subscribe（v.）→ subscriber（人）→ subscription（n.）","err":"subscribe 後接 to（subscribe to a magazine/channel）；-er 指人、-tion 指行為，詞形轉換易錯","coll":"monthly subscribers; gain subscribers; subscribers to a magazine","ex1":"The video channel has two million subscribers.","ex2":"Z-Styles Mag has over 20 000 monthly subscribers."},{"en":"exposure","pos":"n.","zh":"曝光；接觸","cat":"核心詞彙","src":"Text 2","sent":"The purpose is to shed light on the factors influencing the latest trends, as well as to give exposure to the fantastic work of up-and-coming young local designers.","exam":"閱讀理解原題（why is Z-Styles Mag doing this special feature）答案關鍵詞；詞形轉換：expose（v.）→ exposure（n.）","err":"give exposure to sth = 令…獲得曝光；exposure to sth 亦解「接觸／暴露於」，介詞均用 to；不可數","coll":"give exposure to sth; media exposure; exposure to sunlight","ex1":"The interview gave the young singer a lot of exposure.","ex2":"The feature gives exposure to the fantastic work of young local designers."},{"en":"up-and-coming","pos":"adj.","zh":"新晉的；前途無量的","cat":"考試重點詞","src":"Text 2","sent":"The purpose is to shed light on the factors influencing the latest trends, as well as to give exposure to the fantastic work of up-and-coming young local designers.","exam":"閱讀理解原文關鍵詞；同義詞配對：up-and-coming ≈ promising / rising","err":"三字複合形容詞須有兩個連字號；只作定語放名詞前（up-and-coming designers），不作表語","coll":"up-and-coming designers; an up-and-coming singer","ex1":"The concert features several up-and-coming local bands.","ex2":"The magazine wants to support up-and-coming young designers."},{"en":"permission","pos":"n.","zh":"許可；准許","cat":"高頻基礎詞","src":"Text 2","sent":"Regarding the specifics of the feature, we have already obtained permission from the awardees to show off their work and to set up interviews with them.","exam":"與本單元文法（asking for permission）緊扣；寫作句式 I am writing to request your permission to... 必背","err":"permission 不可數，勿寫 a permission；搭配 obtain/ask for permission to do sth；動詞是 permit","coll":"obtain permission from sb; ask for permission; without permission","ex1":"You must ask for permission before using the hall.","ex2":"I am writing to request your permission to participate in the field trip."},{"en":"grateful","pos":"adj.","zh":"感激的","cat":"高頻基礎詞","src":"Text 2","sent":"As all the winning pieces are owned and currently stored by your organization, we would be grateful if you could let our Head Stylist, Ceci Lin, borrow all the items for a photo shoot on 27 February.","exam":"請求信必用句式 We would be grateful if you could...；文法練習原句：We would be grateful if you could tell us who the organisers are","err":"be grateful to sb for sth 介詞搭配易錯；would be grateful if 後接 could/would（過去式）示客氣，勿用 can","coll":"be grateful to sb for sth; would be grateful if you could...","ex1":"I am grateful to my teacher for her help.","ex2":"We would be most grateful if you could attend the event."},{"en":"heritage","pos":"n.","zh":"（文化）遺產；傳統","cat":"考試重點詞","src":"單元評估","sent":"Clothing is not just a means to protect our bodies; it also serves as a reflection of our cultural heritage, beliefs and customs.","exam":"單元評估閱讀篇章主題詞（Diverse Threads）；cultural heritage 為跨單元高頻搭配","err":"heritage 不可數；cultural heritage（文化遺產）與 inheritance（繼承的財產）意思不同，勿混用","coll":"cultural heritage; celebrate one's heritage; a heritage site","ex1":"The old temple is part of our cultural heritage.","ex2":"I wear the shuka as a symbol of my Maasai heritage."},{"en":"embark","pos":"v.","zh":"展開；開始（旅程）","cat":"考試重點詞","src":"單元評估","sent":"Let's embark on a fashion journey and explore some fascinating clothing traditions from different cultures that are bound to impress you.","exam":"單元評估原題：Find a word in paragraph 1 that has a similar meaning to 'begin'（答案 embark）","err":"固定搭配 embark on/upon sth，介詞不可漏（*embark a journey 錯）；本義為「上船」，引伸作「開始」","coll":"embark on a journey; embark on a new career","ex1":"She will embark on a new adventure after graduation.","ex2":"Let's embark on a fashion journey around the world."},{"en":"intricate","pos":"adj.","zh":"繁複精細的","cat":"考試重點詞","src":"單元評估","sent":"Each region of India has its own distinct style that showcases intricate details such as embroidery, beading and hand-block printing.","exam":"單元評估原題：Find a word in paragraph 5 that has an OPPOSITE meaning to 'simple'（答案 intricate）","err":"同義詞配對常設 complicated / elaborate 為近義；勿與 intimate（親密的）串法混淆","coll":"intricate details; intricate patterns; intricate draping techniques","ex1":"The bride's dress was covered in intricate embroidery.","ex2":"The kimono boasts vibrant colours, delicate floral motifs and intricate draping techniques."},{"en":"elegant","pos":"adj.","zh":"優雅的","cat":"高頻基礎詞","src":"單元評估","sent":"From the bride's elegant 'uchikake' to the casual 'yukata', let the kimono's captivating beauty transport you to the mysterious world of Geishas and Samurai.","exam":"單元評估閱讀篇章高頻詞；詞形轉換：elegant（adj.）→ elegance（n.）→ elegantly（adv.）","err":"串字注意 -gant 結尾（勿寫 elegent）；形容人、衣着、動作皆可","coll":"an elegant dress; charming and elegant; a timeless symbol of elegance","ex1":"She looked elegant in her long black dress.","ex2":"The sari is a timeless symbol of elegance and beauty."},{"en":"occasion","pos":"n.","zh":"場合；時刻","cat":"高頻基礎詞","src":"單元評估","sent":"Displayed during special occasions, kente is a visual feast that celebrates the country's cultural pride.","exam":"單元評估閱讀原文高頻詞（formal/festive occasions）；選詞填空常見","err":"串字難點：雙 c 單 s（occasion）；formal occasions（正式場合）與 casual（便服）相對，閱讀理解對比題常考","coll":"special occasions; formal occasions; on this occasion","ex1":"A cheongsam is perfect for formal occasions.","ex2":"The uchikake is worn during formal occasions such as weddings."},{"en":"filter","pos":"n.","zh":"濾鏡","cat":"日常實用","src":"聽力對話","sent":"Its filters are great but it doesn't have many basic features that you expect a photo app to have.","exam":"聆聽填空高頻（相片編輯應用程式調查）：one hundred and twenty filters 為原題答案","err":"數碼語境指「濾鏡」，本義是「過濾器」；retro filters（復古濾鏡）為聆聽原文搭配","coll":"photo filters; retro filters; apply a filter","ex1":"She always adds a filter before posting her photos.","ex2":"Foto Lab has as many as one hundred and twenty filters to choose from."},{"en":"convert","pos":"v.","zh":"轉換；轉變","cat":"考試重點詞","src":"聽力對話","sent":"You can also convert the photo you've taken to different file types to suit your needs.","exam":"聆聽填空原題（conversion to different file types）；詞形轉換：convert（v.）→ conversion（n.）","err":"convert A to/into B 介詞搭配易漏；勿與 conversation（交談）串法混淆","coll":"convert sth to/into sth; convert files; conversion to different file types","ex1":"You can convert this file into a PDF.","ex2":"The app lets artists convert their photos to different file types."},{"en":"impulse","pos":"n.","zh":"衝動","cat":"口語常用","src":"綜合聆聽","sent":"Having a friend with you is important because they can remind you not to buy things on impulse.","exam":"綜合聆聽筆記原題關鍵詞（impulse buying 衝動購物）；寫作（勸告電郵）主題詞","err":"on impulse（一時衝動）介詞用 on；impulse buying 為固定搭配，勿寫 *impulsive buy","coll":"impulse buying; buy things on impulse; resist an impulse","ex1":"I bought this cap on impulse and never wear it.","ex2":"Setting a waiting period can help you stop impulse buying."},{"en":"obsession","pos":"n.","zh":"沉迷；着迷","cat":"核心詞彙","src":"綜合聆聽","sent":"Today's topic is trend obsession, which has been brought up a lot in the comments section of many of our previous podcasts.","exam":"綜合聆聽主題詞（trend obsession 沉迷潮流）；詞形轉換：obsess（v.）→ obsession（n.）→ obsessed（adj.）","err":"be obsessed with sth（沉迷於…）介詞用 with；an obsession with sth 同樣用 with，港生易誤用 in/on","coll":"trend obsession; an obsession with sth; be obsessed with sth","ex1":"His obsession with video games worries his parents.","ex2":"An obsession with trends usually goes hand in hand with an obsession with posting selfies."}],"phrases":[{"phrase":"a knack for (sth)","zh":"有…的天分／竅門","type":"課文短語","sent":"A knack for choosing outfits - based on how you want to feel and who you aspire to be - can come in handy.","note":"have a knack for + 名詞／動名詞，比 talent 更口語；Write more 重點表達，指做某事特別在行","ex":"You have a knack for creating fashionable outfits on a budget."},{"phrase":"at the end of the day","zh":"說到底；歸根究柢","type":"口語短語","sent":"At the end of the day, the choice of what you wear and what kind of person you want to be is yours.","note":"並非指「一天結束時」，而是總結時說「說到底」；多置句首，議論文結尾與口語皆常用，同義於 all things considered","ex":"At the end of the day, fashion, like beauty, is in the eye of the beholder."},{"phrase":"come and go","zh":"來來去去；轉瞬即逝","type":"課文短語","sent":"Just like clothing and accessories, eyewear trends come and go.","note":"固定詞序 come and go 不可倒轉；形容潮流、人事變遷不長久，常與 trends、fads 連用","ex":"Fashion trends may come and go but classics last forever."},{"phrase":"come in handy","zh":"派得上用場","type":"日常表達","sent":"A knack for choosing outfits - based on how you want to feel and who you aspire to be - can come in handy.","note":"主語是「有用的東西」；handy 前必須用 in，勿寫 *come handy；口語及寫作皆常用","ex":"Your sewing machine will come in handy when we upcycle this tatty old frock into a stylish tote."},{"phrase":"from head to toe","zh":"從頭到腳；全身上下","type":"課文短語","sent":"Find your style from head to toe","note":"Text 1 標題用語；toe 用單數；形容全身打扮，如 dressed in denim from head to toe","ex":"At the awards ceremony, the glamorous movie star was wearing fake fur from head to toe."},{"phrase":"the sky is the limit","zh":"沒有極限；一切皆有可能","type":"口語短語","sent":"When it comes to shaping your identity through fashion, the sky is the limit.","note":"鼓勵語，指可能性無窮；常獨立成句或接 when it comes to sth；寫作結尾營造正面語氣","ex":"Don't let current trends decide what you should wear - the sky is the limit!"},{"phrase":"at one's convenience","zh":"在某人方便的時候","type":"寫作句式","sent":"Ceci and her styling team could pick up the items any time prior to the shoot at your convenience.","note":"正式書信用語，比 when you want 有禮；at your earliest convenience（請儘早）為請求信常用升級版","ex":"The jacket will be delivered to your home at your convenience."},{"phrase":"for your perusal","zh":"供閣下細閱","type":"寫作句式","sent":"We will send you a final proof of the piece for your perusal no later than 10 March.","note":"非常正式的書信用語，等於 for you to look over and check；電郵附件常用 attached for your perusal","ex":"The photographer sent the magazine editor some images from the photoshoot for her perusal."},{"phrase":"in one's care","zh":"由某人保管／照顧","type":"課文短語","sent":"Z-Styles Mag would take full responsibility for all the items while they are in our care.","note":"while sth is in one's care = 在保管期間；請求信中承諾妥善保管借用物品的關鍵句式","ex":"My sister left her favourite sunhat in my care while she went for a swim in the pool."},{"phrase":"no later than","zh":"不遲於","type":"寫作句式","sent":"We will send you a final proof of the piece for your perusal no later than 10 March.","note":"後接日期或時間，表明限期；正式書信及通告常用，等於 on or before；比較級 later 前的 no 不可改成 not","ex":"You must come in for a fitting no later than 2 pm if you want the outfit to be ready in time for tomorrow's fashion gala."},{"phrase":"on behalf of","zh":"代表（某機構／某人）","type":"寫作句式","sent":"I am writing on behalf of Z-Styles Mag, an online teen lifestyle magazine, to request the loan of the winning fashion items from this year's Teen Designer of the Year Awards.","note":"請求信開首必背句式 I am writing on behalf of + 機構；代表團體發言、致謝、道歉皆適用","ex":"After checking the zip was actually faulty, Robbie apologized to the customer on behalf of the store."},{"phrase":"on loan","zh":"借出中；暫借","type":"課文短語","sent":"A wardrobe loan request from Z-Styles Mag","note":"be on loan (to sb) = 正被借出；博物館展品、圖書館書籍常用；注意主語是被借出的物件","ex":"Claudia said that her grandma's jewellery was on loan to her cousin, who was getting married soon."},{"phrase":"shed light on sth","zh":"闡明；讓人了解","type":"寫作句式","sent":"The purpose is to shed light on the factors influencing the latest trends, as well as to give exposure to the fantastic work of up-and-coming young local designers.","note":"shed-shed-shed 不規則動詞；shed (more) light on + 議題，議論文及報告寫作加分短語","ex":"In this issue, the magazine sheds light on how our fashion choices affect the planet."},{"phrase":"apart from","zh":"除…之外","type":"課文短語","sent":"Retro Cam isn't that much different from an average photo-editing app apart from its retro filters.","note":"等於 aside from / except for；可解「除…外（不包括）」或「除…外（還有）」，須按上下文判斷","ex":"None of my family members are fashion-forward apart from my aunt."},{"phrase":"hit the brakes (on sth)","zh":"煞停；叫停","type":"口語短語","sent":"The model had to hit the brakes on her fashion career after her car accident.","note":"本義為踩煞車掣，引伸為突然停止某計劃或活動；注意串法 brakes（煞車掣），勿寫 breaks","ex":"The brand had to hit the brakes on production due to a fabric shortage."},{"phrase":"hit the shelves","zh":"上架發售","type":"課文短語","sent":"Fashionistas all over town were excited when the jacket finally hit the shelves.","note":"指產品「開始有得賣」，等於 become available for purchase；主語是產品；shelves 是 shelf 的複數","ex":"Many of my friends bought the designer raincoat as soon as it hit the shelves."},{"phrase":"in excess of","zh":"超過；多於","type":"寫作句式","sent":"The new clothing brand earned in excess of $5 million that year thanks to the popularity of its oversized tops, hoodies, and loungewear.","note":"正式用語，後接數字，等於 more than；in excess（過量地）單獨使用時解「過多」，如 buying clothing in excess","ex":"Buying clothing in excess is bad for the environment."},{"phrase":"in the long run","zh":"長遠來說","type":"寫作句式","sent":"Buying fast fashion items could be more expensive in the long run as the fabrics used are not the most durable.","note":"議論文萬用短語，與 in the short term 相對；固定搭配用 run，勿寫 *in the long term run","ex":"Slow fashion is the best choice in the long run because it is better for the environment."},{"phrase":"test the waters","zh":"試水溫；先作試探","type":"課文短語","sent":"The company decided to test the waters with a very small batch of limited edition graphic T-shirts.","note":"指正式行動前先小規模試探反應；waters 常用複數；商業及計劃語境常用","ex":"This fashion house had international ambitions but it wanted to test the waters in the region first."},{"phrase":"free of charge","zh":"免費","type":"日常表達","sent":"But again, users are generally impressed by the large number of seasonal stickers it offers. Better still, all of them are free of charge!","note":"等於 for free；聆聽（產品介紹）高頻信號語；charge 用單數，勿寫 *free of charges","ex":"Members can download all the filters free of charge."},{"phrase":"go hand in hand with","zh":"與…密不可分；相伴而生","type":"寫作句式","sent":"After all, an obsession with trends usually goes hand in hand with an obsession with posting selfies on social media.","note":"指兩件事常常同時出現、互相關連；hand in hand 中間不加 the；議論文分析成因常用","ex":"Impulse buying often goes hand in hand with stress and anxiety."},{"phrase":"take a step back","zh":"退一步（冷靜想想）","type":"口語短語","sent":"With online shopping getting more convenient these days, it's very easy to buy without thinking and get a bunch of items you don't actually need, so it's a good idea to take a step back and delay your purchases.","note":"比喻用法，指暫停一下、冷靜審視情況再作決定；勸告電郵及口語建議常用","ex":"Before buying a trendy item, take a step back and ask yourself if you really need it."}]},{"key":"2B_U7","form":"F2","book":"2B","num":7,"theme":"Tuning in","theme_zh":"緊貼時事","words":[{"en":"scam","pos":"n./v.","zh":"騙局；詐騙","cat":"核心詞彙","src":"Text 1","sent":"More and more people are falling victim to scams, so be vigilant and do not trust strangers promising riches in return for your help.","exam":"本單元主題詞；phone scam（電話騙案）、phishing scam（釣魚騙案）為選詞填空及單元評估原詞","err":"scam 是騙局本身，scammer 是騙徒；被動「被騙」是 get scammed；勿與 spam（垃圾郵件）混淆","coll":"phone scams; romance scams; fall for a scam; get scammed","ex1":"The police warned residents about a new phone scam.","ex2":"Don't get scammed - always verify the identity of the caller."},{"en":"scammer","pos":"n.","zh":"騙徒","cat":"核心詞彙","src":"Text 1","sent":"After getting the money, the scammer vanishes into thin air, never fulfilling their promise.","exam":"閱讀理解及寫作（防騙主題）高頻詞；詞形轉換：scam（n./v.）→ scammer（人）","err":"-er 後綴指人，雙 m 串法易漏；同類詞：swindler、fraudster、con artist 為同義詞配對常考","coll":"avoid falling prey to scammers; scammers target vulnerable people","ex1":"Scammers often pretend to be bank staff on the phone.","ex2":"Scammers often target young people because they tend to be naive and therefore easier to take advantage of."},{"en":"con artist","pos":"n.","zh":"老千；騙子","cat":"核心詞彙","src":"詞彙練習","sent":"Con artists often take advantage of vulnerable groups like children, teens and the elderly.","exam":"選詞填空常見答案；同義詞配對：con artist ≈ swindler / fraudster","err":"con 是 confidence 的縮略，與藝術無關，勿按字面直譯「藝術家」；兩字分開寫","coll":"a group of con artists; fall for a con artist's tricks","ex1":"The con artist tricked the old lady into handing over her savings.","ex2":"Mr Ting explained how the group of con artists vanished into thin air after taking his money."},{"en":"fraudster","pos":"n.","zh":"詐騙犯","cat":"核心詞彙","src":"詞彙練習","sent":"97% were aware of phone scams (e.g. calls from fraudsters claiming to be representatives of banks, hospitals, or other organisations of authority).","exam":"選詞填空及閱讀理解（罪案主題）常見；詞形轉換：fraud（n. 行為）→ fraudster（n. 人）","err":"fraud 指「詐騙行為」，fraudster 才是「人」；港生易把 fraud 當人用（*He is a fraudster 正確，*He did a fraudster 錯）","coll":"catch fraudsters; fraudsters claiming to be officials","ex1":"The fraudster pretended to be a police officer.","ex2":"This tried-and-tested strategy for catching fraudsters is taught to all new recruits."},{"en":"fraud","pos":"n.","zh":"欺詐；詐騙","cat":"核心詞彙","src":"Text 2","sent":"The FSC defines food fraud as 'any illicit action taken to deceive food consumers'.","exam":"Text 2 主題詞（food fraud 食品欺詐）；閱讀理解主旨題及定義題原詞","err":"指行為時不可數（commit fraud）；food fraud、financial fraud 為固定搭配；勿與 Freud（人名）讀音混淆","coll":"food fraud; financial fraud; commit fraud; fight fraud","ex1":"The shop owner was arrested for fraud.","ex2":"Educating the public on food fraud helps them stay on the alert."},{"en":"hacker","pos":"n.","zh":"黑客","cat":"核心詞彙","src":"Text 1","sent":"In other cases, clicking a malicious link can cause a computer to download a virus or other malware, such as ransomware that holds the computer's files hostage until the victim pays the hackers a ransom using cryptocurrency.","exam":"網絡安全主題詞；閱讀理解及寫作（網絡罪行）高頻","err":"動詞是 hack（入侵），被黑是 get hacked；港生常寫 *被 hacker 咗，應說 My account was hacked","coll":"pay the hackers a ransom; hackers steal information","ex1":"Hackers stole thousands of passwords from the website.","ex2":"Some unruly hackers have stolen sensitive information from big corporations and even the authorities, and demanded a huge ransom."},{"en":"cybercriminal","pos":"n.","zh":"網絡罪犯","cat":"核心詞彙","src":"詞彙練習","sent":"Cybercriminals who are being dishonest about their true motives and identities on dating apps do not care whether their victim is male or female.","exam":"單元評估選詞填空原詞；構詞法：cyber-（網絡）前綴，如 cybercrime、cyberbullying","err":"cybercrime 指罪行、cybercriminal 指人，勿混用；cyber- 前綴詞不加連字號","coll":"catch cybercriminals; cybercriminals hold files hostage","ex1":"Cybercriminals often send emails with malicious links.","ex2":"Sean tearfully explained to the investigators that the cybercriminals were holding his files hostage."},{"en":"phishing","pos":"n.","zh":"網絡釣魚（騙取個人資料）","cat":"核心詞彙","src":"詞彙練習","sent":"89% of students were aware of phishing scams (e.g. emails and text messages containing malicious links).","exam":"單元評估選詞填空原詞（phishing scam）；聆聽及閱讀（網絡安全）高頻","err":"串法是 phishing（ph-），與 fishing（釣魚）同音，故意仿照釣魚之意；phishing emails 為固定搭配","coll":"phishing scams; phishing emails; be on the alert for phishing","ex1":"Never type your password into a link from a phishing email.","ex2":"Students should be on the alert for phishing emails."},{"en":"malware","pos":"n.","zh":"惡意軟件","cat":"核心詞彙","src":"Text 1","sent":"In other cases, clicking a malicious link can cause a computer to download a virus or other malware, such as ransomware that holds the computer's files hostage until the victim pays the hackers a ransom using cryptocurrency.","exam":"單元評估選詞填空原詞；構詞法：mal-（壞）+ ware（軟件），與 malicious 同前綴","err":"malware 不可數，勿寫 a malware / malwares；下載動詞用 download，感染用 be infected with","coll":"download malware; malware and ransomware; remove malware","ex1":"His computer slowed down after it was infected with malware.","ex2":"Students reported low confidence in dealing with malware once it has been downloaded."},{"en":"ransomware","pos":"n.","zh":"勒索軟件","cat":"核心詞彙","src":"Text 1","sent":"In other cases, clicking a malicious link can cause a computer to download a virus or other malware, such as ransomware that holds the computer's files hostage until the victim pays the hackers a ransom using cryptocurrency.","exam":"選詞填空及單元評估原詞；與 hold sth hostage、ransom 同場出現為閱讀理解考點","err":"ransomware（軟件）與 ransom（贖金）勿混淆；不可數；構詞：ransom + ware","coll":"download ransomware; hold files hostage using ransomware","ex1":"Ransomware locked all the files on the school's computers.","ex2":"88% were unsure what to do if criminals are holding their files hostage using ransomware."},{"en":"ransom","pos":"n.","zh":"贖金","cat":"考試重點詞","src":"Text 1","sent":"Some unruly hackers have stolen sensitive information from big corporations and even the authorities, and demanded a huge ransom.","exam":"閱讀理解（罪案主題）關鍵詞；搭配 pay/demand a ransom 常考","err":"動詞搭配：demand a ransom（勒索）、pay a ransom（交贖金）；hold sb to ransom 為進階短語","coll":"pay a ransom; demand a ransom; a huge ransom","ex1":"The kidnappers demanded a ransom of one million dollars.","ex2":"The ransomware holds the computer's files hostage until the victim pays the hackers a ransom."},{"en":"malicious","pos":"adj.","zh":"惡意的","cat":"考試重點詞","src":"詞彙練習","sent":"This false sense of security and superiority might actually make them more vulnerable to malicious attacks.","exam":"同義詞配對原題：malicious ≈ harmful；malicious links/attacks 為單元高頻搭配","err":"串字注意 -cious 結尾；malicious link（惡意連結）勿寫 *bad link 失分；名詞是 malice","coll":"malicious links; malicious attacks; malicious software","ex1":"Do not click on any malicious links in emails.","ex2":"People should avoid clicking on malicious links in order to avoid accidentally downloading a virus or ransomware."},{"en":"vulnerable","pos":"adj.","zh":"易受傷害的；易受攻擊的","cat":"考試重點詞","src":"詞彙練習","sent":"Con artists often take advantage of vulnerable groups like children, teens and the elderly.","exam":"選詞填空常見答案；搭配 be vulnerable to sth 為填空考點；閱讀理解（受害者描述）高頻","err":"介詞用 to（vulnerable to attacks）；串字難點 vul-ner-able；勿與 valuable（有價值的）混淆","coll":"vulnerable groups; vulnerable elderly people; be vulnerable to sth","ex1":"Elderly people living alone are vulnerable to phone scams.","ex2":"This false sense of security might actually make readers more vulnerable to malicious attacks."},{"en":"manipulate","pos":"v.","zh":"操控；擺佈","cat":"考試重點詞","src":"詞彙練習","sent":"Con artists often target vulnerable elderly people because they are more easily manipulated into believing that their family members are kidnapped and sending them money.","exam":"選詞填空常見答案；搭配 manipulate sb into doing sth 為閱讀理解考點；詞形轉換：manipulation（n.）","err":"manipulate sb into + V-ing（操控某人去做…）介詞及動名詞易錯；串字注意 -pul-","coll":"manipulate sb into doing sth; manipulate sb's feelings","ex1":"The scammer manipulated her into sending money.","ex2":"90% said they believed criminals were more likely to manipulate them online than in person."},{"en":"deceive","pos":"v.","zh":"欺騙","cat":"考試重點詞","src":"Text 2","sent":"The FSC defines food fraud as 'any illicit action taken to deceive food consumers'.","exam":"單元評估選詞填空原詞（deceived）；詞形轉換：deceive（v.）→ deception（n.）→ deceptive（adj.）","err":"串字規則「i before e except after c」：deceive（ei）；港生常誤串 decieve；被動 be deceived by","coll":"deceive consumers; be deceived by fraudsters","ex1":"He was deceived into paying for a fake watch.","ex2":"To avoid being deceived by fraudsters attempting phone scams, always verify the identity of the caller."},{"en":"verify","pos":"v.","zh":"核實；查證","cat":"考試重點詞","src":"Text 1","sent":"To avoid being deceived by fraudsters attempting phone scams, always verify the identity of the caller.","exam":"選詞填空常見答案；防騙寫作必用詞；詞形轉換：verify → verification（n.）","err":"verify + 名詞（verify the identity），勿加介詞 *verify about；y 結尾變位：verifies / verified","coll":"verify the identity of sb; verify whether a crime has been committed","ex1":"Always verify the sender's email address before replying.","ex2":"Law enforcement officials will be able to verify whether a crime has been committed."},{"en":"vigilant","pos":"adj.","zh":"警惕的；提高警覺的","cat":"考試重點詞","src":"詞彙練習","sent":"Criminals strike when you drop your guard, so always stay vigilant.","exam":"單元評估選詞填空原詞；同義詞配對：vigilant ≈ alert / watchful；防騙勸喻寫作常用","err":"搭配 stay/remain/be vigilant；勿與 violent（暴力的）串法混淆；名詞 vigilance","coll":"stay vigilant; remain extra vigilant; the most vigilant of us","ex1":"Stay vigilant when strangers ask for your personal information.","ex2":"Scammers can be clever, so it's up to you to remain extra vigilant."},{"en":"illicit","pos":"adj.","zh":"非法的；違法的","cat":"考試重點詞","src":"Text 2","sent":"Like any other con artist, they will do anything to keep up their illicit activities.","exam":"Text 2 定義句關鍵詞（any illicit action）；同義詞配對：illicit ≈ illegal / unlawful","err":"雙 l 加 -icit 串法易錯；比 illegal 正式，常配 activities / trade / action；勿與 elicit（引出）混淆","coll":"illicit activities; illicit trade; an illicit action","ex1":"The police shut down the illicit trade in wild animals.","ex2":"Food fraud is any illicit action taken to deceive food consumers."},{"en":"authorities","pos":"n.","zh":"當局；有關部門","cat":"高頻基礎詞","src":"Text 1","sent":"If you do fall victim to a scam, contact the authorities as soon as possible.","exam":"單元評估選詞填空原詞（the authorities）；防騙勸喻寫作必用：report to the authorities","err":"解「當局」時恆用複數 the authorities；單數 authority 解「權力／權威」，意思不同","coll":"contact the authorities; report sth to the authorities; ring the authorities","ex1":"Report any suspicious calls to the authorities.","ex2":"The authorities will update you on the status of your case if and when it is appropriate to do so."},{"en":"target","pos":"n./v.","zh":"目標；把…作為目標","cat":"高頻基礎詞","src":"詞彙練習","sent":"I should not have to remind you that men have also been targets of these crimes.","exam":"單元評估選詞填空原詞（targets）；作動詞（scammers target the elderly）與名詞兩用為閱讀理解考點","err":"作動詞直接接賓語（target sb），勿寫 *target at/on sb；被動 be targeted by","coll":"targets of crimes; target vulnerable people; be targeted by a criminal","ex1":"Scammers often target people who live alone.","ex2":"Scammers are always looking for vulnerable targets."},{"en":"dishonest","pos":"adj.","zh":"不誠實的","cat":"高頻基礎詞","src":"詞彙練習","sent":"Cybercriminals who are being dishonest about their true motives and identities on dating apps do not care whether their victim is male or female.","exam":"詞形轉換：honest ↔ dishonest（否定前綴 dis-）→ dishonesty（n.）；Text 2 原句用名詞 dishonesty","err":"h 不發音（與 honest 相同）；be dishonest about sth 介詞用 about；名詞 dishonesty 為填空考點","coll":"be dishonest about sth; a dishonest trader; this kind of dishonesty","ex1":"It is dishonest to sell fake products as real ones.","ex2":"This kind of dishonesty should not go unpunished."},{"en":"steal","pos":"v.","zh":"偷竊","cat":"高頻基礎詞","src":"單元評估","sent":"Edward Agar, a career criminal and expert lock-picker, and William Pierce, a former railway clerk, devised an ingenious plan to steal the gold by replacing it with lead shot while the train was in motion.","exam":"不規則變化 steal-stole-stolen 為詞形轉換及文法必考；閱讀理解（罪案）基礎詞","err":"steal + 物（偷東西），rob + 人／地方（搶劫），港生極易混用；過去分詞 stolen（stolen files）","coll":"steal money from sb; stolen files; steal the gold","ex1":"Someone stole my wallet on the MTR.","ex2":"Cybercriminals phish for people's passwords in order to access their bank accounts and steal from them."},{"en":"theft","pos":"n.","zh":"盜竊（罪）","cat":"考試重點詞","src":"單元評估","sent":"The incident involved the theft of 200 pounds (91 kilograms) of gold worth over 12 000 at the time - equivalent to over a million pounds today.","exam":"單元評估閱讀篇章關鍵詞；詞形轉換：steal（v.）→ theft（n.）→ thief（人）三詞辨析必考","err":"theft 是罪行、thief 是人，串法相近極易掉轉；the theft of sth 介詞用 of","coll":"the theft of sth; commit theft; theft and burglary","ex1":"The security camera recorded the theft.","ex2":"Knowledge of traditional crimes was generally restricted to theft, burglary, smuggling, and violent crimes such as murder."},{"en":"thief","pos":"n.","zh":"小偷；竊賊","cat":"高頻基礎詞","src":"單元評估","sent":"The thieves, however, had other plans.","exam":"複數變化 thief → thieves（f 變 v）為基礎考點；文法練習例句多次出現（Whose car did the thief steal?）","err":"複數 thieves 勿寫 thiefs；ie 串法（i before e）；jewel thief（珠寶賊）、egg thief 為常見搭配","coll":"catch a thief; a jewel thief; the thief broke into the house","ex1":"The thief climbed in through the kitchen window.","ex2":"Jessie felt proud to have helped the investigator catch the jewel thief red-handed."},{"en":"smuggling","pos":"n.","zh":"走私","cat":"核心詞彙","src":"詞彙練習","sent":"Knowledge of traditional crimes was generally restricted to theft, burglary, smuggling, and violent crimes such as murder.","exam":"選詞填空常見答案；罪案主題詞彙表（criminal activities）成員","err":"動詞 smuggle 雙寫 g 加 -ing；smuggle sth into/out of a place 介詞搭配易漏","coll":"gold smuggling; smuggle sth into a country","ex1":"The man was arrested for smuggling cigarettes.","ex2":"Customs officers work hard to stop smuggling at the border."},{"en":"trafficking","pos":"n.","zh":"非法販運","cat":"核心詞彙","src":"詞彙練習","sent":"Few were aware of human trafficking being an issue around the world.","exam":"選詞填空常見答案；human trafficking（販賣人口）為社會議題閱讀高頻搭配","err":"雙 f 加 -icking 串法易錯；traffic 在此與「交通」無關，解「非法買賣」；drug trafficking = 販毒","coll":"human trafficking; drug trafficking; drug traffickers","ex1":"Human trafficking is a serious crime around the world.","ex2":"The drug traffickers were caught red-handed by the police."},{"en":"suspect","pos":"n.","zh":"疑犯","cat":"考試重點詞","src":"Text 2","sent":"Of these 50 cases, 17 were dismissed and in 10 cases the suspects were cleared of any wrongdoing.","exam":"課文詞彙填空原題：The suspect in the bank robbery was described as a tall man wearing a red jacket and a black hat","err":"名詞重音在前 /ˈsʌspekt/，動詞（懷疑）重音在後 /səˈspekt/；勿與 victim（受害者）角色掉轉","coll":"the suspect in a robbery; the suspects were cleared of wrongdoing","ex1":"The police are questioning two suspects.","ex2":"The suspect in the bank robbery was described as a tall man wearing a red jacket and a black hat."},{"en":"severe","pos":"adj.","zh":"嚴重的","cat":"考試重點詞","src":"Text 2","sent":"One of the most severe cases involved an olive oil brand whose product was found to contain peanut oil.","exam":"課文詞彙填空原題：...the most severe food poisoning issue in our school's history；詞形轉換：severe → severity（n.）","err":"比較級 more severe（勿寫 severer）；名詞 severity 在 Text 1 出現（in view of the severity of the issue），詞性勿混","coll":"a severe case; a severe health risk; the severity of the issue","ex1":"He suffered severe injuries in the accident.","ex2":"This case of dilution posed a severe, life-threatening health risk to potential consumers with peanut allergies."},{"en":"threat","pos":"n.","zh":"威脅","cat":"考試重點詞","src":"Text 2","sent":"This was not as serious of a threat to one's health, but this kind of dishonesty should not go unpunished.","exam":"課文詞彙填空原題：Junk food...may pose a threat to our health if we eat too much；搭配 pose a threat to 必背","err":"pose a threat to sb/sth 整個搭配須背誦；詞形轉換：threat（n.）→ threaten（v.）→ threatening（adj.）","coll":"pose a threat to sth; a threat to one's health; a life-threatening risk","ex1":"Plastic waste poses a threat to sea animals.","ex2":"Junk food should be consumed in moderation because it may pose a threat to our health."},{"en":"essential","pos":"adj.","zh":"必要的；不可或缺的","cat":"考試重點詞","src":"Text 2","sent":"Some essential steps can be taken to fight food fraud.","exam":"課文詞彙填空原題：Fastening our seatbelt is essential to our safety...；同義詞配對：essential ≈ necessary / vital","err":"be essential to/for sth 介詞易漏；It is essential that... 後可接原形動詞（正式用法）","coll":"essential steps; be essential to safety; essential information","ex1":"Fastening our seatbelt is essential to our safety.","ex2":"Taking essential steps early can stop scammers from succeeding."},{"en":"strategy","pos":"n.","zh":"策略","cat":"考試重點詞","src":"Text 2","sent":"The FSC recommends reviewing and updating relevant laws and regulations to combat new types of food fraud, developing new strategies to trace food sources and educating the public on food fraud so they can be on the alert.","exam":"課文詞彙填空原題：Our company has formulated new marketing strategies...；報告寫作（建議部分）必用詞","err":"複數 strategies（y 變 ies）；勿與 strategic（adj.）詞性混淆；develop/formulate strategies 為固定搭配","coll":"develop new strategies; marketing strategies; a tried-and-tested strategy","ex1":"The school has a new strategy to reduce cyberbullying.","ex2":"Our company has formulated new marketing strategies to increase the public's interest in our latest products."},{"en":"investigation","pos":"n.","zh":"調查","cat":"考試重點詞","src":"Text 2","sent":"From April last year to March this year, the Food Standards Committee (FSC) conducted investigations into 50 food fraud complaints they had received.","exam":"報告寫作及閱讀理解高頻；搭配 conduct an investigation into sth、under investigation 為填空考點","err":"介詞用 into（investigations into complaints）；under investigation = 調查中；詞形轉換：investigate → investigator（人）","coll":"conduct an investigation into sth; under investigation; a crime investigator","ex1":"The police have started an investigation into the scam.","ex2":"Of the 23 cases currently under investigation, 13 had to do with mislabelling."},{"en":"consumer","pos":"n.","zh":"消費者","cat":"高頻基礎詞","src":"Text 2","sent":"This case of dilution posed a severe, life-threatening health risk to potential consumers with peanut allergies.","exam":"閱讀理解及報告寫作高頻；詞形轉換：consume（v.）→ consumer（人）→ consumption（n.）","err":"consumer（消費者）與 customer（顧客）意思相近但語境不同；動詞 consume 亦解「進食」（be consumed in moderation）","coll":"food consumers; protect consumers; deceive consumers","ex1":"Consumers should check food labels carefully.","ex2":"Food fraud is any illicit action taken to deceive food consumers."},{"en":"ingredient","pos":"n.","zh":"成分；材料","cat":"高頻基礎詞","src":"Text 2","sent":"Of the 23 cases currently under investigation, 13 had to do with mislabelling and six had to do with the dilution or substitution of key ingredients.","exam":"閱讀理解（食物安全主題）關鍵詞；key ingredients 為原文搭配","err":"串字難點 -gre-（in-gre-di-ent）；指食譜材料及產品成分皆可，可數","coll":"key ingredients; fresh ingredients; the substitution of ingredients","ex1":"Read the list of ingredients before you buy snacks.","ex2":"Some dishonest companies dilute or substitute key ingredients to cut costs."},{"en":"regulation","pos":"n.","zh":"規例；法規","cat":"考試重點詞","src":"Text 2","sent":"The FSC recommends reviewing and updating relevant laws and regulations to combat new types of food fraud, developing new strategies to trace food sources and educating the public on food fraud so they can be on the alert.","exam":"閱讀理解 True/False 原題考點（The FSC suggests keeping current regulations unchanged - False）；laws and regulations 為固定並列","err":"解「規例」時多用複數 regulations；詞形轉換：regulate（v.）→ regulation（n.）；勿與 rule 混淆層級（regulation 較正式）","coll":"laws and regulations; review and update regulations; safety regulations","ex1":"The new regulations will make food labels clearer.","ex2":"The FSC recommends reviewing and updating relevant laws and regulations."},{"en":"combat","pos":"v.","zh":"打擊；對抗","cat":"考試重點詞","src":"Text 2","sent":"The FSC recommends reviewing and updating relevant laws and regulations to combat new types of food fraud, developing new strategies to trace food sources and educating the public on food fraud so they can be on the alert.","exam":"選詞填空常見答案；報告寫作（建議）高頻：combat crime/fraud；同義詞配對：combat ≈ fight","err":"作動詞直接接賓語（combat crime），勿加介詞 *combat against/with；作名詞時解「戰鬥」","coll":"combat food fraud; combat future crimes; combat cybercrime","ex1":"The government is taking steps to combat phone scams.","ex2":"The information you give the police will help them combat future crimes."},{"en":"tamper","pos":"v.","zh":"擅自改動；做手腳","cat":"考試重點詞","src":"Text 2","sent":"Of the 132 seafood products imported by this company, 80% had been systematically tampered with.","exam":"閱讀理解原題關鍵詞（what does 'systematically' imply - the tampering was done on purpose）；tamper with 搭配必背","err":"必須配 with（tamper with sth），勿直接接賓語；勿與 temper（脾氣）串法混淆","coll":"tamper with products; be tampered with; evidence of tampering","ex1":"Someone had tampered with the lock on the door.","ex2":"80% of the seafood products had been systematically tampered with."},{"en":"notorious","pos":"adj.","zh":"臭名昭著的","cat":"考試重點詞","src":"單元評估","sent":"On the night of May 15, 1855, one of the most notorious gold heists in history took place, forever etching the Great Gold Robbery into the history of crime.","exam":"單元評估閱讀篇章關鍵詞；同義詞配對：notorious ≈ infamous（篇章後段以 infamous 重現）","err":"notorious 是貶義「因壞事出名」，famous 是中性「著名」，港生易誤用讚人；be notorious for sth 介詞用 for","coll":"a notorious criminal; be notorious for sth; a notorious heist","ex1":"The city was once notorious for pickpockets.","ex2":"The Great Gold Robbery is one of the most notorious heists in history."},{"en":"heist","pos":"n.","zh":"（大型）劫案","cat":"核心詞彙","src":"單元評估","sent":"On the night of May 15, 1855, one of the most notorious gold heists in history took place, forever etching the Great Gold Robbery into the history of crime.","exam":"單元評估閱讀篇章主題詞（The Great Gold Robbery）；同義詞配對：heist ≈ robbery","err":"讀音 /haɪst/；heist 多指經精心策劃的大型搶劫，與一般 robbery 語感有別","coll":"a gold heist; pull off a heist; the most notorious heists","ex1":"The movie is about a museum heist.","ex2":"The gold heist was planned down to the smallest detail."},{"en":"devise","pos":"v.","zh":"設計；想出（計劃）","cat":"考試重點詞","src":"單元評估","sent":"Edward Agar, a career criminal and expert lock-picker, and William Pierce, a former railway clerk, devised an ingenious plan to steal the gold by replacing it with lead shot while the train was in motion.","exam":"單元評估原題：Find a word in paragraph 3 that has a similar meaning to 'created'（答案 devised）","err":"devise（v. 設計）與 device（n. 裝置）串法只差一個字母，詞性意思皆不同，極易混淆","coll":"devise a plan; devise a strategy","ex1":"The students devised a plan to raise money for charity.","ex2":"The two thieves devised an ingenious plan to steal the gold."},{"en":"ingenious","pos":"adj.","zh":"巧妙的；別出心裁的","cat":"考試重點詞","src":"單元評估","sent":"Edward Agar, a career criminal and expert lock-picker, and William Pierce, a former railway clerk, devised an ingenious plan to steal the gold by replacing it with lead shot while the train was in motion.","exam":"單元評估閱讀篇章關鍵詞；同義詞配對：ingenious ≈ clever / brilliant","err":"勿與 genius（天才，n.）及 ingenuous（天真的）混淆；an ingenious plan 為常見搭配","coll":"an ingenious plan; an ingenious device; an ingenious solution","ex1":"She came up with an ingenious way to remember new words.","ex2":"The thieves' ingenious plan was to replace the gold with lead shot."},{"en":"accomplice","pos":"n.","zh":"共犯；幫兇","cat":"核心詞彙","src":"單元評估","sent":"They enlisted the help of two accomplices: James Burgess, a railway guard, and William Tester, an employee for the South Eastern Railway.","exam":"單元評估閱讀篇章關鍵詞；閱讀理解指代題（who helped the thieves）常涉及","err":"串字難：ac-com-plice；勿與 accomplish（完成，v.）混淆，兩詞意思完全無關","coll":"an accomplice in a crime; enlist the help of accomplices","ex1":"The robber's accomplice waited outside in a car.","ex2":"The thieves enlisted the help of two accomplices who worked for the railway."},{"en":"confess","pos":"v.","zh":"認罪；坦白承認","cat":"考試重點詞","src":"單元評估","sent":"Agar was arrested on an unrelated charge and, in an effort to secure a lighter sentence, confessed to his role in the Great Gold Robbery.","exam":"單元評估段落填空原詞（One of the thieves confessed to the robbery）；搭配 confess to sth/doing sth 必背","err":"confess to + 名詞／動名詞，to 是介詞（confessed to stealing），勿接原形動詞；詞形轉換：confession（n.）","coll":"confess to a crime; confess to one's role in sth; make a confession","ex1":"The boy confessed to breaking the window.","ex2":"Agar confessed to his role in the robbery in an effort to secure a lighter sentence."},{"en":"arrest","pos":"v./n.","zh":"拘捕","cat":"高頻基礎詞","src":"Text 3","sent":"At the time of writing, Lendrum, now in his 60s, has been arrested at least five times on three continents for similar crimes.","exam":"單元評估段落填空原詞（They were all arrested and convicted）；be arrested for sth 搭配常考","err":"be arrested for + 罪行（因…被捕）、on a charge（以某罪名）；名詞用法 under arrest（被拘捕）","coll":"be arrested for sth; be arrested on a charge; under arrest","ex1":"The man was arrested for shoplifting.","ex2":"Agar was arrested on an unrelated charge before he confessed to the robbery."},{"en":"remorse","pos":"n.","zh":"悔意；懊悔","cat":"考試重點詞","src":"Text 3","sent":"This would explain why he showed no remorse when caught red-handed with the eggs.","exam":"閱讀理解態度語氣題關鍵詞（show no remorse 毫無悔意）；罪案報道常用","err":"不可數；固定搭配 show/feel remorse for sth；勿與 regret 完全等同，remorse 悔疚感更強","coll":"show no remorse; feel remorse for sth; without remorse","ex1":"The thief showed no remorse in court.","ex2":"He felt deep remorse for the trouble he had caused his family."},{"en":"assistance","pos":"n.","zh":"協助；援助","cat":"考試重點詞","src":"詞彙練習","sent":"When the reality of my situation sunk in, I went crying to the authorities for assistance.","exam":"Word Power 同義詞原題：assistance ≈ help；單元評估選詞填空原詞；詞形轉換：assist（v.）→ assistance（n.）→ assistant（人）","err":"assistance 不可數；be of assistance to sb（對某人有幫助）為正式書信句式；勿與 assistant（助手）混淆","coll":"ask the authorities for assistance; offer assistance; be of assistance to sb","ex1":"Please call this hotline if you need assistance.","ex2":"The information you provide could be of assistance to the police as well."},{"en":"colleague","pos":"n.","zh":"同事","cat":"高頻基礎詞","src":"詞彙練習","sent":"I was checking through my email on Sunday when I noticed that my colleague Bobby had sent me something.","exam":"Word Power 同義詞原題：colleague ≈ workmate；聆聽及日常寫作基礎詞","err":"串字難點：col-league（-gue 結尾）；讀音 /ˈkɒliːɡ/ 兩音節；勿與 college（學院）混淆","coll":"a colleague at work; colleagues and friends","ex1":"My mum's colleague gave her a lift home.","ex2":"The phishing email pretended to come from his colleague's address."},{"en":"dreadful","pos":"adj.","zh":"糟透的；可怕的","cat":"口語常用","src":"詞彙練習","sent":"As most of you have already guessed, my blog got hacked last week. It was truly a dreadful experience.","exam":"Word Power 原題：以 dreadful 取代 very bad，避免重複用 very；寫作提升用語層次","err":"dreadful 已含「非常」之意，勿寫 very dreadful；-ful 結尾只有一個 l","coll":"a dreadful experience; dreadful weather; feel dreadful","ex1":"The traffic this morning was dreadful.","ex2":"Being hacked was truly a dreadful experience for the blogger."},{"en":"terrifying","pos":"adj.","zh":"駭人的；令人恐懼的","cat":"口語常用","src":"詞彙練習","sent":"I've been posting on this personal blog for ages without an issue, so losing control of my account was terrifying.","exam":"Word Power 原題：以 terrifying 取代 very scary；-ed/-ing 分詞形容詞辨析為選擇題常考","err":"terrifying 形容令人害怕的事物，terrified 形容感到害怕的人；港生常寫 *I am terrifying","coll":"a terrifying experience; find sth terrifying","ex1":"Losing my phone with all my photos was terrifying.","ex2":"It was terrifying to realise that a stranger had control of my account."},{"en":"deadline","pos":"n.","zh":"截止日期／時間","cat":"日常實用","src":"聽力對話","sent":"Tony, I've just read the article you sent me. When is the deadline to upload it?","exam":"聆聽對話（編輯文章）關鍵詞；meet/miss a deadline 為日常及職場高頻搭配","err":"meet a deadline（趕及限期）勿直譯 *catch the deadline；miss a deadline = 錯過限期","coll":"meet a deadline; miss a deadline; the deadline for sth","ex1":"The deadline for the book report is Friday.","ex2":"We need to put the article on our website by ten a.m. tomorrow to meet the deadline."},{"en":"delete","pos":"v.","zh":"刪除","cat":"日常實用","src":"聽力對話","sent":"Sending children to tutorial schools is a popular thing here in Hong Kong, so the 'not' in the line should be deleted.","exam":"聆聽（編輯改錯任務）指令詞：delete / cross out / insert / replace / underline 須全部聽得懂","err":"delete 與 cross out（劃去）、remove 同義；過去式 deleted 雙音節，讀音勿吞尾音","coll":"delete a word; delete a message; delete suspicious emails","ex1":"Delete any messages from strangers asking for money.","ex2":"How about deleting the title 'Free tutoring!' from the article?"},{"en":"update","pos":"v./n.","zh":"更新；最新消息","cat":"日常實用","src":"詞彙練習","sent":"The authorities will update you on the status of your case if and when it is appropriate to do so.","exam":"單元評估選詞填空原詞（update your security software）；update sb on sth 搭配為聆聽及寫作常用","err":"update sb on sth（向某人交代最新情況）與 update sth（更新軟件）兩種用法勿混；名詞重音在前","coll":"update security software; update laws and regulations; update sb on sth","ex1":"Remember to update your apps regularly.","ex2":"Always make sure you update your security software."}],"phrases":[{"phrase":"drop one's guard","zh":"放鬆警惕","type":"課文短語","sent":"Out of concern for their loved ones, they drop their guard and hastily send their savings over.","note":"guard 前用所有格（drop your/their guard）；與 stay vigilant（保持警覺）意思相反，防騙寫作常成對出現","ex":"Criminals strike when you drop your guard, so always stay vigilant."},{"phrase":"fall prey to","zh":"成為…的獵物；受害於","type":"課文短語","sent":"In view of the severity of the issue, we would like to offer residents a few tips on how to avoid falling prey to scammers.","note":"prey 本義是「獵物」；fall prey to + 加害者或罪行；avoid falling prey to 為勸喻寫作高頻句式","ex":"Elderly citizens often fall prey to email and phone scams."},{"phrase":"fall victim to","zh":"成為…的受害者","type":"課文短語","sent":"If you do fall victim to a scam, contact the authorities as soon as possible.","note":"與 fall prey to 近義；victim 用單數不加冠詞（fall victim to，勿寫 *fall a victim to）；單元評估選詞填空原詞","ex":"A number of singles fall victim to romance scams every year."},{"phrase":"hold sb/sth hostage","zh":"挾持…作人質","type":"課文短語","sent":"In other cases, clicking a malicious link can cause a computer to download a virus or other malware, such as ransomware that holds the computer's files hostage until the victim pays the hackers a ransom using cryptocurrency.","note":"hostage 前不加冠詞（hold the files hostage）；本單元借喻勒索軟件「挾持」檔案，閱讀理解比喻題考點","ex":"The authorities were shocked to discover that the burglars were holding a student hostage in his own home."},{"phrase":"in a bind","zh":"陷入困境","type":"課文短語","sent":"The mark receives an email from a stranger claiming to be royalty who has been caught in a bind.","note":"be/get caught in a bind = 陷入兩難或麻煩；騙徒常藉「有難」博同情，屬防騙閱讀關鍵語","ex":"With time running out on the investigation, the clueless detectives were really in a bind."},{"phrase":"in view of sth","zh":"鑑於；考慮到","type":"寫作句式","sent":"In view of the severity of the issue, we would like to offer residents a few tips on how to avoid falling prey to scammers.","note":"正式書面語，置句首引出原因，等於 because of / considering；通告及報告寫作加分句式","ex":"In view of the stormy weather, we have no choice but to suspend the search for the missing person until tomorrow."},{"phrase":"tried-and-tested","zh":"屢試不爽的；經過驗證的","type":"課文短語","sent":"A tried-and-tested tactic to convince the mark to hand over money is to ask for urgent help or offer a reward, to play on the mark's ego and greed.","note":"複合形容詞須有連字號，放名詞前（a tried-and-tested method）；同義於 proven","ex":"The burglar couldn't believe his tried-and-tested method of picking a lock had failed."},{"phrase":"vanish into thin air","zh":"消失得無影無蹤","type":"課文短語","sent":"After getting the money, the scammer vanishes into thin air, never fulfilling their promise.","note":"固定搭配 thin air 不可改動；形容人或財物突然完全消失，記敘文及罪案報道常用","ex":"The pickpocket had a knack for making wallets and phones vanish into thin air."},{"phrase":"have to do with","zh":"與…有關","type":"課文短語","sent":"Of the 23 cases currently under investigation, 13 had to do with mislabelling and six had to do with the dilution or substitution of key ingredients.","note":"have something/nothing to do with = 與…有關／無關；報告中交代數據分類常用；時態變化在 have 上","ex":"Both judge and jury were frustrated because the prosecution's questions had nothing to do with the alleged crime."},{"phrase":"on the alert","zh":"保持警覺","type":"課文短語","sent":"The FSC recommends reviewing and updating relevant laws and regulations to combat new types of food fraud, developing new strategies to trace food sources and educating the public on food fraud so they can be on the alert.","note":"be on the alert (for sth) = 提防…；同義於 on the lookout for；防騙及安全主題寫作常用","ex":"Students should be on the alert for phishing emails."},{"phrase":"take advantage of","zh":"利用；佔…便宜","type":"課文短語","sent":"The FSC defines food fraud as 'any illicit action taken by businesses or individuals to deceive or take advantage of food consumers'.","note":"接受害者時含貶義「佔便宜」；接機會（take advantage of the opportunity）時為中性「善用」，須按上下文判斷","ex":"Con artists often take advantage of vulnerable groups like children, teens and the elderly."},{"phrase":"with regard to","zh":"關於；至於","type":"寫作句式","sent":"With regard to mislabelling, one serious case involved an importer of seafood.","note":"正式書面語，用於轉入新項目，等於 regarding / in relation to；regard 用單數，勿寫 *with regards to","ex":"I am writing with regard to the legal proceedings scheduled for tomorrow."},{"phrase":"at the time of sth","zh":"在…之時","type":"課文短語","sent":"At the time of writing, Lendrum, now in his 60s, has been arrested at least five times on three continents for similar crimes.","note":"at the time of writing（執筆之時）為報道及報告慣用語；後接名詞或動名詞（at the time of the investigation）","ex":"The suspect's lengthy criminal record had drawn suspicion at the time of the investigation."},{"phrase":"be down to sth","zh":"歸因於；由…造成","type":"課文短語","sent":"Some experts in criminology suggest that cases like this may be down to the influence of family and friends.","note":"口語化的「因為」，等於 be caused by / be due to；主語是結果，down to 後接原因","ex":"Horace's legal team claimed that his bad behaviour was down to the recent deaths of his parents."},{"phrase":"catch sb red-handed","zh":"當場逮住；捉個正着","type":"課文短語","sent":"This would explain why he showed no remorse when caught red-handed with the eggs.","note":"red-handed 必須有連字號；be caught red-handed = 犯案時被當場發現；源自「滿手鮮血」的比喻","ex":"Jessie felt proud to have helped the investigator catch the jewel thief red-handed."},{"phrase":"claim to be","zh":"自稱是","type":"課文短語","sent":"The mark receives an email from a stranger claiming to be royalty who has been caught in a bind.","note":"claim to be + 身份，表示說法未經證實；防騙語境高頻：callers are not always who they claim to be","ex":"Beware of callers claiming to be representatives of banks or hospitals."},{"phrase":"cross out","zh":"劃去；刪去","type":"日常表達","sent":"Okay, let me cross out 'Timothy' and replace it with 'Thomas' - Done.","note":"聆聽編輯任務指令語：cross out（劃去）、replace...with（以…取代）、insert/add（加入）、underline（劃底線）須成組掌握","ex":"Please cross out the wrong word and write the correct one above it."},{"phrase":"first and foremost","zh":"首要的是","type":"寫作句式","sent":"First and foremost, if you believe yourself to have been targeted by a criminal or if you think you have witnessed a crime, please ring the authorities immediately.","note":"比 firstly 更強調「最重要的第一點」；演講及議論文開段常用，句首須加逗號","ex":"First and foremost, never share your passwords with anyone."}]},{"key":"2B_U8","form":"F2","book":"2B","num":8,"theme":"Protecting wildlife","theme_zh":"保護野生動物","words":[{"en":"wildlife","pos":"n.","zh":"野生動物","cat":"核心詞彙","src":"Text 1 / 詞彙練習 / 單元評估","sent":"All kinds of wildlife, including birds, reptiles, and amphibians, like to settle into their homes after the aardvarks have abandoned them.","exam":"本單元主題核心詞；閱讀理解及選詞填空高頻；固定搭配 wildlife conservation / protect wildlife","err":"不可數名詞（集合名詞），勿加 -s 或冠詞 a wildlife；複合名詞一個字寫 wildlife","coll":"protect wildlife; wildlife conservation; a wildlife sanctuary","ex1":"We must protect the wildlife in our country parks.","ex2":"Human activities are a serious threat to wildlife around the world."},{"en":"endangered","pos":"adj.","zh":"瀕危的","cat":"核心詞彙","src":"Text 1 / 詞彙練習 / 單元評估","sent":"Modern technology such as drones are useful for tracking and protecting critically endangered animals.","exam":"選詞填空高頻；詞形轉換 endanger(v.)→endangered(adj.)；搭配 an endangered species / critically endangered","err":"串法 en-dan-gered；港生易與 dangerous（危險的）混淆，endangered 指「瀕臨滅絕的」","coll":"an endangered species; critically endangered; endangered animals","ex1":"The giant panda is an endangered species.","ex2":"Three out of the five species of rhino are critically endangered."},{"en":"extinction","pos":"n.","zh":"滅絕；絕種","cat":"核心詞彙","src":"Text 1 / 詞彙練習 / 單元評估","sent":"Aardvarks are currently among the animals at lowest risk of extinction.","exam":"選詞填空高頻；詞形轉換 extinct(adj.)→extinction(n.)；搭配 the brink of extinction / hunt sth to extinction","err":"串法 ex-tinc-tion；不可數名詞；港生易與形容詞 extinct 混用詞性（become extinct vs face extinction）","coll":"the brink of extinction; face extinction; save sth from extinction","ex1":"Many species are on the brink of extinction because of poaching.","ex2":"To save them from extinction, there is still a lot of work to do."},{"en":"conservation","pos":"n.","zh":"保育；保護","cat":"核心詞彙","src":"Text 1 / 詞彙練習 / 單元評估","sent":"Borneo and Sumatra are two Southeast Asian islands that are very important in the conservation world because of their very high biodiversity.","exam":"本單元主題詞；詞形轉換 conserve(v.)→conservation(n.)→conservationist(n.)；搭配 conservation efforts","err":"串法 con-ser-va-tion；不可數名詞；勿與 conversation（對話）混淆，只差一個字母","coll":"conservation efforts; wildlife conservation; a conservation programme","ex1":"The pandas were brought to the zoo as part of a conservation regime.","ex2":"Conservation efforts will hopefully reduce the impact of human activities."},{"en":"conservationist","pos":"n.","zh":"自然保育人士","cat":"核心詞彙","src":"詞彙練習","sent":"Conservationists suggest that more needs to be done to save the region from the effects of climate change.","exam":"詞形轉換考點：conserve(v.)→conservation(n.)→conservationist(n. 人)；閱讀理解常見","err":"字尾 -ist 表示「從事…的人」；串法長，注意 conserva-tion-ist；複數加 -s","coll":"dedicated conservationists; conservationists suggest; wildlife conservationists","ex1":"Conservationists have been trying to slash the supply of rhino horn.","ex2":"Dedicated conservationists are working tirelessly to safeguard endangered animals."},{"en":"habitat","pos":"n.","zh":"棲息地；自然生境","cat":"核心詞彙","src":"Text 1 / 詞彙練習 / 單元評估","sent":"To make matters worse, human civilization began to clear and destroy their natural habitat to develop urban towns and cities.","exam":"本單元主題詞；選詞填空高頻；搭配 natural habitat / habitat loss / destroy a habitat","err":"串法 hab-i-tat；港生易與 habit（習慣）混淆；natural habitat 為固定搭配","coll":"natural habitat; habitat loss; destroy a habitat","ex1":"The exhibit is designed to mimic the pandas' natural habitat in the mountains.","ex2":"Habitat loss remains a major threat to rhinos today."},{"en":"predator","pos":"n.","zh":"捕食者；掠食動物","cat":"核心詞彙","src":"Text 1 / 詞彙練習","sent":"When humans showed up bringing not-so-friendly predators such as dogs and cats, kākāpōs became easy prey.","exam":"閱讀理解主題詞；與 prey（獵物）為一對相反概念，常同場出現","err":"串法 pre-da-tor；讀音 /ˈpredətə/ 重音在前；勿與 prey（獵物）混淆，一為捕食者一為獵物","coll":"top predators; natural predators; a fierce predator","ex1":"Human travel has allowed top predators like the Burmese python to reach distant shores.","ex2":"Without predators, the population of some animals grows too quickly."},{"en":"prey","pos":"n.","zh":"獵物","cat":"考試重點詞","src":"Text 1 (Write more)","sent":"When humans showed up bringing not-so-friendly predators such as dogs and cats, kākāpōs became easy prey.","exam":"閱讀理解及選詞填空常見；固定短語 become easy prey / fall prey to sth","err":"不可數名詞，勿加 -s；prey（獵物）與 pray（祈禱）同音不同義，串法及意思要分清","coll":"easy prey; become prey; fall prey to sth","ex1":"Without protection, endangered species like the black rhino become easy prey for poachers.","ex2":"Small animals are easy prey for eagles and foxes."},{"en":"species","pos":"n.","zh":"物種","cat":"核心詞彙","src":"Text 2 / 詞彙練習 / 單元評估","sent":"In addition to watching the pandas frolic, visitors can also learn about the conservation efforts in place to protect this vulnerable species.","exam":"本單元主題詞；單複數同形（one species / two species）為文法考點","err":"單複數同形，串法都是 species（無 specie 這寫法）；an endangered species 是單數用法","coll":"an endangered species; a vulnerable species; protect a species","ex1":"The black-faced spoonbill is an endangered water bird species.","ex2":"The loss of even a single species diminishes the biodiversity of the planet."},{"en":"biodiversity","pos":"n.","zh":"生物多樣性","cat":"考試重點詞","src":"Text 1 / 詞彙練習 / 單元評估","sent":"Borneo and Sumatra are very important in the conservation world because of their very high biodiversity.","exam":"選詞填空答案；複合詞 bio-（生物）+ diversity（多樣性）為構詞考點","err":"串法長，注意 bio-di-ver-si-ty；不可數名詞，勿加 -s","coll":"high biodiversity; protect biodiversity; the biodiversity of a region","ex1":"The islands are home to a very high level of biodiversity.","ex2":"Deforestation threatens the biodiversity of the rainforest."},{"en":"sanctuary","pos":"n.","zh":"保護區；庇護所","cat":"核心詞彙","src":"Text 2 / 詞彙練習","sent":"Some wildlife sanctuaries on the islands are already making an effort to track the population of native species.","exam":"選詞填空答案；閱讀理解常與 zoo、reserve 作對比；Text 2 提及假的 'sanctuaries'","err":"串法 sanc-tu-ary；複數 sanctuaries（y 變 ies）；讀音 /ˈsæŋktʃuəri/","coll":"a wildlife sanctuary; an animal sanctuary; a bird sanctuary","ex1":"Injured animals are cared for at the wildlife sanctuary.","ex2":"Some so-called 'sanctuaries' actually exploit the animals for profit."},{"en":"preserve","pos":"v.","zh":"保護；保存","cat":"考試重點詞","src":"Text 1 / 詞彙練習 / 單元評估","sent":"Governments need to step up efforts to preserve the islands' rainforests and crack down on logging, mining and hunting.","exam":"選詞填空答案；詞形轉換 preserve(v.)→preservation(n.)；Word Power 名詞字尾練習","err":"串法 pre-serve；勿與 reserve（保留；保護區）混淆；及物動詞直接接受詞","coll":"preserve the environment; preserve wildlife; preserve biodiversity","ex1":"We should preserve the natural habitats of endangered animals.","ex2":"The exhibit hopes to inspire visitors to preserve these beloved animals."},{"en":"threat","pos":"n.","zh":"威脅","cat":"核心詞彙","src":"Text 1 / 詞彙練習 / 單元評估","sent":"Even if a species is an extreme threat to the biodiversity of its host country, it should be killed in a way that minimizes suffering.","exam":"本單元主題詞；詞形轉換 threat(n.)→threaten(v.)→threatening(adj.)；搭配 a threat to sth / under threat","err":"串法 threat（注意 -ea-）；名詞 threat 與動詞 threaten 詞性易混；a threat to（介詞用 to）","coll":"a threat to sth; under threat; face a threat","ex1":"Habitat loss is a major threat to many wild animals.","ex2":"The islands' ecosystems face the threats of deforestation and illegal poaching."},{"en":"threaten","pos":"v.","zh":"威脅；危害","cat":"考試重點詞","src":"Text 1","sent":"The kākāpō is a flightless, nocturnal bird whose long-term survival has been threatened by humans' arrival to New Zealand.","exam":"詞形轉換考點：threat(n.)→threaten(v.)；常以被動式 be threatened by 出現，考語態","err":"串法 threat + en；被動式 be threatened by（介詞用 by）；港生易漏 -en 而誤用名詞","coll":"be threatened by sth; threaten wildlife; severely threatened","ex1":"The survival of the species is threatened by human activities.","ex2":"Kākāpōs are severely threatened by disease, habitat loss and predators."},{"en":"vulnerable","pos":"adj.","zh":"脆弱的；易受傷害的","cat":"考試重點詞","src":"Text 2 / 詞彙練習 / 單元評估","sent":"Invasive animals are commonly killed because of how deadly they can be to vulnerable native wildlife.","exam":"選詞填空答案；閱讀理解同義替換 vulnerable ≈ at risk / easily harmed；搭配 vulnerable to sth","err":"串法 vul-ner-a-ble 又長又易錯（注意 -ner-）；搭配介詞 vulnerable to sth","coll":"a vulnerable species; vulnerable to sth; protect the vulnerable","ex1":"Visitors can learn about the efforts to protect this vulnerable species.","ex2":"Native animals can become vulnerable to invasive species."},{"en":"deadly","pos":"adj.","zh":"致命的","cat
