spectators."},{"en":"venue","pos":"n.","zh":"（活動）場地；地點","cat":"考試重點詞","src":"詞彙練習 / 聽力對話","sent":"This year we've picked Sha Tin Indoor Swimming Pool as the venue.","exam":"聽力細節題直接考過（venue of the Swimming Gala）；詞彙練習考過 competition venue；活動通告寫作必用詞","err":"讀音 /ˈvenjuː/；勿與 avenue（大道）混淆；泛指任何活動場地，比 stadium 更闊","coll":"the competition venue; pick a venue; travel to the venue","ex1":"The venue of the swimming gala is close to our school.","ex2":"The team travelled to the competition venue early on Saturday morning."},{"en":"fencing","pos":"n.","zh":"劍擊","cat":"核心詞彙","src":"Text 2","sent":"Athletic fencing arose in the late 16th century when fencing schools were set up throughout Europe.","exam":"Text 2 主題詞，閱讀理解細節題全篇圍繞劍擊裝備與計分規則；香港奧運熱門項目，寫作素材常用","err":"詞形轉換 fencing(運動) → fencer(劍擊手)；勿與 fence（籬笆）名詞義混淆，同形多義","coll":"a fencing bout; the Fencing Club; fencing gear","ex1":"Fencing became very popular in Hong Kong after the Olympics.","ex2":"The Fencing Club is organizing a two-hour fencing taster class in October."},{"en":"sword","pos":"n.","zh":"劍","cat":"核心詞彙","src":"Text 2","sent":"The key piece of equipment is, of course, the sword.","exam":"Text 2 細節題核心詞（用劍尖或劍側計分）；閱讀理解圖表填充題常見","err":"w 不發音，讀 /sɔːd/，港生極易讀出 w 音；串法 s-w-o-r-d 勿漏 w","coll":"the tip of the sword; swords with built-in sensors","ex1":"Foil fencers may only score with the tip of the sword.","ex2":"Each fencer holds a sword in the weapon hand."},{"en":"mask","pos":"n.","zh":"面罩；口罩","cat":"高頻基礎詞","src":"Text 2","sent":"The fencing uniform includes a mask that completely encloses the head and the neck, protective pads, and a glove on the weapon hand.","exam":"閱讀理解裝備細節題常見；一詞多義：劍擊面罩／口罩，靠語境分辨","err":"wear a mask 動詞用 wear；勿與 musk 混淆串法；防護裝備類詞彙常一起考（mask、pads、glove）","coll":"wear a mask; a fencing mask; protective mask","ex1":"Fencers must wear a mask to protect the head and neck.","ex2":"Remember to bring your mask and gloves to the class."},{"en":"glove","pos":"n.","zh":"手套","cat":"高頻基礎詞","src":"Text 2 / 詞彙練習","sent":"The school is gifting each member of the team a new pair of softball gloves.","exam":"運動裝備選詞填空常見；量詞搭配 a pair of gloves 為考點","err":"讀音 /ɡlʌv/ 勿讀成 /ɡləʊv/；一對手套說 a pair of gloves；單隻用 a glove","coll":"a pair of gloves; softball gloves; a glove on the weapon hand","ex1":"The goalkeeper wears special gloves to catch the ball.","ex2":"Fencers wear a glove on the weapon hand."},{"en":"performance","pos":"n.","zh":"表現；演出","cat":"考試重點詞","src":"詞彙練習 / 單元評估","sent":"Two players were awarded silver medals for their individual performance.","exam":"單元評估選詞填空直接考過（your performance might be affected）；詞形轉換 perform(v.) → performance(n.) 高頻考點","err":"串法 -ance 結尾勿寫成 -ence；搭配 give a performance / an outstanding performance","coll":"individual performance; a shining performance; analyse one's performance","ex1":"The coach filmed the athletes to analyse their performance in detail.","ex2":"Her record-breaking performance made the whole school proud."},{"en":"participation","pos":"n.","zh":"參與","cat":"考試重點詞","src":"Text 1 / 詞彙練習","sent":"Medallists in particular often draw new public interest to and participation in their sports.","exam":"詞彙練習選詞填空直接考過（increase participation in softball）；詞形轉換 participate(v.) → participation(n.) → participant(n. 人)","err":"介詞搭配 participation in sth；串法長，注意 -ci-；與 participant（參加者）詞義勿混","coll":"increase participation in; public participation; active participation","ex1":"The success of our team increased participation in school sports.","ex2":"Enrolling online may help attract more participation."},{"en":"inspire","pos":"v.","zh":"激勵；啟發","cat":"核心詞彙","src":"Reading Focus / 詞彙練習","sent":"Do you know what's inspired everyone to cheer so loudly?","exam":"詞形轉換高頻：inspire → inspiring（令人鼓舞的）→ inspirational → inspiration；詞族練習直接考過 I too find Mbappé inspirational","err":"inspire sb to do sth 句式；-ed/-ing 分辨：feel inspired（人）vs an inspiring story（事）；勿與 aspire（渴望）混淆","coll":"inspire young people; feel inspired; an inspiring sports hero","ex1":"Olympic medallists inspire many students to take up new sports.","ex2":"As fans, they get to feel inspired by our hard work."},{"en":"unity","pos":"n.","zh":"團結","cat":"核心詞彙","src":"Reading Focus / 詞彙練習","sent":"Our efforts can cheer people up and promote good values like unity, resilience and sportsmanship.","exam":"詞彙練習選詞填空直接考過；運動精神主題寫作常用抽象名詞；同族詞 unite(v.)","err":"不可數名詞；讀音 /ˈjuːnəti/ 以 /j/ 開首，冠詞配 a 不配 an（a sense of unity）；勿與 unit（單元）混淆","coll":"promote unity; a sense of unity; team unity","ex1":"Sports bring excitement, celebration and unity to the city.","ex2":"Playing on a team teaches you the value of unity."},{"en":"popularity","pos":"n.","zh":"受歡迎程度；名氣","cat":"考試重點詞","src":"Reading Focus / 詞彙練習","sent":"Baffled, Leonard looked around the pitch for the source of his sudden popularity.","exam":"詞形轉換經典：popular(adj.) → popularity(n.)；詞彙練習選詞填空直接考過","err":"重音移位：POP-ular → popu-LA-rity，讀音易錯；不可數名詞；gain popularity 搭配動詞用 gain","coll":"gain popularity; the popularity of a sport; sudden popularity","ex1":"Windsurfing gained popularity in Hong Kong after 1996.","ex2":"The popularity of fencing has grown quickly among teenagers."},{"en":"elite","pos":"adj./n.","zh":"精英的；精英","cat":"考試重點詞","src":"Reading Focus / Text 1 / 詞彙練習","sent":"A case in point is windsurfing, which became popular in Hong Kong after elite athlete Lee Lai-shan captured an Olympic gold in 1996.","exam":"詞彙練習選詞填空直接考過（seven elite athletes）；elite athletes 為香港體育新聞高頻搭配","err":"讀音 /ɪˈliːt/，來自法語，勿按串法讀成 e-lite；作形容詞放名詞前：elite athletes","coll":"elite athletes; an elite team","ex1":"Sports are for everyone, not just elite athletes.","ex2":"The judging panel was made up of seven elite athletes."},{"en":"record-breaking","pos":"adj.","zh":"破紀錄的","cat":"核心詞彙","src":"Reading Focus / 詞彙練習","sent":"Theirs was a record-breaking performance for our school as we have never placed in the top 3 before.","exam":"詞彙練習選詞填空直接考過；連字號複合形容詞構詞考點（record + breaking）；體育報道寫作常用","err":"連字號勿漏（record-breaking）；相關說法 break a record / set a record 動詞搭配須記","coll":"a record-breaking performance; record-breaking results","ex1":"She swam a record-breaking time in the 50m freestyle.","ex2":"The team delivered a record-breaking performance this season."},{"en":"fitness","pos":"n.","zh":"體能；健康狀態","cat":"核心詞彙","src":"Reading Focus / Text 1 / Text 3","sent":"Sports are worthwhile not just for their fitness benefits but also for their emotional rewards - especially for the satisfaction of having given one's all.","exam":"閱讀理解運動好處類題目高頻；搭配 improve overall fitness；詞形轉換 fit(adj.) → fitness(n.)","err":"不可數名詞；勿與 fit（合身；健康的）混用詞性；physical fitness 為固定搭配","coll":"fitness benefits; improve overall fitness; physical fitness","ex1":"Regular exercise helps you build up your fitness.","ex2":"Sessions are quick so you can burn calories and improve overall fitness."},{"en":"benefit","pos":"n./v.","zh":"好處；得益","cat":"考試重點詞","src":"Reading Focus / Text 1","sent":"(改編) Exercising outdoors brings endless benefits to one's health.","exam":"議論文寫作必用詞（the benefits of doing sports）；詞形轉換 benefit(n./v.) → beneficial(adj.)；閱讀理解列舉好處題高頻","err":"串法注意單 f 單 t（benefit）；bring benefits to sb 介詞用 to；動詞用法 benefit from sth","coll":"fitness benefits; bring benefits to; benefit from exercise","ex1":"Playing sports has many benefits for both body and mind.","ex2":"Students benefit from joining sports teams at school."},{"en":"satisfaction","pos":"n.","zh":"滿足感","cat":"考試重點詞","src":"Text 1 / 詞彙練習 / 單元評估","sent":"Sports are worthwhile not just for their fitness benefits but also for their emotional rewards - especially for the satisfaction of having given one's all.","exam":"單元評估選詞填空直接考過（the satisfaction you get from improving yourself）；詞形轉換 satisfy(v.) → satisfaction(n.) → satisfying/satisfied(adj.)","err":"不可數名詞；-ed/-ing 同族形容詞分辨：feel satisfied（人）vs a satisfying result（事）；串法 -faction","coll":"a sense of satisfaction; get satisfaction from; huge satisfaction","ex1":"Finishing a 10 km run gives you a great sense of satisfaction.","ex2":"Seeing him finally win the tournament gave me a lot of satisfaction."},{"en":"postpone","pos":"v.","zh":"延期；推遲","cat":"考試重點詞","src":"Reading Focus / Text 1","sent":"(改編) The Tokyo 2020 Olympic Games were postponed to 2021 because of the pandemic.","exam":"Text 1 核心背景詞（東京奧運延期）；閱讀理解因果題常考；同義替換 postpone = put off / delay","err":"串法 post-pone；被動式常用 be postponed to + 新日期；勿與 purpose 混淆外形","coll":"be postponed to; postpone the event; postpone a match","ex1":"The swimming gala was postponed because of the bad weather.","ex2":"Due to the heavy rain, the sports day was postponed to next Friday."},{"en":"include","pos":"v.","zh":"包括","cat":"考試重點詞","src":"Text 2","sent":"The fencing uniform includes a mask that completely encloses the head and the neck, protective pads, and a glove on the weapon hand.","exam":"Text 2 語境填詞直接考過：The gift bag includes some snacks, a notebook, and a pencil bag；第三身單數 -s 一併考","err":"including（介詞用法）與 includes（動詞）勿混；港生常漏第三身單數 -s；反義 exclude","coll":"include a mask; the price includes; including","ex1":"The course fee includes all the equipment you need.","ex2":"The uniform includes a jacket, breeches and fencing shoes."},{"en":"sensor","pos":"n.","zh":"感應器","cat":"考試重點詞","src":"Text 2","sent":"Points are recorded electronically using swords with built-in sensors.","exam":"Text 2 語境填詞直接考過：The automatic doors opened for her once she stepped in front of the sensors；科技類跨科詞彙（RaC）","err":"字尾 -or 不是 -er；詞形轉換 sense(v.) → sensor(n. 儀器)；勿與 censor（審查）混淆","coll":"built-in sensors; an electronic sensor","ex1":"The automatic doors have sensors that detect people.","ex2":"Fencing swords have built-in sensors to record points."},{"en":"entire","pos":"adj.","zh":"整個的；全部的","cat":"考試重點詞","src":"Text 2","sent":"In sabre, the entire upper body is a valid target.","exam":"Text 2 語境填詞直接考過：Tyler was so hungry that he ate the entire cake；同義替換 entire = whole","err":"只放名詞前（the entire body），不作補語（句子不說 The body is entire）；副詞 entirely 詞形轉換考點","coll":"the entire upper body; the entire day; the entire class","ex1":"The Johnson family spent their entire Sunday at Ocean Park.","ex2":"The entire school cheered when our team won."},{"en":"organize","pos":"v.","zh":"舉辦；組織","cat":"考試重點詞","src":"Text 2","sent":"The Fencing Club is organizing a two-hour fencing taster class in October.","exam":"Text 2 語境填詞直接考過：The home economics club is organising a baking competition next week；現在進行式表安排的經典例句","err":"英式串法 organise 與美式 organize 皆可，作答前後一致；進行式去 e 加 -ing（organizing）；詞形轉換 organize → organization","coll":"organize a class; organize an event; organize a competition","ex1":"Our school is organizing the Annual Swimming Gala next month.","ex2":"The Sports Club organizes a fun day every year."},{"en":"limited","pos":"adj.","zh":"有限的","cat":"考試重點詞","src":"Text 2","sent":"Places are limited, so act fast!","exam":"Text 2 語境填詞直接考過：The new limited edition figurine will only be sold for 3 days；宣傳文字（海報／通訊）寫作常用","err":"Places are limited 為海報常用句，勿寫成 Places are limit；詞形轉換 limit(n./v.) → limited(adj.)","coll":"places are limited; limited edition; a limited time","ex1":"Sign up early because places are limited.","ex2":"The offer is only available for a limited time."},{"en":"demanding","pos":"adj.","zh":"費力的；要求高的","cat":"考試重點詞","src":"單元評估","sent":"Some people think it is one of the most demanding water sports.","exam":"單元評估閱讀篇章關鍵詞；one of the most + 形容詞 + 複數名詞句式為文法一併考點","err":"-ing 形容詞：活動 demanding（要求高），人 demanded 不是形容詞用法；勿與 demand(v. 要求) 混用詞性","coll":"a demanding sport; physically demanding; a demanding timetable","ex1":"Canoeing is one of the most demanding water sports.","ex2":"Training every day is demanding, but it is worth it."},{"en":"affordable","pos":"adj.","zh":"價錢相宜的；負擔得起的","cat":"考試重點詞","src":"單元評估 / 綜合任務對話","sent":"There are social centres that offer short courses for affordable fees.","exam":"單元評估閱讀理解考過同義改寫（affordable = not expensive / low fees）；綜合任務出現 acceptable and affordable","err":"構詞 afford(v.) + -able；勿說 afford to buy 之外亂配：can afford sth / affordable prices；串法雙 f","coll":"affordable fees; at an affordable price","ex1":"The judo course costs $800, which most students find affordable.","ex2":"The centre offers beginner classes at affordable prices."},{"en":"worthwhile","pos":"adj.","zh":"值得做的；有價值的","cat":"考試重點詞","src":"Text 1 / 單元評估","sent":"But she says it was a worthwhile experience, as it's a great way to learn how to balance yourself and develop your muscle strength.","exam":"單元評估引句題考過（證明 Lena 有正面經驗的引文）；Text 1 主題句 Sports are worthwhile... 為閱讀理解主旨題核心","err":"一個字寫法（worthwhile）；與 worth it 意思相近但用法不同：a worthwhile experience（放名詞前）","coll":"a worthwhile experience; worthwhile activities","ex1":"Learning a new sport is always a worthwhile experience.","ex2":"The training was hard but worthwhile."},{"en":"tricky","pos":"adj.","zh":"棘手的；不易應付的","cat":"口語常用","src":"單元評估","sent":"It's very tricky trying to stay upright, let alone skiing down without falling over!","exam":"單元評估閱讀理解及海報填充考過（It's pretty tricky trying to keep your balance）；口語感形容詞","err":"y 結尾比較級 trickier；It is tricky doing/to do sth 句式；比 difficult 口語化","coll":"pretty tricky; a tricky question; tricky to learn","ex1":"Snowboarding is tricky at first, but you improve quickly.","ex2":"It was tricky trying to balance on the moving deck."},{"en":"balance","pos":"v./n.","zh":"保持平衡；平衡","cat":"高頻基礎詞","src":"單元評估","sent":"It's a great way to learn how to balance yourself and develop your muscle strength.","exam":"單元評估段落填詞直接考過（learn to better balance yourself）；運動主題高頻；keep your balance 為固定搭配","err":"動詞與名詞同形：balance yourself（動詞）／keep your balance（名詞）；串法 -ance","coll":"balance yourself; keep your balance; lose your balance","ex1":"It is hard to keep your balance on a snowboard.","ex2":"Yoga helps you learn to balance your body."},{"en":"strength","pos":"n.","zh":"力量；強項","cat":"高頻基礎詞","src":"單元評估 / Text 3","sent":"It's a great way to learn how to balance yourself and develop your muscle strength.","exam":"單元評估段落填詞直接考過（develop your physical strength）；一詞兩義：力量／強項（strengths and weaknesses）","err":"串法 streng-th 極易漏 g；詞形轉換 strong(adj.) → strength(n.) → strengthen(v.) 為詞族經典考點","coll":"muscle strength; strengths and weaknesses; build up strength","ex1":"Rock climbing requires a lot of strength and skills.","ex2":"A virtual coach helps you understand your strengths and weaknesses."},{"en":"enhance","pos":"v.","zh":"增強；提升","cat":"考試重點詞","src":"單元評估","sent":"It also keeps you healthy by enhancing your muscle strength.","exam":"單元評估選詞填空直接考過（enhancing your muscle strength）；同義替換 enhance = improve，寫作升級詞","err":"後接名詞（enhance your fitness）；by + -ing 句式中要用 enhancing；串法 en-hance","coll":"enhance muscle strength; enhance one's skills","ex1":"Regular training enhances your speed and stamina.","ex2":"I wished to enhance my overall strength."},{"en":"alleviate","pos":"v.","zh":"減輕；紓緩","cat":"考試重點詞","src":"單元評估","sent":"It's a great way to improve your mood and alleviate stress.","exam":"單元評估選詞填空直接考過（alleviate stress）；健康主題寫作高分詞，同義 relieve / reduce","err":"串法 alle-vi-ate 雙 l；固定搭配 alleviate stress/pain；勿與 elevate（提升）混淆外形","coll":"alleviate stress; alleviate pain","ex1":"Doing sports helps alleviate stress after a busy school week.","ex2":"Listening to music can alleviate exam pressure."},{"en":"obstacle","pos":"n.","zh":"障礙；阻礙","cat":"考試重點詞","src":"Text 1 活動 / 單元評估","sent":"To get better at your sport, you have to train regularly and try to overcome obstacles.","exam":"單元評估選詞填空直接考過（overcome obstacles）；搭配動詞 overcome / face 為考點","err":"串法 ob-sta-cle；overcome obstacles 為固定搭配，勿說 win obstacles；多用複數","coll":"overcome obstacles; face obstacles; obstacles facing the event","ex1":"Despite many obstacles, the Tokyo Olympics were finally held in 2021.","ex2":"Athletes must overcome obstacles like injuries and pressure."},{"en":"self-discipline","pos":"n.","zh":"自律","cat":"考試重點詞","src":"單元評估","sent":"If you want to develop self-discipline and to better control yourself in difficult situations, playing sports is a great way to do so.","exam":"單元評估選詞填空直接考過；品格價值類名詞，議論文寫作高分詞","err":"連字號複合詞（self-discipline）；不可數；串法 disci-pline 注意 sc","coll":"develop self-discipline; a lack of self-discipline","ex1":"Training every morning takes a lot of self-discipline.","ex2":"Sports teach teenagers self-discipline and teamwork."},{"en":"fair play","pos":"n.","zh":"公平競賽（精神）","cat":"考試重點詞","src":"單元評估","sent":"But I think the best thing about playing sports is that you'll learn the importance of fair play.","exam":"單元評估選詞填空直接考過；運動精神主題寫作與口試常用；與 sportsmanship（體育精神）同場出現","err":"兩個字寫法，不加連字號；不可數；勿直譯成 justice game","coll":"the importance of fair play; show fair play","ex1":"Fair play matters more than winning.","ex2":"The coach reminded us that fair play matters more than any trophy, and winning by cheating is meaningless."},{"en":"medal","pos":"n.","zh":"獎牌","cat":"高頻基礎詞","src":"Reading Focus / 詞彙練習","sent":"Two players were awarded silver medals for their individual performance.","exam":"體育主題最高頻名詞；搭配 win/be awarded a medal；gold/silver/bronze medal 三色須熟","err":"勿與 model（模型）或 metal（金屬）混淆串法讀音；win a medal 動詞用 win 不用 get 較地道","coll":"win a gold medal; be awarded a medal; Olympic medals","ex1":"She won a silver medal in the fencing competition.","ex2":"Hong Kong athletes took home several medals from the Games."},{"en":"coach","pos":"n.","zh":"教練","cat":"高頻基礎詞","src":"詞彙練習 / Text 3 / 單元評估","sent":"Coach Leslie Fan is very proud of the team.","exam":"聽力與閱讀高頻人物詞；單元評估出現 train with qualified coaches；Text 3 出現 virtual coach（虛擬教練）","err":"一詞多義：教練／旅遊巴，靠語境分辨；複數 coaches（-es）","coll":"a qualified coach; a virtual coach; train with a coach","ex1":"The best way to learn canoeing is to train with qualified coaches.","ex2":"Our coach came up with new strategies for the basketball team."},{"en":"teamwork","pos":"n.","zh":"團隊合作","cat":"核心詞彙","src":"單元評估","sent":"'Teamwork and team spirit in canoeing are very important,' says Austin Wong, the youngest member of his school canoeing team.","exam":"單元評估海報填充直接考過（teamwork and team spirit are essential）；不可數名詞；價值教育主題高頻","err":"一個字寫法（teamwork）勿分開；不可數，勿加 -s；team spirit（團隊精神）為姊妹搭配","coll":"teamwork and team spirit; good teamwork","ex1":"Teamwork is essential in team sports like canoeing.","ex2":"Good teamwork helped us win the relay race."},{"en":"gym","pos":"n.","zh":"健身室；體育館","cat":"高頻基礎詞","src":"Text 3 / Write more","sent":"Sessions are quick so you can burn calories and improve overall fitness without spending hours slaving away at the gym.","exam":"運動場地高頻詞；at/in the gym 介詞搭配；gymnasium 的縮寫，口語聽力常見","err":"讀音 /dʒɪm/ 與人名 Jim 相同；go to the gym 記得加 the","coll":"at the gym; go to the gym; a school gym","ex1":"Students who want to give this new sport a try can head to the gym today.","ex2":"He works out at the gym twice a week."},{"en":"uniform","pos":"n.","zh":"制服；運動服","cat":"日常實用","src":"Text 2 / 聽力對話","sent":"Everyone, including those who are not competing on that day, should wear their P.E. uniform.","exam":"聽力細節題直接考過（wear their PE uniform）；wear a uniform 搭配動詞用 wear","err":"讀音以 /j/ 開首，冠詞用 a uniform 不用 an；港生常受中文影響說 wear uniform 漏冠詞或所有格","coll":"PE uniform; wear a uniform; school uniform","ex1":"Frances is a police officer. She has to wear a uniform at work.","ex2":"Everyone must wear their PE uniform on the day of the gala."},{"en":"enrol","pos":"v.","zh":"報名；登記入讀","cat":"日常實用","src":"聽力對話","sent":"Apart from filling out paper forms, students can also enrol through the school website, where a digital form is available.","exam":"聽力細節題直接考過（enrol through the school website）；活動通告寫作常用；名詞 enrolment（報名人數）","err":"英式串法一個 l（enrol），-ing 形雙 l（enrolling）；搭配 enrol in a course / enrol through the website","coll":"enrol in a course; enrol through the website; enrolment deadline","ex1":"Students can enrol in the judo course online.","ex2":"Enrolling digitally is much quicker than using a paper form."},{"en":"deadline","pos":"n.","zh":"截止日期","cat":"日常實用","src":"綜合任務對話","sent":"The registration deadline is on the thirtieth of September.","exam":"綜合任務海報必填項目（registration deadline）；聽力日期題高頻；meet/miss the deadline 搭配考點","err":"複合名詞一個字寫法；before the deadline（截止前）介詞用 before；勿直譯成 dead day","coll":"registration deadline; meet the deadline; miss the deadline","ex1":"The deadline for signing up is this Friday.","ex2":"Hand in your application form before the deadline."},{"en":"fee","pos":"n.","zh":"費用","cat":"日常實用","src":"單元評估 / 綜合任務對話","sent":"As for the course fee, we did a survey on that earlier and found that eight hundred dollars per person is a level most students find acceptable and affordable.","exam":"綜合任務海報必填項目（course fee）；單元評估出現 affordable fees；聽力價錢數字題高頻","err":"雙 e 串法（fee）勿與 few 混淆；course fee / entrance fee 複合搭配；per person（每人）常連用","coll":"course fee; affordable fees; an entrance fee","ex1":"The course fee is $800 per person.","ex2":"Some social centres offer short courses for affordable fees."},{"en":"thrill","pos":"n.","zh":"興奮刺激的感覺","cat":"口語常用","src":"單元評估","sent":"There are a few snowboard sports centres in town for you to experience the thrill of the winter sport.","exam":"單元評估閱讀篇章關鍵詞；experience the thrill of 為宣傳文字常用句式；詞族 thrilled / thrilling","err":"雙 l 串法（thrill）；-ed/-ing 分辨：I was thrilled（人）vs a thrilling game（事）","coll":"experience the thrill of; the thrill of winning","ex1":"Come and experience the thrill of rock climbing!","ex2":"Nothing beats the thrill of scoring the winning goal."},{"en":"fan","pos":"n.","zh":"迷；粉絲","cat":"口語常用","src":"Reading Focus / 單元評估","sent":"Everyone here knows that I'm a big sports fan - I love playing all kinds of sports.","exam":"單元評估選詞填空直接考過（a big sports fan）；口試自我介紹常用；一詞多義：粉絲／風扇","err":"a big fan of sth 介詞用 of；與「風扇」同形，靠語境分辨；複數 fans","coll":"a big sports fan; a fan of Messi; cheering fans","ex1":"I am a big fan of the Hong Kong fencing team.","ex2":"Thousands of fans waited outside the stadium."},{"en":"swoon","pos":"v.","zh":"（因傾慕而）陶醉；神魂顛倒","cat":"口語常用","src":"Reading Focus / 詞彙練習","sent":"Nobody on his team was famous enough for fans to swoon over their mere presence, and yet the crowd was going wild.","exam":"詞彙練習選詞填空直接考過（fans swoon over stars）；描寫粉絲反應的生動用詞","err":"搭配 swoon over sb；雙 o 串法；帶誇張幽默語氣，正式寫作少用","coll":"swoon over a star; make fans swoon","ex1":"The fans swooned when the famous swimmer waved at them.","ex2":"Everyone swooned over the team captain after he scored."}],"phrases":[{"phrase":"a case in point","zh":"一個典型例子","type":"課文短語","sent":"A case in point is windsurfing, which became popular in Hong Kong after elite athlete Lee Lai-shan captured an Olympic gold in 1996.","note":"舉例時用，= a perfect example；常作主語：A case in point is...，議論文舉例句式，比 for example 高級。","ex":"There are many talented sports teams in Hong Kong; a case in point is the Women's Table Tennis team, which won a medal in the 2021 Olympics."},{"phrase":"draw interest","zh":"引起興趣；吸引關注","type":"課文短語","sent":"Medallists in particular often draw new public interest to and participation in their sports.","note":"draw 在此解「吸引」；常說 draw interest to sth / draw the public's interest；同類搭配 draw attention。","ex":"I hope to draw interest to this new bouldering club by promoting it during our morning assembly."},{"phrase":"give one's all","zh":"全力以赴","type":"課文短語","sent":"Sports are worthwhile not just for their fitness benefits but also for their emotional rewards - especially for the satisfaction of having given one's all.","note":"one's 隨主語變（give your all / gave her all）；= try one's best，運動與勵志寫作常用。","ex":"Sarah gave her all and won first place in the 50m freestyle last week."},{"phrase":"in particular","zh":"尤其；特別是","type":"課文短語","sent":"Medallists in particular often draw new public interest to and participation in their sports.","note":"可放在強調的名詞之後（Medallists in particular...）或句尾；= especially，議論文點出重點對象時用。","ex":"Older adults in particular are more prone to injuries if they do not stretch before exercising."},{"phrase":"like no other","zh":"獨一無二的","type":"課文短語","sent":"The Tokyo 2020 Olympic Games were like no other.","note":"放 be 動詞後或名詞後（a city like no other）；= one of a kind，強調與眾不同，開首句吸睛好用。","ex":"With its beautiful campus and advanced sports facilities, our school is truly like no other."},{"phrase":"make the cut","zh":"入選；達標獲選","type":"課文短語","sent":"Sports that made the cut","note":"指通過篩選、成功入圍（新項目入選奧運／球員入選校隊）；cut 前必用 the。","ex":"Only the best players can make the cut and become a part of our basketball team."},{"phrase":"needless to say","zh":"不用說；當然","type":"課文短語","sent":"Needless to say, the decisions were not taken lightly.","note":"多放句首後加逗號，也可插入句中；帶出顯而易見的事，= obviously，寫作過渡語。","ex":"Needless to say, you must show good sportsmanship even if you lose."},{"phrase":"take sth lightly","zh":"輕視；不認真看待","type":"課文短語","sent":"Needless to say, the decisions were not taken lightly.","note":"多用否定：not take sth lightly（非常重視）；受詞可放中間（take their instructions lightly）。","ex":"We should not take lightly the importance of a good night's sleep to one's physical health."},{"phrase":"give sth a try","zh":"試一試","type":"課文短語","sent":"Want to give this exciting yet elegant game a try?","note":"受詞放中間（give fencing a try）；宣傳文字常用疑問句 Want to give... a try? 吸引讀者。","ex":"I gave archery a try last week but I wasn't very good at it."},{"phrase":"on top of that","zh":"此外；再加上","type":"課文短語","sent":"On top of all that, fencers wear a jacket, breeches, stockings and fencing shoes - all made with tough fabrics.","note":"遞進連接語，= in addition / moreover；單元評估考過四字同義表達（on top of that = moreover）；亦可接名詞：on top of having strong arms。","ex":"Student athletes need to train regularly, but on top of that, they have to keep up with their homework, too."},{"phrase":"bring one's A-game","zh":"拿出最佳狀態","type":"課文短語","sent":"With a virtual coach by your side, you can train smarter to perfect your technique, and prepare to bring your A-game when it's crunch time.","note":"A-game 指最高水準表現；one's 隨主語變（bring their A-game）；口語感強，體育報道常見。","ex":"I wanted to win a gold medal, so I made sure to bring my A-game on Sports Day."},{"phrase":"in detail","zh":"詳細地","type":"課文短語","sent":"In the past, a coach would film an athlete to analyse their performance in detail.","note":"放動詞或受詞後（analyse sth in detail）；detail 用單數，勿說 in details。","ex":"The doctor took a look at the patient's medical history in detail."},{"phrase":"one's cup of tea","zh":"心頭好；合自己口味的事","type":"課文短語","sent":"If short but high-energy exercise is your cup of tea, try HIIT, or high-intensity interval training.","note":"指個人喜好，常用於肯定或否定（It's not my cup of tea = 我不喜歡）；所有格隨人變。","ex":"Gymnastics is my cup of tea when it comes to watching live sports because it looks the most impressive to me."},{"phrase":"play one's part","zh":"盡自己的本分；出一分力","type":"課文短語","sent":"As the world unites to fight climate change, we can all play our part - by exercising.","note":"one's 隨主語變（play our part / played his part）；後可接 by + -ing 說明做法；公民責任類寫作常用。","ex":"The audience should play their part by cheering for the competing athletes."},{"phrase":"slave away","zh":"拼命苦幹","type":"課文短語","sent":"Sessions are quick so you can burn calories and improve overall fitness without spending hours slaving away at the gym.","note":"強調長時間辛苦地工作／練習，常接 at + 地點（slave away at the gym）；帶誇張語氣。","ex":"My classmates slaved away all week to practise their cheerleading routine for Sports Day."},{"phrase":"sign up (for)","zh":"報名（參加）","type":"日常表達","sent":"Afterwards, you can sign up for our four-week 'Fencing for Beginners' course, starting in the following month.","note":"sign up for + 課程／活動；聽力與海報寫作最高頻的報名用語，同義 enrol in。","ex":"Remember to sign up for the judo course before 30 September."},{"phrase":"win or lose","zh":"無論勝負","type":"寫作句式","sent":"Win or lose, there is always the next competition to look forward to.","note":"放句首作讓步語，後加逗號；= whether you win or lose，Text 1 活動考過此改寫；運動主題作文金句。","ex":"Win or lose, we should be proud of ourselves for trying our best."},{"phrase":"keep sb updated","zh":"隨時告知某人最新消息","type":"口語短語","sent":"Let's hope our students will be interested. I'll keep you updated about the enrolment.","note":"常用於對話或電郵結尾承諾跟進；updated 用過去分詞；同義 keep sb posted。","ex":"I'll keep you updated about the match schedule."}]},{"key":"1A_U4","form":"F1","book":"1A","num":4,"theme":"Start packing","theme_zh":"出發旅遊；收拾行裝","words":[{"en":"attraction","pos":"n.","zh":"景點；吸引人的事物","cat":"核心詞彙","src":"Reading Focus / 詞彙練習 / 單元評估","sent":"I'm writing to let you know my plans ahead of time in case you want to visit any of the attractions with me.","exam":"選詞填空高頻答案；閱讀理解找旅遊景點細節常見；亦考搭配 tourist attraction","err":"可數名詞，說多個景點要加 -s（attractions）；港生易誤讀重音，正確為 at-TRAC-tion","coll":"tourist attraction; visit an attraction; popular attractions","ex1":"The Big Buddha is one of the most popular attractions in Hong Kong.","ex2":"We visited three famous attractions on the first day of our trip."},{"en":"accommodation","pos":"n.","zh":"住宿","cat":"考試重點詞","src":"Reading Focus / 詞彙練習 / 單元評估","sent":"After that, you'll have to arrange for accommodation.","exam":"選詞填空高頻；單元評估考過 arrange for accommodation；英式串法為不可數名詞","err":"串法注意雙 c 雙 m（accommodation），港生最常拼錯的長字之一；不可數，勿說 an accommodation 或 accommodations","coll":"arrange for accommodation; cheap accommodation; provide accommodation","ex1":"The hostel offers clean and affordable accommodation for backpackers.","ex2":"We booked our accommodation ahead of time to save money."},{"en":"itinerary","pos":"n.","zh":"行程表","cat":"核心詞彙","src":"詞彙練習 / 單元評估 / Integrated Task","sent":"Next, plan your itinerary to get an idea of what activities you will do outside of work.","exam":"綜合任務要求完成 itinerary，屬單元核心任務詞；選詞填空常見","err":"串法 i-tin-er-a-ry 又長又易錯，注意 -nerary；讀音重音在 -TIN-","coll":"plan an itinerary; complete an itinerary; a busy itinerary","ex1":"Our tour guide made a detailed itinerary for the four-day trip.","ex2":"According to the itinerary, we will visit the museum in the morning."},{"en":"destination","pos":"n.","zh":"目的地","cat":"核心詞彙","src":"Reading Focus / 單元評估","sent":"Choose a destination that has always interested you or, if you are on a budget, somewhere affordable that doesn't require you to break the bank.","exam":"選詞填空高頻；閱讀理解常考 foreign destination（外地目的地）","err":"串法注意 -tina-（destination）；勿與 destiny（命運）混淆","coll":"travel destination; foreign destination; reach the destination","ex1":"Japan is a favourite travel destination for many Hong Kong people.","ex2":"We finally arrived at our destination after a long flight."},{"en":"souvenir","pos":"n.","zh":"紀念品","cat":"核心詞彙","src":"Text 2","sent":"Then, you won't have many expenses besides souvenirs, sampling the local cuisine and maybe a SIM card.","exam":"Text 2 選詞填空考過：I bought a few souvenirs to remember my trip；旅遊主題必用詞","err":"法語借詞串法 sou-ve-nir 易錯；讀音 /ˌsuːvəˈnɪə/ 港生易讀錯","coll":"buy a souvenir; a souvenir shop; souvenirs from a trip","ex1":"I bought a small souvenir for my mum at the airport.","ex2":"This fridge magnet is a souvenir from my trip to Macau."},{"en":"sightseeing","pos":"n.","zh":"觀光；遊覽","cat":"核心詞彙","src":"Text 2 / 詞彙練習","sent":"The Victoria Peak is a popular sightseeing spot among tourists.","exam":"Text 2 選詞填空考過 sightseeing spot；Word Power 複合名詞 sight + seeing 考點","err":"複合名詞一個字寫（sightseeing），勿分開；不可數名詞，勿加 -s","coll":"go sightseeing; a sightseeing spot; sightseeing tour","ex1":"We went sightseeing around the old town in the afternoon.","ex2":"There are many sightseeing spots along the harbour."},{"en":"budget","pos":"n.","zh":"預算","cat":"考試重點詞","src":"Reading Focus / 詞彙練習 / 單元評估","sent":"I can't wait for our trip to Seoul, but I'm so worried we might go over budget.","exam":"選詞填空高頻；固定搭配 on a budget / go over budget / a shoestring budget 為考點","err":"串法 bud-get（勿寫 budjet）；on a budget（預算有限）港生易漏冠詞","coll":"on a budget; go over budget; a tight budget","ex1":"We are travelling on a budget, so we will stay in a hostel.","ex2":"Try not to go over budget when you shop for souvenirs."},{"en":"passport","pos":"n.","zh":"護照","cat":"高頻基礎詞","src":"Reading Focus / 詞彙練習","sent":"I just got my passport renewed yesterday and I am ready to go!","exam":"旅遊主題高頻基礎詞；選詞填空及聽力常見；複合名詞 pass + port","err":"串法雙 s（passport），港生易漏一個 s；讀音 /ˈpɑːspɔːt/","coll":"renew a passport; a valid passport; show your passport","ex1":"Remember to bring your passport when you travel abroad.","ex2":"My passport will expire next year, so I need to renew it."},{"en":"backpack","pos":"n.","zh":"背包","cat":"高頻基礎詞","src":"Reading Focus / 詞彙練習","sent":"Gosh, I can't wait to pack my backpack now!","exam":"旅遊主題高頻基礎詞；複合名詞 back + pack；相關詞 backpacker（背包客）詞形轉換考點","err":"複合名詞一個字（backpack）；勿與 backpacker（人）混淆","coll":"pack a backpack; carry a backpack; a heavy backpack","ex1":"I put my water bottle and camera in my backpack.","ex2":"A light backpack is easier to carry when you travel."},{"en":"tourist","pos":"n.","zh":"遊客","cat":"高頻基礎詞","src":"單元評估 / 詞彙練習","sent":"Apart from visiting tourist hotspots, you might also want to mingle with locals and get an authentic experience.","exam":"詞形轉換考點：tour(v.) → tourist(n. 人) → tourism(n. 業)；閱讀理解高頻","err":"勿與 tour（旅程）、tourism（旅遊業）混用；tourist attraction / tourist spot 為固定搭配","coll":"a tourist attraction; tourist spot; foreign tourists","ex1":"Many tourists visit Hong Kong to try the local food.","ex2":"The night market is always full of tourists at weekends."},{"en":"hostel","pos":"n.","zh":"旅舍；青年旅館","cat":"核心詞彙","src":"Reading Focus / 詞彙練習","sent":"I've just returned to my hostel room after my last day in Laos.","exam":"旅遊住宿類選詞填空常見；閱讀理解常與 hotel、guesthouse 作對比","err":"勿與 hotel 混淆：hostel 較便宜、多為共用房間；讀音 /ˈhɒstl/","coll":"a youth hostel; stay in a hostel; a hostel room","ex1":"Backpackers often stay in a hostel to save money.","ex2":"The hostel has a shared kitchen for all the guests."},{"en":"landmark","pos":"n.","zh":"地標","cat":"核心詞彙","src":"Reading Focus / 詞彙練習 / Text 2","sent":"I have hired a local tour guide recommended by the tourism office to take me around other landmarks on days 4 through 6.","exam":"選詞填空高頻；閱讀理解找 well-known attraction 的名詞常考（landmark）；複合名詞 land + mark","err":"複合名詞一個字寫（landmark）；港生易誤說 a famous landmark building 冗贅","coll":"a famous landmark; historic landmark; a local landmark","ex1":"The clock tower is a famous landmark in Tsim Sha Tsui.","ex2":"As a local landmark, the monastery attracts many visitors."},{"en":"architecture","pos":"n.","zh":"建築；建築風格","cat":"考試重點詞","src":"Reading Focus / 詞彙練習 / 單元評估","sent":"I am looking forward to seeing the National Monument as well as iconic architecture like the Masjid Jamek Mosque.","exam":"選詞填空高頻；詞形轉換 architect(n. 建築師) → architecture(n. 建築)；閱讀理解常考","err":"串法長且易錯（ar-chi-tec-ture）；ch 讀 /k/ 音，港生易讀錯；不可數名詞","coll":"modern architecture; iconic architecture; beautiful architecture","ex1":"The old buildings show the beautiful architecture of the past.","ex2":"Tourists love the colourful architecture in Senado Square."},{"en":"museum","pos":"n.","zh":"博物館","cat":"高頻基礎詞","src":"Reading Focus / 詞彙練習","sent":"I'm going to visit two major museums - the National Museum of Malaysia and the Royal Museum - the day after to learn about Malaysia's history.","exam":"旅遊主題高頻基礎詞；選詞填空及聽力常見","err":"串法 mu-se-um 易漏中間 e；讀音 /mjuːˈziːəm/ 重音在中間，港生常讀錯","coll":"visit a museum; a history museum; go to the museum","ex1":"We spent the whole morning in the science museum.","ex2":"The museum has an exhibition of ancient Chinese art."},{"en":"exhibition","pos":"n.","zh":"展覽","cat":"考試重點詞","src":"Reading Focus / 詞彙練習","sent":"On my final day, I'm going to go to the National Visual Arts Gallery to see the exhibitions there.","exam":"選詞填空高頻；詞形轉換 exhibit(v.) → exhibition(n.)","err":"串法有不發音的 h（exhibition），讀 /ˌeksɪˈbɪʃn/，港生易多讀 h 音","coll":"an art exhibition; hold an exhibition; visit an exhibition","ex1":"There is a photo exhibition at the city hall this week.","ex2":"The exhibition shows how people lived a hundred years ago."},{"en":"admission","pos":"n.","zh":"入場費；入場","cat":"考試重點詞","src":"Reading Focus / 詞彙練習","sent":"The admission fee doesn't seem too expensive so I figured it wouldn't hurt to check it out.","exam":"選詞填空常見；固定搭配 free admission（免費入場）/ admission fee（入場費）","err":"串法雙 s（admission）；free admission 為不可數用法，勿加冠詞說 a free admission","coll":"admission fee; free admission; buy an admission ticket","ex1":"Admission to the museum is free on Wednesdays.","ex2":"We paid the admission fee and went into the theme park."},{"en":"embark","pos":"v.","zh":"展開；踏上（旅程）","cat":"考試重點詞","src":"Reading Focus / 單元評估","sent":"There are many things you need to prepare before you embark on a working holiday.","exam":"單元評估選詞填空考過 embark on a working holiday；固定搭配 embark on sth","err":"後接介詞 on（embark on a journey），港生易漏；勿與 embarrass 混淆串法","coll":"embark on a journey; embark on an adventure; embark on a trip","ex1":"We embarked on an exciting adventure to a foreign country.","ex2":"Before you embark on your trip, remember to pack a passport."},{"en":"mingle","pos":"v.","zh":"交際；與人融合往來","cat":"考試重點詞","src":"Reading Focus / Text 1 / 單元評估","sent":"Apart from visiting tourist hotspots, you might also want to mingle with locals and get an authentic experience.","exam":"選詞填空常見；固定搭配 mingle with locals（與當地人交流）","err":"後接 with（mingle with sb）；串法 min-gle，港生易與 single 混淆讀音","coll":"mingle with locals; mingle with the crowd; mingle with new people","ex1":"Travelling lets you mingle with people from different places.","ex2":"At the party, the newcomers mingled with the other guests."},{"en":"affordable","pos":"adj.","zh":"負擔得起的；價錢相宜的","cat":"考試重點詞","src":"Reading Focus / 詞彙練習 / 單元評估","sent":"I wasn't a fan of this place when I first arrived, because although it is a very affordable hostel, it doesn't offer much privacy.","exam":"選詞填空高頻；詞形轉換 afford(v.) → affordable(adj.)；描寫旅遊開支常用","err":"串法雙 f（affordable）；港生易把 afford 後接錯，記得 can afford to do sth","coll":"affordable accommodation; an affordable price; affordable and comfortable","ex1":"The hostel is clean and affordable for students.","ex2":"We found an affordable hotel near the train station."},{"en":"rewarding","pos":"adj.","zh":"有意義的；有回報的","cat":"核心詞彙","src":"Reading Focus / 詞彙練習 / 單元評估","sent":"It was a difficult thing to do but a rewarding one as well.","exam":"選詞填空高頻；-ed/-ing 形容詞分辨：rewarding（事物令人有收穫）；詞形轉換 reward(n./v.) → rewarding(adj.)","err":"港生易與 reward（獎賞）混用；表達「一次有意義的體驗」用 a rewarding experience","coll":"a rewarding experience; rewarding and meaningful; a rewarding trip","ex1":"Volunteering abroad is a rewarding way to spend your holiday.","ex2":"Learning about a new culture is both fun and rewarding."},{"en":"meaningful","pos":"adj.","zh":"有意義的","cat":"高頻基礎詞","src":"Reading Focus / 詞彙練習","sent":"One of the most meaningful moments of my trip was seeing the ancient Buddha statues hidden inside the Pak Ou caves.","exam":"選詞填空常見；詞形轉換 mean(v.) → meaning(n.) → meaningful(adj.)","err":"-ful 只有一個 l（meaningful）；勿與 meaningless（無意義的）混淆","coll":"a meaningful trip; a meaningful experience; meaningful moments","ex1":"Helping the local community made the trip more meaningful.","ex2":"It was a meaningful holiday that I will never forget."},{"en":"spectacular","pos":"adj.","zh":"壯觀的；引人入勝的","cat":"考試重點詞","src":"詞彙練習","sent":"Over the past few weeks I've gone on a cycle tour along the Mekong Riverfront, kayaked over rivers, and seen some spectacular waterfalls and caves.","exam":"選詞填空常見；描寫景色的高分形容詞；同義 stunning / breathtaking","err":"串法 spec-ta-cu-lar；港生易與 special、spectator 混淆","coll":"a spectacular view; spectacular scenery; a spectacular waterfall","ex1":"The view from the top of the hill was spectacular.","ex2":"We watched a spectacular sunset over the sea."},{"en":"once-in-a-lifetime","pos":"adj.","zh":"一生一次的；千載難逢的","cat":"核心詞彙","src":"Reading Focus / 詞彙練習 / Text 1","sent":"Did you know that you don't need to break the bank for a once-in-a-lifetime holiday experience?","exam":"選詞填空考過；連字號複合形容詞寫法為 Word Power 考點","err":"連字號不可漏（once-in-a-lifetime），四個部分全部用連字號連起；放名詞前作修飾","coll":"a once-in-a-lifetime experience; a once-in-a-lifetime chance","ex1":"Seeing the Northern Lights was a once-in-a-lifetime experience.","ex2":"Travelling to space is a once-in-a-lifetime dream for many people."},{"en":"luxury","pos":"n.","zh":"奢華；奢侈品","cat":"核心詞彙","src":"Reading Focus / Text 1","sent":"Visiting other countries is an inspiring experience, but for many it is an unaffordable luxury.","exam":"閱讀理解同義替換常見；詞形轉換 luxury(n.) → luxurious(adj.)","err":"串法 lux-u-ry；讀音 /ˈlʌkʃəri/ 港生易讀錯；勿與 luxurious（形容詞）混用","coll":"a luxury hotel; live in luxury; an unaffordable luxury","ex1":"Staying in a five-star hotel is a luxury we cannot afford.","ex2":"The resort offers luxury and comfort to its guests."},{"en":"privacy","pos":"n.","zh":"私隱；私人空間","cat":"日常實用","src":"Reading Focus / 詞彙練習","sent":"Although it is a very affordable hostel, it doesn't offer much privacy - I have to share my room with 5 strangers!","exam":"選詞填空常見；不可數名詞，常與 much/little 連用","err":"讀音 /ˈprɪvəsi/，重音在前，港生易讀成 /praɪ-/；不可數，勿加 -s","coll":"have privacy; offer privacy; respect someone's privacy","ex1":"A private room gives you more privacy than a shared dorm.","ex2":"Everyone needs some privacy, even when travelling with friends."},{"en":"overnight","pos":"adv.","zh":"過夜；通宵","cat":"日常實用","src":"Reading Focus / 詞彙練習","sent":"I've actually always wanted to stay overnight at an amusement park.","exam":"選詞填空常見；複合詞 over + night；可作副詞或形容詞（an overnight trip）","err":"作副詞時前面不加介詞：stay overnight（勿說 stay in overnight）；一個字寫","coll":"stay overnight; an overnight trip; travel overnight","ex1":"We stayed overnight in a small town on the way.","ex2":"They took an overnight train to the next city."},{"en":"tour guide","pos":"n.","zh":"導遊","cat":"高頻基礎詞","src":"Reading Focus / 詞彙練習","sent":"I actually think hiring a tour guide would make the trip run more smoothly, especially since neither of us can speak Korean.","exam":"旅遊主題高頻詞；聽力及閱讀理解常出現；複合名詞 tour + guide","err":"兩個字分開寫（tour guide）；勿與 tourist（遊客）混淆","coll":"hire a tour guide; a local tour guide; follow the tour guide","ex1":"Our tour guide told us many interesting stories about the city.","ex2":"A good tour guide can make your trip more enjoyable."},{"en":"off season","pos":"n.","zh":"淡季","cat":"考試重點詞","src":"Reading Focus / 詞彙練習 / Text 1 / 單元評估","sent":"Discounted tickets are more common in the off season, especially if you book well ahead of time.","exam":"選詞填空常見；閱讀理解常與 peak season（旺季）作對比","err":"作名詞常用 in the off season；連字號形容詞用 off-season tickets；港生易漏 the","coll":"in the off season; off-season tickets; travel in the off season","ex1":"Hotels are much cheaper in the off season.","ex2":"We travelled in the off season to avoid the crowds."},{"en":"wanderlust","pos":"n.","zh":"旅遊癖；強烈的旅行渴望","cat":"核心詞彙","src":"Reading Focus / 詞彙練習","sent":"I think we both have a lot of wanderlust, so we naturally have loads of places we want to visit.","exam":"旅遊主題特色詞；閱讀理解常考語意（a strong desire to travel）","err":"串法 wander（漫遊）+ lust，勿寫成 wonder；不可數名詞","coll":"have wanderlust; a sense of wanderlust; full of wanderlust","ex1":"Her wanderlust makes her want to visit every country in the world.","ex2":"Reading travel blogs gives me a strong sense of wanderlust."},{"en":"comfort","pos":"n.","zh":"舒適；安逸","cat":"高頻基礎詞","src":"Reading Focus / Text 1 / 單元評估","sent":"It is advisable to find an apartment that provides essential facilities and ensures basic comfort.","exam":"選詞填空常見；詞形轉換 comfort(n.) → comfortable(adj.) → comfortably(adv.)","err":"港生易與 comfortable 混用：the comfort of home（名詞）vs a comfortable bed（形容詞）","coll":"the comfort of home; travel in comfort; basic comfort","ex1":"Some travellers prefer the comfort of a nice hotel.","ex2":"I like to travel in comfort, so I always book a good seat."},{"en":"exchange","pos":"v.","zh":"兌換；交換","cat":"考試重點詞","src":"Text 2","sent":"That way, you won't need to exchange your own cash for patacas (Macau's currency) - unless you want some as a keepsake.","exam":"Text 2 選詞填空考過：make an exchange for a new pair；固定搭配 exchange A for B","err":"搭配介詞 for（exchange money for...），港生易誤用 to；可作動詞或名詞","coll":"exchange money; exchange A for B; in exchange for","ex1":"You can exchange your Hong Kong dollars for yen at the airport.","ex2":"I exchanged my old book for a new one at the shop."},{"en":"cover","pos":"v.","zh":"支付；涵蓋","cat":"考試重點詞","src":"Text 2","sent":"We'd be happy to cover for your accommodation.","exam":"Text 2 選詞填空考過：a scholarship that will cover all her tuition；一詞多義（支付／覆蓋）","err":"作「支付」解時直接接受詞（cover the cost），港生易誤加介詞；勿只想到「蓋住」的意思","coll":"cover the cost; cover all expenses; cover for someone","ex1":"My parents will cover the cost of my school trip.","ex2":"The ticket price covers lunch and transport."},{"en":"currency","pos":"n.","zh":"貨幣","cat":"日常實用","src":"Text 2","sent":"That way, you won't need to exchange your own cash for patacas (Macau's currency).","exam":"旅遊主題實用詞；閱讀理解找同義詞（money）常見","err":"串法雙 r（currency）；讀音 /ˈkʌrənsi/；勿與 current（現時的）混淆","coll":"foreign currency; local currency; exchange currency","ex1":"The yen is the currency used in Japan.","ex2":"Remember to change some local currency before your trip."},{"en":"neighbourhood","pos":"n.","zh":"社區；街坊一帶","cat":"日常實用","src":"Reading Focus / Integrated Task","sent":"I guess we'll just have lunch in the neighbourhood of the hotel on the first day.","exam":"聽力綜合任務考過 in the neighbourhood of the hotel；英式串法 -our-","err":"英式串法 neighbourhood（有 u），港生易漏；讀音 /ˈneɪbəhʊd/ 中間 gh 不發音","coll":"in the neighbourhood; a quiet neighbourhood; explore the neighbourhood","ex1":"There are many good restaurants in our neighbourhood.","ex2":"We walked around the neighbourhood after dinner."},{"en":"historic","pos":"adj.","zh":"有歷史意義的；歷史悠久的","cat":"考試重點詞","src":"詞彙練習 / Text 2","sent":"I knew from the moment that our boat entered the cave that we were in a site of historic importance.","exam":"選詞填空常見；辨析 historic（重要的歷史）vs historical（與歷史有關）是考點","err":"港生常混淆 historic 與 historical；historic 強調重大意義，historical 泛指歷史上的","coll":"a historic site; historic importance; a historic building","ex1":"We live right in Macau's Historic Centre, which is full of hotspots.","ex2":"The old temple is a historic site that attracts many tourists."},{"en":"ancient","pos":"adj.","zh":"古代的；古老的","cat":"高頻基礎詞","src":"詞彙練習 / Text 3","sent":"One of the most meaningful moments of my trip was seeing the ancient Buddha statues hidden inside the Pak Ou caves.","exam":"選詞填空常見；描寫古蹟的高頻形容詞；同義 old（but 更正式）","err":"串法 an-cient；讀音 /ˈeɪnʃənt/ 港生易讀錯；勿與 accident 混淆串法","coll":"ancient site; ancient ruins; an ancient city","ex1":"The tourists visited the ancient temple to learn about its history.","ex2":"These ancient statues are over a thousand years old."},{"en":"backdrop","pos":"n.","zh":"背景","cat":"考試重點詞","src":"Text 2","sent":"Up there, the panoramic view of the South China Sea offers a beautiful backdrop for some travel pics to impress your friends.","exam":"Text 2 選詞填空考過：a nice backdrop made from flowers and paintings；複合名詞 back + drop","err":"複合名詞一個字寫（backdrop）；勿與 background 混淆用法","coll":"a beautiful backdrop; a perfect backdrop; against a backdrop of","ex1":"The mountains made a beautiful backdrop for our photos.","ex2":"We took pictures with the harbour as a backdrop."},{"en":"cottage","pos":"n.","zh":"小屋；村舍","cat":"口語常用","src":"聽力對話","sent":"I bet the cottage on the left is also a great photography spot.","exam":"聽力細節題考過（找地圖上的 cottage）；旅遊地點口語詞","err":"串法雙 t（cottage）；讀音 /ˈkɒtɪdʒ/，港生易讀成 /kəʊ-/","coll":"a small cottage; an old cottage; a country cottage","ex1":"We stayed in a lovely cottage in the countryside.","ex2":"The old cottage tells us how people used to live."},{"en":"fountain","pos":"n.","zh":"噴泉","cat":"口語常用","src":"聽力對話","sent":"Seems like it has a great view too, as there is a round fountain next to it.","exam":"聽力細節題考過（地圖 fountain 位置）；旅遊景物詞","err":"串法 foun-tain；讀音 /ˈfaʊntɪn/，港生易把 -tain 讀成 /teɪn/","coll":"a water fountain; sit by the fountain; a round fountain","ex1":"We sat by the fountain and enjoyed the view.","ex2":"There is a big fountain in the middle of the square."},{"en":"statue","pos":"n.","zh":"雕像","cat":"口語常用","src":"聽力對話 / Text 1 / 單元評估","sent":"Well, there's a statue between the pond and the fountain.","exam":"聽力細節題考過（statue 位置及年份）；單元評估提及 Buddha statue","err":"串法 sta-tue；讀音 /ˈstætʃuː/，港生易與 status（狀態）混淆","coll":"a bronze statue; a Buddha statue; put up a statue","ex1":"The statue in the square is 350 years old.","ex2":"The monastery is famous for its huge outdoor Buddha statue."},{"en":"ferry","pos":"n.","zh":"渡輪","cat":"日常實用","src":"Integrated Task","sent":"We'll take the ferry at half past ten in the morning in Sheung Wan.","exam":"聽力綜合任務考過（take the ferry / evening ferry）；香港常用交通工具詞","err":"複數 ferries（y 變 ies）；take the ferry 用動詞 take，港生易誤說 sit the ferry","coll":"take the ferry; the evening ferry; a ferry ride","ex1":"We took the ferry from Hong Kong to Macau.","ex2":"The evening ferry back to Tsim Sha Tsui was very quiet."},{"en":"shuttle bus","pos":"n.","zh":"接駁巴士；穿梭巴士","cat":"口語常用","src":"Integrated Task","sent":"We can simply go to places by shuttle bus.","exam":"聽力綜合任務考過（travel by shuttle bus）；旅遊交通實用詞","err":"兩個字分開寫（shuttle bus）；交通工具搭配 by shuttle bus（勿加冠詞）","coll":"take a shuttle bus; by shuttle bus; a free shuttle bus","ex1":"The hotel provides a free shuttle bus to the airport.","ex2":"We went to the theme park by shuttle bus."},{"en":"pamphlet","pos":"n.","zh":"小冊子；宣傳單張","cat":"日常實用","src":"聽力對話","sent":"I've got us a pamphlet of the walking tour we've joined.","exam":"聽力細節題來源（pamphlet 上的地圖與資料）；旅遊資訊實用詞","err":"串法有不發音的 ph（pamphlet），讀 /ˈpæmflət/，港生易拼錯","coll":"a travel pamphlet; read a pamphlet; hand out pamphlets","ex1":"The pamphlet shows a map of the whole village.","ex2":"I picked up a pamphlet about the walking tour at the counter."},{"en":"speedboat","pos":"n.","zh":"快艇","cat":"日常實用","src":"詞彙練習","sent":"Every day tourists from around the world fly into Male International Airport to be whisked off by plane or speedboat to a private resort.","exam":"Word Power 複合名詞練習答案（speed + boat）；旅遊交通詞","err":"複合名詞一個字寫（speedboat）；勿分開寫成 speed boat","coll":"take a speedboat; by speedboat; a fast speedboat","ex1":"We took a speedboat to the small island.","ex2":"The speedboat took us across the sea in ten minutes."},{"en":"guesthouse","pos":"n.","zh":"賓館；旅館","cat":"日常實用","src":"詞彙練習","sent":"What better way to escape the noise and pollution of the city than at a Maldivian guesthouse?","exam":"Word Power 複合名詞練習答案（guest + house）；旅遊住宿詞","err":"複合名詞一個字寫（guesthouse）；勿分開寫成 guest house（雖亦可接受，教材用一個字）","coll":"stay in a guesthouse; a small guesthouse; book a guesthouse","ex1":"We stayed in a cosy guesthouse near the beach.","ex2":"The guesthouse is cheaper than a big hotel."},{"en":"panoramic","pos":"adj.","zh":"全景的","cat":"考試重點詞","src":"Text 2","sent":"Up there, the panoramic view of the South China Sea offers a beautiful backdrop for some travel pics.","exam":"閱讀理解描寫景色的形容詞；搭配 a panoramic view","err":"串法 pan-o-ram-ic；讀音重音在 -RAM-；港生易與 panorama（名詞）混用","coll":"a panoramic view; panoramic scenery; a panoramic photo","ex1":"From the top of the hill, we enjoyed a panoramic view of the city.","ex2":"The restaurant offers a panoramic view of the sea."}],"phrases":[{"phrase":"ahead of time","zh":"提早；預先","type":"課文短語","sent":"Discounted tickets are more common in the off season, especially if you book well ahead of time.","note":"指「提早、事先」做某事，常與 book / plan / arrive 連用；可加 well 加強語氣（well ahead of time）。","ex":"Arrive at the airport ahead of time to avoid the crowds during check-in."},{"phrase":"be on the lookout for","zh":"留意；提防；尋找","type":"課文短語","sent":"Do your homework and be on the lookout for good deals and limited-time bargains.","note":"指「留心尋找」好東西或「提防」壞事物，後接名詞；lookout 為一個字。","ex":"When travelling abroad, be on the lookout for unique items you can buy as a souvenir."},{"phrase":"break the bank","zh":"花光積蓄；花費過多","type":"課文短語","sent":"Did you know that you don't need to break the bank for a once-in-a-lifetime holiday experience?","note":"常用於否定句 don't need to / won't break the bank，指「不用花太多錢」；非字面「打破銀行」。","ex":"I don't think it is worth it to break the bank over a first-class plane ticket."},{"phrase":"in exchange for","zh":"以換取；作為交換","type":"課文短語","sent":"There are volunteering organizations around the world that provide volunteers food and accommodation in exchange for their time and work.","note":"後接名詞，表示「用 A 換 B」；in exchange for + 所給出的東西。","ex":"On the train, I gave my sister some chips in exchange for some of her salad."},{"phrase":"on a shoestring","zh":"以極少的預算；省吃儉用地","type":"課文短語","sent":"Travelling on a shoestring","note":"指「用很少的錢」做某事，常說 travel on a shoestring / on a shoestring budget。","ex":"After graduating secondary school, my friends and I went on a trip on a shoestring."},{"phrase":"open one's eyes to sth","zh":"使某人認識到；令某人大開眼界","type":"課文短語","sent":"It (travelling) can open your eyes to new ideas and teach you important life skills.","note":"指讓人明白或見識到新事物；可用主動 open your eyes to sth 或被動 my eyes were opened to sth。","ex":"Going on a summer exchange trip to Australia opened my eyes to the beauty of foreign cultures."},{"phrase":"hustle and bustle","zh":"繁忙喧鬧（的氣氛）","type":"課文短語","sent":"It's (Hac Sa Beach is) off the beaten track and away from the hustle and bustle of downtown Macau.","note":"固定次序 hustle and bustle，指城市的繁忙喧鬧；後常接 of the city / downtown。","ex":"I moved to the countryside to avoid the hustle and bustle of the city."},{"phrase":"off the beaten track","zh":"偏僻的；人跡罕至的","type":"課文短語","sent":"It's (Hac Sa Beach is) off the beaten track and away from the hustle and bustle of downtown Macau.","note":"指「遠離主要路線、少人到訪的地方」；英式用 track，可作形容詞或副詞。","ex":"To experience the local culture better, I visited a traditional folk village that was off the beaten track."},{"phrase":"over the moon","zh":"欣喜若狂；非常高興","type":"課文短語","sent":"Vince and I are over the moon to hear that you're going to make a stopover in Macau en route to your next destination.","note":"指「極度開心」，常說 be over the moon (to do / about sth)；口語書面皆常用。","ex":"When my sister surprised me with plane tickets to the Philippines, I was over the moon."},{"phrase":"best of all","zh":"最棒的是；最好的一點是","type":"寫作句式","sent":"Best of all, VR makes the impossible possible.","note":"常放句首作連接語，帶出最精彩的一點，後加逗號；寫作列舉優點時好用。","ex":"Best of all, the 12-hour flight includes fully reclining seats and a lot of legroom."},{"phrase":"in comparison","zh":"相比之下","type":"寫作句式","sent":"First, it's more sustainable than real-world tourism, and its carbon footprint is minuscule in comparison.","note":"作對比連接語，可放句末或句首；亦可說 in comparison to/with sth。","ex":"Travelling by plane is quicker, but travelling by train leaves a smaller carbon footprint in comparison."},{"phrase":"in turn","zh":"繼而；因此；依次","type":"寫作句式","sent":"By first checking out an attraction in VR, you can avoid choosing a destination you end up not liking, and in turn make better-informed travel plans.","note":"表示因果或先後接續，「這樣一來、接著」；常放於子句之間或句首。","ex":"I sent an enquiry to the airline regarding my membership; in turn, they gave me a free upgrade."},{"phrase":"itch to do sth","zh":"渴望做某事；急不及待","type":"課文短語","sent":"Thanks to advances in multimedia technology, anyone itching to travel can pop on a VR headset and be wherever they want.","note":"指「非常渴望做某事」，常用進行式 be itching to do sth，或名詞 have an itch to do sth。","ex":"My friends and I have been itching to visit this famous caf in Singapore since it opened."},{"phrase":"no longer","zh":"不再","type":"寫作句式","sent":"They can join a 3-D virtual tour and travel through time to ancient sites that no longer exist.","note":"表示「不再」，放於 be 動詞後或一般動詞前（= not ... any more）；比 not ... anymore 較正式。","ex":"With the creation of planes, the main obstacle hindering us from travelling abroad is no longer an issue."},{"phrase":"put a damper on","zh":"掃興；使掃興；潑冷水","type":"課文短語","sent":"Travel logistics, safety concerns, weather and even time zones can put a damper on your travel pleasures even before you step out your front door.","note":"指「使某事的興致或氣氛掃興」，後接名詞（on your mood / on the trip）；damper 串法勿漏 p。","ex":"The poor weather on the day of our camping trip certainly put a damper on our mood."},{"phrase":"take it easy","zh":"輕鬆一下；別緊張","type":"口語短語","sent":"We may want to take it easy on the first day though.","note":"口語常用，指「放輕鬆、不趕行程」；亦可作道別語 Take it easy!；主語第三身用 takes it easy。","ex":"After a long flight, we decided to take it easy and just rest at the hotel on the first day."},{"phrase":"set off","zh":"出發；動身","type":"日常表達","sent":"When will you set off on the twenty-third?","note":"指「啟程、出發」（= depart / leave），為不及物片語動詞；旅遊及路線常用。","ex":"We set off early in the morning so that we could reach the village before noon."},{"phrase":"How's it going?","zh":"近來怎樣？進展如何？","type":"口語短語","sent":"How's it going? Tell you what, tonight I'm going to lie down on the sofa for the rest of the night - I'm exhausted!","note":"非正式問候語，用於個人電郵或朋友對話開頭；回答可說 Pretty well / Not bad。","ex":"Hi Sam! How's it going? I can't wait to tell you about my trip to Macau."}]},{"key":"1B_U5","form":"F1","book":"1B","num":5,"theme":"Me time","theme_zh":"我的休閒時光","words":[{"en":"board game","pos":"n.","zh":"棋盤遊戲；桌上遊戲","cat":"核心詞彙","src":"單元評估","sent":"Dad shuffled the deck of cards, while mum set up the board game.","exam":"閱讀理解常考遊戲類型分類；聽力填表題常以遊戲名稱與類型出現","err":"港生常受「棋盤」影響誤寫成 boardgame（應分寫）或與 broad 混淆拼寫","coll":"play a board game; set up the board game; a classic board game","ex1":"We played a board game with our cousins during the holidays.","ex2":"The school will hold a board game competition to promote teamwork among students."},{"en":"competitive","pos":"adj.","zh":"競爭性的；好勝的","cat":"考試重點詞","src":"詞彙練習","sent":"This game is very competitive as players have to keep winning to climb up the rank from bronze to gold or even higher.","exam":"詞形轉換常考：compete (v.) → competition (n.) → competitive (adj.)","err":"易與 competition 混淆詞性；填空時忘記形容詞形式，誤填 competition","coll":"a competitive game; highly competitive; competitive spirit","ex1":"My brother is so competitive that he hates losing any game.","ex2":"Entrance to famous secondary schools in Hong Kong is highly competitive."},{"en":"cooperative","pos":"adj.","zh":"合作的；協作的","cat":"核心詞彙","src":"Reading Focus","sent":"(改編) Cooperative games require players to work together instead of competing against each other.","exam":"選詞填空常與 competitive 成對比出現；留意詞族 cooperate / cooperation / cooperative","err":"拼寫易漏其中一個 o（coperative✗）；與 co-op（口語縮寫）的用法要分清","coll":"cooperative play; a cooperative game; be cooperative with others","ex1":"In cooperative games, everyone wins or loses together.","ex2":"Students should be cooperative when doing group projects."},{"en":"multiplayer","pos":"adj.","zh":"多人（遊戲）的","cat":"核心詞彙","src":"詞彙練習","sent":"It is specifically designed for split-screen multiplayer gaming.","exam":"選詞填空常考與 single-player 的對比","err":"易誤寫成 multiplayers 作形容詞；multi- 前綴意思是「多」","coll":"multiplayer mode; an online multiplayer game","ex1":"We spent the whole afternoon playing a multiplayer game online.","ex2":"The new app supports both single-player and multiplayer modes."},{"en":"single-player","pos":"adj.","zh":"單人（遊戲）的","cat":"核心詞彙","src":"詞彙練習","sent":"In other words, this game is made to be played by two players only and there is no single-player mode available, just as the game title suggests.","exam":"選詞填空高頻選項；閱讀理解中用於分類遊戲特點","err":"作形容詞時需連字號 single-player，不可寫 single player mode 中漏掉連字號","coll":"single-player mode; a single-player game","ex1":"Solitaire is a classic single-player card game.","ex2":"I prefer single-player games because I can play at my own pace."},{"en":"old-fashioned","pos":"adj.","zh":"老式的；過時的","cat":"考試重點詞","src":"Text 1","sent":"These games might seem old-fashioned on the surface, but they can actually be a lot of fun once you've learnt their ins and outs.","exam":"閱讀理解常考同義替換：old-fashioned ≈ traditional / outdated","err":"須加連字號；港生常直譯「老土」而誤以為只有貶義，其實也可指「懷舊經典」","coll":"old-fashioned board games; seem old-fashioned","ex1":"My grandpa still likes old-fashioned games like Chinese chess.","ex2":"Although letter writing seems old-fashioned, it is a sincere way to communicate."},{"en":"entertainment","pos":"n.","zh":"娛樂；消遣","cat":"考試重點詞","src":"詞彙練習","sent":"And as always, it is a good source of entertainment when you want to have fun with friends.","exam":"詞形轉換高頻：entertain (v.) → entertainment (n.) → entertaining (adj.)；不可數名詞","err":"不可數，不能寫 an entertainment / entertainments；拼寫易漏第二個 n","coll":"a source of entertainment; for entertainment","ex1":"Watching films is my favourite form of entertainment.","ex2":"Board games provide hours of entertainment for the whole family."},{"en":"education","pos":"n.","zh":"教育","cat":"高頻基礎詞","src":"詞彙練習","sent":"Playing Scrabble is meant to be great for early childhood education as it can help a child develop vocabulary and perfect spelling skills.","exam":"詞形轉換：educate (v.) → education (n.) → educational (adj.)","err":"不可數名詞；「有教育意義的」應用 educational，不可說 education games","coll":"early childhood education; receive an education; educational games","ex1":"Games can be a fun tool for education.","ex2":"Education is the key to a better future."},{"en":"strategy","pos":"n.","zh":"策略；戰略","cat":"核心詞彙","src":"詞彙練習","sent":"(改編) This well-designed game needs you to coordinate the right strategies to beat each level.","exam":"選詞填空常考；複數變化 strategy → strategies 是詞形轉換考點","err":"複數要把 y 變 ies；易與 tactic 混用（strategy 較宏觀、tactic 較具體）","coll":"develop a strategy; game strategy; a winning strategy","ex1":"You need a good strategy to win this chess game.","ex2":"Our team discussed strategies for the inter-class quiz competition."},{"en":"tactics","pos":"n.","zh":"戰術；技巧","cat":"考試重點詞","src":"單元評估","sent":"(改編) Only the right tactics can help you defeat the paranormal forces and terrifying creatures in this nightmare world.","exam":"單元評估選詞填空原考詞；常與 strategies 一同出現作近義詞","err":"常用複數 tactics；拼寫易誤作 tatics","coll":"game tactics; use clever tactics; change tactics","ex1":"The coach taught us some useful tactics for the basketball match.","ex2":"Good tactics can help you win even against stronger players."},{"en":"dice","pos":"n.","zh":"骰子","cat":"高頻基礎詞","src":"Text 1","sent":"Roll the dice.","exam":"聽力及閱讀遊戲情境高頻詞；固定搭配 roll the dice","err":"dice 單複數同形（單數亦可用 die）；港生易誤加 s 寫成 dices","coll":"roll the dice; a pair of dice; take turns rolling dice","ex1":"Roll the dice and move your token forward.","ex2":"In Monopoly, players take turns rolling the dice."},{"en":"token","pos":"n.","zh":"（遊戲）棋子；代幣","cat":"核心詞彙","src":"Reading Focus","sent":"(改編) Just like an actual board game, players have to take turns rolling the dice and moving their tokens around the board.","exam":"聽力填表與選詞填空的遊戲用具類常考詞","err":"易與 coin 混淆；token 亦解「象徵」，閱讀時要按上下文判斷","coll":"move a token; game tokens","ex1":"Each player chooses a token before the game starts.","ex2":"Move your token three spaces after rolling the dice."},{"en":"console","pos":"n.","zh":"遊戲主機","cat":"核心詞彙","src":"Text 2","sent":"Hey, fellow gamers! My parents just said I can get my first video game console!","exam":"閱讀理解常考指代題（如 console 指哪類產品）；選詞填空高頻","err":"名詞重音在前 CONsole；勿與動詞 console（安慰，重音在後）混淆","coll":"a video game console; a traditional console; game consoles","ex1":"He saved his pocket money for a year to buy a game console.","ex2":"Whether you play on a PC or game console, the experience is similar."},{"en":"headset","pos":"n.","zh":"頭戴式裝置；耳機","cat":"核心詞彙","src":"Text 2","sent":"So be sure to grab the best gear now, with a good headset, floor mat and hand controllers.","exam":"閱讀理解列舉題常考（列出 VR 裝備）；單元評估選詞填空原考詞","err":"是一個複合詞，不要分寫成 head set；與 headphone（純耳機）意思不同","coll":"a VR headset; wear a headset","ex1":"Put on the VR headset and you will feel like you are inside the game.","ex2":"The headset shields you from the outside world for a fully immersive experience."},{"en":"controller","pos":"n.","zh":"控制器；手掣","cat":"核心詞彙","src":"Text 2","sent":"So be sure to grab the best gear now, with a good headset, floor mat and hand controllers.","exam":"詞形轉換：control (v.) → controller (n.)；閱讀列舉題常考","err":"注意雙寫 l 再加 -er：controller；港生口語常說「手掣」，寫作要用英文全稱","coll":"hand controllers; a wireless controller","ex1":"The hand controllers let you pick up objects inside the game.","ex2":"My controller ran out of battery in the middle of the game."},{"en":"immersive","pos":"adj.","zh":"沉浸式的；身臨其境的","cat":"考試重點詞","src":"Text 2","sent":"The current-gen VR games are pretty advanced and immersive.","exam":"Text 2 句子填充原考詞（immersive experience）；閱讀理解同義替換常考","err":"拼寫易誤作 immersing；形容體驗用 immersive，不是 immersed experience","coll":"an immersive experience; immersive gaming","ex1":"VR technology offers an immersive experience with a first-person viewpoint.","ex2":"The museum uses immersive displays to bring history to life."},{"en":"advanced","pos":"adj.","zh":"先進的；高級的","cat":"高頻基礎詞","src":"Text 2","sent":"The current-gen VR games are pretty advanced and immersive.","exam":"閱讀理解細節題常考（什麼被形容為 advanced）；句子填充原考詞","err":"作形容詞須用過去分詞形式 advanced，勿寫 advance technology","coll":"advanced technology; an advanced level","ex1":"This smartphone uses very advanced technology.","ex2":"Virtual reality technology is quite advanced these days."},{"en":"fad","pos":"n.","zh":"一時的風尚；短暫熱潮","cat":"考試重點詞","src":"Text 2","sent":"What's everyone's take on VR? Is it just a fad that will soon die out?","exam":"閱讀理解詞義題原考詞：「指不會持久的潮流的詞」；同義：craze / trend","err":"易與 fade（褪色）混淆拼寫；fad 是名詞，指「一時流行」","coll":"just a fad; a passing fad; die out","ex1":"Some people think fidget spinners were just a fad.","ex2":"Is this diet a healthy choice or just a passing fad?"},{"en":"lag","pos":"n.","zh":"延遲；滯後","cat":"核心詞彙","src":"Text 2","sent":"Moving around in VR makes me feel sick, as there's a bit of a lag between your movements and the game visuals.","exam":"Text 2 句子填充原考詞（a delay or a lag）；閱讀同義替換：lag ≈ delay","err":"與 latency 為近義詞；a lag between A and B 的介詞搭配易錯","coll":"a lag between A and B; time lag; zero latency","ex1":"There is a lag between pressing the button and the character moving.","ex2":"Online games are frustrating when there is too much lag."},{"en":"instant","pos":"adj.","zh":"即時的；立刻的","cat":"考試重點詞","src":"Text 2","sent":"For games to be enjoyable and worth playing, the video response has to be instant with zero latency.","exam":"Text 2 詞彙填空原考詞；詞形轉換：instant → instantly (adv.)","err":"與 instance（例子）拼寫相近易混；instant noodles 是熟悉搭配可幫記憶","coll":"instant response; instant messaging; in an instant","ex1":"Text messaging is instant, unlike sending mails by regular post.","ex2":"The app gives you instant feedback on your answers."},{"en":"character","pos":"n.","zh":"角色；人物","cat":"高頻基礎詞","src":"Text 2","sent":"While playing a VR RPG, you feel like you actually are the character, not just a player controlling it.","exam":"Text 2 詞彙填空原考詞；閱讀理解常考角色與敘事者身份","err":"character 亦解「性格」；重音在第一音節，拼寫中的 ch 讀 /k/","coll":"a playable character; main character; act as a character","ex1":"My favourite character in the story is the clever detective.","ex2":"You can choose from many playable characters with different abilities."},{"en":"relearn","pos":"v.","zh":"重新學習","cat":"考試重點詞","src":"Text 2","sent":"If you get a traditional console, you'll have to relearn all the controls in a few years anyway when VR is everywhere.","exam":"Text 2 詞彙填空原考詞；前綴 re-（再次）是詞形轉換常考構詞法","err":"前綴 re- 直接加動詞，毋須連字號；勿誤作 re-learn again（語義重複）","coll":"relearn the controls; relearn how to walk","ex1":"She had to relearn how to walk after the accident.","ex2":"Switching to a new phone means relearning where all the settings are."},{"en":"bruise","pos":"v./n.","zh":"使瘀傷；瘀痕","cat":"考試重點詞","src":"Text 2","sent":"Soon after, my friend swung his fist straight into the wall and bruised his knuckles pretty badly.","exam":"Text 2 句子填充原考詞（have bruised themselves）；留意動詞及名詞同形","err":"拼寫 ui 組合易錯（brusie✗）；讀音 /bruːz/，尾音是 /z/","coll":"bruise one's knuckles; badly bruised; cuts and bruises","ex1":"He fell off his bike and bruised his knee.","ex2":"Some players have bruised themselves accidentally while playing VR games."},{"en":"gear","pos":"n.","zh":"裝備；用具","cat":"口語常用","src":"Text 2","sent":"So be sure to grab the best gear now, with a good headset, floor mat and hand controllers.","exam":"閱讀理解概括題常考（gear 概括後文列舉的裝備）；不可數名詞","err":"表「裝備」時不可數，不能說 a gear / gears；與 equipment 同義同用法","coll":"gaming gear; camping gear; grab the best gear","ex1":"Remember to bring your sports gear for the hiking trip.","ex2":"The shop sells all kinds of gaming gear, from headsets to controllers."},{"en":"virtual reality (VR)","pos":"n.","zh":"虛擬實境","cat":"核心詞彙","src":"詞彙練習","sent":"(改編) As the trend of virtual reality gaming has taken off across the world, gamers are no longer strangers to this amazing technology.","exam":"選詞填空原考詞；閱讀理解主旨題核心概念，縮寫 VR 與全寫須對應","err":"virtual 拼寫易錯（vitual✗）；VR 之前一般不加 the（play VR games）","coll":"virtual reality games; VR technology; a VR headset","ex1":"Virtual reality lets you explore places without leaving your room.","ex2":"Virtual reality technology is being used to train people in medicine and engineering."},{"en":"obstacle","pos":"n.","zh":"障礙；阻礙","cat":"考試重點詞","src":"詞彙練習","sent":"(改編) You'll find yourself bracing yourself for jump scares and unexpected obstacles.","exam":"選詞填空高頻；寫作中可用於「克服困難」語境：overcome obstacles","err":"拼寫易漏 b（ostacle✗）；搭配用 overcome，不用 solve obstacles","coll":"overcome an obstacle; unexpected obstacles; an obstacle course","ex1":"The players must avoid obstacles to reach the finish line.","ex2":"Hard work helped her overcome every obstacle in her studies."},{"en":"pastime","pos":"n.","zh":"消遣；娛樂活動","cat":"考試重點詞","src":"Text 1","sent":"Pulling your hair out over a lump of plastic might seem like a stressful pastime, but many people find the process fascinating.","exam":"閱讀理解同義替換常考：pastime ≈ hobby / leisure activity；單元評估原文出現 favourite pastimes","err":"只有一個 t（pasttime✗）；與 past time（過去的時間）意思完全不同","coll":"a favourite pastime; a popular pastime","ex1":"Playing board games is a popular pastime for many families.","ex2":"Reading comics remains my favourite pastime after school."},{"en":"teamwork","pos":"n.","zh":"團隊合作","cat":"核心詞彙","src":"詞彙練習","sent":"The only way to come up on top is to have good teamwork.","exam":"選詞填空與寫作高頻詞；不可數名詞","err":"不可數，不能說 a teamwork / teamworks；一個單詞，不要分寫 team work","coll":"good teamwork; require teamwork; a spirit of teamwork","ex1":"Teamwork is essential in cooperative games.","ex2":"The project taught us the importance of teamwork and communication."},{"en":"cooperate","pos":"v.","zh":"合作","cat":"考試重點詞","src":"詞彙練習","sent":"(改編) This puzzle game is perfect for party gatherings as you need to cooperate with other players to find the key to the door and exit.","exam":"詞形轉換核心詞族：cooperate → cooperation → cooperative；搭配 cooperate with sb","err":"後接 with，不可直接接賓語（cooperate him✗）","coll":"cooperate with others; cooperate to solve problems","ex1":"The two classes cooperated to organize the charity sale.","ex2":"Players must cooperate with each other to complete the tasks."},{"en":"coordinate","pos":"v.","zh":"協調","cat":"考試重點詞","src":"Reading Focus","sent":"(改編) In team games, players need to coordinate their moves to beat each level.","exam":"選詞填空高頻動詞；與 cooperate 近義但強調「協調配合」","err":"拼寫長且易漏字母；與 cooperate 意思相近但不可互換所有語境","coll":"coordinate strategies; coordinate with teammates","ex1":"Good players coordinate their attacks in online games.","ex2":"The monitor coordinated the class effort to decorate the classroom."},{"en":"communication","pos":"n.","zh":"溝通；交流","cat":"高頻基礎詞","src":"詞彙練習","sent":"(改編) Maintaining effective communication is essential in this game.","exam":"詞形轉換：communicate (v.) → communication (n.)；選詞填空高頻","err":"雙 m 單 n 開頭（comunication✗）；不可數名詞","coll":"effective communication; communication skills","ex1":"Games with teammates can improve your communication skills.","ex2":"Clear communication helps the team avoid making mistakes."},{"en":"solve","pos":"v.","zh":"解決；破解","cat":"高頻基礎詞","src":"聽力對話","sent":"They have to solve puzzles in order to escape from a cave.","exam":"聽力筆記題原考詞（solve puzzles）；搭配 solve problems / puzzles / mysteries","err":"solve 接問題，answer 接問題的「提問」；不要說 solve the question（宜用 answer）","coll":"solve puzzles; solve problems; solve a mystery","ex1":"We worked together to solve the puzzle before time ran out.","ex2":"Learning maths trains you to solve problems logically."},{"en":"puzzle","pos":"n.","zh":"謎題；拼圖","cat":"核心詞彙","src":"聽力對話","sent":"Players will try to fit shapes together as quickly as possible. They'll get out of the cave if they solve all the puzzles.","exam":"聽力與閱讀高頻；crack the puzzle（破解謎題）是課文重點搭配","err":"雙 z 拼寫易錯；jigsaw puzzle 指拼圖，riddle 指謎語，聽力中曾特意區分","coll":"solve a puzzle; a jigsaw puzzle; crack the puzzle","ex1":"I hope to try my hand at a 1000-piece puzzle one day.","ex2":"The escape room is full of tricky puzzles for players to solve."},{"en":"escape","pos":"v./n.","zh":"逃脫；逃離","cat":"高頻基礎詞","src":"聽力對話","sent":"In order to win, you have to make the fastest escape.","exam":"聽力筆記題原考詞（make the fastest escape）；動詞後接 from","err":"escape from the cave 中 from 易漏；名詞用法 make an escape 要整體記","coll":"escape from a cave; make an escape; a narrow escape","ex1":"The players must solve puzzles to escape from the locked room.","ex2":"The winner is the one who makes the fastest escape."},{"en":"treasure","pos":"n.","zh":"寶藏；珍寶","cat":"口語常用","src":"聽力對話","sent":"Players are to find the hidden treasure.","exam":"聽力填表原考詞（the hidden treasure）；treasure hunter 為相關複合詞","err":"拼寫 -sure 結尾讀 /ʒə/；作動詞時解「珍惜」（treasure an object）","coll":"hidden treasure; a treasure hunter; treasure an object","ex1":"The pirates sailed the seas in search of hidden treasure.","ex2":"I treasure the watch my grandmother gave me."},{"en":"thief","pos":"n.","zh":"小偷；竊賊","cat":"高頻基礎詞","src":"聽力對話","sent":"One player will be the thief, and the rest will be villagers looking for clues.","exam":"聽力填表原考詞；複數 thieves 是詞形轉換常考不規則變化","err":"複數 f 變 ves：thief → thieves；ie 拼寫次序易倒轉（theif✗）","coll":"catch a thief; the thief stole the keys","ex1":"The villagers worked together to find out who the thief was.","ex2":"The police finally caught the thief who stole the handbag."},{"en":"clue","pos":"n.","zh":"線索","cat":"核心詞彙","src":"聽力對話","sent":"They take turns drawing from a stack of clue cards.","exam":"聽力高頻詞；閱讀理解推斷題會要求根據 clues 推理","err":"與 glue（膠水）拼寫相近易混；短語 have no clue 解「毫無頭緒」","coll":"look for clues; a clue card; have no clue","ex1":"The detective followed the clues to find the missing ring.","ex2":"Each card gives players a clue about the mystery."},{"en":"deduce","pos":"v.","zh":"推斷；推理","cat":"考試重點詞","src":"聽力對話","sent":"From the clues they have to deduce which player stole the keys.","exam":"閱讀理解推斷題（inference）指令常用詞；聽力對話原詞","err":"與 reduce（減少）拼寫相近；後常接 that 子句或 wh- 子句","coll":"deduce from the clues; deduce the answer","ex1":"From her wet umbrella, I deduced that it was raining outside.","ex2":"Players must deduce who the thief is from the clue cards."},{"en":"mystery","pos":"n.","zh":"神秘的事；懸疑","cat":"核心詞彙","src":"聽力對話","sent":"Surely it's great fun to have everyone working together to solve a mystery.","exam":"聽力填表原考詞（mystery game）；詞形轉換：mystery → mysterious (adj.)","err":"形容詞是 mysterious，不要寫 mystery place；複數 mysteries","coll":"solve a mystery; a mystery game; remain a mystery","ex1":"In this game, players solve the mystery of the stolen keys.","ex2":"How the magician did the trick remains a mystery to me."},{"en":"competition","pos":"n.","zh":"比賽；競賽","cat":"高頻基礎詞","src":"聽力對話","sent":"Hi Fiona, we have just decided on the game for participants to play in the annual board game competition.","exam":"綜合能力任務核心詞；詞形轉換：compete → competition → competitive","err":"「參加比賽」用 take part in / enter a competition，不用 join in competition 漏冠詞","coll":"enter a competition; an annual competition; hold a competition","ex1":"Our school will hold a board game competition next month.","ex2":"Anyone who is interested can sign up for the competition by email."},{"en":"founder","pos":"n.","zh":"創辦人","cat":"考試重點詞","src":"聽力對話","sent":"You're right, she is the founder of Lion Games.","exam":"聽力筆記題原考點；詞形轉換：found (v. 創立) → founder (n.)","err":"found（創立）不是 find 的過去式用法；founder of + 機構名","coll":"the founder of a company; a co-founder","ex1":"Sharon Luk is the founder of Lion Games and the creator of Rocky Planet.","ex2":"The founder of the club gave a speech at the opening ceremony."},{"en":"pricey","pos":"adj.","zh":"昂貴的（口語）","cat":"口語常用","src":"Reading Focus","sent":"(改編) VR gaming gear can be quite pricey, so think carefully before you buy.","exam":"口語及非正式寫作用詞；同義替換：pricey ≈ expensive / costly","err":"屬口語用詞，正式寫作宜用 expensive；比較級 pricier 的拼寫變化易錯","coll":"quite pricey; a pricey console","ex1":"The new game console is a bit pricey for me.","ex2":"Eating out every day can be pricey, so I bring my own lunch."},{"en":"cheat","pos":"v.","zh":"作弊；欺騙","cat":"高頻基礎詞","src":"單元評估","sent":"'I am not cheating! You just can't accept your loss,' said Timmy.","exam":"單元評估閱讀原文考詞（段落填空答案 cheating）；語氣判斷題情境詞","err":"cheat in an exam（考試作弊）介詞用 in；cheat sb 解「欺騙某人」","coll":"cheat in a game; accuse sb of cheating","ex1":"It is unfair to cheat when playing games with friends.","ex2":"Anyone who cheats in the exam will get zero marks."},{"en":"loss","pos":"n.","zh":"失敗；損失","cat":"考試重點詞","src":"單元評估","sent":"'I am not cheating! You just can't accept your loss,' said Timmy.","exam":"單元評估筆記填空原考詞；詞形轉換：lose (v.) → loss (n.) → lost (adj.)","err":"lose / loss / lost 三詞混用是港生高頻錯誤；win 的反義名詞是 loss","coll":"accept a loss; win or loss; a heavy loss","ex1":"A good player knows how to accept a loss with grace.","ex2":"The typhoon caused serious economic losses to the city."},{"en":"comeback","pos":"n.","zh":"反敗為勝；捲土重來","cat":"口語常用","src":"單元評估","sent":"Dad managed to pull off a miraculous comeback and took the win.","exam":"單元評估筆記填空原考詞（a remarkable comeback）","err":"作名詞時是一個單詞 comeback；動詞短語才分寫 come back","coll":"pull off a comeback; make a comeback","ex1":"Our team made an amazing comeback in the last five minutes.","ex2":"Old-fashioned board games are making a comeback among teenagers."},{"en":"defeat","pos":"n./v.","zh":"失敗；擊敗","cat":"考試重點詞","src":"單元評估","sent":"Timmy apologized for being a sore winner earlier, and Alison took defeat with grace.","exam":"單元評估筆記填空原考詞；動詞用法 defeat all other teams 見於詞彙練習","err":"defeat 作動詞是「擊敗對手」，賓語是人／隊伍；「輸掉比賽」要說 lose the game","coll":"take defeat with grace; defeat the enemy; admit defeat","ex1":"She accepted defeat with a smile and congratulated the winner.","ex2":"Players in a squad of three have to defeat all other teams to survive."}],"phrases":[{"phrase":"get in the way (of sth)","zh":"妨礙；阻礙","type":"課文短語","sent":"The bottom line is not to let gaming get in the way of other important things in your life, like your relationships, your work and your studies.","note":"指某事妨礙另一件更重要的事；of 後接被妨礙的事物。寫作議論打機利弊時極常用。","ex":"Because of her poor time management, playing games got in the way of her studies."},{"phrase":"go broke","zh":"破產；花光錢","type":"課文短語","sent":"The goal (of Monopoly) is to amass wealth and become the richest while other players go broke.","note":"口語化表達「沒錢了、破產」；broke 是形容詞，不要誤用 broken。","ex":"Natalie went broke after she spent all her allowance on a new video game."},{"phrase":"on the surface","zh":"表面上","type":"寫作句式","sent":"These games might seem old-fashioned on the surface, but they can actually be a lot of fun once you've learnt their ins and outs.","note":"用於先講表象、後講實情的對比句式，常與 but actually 連用，是寫作轉折好幫手。","ex":"On the surface, the board game appears to be made for children, but many adults also enjoy it."},{"phrase":"the fact is","zh":"事實是；其實","type":"寫作句式","sent":"The fact is, with such a dazzling array of games out there, everyone can find one that they truly enjoy.","note":"置於句首帶出真實情況，語氣比 in fact 稍強；後面用逗號再接完整句子。","ex":"The fact is, now that more people can afford smartphones, mobile games are increasing in popularity."},{"phrase":"be a pain","zh":"令人煩惱的事；麻煩","type":"口語短語","sent":"VR is also a pain in small homes.","note":"口語表示某事很麻煩、討厭；主語可以是事物或活動，也可說 a pain in the neck。","ex":"When playing online games with strangers, it is a pain to be paired up with someone who is unskilled."},{"phrase":"be worth doing sth","zh":"值得做某事","type":"寫作句式","sent":"For games to be enjoyable and worth playing, the video response has to be instant with zero latency.","note":"worth 後必須接動名詞（worth buying），不能接 to buy；是語法及寫作雙重考點。","ex":"With an intricate storyline and superb voice acting, this new game is certainly worth playing."},{"phrase":"(not) one's cup of tea","zh":"（不）合某人口味；（非）某人所好","type":"口語短語","sent":"Not my cup of tea","note":"多用於否定：not my cup of te
