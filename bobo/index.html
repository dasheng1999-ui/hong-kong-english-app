acked ground was charred black and there were no signs of life.","note":"常說 there is no sign of sb/sth；sign 可用單數或複數（no sign / no signs of life）；記敘描寫搜尋落空時實用。","ex":"Evan had searched all over the galaxy but there was no sign of Destiny Lo."},{"phrase":"on one's shoulders","zh":"（責任）落在某人肩上","type":"課文短語","sent":"Humanity's hope lay on his shoulders.","note":"常搭配 the weight / responsibility falls on one's shoulders；比喻承擔重任；記敘及議論描述責任時實用。","ex":"Belinda knew that now Earth was uninhabitable, the job of securing the future of her species fell on her shoulders."},{"phrase":"run out of time","zh":"時間不夠用；來不及","type":"課文短語","sent":"We're running out of time and the world is ending.","note":"run out of sth 指「用完某物」，此處指時間；亦可 run out of fuel / water；描述緊迫情境時實用。","ex":"Leah was running out of time to save Cleo, Diego and their crew from the incoming asteroid."},{"phrase":"Tell me something I don't know","zh":"這還用你說（我早就知道了）","type":"口語短語","sent":"'Tell me something I don't know,' remarked Bryn.","note":"口語慣用語，帶諷刺語氣，表示「你說的我早知道」；用於回應顯而易見的話；記敘對白及口語中生動。","ex":"Of course flying into a wormhole is a bad idea - tell me something I don't know!"},{"phrase":"a matter of sth","zh":"只是……的問題","type":"寫作句式","sent":"There is no fundamental law of science that renders it impossible, so it's just a matter of working out the finer details.","note":"常說 it's just a matter of + 名詞/動名詞（a matter of time / practice）；表示「只需……便可」；議論預測趨勢時實用。","ex":"Millicent believes that it's just a matter of time before space travel becomes as popular and routine as air travel."},{"phrase":"come one's way","zh":"向某人到來；降臨到某人身上","type":"課文短語","sent":"So let's take a sneak peek at the next transport revolutions coming our way.","note":"one's 隨人變化（coming our / your way）；指「機會或事物到來」；描述未來趨勢或機遇時實用。","ex":"Juniper is a futurologist who believes that underwater cities will be coming our way in the future."},{"phrase":"if ... is anything to go by","zh":"如果……可作參考的話","type":"口語短語","sent":"If what I saw on my social media feeds is anything to go by, people talk more about its cute appearance than its function.","note":"插入語句式，表示「以……為判斷依據」；置句首並加逗號；聽力及口語推斷判斷時常見。","ex":"If the long queues are anything to go by, this new robot must be extremely popular."},{"phrase":"your guess wasn't too far off","zh":"你猜得八九不離十","type":"口語短語","sent":"Well, your guess wasn't too far off. The sleep robot is the second most popular.","note":"口語表示「猜測接近正確」；far off 指「相差很遠」；口試及日常對話回應猜測時實用。","ex":"Your guess wasn't too far off - the warehouse robot actually came fourth, not fifth."},{"phrase":"I can totally see why","zh":"我完全明白箇中原因","type":"口語短語","sent":"It looks like a robot from the movies! ... I can totally see why. It looks like something you might see in a movie about space wars.","note":"口語表示理解與認同對方的觀點；totally 加強語氣；口試小組討論表達共鳴時自然實用。","ex":"People love the robot guide dog because of how it looks - I can totally see why."}]},{"key":"3B_U5","form":"F3","book":"3B","num":5,"theme":"Journey to good health","theme_zh":"健康之旅","words":[{"en":"acne","pos":"n.","zh":"暗瘡；粉刺","cat":"核心詞彙","src":"Text 2","sent":"Until recently, acne has been widely perceived as a 'flaw', while smooth skin and an even skin tone have been deemed 'positive assets'.","exam":"單元主題詞，閱讀理解及聽力常見；屬不可數名詞，選詞填空時不可加 a 或 -s；銜接高中健康議題寫作。","err":"港生受廣東話「生暗瘡」影響易寫成 grow acne，正確搭配為 have / get / suffer from acne。","coll":"severe acne; acne treatment; cause acne; anti-acne diet","ex1":"Many teenagers get acne during puberty, so there is no need to feel ashamed.","ex2":"The article explains how stress and a poor diet can cause severe acne among adolescents."},{"en":"flaw","pos":"n.","zh":"缺陷；瑕疵","cat":"考試重點詞","src":"Text 2","sent":"Until recently, acne has been widely perceived as a 'flaw', while smooth skin and an even skin tone have been deemed 'positive assets'.","exam":"閱讀理解同義詞題常考 flaw = imperfection / defect；詞形轉換考 flawed（有缺陷的）與 flawless（完美無瑕的）。","err":"flawless 意思是「完美的」而非「沒用的」；注意與 floor 拼寫、發音相近易混淆。","coll":"a fatal flaw; flawed photo; flawless skin","ex1":"Everyone has flaws, and learning to accept them is part of growing up.","ex2":"The writer argues that so-called facial flaws should not be seen as something to hide."},{"en":"complexion","pos":"n.","zh":"膚色；氣色","cat":"核心詞彙","src":"Text 2","sent":"Both grew their audience by using #nofilter selfies to tell the imperfect truth about human complexions.","exam":"閱讀理解中常以 complexion 代替 skin，考同義替換；健康／外貌題型寫作可提升用詞層次。","err":"不要與 complex（複雜的）或 complexity 混淆；「膚色白」是 fair complexion，不是 white skin colour。","coll":"a clear complexion; a fair complexion; improve one's complexion","ex1":"Drinking plenty of water helps you keep a healthy complexion.","ex2":"The advertisement promises a clearer complexion within two weeks, but such claims are often exaggerated."},{"en":"blemish","pos":"n.","zh":"（皮膚上的）斑點；瑕疵","cat":"核心詞彙","src":"Text 2","sent":"Society's unrealistic expectations, propagated through photoshopped images of heavily made-up models, have conditioned people to find their blemishes unacceptable.","exam":"閱讀理解詞義推斷題常見；可與 flaw、imperfection 互為同義詞。","err":"港生易誤以為 blemish 只指性格缺點；它最常指皮膚上的小瑕疵，如暗瘡印。","coll":"skin blemishes; conceal blemishes; without a blemish","ex1":"She uses concealer to cover the blemishes on her cheeks before school photos.","ex2":"The skin positivity movement encourages people to accept their blemishes instead of hiding them."},{"en":"perceive","pos":"v.","zh":"視為；察覺","cat":"考試重點詞","src":"詞彙練習","sent":"The way we are perceived can be influenced strongly by our self-confidence, our attitude, and the way we dress.","exam":"單元評估選詞填空答案；常考被動式 be perceived as，銜接DSE閱讀高頻詞。","err":"perceive as 中的 as 易被遺漏；注意拼寫是 -ei- 不是 -ie-。","coll":"be perceived as a flaw; perceive a change; public perception","ex1":"Some students perceive making mistakes as failure, but mistakes help us learn.","ex2":"Acne has long been perceived as a flaw, though attitudes are changing."},{"en":"align","pos":"v.","zh":"使一致；對齊","cat":"考試重點詞","src":"Text 2","sent":"Some might even see it as a serious offence to post a friend's picture without first touching it up to align it with societal standards of appearance, and an arsenal of beautifying apps are available for this purpose.","exam":"單元評估選詞填空答案（aligned with）；搭配 align with 是閱讀及填空常考點。","err":"必須配介詞 with：align sth with sth；港生常漏寫 with 或誤用 align to。","coll":"align with values; align with standards; bring into alignment","ex1":"Her daily habits align with her goal of living a healthier life.","ex2":"She applied to volunteer at an animal shelter, which aligned with her own personal goals and values."},{"en":"available","pos":"adj.","zh":"可獲得的；有空的","cat":"高頻基礎詞","src":"Text 2","sent":"Some might even see it as a serious offence to post a friend's picture without first touching it up to align it with societal standards of appearance, and an arsenal of beautifying apps are available for this purpose.","exam":"單元評估選詞填空答案；聽力和日常應用文常見，基礎必學。","err":"形容詞放名詞後的用法（the only ticket available）易被誤判為錯誤；反義詞為 unavailable。","coll":"available online; available for booking; readily available","ex1":"Only two time slots were available on Saturday, but fortunately I was able to make the reservation.","ex2":"Free health check-ups are available to all students at the clinic."},{"en":"combat","pos":"v.","zh":"對抗；防止","cat":"考試重點詞","src":"Text 2","sent":"Such demands have been the driving force of the skin positivity movement, where people and communities come together to celebrate each other's natural skin, combat skin-related shaming and cyberbullying, and redefine what beautiful skin is.","exam":"單元評估選詞填空答案；議論文寫作高頻動詞，銜接高中社會議題寫作。","err":"combat 直接接名詞，不需加 against（combat cyberbullying，不是 combat against）。","coll":"combat cyberbullying; combat stress; combat a problem","ex1":"This environmentalist hopes to combat fast fashion by introducing sustainable and high-quality fashion brands to the public.","ex2":"The school launched a campaign to combat unhealthy eating habits among students."},{"en":"rejuvenate","pos":"v.","zh":"使恢復活力；使回復青春","cat":"考試重點詞","src":"Text 2","sent":"You can still conceal your pustules with cosmetics, or rejuvenate your skin with exfoliants, if you prefer; but it's just as valid to let those angry red bumps shine for all to see.","exam":"單元評估選詞填空答案；詞義推斷題常考（re- 前綴表「再次」）。","err":"拼寫較長易錯（rejuvenate）；注意與 renovate（翻新建築物）意思不同。","coll":"rejuvenate the skin; feel rejuvenated; rejuvenate a room","ex1":"A good night's sleep can rejuvenate both your body and your mind.","ex2":"Our class teacher hopes to rejuvenate our classroom's environment by replacing the peeling, old wallpaper."},{"en":"conceal","pos":"v.","zh":"隱藏；遮掩","cat":"核心詞彙","src":"Text 2","sent":"You can still conceal your pustules with cosmetics, or rejuvenate your skin with exfoliants, if you prefer; but it's just as valid to let those angry red bumps shine for all to see.","exam":"閱讀理解同義詞題常考 conceal = hide / cover up；詞彙練習填空答案。","err":"conceal 較 hide 正式，多用於書面語；名詞是 concealment，化妝品「遮瑕膏」是 concealer。","coll":"conceal blemishes; conceal one's feelings; conceal the truth","ex1":"She tried to conceal her nervousness with a big smile before the interview.","ex2":"Magazines spend fortunes hiring staff to conceal the very normal imperfections their models have."},{"en":"cosmetics","pos":"n.","zh":"化妝品","cat":"日常實用","src":"Text 2","sent":"You can still conceal your pustules with cosmetics, or rejuvenate your skin with exfoliants, if you prefer; but it's just as valid to let those angry red bumps shine for all to see.","exam":"閱讀理解及聽力外貌主題常見；留意形容詞 cosmetic（表面的）的引申義。","err":"通常以複數 cosmetics 出現；港生易與 make-up 混用，cosmetics 較正式。","coll":"wear cosmetics; cosmetics company; cosmetic products","ex1":"Some teenagers spend a lot of pocket money on cosmetics every month.","ex2":"The report claims that certain cheap cosmetics may actually harm your skin."},{"en":"dermatologist","pos":"n.","zh":"皮膚科醫生","cat":"核心詞彙","src":"詞彙練習","sent":"Furthermore, most models also go to dermatologists and nutritionists to improve their looks - something not many of us normal folk can afford to do all the time.","exam":"詞彙練習及Text 2重點職業詞；閱讀理解曾直接問「文中提及哪種職業」。","err":"拼寫長且有不發音組合，-ologist 結尾表「專科醫生／學家」；口語中不要簡化為 skin doctor（可作解釋用）。","coll":"see a dermatologist; consult a dermatologist","ex1":"If your acne is serious, you should see a dermatologist instead of trying random skincare products.","ex2":"The dermatologist advised her to stop using the bleaching cream immediately."},{"en":"authenticity","pos":"n.","zh":"真實性；真誠","cat":"核心詞彙","src":"Text 2","sent":"However, the imperative to hide or erase perfectly natural 'imperfections' is not accepted by today's young people, who value natural looks and authenticity in general.","exam":"閱讀理解主旨題關鍵詞；詞形轉換常考 authentic（adj.）與 authenticity（n.）。","err":"重音在 -ti- 音節（authenTIcity）；勿與 authority 混淆。","coll":"value authenticity; a sense of authenticity; authentic representation","ex1":"Young people today value authenticity more than a picture-perfect image.","ex2":"Authenticity is everything when it comes to natural portrait photography."},{"en":"self-conscious","pos":"adj.","zh":"（因在意外表而）不自在的；害羞的","cat":"核心詞彙","src":"Text 2","sent":"For one, it's easy to be self-conscious about one's skin: it's our largest organ, highly visible but rarely perfect.","exam":"外貌與心理健康主題高頻形容詞；選詞填空常考搭配 feel self-conscious about。","err":"不是「有自我意識」的褒義詞，而是「因在意自己形象而不自在」；後接 about。","coll":"feel self-conscious about; self-conscious teenagers","ex1":"He feels self-conscious about his braces, so he rarely smiles in photos.","ex2":"If you often feel self-conscious about your own appearance, remember that magazine perfection is an illusion."},{"en":"debilitating","pos":"adj.","zh":"使人衰弱的；嚴重損害的","cat":"考試重點詞","src":"Text 2","sent":"More and more people, including dermatologists, are discussing the debilitating psychological effects of conventional beauty standards on people's well-being, and demanding change.","exam":"閱讀理解同義詞題原題：Which word in paragraph 4 means 'damaging'? 答案即 debilitating。","err":"詞形長易拼錯；多修飾 effects / illness 等名詞，不用於形容人本身的性格。","coll":"debilitating effects; a debilitating illness","ex1":"Lack of sleep can have a debilitating effect on your concentration in class.","ex2":"Experts warn about the debilitating psychological effects of unrealistic beauty standards."},{"en":"influencer","pos":"n.","zh":"網絡紅人；意見領袖（KOL）","cat":"核心詞彙","src":"Text 2","sent":"Kadeeja Sel Khan, an influencer and self-described 'acne model', has over 380 000 followers.","exam":"社交媒體主題閱讀高頻詞；詞形轉換考 influence（v./n.）→ influencer（n.）→ influential（adj.）。","err":"港生慣用KOL，作文宜寫 influencer；動詞 influence 不加介詞：influence sb（不是 influence to sb）。","coll":"social media influencer; skincare influencer; a huge following","ex1":"Sunscreen use is increasing amongst teenagers thanks to the efforts of online skincare influencers.","ex2":"Many influencers edit their photos heavily, which creates unrealistic beauty standards."},{"en":"photogenic","pos":"adj.","zh":"上鏡的","cat":"核心詞彙","src":"詞彙練習","sent":"How can anyone be that photogenic?","exam":"詞彙練習及單元評估選詞填空答案；photo- 前綴詞族（photography, photographer）屬詞形轉換常考。","err":"photogenic 形容「人上鏡」，不能說 the photo is photogenic；照片好看用 flattering。","coll":"naturally photogenic; a photogenic smile","ex1":"My sister is so photogenic that she looks great even in candid snaps.","ex2":"Models seem impossibly photogenic, but their photos are heavily edited."},{"en":"appealing","pos":"adj.","zh":"吸引人的；討人喜歡的","cat":"考試重點詞","src":"詞彙練習","sent":"They seem to look appealing from every angle and at all times: Their tummies are always flat and toned.","exam":"詞彙練習填空答案；詞形轉換考 appeal（v./n.）→ appealing（adj.）；反義 unappealing。","err":"動詞 appeal 要接 to（appeal to teenagers）；港生常漏 to。","coll":"look appealing; an appealing physique; appeal to young people","ex1":"The healthy snacks are arranged to look appealing to children.","ex2":"Weightlifting is not solely about building an appealing physique; it also helps weight management."},{"en":"unflattering","pos":"adj.","zh":"不討好的；顯得難看的","cat":"核心詞彙","src":"詞彙練習","sent":"In fact, during photoshoots, photographers intentionally pick out the photographs that complement each model's appearance the most, while discarding the many, many shots that might be considered unflattering.","exam":"單元評估選詞填空選項；un- 前綴反義詞屬詞形轉換常考（flatter → flattering → unflattering）。","err":"flatter 本義是「奉承」，flattering 指「使人顯得好看」；雙重轉義港生易誤解。","coll":"an unflattering photo; an unflattering angle","ex1":"She deleted the unflattering photo before anyone could see it.","ex2":"Your facial irregularities don't have to look unflattering – they can even add to your appeal."},{"en":"complement","pos":"v.","zh":"襯托；與……相配","cat":"考試重點詞","src":"詞彙練習","sent":"In fact, during photoshoots, photographers intentionally pick out the photographs that complement each model's appearance the most, while discarding the many, many shots that might be considered unflattering.","exam":"單元評估閱讀原文詞（cardio and weightlifting complement each other）；與 compliment（讚美）拼寫混淆是經典考點。","err":"complement（e）＝互補襯托；compliment（i）＝讚美，港生極易寫錯。","coll":"complement each other; complement one's appearance","ex1":"The scarf complements her dress perfectly.","ex2":"Both forms of exercise complement each other and contribute to your overall fitness goals."},{"en":"greasy","pos":"adj.","zh":"油膩的","cat":"高頻基礎詞","src":"Text 1","sent":"A good rule of thumb: a greasy, messy mane that looks untidy, coarse or wiry is a no-no.","exam":"詞彙練習及單元評估選詞填空答案；健康飲食及外貌主題通用。","err":"由 grease（油脂）+ -y 構成，注意去 e 規則；形容食物（greasy food）和頭髮（greasy hair）皆可。","coll":"greasy hair; greasy skin; greasy food","ex1":"Wash your hair regularly so it does not become greasy.","ex2":"Having dry or greasy skin would be an issue for models, so they maintain a careful skincare routine."},{"en":"coarse","pos":"adj.","zh":"粗糙的","cat":"核心詞彙","src":"Text 1","sent":"A good rule of thumb: a greasy, messy mane that looks untidy, coarse or wiry is a no-no.","exam":"詞彙練習填空答案；閱讀理解詞義推斷常考。","err":"與 course（課程／路線）同音異義，聽力和默書極易混淆。","coll":"coarse hair; coarse skin; coarse fabric","ex1":"His hair feels coarse because he uses too many styling products.","ex2":"Their hair always appears silky and glossy - nothing like the oily and coarse mess on your head."},{"en":"mane","pos":"n.","zh":"（濃密的）頭髮；鬃毛","cat":"核心詞彙","src":"Text 1","sent":"A good rule of thumb: a greasy, messy mane that looks untidy, coarse or wiry is a no-no.","exam":"閱讀理解修辭用詞：以獅子鬃毛比喻濃密頭髮，考文意推斷。","err":"與 main（主要的）同音，聽力易混淆；本義是動物鬃毛，用於人屬幽默／形象化用法。","coll":"a messy mane; a glorious mane; a mane of hair","ex1":"She brushed her thick mane of hair before the photo shoot.","ex2":"The wild but glorious mane of the man in da Vinci's sketch makes messy hair seem dramatic."},{"en":"flabby","pos":"adj.","zh":"（肌肉）鬆弛的","cat":"核心詞彙","src":"詞彙練習","sent":"Publications use photo-editing software to smooth out any flabby bellies and unsightly zits.","exam":"詞彙練習填空答案；外貌描寫詞彙，與 toned（結實的）為反義配對常考。","err":"雙寫 b（flabby）；屬帶貶義的形容詞，描述他人身形時須注意語境是否禮貌。","coll":"flabby belly; flabby arms; go flabby","ex1":"Regular exercise keeps your muscles from becoming flabby.","ex2":"Photo editors smooth out flabby bellies to create an illusion of perfection."},{"en":"disingenuous","pos":"adj.","zh":"不真誠的；虛偽的","cat":"考試重點詞","src":"詞彙練習","sent":"Truthfully, the images you see in magazines are as disingenuous as they are attractive.","exam":"詞彙練習填空答案；dis- 前綴反義詞屬詞形轉換考點（genuine → ingenuous → disingenuous）。","err":"拼寫長，注意 dis + in + genuous 三部分；與 genuine（真誠的）為反義。","coll":"a disingenuous image; a disingenuous claim","ex1":"It is disingenuous to post heavily edited photos and call them natural.","ex2":"The writer criticizes magazine images as disingenuous representations of real people."},{"en":"candid","pos":"adj.","zh":"（照片）自然不擺拍的；坦率的","cat":"核心詞彙","src":"詞彙練習","sent":"Therefore, the photo must be candid and not appear as rehearsed as, say, a glamour shot (a photo that captures someone's physical beauty).","exam":"單元評估選詞填空選項；閱讀理解考兩個意思：照片「抓拍的」及人「坦率的」。","err":"candid photo 指未經擺拍的生活照，不是「糖果照」（勿與 candy 混淆）。","coll":"a candid snap; candid photography; a candid opinion","ex1":"I prefer candid snaps with my friends to posed group photos.","ex2":"Modern-day life is full of quick selfies, staged glamour shots and casual candid snaps."},{"en":"glamour shot","pos":"phr.","zh":"華麗沙龍照","cat":"核心詞彙","src":"詞彙練習","sent":"Therefore, the photo must be candid and not appear as rehearsed as, say, a glamour shot (a photo that captures someone's physical beauty).","exam":"單元評估選詞填空答案（glamour shots）；閱讀理解攝影主題關鍵詞。","err":"glamour 的形容詞是 glamorous（注意去 u）；港生易拼成 glamourous。","coll":"take glamour shots; staged glamour shots","ex1":"She booked a studio to take glamour shots for her birthday.","ex2":"What goes on behind the scenes of flawless glamour shots is a lot of hard work."},{"en":"airbrush","pos":"v.","zh":"（用軟件）修圖美化","cat":"核心詞彙","src":"詞彙練習","sent":"This is not the time to airbrush their body to perfection.","exam":"詞彙練習填空答案；社交媒體議題寫作實用動詞，銜接高中媒體素養題。","err":"複合詞連寫（airbrush）；被動式 be airbrushed 常見於閱讀。","coll":"airbrush a photo; airbrush selfies; airbrush sth to perfection","ex1":"He felt he had to airbrush his selfies to be accepted by society.","ex2":"Critics say advertisements should state clearly whether images have been airbrushed."},{"en":"tweak","pos":"v.","zh":"微調；稍作修改","cat":"口語常用","src":"詞彙練習","sent":"Emphasise that the photo is an authentic representation of the person's character by not tweaking their appearance on an editing app.","exam":"詞彙練習填空答案（tweaking）；口語及非正式書面語常見，聽力可能出現。","err":"與 twitch（抽動）拼寫相近；tweak 指小幅修改，大改用 edit / alter。","coll":"tweak a photo; tweak the design; a slight tweak","ex1":"Rather than tweaking your photos with apps, try improving your posing techniques.","ex2":"The teacher asked me to tweak my essay's conclusion before handing it in."},{"en":"close-up","pos":"n.","zh":"特寫（鏡頭）","cat":"日常實用","src":"詞彙練習","sent":"You could do close-ups that capture fine lines on their face.","exam":"單元評估選詞填空選項；攝影主題閱讀常見。","err":"名詞須連字號 close-up，複數 close-ups；不要寫成 closeup 或分開兩字。","coll":"do close-ups; a close-up shot; in close-up","ex1":"The photographer took a close-up of the athlete's determined face.","ex2":"Close-ups can capture real emotion, which makes portraits feel authentic."},{"en":"lighting","pos":"n.","zh":"燈光；光線","cat":"高頻基礎詞","src":"詞彙練習","sent":"Another way to make your photos seem more natural is to experiment with different angles and lighting, whether that's in a studio or outside.","exam":"單元評估選詞填空答案；不可數名詞，填空時不可加 a。","err":"與 lightning（閃電）只差一個 n，拼寫及聽力極易混淆。","coll":"natural lighting; good lighting; experiment with lighting","ex1":"Good lighting can make or break a photo, so shoot near a window.","ex2":"Luke knows that lighting and camera angle can make or break a glamour shot."},{"en":"emphasize","pos":"v.","zh":"強調；突出","cat":"高頻基礎詞","src":"詞彙練習","sent":"Emphasise that the photo is an authentic representation of the person's character by not tweaking their appearance on an editing app.","exam":"詞彙練習填空答案；詞形轉換考 emphasis（n.）→ emphasize（v.）→ emphatic（adj.）。","err":"emphasize 直接接名詞，不加 on（emphasize the importance，不是 emphasize on）；名詞才用 put emphasis on。","coll":"emphasize the importance of; emphasize a feature","ex1":"The poster emphasizes the benefits of a balanced diet.","ex2":"This type of exercise emphasizes stimulating the growth and development of muscle mass."},{"en":"portrait","pos":"n.","zh":"肖像；人像照","cat":"核心詞彙","src":"詞彙練習","sent":"The goal of the portrait photo is to convey your subject's character and personality.","exam":"Reading Focus 攝影主題核心詞；閱讀理解常與 selfie、snap、glamour shot 並列考辨析。","err":"重音在第一音節（POR-trait）；勿與 portray（v. 描繪）詞性混淆。","coll":"a portrait photo; group portraits; paint a portrait","ex1":"Doesn't Finley bear a resemblance to your favourite actor in this portrait?","ex2":"You don't need to be gorgeous to look good in a portrait; you just need to relax and give a confident smile."},{"en":"pose","pos":"v. / n.","zh":"擺姿勢；姿勢","cat":"高頻基礎詞","src":"Text 1","sent":"Your facial irregularities don't have to look unflattering – they can even add to your appeal, as long as you know how to pose.","exam":"本單元高頻詞（posing tips）；亦考引申搭配 pose a problem（造成問題），銜接高中閱讀。","err":"strike a pose（擺個姿勢）中 pose 是名詞；pose a problem 與「姿勢」無關，語義跳躍易失分。","coll":"strike a pose; posing tips; pose for a photo","ex1":"We all posed for a group photo at the school picnic.","ex2":"Check out the posing tips below to boost your confidence in front of the camera."},{"en":"jawline","pos":"n.","zh":"下顎線條","cat":"核心詞彙","src":"詞彙練習","sent":"Ultimately, beauty isn't about how defined your jawline is or youthful your face; it lies in your openness of expression.","exam":"詞彙練習及單元評估選詞填空答案；外貌描寫主題詞。","err":"複合詞連寫 jawline；jaw 發音 /dʒɔː/，港生易讀錯。","coll":"a defined jawline; show off one's jawline","ex1":"Tilting your head to the side shows the bone structure of your jawline better.","ex2":"A defined jawline is often seen as attractive, but real beauty lies in confidence."},{"en":"tilt","pos":"v.","zh":"傾斜；側（頭）","cat":"核心詞彙","src":"Text 1","sent":"Tilting your head to the side shows the bone structure of your jawline better.","exam":"閱讀理解同義詞題原題：find a synonym of 'turn'（答案 tilt）；動作描寫常用詞。","err":"與 tile（瓷磚）、till（直到）拼寫相近；過去式雙寫問題：tilted（不雙寫 t 之後才加 ed）。","coll":"tilt your head; tilt to the side; at a tilted angle","ex1":"Tilt your head slightly to find your best angle in photos.","ex2":"A face that is smiling and tilted at exactly the right angle looks less interesting than a dramatic one, according to da Vinci."},{"en":"squint","pos":"v. / n.","zh":"瞇眼；瞇眼的動作","cat":"核心詞彙","src":"Text 1","sent":"As the name suggests, it bears a resemblance to a normal squint, but the squinch is distinctly less severe.","exam":"Text 1 攝影技巧關鍵詞（squinching＝輕微瞇眼顯自信）；閱讀理解細節題常考。","err":"勿與 squeeze（擠壓）混淆；slightly squinted eyes 是分詞作形容詞的用法。","coll":"squint at the sun; slightly squinted eyes","ex1":"He squinted at the bright screen because the light hurt his eyes.","ex2":"There is a way of looking at the camera that will make you appear more confident: 'squinching', or lightly squinting."},{"en":"startled","pos":"adj.","zh":"受驚的；吃驚的","cat":"核心詞彙","src":"詞彙練習","sent":"And if you look long enough at the startled, open-mouthed expression of one of the warriors in 'Studies of the Heads of Two Warriors', you will feel less shy about making faces yourself.","exam":"詞彙練習填空答案；-ed / -ing 分詞形容詞辨析（startled 受驚的 vs startling 令人吃驚的）屬經典考點。","err":"港生常混用 startled 與 startling：人感到吃驚用 -ed，事物令人吃驚用 -ing。","coll":"a startled expression; be startled by","ex1":"She looked startled when the phone suddenly rang in the quiet library.","ex2":"Avoid staring into the camera like a frightened deer with a startled expression."},{"en":"body image","pos":"phr.","zh":"身體形象；體像","cat":"核心詞彙","src":"Text 2","sent":"Adolescents and adults alike frequently struggle with body image issues, and are taught to see their faces as unacceptably flawed.","exam":"本單元綜合技能任務主題（body image survey）；閱讀、聽力及寫作均可能出現，銜接DSE健康議題。","err":"固定搭配 body image issues；「身體形象差」是 negative body image，不要直譯成 bad body。","coll":"body image issues; positive/negative body image; develop a positive body image","ex1":"Body image is always a big issue for teens.","ex2":"We need to find ways to help students develop a positive body image."},{"en":"self-esteem","pos":"n.","zh":"自尊心；自我價值感","cat":"口語常用","src":"聽力對話","sent":"It says here that acne may seriously affect teens' self-esteem.","exam":"聽力填空原答案；心理健康主題高頻詞，銜接高中議論文寫作。","err":"須連字號 self-esteem；「自尊心低」是 low self-esteem，不是 small self-esteem。","coll":"affect one's self-esteem; low/high self-esteem; boost self-esteem","ex1":"Praise from teachers can boost students' self-esteem.","ex2":"Having acne can make you feel insecure about your looks and affect your self-esteem."},{"en":"depression","pos":"n.","zh":"抑鬱；抑鬱症","cat":"口語常用","src":"聽力對話","sent":"The pamphlet also mentions that in severe cases, patients may become extremely frustrated and try to hide away from others. Eventually, this can lead to depression.","exam":"聽力填空原答案；詞形轉換常考 depress → depressed / depressing → depression。","err":"feel depressed（人感到抑鬱）用 -ed；depression 是名詞，「患上抑鬱症」是 suffer from depression。","coll":"lead to depression; suffer from depression; signs of depression","ex1":"Talking to friends and family can help prevent feelings of depression.","ex2":"Depression may last for years if it's not treated properly."},{"en":"nutrient","pos":"n.","zh":"營養素","cat":"口語常用","src":"聽力對話","sent":"Furthermore, brown rice is rich in nutrients that work to keep your skin acne-free.","exam":"聽力健康飲食主題常見；詞族 nutrition / nutritious / nutritionist 屬詞形轉換考點。","err":"nutrient 是可數名詞（nutrients）；「有營養的」是 nutritious，勿寫成 nutrient food。","coll":"rich in nutrients; essential nutrients; absorb nutrients","ex1":"Dark green vegetables are packed with nutrients such as vitamins and minerals.","ex2":"A balanced diet provides all the nutrients your body needs during puberty."},{"en":"digestion","pos":"n.","zh":"消化","cat":"口語常用","src":"聽力對話","sent":"Both are rich in fibre and can help improve your skin by improving your digestion.","exam":"聽力健康主題詞；詞形轉換考 digest（v.）→ digestion（n.）→ digestive（adj.）。","err":"動詞 digest 重音在第二音節；digestive system（消化系統）是固定搭配。","coll":"improve digestion; aid digestion; digestive system","ex1":"Eating slowly helps your digestion.","ex2":"Whole wheat bread and brown rice can improve your skin by improving your digestion."},{"en":"fibre","pos":"n.","zh":"纖維","cat":"日常實用","src":"聽力對話","sent":"What's recommended are whole wheat bread and brown rice. Both are rich in fibre and can help improve your skin by improving your digestion.","exam":"聽力健康飲食高頻詞；不可數名詞，選詞填空注意不加 -s。","err":"英式拼法 fibre、美式 fiber，作答宜統一用課本英式拼法。","coll":"rich in fibre; high-fibre food; dietary fibre","ex1":"Fruit and vegetables are a good source of fibre.","ex2":"Doctors recommend high-fibre foods such as brown rice for a healthy diet."},{"en":"endurance","pos":"n.","zh":"耐力","cat":"考試重點詞","src":"單元評估","sent":"Regular cardio workouts help boost endurance and strengthen the heart muscle, thus reducing the risk of heart disease.","exam":"單元評估閱讀理解關鍵詞（cardio 好處）；詞形轉換考 endure（v.）→ endurance（n.）。","err":"與 insurance 拼寫節奏相近易混；「鍛煉耐力」用 build / boost endurance。","coll":"boost endurance; build endurance; endurance training","ex1":"Long-distance running is a great way to build endurance.","ex2":"Cardio workouts help boost endurance and strengthen the heart muscle."},{"en":"posture","pos":"n.","zh":"姿勢；體態","cat":"考試重點詞","src":"單元評估","sent":"Additionally, strength training helps in improving bone density, reducing the risk of osteoporosis and promotes better posture, which can prevent back problems.","exam":"單元評估閱讀理解答案詞（weightlifting assists in better posture）；健康主題寫作實用。","err":"與 pose 同詞根但意義不同：posture 指整體體態；「姿勢不良」是 poor posture。","coll":"good/poor posture; improve one's posture; sitting posture","ex1":"Sitting up straight in class helps you maintain good posture.","ex2":"Strength training promotes better posture, which can prevent back problems."},{"en":"physique","pos":"n.","zh":"體格；體形","cat":"考試重點詞","src":"單元評估","sent":"Contrary to popular belief, weightlifting is not solely focused on bulking up and building an appealing physique; it also plays a vital role in weight management.","exam":"單元評估閱讀原文詞；閱讀理解同義替換 physique = body shape / build。","err":"發音 /fɪˈziːk/，重音在後；與 physics（物理）、physical 同詞根但意義不同。","coll":"an appealing physique; build a strong physique","ex1":"Swimmers usually have a strong, lean physique.","ex2":"Muscles Gym is dedicated to improving your health and physique."},{"en":"calorie","pos":"n.","zh":"卡路里","cat":"日常實用","src":"單元評估","sent":"Cardio exercises are known for burning calories and reducing body fat, making them a popular choice for those looking to lose weight.","exam":"單元評估閱讀及填空答案（burn more calories）；健康主題聽力常見。","err":"複數 calories；「低卡路里」是 low in calories 或 low-calorie（作定語）。","coll":"burn calories; low in calories; calorie intake","ex1":"Dark green vegetables are a good choice because they're low in calories.","ex2":"Even at rest, your body will burn more calories after strength training."},{"en":"moderate","pos":"adj.","zh":"適度的；中等的","cat":"考試重點詞","src":"單元評估","sent":"To find balance, consider aiming for at least 150 minutes a week of moderate-intensity cardio activity, such as brisk walking or jogging, and two or more days a week of strength training targeting different muscle groups.","exam":"本單元文法「數量表達」核心詞（a moderate amount of）；與 excessive 為反義配對常考。","err":"a moderate amount of + 不可數名詞；形容詞讀 /ˈmɒdərət/，勿與動詞讀音混淆。","coll":"a moderate amount of; moderate exercise; moderate-intensity","ex1":"Eating a moderate amount of sweets occasionally is fine.","ex2":"Aim for at least 150 minutes a week of moderate-intensity cardio activity."},{"en":"excessive","pos":"adj.","zh":"過量的；過度的","cat":"考試重點詞","src":"詞彙練習","sent":"(改編) Susan has been eating an excessive amount of fast food, so her parents are worried about her being overweight.","exam":"文法練習「數量表達」核心詞（an excessive amount of）；改錯題常以 moderate 誤代 excessive。","err":"excessive 前配 an（an excessive amount of）；副詞 excessively、動詞 exceed 屬詞形轉換考點。","coll":"an excessive amount of; excessive drinking; excessive pressure","ex1":"Excessive drinking can cause health problems.","ex2":"Placing excessive pressure on yourself can harm your mental health, so try to be more relaxed."},{"en":"dieting","pos":"n.","zh":"節食","cat":"口語常用","src":"聽力對話","sent":"For example, some students admitted that dieting made them feel sick.","exam":"綜合技能聽力原文詞；動名詞作主語的用法（Dieting made them feel sick）是寫作考點。","err":"diet 作動詞時 -ing 形式為 dieting（不雙寫 t）；「節食」不等於 eating less，極端節食是 extreme dieting。","coll":"extreme dieting; go on a diet; a balanced diet","ex1":"Extreme dieting is never an option when it comes to getting in shape.","ex2":"They're going through puberty and they need to eat properly for the body to develop, so dieting can ruin their health."},{"en":"respondent","pos":"n.","zh":"（問卷）受訪者；回應者","cat":"考試重點詞","src":"聽力對話","sent":"We got a total of three hundred and fifty respondents this time.","exam":"綜合技能聽力數據題常見；報告寫作（survey report）必用詞，銜接高中實用文。","err":"詞形轉換 respond（v.）→ response（n. 回應）→ respondent（n. 受訪者），三者易混。","coll":"survey respondents; a total of ... respondents","ex1":"Most respondents said they exercise less than twice a week.","ex2":"I wonder whether some of the respondents of our survey are victims of body shaming."}],"phrases":[{"phrase":"bear a resemblance to","zh":"與……相似","type":"課文短語","sent":"As the name suggests, it bears a resemblance to a normal squint, but the squinch is distinctly less severe.","note":"正式書面語，相當於 look like；resemblance 前常加 a strong / close 修飾。注意動詞是 bear（bore, borne）。","ex":"Doesn't Finley bear a resemblance to your favourite actor in this portrait?"},{"phrase":"been there, done that","zh":"經歷過了；早已見慣","type":"口語短語","sent":"Modern-day life is a virtually unceasing photo-taking frenzy, in which we collect countless images to post online: quick selfies, staged glamour shots for social media, group portraits and casual candid snaps with family or friends – that 'been there, done that, got the picture' vortex that so many of us have been sucked into.","note":"非正式口語，形容對某事已有經驗、不再新鮮；可作形容詞式使用（a very 'been there, done that' attitude）。","ex":"My classmate who's been there, done that told me that getting my acne checked by a dermatologist would be life-changing."},{"phrase":"better off (doing sth)","zh":"（做某事）會更好","type":"課文短語","sent":"You'd be better off doing the oldest trick in the book – smiling!","note":"be better off + doing sth 表示「這樣做更明智」；比較級結構，後接動名詞而非 to do，是港生常錯點。","ex":"Rather than leaving the photo as it is, I think I'd be better off using a photo editing app."},{"phrase":"live a lie","zh":"活在謊言中","type":"課文短語","sent":"Living a lie breeds more lies, which can take a hefty toll on your emotional well-being.","note":"固定搭配 live + a lie（同源賓語結構）；用於議論文批評虛偽的生活方式。","ex":"Raymond didn't want to live a lie but he felt that he had to airbrush his selfies to be accepted by society."},{"phrase":"make or break","zh":"成敗攸關；決定成敗","type":"課文短語","sent":"Hair frames the face, and it can make or break a photo.","note":"作動詞（can make or break sth）或形容詞（a make-or-break moment）；寫作中用來強調關鍵因素。","ex":"Believe it or not, your confidence level can make or break your look."},{"phrase":"rule of thumb","zh":"經驗法則；粗略原則","type":"寫作句式","sent":"A good rule of thumb: a greasy, messy mane that looks untidy, coarse or wiry is a no-no.","note":"常用開頭句式 As a rule of thumb, ... 或 A good rule of thumb is to ...，適合提建議的文章。","ex":"When it comes to sun protection, a good rule of thumb is to apply your sunscreen thirty minutes before going outdoors."},{"phrase":"take a toll (on)","zh":"對……造成損害","type":"課文短語","sent":"Compulsively inspecting and treating one's own skin, and obsessively comparing it to others', inevitably takes a toll on one's mental health.","note":"主語多為壓力、壞習慣等負面事物；可加形容詞 take a heavy / hefty toll on。介詞必須用 on。","ex":"Colin's sedentary lifestyle took a toll on his health."},{"phrase":"come to do sth","zh":"逐漸開始（明白／接受）","type":"課文短語","sent":"As people come to embrace common skin conditions, they are also rejecting absurd, impossible beauty standards as unhealthy.","note":"表示經過一段時間後漸漸產生某種想法，常接 realize / understand / accept / embrace 等動詞。","ex":"Nico came to realize that concealing his blemishes under make-up only made them worse."},{"phrase":"for all to see","zh":"公開地；讓所有人看見","type":"課文短語","sent":"You can still conceal your pustules with cosmetics, or rejuvenate your skin with exfoliants, if you prefer; but it's just as valid to let those angry red bumps shine for all to see.","note":"置於句末的狀語，強調毫不遮掩；常與 leave / display / hang up ... for all to see 搭配。","ex":"Even though he was insecure about it, Jamie left his bald patch uncovered for all to see."},{"phrase":"on the rise","zh":"正在上升；日益增加","type":"寫作句式","sent":"Thanks to the self-love movement, new trends like skin positivity are on the rise.","note":"描述趨勢的必備短語，議論文及圖表作文常用；同義 increasing，反義 on the decline。","ex":"Unhealthy body image is on the rise because photo editing software has created unrealistic beauty standards."},{"phrase":"strike a chord","zh":"引起共鳴","type":"課文短語","sent":"Their large followings suggest their message has struck a chord. But why?","note":"後接 with / among sb；動詞不規則變化 strike–struck–struck；chord 的 ch 讀 /k/。","ex":"The activist's call for a wider range of body sizes to be represented in the fashion magazine struck a chord with thousands of readers."},{"phrase":"the tide turns","zh":"形勢逆轉；風向改變","type":"寫作句式","sent":"The tide seems to have turned in recent years, however.","note":"比喻社會風氣或形勢改變，議論文轉折段常用；亦可說 the tide has turned in favour of sth。","ex":"Self-care used to be considered a luxury, but the tide has turned in recent years."},{"phrase":"a whole host of","zh":"大量的；許許多多","type":"寫作句式","sent":"Ian meditates for 10 minutes every morning because it has a whole host of proven benefits.","note":"比 many / a lot of 更高階的數量表達，後接複數名詞；寫作中可提升詞彙分。","ex":"Quincey knows that looking back at family photos has a whole host of positive psychological effects."},{"phrase":"in lieu of","zh":"代替","type":"寫作句式","sent":"The school decided to give students a mental wellness week in lieu of a half-term break.","note":"正式書面語，相當於 instead of；lieu 讀 /ljuː/，源自法語，拼寫特殊須強記。","ex":"Hester chose to run home in lieu of catching the bus for the added health benefits."},{"phrase":"in part","zh":"部分地；在某程度上","type":"寫作句式","sent":"The growth of the self-care movement can be attributed in part to greater public awareness of the wide-ranging repercussions of poor mental health.","note":"常見於 be attributed in part to / be due in part to 等歸因句式，議論文分析原因時實用。","ex":"Stress lowers exam performance, in part by diverting students' attention away from their work."},{"phrase":"no pain, no gain","zh":"一分耕耘，一分收穫；不勞無獲","type":"口語短語","sent":"The saying 'no pain, no gain' might discourage some people from doing exercise.","note":"運動與勵志語境常用諺語；引用時可加 the saying / the fitness mantra 'no pain, no gain'。","ex":"The fitness mantra 'no pain, no gain' seems misleading to Henrietta, to whom exercising isn't an unpleasant process."},{"phrase":"You've got a point (there).","zh":"你說得有道理。","type":"口語短語","sent":"You've got a point there. Let's do so then.","note":"口試小組討論回應同伴意見的實用句，表示部分同意後可接 but 提出補充。","ex":"You've got a point there, but I think we should also consider the cost."},{"phrase":"slim down","zh":"減肥；變苗條","type":"日常表達","sent":"Someone should tell them eating less is the wrong way to slim down.","note":"口語片語動詞，比 lose weight 隨意；不要與 slim（adj. 苗條的）混淆。","ex":"Extreme dieting is a dangerous way to slim down; regular exercise is much healthier."}]},{"key":"3B_U6","form":"F3","book":"3B","num":6,"theme":"Finding paths","theme_zh":"探索前路","words":[{"en":"career","pos":"n.","zh":"職業；事業","cat":"核心詞彙","src":"詞彙練習","sent":"What do you guys think of my career ideas? How do you think students like me should go about choosing a career?","exam":"單元主題詞，閱讀理解及寫作必用；搭配 career path / career prospects 屬選詞填空常考，銜接高中生涯規劃議題。","err":"career 指整個職業生涯，與 job（一份工作）不同；港生易寫 find a career，找工作應說 find a job / pursue a career。","coll":"career prospects; career path; pursue a career; career guidance","ex1":"Choosing a career is one of the biggest decisions a secondary school student will face.","ex2":"She decided to pursue a career in digital marketing after taking an aptitude test."},{"en":"internship","pos":"n.","zh":"實習；實習職位","cat":"考試重點詞","src":"詞彙練習","sent":"We also want S5 and S6 students to have the option of replacing these workshops with a work experience week, in which they can complete an internship at school (e.g. as a temporary 'assistant librarian') or in a company of their choice.","exam":"單元評估選詞填空答案；聽力任務（internship application form）核心詞，銜接高中求職應用文寫作。","err":"「做實習」是 do / complete an internship，不是 play internship；實習生是 intern，兩詞詞形易混。","coll":"complete an internship; a summer internship; apply for an internship","ex1":"Students preparing for the job market should do one or two summer internships at a minimum.","ex2":"Marco is filling in an application form for a summer internship programme."},{"en":"résumé","pos":"n.","zh":"履歷；簡歷","cat":"核心詞彙","src":"詞彙練習","sent":"If approved, the proposed workshops would teach students practical skills such as how to write covering letters, produce a list of their qualifications and skills in a professional résumé, and complete university, scholarship and job applications.","exam":"單元評估選詞填空選項；求職主題閱讀及寫作核心詞，與 CV 同義互換常考。","err":"注意重音符號拼寫 résumé，與動詞 resume（繼續）意思完全不同；港生慣用 CV，兩者可互換但美式多用 résumé。","coll":"polish up one's résumé; send a résumé; attach a résumé","ex1":"Riley felt that he had sold himself short in his résumé so he was eager to show off his skills in the interview.","ex2":"Now that you've all decided on the jobs you want to apply for, let's get down to business and polish up your CVs."},{"en":"covering letter","pos":"n. phr.","zh":"求職信；附函","cat":"核心詞彙","src":"詞彙練習","sent":"If approved, the proposed workshops would teach students practical skills such as how to write covering letters, produce a list of their qualifications and skills in a professional résumé, and complete university, scholarship and job applications.","exam":"本單元文體重點（letter of application）相關詞；寫作卷求職信格式必考，銜接高中實用文。","err":"英式說 covering letter、美式說 cover letter，作答宜跟課本用 covering letter；勿與 cover（封面）單獨混用。","coll":"write a covering letter; attach a covering letter","ex1":"A good covering letter should highlight your strengths, skills and abilities.","ex2":"Remember to send a covering letter together with your résumé when you apply for the post."},{"en":"hiring manager","pos":"n. phr.","zh":"招聘經理","cat":"核心詞彙","src":"Text 1","sent":"To catch the weary eye of overworked hiring managers, your application should get right down to business.","exam":"詞彙練習及單元評估選詞填空選項；閱讀理解常問 hiring managers 重視甚麼。","err":"hiring manager 是「負責招聘的經理」，不是「被聘用的經理」；動名詞 hiring 作定語，勿寫成 hire manager。","coll":"impress a hiring manager; the weary eye of hiring managers","ex1":"Hiring managers want to see that you are motivated before they offer you a position.","ex2":"Hiring managers spend only seconds on each application, so make yours stand out."},{"en":"recruiter","pos":"n.","zh":"招聘人員；獵頭","cat":"核心詞彙","src":"Text 1 (Write more)","sent":"Freida's beautiful sketches caught the eye of the recruiter, who then recommended she apply for the position of junior illustrator at a local publishing house.","exam":"詞形轉換常考 recruit（v.）→ recruiter（n. 招聘者）→ recruitment（n. 招聘）；求職主題閱讀高頻。","err":"recruiter 是「招聘的人」，recruit 作名詞時反而指「新成員」；-er 與被動意義的混淆是常見錯點。","coll":"talk to a recruiter; a recruitment agency; recruit new staff","ex1":"After speaking to a recruiter, follow up by sending them your résumé.","ex2":"The recruiter was impressed by the candidate's portfolio and invited her to a second interview."},{"en":"applicant","pos":"n.","zh":"申請人；求職者","cat":"核心詞彙","src":"Text 1","sent":"Just follow the tips below to boost your career prospects and gain a competitive edge over other job applicants.","exam":"詞形轉換高頻詞族：apply（v.）→ application（n. 申請）→ applicant（n. 申請人）；閱讀理解與寫作均常見。","err":"application 是「申請（書）」、applicant 是「申請人」，港生填空時常誤配；「求職者」亦可說 job seeker。","coll":"job applicants; a strong applicant; screen applicants","ex1":"There were more than fifty applicants for the internship position.","ex2":"Each applicant was asked to complete an aptitude test before the interview."},{"en":"qualification","pos":"n.","zh":"資歷；資格","cat":"考試重點詞","src":"Text 1","sent":"Be sure to make your shining qualities and qualifications crystal clear.","exam":"閱讀理解及選詞填空高頻；詞形轉換考 qualify（v.）→ qualified / underqualified（adj.）→ qualification（n.）。","err":"qualification（資歷）與 quality（特質）拼寫相近，Text 1 兩詞並列出現，最易張冠李戴；常用複數 qualifications。","coll":"academic qualifications; qualification requirements; be underqualified for","ex1":"If your qualifications are in high demand, you'll be able to land the job of your dreams in no time.","ex2":"Kai is on board with your plan to lower the qualification requirements for the job."},{"en":"networking","pos":"n.","zh":"建立人脈；社交聯繫","cat":"考試重點詞","src":"Text 1 (Write more)","sent":"The key to networking is being proactive about building solid and lasting relationships with others.","exam":"單元評估選詞填空選項；Text 1 重點概念（networking 可打開 hidden job market），閱讀理解主旨題常考。","err":"networking 指建立人際網絡，不是「上網」；「人脈」是 a network of contacts，勿直譯成 relationship net。","coll":"networking practice; a network of contacts; network with insiders","ex1":"Networking with professionals in the field is a great way to learn exactly what their job involves.","ex2":"Willow found it easy to land a job as a fresh graduate because she had built up a fantastic network of contacts in the field."},{"en":"workforce","pos":"n.","zh":"勞動人口；全體員工","cat":"考試重點詞","src":"Text 2 (Write more)","sent":"Teresa and Stacy are looking forward to entering the workforce but Milo is not.","exam":"單元評估選詞填空選項；固定搭配 enter / join the workforce 屬填空常考，銜接高中社會議題閱讀。","err":"複合詞連寫 workforce；「投身社會工作」說 enter the workforce，勿直譯成 go out to society。","coll":"enter the workforce; join the workforce; a skilled workforce","ex1":"Many fresh graduates join the workforce immediately after finishing school.","ex2":"These activities will help students feel more prepared when entering the workforce."},{"en":"job market","pos":"n. phr.","zh":"就業市場","cat":"考試重點詞","src":"Text 1","sent":"The first time you put yourself on the job market, be it for full-time employment or an internship, it is easy to feel bewildered or even intimidated.","exam":"單元評估閱讀篇章主題詞（new trends in the job market）；選詞填空及閱讀主旨題高頻。","err":"固定搭配 on the job market（在求職中）；「就業市場差」是 a tough / weak job market，不用 bad job market 以外的直譯。","coll":"on the job market; enter the job market; a competitive job market","ex1":"The job market, like every other aspect of our lives, has experienced significant changes in recent years.","ex2":"First-time job seekers can easily get intimidated because the job market is unfamiliar to them."},{"en":"career prospects","pos":"n. phr.","zh":"事業前景","cat":"考試重點詞","src":"Text 1","sent":"Just follow the tips below to boost your career prospects and gain a competitive edge over other job applicants.","exam":"詞彙練習及單元評估選詞填空答案；搭配 boost / explore career prospects 常考，銜接DSE求職主題。","err":"prospects（前景）作此義時恆用複數；勿與 prospectus（簡章）或 respect 混淆。","coll":"boost career prospects; explore career prospects; bright prospects","ex1":"The aim of these workshops would be to help pupils explore their career prospects.","ex2":"Learning a second foreign language can boost your career prospects."},{"en":"competitive edge","pos":"n. phr.","zh":"競爭優勢","cat":"考試重點詞","src":"Text 1 (Write more)","sent":"Ernie had trouble landing a job because he lacked a competitive edge with which to rise above the competition.","exam":"詞彙練習及單元評估選詞填空答案；閱讀理解同義替換 edge = advantage 常考。","err":"edge 在此指「優勢」而非「邊緣」；固定搭配 gain / have a competitive edge over sb，介詞 over 易漏。","coll":"gain a competitive edge; a unique competitive edge; an edge over others","ex1":"You will have a greater competitive edge after learning a programming language.","ex2":"Hector was able to ascend the corporate ladder in no time because he had a unique competitive edge."},{"en":"employment","pos":"n.","zh":"就業；受僱","cat":"核心詞彙","src":"Text 1","sent":"The first time you put yourself on the job market, be it for full-time employment or an internship, it is easy to feel bewildered or even intimidated.","exam":"閱讀理解同義詞題原題：Text 1 中 employment 為 job 的同義詞；詞形轉換考 employ → employer / employee / employment。","err":"employer（僱主）與 employee（僱員）僅差字尾，聽力及填空極易掉轉；unemployment（失業）加 un- 前綴。","coll":"full-time employment; seek employment; employment opportunities","ex1":"Many graduates seek full-time employment as soon as they leave university.","ex2":"The company offers flexible employment arrangements to attract young talent."},{"en":"field","pos":"n.","zh":"領域；行業","cat":"高頻基礎詞","src":"詞彙練習","sent":"I have a broad idea of the field I want to get into but I'm still fleshing the details out and could use you all as a sounding board.","exam":"詞彙練習填空答案；閱讀理解細節題原題（a conversation with someone working in the field）。","err":"field 此處指「行業／領域」而非「田野」；「入行」是 get into / enter a field，勿說 go into the job。","coll":"in the field; enter a field; an expert in the field","ex1":"A conversation with someone working in the field can be invaluable.","ex2":"Marketing is a field that requires good interpersonal skills."},{"en":"position","pos":"n.","zh":"職位；崗位","cat":"高頻基礎詞","src":"Text 2","sent":"I am highly interested in the Event Planning Intern position posted on your website, and I believe it would be an exceptional opportunity for me to deploy my experience in sustainable development and conservation work.","exam":"求職信寫作必用詞（apply for the position of ...）；閱讀理解細節題常問申請的職位。","err":"「申請職位」是 apply for a position，介詞 for 易漏；position 較 job 正式，求職信宜用 position / post。","coll":"apply for a position; the position of junior illustrator; hold a position","ex1":"I am writing to put my name forward for consideration for the position of junior journalist at your news agency.","ex2":"Hiring managers want to see that you are motivated before they offer you a position."},{"en":"volunteer","pos":"v. / n.","zh":"當義工；義工","cat":"高頻基礎詞","src":"Text 2","sent":"I have volunteered at local environmental organization GreenWart.","exam":"Text 2 閱讀理解細節題答案（He was a volunteer at GreenWart）；現在完成時例句常用詞。","err":"volunteer 可作動詞（volunteer at an organization）；「做義工」是 do voluntary work，形容詞是 voluntary 不是 volunteer work 以外的 volunteering 混用。","coll":"volunteer at an organization; do voluntary work; coordinate volunteers","ex1":"Sam told me that he had signed up for voluntary work.","ex2":"Volunteering at a local charity is a good way to gain work experience."},{"en":"asset","pos":"n.","zh":"寶貴的人才；資產","cat":"考試重點詞","src":"Text 2","sent":"As a second year student studying Environmental Science at Wartburg College, I am confident that my passion and understanding of environmental issues would make me an asset to your organization.","exam":"求職信寫作金句（make me an asset to ...）；閱讀理解同義替換 asset = valuable addition 常考。","err":"be an asset to 的介詞是 to 不是 of；asset 指「有價值的人或物」，勿只理解為金錢資產。","coll":"an asset to the team; a valuable asset; positive assets","ex1":"Her fluent Putonghua makes her a real asset to the customer service team.","ex2":"I am confident that I will be an excellent addition to your team."},{"en":"portfolio","pos":"n.","zh":"作品集；工作成果紀錄","cat":"核心詞彙","src":"Text 2","sent":"I am a long-time follower of the impressive environmental portfolio of Green for Green.","exam":"求職與升學主題核心詞；閱讀理解詞義推斷題常考（portfolio 指機構或個人的工作成果）。","err":"重音在 -fo- 之前（portFOlio 誤，應為 portFOlio 不對——正確重音 port-FO-li-o 第二音節）；複數是 portfolios，勿加 -es。","coll":"an impressive portfolio; build a portfolio; a portfolio of work","ex1":"Design students should build a portfolio of their best work before applying for jobs.","ex2":"The company's environmental portfolio impressed the young applicant."},{"en":"exceptional","pos":"adj.","zh":"卓越的；罕有的","cat":"核心詞彙","src":"Text 2","sent":"I believe it would be an exceptional opportunity for me to deploy my experience in sustainable development and conservation work.","exam":"求職信寫作高分形容詞；閱讀理解同義替換 exceptional = outstanding / remarkable 常考。","err":"exceptional 意為「極出色」，並非 exception（例外）的一般形容詞義；勿與 excessive（過量的）混淆。","coll":"an exceptional opportunity; exceptional talent; an exceptional performance","ex1":"The internship is an exceptional opportunity to gain real workplace experience.","ex2":"Her exceptional language skills caught the eye of the recruiter."},{"en":"deploy","pos":"v.","zh":"運用；調配","cat":"考試重點詞","src":"Text 2","sent":"I believe it would be an exceptional opportunity for me to deploy my experience in sustainable development and conservation work.","exam":"閱讀理解詞義推斷題常考 deploy = use / apply；求職信寫作可提升用詞層次，銜接高中書面語。","err":"deploy 是正式書面語，口語多用 use / apply；拼寫勿與 destroy 相混，名詞是 deployment。","coll":"deploy one's experience; deploy skills; deploy resources","ex1":"The intern deployed her digital marketing skills to promote the charity event.","ex2":"This role allows me to deploy my problem-solving abilities in a real business setting."},{"en":"oversee","pos":"v.","zh":"監督；管理","cat":"核心詞彙","src":"Text 2","sent":"For example, I was responsible for organizing various public engagement events aimed at educating the local community on green living, and I assisted in overseeing the activities and coordinating volunteers.","exam":"閱讀理解同義替換 oversee = supervise / manage；不規則動詞變化 oversee–oversaw–overseen 屬詞形轉換考點。","err":"oversee（監督）與 overlook（忽略／俯瞰）意思幾乎相反，港生極易混淆；過去式是 oversaw。","coll":"oversee activities; oversee employee relations; oversee a project","ex1":"I'd hate to be an HR manager overseeing employee relations all day.","ex2":"As head prefect, she oversees the work of thirty junior prefects."},{"en":"coordinate","pos":"v.","zh":"協調；統籌","cat":"考試重點詞","src":"Text 2","sent":"For example, I was responsible for organizing various public engagement events aimed at educating the local community on green living, and I assisted in overseeing the activities and coordinating volunteers.","exam":"Text 2 選詞填空原答案（coordinating）；詞形轉換考 coordinate（v.）→ coordination（n.）→ coordinator（n.）。","err":"拼寫雙 o（coordinate）；「與……協調」是 coordinate with sb，聽力綜合任務曾考 had problems coordinating with them。","coll":"coordinate volunteers; coordinate with the venue staff; event coordination","ex1":"As the wedding planner, Hugh was in charge of coordinating the newlyweds' schedule with the venue staff and caterers.","ex2":"She worked well on her own, but had problems coordinating with teammates."},{"en":"persuade","pos":"v.","zh":"說服","cat":"考試重點詞","src":"Text 2","sent":"During my time with GreenWart, I also contributed to the development of a year-long campaign to reduce local waste production, and persuaded local business owners to sign a pledge to limit their energy consumption.","exam":"Text 2 選詞填空原答案（persuaded）；句型 persuade sb to do sth 屬寫作及改錯常考。","err":"persuade sb to do（成功說服）與 advise sb to do（僅建議）語氣不同；拼寫 -suade 易錯成 -suede。","coll":"persuade sb to do sth; be persuaded to invest; persuasive skills","ex1":"Through a long and well-researched presentation, Phil successfully persuaded investors to support his company.","ex2":"The campaign persuaded local shops to cut down on plastic packaging."},{"en":"pledge","pos":"n. / v.","zh":"誓言；承諾","cat":"考試重點詞","src":"Text 2","sent":"During my time with GreenWart, I also contributed to the development of a year-long campaign to reduce local waste production, and persuaded local business owners to sign a pledge to limit their energy consumption.","exam":"Text 2 閱讀理解選擇題原題：sign a pledge 意近 make a formal promise；同義替換必考。","err":"sign a pledge 是「簽署承諾書」，勿與 sign a contract（合約）混同；pledge to do sth 後接不定式。","coll":"sign a pledge; make a pledge; pledge to reduce waste","ex1":"The students signed a pledge to save energy at school.","ex2":"The company made a pledge to hire more fresh graduates this year."},{"en":"collaboration","pos":"n.","zh":"合作；協作","cat":"核心詞彙","src":"Text 2","sent":"These efforts required frequent communication and collaboration with colleagues as well as third parties, further developing my teamworking skills and outgoing personality.","exam":"Text 2 判斷題（True/False/Not Given）原文關鍵詞；詞形轉換考 collaborate（v.）→ collaboration（n.）。","err":"「與……合作」是 collaboration with sb，介詞 with 易漏；動詞 collaborate 勿寫成 corporate（公司的）。","coll":"collaboration with colleagues; in collaboration with; collaborate on a project","ex1":"Being a social media manager involves collaborating with influencers and brands.","ex2":"The project required close collaboration between the design and marketing teams."},{"en":"overseas","pos":"adv. / adj.","zh":"在海外；海外的","cat":"高頻基礎詞","src":"Text 2","sent":"I understand that Green for Green is seeking to expand its online marketing efforts overseas, and I believe this is an exciting opportunity for me to apply my experience in an international setting.","exam":"Text 2 選詞填空原答案（I've never been overseas）；作副詞時前面不加介詞，屬填空常見陷阱。","err":"go / expand overseas 前不加 to（不是 go to overseas）；oversee（監督）與 overseas（海外）拼寫僅差一字母。","coll":"expand overseas; study overseas; overseas markets","ex1":"We're going to Australia to learn about wildlife and I'm excited as I've never been overseas.","ex2":"Many Hong Kong students choose to study overseas after secondary school."},{"en":"impressive","pos":"adj.","zh":"令人印象深刻的；出色的","cat":"高頻基礎詞","src":"Text 2","sent":"I am a long-time follower of the impressive environmental portfolio of Green for Green.","exam":"Text 2 選詞填空原答案（His improvement is certainly impressive）；詞形轉換考 impress → impressive / impressed → impression。","err":"人感到佩服用 impressed（be impressed by），事物出色用 impressive；-ed / -ive 之別是港生高頻錯點。","coll":"an impressive portfolio; make an impressive improvement; be impressed by","ex1":"Joseph scored an A in his English exam despite failing last semester - his improvement is certainly impressive.","ex2":"By offering suggestions at meetings, she would make a good impression on her employer."},{"en":"sustainable","pos":"adj.","zh":"可持續的","cat":"核心詞彙","src":"Text 2","sent":"I am highly interested in the Event Planning Intern position posted on your website, and I believe it would be an exceptional opportunity for me to deploy my experience in sustainable development and conservation work.","exam":"環保與工作跨主題高頻詞；固定搭配 sustainable development（可持續發展）閱讀及寫作常見，銜接DSE環保議題。","err":"詞形轉換 sustain（v.）→ sustainable（adj.）→ sustainability（n.），字尾長易拼錯；勿與 substantial（大量的）混淆。","coll":"sustainable development; sustainable living; environmentally sustainable","ex1":"The charity promotes sustainable living through community workshops.","ex2":"This environmentalist hopes to introduce sustainable fashion brands to the public."},{"en":"journalist","pos":"n.","zh":"記者；新聞工作者","cat":"核心詞彙","src":"詞彙練習","sent":"I am writing to put my name forward for consideration for the position of junior journalist at your news agency.","exam":"詞彙練習「職業字尾」原答案（journal + -ist）；詞形轉換考 -ist / -er / -or / -ian 職業字尾屬本單元重點。","err":"journalist 由 journal 加 -ist 構成，勿拼成 journalist 以外的 journelist；「新聞」是 journalism。","coll":"a junior journalist; work as a journalist; investigative journalist","ex1":"The journalist interviewed several fresh graduates about their job-hunting experiences.","ex2":"She dreams of becoming a journalist because she loves writing and meeting people."},{"en":"librarian","pos":"n.","zh":"圖書館管理員","cat":"高頻基礎詞","src":"詞彙練習","sent":"I have excellent research and time-management skills as I worked part-time as an assistant librarian at Wartburg College, where I majored in Communications.","exam":"詞彙練習「職業字尾」原答案（library + -an → librarian）；-ian 字尾職業詞屬詞形轉換常考。","err":"library 變 librarian 時 y 改為 i 再加 -an；重音移至 -bra-（liBRARian），朗讀易錯。","coll":"an assistant librarian; a school librarian","ex1":"Students can complete an internship at school as a temporary assistant librarian.","ex2":"The librarian helped me find reference books on career planning."},{"en":"translator","pos":"n.","zh":"翻譯員","cat":"核心詞彙","src":"詞彙練習","sent":"I interned as a translator when I was in high school and helped a fashion boutique translate their catalogue into English.","exam":"詞彙練習「職業字尾」原答案（translate + -or）；-or 字尾職業詞與 translate into 搭配屬填空考點。","err":"translator 字尾是 -or 不是 -er；「把A翻譯成B」是 translate A into B，介詞 into 易漏。","coll":"work as a translator; translate sth into English","ex1":"Being fluent in two languages, she works part-time as a translator.","ex2":"The translator helped the company communicate with its overseas clients."},{"en":"programmer","pos":"n.","zh":"程式編寫員","cat":"核心詞彙","src":"詞彙練習","sent":"I am a proficient programmer and know several coding languages, including R, Javascript, and Python.","exam":"詞彙練習「職業字尾」原答案（program + -er，雙寫m）；資訊科技職業主題閱讀常見。","err":"program 加 -er 須雙寫 m（programmer）；英式 programme（節目）與 program（程式）拼法有別。","coll":"a proficient programmer; a computer programmer; write code","ex1":"People who enjoy solving problems may become programmers because they write code to tackle different tasks.","ex2":"Octavia has a knack for problem solving, so a job as a computer programmer would suit her."},{"en":"freelancer","pos":"n.","zh":"自由工作者","cat":"考試重點詞","src":"單元評估","sent":"However, freelancers should be mindful of the need to continuously market their skills, build networks and manage their financial stability.","exam":"單元評估閱讀理解關鍵詞（freelancing 與 gig economy）；判斷題原題：Freelancing allows one to work independently。","err":"freelancer 是名詞、freelance 可作形容詞或動詞（freelance work / to freelance）；勿寫成 free lancer 兩字。","coll":"work as a freelancer; freelance work; the gig economy","ex1":"The freelancer is worried she will not be able to bring something new to the table at the next meeting.","ex2":"Freelancing offers increased flexibility and the chance to work with clients globally."},{"en":"automation","pos":"n.","zh":"自動化","cat":"考試重點詞","src":"單元評估","sent":"Advancements in automation and artificial intelligence (AI) are now reshaping the job market.","exam":"單元評估閱讀理解選擇題原題（automation and AI 哪項敍述不正確）；科技與工作議題銜接高中閱讀。","err":"詞形轉換 automatic（adj.）→ automate（v.）→ automation（n.）；judgement 題陷阱：automation 並非只會淘汰職位，也創造新職位。","coll":"automation and AI; be increasingly automated; automated systems","ex1":"Routine tasks in sectors like manufacturing and logistics are increasingly being automated.","ex2":"Automation may replace some jobs, but it also creates new job roles."},{"en":"artificial intelligence","pos":"n. phr.","zh":"人工智能","cat":"核心詞彙","src":"單元評估","sent":"Advancements in automation and artificial intelligence (AI) are now reshaping the job market.","exam":"單元評估閱讀篇章關鍵詞；科技主題閱讀與寫作必備，常以縮寫 AI 出現。","err":"artificial 拼寫長易錯（-ficial）；「與AI互補的技能」是 skills that complement AI，動詞 complement 勿寫成 compliment。","coll":"artificial intelligence (AI); skills that complement AI; AI technology","ex1":"Acquiring skills that complement AI, such as creativity, will be vital for job seekers.","ex2":"Artificial intelligence is changing the way companies recruit new staff."},{"en":"trend","pos":"n.","zh":"趨勢；潮流","cat":"考試重點詞","src":"單元評估","sent":"This article delves into some of the new trends shaping the job market today.","exam":"單元評估段落填空原答案（several important trends）；圖表作文與閱讀主旨題高頻詞。","err":"「趕上潮流」是 keep up with / stay abreast of trends；「新興趨勢」是 emerging trends，勿說 new coming trends。","coll":"emerging trends; new trends in the job market; follow a trend","ex1":"Staying current with evolving job market trends is crucial for individuals and organizations alike.","ex2":"Remote work has become a major trend since the pandemic."},{"en":"flexible","pos":"adj.","zh":"彈性的；靈活的","cat":"高頻基礎詞","src":"單元評估","sent":"Many organizations realized the benefits of offering flexible arrangements such as telecommuting or hybrid work from home models.","exam":"單元評估閱讀理解原題（Name TWO types of flexible arrangements）；詞形轉換考 flexible → flexibility。","err":"flexible 的名詞是 flexibility，字尾變化易錯；「彈性上班時間」是 flexible working hours。","coll":"flexible arrangements; flexible working hours; increased flexibility","ex1":"Freelancing offers increased flexibility and opportunities for skill diversification.","ex2":"The company allows flexible working hours to improve employee satisfaction."},{"en":"remote","pos":"adj.","zh":"遙距的；偏遠的","cat":"核心詞彙","src":"單元評估","sent":"The COVID-19 pandemic catalyzed the rise of remote work.","exam":"單元評估閱讀理解及廣告填空原文詞（remote work / working remotely）；新興工作模式主題高頻。","err":"remote work（遙距工作）中 remote 不解「偏遠」；副詞 remotely（work remotely）字尾 -ly 易漏。","coll":"remote work; work remotely; remote-friendly policies","ex1":"According to a recent report, 65% of workers would prefer a 100% remote work arrangement.","ex2":"Companies that adopt remote-friendly policies can access a larger talent pool."},{"en":"adaptability","pos":"n.","zh":"適應能力","cat":"考試重點詞","src":"單元評估","sent":"Additionally, digital literacy, analytic abilities and adaptability are essential for success in a technology-driven job market.","exam":"單元評估閱讀理解原文詞（in-demand skills）；詞形轉換考 adapt（v.）→ adaptable（adj.）→ adaptability（n.）。","err":"adapt（適應）與 adopt（採納）僅差一個字母，是經典混淆組；adapt to 後接名詞或動名詞。","coll":"adaptability and creativity; adapt to changes; a highly adaptable worker","ex1":"Employers value adaptability because industries are changing so quickly.","ex2":"Workers will need to adapt to new technology or reskill to stay employable."},{"en":"embrace","pos":"v.","zh":"欣然接受；擁抱","cat":"考試重點詞","src":"單元評估","sent":"Employers and employees need to embrace lifelong learning and develop skills that align with emerging trends to meet new requirements in the job market.","exam":"單元評估閱讀理解原題（who needs to accept lifelong learning → embrace 的同義替換）；議論文寫作高分動詞。","err":"embrace 引申義「欣然接受（改變／觀念）」較本義「擁抱」常考；直接接賓語，不加 with 或 to。","coll":"embrace lifelong learning; embrace change; embrace new trends","ex1":"By embracing these trends, individuals can unlock new opportunities for growth and fulfillment.","ex2":"Successful companies embrace change instead of fearing it."},{"en":"graduate","pos":"v. / n.","zh":"畢業；畢業生","cat":"高頻基礎詞","src":"聽力對話","sent":"The year you graduated from Harbour View Primary School was twenty sixteen.","exam":"聽力表格填空原文詞（graduation year）；fresh graduate（應屆畢業生）為本單元閱讀高頻搭配。","err":"graduate from a school 的介詞 from 易漏；名詞與動詞同形但發音不同（動詞 /-eɪt/、名詞 /-ət/）。","coll":"graduate from; a fresh graduate; graduation ceremony","ex1":"Willow found it easy to land a job as a fresh graduate.","ex2":"After graduating from secondary school, he joined an internship programme."},{"en":"treasurer","pos":"n.","zh":"財政；司庫","cat":"口語常用","src":"聽力對話","sent":"You're the treasurer of the Geography Club, am I right?","exam":"聽力表格填空原答案；學會職位詞（chairperson, treasurer, committee member）屬聽力常考。","err":"treasurer 由 treasure（寶藏）衍生，指管錢的職位；重音在第一音節（TREA-surer），聆聽時易聽漏。","coll":"the treasurer of a club; take up the post of treasurer","ex1":"The original treasurer quit, so the chairperson asked Marco to fill the post.","ex2":"As treasurer, she keeps a record of all the club's income and spending."},{"en":"proficient","pos":"adj.","zh":"熟練的；精通的","cat":"口語常用","src":"聽力對話","sent":"That's easy. I'm proficient in word processing.","exam":"聽力表格填空原文詞；求職信描述技能必用（be proficient in），銜接高中應用文寫作。","err":"be proficient in sth 的介詞是 in；名詞 proficiency（language proficiency 語言能力）字尾轉換易錯。","coll":"proficient in word processing; a proficient programmer; language proficiency","ex1":"I am a proficient programmer and know several coding languages.","ex2":"Applicants should be proficient in both written Chinese and English."},{"en":"fluent","pos":"adj.","zh":"流利的","cat":"口語常用","src":"聽力對話","sent":"I suppose I can say I'm fluent in English and Cantonese.","exam":"聽力表格填空原答案（fluent in English and Cantonese）；詞形轉換考 fluent → fluently → fluency。","err":"be fluent in a language 的介詞是 in；「說得流利」是 speak English fluently，副詞位置勿放錯。","coll":"fluent in English; speak fluently; language fluency","ex1":"Being fluent in English and Cantonese will be enough for most internship jobs.","ex2":"After a year in Korea, Rose has become fluent in Korean."},{"en":"deadline","pos":"n.","zh":"截止日期；限期","cat":"日常實用","src":"聽力對話","sent":"You've got to hurry up. Today is the deadline and you need to hand in the form by five P-M.","exam":"聽力細節題常考日期／時間限期；日常學校生活高頻詞，通告與應用文常見。","err":"「趕上限期」是 meet the deadline、「錯過限期」是 miss the deadline；勿直譯成 catch the deadline。","coll":"meet the deadline; miss the deadline; the deadline for applications","ex1":"The deadline for the internship application is this Friday.","ex2":"She stayed up late to meet the deadline for her project."},{"en":"availability","pos":"n.","zh":"可上班／有空的時間","cat":"日常實用","src":"聽力對話","sent":"I need to state my availability. Well, I'm not going anywhere this summer, so I'll be available in both July and August.","exam":"聽力表格填空關鍵詞（availability: July and August）；求職表格及電郵常用詞。","err":"形容詞 available（有空）→ 名詞 availability；「我七月有空」是 I'm available in July，勿說 I'm free time。","coll":"state one's availability; be available in July; subject to availability","ex1":"Please state your availability when you apply for the summer job.","ex2":"Gaby can only join the internship programme in August because her cousin is visiting in July."},{"en":"initiative","pos":"n.","zh":"主動性；積極性","cat":"口語常用","src":"綜合技能聽力","sent":"I mean, she's hard-working and did her job well, but there were times when she needed to take a step forward and take more initiative.","exam":"綜合技能筆記填空原答案（take more initiative）；職場評語及求職信高頻搭配，銜接高中綜合卷。","err":"固定搭配 take the initiative（主動行事），動詞用 take 不是 make；拼寫 -tia- 部分易錯。","coll":"take the initiative; take more initiative; show initiative","ex1":"Employers appreciate interns who take the initiative instead of waiting for instructions.","ex2":"She showed initiative by offering suggestions at meetings."},{"en":"enthusiasm","pos":"n.","zh":"熱誠；熱情","cat":"口語常用","src":"綜合技能聽力","sent":"I guess she could show more enthusiasm by offering suggestions at meetings.","exam":"綜合技能筆記填空關鍵詞；詞形轉換考 enthusiasm（n.）→ enthusiastic（adj.）→ enthusiastically（adv.）。","err":"show enthusiasm for sth 的介詞是 for；形容詞 be enthusiastic about sth 介詞轉為 about，兩者易混。","coll":"show enthusiasm; enthusiasm for one's work; be enthusiastic about","ex1":"His enthusiasm for environmental work made him stand out among the applicants.","ex2":"By offering suggestions at meetings, she would show others she is interested in what she is doing."},{"en":"supervisor","pos":"n.","zh":"上司；主管","cat":"日常實用","src":"綜合技能聽力","sent":"Your supervisor Mr Felix Kwong has asked you to help him write a letter giving feedback to Selena Wan, a student who has just completed her internship at the firm.","exam":"綜合技能情境常用詞（supervisor 指派任務）；詞形轉換考 supervise（v.）→ supervisor（n.）→ supervision（n.）。","err":"supervisor 字尾是 -or 不是 -er；與 employer（僱主）不同，supervisor 指直屬上司。","coll":"one's immediate supervisor; report to a supervisor; under the supervision of","ex1":"My supervisor gave me detailed feedback on my performance during the internship.","ex2":"Ask your supervisor if you have any questions about the task."}],"phrases":[{"phrase":"at a minimum","zh":"至少；最低限度","type":"寫作句式","sent":"You should, at a minimum, do some background research on your possible future employers before the interview.","note":"正式書面語，相當於 at the very least；常置於句中以逗號分隔，或置句末，議論文提出基本要求時實用。","ex":"Students preparing for the job market should do one or two summer internships at a minimum."},{"phrase":"catch the eye of sb","zh":"吸引某人的注意","type":"課文短語","sent":"Freida's beautiful sketches caught the eye of the recruiter, who then recommended she apply for the position of junior illustrator at a local publishing house.","note":"亦作 catch sb's eye；動詞不規則變化 catch–caught–caught。求職語境指令招聘者眼前一亮。","ex":"The sharp white dress shirt caught the eye of Gemma's mother, who thought it would be perfect for Gemma's upcoming job interview."},{"phrase":"come one's way","zh":"（機會）降臨到某人身上","type":"課文短語","sent":"Tyler felt grateful for every job opportunity that came his way.","note":"主語多為 opportunity / offer / chance；one's 須隨主語變化（came his way / comes your way），港生易漏改代名詞。","ex":"The job offer that came Eloise's way was too good to turn down."},{"phrase":"crystal clear","zh":"一清二楚；非常清晰","type":"課文短語","sent":"A few minutes into the job interview, it was crystal clear that Vernon was underqualified.","note":"比 obvious 更形象的說法；常用句式 it is crystal clear that ... 或 make sth crystal clear。兩字之間不加連字號。","ex":"Be sure to make your shining qualities and qualifications crystal clear."},{"phrase":"fear not","zh":"別擔心；不用怕","type":"口語短語","sent":"Fear not about getting rejected by some companies – it's a normal part of the process.","note":"帶幽默或安撫語氣的倒裝說法，相當於 don't worry；常單獨成句 Fear not! 後接 because 說明原因。","ex":"If you're worried about what career to choose, fear not, because this aptitude test will tell you what types of roles would suit you best."},{"phrase":"get down to business","zh":"言歸正傳；開始辦正事","type":"口語短語","sent":"After the interviewers had introduced themselves, we all got down to business.","note":"get down to 後接名詞或動名詞（get down to work / writing）；口試小組討論開場常用 Let's get down to business。","ex":"Now that you've all decided on the jobs you want to apply for, let's get down to business and polish up your CVs."},{"phrase":"straight to","zh":"直接到；直達","type":"課文短語","sent":"If you sign up to this app for jobseekers, your résumé will be sent straight to recruiters' inboxes.","note":"straight 作副詞解「直接」，相當於 directly；常見搭配 go / send / get straight to the point（開門見山）。","ex":"Turn on this job alert and we'll send similar job postings straight to your phone."},{"phrase":"in no time","zh":"很快；轉眼間","type":"口語短語","sent":"If your qualifications are in high demand, you'll be able to land the job of your dreams in no time.","note":"相當於 very quickly / very soon；置於句末，注意不要與 on time（準時）、in time（及時）混淆。","ex":"Hector was able to ascend the corporate ladder in no time because he had a unique competitive edge."},{"phrase":"land a job","zh":"找到工作；獲得職位","type":"課文短語","sent":"Ernie had trouble landing a job because he lacked a competitive edge with which to rise above the competition.","note":"land 作動詞解「成功取得」，比 get 生動；亦可說 land an interview / land a contract。求職主題寫作高分用語。","ex":"Willow found it easy to land a job as a fresh graduate because she had built up a fantastic network of contacts in the field."},{"phrase":"on the fly","zh":"即興地；邊做邊想","type":"口語短語","sent":"Eunice was great at thinking on the fly so she passed all her interview tests with flying colours.","note":"常與 think / decide / answer 連用，指未經準備即時應對；勿與 with flying colours（出色地）混淆，兩者可同句出現。","ex":"The interviewers tried to test how good Malcolm was at thinking on the fly by asking him a few random questions."},{"phrase":"sell sb short","zh":"低估／貶低某人（的價值）","type":"課文短語","sent":"Nina told her friends not to sell themselves short in job interviews.","note":"常用反身代名詞 sell yourself short（妄自菲薄）；面試建議語境常見 Don't sell yourself short。","ex":"Riley felt that he had sold himself short in his résumé so he was eager to show off his skills in the interview."},{"phrase":"the key to sth","zh":"……的關鍵","type":"寫作句式","sent":"The key to networking is being proactive about building solid and lasting relationships with others.","note":"to 是介詞，後接名詞或動名詞（the key to succeeding），港生常誤接原形動詞；議論文主題句實用句式。","ex":"Self-knowledge is the key to choosing the right career path."},{"phrase":"look forward to sth","zh":"期待；盼望","type":"課文短語","sent":"Teresa and Stacy are looking forward to entering the workforce but Milo is not.","note":"to 是介詞，必接名詞或動名詞（look forward to hearing from you）；求職信結尾必用句，港生最常錯接原形動詞。","ex":"Norbert is looking forward to interviewing the fresh graduates to see what they can offer the company."},{"phrase":"bring sth to the table","zh":"帶來（貢獻、才能）","type":"課文短語","sent":"The interns were happy to bring their unique skillsets to the table.","note":"職場常用比喻，指能為團隊提供的價值；面試常見問題 What can you bring to the table? 值得熟習。","ex":"The freelancer is worried she will not be able to bring something new to the table at the next meeting as she has not had time to think of any fresh ideas."},{"phrase":"by no means","zh":"絕不；一點也不","type":"寫作句式","sent":"Logan knew that he was by no means the most qualified of the ten candidates being interviewed.","note":"正式書面語，相當於 in no way / not at all；置句首時須倒裝（By no means is he lazy），Form 3 先掌握句中用法。","ex":"Marina's was by no means the worst interview of the day and she more than made up for her lacklustre performance with her high aptitude test score."},{"phrase":"have a knack for sth","zh":"對……有天賦；擅長","type":"課文短語","sent":"Octavia has a knack for problem solving, so a job as a computer programmer would definitely suit her.","note":"knack 的 k 不發音；介詞用 for，後接名詞或動名詞。比 be good at 更地道，適合描述個人強項。","ex":"Dalia and Enoch have a knack for making the people around them comfortable, so they would make excellent leaders."},{"phrase":"love nothing more than","zh":"最愛的莫過於","type":"課文短語","sent":"Laurie loves nothing more than to crunch numbers, so I think he'd be well-suited to a job in finance.","note":"後接 to-infinitive 或動名詞皆可（loves nothing more than conducting experiments）；強調「最喜歡」的高分句式。","ex":"Margot loves nothing more than conducting experiments in the chemistry lab; therefore, I think studying chemistry at university would be a good choice for her."},{"phrase":"on board","zh":"贊成；加入（團隊）","type":"口語短語","sent":"Wilma is on board with the idea of hiring a fresh graduate for this role.","note":"be / get on board with sth 表示支持某計劃；亦指「加入公司」（welcome sb on board）。介詞 with 易漏。","ex":"Kai is on board with your plan to lower the qualification requirements for the job."},{"phrase":"on one's part","zh":"就某人而言；某人方面的","type":"課文短語","sent":"Losing the details of your application was a mistake on their part.","note":"常見結構 a mistake / an error on sb's part（某人犯的錯）；亦可說 for my part（就我而言）置句首。","ex":"I did everything I could on my part to show the recruiters what skills I have to offer."},{"phrase":"How time flies!","zh":"時光飛逝！","type":"口語短語","sent":"Yes, you're right. How time flies! Anyway, let's get back to your form and look at the section about extracurricular activities.","note":"感歎句式，動詞用第三人稱單數 flies；口試及書信開頭感歎時間過得快時常用，不可說 How time fly。","ex":"How time flies! We are already graduating from secondary school this year."},{"phrase":"stay abreast of","zh":"緊貼（最新情況）","type":"寫作句式","sent":"From shifting technology landscapes to evolving work preferences, staying abreast of the latest trends can help individuals and organizations adapt and thrive.","note":"單元評估同義題原答案（= keeping up with）；正式書面語，後接 the latest trends / developments，議論文提升用詞層次。","ex":"Job seekers should stay abreast of new trends such as remote work and the gig economy."},{"phrase":"wish sb well","zh":"祝福某人","type":"日常表達","sent":"I mean, in the last paragraph, you'll wish her well for the future.","note":"正式書信結尾常用（wish her well for the future）；well 是副詞，勿寫成 wish sb good。","ex":"Before I close the letter, I'll need to wish her well for the future."}]},{"key":"3B_U7","form":"F3","book":"3B","num":7,"theme":"Getting the message","theme_zh":"傳遞訊息","words":[{"en":"internet lingo","pos":"phr.","zh":"網絡用語；上網潮語","cat":"核心詞彙","src":"Text 1","sent":"Our club activities will put an especial emphasis on digital communication and explore internet lingo that might prove useful to us when participating in internet forums or creating blog posts.","exam":"單元主題詞，閱讀理解及選詞填空高頻；銜接高中媒體素養議題寫作。","err":"lingo 是不可數名詞，不加 -s；港生易與 slang 混用，internet lingo 特指網絡上的用語。","coll":"internet lingo; use lingo; understand the lingo","ex1":"Anyone wanting to touch base with friends online needs to understand contemporary internet lingo.","ex2":"My grandmother finds it hard to follow the internet lingo teenagers use in their messages."},{"en":"slang","pos":"n.","zh":"俚語；非正式用語","cat":"核心詞彙","src":"Text 1","sent":"Slang often lets you be more emphatic or humorous than formal writing does.","exam":"閱讀理解及詞彙練習主題詞；不可數名詞，選詞填空不可加 -s。","err":"slang 是不可數名詞，不能說 a slang / slangs；正式寫作及考試作答應避免使用俚語。","coll":"use slang; regional slang; a slang word","ex1":"This little regional slang dictionary could come in handy during our trip.","ex2":"Slang often lets you be more emphatic or humorous than formal writing does."},{"en":"capitalization","pos":"n.","zh":"大寫（字母的運用）","cat":"核心詞彙","src":"Text 1","sent":"Capitalization can help you convey excitement in written correspondence, where facial expressions are missing.","exam":"Text 1 核心概念詞；詞形轉換考 capital → capitalize → capitalization。","err":"英式拼法亦作 capitalisation；港生易漏中間音節誤拼 capitalzation。","coll":"improper capitalization; use capitalization; capital letters","ex1":"As capital letters look and feel 'louder', capitalization is often used to mimic excited speech.","ex2":"Capitalization can help you convey excitement in written correspondence."},{"en":"punctuation","pos":"n.","zh":"標點符號","cat":"核心詞彙","src":"Text 1","sent":"They will also learn cool tricks like how to use punctuation marks and letters to make emoticons.","exam":"詞彙練習填空答案；不可數名詞，銜接高中書面語規範。","err":"不可數名詞，不加 -s；動詞是 punctuate，注意詞形轉換。","coll":"use proper punctuation; punctuation marks; correct punctuation","ex1":"Use proper grammar as well as punctuation, even in informal messages.","ex2":"Ellipses come in handy when you want to communicate that you're lost for words."},{"en":"ellipsis","pos":"n.","zh":"省略號（……）","cat":"核心詞彙","src":"Text 1","sent":"Be careful when using ellipses in your text mes
