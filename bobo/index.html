nization; volunteer work","ex1":"She works as a volunteer at the animal shelter every Saturday.","ex2":"More volunteers are needed for the beach clean-up."},{"en":"workshop","pos":"n.","zh":"工作坊","cat":"日常實用","src":"聽力對話","sent":"We went to take part in an upcycling workshop, where we were encouraged to explore our creativity and turn used objects into new products.","exam":"聽力與綜合任務原考詞（an upcycling workshop / a workshop on green living）；活動通告高頻","err":"一個單詞連寫（work shop✗）；「參加工作坊」用 take part in / attend a workshop","coll":"an upcycling workshop; hold a workshop; take part in a workshop","ex1":"GoGreen holds workshops regularly for people interested in green living.","ex2":"We attended a workshop on making eco-friendly soap."},{"en":"organic","pos":"adj.","zh":"有機的","cat":"日常實用","src":"綜合任務","sent":"They will learn how to make eco-friendly cleaning products, such as organic soap and detergent made from coconut oil.","exam":"綜合任務筆記原考點；日常購物情境高頻（organic food / organic soap）","err":"重音在第二音節 or-GAN-ic；organic 指不用化學品生產的，並非「有機會」的意思","coll":"organic soap; organic food; organic farming","ex1":"The supermarket has a section for organic vegetables.","ex2":"We made organic soap from coconut oil at the workshop."},{"en":"detergent","pos":"n.","zh":"洗潔劑；洗衣液","cat":"日常實用","src":"綜合任務","sent":"They will learn how to make eco-friendly cleaning products, such as organic soap and detergent made from coconut oil.","exam":"綜合任務原考詞；日常家居用品類詞彙，聽力購物情境常見","err":"拼寫 -gent 結尾（detergant✗）；通常不可數；laundry detergent 指洗衣液","coll":"laundry detergent; eco-friendly detergent; a bottle of detergent","ex1":"Eco-friendly detergent is less harmful to the ocean.","ex2":"Most detergents on sale come in plastic packaging."},{"en":"convenient","pos":"adj.","zh":"方便的","cat":"高頻基礎詞","src":"詞彙練習","sent":"It's much easier and more convenient to produce piles and piles of trash daily.","exam":"反義詞練習原考詞（convenient ↔ troublesome）；詞形轉換：convenient → convenience (n.)","err":"拼寫 con-ven-ient 易漏 i；「對某人方便」說 convenient for sb，不是 convenient to sb 的所有情況；convenience store 是便利店","coll":"convenient for; a convenient way; convenience store","ex1":"Single-use products are convenient but bad for the environment.","ex2":"It is convenient to bring your own bottle and refill it at school."},{"en":"inspiring","pos":"adj.","zh":"鼓舞人心的","cat":"口語常用","src":"聽力對話","sent":"I thought it would just be a usual welcoming speech, but it turned out to be quite inspiring.","exam":"聽力原考詞；詞形轉換：inspire (v.) → inspiring (adj. 令人鼓舞) → inspired (adj. 受鼓舞)","err":"inspiring 形容事物，inspired 形容人（The speech was inspiring; I was inspired），-ing/-ed 分詞形容詞是高頻錯點","coll":"an inspiring speech; quite inspiring; an inspiring story","ex1":"The director gave an inspiring speech about protecting the planet.","ex2":"Her story of going zero waste was really inspiring."},{"en":"creativity","pos":"n.","zh":"創意；創造力","cat":"口語常用","src":"聽力對話","sent":"We were encouraged to explore our creativity and turn used objects into new products.","exam":"聽力原考詞；詞形轉換：create (v.) → creative (adj.) → creativity (n.)","err":"不可數名詞，不能加 a / -s；「發揮創意」說 use / explore your creativity","coll":"explore one's creativity; full of creativity; boost creativity","ex1":"Upcycling old things is a fun way to explore your creativity.","ex2":"The art workshop helped the students develop their creativity."}],"phrases":[{"phrase":"back to square one","zh":"回到起點；從頭再來","type":"課文短語","sent":"So we're back to square one, aren't we?","note":"指努力失敗後回到最初狀態；常與 be / go / be sent 連用（be back to square one）。square 用單數。","ex":"We were sent back to square one after our first attempt to promote recycling at school failed."},{"phrase":"do one's bit","zh":"盡自己一分力","type":"課文短語","sent":"If not done right, your attempts to do your bit for planet Earth might fall short or even increase your carbon footprint!","note":"one's 隨主語變化（do my/their bit）；後接 for + 對象（do your bit for the environment）。環保寫作必用短語。","ex":"I hope to do my bit to protect the environment by using less paper and recycling old plastic bottles."},{"phrase":"fall short","zh":"未達目標；不足","type":"課文短語","sent":"Your attempts to do your bit for planet Earth might fall short or even increase your carbon footprint!","note":"指努力或結果未達到期望；過去式 fell short，完成式 has fallen short；可加 of + 目標（fall short of the target）。","ex":"The government tried to implement bike sharing in that city, but due to the public's poor response, the campaign fell short."},{"phrase":"for real","zh":"真正地；來真的","type":"口語短語","sent":"This way, we can consume less overall to reduce our eco-impact - for real.","note":"口語用法，置於句末強調「是真的、不是裝樣子」；也可用於疑問 Is this for real?（這是真的嗎？）","ex":"To reduce your carbon footprint for real, we should take public transport instead of private cars."},{"phrase":"in reality","zh":"實際上；事實上","type":"寫作句式","sent":"In reality, the most impactful low-carbon choice is living car-free.","note":"用於推翻前述表象，帶出真實情況；常與 might seem / believe 前後呼應，是議論文轉折的好句式。","ex":"Buying new clothes every month might seem cool, but in reality, we're contributing to the global waste issue by buying fast fashion."},{"phrase":"there is no denying (that)","zh":"無可否認","type":"寫作句式","sent":"There is no denying that air travel significantly increases your personal eco-footprint, especially if you are a frequent flyer.","note":"there is no + 動名詞句式，後接 that 子句；語氣肯定，適合議論文開段承認事實再作討論。","ex":"There is no denying that schools nowadays place a strong emphasis on educating students regarding environmental protection."},{"phrase":"this way","zh":"這樣一來；用這個方法","type":"寫作句式","sent":"This way, we can consume less overall to reduce our eco-impact - for real.","note":"置於句首（後加逗號）承接上文的做法，帶出好處或結果；是說明文與演講稿常用的銜接語。","ex":"We should avoid buying fruit and vegetables that are over-packaged; this way, we can discourage companies from using too much packaging."},{"phrase":"come to mind","zh":"浮現腦海；想到","type":"寫作句式","sent":"When you think of the ocean, what image comes to mind? Colourful coral reefs? Wondrous sea creatures?","note":"主語是想到的事物（sth comes to mind），不是人；演講開頭用 What comes to mind? 提問能吸引聽眾。","ex":"While I was brainstorming ways to protect the environment, reducing consumption came to mind."},{"phrase":"full stop","zh":"就是這樣；沒有別的可說（句號）","type":"口語短語","sent":"The best thing is to simply reduce - full stop.","note":"置於句末（前面常加破折號）表示「不必再討論、就是如此」，語氣斬釘截鐵；美式用 period。","ex":"To save our planet, we need to stop using plastic bags - full stop."},{"phrase":"make things worse","zh":"使情況更糟；雪上加霜","type":"寫作句式","sent":"To make things worse, toxins in the water often attach themselves to the particles and travel with them into the fish's bodies, harming them even more.","note":"to make things worse 置於句首引出更壞的情況（＝what's worse）；也可作動詞短語 make sth worse。","ex":"Chopping down trees will make global warming worse, as trees help remove carbon dioxide from the atmosphere."},{"phrase":"no big deal","zh":"沒什麼大不了","type":"口語短語","sent":"If you're thinking, 'No big deal, I don't care about fish,' then think again.","note":"口語表達「不要緊、小事一樁」；常用 it's no big deal 安慰別人，或引述他人輕視的想法再反駁。","ex":"If you used to use plastic bags when shopping, it's no big deal - just remember to use tote bags instead from now on."},{"phrase":"fly off the shelves","zh":"十分暢銷；被搶購一空","type":"課文短語","sent":"Bingo! Your 'Earth-loving' products will soon fly off the shelves!","note":"比喻商品賣得極快，像從貨架上飛走；shelves 是 shelf 的複數（f 變 ves），主語是商品。","ex":"The eco-friendly shampoo I use is so popular that it flies off the shelves every time it is restocked."},{"phrase":"give sb an edge","zh":"使某人佔優勢","type":"課文短語","sent":"A green badge makes shoppers believe that a company cares, and that gives businesses an edge.","note":"edge 在此解「優勢」，前面用 an；可加範圍 give sb an edge in/over sth（在某方面／勝過某人）。","ex":"Her first-hand knowledge of recycling habits in Japan gave her an edge in the quiz on environmental protection."},{"phrase":"hit the nail on the head","zh":"一針見血；說得準確","type":"口語短語","sent":"It (greenwashing) refers to companies misleading their customers into believing that their products or services are earth-friendly. The term hits the nail on the head.","note":"比喻說話正中要害；nail 與 head 都用單數，介詞是 on；常用於稱讚別人的評論準確。","ex":"I think Kylie hit the nail on the head when she said that the laboratory is the most environmentally wasteful part of the school."},{"phrase":"make or break","zh":"成敗攸關；不成則敗","type":"課文短語","sent":"(改編) Going green can make or break a brand these days, as shoppers care more about the environment than ever.","note":"make or break sth 指決定某事成敗的關鍵；也可作形容詞 a make-or-break moment（加連字號）。","ex":"The response of young shoppers can make or break a company's new green product."},{"phrase":"get one's hands dirty","zh":"親自動手；落手落腳做","type":"口語短語","sent":"All the other teenagers and I had a great time getting our hands dirty and helping make the place greener!","note":"字面指弄髒雙手，比喻親身參與實際工作（如種樹、清潔）；hands 用複數，one's 隨主語變化。","ex":"We got our hands dirty planting trees in the community garden."},{"phrase":"take part in","zh":"參加；參與","type":"日常表達","sent":"Green Club has always made a great effort to encourage students to take part in green activities.","note":"後接活動名詞（take part in a workshop / green activities）；同義：participate in / join。介詞 in 不可漏。","ex":"Forty students will take part in the visit to GoGreen's centre."},{"phrase":"Don't mention it.","zh":"不用客氣；不足掛齒","type":"口語短語","sent":"Sandy: Thank you for agreeing to do an interview for the school magazine. Billy: Don't mention it. It's my pleasure.","note":"回應別人道謝的地道說法，同義：You're welcome. / It's my pleasure.；口試對話開場常用。","ex":"'Thanks for helping me carry the recycling bins.' 'Don't mention it!'"}]},{"key":"2A_U1","form":"F2","book":"2A","num":1,"theme":"Be legendary (role models and inspiring people)","theme_zh":"成為傳奇——榜樣與啟發人心的人物","words":[{"en":"role model","pos":"n.","zh":"榜樣；模範","cat":"核心詞彙","src":"Text 1","sent":"More often than not, we imitate the role models we look up to and hope that we will acquire their admirable qualities and become as great as they are.","exam":"常見於閱讀理解及個人簡介（personal profile）寫作；留意搭配 a role model for young people","err":"易誤寫成 role modal；modal 是「情態的」，與 model（模範）意思完全不同","coll":"a positive role model; a role model for youth; pick a role model","ex1":"My older sister is my role model because she never gives up.","ex2":"Teenagers should pick role models with positive qualities such as diligence and empathy."},{"en":"public figure","pos":"n.","zh":"公眾人物","cat":"核心詞彙","src":"Text 1","sent":"The actions of popular public figures, like athletes, writers, scientists, actors, business leaders and politicians, also carried a lot of weight.","exam":"閱讀理解常考同義替換：public figure ≈ celebrity / well-known person","err":"figure 在此解「人物」，不是「數字」或「身材」；一詞多義是閱讀理解陷阱","coll":"a popular public figure; follow public figures","ex1":"Public figures should be careful about what they say online.","ex2":"The actions of public figures like politicians carry a great deal of weight."},{"en":"celebrity","pos":"n.","zh":"名人；明星","cat":"高頻基礎詞","src":"Text 1","sent":"Some of them might still be celebrities, but their achievements, fame and fortune are not our main concern.","exam":"詞形轉換 celebrate(v.)→celebrity(n. 名人)；眾數為 celebrities，常見於選詞填空","err":"眾數要改 y 為 ies；勿與 celebration（慶祝活動）混淆","coll":"a sporting celebrity; celebrity culture","ex1":"Edgar Cheung became Hong Kong's biggest sporting celebrity after winning gold.","ex2":"Many teenagers dream of becoming celebrities one day."},{"en":"influencer","pos":"n.","zh":"網絡紅人；意見領袖","cat":"口語常用","src":"Text 1","sent":"The influencers nowadays are imperfect and have flaws, but this makes them more relatable to their audience.","exam":"詞形轉換 influence(v./n.)→influencer(n.)→influential(adj.)，是本單元重點詞族","err":"不要串成 influenser；-ence + -er 拼寫易錯","coll":"an online influencer; follow influencers on social media","ex1":"Many teens follow influencers to learn about fashion.","ex2":"He started following the lives of influencers online, trying to follow their advice on how to be successful."},{"en":"idol","pos":"n.","zh":"偶像","cat":"日常實用","src":"Text 1","sent":"Sporting impossibly squeaky-clean images, idols in the past were put on pedestals and worshipped.","exam":"常與 worship、fan 等詞同場出現；聆聽考試談論偶像時常見","err":"拼寫易與 ideal（理想的）混淆：idol 是名詞「偶像」，ideal 是形容詞","coll":"a pop idol; one's childhood idol","ex1":"Her idol is a famous fencer from Hong Kong.","ex2":"Cherry felt embarrassed when she saw her childhood idol throwing a tantrum on television."},{"en":"imitate","pos":"v.","zh":"模仿","cat":"核心詞彙","src":"Text 1","sent":"More often than not, we imitate the role models we look up to and hope that we will acquire their admirable qualities and become as great as they are.","exam":"詞形轉換 imitate(v.)→imitation(n.)；閱讀理解同義詞：imitate ≈ copy / follow","err":"是及物動詞，直接接受詞：imitate someone，不要說 imitate to someone","coll":"imitate one's behaviour; imitate a role model","ex1":"Young children like to imitate their parents.","ex2":"One of the shortcomings of streaming platforms is the tendency for teenagers to worship popular figures and imitate their wild behaviour."},{"en":"admire","pos":"v.","zh":"欽佩；欣賞","cat":"核心詞彙","src":"詞彙練習","sent":"It is rare for a 25-year-old to become one of the most well-known and widely admired figures in a community, but Edgar Cheung Ka-long is just that extraordinary.","exam":"詞形轉換 admire(v.)→admirable(adj.)→admirer(n.)，選詞填空常要求判斷詞性","err":"admire sb for sth 的介詞是 for；受粵語影響易漏掉介詞或誤用 to","coll":"admire sb for sth; widely admired","ex1":"I admire my grandmother for her patience and kindness.","ex2":"Nelson admired his grandpa for raising public awareness of environmental issues."},{"en":"admirable","pos":"adj.","zh":"令人欽佩的","cat":"考試重點詞","src":"Text 1","sent":"Admirable celebrities often inspire their followers through their contributions to society.","exam":"詞形轉換重點：admire→admirable；注意 e 要去掉再加 -able","err":"易誤串成 admireable；正確拼法要去 e","coll":"admirable qualities; an admirable person","ex1":"Helping others without expecting anything back is an admirable quality.","ex2":"We hope to acquire our role models' admirable qualities and become as great as they are."},{"en":"worship","pos":"v.","zh":"崇拜","cat":"核心詞彙","src":"Text 1","sent":"Sporting impossibly squeaky-clean images, idols in the past were put on pedestals and worshipped.","exam":"閱讀理解同義替換：worship ≈ admire greatly；常以被動式 be worshipped 出現","err":"過去式雙寫 p 為 worshipped（英式拼法）；勿串成 worshiped 後又混用","coll":"worship an idol; be worshipped by fans","ex1":"Some fans worship their idols blindly.","ex2":"Teenagers should not worship popular figures and imitate their wild behaviour."},{"en":"inspire","pos":"v.","zh":"啟發；激勵","cat":"核心詞彙","src":"單元評估","sent":"He still couldn't find anyone who inspired him the way he wanted though.","exam":"詞形轉換 inspire(v.)→inspiring(adj. 鼓舞人心的)→inspiration(n.)；單元評估填空曾考 inspired","err":"inspiring 形容事物、inspired 形容人被啟發；-ing/-ed 分詞形容詞易混","coll":"inspire sb to do sth; an inspiring person","ex1":"Good teachers inspire their students to work hard.","ex2":"Admirable celebrities often inspire their followers through their contributions to society."},{"en":"inspiring","pos":"adj.","zh":"鼓舞人心的","cat":"考試重點詞","src":"聽力對話","sent":"Sophia is helping Mr Yuen organize an exhibition of inspiring women.","exam":"聆聽及寫作常用；與 inspired 的 -ing/-ed 分辨是典型文法考點","err":"「這個故事很勵志」是 The story is inspiring，不是 inspired","coll":"an inspiring story; an inspiring person","ex1":"The film about the athlete's life is really inspiring.","ex2":"Your class teacher has asked each student to write a web article introducing an inspiring person."},{"en":"achievement","pos":"n.","zh":"成就","cat":"核心詞彙","src":"Text 1","sent":"Some of them might still be celebrities, but their achievements, fame and fortune are not our main concern.","exam":"詞形轉換 achieve(v.)→achievement(n.)；寫作描述人物成就必用","err":"拼寫注意 -ie-：achievement；勿串成 achivement","coll":"a great achievement; describe sb's achievements","ex1":"Winning the gold medal was his greatest achievement.","ex2":"It was quite an achievement in itself, because it's unusual for a new NGO to get support from sponsors."},{"en":"relatable","pos":"adj.","zh":"令人有共鳴的","cat":"核心詞彙","src":"Text 1","sent":"The influencers nowadays are imperfect and have flaws, but this makes them more relatable to their audience.","exam":"本單元關鍵概念詞，閱讀理解常問為何新一代榜樣 more relatable","err":"relatable to sb 用介詞 to；詞根 relate（有關連）","coll":"relatable to teens; a relatable role model","ex1":"I like this singer because her songs are so relatable.","ex2":"Gen-zers look up to their peers as role models because they are relatable and authentic."},{"en":"authentic","pos":"adj.","zh":"真實的；不做作的","cat":"考試重點詞","src":"Text 1","sent":"People accept the imperfections of their role models because people who seem perfect come off as inauthentic.","exam":"反義詞 inauthentic 以字首 in- 構成，字首字尾轉換是常見題型","err":"th 發音 /θ/，拼寫勿漏 h；與 authority 無關","coll":"an authentic person; stay authentic","ex1":"Fans love the singer because she is always authentic in interviews.","ex2":"Young people admire influencers who are authentic and willing to expose their vulnerabilities."},{"en":"flaw","pos":"n.","zh":"缺點；瑕疵","cat":"核心詞彙","src":"Text 1","sent":"The influencers nowadays are imperfect and have flaws, but this makes them more relatable to their audience.","exam":"詞形轉換 flaw(n.)→flawless(adj. 完美無瑕)；閱讀理解同義詞 flaw ≈ shortcoming / weakness","err":"勿與 floor（地板）混淆，讀音相近但拼寫不同","coll":"have flaws; accept one's flaws","ex1":"Everyone has flaws, so we should not expect our heroes to be perfect.","ex2":"The superstar wrote a lengthy description of his flaws and past mistakes in his memoir."},{"en":"flawless","pos":"adj.","zh":"完美無瑕的","cat":"考試重點詞","src":"詞彙練習","sent":"This is why I advise you to not expect your role models to be flawless.","exam":"字尾 -less 表「沒有」：flawless、fearless；選詞填空常考","err":"-less 是「無」，flawless 是正面意思「無瑕」，勿誤解為「有缺點」","coll":"a flawless image; a flawless performance","ex1":"Nobody has a flawless life, not even celebrities.","ex2":"Celebrities feel under enormous pressure to appear flawless."},{"en":"imperfect","pos":"adj.","zh":"不完美的","cat":"考試重點詞","src":"Text 1","sent":"This person may be imperfect or unpopular but that's okay.","exam":"字首 im- 構成反義詞：perfect→imperfect；字首轉換是本級常考題","err":"p 開頭的字多用 im-（impossible, impatient），不要寫 unperfect","coll":"an imperfect role model; imperfect but relatable","ex1":"An imperfect person is often more relatable.","ex2":"People accept the imperfections of their role models, but they do not blindly imitate those flaws."},{"en":"shortcoming","pos":"n.","zh":"短處；缺點","cat":"考試重點詞","src":"Text 1","sent":"However, there is another concern: is our constant exposure to each other's shortcomings harmful in its own way?","exam":"閱讀理解同義替換：shortcoming ≈ flaw / weakness；常以眾數出現","err":"是一個完整複合名詞，不能拆開寫成 short coming","coll":"admit one's shortcomings; overcome shortcomings","ex1":"He is honest about his shortcomings, which makes people trust him.","ex2":"It's tempting to simply go for the stars with the fewest shortcomings."},{"en":"virtue","pos":"n.","zh":"美德","cat":"核心詞彙","src":"詞彙練習","sent":"Instead, choose realistic role models, ones who represent the virtues you want to develop and the kinds of achievements you're chasing.","exam":"常與 diligence、empathy、perseverance 等美德詞同場出現，選詞填空重點","err":"拼寫 -ue 結尾不發音；勿串成 virture","coll":"traditional virtues; a person of virtue","ex1":"Honesty is a virtue that everyone should have.","ex2":"Teenagers can learn diligence, empathy and other virtues from good role models."},{"en":"diligence","pos":"n.","zh":"勤奮","cat":"考試重點詞","src":"Reading Focus","sent":"(改編) Edgar's diligence and humility make him a great role model for Hong Kong youth.","exam":"詞形轉換 diligent(adj.)→diligence(n.)；描述人物品格的寫作高分詞","err":"與 intelligence 拼法相似易混；注意 dili- 開頭","coll":"work with diligence; show diligence","ex1":"Her diligence helped her pass every exam with high marks.","ex2":"Teenagers should pick role models with positive qualities, so they can learn diligence, empathy and other virtues from them."},{"en":"perseverance","pos":"n.","zh":"毅力；堅持不懈","cat":"核心詞彙","src":"單元評估","sent":"They talked about their struggles, hard work, and perseverance through financial hardships and the many roadblocks they faced along the way.","exam":"本單元價值觀主題詞（Values & Attitudes: Perseverance）；詞形轉換 persevere(v.)→perseverance(n.)","err":"拼寫長且易錯：per-se-ver-ance；勿串成 perserverance","coll":"show perseverance; perseverance through hardships","ex1":"With perseverance, you can master any skill.","ex2":"Students will learn to become as persevering as their role models in their lives."},{"en":"empathy","pos":"n.","zh":"同理心","cat":"核心詞彙","src":"詞彙練習","sent":"The best role model for you is someone who's successful in a field that interests you or has personality traits that you admire, such as patience or empathy.","exam":"詞形轉換 empathy(n.)→empathise(v.)；描寫品格的寫作常用詞","err":"與 sympathy（同情）意思不同：empathy 是設身處地理解他人感受","coll":"show empathy; have empathy for others","ex1":"A good friend listens with empathy.","ex2":"Her personal experience of being bullied at school helped her empathise with the children who visited her clinic."},{"en":"influential","pos":"adj.","zh":"有影響力的","cat":"考試重點詞","src":"詞彙練習","sent":"The world is full of inspiring people and influential public figures, so many, in fact, that it's hard to choose somebody to support or follow.","exam":"詞形轉換 influence(n./v.)→influential(adj.)；選詞填空高頻答案","err":"influential 後不接受詞；「影響某人」要說 influence sb 或 have an influence on sb","coll":"an influential figure; highly influential","ex1":"Social media is very influential among teenagers.","ex2":"Nobody can truly tell what the future holds, not even the richest, most talented and influential of us all."},{"en":"trustworthy","pos":"adj.","zh":"值得信賴的","cat":"核心詞彙","src":"Reading Focus","sent":"(改編) A good role model should be trustworthy and honest with his or her followers.","exam":"複合形容詞 trust + worthy；閱讀理解同義詞：trustworthy ≈ reliable","err":"一個字寫成，不要分開寫 trust worthy","coll":"a trustworthy friend; trustworthy information","ex1":"You should only share secrets with trustworthy friends.","ex2":"It is not easy to know which role models are truly trustworthy and upstanding."},{"en":"sacrifice","pos":"v.","zh":"犧牲","cat":"核心詞彙","src":"Text 2","sent":"She later sacrificed her budding career to become a full-time homemaker so that Charles could fully immerse himself in his scientific work.","exam":"閱讀理解常問人物 sacrifice 了甚麼；名詞同形 make sacrifices","err":"拼寫注意只有一個 c 開頭：sacri-fice；勿串成 sacrafice","coll":"sacrifice one's career; make sacrifices for one's family","ex1":"Parents often sacrifice their free time for their children.","ex2":"He had never fully understood the sacrifices his parents had made."},{"en":"groundbreaking","pos":"adj.","zh":"開創性的","cat":"考試重點詞","src":"Text 2","sent":"Charles' research on fibre optics produced groundbreaking results, laying the foundations for high-speed internet that transformed the world.","exam":"單元閱讀理解曾考同義詞：groundbreaking ≈ innovative；複合形容詞構詞","err":"一個字寫成 groundbreaking，不要拆成 ground breaking","coll":"groundbreaking research; a groundbreaking discovery","ex1":"The scientist made a groundbreaking discovery in medicine.","ex2":"His groundbreaking research on fibre optics changed the world."},{"en":"diagnose","pos":"v.","zh":"診斷","cat":"考試重點詞","src":"Text 2","sent":"The fibre optics genius was diagnosed with Alzheimer's disease.","exam":"常以被動式 be diagnosed with + 疾病 出現，閱讀理解及聆聽常見","err":"固定搭配 be diagnosed with，介詞不能用 as 或 by","coll":"be diagnosed with a disease; diagnose an illness","ex1":"The doctor diagnosed her with the flu and told her to rest.","ex2":"In 2004, things took a sad turn when Charles was diagnosed with Alzheimer's disease."},{"en":"deteriorate","pos":"v.","zh":"惡化；衰退","cat":"考試重點詞","src":"Text 2","sent":"His mental capacities gradually deteriorated, requiring Gwen to look after him 24/7.","exam":"閱讀理解同義替換：deteriorate ≈ get worse；描述病情或情況變壞","err":"是不及物動詞：His health deteriorated，不要加受詞","coll":"health deteriorates; deteriorate gradually","ex1":"Grandpa's eyesight has deteriorated over the years.","ex2":"The patient's condition deteriorated quickly, so he was sent to hospital."},{"en":"capacity","pos":"n.","zh":"能力；容量","cat":"考試重點詞","src":"Text 2","sent":"The training camp I went to last summer has greatly expanded my mental capacities towards being a leader.","exam":"Text 2 選詞填空答案（capacities）；一詞多義：能力／容量","err":"作「能力」時常用眾數 capacities；勿與 capability 混寫","coll":"mental capacities; at full capacity","ex1":"Reading widely can expand your mental capacities.","ex2":"His mental capacities gradually deteriorated after the diagnosis."},{"en":"frankly","pos":"adv.","zh":"坦白地","cat":"考試重點詞","src":"Text 2","sent":"Gwen has frankly admitted that there were times when she grew impatient and frustrated with Charles and felt drained by the experience of caring for him.","exam":"Text 2 選詞填空答案；詞形轉換 frank(adj.)→frankly(adv.)","err":"修飾動詞要用副詞：speak frankly，不要用 frank","coll":"frankly admit; frankly speaking","ex1":"He told the interviewer about his experience frankly and truthfully.","ex2":"Frankly speaking, I do not think anyone is a perfect role model."},{"en":"communicate","pos":"v.","zh":"溝通","cat":"高頻基礎詞","src":"Text 2","sent":"By the end, he could not maintain his balance or communicate through speech.","exam":"Text 2 選詞填空答案；詞形轉換 communicate(v.)→communication(n.)","err":"communicate with sb 用介詞 with；勿說 communicate to sb","coll":"communicate with others; communicate through speech","ex1":"Thanks to the internet, we are now able to communicate via text messages and video calls.","ex2":"Good leaders know how to communicate with their team."},{"en":"cure","pos":"n.","zh":"治療方法；解藥","cat":"考試重點詞","src":"Text 2","sent":"Researchers at this lab have been trying to find a cure for cancer for many years.","exam":"Text 2 選詞填空答案；固定搭配 a cure for + 疾病","err":"介詞用 for：a cure for cancer；勿用 of","coll":"find a cure for; a possible cure","ex1":"Scientists are still looking for a cure for Alzheimer's disease.","ex2":"The foundation calls for more resources to be put into finding a possible cure."},{"en":"transform","pos":"v.","zh":"徹底改變；改造","cat":"考試重點詞","src":"Text 2","sent":"After three years of planning and construction, the old industrial building was transformed into a shopping centre.","exam":"Text 2 選詞填空答案；搭配 transform A into B 常見於閱讀及寫作","err":"被動式 be transformed into；勿漏 into","coll":"transform the world; be transformed into","ex1":"The internet has transformed the way we learn.","ex2":"His research laid the foundations for high-speed internet that transformed the world."},{"en":"awareness","pos":"n.","zh":"意識；認識","cat":"核心詞彙","src":"Text 2","sent":"Gwen realized the importance of raising public awareness of Alzheimer's disease and supporting other caregivers.","exam":"詞形轉換 aware(adj.)→awareness(n.)；寫作常用 raise public awareness of","err":"不可數名詞，不加 a／眾數；固定搭配 raise awareness of/about","coll":"raise public awareness of; environmental awareness","ex1":"The campaign aims to raise students' awareness of healthy eating.","ex2":"By campaigning online, the activist raised public awareness of women's issues."},{"en":"vocation","pos":"n.","zh":"使命；天職","cat":"考試重點詞","src":"Text 2","sent":"Gwen had not planned for this late-life vocation - she stumbled upon it, through a love for Charles that could not be shaken.","exam":"閱讀理解曾直接問 What is Gwen's late-life vocation；同義：calling","err":"勿與 vacation（假期）混淆，只差一個字母，意思完全不同","coll":"find one's vocation; a late-life vocation","ex1":"Teaching is more than a job for her - it is a vocation.","ex2":"The public councillor said that it took her thirty-five years to find her true vocation."},{"en":"carer","pos":"n.","zh":"照顧者","cat":"核心詞彙","src":"Text 2","sent":"Gwen Kao Wong May-Wan, wife of the late 'godfather of broadband' Charles Kao Kuen, had no idea that her life would ultimately become intertwined with those of Alzheimer's patients and their carers.","exam":"詞形轉換 care(v./n.)→carer(n.)；文中同義詞 caregiver 亦常見","err":"carer（照顧者）與 career（事業）拼法相近，聆聽及默書易錯","coll":"a full-time carer; carers of the elderly","ex1":"My aunt is the main carer of my sick grandmother.","ex2":"Gwen realized the importance of supporting other caregivers."},{"en":"exhibition","pos":"n.","zh":"展覽","cat":"核心詞彙","src":"聽力對話","sent":"I was going to talk to you about the floor plan of the upcoming exhibition.","exam":"詞形轉換 exhibit(v.)→exhibition(n.)；聆聽任務常見場景詞","err":"注意 h 不發音；勿串成 exibition","coll":"hold an exhibition; an art exhibition","ex1":"Our school will hold an exhibition of students' artwork next month.","ex2":"His teacher's advice came in handy when he was preparing his first public exhibition."},{"en":"entrance","pos":"n.","zh":"入口","cat":"高頻基礎詞","src":"聽力對話","sent":"We want people to see the different sections of the exhibition the moment they come in through the entrance, which is on the top right corner of the floor plan.","exam":"聆聽平面圖題常考方位詞：entrance、information desk、cashier 等","err":"反義詞是 exit；勿與 enter（動詞）的拼法混淆，名詞要加 -rance","coll":"the main entrance; at the entrance","ex1":"Let's meet at the entrance of the MTR station.","ex2":"The information desk is right next to the entrance."},{"en":"founder","pos":"n.","zh":"創辦人","cat":"核心詞彙","src":"聽力對話","sent":"You have decided to write about Sam Lai, the founder of Sham Shui Po Neighbours.","exam":"詞形轉換 found(v. 創立)→founder(n.)；綜合任務介紹人物常用","err":"found（創立）不是 find 的原形；found-founded-founded，勿與 find-found 混淆","coll":"the founder of a charity; a company founder","ex1":"She is the founder of a local animal rescue centre.","ex2":"He founded an NGO called Sham Shui Po Neighbours in 2015."},{"en":"charity","pos":"n.","zh":"慈善機構；慈善","cat":"日常實用","src":"聽力對話","sent":"He's well known not only because he's the founder of a charity group, but he has also inspired others through his efforts in helping the needy.","exam":"眾數 charities；常見搭配 donate money to charity（不加冠詞）","err":"說「捐錢做慈善」是 donate to charity，charity 前不加 the","coll":"a charity group; donate to charity","ex1":"Mrs Washington is very rich and generous, so she often donates money to charity.","ex2":"The charity provides box lunches for elderly people in the district."},{"en":"volunteer","pos":"v./n.","zh":"做義工；義工","cat":"日常實用","src":"聽力對話","sent":"That was the reason behind his decision to start volunteering when he was only twelve.","exam":"詞性活用：volunteer 兼作名詞及動詞；聆聽及寫作介紹人物常用","err":"拼寫雙 e：volunteer；「做義工」可說 do volunteer work 或 volunteer","coll":"volunteer at a centre; a group of young volunteers","ex1":"My parents and I are volunteering at a church this weekend.","ex2":"Sam gathered a group of young volunteers and visited old people in the district every weekend."},{"en":"sponsor","pos":"n.","zh":"贊助者；贊助商","cat":"考試重點詞","src":"聽力對話","sent":"Their work was much appreciated by the community, and that was why the organization quickly attracted a lot of sponsors.","exam":"聆聽筆記題常考；動詞同形：sponsor an event（贊助活動）","err":"重音在第一音節 SPON-sor；勿串成 sponser","coll":"attract sponsors; a major sponsor","ex1":"The school fair needs sponsors to cover the costs.","ex2":"It's unusual for a new NGO to get support from sponsors so soon."},{"en":"unremarkable","pos":"adj.","zh":"平凡的；不起眼的","cat":"考試重點詞","src":"單元評估","sent":"Thinking it would be a piece of cake, he decided to interview his own parents, who he thought had led unremarkable lives.","exam":"單元評估曾考同義詞：unremarkable ≈ average；字首 un- + remark + -able 構詞","err":"un- + remarkable（出色的）＝平凡的；別誤以為是「不能說的」","coll":"an unremarkable life; seem unremarkable","ex1":"The building looks unremarkable, but its history is amazing.","ex2":"Nathan thought his parents had led unremarkable lives, but he was wrong."},{"en":"boast","pos":"v.","zh":"自誇；吹噓","cat":"考試重點詞","src":"單元評估","sent":"His parents had never boasted about their accomplishments or talked about their struggles, and so he'd never fully understood the sacrifices they had overcome.","exam":"單元評估曾考同義詞辨析：boast ≈ brag / gloat / show off","err":"搭配 boast about/of sth；勿與 boost（提升）混淆","coll":"boast about one's achievements; nothing to boast about","ex1":"Nobody likes people who boast about their marks all the time.","ex2":"True role models never boast about their accomplishments."},{"en":"astonishing","pos":"adj.","zh":"驚人的；令人驚訝的","cat":"考試重點詞","src":"單元評估","sent":"But what he discovered during the conversation was astonishing.","exam":"單元評估填空答案；-ing/-ed 分詞形容詞：astonishing news / I was astonished","err":"形容事物用 astonishing，形容人的感受用 astonished","coll":"an astonishing discovery; astonishing results","ex1":"The magician's tricks were absolutely astonishing.","ex2":"He found his parents' life stories astonishing."},{"en":"strive","pos":"v.","zh":"努力奮鬥","cat":"考試重點詞","src":"單元評估","sent":"They told Nathan that he and his brothers helped them strive to be their best too, and they were very proud of him.","exam":"寫作高分詞：strive to do sth ≈ try hard to do sth；閱讀理解曾出題","err":"後接 to + 原形動詞：strive to be better；過去式 strove/strived","coll":"strive to be one's best; strive for success","ex1":"We should all strive to be better than we were yesterday.","ex2":"His parents strived to give their children the best life they could."},{"en":"hardship","pos":"n.","zh":"艱苦；困境","cat":"核心詞彙","src":"單元評估","sent":"They talked about their struggles, hard work, and perseverance through financial hardships and the many roadblocks they faced along the way.","exam":"常見搭配 financial hardship；閱讀理解描述人物經歷必考語境","err":"字尾 -ship 表抽象名詞（friendship, hardship），不解作「船」","coll":"face hardships; financial hardship","ex1":"The family overcame many hardships after moving to a new city.","ex2":"He has been very aware of the difficulties and hardships people face in the neighbourhood."},{"en":"hard-working","pos":"adj.","zh":"勤奮的","cat":"高頻基礎詞","src":"詞彙練習","sent":"I do admire how hard-working they are.","exam":"本單元複合形容詞重點之一（award-winning, well-known, hard-working 等）","err":"複合形容詞要加連字號：a hard-working student；勿寫 hardworking student 後又漏 hyphen 不一致","coll":"a hard-working student; hard-working parents","ex1":"Edgar is a hard-working athlete who trains every day.","ex2":"It must take ages to perfect all those dance steps - idols are really hard-working."},{"en":"well-known","pos":"adj.","zh":"著名的","cat":"高頻基礎詞","src":"詞彙練習","sent":"He's a well-known composer - and well-respected too!","exam":"複合形容詞；閱讀理解同義替換：well-known ≈ famous","err":"放名詞前要加連字號：a well-known singer；比較級是 better-known","coll":"a well-known singer; well-known for","ex1":"Hong Kong is well-known for its night view.","ex2":"It is rare for a 25-year-old to become one of the most well-known figures in a community."},{"en":"award-winning","pos":"adj.","zh":"獲獎的","cat":"考試重點詞","src":"詞彙練習","sent":"He's an award-winning singer and activist.","exam":"複合形容詞構詞：名詞+現在分詞（award-winning, show-stopping）；選詞填空常考","err":"連字號不可漏：an award-winning writer；award 不加 s","coll":"an award-winning singer; an award-winning film","ex1":"This opera brings to life a fantastic script by an award-winning writer.","ex2":"The award-winning documentary is about inspiring women in sport."}],"phrases":[{"phrase":"carry (a lot of) weight","zh":"舉足輕重；有影響力","type":"課文短語","sent":"The actions of popular public figures, like athletes, writers, scientists, actors, business leaders and politicians, also carried a lot of weight.","note":"指言論或行動具影響力，主語常是 advice、opinion、actions 等；不是指「攜帶重物」","ex":"The coach's advice carries a lot of weight with the young players."},{"phrase":"fame and fortune","zh":"名與利","type":"課文短語","sent":"Some of them might still be celebrities, but their achievements, fame and fortune are not our main concern.","note":"固定搭配，次序不可調轉；配動詞 gain / achieve fame and fortune","ex":"Even after gaining fame and fortune, the singer remained humble and kind."},{"phrase":"in its own way","zh":"以其獨特的方式","type":"課文短語","sent":"However, there is another concern: is our constant exposure to each other's shortcomings harmful in its own way?","note":"指事物雖不同於一般標準，但自有其特色；代名詞隨主語改變（in his/her own way）","ex":"Even though my grandpa did not do well at school, he is wise in his own way."},{"phrase":"more often than not","zh":"多數情況下；往往","type":"寫作句式","sent":"More often than not, we imitate the role models we look up to and hope that we will acquire their admirable qualities and become as great as they are.","note":"＝ usually，常置於句首並用逗號分隔，是寫作提升句式變化的好選擇","ex":"More often than not, pressure to appear flawless has a negative effect on celebrities' mental health."},{"phrase":"put sb on a pedestal","zh":"把某人捧上神壇；盲目崇拜","type":"課文短語","sent":"Sporting impossibly squeaky-clean images, idols in the past were put on pedestals and worshipped.","note":"含貶義，指過分理想化某人；常用被動式 be put on a pedestal","ex":"It is a bad idea to put anybody on a pedestal, least of all a celebrity you have never met."},{"phrase":"the problem is (that)","zh":"問題在於……","type":"寫作句式","sent":"The problem is that nobody is a perfect role model, and expecting anybody to be one is asking too much of them.","note":"引出困難或矛盾之處；that 可省略，後接完整句子","ex":"The problem is that many teenagers blindly imitate whatever their idols do."},{"phrase":"throw a (temper) tantrum","zh":"大發脾氣","type":"口語短語","sent":"The athlete threw a temper tantrum when he came second to his rival.","note":"原指小孩子耍性子，用於成人時帶批評意味；動詞用 throw","ex":"Cherry felt embarrassed when she saw her childhood role model throwing a tantrum on television."},{"phrase":"trial and error","zh":"反覆試驗；不斷從錯誤中學習","type":"課文短語","sent":"The prizewinning scientist confessed that his big discovery was the result of many months of trial and error.","note":"固定搭配，用單數不加冠詞；常說 a process of trial and error / by trial and error","ex":"For Nicola, learning how to be a good role model for her little brother was a process of trial and error."},{"phrase":"what the future holds","zh":"未來會怎樣","type":"寫作句式","sent":"Nobody can truly tell what the future holds, not even the richest, most talented and influential of us all.","note":"名詞性子句，常接在 tell / know / worry about 之後；可加 for sb/sth","ex":"Environmental activists worry about what the future holds for our planet."},{"phrase":"find one's calling","zh":"找到人生使命","type":"課文短語","sent":"Jamie asked the Nobel Laureate how she found her calling.","note":"calling 指天職、使命，與 vocation 同義；所有格隨主語改變","ex":"The public councillor said that it took her thirty-five years to find her calling, but it was well worth the wait."},{"phrase":"have no idea","zh":"完全不知道","type":"口語短語","sent":"Gwen Kao Wong May-Wan, wife of the late 'godfather of broadband' Charles Kao Kuen, had no idea that her life would ultimately become intertwined with those of Alzheimer's patients and their carers.","note":"後接 that 子句或 wh- 子句；語氣比 don't know 更強","ex":"Sammy had no idea that his mum was a gifted musician and used to play in the Hong Kong Philharmonic Orchestra."},{"phrase":"lay the foundation(s)","zh":"奠定基礎","type":"寫作句式","sent":"Charles' research on fibre optics produced groundbreaking results, laying the foundations for high-speed internet that transformed the world.","note":"搭配 lay the foundations for/of sth；描述人物貢獻的高分寫作用語","ex":"Isaac Newton laid the foundations of calculus and modern-day physics."},{"phrase":"raise public awareness of sth","zh":"提高公眾對……的意識","type":"寫作句式","sent":"Gwen realized the importance of raising public awareness of Alzheimer's disease and supporting other caregivers.","note":"議論文及報告寫作常用；介詞用 of 或 about","ex":"By campaigning online, the women's rights activist raised public awareness of women's issues."},{"phrase":"take a sad turn","zh":"（事情）急轉直下；轉趨不幸","type":"課文短語","sent":"In 2004, things took a sad turn.","note":"主語常是 things / events / life；也可說 take a turn for the worse","ex":"Life took a sad turn when their house got caught in a bush fire and burnt to the ground."},{"phrase":"come in handy","zh":"派上用場","type":"口語短語","sent":"His teacher's advice came in handy when he was preparing his first public exhibition.","note":"＝ prove useful；主語是有用的東西，不能用於人","ex":"Her experience of being bullied at school came in handy because it helped her empathise with the children at her clinic."},{"phrase":"(there is) no harm in (doing) sth","zh":"不妨一試；……無妨","type":"口語短語","sent":"My boss thinks that there is no harm in contacting the boy band again to ask for an interview.","note":"in 之後接動名詞（V-ing）；用於提出溫和建議","ex":"Alexa knew the director was unlikely to change her mind, but there was no harm in trying out for the role again."},{"phrase":"look up to sb","zh":"尊敬；視為榜樣","type":"日常表達","sent":"The influencer's advice was influential with fans and followers who looked up to her.","note":"片語動詞，反義是 look down on（看不起）；受詞放在 to 之後","ex":"Gen-zers look up to their peers as role models because they understand what it is like to be a teen."},{"phrase":"a piece of cake","zh":"輕而易舉的事","type":"口語短語","sent":"Thinking it would be a piece of cake, he decided to interview his own parents, who he thought had led unremarkable lives.","note":"口語慣用語 = an easy task；單元評估曾考「找出意思相近的四字短語」","ex":"The listening test was a piece of cake because we had practised a lot."}]},{"key":"2A_U2","form":"F2","book":"2A","num":2,"theme":"Our best friends (animal abilities and pet care)","theme_zh":"我們的好朋友——動物的本領與寵物照顧","words":[{"en":"creature","pos":"n.","zh":"生物；動物","cat":"核心詞彙","src":"Text 2","sent":"It's true that parrots are intelligent creatures, but we can't be left alone to look after ourselves.","exam":"詞彙練習選詞填空答案（creatures）；閱讀理解同義替換：creature ≈ animal / living thing","err":"拼寫注意 -ea-：creature；勿串成 creture；讀音 /ˈkriːtʃə/，t 讀 /tʃ/","coll":"intelligent creatures; wild creatures; a gentle creature","ex1":"The zoo is home to hundreds of amazing creatures.","ex2":"I was shocked by how poorly the creatures at the zoo are treated."},{"en":"prey","pos":"n.","zh":"獵物","cat":"核心詞彙","src":"Text 1","sent":"A peregrine falcon power-dives to snatch its prey.","exam":"與 predator（捕食者）成對出現，閱讀理解動物文章必考；不可數名詞","err":"勿與 pray（祈禱）混淆，讀音相同但拼寫及意思不同；prey 一般不加 s","coll":"hunt for prey; snatch its prey; stun its prey","ex1":"Snakes use their venom to kill their prey.","ex2":"The pistol shrimp stuns its prey by shooting superheated bubbles from its claw."},{"en":"predator","pos":"n.","zh":"捕食者；猛獸","cat":"核心詞彙","src":"詞彙練習","sent":"It was also upsetting to find so many large predators living in tiny spaces.","exam":"詞彙練習選詞填空答案；與 prey 相對，閱讀理解常問 how animals evade predators","err":"字尾是 -or 不是 -er：predator；重音在第一音節 PRE-da-tor","coll":"a ferocious predator; evade predators; the deadliest predators","ex1":"The ostrich uses its powerful legs to escape from predators.","ex2":"Though small in size, honey badgers can hold their own against big predators."},{"en":"venomous","pos":"adj.","zh":"有毒的（動物）","cat":"核心詞彙","src":"詞彙練習","sent":"Other than big cats, we also saw a bunch of venomous snakes, including the infamous black mamba, which looked surprisingly tame from a distance.","exam":"單元評估選詞填空答案（venomous snakes）；詞形轉換 venom(n. 毒液)→venomous(adj.)","err":"venomous 指動物咬螫帶毒；poisonous 指吃下有毒；粵語同說「有毒」易混用","coll":"venomous snakes; a venomous bite; venomous jaws","ex1":"Snakes strike with venomous jaws.","ex2":"Some venomous spiders are dangerous to humans."},{"en":"ferocious","pos":"adj.","zh":"兇猛的","cat":"考試重點詞","src":"詞彙練習","sent":"It was exhilarating seeing its dagger-like teeth close-up but also a bit worrisome, as wild animals can be pretty ferocious.","exam":"單元評估選詞填空答案（ferocious lions）；閱讀理解同義替換：ferocious ≈ fierce / violent","err":"拼寫易錯：fe-ro-cious，字尾 -cious 與 delicious 相同；勿串成 ferotious","coll":"ferocious predators; a ferocious beast; ferocious lions","ex1":"The lion gave a ferocious roar to scare away its rivals.","ex2":"The flightless ostrich holds its own against ferocious predators like lions."},{"en":"flightless","pos":"adj.","zh":"不會飛的","cat":"核心詞彙","src":"詞彙練習","sent":"I know that ostriches are flightless but the speed at which they run really makes you think they're flying.","exam":"字尾 -less 表「沒有」：flight + less；選詞填空及描寫動物寫作常用","err":"flightless 是「不能飛」，不是「沒有航班」；勿與 flawless 等 -less 詞混淆意思","coll":"a flightless bird; flightless and bipedal","ex1":"The ostrich is a flightless bird, but it can run very fast.","ex2":"An ostrich is quite fast though it is flightless."},{"en":"bipedal","pos":"adj.","zh":"兩足的；用兩腿行走的","cat":"核心詞彙","src":"Text 1 活動","sent":"The ostrich is a speedy bipedal bird.","exam":"詞彙練習選詞填空答案；字首 bi- 表「二」（bicycle, bilingual），構詞法常考","err":"重音在第二音節 bi-PE-dal；字首 bi- 讀 /baɪ/，勿讀成 /bi/","coll":"a bipedal bird; bipedal animals","ex1":"Humans are bipedal, walking on two legs.","ex2":"It's amazing how fast some bipedal animals can travel."},{"en":"hover","pos":"v.","zh":"盤旋；懸停","cat":"核心詞彙","src":"Text 1 活動","sent":"Hummingbirds hover while they feed.","exam":"詞彙練習選詞填空答案（hovered）；描寫動物動作的核心動詞","err":"讀音 /ˈhɒvə/，勿與 hoover（吸塵）混淆；不及物動詞，後接 over/above","coll":"hover in the air; hover over sth","ex1":"The helicopter hovered above the building.","ex2":"The elephant's massive trunk hovered over the snake hesitantly."},{"en":"inhabit","pos":"v.","zh":"棲息於；居住於","cat":"考試重點詞","src":"單元評估","sent":"Check out all the enormous species that inhabit the massive water tanks.","exam":"單元評估選詞填空答案；詞形轉換 inhabit(v.)→inhabitant(n. 居民)→habitat(n. 棲息地)","err":"及物動詞，直接接地方：Fish inhabit the sea；受粵語「住喺」影響易誤加 in","coll":"inhabit the sea; inhabit a hole; animals inhabiting the forest","ex1":"Fish inhabit the sea.","ex2":"The sly snake was about to attack the mice inhabiting the hole."},{"en":"evade","pos":"v.","zh":"躲避；逃避","cat":"考試重點詞","src":"詞彙練習","sent":"It recognised the scent as the group in question had been evading its capture for a while now.","exam":"詞彙練習選詞填空答案（evading）；閱讀理解同義替換：evade ≈ escape / avoid","err":"勿與 invade（入侵）混淆，只差字首；evade 後接名詞或動名詞","coll":"evade a predator; evade capture; evade their deadly jaws","ex1":"An ostrich sprints because it wants to evade a predator.","ex2":"Tiger moths scramble bats' signals because they want to evade them."},{"en":"species","pos":"n.","zh":"物種","cat":"核心詞彙","src":"詞彙練習","sent":"The ostriches in your zoo have already built a reputation for pecking and biting visitors, something that is unusual for such a gentle species.","exam":"單複數同形（one species, two species），選詞填空與改錯常考；搭配 endangered species","err":"字尾 -es 不是眾數記號，單數也是 species；勿寫 specie","coll":"an endangered species; a gentle species; the largest living bird species","ex1":"Scientists are still counting how many species of animals live on Earth.","ex2":"World leaders should give due consideration to the welfare of endangered species like the black rhino."},{"en":"claw","pos":"n.","zh":"爪","cat":"核心詞彙","src":"詞彙練習","sent":"Many that I saw had overgrown claws and matted fur.","exam":"動物身體部位重點詞；聆聽對話曾以 clawing（抓爬）作答案，留意動詞用法","err":"讀音 /klɔː/，w 不發音；勿與 clap（拍手）或 crawl（爬行）混淆","coll":"sharp claws; overgrown claws; attack with claws","ex1":"Grizzly bears have sharp claws, so you should be careful around them.","ex2":"Predators like lions and tigers can attack their prey with their claws."},{"en":"beak","pos":"n.","zh":"鳥喙","cat":"核心詞彙","src":"詞彙練習","sent":"It was heartbreaking to see your birds bang their beaks against their dark and dirty cages, desperate to escape.","exam":"詞彙練習及單元評估選詞填空答案（beaks）；動物身體部位主題詞","err":"勿與 beach（海灘）或 back 混淆；ea 讀 /iː/","coll":"a sharp beak; peck with its beak","ex1":"The parrot cracked the nut with its strong beak.","ex2":"Be careful of the ostriches' beaks when you hand them food."},{"en":"wing","pos":"n.","zh":"翅膀","cat":"高頻基礎詞","src":"詞彙練習","sent":"I also noticed that several birds had broken wings.","exam":"選詞填空答案（wings）；聆聽及寫作描述雀鳥必用的基礎詞","err":"「拍翼」用 flap its wings；受粵語影響易誤用 beat 以外的錯誤動詞如 shake","coll":"flap their wings; broken wings; beat its wings quickly","ex1":"Hummingbirds hover by beating their wings quickly.","ex2":"Check out how beautifully the birds flap their wings when flying."},{"en":"carnivore","pos":"n.","zh":"食肉動物","cat":"考試重點詞","src":"詞彙練習","sent":"These carnivores can roam as much as 3,000 km2 in the wild, so it is cruel of you to trap one in such a confined space.","exam":"單元評估曾考（you will be a carnivore as you will order and eat a hamburger）；與 herbivore（食草動物）對比記憶","err":"字尾 -vore 表「吃……的動物」；勿串成 carnivor；形容詞是 carnivorous","coll":"a large carnivore; carnivores and herbivores","ex1":"Lions are carnivores, so they only eat meat.","ex2":"There were also many groups of herbivores in the park, unlike the big cats, which are carnivores."},{"en":"sprint","pos":"v.","zh":"全速短跑；衝刺","cat":"核心詞彙","src":"Text 1 活動","sent":"Since it can sprint at up to 70 km/h, the ostrich is the fastest bird on land.","exam":"描寫動物動作的重點動詞；閱讀理解同義替換：sprint ≈ run very fast / dash","err":"勿與 spring（跳；彈）混淆；搭配 sprint at + 速度","coll":"sprint at up to 70 km/h; sprint away from danger","ex1":"The cheetah sprinted across the grassland after its prey.","ex2":"An ostrich sprints because it wants to evade a predator."},{"en":"slither","pos":"v.","zh":"（蛇）滑行；蜿蜒爬行","cat":"考試重點詞","src":"詞彙練習","sent":"A green snake slithered around the edges of a Southeast Asian rainforest in search of prey.","exam":"詞彙練習選詞填空答案（slithered）；動物動作專用動詞，配蛇類","err":"th 讀 /ð/；勿與 slide 混用——slither 專指蛇等左右擺動地滑行","coll":"snakes slither; slither through the grass","ex1":"We watched the snake slither silently through the grass.","ex2":"The python slithered down the tree to look for food."},{"en":"flap","pos":"v.","zh":"拍動（翅膀、耳朵）","cat":"高頻基礎詞","src":"詞彙練習","sent":"'What are you looking for, then? Maybe I can help!' replied the elephant, flapping its ears and swishing its tail in excitement.","exam":"單元評估選詞填空答案（flap their wings）；動物動作主題動詞","err":"過去式雙寫 p：flapped / flapping；勿與 flip（翻轉）混淆","coll":"flap its wings; flap its ears","ex1":"The little bird flapped its wings and flew away.","ex2":"The parrot flapped its wings angrily inside the cage."},{"en":"deadly","pos":"adj.","zh":"致命的","cat":"高頻基礎詞","src":"Text 1 活動","sent":"Pistol shrimp are weeny but deadly.","exam":"閱讀理解同義替換：deadly ≈ lethal / fatal；留意最高級 deadliest 曾在課文出現","err":"deadly 是形容詞不是副詞，雖以 -ly 結尾；「致命的毒蛇」是 a deadly snake","coll":"a deadly predator; deadly jaws; the deadliest predators","ex1":"Snakes are venomous, so they can be deadly.","ex2":"The peregrine falcon's super-speedy dive makes it one of the deadliest predators out there."},{"en":"enormous","pos":"adj.","zh":"巨大的","cat":"高頻基礎詞","src":"詞彙練習","sent":"The elephants were enormous, far bigger than I had imagined, as were the hippos, though they aren't nearly as harmless.","exam":"詞彙練習及單元評估選詞填空答案；閱讀理解同義替換：enormous ≈ huge / massive","err":"本身已是「極大」，勿再加 very；勿串成 enourmous","coll":"an enormous animal; an enormous stride; enormous species","ex1":"Whales are enormous creatures that live in the ocean.","ex2":"Cheetahs can run fast thanks to their aerodynamic build and enormous stride."},{"en":"acrobatic","pos":"adj.","zh":"動作靈巧的；像雜技般的","cat":"考試重點詞","src":"詞彙練習","sent":"The vervet monkeys we saw were really acrobatic and could climb up trees and move between branches with ease.","exam":"單元評估選詞填空答案（acrobatic monkeys）；詞形轉換 acrobat(n. 雜技演員)→acrobatic(adj.)","err":"重音在 -BAT：a-cro-BA-tic；勿串成 acrobatics（名詞，雜技）當形容詞用","coll":"acrobatic monkeys; acrobatic creatures; acrobatic moves","ex1":"Gibbons are acrobatic animals that swing from tree to tree.","ex2":"These acrobatic creatures are lightning fast, flying at speeds between 48 and 72 km/h."},{"en":"menacing","pos":"adj.","zh":"帶威脅性的；兇惡的","cat":"考試重點詞","src":"詞彙練習","sent":"Luckily, this one didn't approach us in a menacing way - I think it was just curious.","exam":"詞彙練習選詞填空答案；閱讀理解同義替換：menacing ≈ threatening","err":"動詞是 menace；in a menacing way 指「以威嚇的姿態」，勿直譯作「有危險的路」","coll":"in a menacing way; a menacing look","ex1":"The dog gave a menacing growl when the stranger came near.","ex2":"The shark circled the boat in a menacing way."},{"en":"harmless","pos":"adj.","zh":"無害的","cat":"考試重點詞","src":"詞彙練習","sent":"The elephants were enormous, far bigger than I had imagined, as were the hippos, though they aren't nearly as harmless.","exam":"字尾 -less 構詞（harm + less）；反義 harmful 以 -ful 結尾，字尾轉換常考","err":"harmless（無害）與 harmful（有害）意思相反，字尾一字之差，選詞填空易誤選","coll":"a harmless snake; completely harmless","ex1":"Most spiders are harmless to humans.","ex2":"The snake looked scary, but the guide said it was harmless."},{"en":"tame","pos":"adj.","zh":"溫馴的；馴化的","cat":"考試重點詞","src":"詞彙練習","sent":"Other than big cats, we also saw a bunch of venomous snakes, including the infamous black mamba, which looked surprisingly tame from a distance.","exam":"詞彙練習選詞填空答案；反義詞 wild（野生的），閱讀理解對比題常見","err":"勿與 time 拼混；tame 亦可作動詞「馴服」，一詞兩性","coll":"a tame animal; look tame; keep a tame rabbit","ex1":"The birds in the park are so tame that they eat from your hand.","ex2":"A turtle is quiet and tame, so it is suitable for people who are not outgoing."},{"en":"intelligent","pos":"adj.","zh":"聰明的；有智慧的","cat":"高頻基礎詞","src":"Text 2","sent":"It's true that parrots are intelligent creatures, but we can't be left alone to look after ourselves.","exam":"詞形轉換 intelligent(adj.)→intelligence(n. 智力)；單元評估閱讀篇章主題詞（animal intelligence）","err":"勿串成 inteligent（雙 l）；名詞 intelligence 與 intelligent 詞性要分清","coll":"intelligent creatures; highly intelligent; animal intelligence","ex1":"Crows are so intelligent that they can solve puzzles.","ex2":"One of the smartest animals on the planet is the chimpanzee, an extremely intelligent creature."},{"en":"recognize","pos":"v.","zh":"認出；識別","cat":"考試重點詞","src":"單元評估","sent":"Chimpanzees can even recognize themselves in mirrors, suggesting a level of self-awareness.","exam":"單元評估填空答案（recognize human faces）；詞形轉換 recognize(v.)→recognition(n.)","err":"英式亦作 recognise，全篇拼法要一致；勿漏中間的 g：reco-g-nize","coll":"recognize human faces; recognize themselves in mirrors","ex1":"Believe it or not, crows can recognise a person's face years after first seeing them.","ex2":"Elephants can identify individuals based on smell and sound cues, and even recognize themselves."},{"en":"distress","pos":"n.","zh":"困境；痛苦","cat":"考試重點詞","src":"單元評估","sent":"Elephants will run to the aid of a family member in distress, and in some cases they have been observed attempting to lift them using their trunks.","exam":"單元評估填空答案（in distress）；固定搭配 in distress 閱讀理解常見","err":"勿與 stress（壓力）混淆；in distress 指「陷於困境」，介詞用 in","coll":"in distress; a family member in distress","ex1":"The firefighters rescued a kitten in distress from the tree.","ex2":"Elephants demonstrate empathy and help other elephants when they are in distress."},{"en":"complaint","pos":"n.","zh":"投訴","cat":"核心詞彙","src":"Text 2","sent":"I am writing this letter of complaint to you as your companion parrot and also as an animal who has been treated disrespectfully.","exam":"本單元文體重點：letter of complaint（投訴信）；詞形轉換 complain(v.)→complaint(n.)","err":"動詞 complain 沒有 t，名詞 complaint 有 t；「投訴某事」是 complain about sth","coll":"a letter of complaint; make a complaint about sth","ex1":"Fiona wrote a letter of complaint about the treatment of wild animals in the zoo.","ex2":"We received several complaints about the noise from the pet shop."},{"en":"incident","pos":"n.","zh":"事件；事故","cat":"考試重點詞","src":"Text 2","sent":"After the incident, you even said I was a terrible pet and threatened to kick me out of the house.","exam":"Text 2 選詞填空答案：The traffic incident that occurred in Prince Edward today was reported on the news","err":"勿與 accident（意外）混淆：incident 泛指事件，accident 強調意外事故","coll":"a traffic incident; after the incident","ex1":"The traffic incident that occurred in Prince Edward today was reported on the news.","ex2":"The zookeeper reported the incident to the manager at once."},{"en":"threaten","pos":"v.","zh":"威脅；恐嚇","cat":"考試重點詞","src":"Text 2","sent":"The robber threatened to harm the hostages if the police did not let him go.","exam":"Text 2 選詞填空答案（threatened）；搭配 threaten to do sth 常考","err":"threaten 後接 to + 原形動詞；形容詞 threatened（受威脅的）與 threatening（帶威脅的）要分清","coll":"threaten to do sth; feel threatened by sth","ex1":"You even threatened to kick me out of the house.","ex2":"The little elephant felt threatened by the tiny mice and trumpeted loudly."},{"en":"hesitate","pos":"v.","zh":"猶豫","cat":"考試重點詞","src":"Text 2","sent":"Going forward, I will not hesitate to contact the SPCA regarding any maltreatment I receive.","exam":"Text 2 選詞填空答案（hesitate）；投訴信結尾常用句式 will not hesitate to do sth","err":"hesitate 後接 to + 原形動詞；勿串成 hesitat；名詞是 hesitation","coll":"do not hesitate to contact us; hesitate to ask","ex1":"The customer service officer told us not to hesitate to contact them whenever we need assistance.","ex2":"If you have any questions, please do not hesitate to ask."},{"en":"unwell","pos":"adj.","zh":"不舒服的；有病的","cat":"考試重點詞","src":"Text 2","sent":"Furthermore, when I am unwell, I demand to be taken to a professional vet.","exam":"Text 2 選詞填空答案（unwell）；字首 un- 構詞：well→unwell","err":"unwell 只作表語（feel unwell），一般不放名詞前；「我唔舒服」說 I feel unwell，不是 I am not well body","coll":"feel unwell; be unwell","ex1":"Gwen stayed home from school today because she was feeling unwell.","ex2":"Take your pet to the vet if it looks unwell."},{"en":"valuable","pos":"adj.","zh":"寶貴的；貴重的","cat":"考試重點詞","src":"Text 2","sent":"The 'advice' you find online should at best be used for reference, as a valuable life is at stake here.","exam":"Text 2 選詞填空答案（valuable）；詞形轉換 value(n./v.)→valuable(adj.)","err":"勿串成 valueable——去 e 再加 -able；invaluable 是「無價的」（更貴重），不是「沒價值」","coll":"a valuable life; valuable paintings; valuable advice","ex1":"The paintings in the National Museum are historic and incredibly valuable.","ex2":"Every animal's life is valuable and should be respected."},{"en":"affection","pos":"n.","zh":"關愛；感情","cat":"核心詞彙","src":"Text 2","sent":"Owners need to invest time and resources in us, and love and affection are also important for our well-being.","exam":"寫作談寵物照顧必用；固定搭配 love and affection；閱讀理解同義替換：affection ≈ love / fondness","err":"勿與 affect（影響，動詞）及 effect（效果，名詞）混淆；show affection for/to sb","coll":"love and affection; show affection for one's pet","ex1":"Dogs show affection by wagging their tails.","ex2":"Pets need love and affection, not just food and water."},{"en":"well-being","pos":"n.","zh":"健康與幸福；福祉","cat":"核心詞彙","src":"Text 2","sent":"Owners need to invest time and resources in us, and love and affection are also important for our well-being.","exam":"寫作高分詞：animal well-being ≈ animal welfare；投訴信與議論文常用","err":"複合名詞要有連字號 well-being；勿拆成 well being 或串成 wellbing","coll":"physical and mental well-being; animal well-being","ex1":"Regular exercise is good for your well-being.","ex2":"A responsible owner cares about the well-being of his or her pet."},{"en":"stale","pos":"adj.","zh":"不新鮮的","cat":"考試重點詞","src":"Text 2","sent":"You only give me stale, tasteless nuts which are lacking in nutrition.","exam":"閱讀理解曾問 Beaky 為何 undernourished，答案正是 stale, tasteless nuts；反義 fresh","err":"stale 形容食物「放舊了」，勿與 stable（穩定的；馬廄）拼混","coll":"stale bread; stale nuts; go stale","ex1":"The bread has gone stale, so we should not eat it.","ex2":"Feeding your pet stale food can make it ill."},{"en":"nutrition","pos":"n.","zh":"營養","cat":"日常實用","src":"Text 2","sent":"You only give me stale, tasteless nuts which are lacking in nutrition.","exam":"詞形轉換 nutrition(n.)→nutritious(adj. 有營養的)；寫作談健康飲食必用","err":"形容詞 nutritious 勿與名詞 nutrition 混用：食物是 nutritious，不是 nutrition 的","coll":"lacking in nutrition; good nutrition","ex1":"Good nutrition is important for a growing puppy.","ex2":"This brand of dog food is only mildly nutritious at best."},{"en":"undernourished","pos":"adj.","zh":"營養不良的","cat":"考試重點詞","src":"Text 2","sent":"Undernourished, my beautiful, glossy feathers are becoming duller and fewer by the day.","exam":"閱讀理解曾直接問 Why do you think Beaky is 'undernourished'；字首 under- 表「不足」","err":"under-（不足）+ nourished（得到營養的）；勿與 underfed 混寫成 undernourish 當形容詞","coll":"look undernourished; undernourished animals","ex1":"The snakes in the reptile section looked underfed and undernourished.","ex2":"The rescue centre takes care of undernourished stray dogs."},{"en":"lifespan","pos":"n.","zh":"壽命","cat":"核心詞彙","src":"Text 2","sent":"My 30- to 50-year lifespan is likely to be cut short too.","exam":"閱讀理解及寫作介紹動物資料常用；搭配 have a lifespan of + 年期","err":"一個字寫成 lifespan，勿拆成 life span 後又前後不一；眾數 lifespans","coll":"a long lifespan; have a lifespan of 30 years; cut short one's lifespan","ex1":"Parrots have a lifespan of 30 to 50 years.","ex2":"Poor diet can cut short a pet's lifespan."},{"en":"vet","pos":"n.","zh":"獸醫","cat":"日常實用","src":"Text 2","sent":"Furthermore, when I am unwell, I demand to be taken to a professional vet.","exam":"聆聽對話曾出現（A vet once told me that cats need workouts to stay healthy）；寵物主題場景詞","err":"vet 是 veterinarian 的縮寫；勿與 wet（濕的）混淆讀音 /vet/ 與 /wet/","coll":"take a pet to the vet; a professional vet","ex1":"We took our cat to the vet for a check-up.","ex2":"A vet once told me that cats need workouts to stay healthy."},{"en":"maltreatment","pos":"n.","zh":"虐待","cat":"考試重點詞","src":"Text 2","sent":"Going forward, I will not hesitate to contact the SPCA regarding any maltreatment I receive.","exam":"字首 mal- 表「壞」：maltreatment ≈ cruelty / abuse，閱讀理解同義替換重點","err":"mal- + treatment，勿串成 maltreat 當名詞；「虐待動物」也可說 animal cruelty / animal abuse","coll":"animal maltreatment; suffer maltreatment","ex1":"The SPCA makes sure that animals suffering maltreatment are helped out.","ex2":"Have you ever read any news related to the maltreatment of pets?"},{"en":"adopt","pos":"v.","zh":"領養","cat":"口語常用","src":"聽力對話","sent":"Well, she was a stray before I adopted her.","exam":"聆聽及綜合任務主題詞（prepare dogs for adoption）；詞形轉換 adopt(v.)→adoption(n.)","err":"勿與 adapt（適應）混淆，一個字母之差；「領養寵物」是 adopt a pet，不是 buy","coll":"adopt a stray cat; put a dog up for adoption","ex1":"Many elderly people find that adopting a pet can relieve feelings of loneliness.","ex2":"People who come to our centre looking to adopt a pet usually prefer obedient dogs."},{"en":"stray","pos":"adj./n.","zh":"流浪的；流浪動物","cat":"口語常用","src":"聽力對話","sent":"Like many stray animals, she has the tendency to feel anxious.","exam":"聆聽筆記題答案語境；stray 兼作形容詞（a stray dog）及名詞（a stray）","err":"勿與 straw（吸管；稻草）拼混；「流浪貓」是 a stray cat，不是 street cat 直譯","coll":"a stray dog; stray animals; rescue strays","ex1":"The kind woman feeds the stray cats in her neighbourhood.","ex2":"Luna was a stray before Gigi adopted her."},{"en":"anxious","pos":"adj.","zh":"焦慮的；擔心的","cat":"口語常用","src":"聽力對話","sent":"Like many stray animals, she has the tendency to feel anxious.","exam":"聆聽筆記題答案（anxious）；詞形轉換 anxious(adj.)→anxiety(n. 焦慮)","err":"x 讀 /kʃ/：/ˈæŋkʃəs/；anxious about sth 的介詞是 about","coll":"feel anxious; anxious about the exam","ex1":"If she feels anxious easily, find toys that can help her calm down.","ex2":"My dog gets anxious when it hears thunder."},{"en":"obedient","pos":"adj.","zh":"服從的；聽話的","cat":"口語常用","src":"綜合任務","sent":"After all, people who come to our centre looking to adopt a pet usually prefer dogs that are relatively obedient.","exam":"聆聽綜合任務語境詞；詞形轉換 obey(v.)→obedient(adj.)→obedience(n.)","err":"動詞是 obey（勿串成 obay）；obedient 的名詞 obedience 拼法要背","coll":"an obedient dog; obedient to its owner","ex1":"An obedient dog will sit and stay when you tell it to.","ex2":"Training helps dogs become more obedient and ready for adoption."},{"en":"budget","pos":"n.","zh":"預算","cat":"口語常用","src":"聽力對話","sent":"My budget is around a hundred dollars.","exam":"聆聽筆記題答案（a hundred dollars）；日常購物對話高頻詞","err":"「超出預算」是 go over budget；勿受粵語影響說 over the budget money","coll":"a tight budget; go over budget; within budget","ex1":"You won't go over budget buying one of these toy mice.","ex2":"We have a small budget for pet supplies this month."},{"en":"discount","pos":"n.","zh":"折扣","cat":"日常實用","src":"綜合任務","sent":"By the way, the centre will be offering a ten percent discount on programme fees for Best Buddies members in order to attract participation.","exam":"聆聽數字題常考（a ten percent discount）；搭配 at a discounted price","err":"「九折」是 a ten percent discount（減10%），受中文「九折」影響易算錯百分比","coll":"a ten percent discount; at a discounted price; offer a discount","ex1":"You may find something nice at a discounted price on the special offer page.","ex2":"Members can enjoy a discount on all pet food."},{"en":"deadline","pos":"n.","zh":"截止日期","cat":"日常實用","src":"綜合任務","sent":"Having decided on the starting date of the programme, we can now set the application deadline, which is usually about a month before a programme begins.","exam":"聆聽日期題常考（the fourth of December）；學校及活動通知必用詞","err":"meet the deadline（趕及限期）、miss the deadline（錯過限期），動詞搭配勿混用","coll":"the application deadline; meet the deadline; set a deadline","ex1":"The application deadline is set on the fourth of December.","ex2":"Remember to hand in your project before the deadline."},{"en":"fetch","pos":"v.","zh":"取回；撿回","cat":"口語常用","src":"綜合任務","sent":"I was just about to suggest that the third module be about simple tricks for owners to play with their dogs, including training the dog to find or fetch things, or to play a game of tug of war.","exam":"聆聽綜合任務語境詞；fetch = go and get sth and bring it back，一個動詞包含來回兩個動作","err":"fetch 已包含「去取回來」，勿說 go to fetch back；與 bring（帶來）、take（帶去）分工不同","coll":"fetch the ball; teach a dog to fetch","ex1":"My dog loves to fetch the ball in the park.","ex2":"Could you fetch me a glass of water, please?"}],"phrases":[{"phrase":"a fish out of water","zh":"格格不入的人；如魚離水","type":"課文短語","sent":"My friend Norbert, who is not an animal person, was like a fish out of water at the dog park.","note":"Write more 重點句式；常配 like / feel like 使用，形容人在陌生環境中不自在","ex":"The hamster seemed like a fish out of water in the paddling pool."},{"phrase":"capable of (doing) sth","zh":"有能力做某事","type":"寫作句式","sent":"Male wild boars in Hong Kong are capable of running at a speed of 40km/h.","note":"Write more 重點句式；of 後必須接名詞或動名詞（V-ing），是 be able to do 的高分替代","ex":"Camels are capable of going 15 days without water."},{"phrase":"hold one's own","zh":"毫不遜色；足以抗衡","type":"課文短語","sent":"Though small in size, honey badgers can hold their own against big cats and hyenas.","note":"Write more 重點句式；常接 against sb/sth；own 前的所有格隨主語改變（its/their own）","ex":"Thanks to its razor-sharp quills, the porcupine can hold its own against animals several times its size."},{"phrase":"talk about sth!","zh":"說到……真是誇張！（感歎用法）","type":"口語短語","sent":"Talk about bad manners - my parrot, Gordan, won't stop repeating every word he hears!","note":"Write more 重點句式；置於句首或句尾作感歎，表示情況極端，不是普通的「談論」","ex":"Tiger moths can scramble the hunting signals of bats. Talk about sabotage!"},{"phrase":"at best","zh":"充其量；最多也只是","type":"課文短語","sent":"The 'advice' you find online should at best be used for reference, as a valuable life is at stake here.","note":"Write more 重點句式；表示即使以最樂觀的角度看也不過如此，常與 at worst 對舉","ex":"Live dolphin shows are mildly entertaining at best and a form of animal cruelty at worst."},{"phrase":"at stake","zh":"危在旦夕；成敗攸關","type":"課文短語","sent":"When food is scarce and their own survival is at stake, mother bears sometimes choose to eat their own young.","note":"Write more 重點句式；主語常是 life / survival / future；閱讀理解曾考 a valuable life is at stake 的意思","ex":"The lives of countless wild animals are at stake because of global warming."},{"phrase":"by the day","zh":"一天比一天；日益","type":"課文短語","sent":"Undernourished, my beautiful, glossy feathers are becoming duller and fewer by the day.","note":"Write more 重點句式；配比較級使用（duller and fewer by the day）；閱讀理解曾考同義：as time goes by","ex":"The old lion's furry coat was becoming thinner by the day."},{"phrase":"draw sb's attention to sth","zh":"促請某人注意某事","type":"寫作句式","sent":"I would like to draw your attention to the fact that you are the cause of my unbecoming response to your mother.","note":"Write more 重點句式；投訴信必用句型 I would like to draw your attention to...；介詞用 to","ex":"My dog barked loudly to draw my attention to the burglar."},{"phrase":"give due consideration to sth","zh":"認真考慮；給予應有的重視","type":"寫作句式","sent":"I hope you will give due consideration to the issues raised in this letter.","note":"Write more 重點句式；投訴信結尾常用禮貌句；due 解「應有的」，介詞用 to","ex":"World leaders should give due consideration to the welfare of endangered species like the black rhino."},{"phrase":"on the grounds that","zh":"以……為理由","type":"寫作句式","sent":"Nevertheless, you ignore me on the grounds that you have a 'busy' job.","note":"Write more 重點句式；後接完整子句，說明（往往未必成立的）理由；grounds 必須用眾數","ex":"Joanne refused to allow Neil's husky to enter her café on the grounds that some customers might have a fur allergy."},{"phrase":"say one's piece","zh":"說出心裏話；表達自己的意見","type":"課文短語","sent":"Ruffled feathers - a parrot says his piece","note":"Write more 重點句式（出自 Text 2 標題）；piece 勿誤寫成 peace；所有格隨主語改變","ex":"Miriam wants to say her piece about the poaching of pangolins."},{"phrase":"the last straw","zh":"最後一根稻草；忍無可忍的導火線","type":"課文短語","sent":"Your mother's recent visit was the last straw.","note":"Write more 重點句式；指一連串不快事件中令人爆發的最後一件；前面通常鋪陳已忍耐多時","ex":"The puppy's violent behaviour that day was the last straw for Jim, who decided to send it to a shelter."},{"phrase":"believe it or not","zh":"信不信由你","type":"口語短語","sent":"Believe it or not, some snails can hibernate for as long as three years.","note":"Write more 重點句式；置於句首引出令人驚訝的事實，後加逗號；口語及寫作開頭均可用","ex":"Believe it or not, crows can recognise a person's face years after first seeing them."},{"phrase":"crack the code","zh":"破解謎團；解開奧秘","type":"課文短語","sent":"Scientists are still trying to crack the code of how many species of animals live on Earth.","note":"Write more 重點句式；本義是破解密碼，引申為解開難題；後接 of + 名詞／wh- 子句","ex":"Researchers want to crack the code of how our human ancestors managed to domesticate wolves."},{"phrase":"fill the void","zh":"填補空虛；填補空缺","type":"課文短語","sent":"Many elderly people find that adopting a pet can fill the void of loneliness after retirement.","note":"Write more 重點句式；void 指心靈空虛或失去後的空缺；常接 of sth 或 left by sb/sth","ex":"Our cat fills the void left by the death of her kitten by babying our new puppy."},{"phrase":"thanks to","zh":"多虧；由於","type":"寫作句式","sent":"Cheetahs can run at speeds of up to 60 miles per hour thanks to their aerodynamic build and enormous stride.","note":"Write more 重點句式；表正面原因 ≈ because of；後接名詞短語，不接子句","ex":"Kangaroo rats are able to jump up to nine feet into the air thanks to their powerful back legs."},{"phrase":"take one's mind off things","zh":"分散注意力；暫時忘卻煩惱","type":"口語短語","sent":"If she feels anxious easily, then maybe you should find toys that can help her calm down or take her mind off things.","note":"口語常用；off 後可接具體事物（take your mind off the exam）；所有格隨主語改變","ex":"Playing with my hamster helps me take my mind off my homework."},{"phrase":"You've got a point.","zh":"你說得有道理。","type":"口語短語","sent":"You've got a point. A toy that is small would be easier for Luna to play with.","note":"口試及日常對話表示認同對方論點；亦可說 That's a good point；認同後常補充理由","ex":"You've got a point. Keeping a pet is a big responsibility."}]},{"key":"2A_U3","form":"F2","book":"2A","num":3,"theme":"Things mysterious (mystery stories and suspense)","theme_zh":"神秘之事——懸疑故事與偵探小說","words":[{"en":"mystery","pos":"n.","zh":"懸疑（故事）；謎","cat":"核心詞彙","src":"詞彙練習","sent":"Hmmmm, I think mysteries are my favourite film genre, especially the ones adapted from the works of great novelists like Sir Arthur Conan Doyle and Carolyn Keene.","exam":"本單元主題詞；詞形轉換 mystery(n.)→mysterious(adj. 神秘的)；眾數 mysteries 改 y 為 ies","err":"重音在第一音節 MYS-tery；勿串成 mistery；「懸疑片」是 a mystery，不用加 story 也可","coll":"a mystery story; a murder mystery; solve a mystery","ex1":"Have you ever read a mystery story? Did you like it?","ex2":"Most of the articles for this issue are about mysteries and legends that cannot be explained."},{"en":"mysterious","pos":"adj.","zh":"神秘的；難以解釋的","cat":"核心詞彙","src":"教師手冊","sent":"(改編) In this unit, students will learn about things mysterious and how suspense is created in short stories.","exam":"詞形轉換 mystery(n.)→mysterious(adj.)→mysteriously(adv.)，選詞填空常要求判斷詞性","err":"拼寫注意 -ious 結尾：mysterious；勿照名詞串成 mysteryous","coll":"a mysterious stranger; in a mysterious way; a mysterious disappearance","ex1":"A mysterious man was sitting several rows ahead in the carriage.","ex2":"The old house has a mysterious atmosphere at night."},{"en":"detective","pos":"n.","zh":"偵探","cat":"核心詞彙","src":"Text 1 活動","sent":"I prefer reading detective stories that feature a realistic, open ending because they are more gripping.","exam":"詞彙練習選詞填空答案；單元評估亦考（a detective from the police force trying to solve a murder）","err":"詞根 detect（偵查）+ -ive；勿串成 dectective；「偵探小說」是 detective stories","coll":"a private detective; a detective story; the detective cracks the case","ex1":"Sherlock Holmes is the most famous detective in fiction.","ex2":"We've done an interview with a private detective for the school magazine."},{"en":"sleuth","pos":"n.","zh":"偵探；喜歡查案的人","cat":"核心詞彙","src":"Text 1 活動","sent":"It is difficult for amateur sleuths to crack a case because they are not police with the authority to investigate and arrest people.","exam":"閱讀理解同義替換：sleuth ≈ detective；常配 amateur sleuth（業餘偵探）","err":"讀音 /sluːθ/，eu 讀 /uː/；勿與 slot 或 sloth（樹懶）混淆","coll":"an amateur sleuth; the sleuth cracks the case","ex1":"The young sleuth followed the clues to find the missing necklace.","ex2":"The sleuth arrived at the gruesome crime scene to look for evidence."},{"en":"suspense","pos":"n.","zh":"懸念；緊張感","cat":"核心詞彙","src":"Text 1","sent":"Suspense, action, horror, romance - this whodunnit has it all.","exam":"本單元寫作重點（create suspense in a short story）；詞形轉換 suspense(n.)→suspenseful(adj.)","err":"不可數名詞，不加 a；「充滿懸念」是 full of suspense；勿與 suspend（暫停）混淆","coll":"create suspense; full of suspense; keep readers in suspense","ex1":"Many readers love The Hound of the Baskervilles because the story is full of suspense.","ex2":"Good horror writers know how to create suspense in their stories."},{"en":"suspenseful","pos":"adj.","zh":"扣人心弦的；充滿懸念的","cat":"考試重點詞","src":"Text 1","sent":"No wonder this suspenseful story has been adapted so many times since it came out in 1902.","exam":"詞彙練習及單元評估選詞填空答案；字尾 -ful 構詞：suspense→suspenseful","err":"字尾 -ful 只有一個 l；勿串成 suspensful（漏 e）","coll":"a suspenseful story; a suspenseful page-turner","ex1":"I could not put down the suspenseful novel until midnight.","ex2":"If you are in search of a suspenseful page-turner, Death on the Nile is the book for you."},{"en":"plot","pos":"n.","zh":"情節","cat":"核心詞彙","src":"Text 3","sent":"The truth is that the plot is too predictable to be enjoyable.","exam":"故事元素重點詞；搭配 plot twist（情節轉折）閱讀理解與寫作常見","err":"勿與 plan 混用：plot 專指故事情節；「情節轉折」是 plot twist，不是 plot turning","coll":"a gripping plot; an ingenious plot twist; the plot thickens","ex1":"The plot twists in the story all combined to make my heart race.","ex2":"As far as plots go, this one is unbeatable because it is both complex and elegant."},{"en":"villain","pos":"n.","zh":"反派；壞人","cat":"核心詞彙","src":"Text 1","sent":"She lets the reader be the judge of whether the novel's main villain deserves his fate.","exam":"詞彙練習選詞填空答案；與 hero / protagonist 相對，故事元素必考詞","err":"拼寫雙 l 在中間：vil-lain；勿串成 villian（i 與 a 調轉是常見錯誤）","coll":"the main villain; the villain's plot; play the villain","ex1":"The detective mastermind saves the day by turning the villain's plot against him.","ex2":"There are many villains and accomplices in this fast-paced and gripping story."},{"en":"protagonist","pos":"n.","zh":"主角","cat":"考試重點詞","src":"Text 1","sent":"The protagonist tried to interview the victim's brother, a young man prone to hysterics.","exam":"閱讀理解同義替換：protagonist ≈ main character / hero；故事評論寫作高分詞","err":"重音在第二音節 pro-TA-gonist；勿與 antagonist（對頭；反派）混淆","coll":"the story's protagonist; a relatable protagonist","ex1":"The protagonist of the story is an ordinary teenager with a big secret.","ex2":"The daunting challenges the protagonist faced made my heart race."},{"en":"culprit","pos":"n.","zh":"犯人；罪魁禍首","cat":"考試重點詞","src":"Text 1 活動","sent":"Readers can pretend to be the detective and find the culprit themselves.","exam":"閱讀理解同義替換：culprit ≈ criminal / the guilty person；偵探故事必考詞","err":"拼寫 cul-prit；勿串成 culpit；「將犯人繩之於法」是 bring the culprit to justice","coll":"the true culprit; find the culprit; bring the culprit to justice","ex1":"The final reveal of the culprit's true identity was a little underwhelming, I must say.","ex2":"You are likely to suspect every character in the novel before you do the true culprits."},{"en":"suspect","pos":"n./v.","zh":"疑犯；懷疑","cat":"考試重點詞","src":"Text 1","sent":"The spy knew that the murderer was a tall, slim man who weighed between 55 and 60kg, but the only suspect who fit the bill was the story's protagonist.","exam":"一詞兩性重音不同：名詞 SUS-pect（疑犯）、動詞 sus-PECT（懷疑）；單元評估語境（there are no suspects yet）","err":"名詞與動詞重音位置不同，聆聽易聽錯；勿與 expect（期望）拼混","coll":"a prime suspect; suspect sb of sth; the only suspect","ex1":"The police have arrested a suspect in the robbery case.","ex2":"A robbery occurred at your school and there are no suspects yet."},{"en":"suspicious","pos":"adj.","zh":"可疑的；起疑心的","cat":"考試重點詞","src":"詞彙練習","sent":"Arnold realised then that he was dealing with a suspicious death.","exam":"詞彙練習選詞填空答案（a suspicious death）；詞形轉換 suspect(v.)→suspicious(adj.)→suspicion(n.)","err":"「可疑的」（The man looks suspicious）與「起疑的」（I am suspicious of him）兩義都有，介詞用 of","coll":"a suspicious death; look suspicious; be suspicious of sb","ex1":"The story has it all: a suspicious death in the countryside and a spooky legend about a demonic hound.","ex2":"The security guard became suspicious of the man waiting outside the bank."},{"en":"crime scene","pos":"n.","zh":"案發現場","cat":"核心詞彙","src":"詞彙練習","sent":"So far, the only object of interest at the crime scene was a handkerchief with a brown smudge on it.","exam":"詞彙練習選詞填空答案；偵探故事場景詞，介詞用 at the crime scene","err":"兩個字分開寫：crime scene；scene（現場）勿與 seen（see 的過去分詞）混淆","coll":"at the crime scene; examine the crime scene","ex1":"The detective collected evidence at the crime scene.","ex2":"The sleuth arrived at the gruesome crime scene, and his fears were induced by the sight of the corpses."},{"en":"murder","pos":"n./v.","zh":"謀殺","cat":"核心詞彙","src":"詞彙練習","sent":"'Daniel Law, you are under arrest for the murder of Goldie Law!' cried Arnold, seizing the man as he tried to escape.","exam":"單元評估選詞填空答案（solve a murder）；搭配 murder mystery（謀殺懸疑故事）","err":"murderer（兇手）比 murder 多 -er，串字易漏；the murder of sb 介詞用 of","coll":"a murder mystery; commit murder; solve a murder","ex1":"Death on the Nile follows detective Hercule Poirot as he tries to solve multiple murders aboard a cruise ship.","ex2":"The detective tripped over a rock while he was chasing the murderer."},{"en":"genre","pos":"n.","zh":"（文學、電影）類型","cat":"核心詞彙","src":"詞彙練習","sent":"What's your favourite film genre, Christy?","exam":"本單元框架詞：談論 films/books and their genres；聆聽及口試談喜好必用","err":"法語借詞，讀音 /ˈʒɒnrə/，g 讀 /ʒ/ 不讀 /dʒ/；勿串成 gener","coll":"a film genre; my favourite genre; explore different genres","ex1":"I'm trying to expose myself to a wider range of genres.","ex2":"I think that's exactly the genre I need to explore!"},{"en":"horror","pos":"n.","zh":"恐怖（片／故事）","cat":"高頻基礎詞","src":"詞彙練習","sent":"I'm trying to expose myself to a wider range of genres as I feel like I watch horror way too often.","exam":"詞彙練習選詞填空答案；搭配 horror movie / horror story；單元評估以 horror writer 為語境","err":"雙 r 中間：hor-ror；「恐怖片」是 horror film，勿說 horrible film（後者指「很差的電影」）","coll":"a horror movie; a horror writer; the horror genre","ex1":"What is your favourite horror movie or story?","ex2":"I've read my fair share of horror stories but nothing has frightened me more than Stephen King's It."},{"en":"thriller","pos":"n.","zh":"驚悚片；驚悚小說","cat":"核心詞彙","src":"詞彙練習","sent":"I also like action-packed thrillers.","exam":"詞彙練習選詞填空答案；詞形轉換 thrill(v./n.)→thriller(n.)→thrilling(adj.)","err":"雙 l：thril-ler；thriller 是名詞（作品），thrilling 才是形容詞「刺激的」","coll":"an action-packed thriller; a psychological thriller","ex1":"In this thriller, we see a father race against time to find an antidote to a deadly poison.","ex2":"Do you enjoy watching thriller and horror movies?"},{"en":"whodunnit","pos":"n.","zh":"偵探推理小說（誰是兇手）","cat":"核心詞彙","src":"詞彙練習","sent":"There's nothing as satisfying as a good whodunnit.","exam":"由 Who done it? 縮合而成的趣味構詞；閱讀理解同義替換：whodunnit ≈ detective story","err":"口語拼法固定為 whodunnit（雙 n），不能自行改回 who did it","coll":"a classic whodunnit; a good whodunnit","ex1":"No wonder this whodunnit has such lasting appeal.","ex2":"Knowing how multi-faceted these characters are, it is no wonder that the whodunnit has had suc
