sages - the recipient is likely to think you are annoyed.","exam":"閱讀理解細節題常考三點省略號的語氣含義；複數為 ellipses。","err":"單數 ellipsis、複數 ellipses，拼寫及發音港生易錯；三點省略號常暗示不耐煩或欲言又止。","coll":"use an ellipsis; a three-dot ellipsis; ellipses in text","ex1":"A three-dot ellipsis ('ok …') often implies you're annoyed.","ex2":"Ellipses come in handy when you want to communicate that you're lost for words."},{"en":"recipient","pos":"n.","zh":"收件人；接收者","cat":"考試重點詞","src":"Text 1","sent":"Be careful when using ellipses in your text messages - the recipient is likely to think you are annoyed.","exam":"詞彙練習及閱讀理解關鍵詞；與 sender（發送者）為反義配對常考。","err":"拼寫 recipient（-cip-）易錯；動詞是 receive，注意詞形。","coll":"the recipient of a message; the intended recipient","ex1":"Anyone touching base online needs to understand usage so the recipient does not misunderstand the tone.","ex2":"Be careful with ellipses - the recipient is likely to think you are annoyed."},{"en":"correspondence","pos":"n.","zh":"書信往來；通訊","cat":"核心詞彙","src":"Text 1","sent":"Becoming familiar with the style in which online messages are written will help members start an online correspondence with other pop culture fans.","exam":"詞彙練習填空答案；不可數名詞，銜接高中實用文寫作。","err":"拼寫有雙寫 r（correspondence），港生易漏；動詞 correspond 後接 with sb。","coll":"written correspondence; start a correspondence; business correspondence","ex1":"Capitalization can help you convey excitement in written correspondence.","ex2":"Every weekend I look forward to corresponding with my pen pal."},{"en":"emphatic","pos":"adj.","zh":"強調的；著重語氣的","cat":"核心詞彙","src":"詞彙練習","sent":"Every now and then it would send a bark to the trees and then give Sebastian an emphatic look.","exam":"詞彙練習填空答案；詞形轉換考 emphasis（n.）→ emphasize（v.）→ emphatic（adj.）。","err":"副詞 emphatically；港生易與 empathetic（有同理心的）混淆，意義完全不同。","coll":"an emphatic look; emphatic capitalization; an emphatic 'no'","ex1":"Slang often lets you be more emphatic or humorous than formal writing does.","ex2":"Capital letters are often used to make speech emphatic, as in 'Things are NOT looking good'."},{"en":"convey","pos":"v.","zh":"傳達；表達","cat":"高頻基礎詞","src":"Text 1","sent":"Capitalization can help you convey excitement in written correspondence, where facial expressions are missing.","exam":"詞彙練習及寫作常用動詞；閱讀理解同義詞題常考 convey = express / communicate。","err":"convey 直接接受詞（convey a message），港生易誤加 to；被動 be conveyed。","coll":"convey a message; convey excitement; convey meaning","ex1":"Sometimes there's no wrong way of communicating, as long as your message is clearly conveyed.","ex2":"Emojis are fantastic at conveying emotions and feelings."},{"en":"deduce","pos":"v.","zh":"推斷；推論","cat":"考試重點詞","src":"詞彙練習","sent":"We deduce from the strong student support for the club that many students would like to improve their English.","exam":"詞彙練習填空答案；閱讀理解常考 deduce = work out / conclude；'formulated' is synonymous with 'deduced'。","err":"deduce（v.）→ deduction（n.）詞形轉換；port生易與 reduce 拼寫混淆。","coll":"deduce from; deduce that; deduce the meaning","ex1":"We deduce from the strong student support that many would like the club.","ex2":"Guide students to infer and deduce the meanings of the words from the context."},{"en":"clarity","pos":"n.","zh":"清晰；清楚","cat":"考試重點詞","src":"詞彙練習","sent":"As the clarity of the speech in some songs, film and series is low due to mumbling and regional accents, our club will also help members understand their favourite stories.","exam":"詞彙練習及單元評估填空答案；詞形轉換考 clear（adj.）→ clarity（n.）→ clarify（v.）。","err":"不可數名詞，不加 -s；港生易受 clear 影響誤拼成 clearity。","coll":"clarity of speech; for clarity; lack clarity","ex1":"Follow these tips to ensure your digital communication is productive and clear.","ex2":"The clarity of the recording was low due to mumbling and background noise."},{"en":"contemporary","pos":"adj.","zh":"當代的；現代的","cat":"考試重點詞","src":"詞彙練習","sent":"The Languages Club would like to start a Pop Culture English Club at our school to explore contemporary usage of English in popular movies, TV shows, comic books and webtoons.","exam":"詞彙練習填空答案；閱讀理解同義詞題常考 contemporary = modern / current。","err":"拼寫較長（con-tem-po-rary）易錯；亦可作名詞指「同代人」。","coll":"contemporary usage; contemporary society; contemporary art","ex1":"Our club will explore the contemporary usage of English on social media.","ex2":"Anyone joining an online discussion needs to understand contemporary usage."},{"en":"grammar","pos":"n.","zh":"文法；語法","cat":"高頻基礎詞","src":"Text 1","sent":"'Online English' is not very particular about grammar and spelling, which can be comforting for language learners like us.","exam":"高頻基礎詞；不可數名詞，選詞填空注意不加 -s。","err":"拼寫 grammar（-ar 結尾，非 -er），港生極常誤拼 grammer；形容詞是 grammatical。","coll":"correct grammar; the rules of grammar; grammar and spelling","ex1":"Internet lingo doesn't always follow the traditional rules of grammar.","ex2":"You'd better stick to proper grammar when doing homework or a written test."},{"en":"style","pos":"n.","zh":"風格；文體","cat":"高頻基礎詞","src":"Text 1","sent":"Becoming familiar with the style in which online messages are written will help give club members the confidence they need.","exam":"詞彙練習填空答案；閱讀理解語域（register）主題常見。","err":"形容詞 stylish（時髦的）與 stylistic（風格上的）意義不同，港生易混。","coll":"writing style; a formal style; stylistic features","ex1":"Internet lingo has developed alternative rules that replace the traditional style.","ex2":"Identifying stylistic features is crucial to understanding the writer's purpose."},{"en":"humorous","pos":"adj.","zh":"幽默的；風趣的","cat":"高頻基礎詞","src":"詞彙練習","sent":"The wolf's confused expression might have been humorous if the situation hadn't been so serious.","exam":"詞彙練習及單元評估填空答案；詞形轉換考 humour（n.）→ humorous（adj.）。","err":"humorous 拼寫時第二個 u 去掉（不是 humourous）；港生受英式 humour 影響易錯。","coll":"a humorous tone; a humorous expression; humorous remarks","ex1":"You can use a humorous tone when writing a letter to your friends.","ex2":"The kids discovered the humorous ways language can transform through errors."},{"en":"annoyed","pos":"adj.","zh":"惱怒的；生氣的","cat":"高頻基礎詞","src":"詞彙練習","sent":"Annoyed at having been awoken in the middle of a good dream, Sebastian stomped to the entrance to tell the offender off.","exam":"詞彙練習及單元評估填空答案；-ed / -ing 分詞形容詞辨析（annoyed 感到惱怒 vs annoying 令人惱怒）屬經典考點。","err":"人感到惱怒用 annoyed，事物令人惱怒用 annoying；港生極易混用。","coll":"be annoyed at/with; get annoyed; annoyed by","ex1":"The recipient is likely to think you are annoyed if you use an ellipsis.","ex2":"Others may become annoyed with you if you overuse emojis at work."},{"en":"restless","pos":"adj.","zh":"坐立不安的；焦躁的","cat":"核心詞彙","src":"詞彙練習","sent":"On nights when he was feeling restless and in need of an outlet for his energy, he would send his own howls in return.","exam":"詞彙練習填空答案；-less 後綴詞屬詞形轉換考點（rest → restless）。","err":"restless 指「靜不下來、焦躁」，不是「沒有休息」；港生易望文生義。","coll":"feel restless; grow restless; a restless night","ex1":"Some of you have started feeling restless and have an itch to check your phone.","ex2":"On nights when he was feeling restless, he would send his own howls in return."},{"en":"hostile","pos":"adj.","zh":"敵意的；不友善的","cat":"考試重點詞","src":"詞彙練習","sent":"He wouldn't blame them for being hostile to him.","exam":"詞彙練習及單元評估填空答案；詞形轉換考 hostile（adj.）→ hostility（n.）。","err":"hostile 後接 to / towards sb；英式讀音 /ˈhɒstaɪl/，港生易讀錯。","coll":"hostile to; a hostile tone; a hostile environment","ex1":"Check that your message doesn't come across as abrupt, hostile or demanding.","ex2":"He wouldn't blame the wolf's parents for being hostile to him."},{"en":"irritable","pos":"adj.","zh":"易怒的；煩躁的","cat":"核心詞彙","src":"詞彙練習","sent":"Sebastian was no longer irritable - he was scared!","exam":"詞彙練習填空答案；閱讀理解情緒詞辨析，與 irritated（被激怒的）易混。","err":"irritable 指「性情易怒」的傾向，irritated 指「當下被惹怒」；港生常混用。","coll":"feel irritable; an irritable mood; become irritable","ex1":"Lack of sleep can make you irritable the next day.","ex2":"Sebastian was no longer irritable - he was scared!"},{"en":"menacingly","pos":"adv.","zh":"威脅地；來勢洶洶地","cat":"核心詞彙","src":"詞彙練習","sent":"He could imagine the pup's parents coming towards him menacingly in the dark.","exam":"詞彙練習填空答案；詞形轉換考 menace（n./v.）→ menacing（adj.）→ menacingly（adv.）。","err":"副詞連寫較長，港生易漏字母；語氣詞多用於描寫緊張情境。","coll":"move menacingly; loom menacingly; growl menacingly","ex1":"He imagined the pup's parents coming towards him menacingly in the dark.","ex2":"The stranger stepped forward menacingly, and everyone backed away."},{"en":"frantically","pos":"adv.","zh":"瘋狂地；慌亂地","cat":"核心詞彙","src":"詞彙練習","sent":"It began frantically butting Sebastian's feet with its head and pushing him towards the woods.","exam":"詞彙練習填空答案；詞形轉換考 frantic（adj.）→ frantically（adv.）。","err":"frantic 去 c 加 -ally（frantically），拼寫易錯；描寫緊急、慌張的動作。","coll":"search frantically; wave frantically; work frantically","ex1":"The wolf began frantically butting Sebastian's feet with its head.","ex2":"She searched frantically for her phone before the exam started."},{"en":"defensively","pos":"adv.","zh":"防衛地；戒備地","cat":"考試重點詞","src":"詞彙練習","sent":"At first the mother growled at Sebastian defensively.","exam":"詞彙練習及單元評估填空答案；閱讀理解 Day 3 主題（reacting defensively to criticism）。","err":"詞形轉換 defend（v.）→ defensive（adj.）→ defensively（adv.）；注意 -ce/-se 之別。","coll":"react defensively; respond defensively; act defensively","ex1":"Participants learn the value of accepting criticism rather than reacting defensively.","ex2":"You don't want to respond too defensively to criticisms at work."},{"en":"subtle","pos":"adj.","zh":"微妙的；細微的","cat":"考試重點詞","src":"詞彙練習","sent":"Over time he began to recognise the subtle changes between one howl and the next.","exam":"詞彙練習填空答案；閱讀理解常考 subtle = slight / not obvious，屬DSE高頻詞。","err":"字母 b 不發音（/ˈsʌtl/），港生易讀錯；副詞 subtly 拼寫易漏字母。","coll":"a subtle change; a subtle difference; subtle gestures","ex1":"Miscommunication happens in subtle unspoken gestures and misinterpretations.","ex2":"Over time he began to recognise the subtle changes between one howl and the next."},{"en":"enthusiasm","pos":"n.","zh":"熱情；熱誠","cat":"高頻基礎詞","src":"詞彙練習","sent":"The howl wasn't received with any enthusiasm, but it did calm the mother down.","exam":"詞彙練習及單元評估填空答案；詞形轉換考 enthusiasm（n.）→ enthusiastic（adj.）。","err":"拼寫 enthusiasm（-thu-si-asm）較難，港生極易錯；不可數名詞。","coll":"with enthusiasm; show enthusiasm; lack enthusiasm","ex1":"You don't want to seem like you have too much enthusiasm in a work message.","ex2":"The howl wasn't received with any enthusiasm, but it did calm the mother down."},{"en":"gesture","pos":"n.","zh":"手勢；姿態","cat":"高頻基礎詞","src":"文法練習","sent":"Gestures should be used carefully as they may mean different things in different cultures.","exam":"文法練習（被動語態）例句詞；聽力及跨文化溝通主題常見。","err":"gesture 可作名詞及動詞；港生易把 g 讀成 /g/，正確為 /ˈdʒestʃə/。","coll":"hand gestures; a friendly gesture; make a gesture","ex1":"Gestures should be used carefully as they may mean different things in different cultures.","ex2":"Miscommunication happens in subtle unspoken gestures."},{"en":"proposal","pos":"n.","zh":"建議書；提案","cat":"核心詞彙","src":"Text 2","sent":"The Student Union hereby proposes a communication workshop for all incoming club leaders.","exam":"本單元寫作文體（proposal）核心詞；詞形轉換考 propose（v.）→ proposal（n.）。","err":"proposal 拼寫 -osal 結尾；動詞 propose 後可接 that 從句或 doing。","coll":"write a proposal; a proposal for; submit a proposal","ex1":"Shane has written a proposal for the formation of a Pop Culture English Club.","ex2":"The Student Union looks forward to any advice you may have regarding the proposal."},{"en":"aspect","pos":"n.","zh":"方面；層面","cat":"考試重點詞","src":"Text 2","sent":"We need to consider the potential environmental impact in every aspect of the project.","exam":"單元評估填空答案（every aspect）；議論文寫作分點必用詞。","err":"aspect 前常配 every / various；港生易與 respect、expect 拼寫混淆。","coll":"every aspect of; various aspects; a key aspect","ex1":"The workshop will walk participants through key aspects of communication.","ex2":"We need to consider the potential environmental impact in every aspect of the project."},{"en":"description","pos":"n.","zh":"描述；形容","cat":"考試重點詞","src":"Text 2","sent":"The witness provided the police with a clear and detailed description of the suspect's facial features and clothing.","exam":"單元評估填空答案；詞形轉換考 describe（v.）→ description（n.）→ descriptive（adj.）。","err":"describe 是 -sc-，description 亦是 -scr-，但港生常把動詞拼成 discribe。","coll":"a detailed description; give a description; job description","ex1":"How should we write the description of the game?","ex2":"The witness provided a clear and detailed description of the suspect."},{"en":"accurately","pos":"adv.","zh":"準確地；精確地","cat":"考試重點詞","src":"Text 2","sent":"Judy is on the national archery team, so she knows how to shoot an arrow accurately in order to hit her target.","exam":"單元評估填空答案；詞形轉換考 accurate（adj.）→ accurately（adv.）→ accuracy（n.）。","err":"雙寫 c（accurately），港生常漏一個 c；副詞修飾動詞。","coll":"accurately describe; measure accurately; accurately identify","ex1":"Participants learn to give useful feedback by identifying problems accurately.","ex2":"What really matters is that your message is clear and accurately understood."},{"en":"criticism","pos":"n.","zh":"批評；批判","cat":"考試重點詞","src":"Text 2","sent":"Leo Cho is a famous choreographer who is known for his harsh criticism of other dancers' performances.","exam":"單元評估填空答案；詞形轉換考 criticize（v.）→ criticism（n.）→ critical（adj.）。","err":"criticism 拼寫 -cism 結尾；動詞是 criticize，港生常混用 critic（評論家）。","coll":"harsh criticism; accept criticism; constructive criticism","ex1":"Participants will learn about the value of accepting criticism rather than reacting emotionally.","ex2":"He is known for his harsh criticism of other dancers' performances."},{"en":"facilitate","pos":"v.","zh":"促進；使更容易","cat":"考試重點詞","src":"Text 2","sent":"Most of our day-to-day communication with other people is facilitated by our smartphones and other handheld devices.","exam":"單元評估填空答案；詞形轉換考 facilitate（v.）→ facilitator（n. 主持人）。","err":"拼寫 facilitate（-cili-）易錯；被動 be facilitated by 常見於閱讀。","coll":"facilitate communication; facilitated by; facilitate learning","ex1":"Group activities will be facilitated by other alumni who were school club leaders.","ex2":"Most of our communication is facilitated by our smartphones."},{"en":"constructive feedback","pos":"phr.","zh":"建設性的意見","cat":"核心詞彙","src":"Text 2","sent":"Day 2 - Giving constructive feedback: Participants will learn to give useful feedback by identifying problems accurately and supporting their statements with facts.","exam":"Text 2 提案主題詞；閱讀理解 NOT 題常考何謂 constructive feedback（useful/accurate/fact-based，非 flattery）。","err":"feedback 是不可數名詞，不加 -s；constructive 拼寫 -ctive 結尾。","coll":"give constructive feedback; receive feedback; positive feedback","ex1":"Day 2 focuses on giving constructive feedback by supporting statements with facts.","ex2":"Flattery does not describe constructive feedback, which should be useful and accurate."},{"en":"misinterpretation","pos":"n.","zh":"誤解；曲解","cat":"核心詞彙","src":"Text 2","sent":"Participants will learn to listen rather than talk - an effective way to avoid misinterpretation and interruption.","exam":"Text 2 閱讀理解答案詞（Day 1 problems）；mis- 前綴詞屬詞形轉換考點。","err":"詞形長，由 mis + interpret + ation 組成；動詞是 misinterpret。","coll":"avoid misinterpretation; lead to misinterpretation; a misinterpretation of","ex1":"Listening effectively is a way to avoid misinterpretation and interruption.","ex2":"Using emojis carelessly can cause misinterpretation in a work context."},{"en":"miscommunication","pos":"n.","zh":"溝通不良；誤傳","cat":"核心詞彙","src":"單元評估","sent":"Miss Losman realized that miscommunication happens in many forms - not just in whispered words, but also in subtle unspoken gestures.","exam":"單元評估閱讀主題詞；mis- 前綴詞屬詞形轉換考點（communicate → miscommunication）。","err":"拼寫較長，港生易漏字母；不可數／可數皆可（forms of miscommunication）。","coll":"avoid miscommunication; a miscommunication; cause miscommunication","ex1":"The short story is about miscommunication in a game of telephone.","ex2":"Miscommunication happens in many forms, not just in whispered words."},{"en":"portmanteau","pos":"n.","zh":"混成詞；合併詞","cat":"核心詞彙","src":"詞彙練習","sent":"Many of the names of social media platforms are actually portmanteau words, such as 'Snapchat' (a combination of 'snap' and 'chat').","exam":"Word Power 語言知識重點；閱讀理解構詞法題常見（brunch = breakfast + lunch）。","err":"源自法語，拼寫特殊（port-man-teau）須強記；亦作 portmanteau word。","coll":"a portmanteau word; a portmanteau of; combine into a portmanteau","ex1":"'Instagram' is a portmanteau of 'instant' and 'telegram'.","ex2":"Many social media names are portmanteau words, such as 'YouTube'."},{"en":"staycation","pos":"n.","zh":"宅度假；本地度假","cat":"日常實用","src":"詞彙練習","sent":"I passed the first few weeks of my staycation at an awesome little getaway in Tai O fishing village, Lantau Island.","exam":"混成詞練習答案（stay + vacation）；閱讀理解構詞法題常見。","err":"港生易誤解為「留在家中」；staycation 泛指不出國、在本地的短途度假。","coll":"go on a staycation; a staycation in; enjoy a staycation","ex1":"I passed the first few weeks of my staycation at a getaway in Tai O.","ex2":"Many Hong Kong families chose a staycation in a local hotel last summer."},{"en":"smog","pos":"n.","zh":"煙霞；霧霾","cat":"日常實用","src":"詞彙練習","sent":"It was fun being so close to nature and away from the city smog.","exam":"混成詞練習答案（smoke + fog）；環境主題閱讀及聽力常見。","err":"不可數名詞，不加 -s；港生易與 smoke（煙）、fog（霧）混淆。","coll":"city smog; thick smog; a smog warning","ex1":"It was fun being close to nature and away from the city smog.","ex2":"The heavy smog made it hard to see the buildings across the harbour."},{"en":"brunch","pos":"n.","zh":"早午餐","cat":"日常實用","src":"詞彙練習","sent":"Unfortunately, I was a bit hangry during my final dinnertime broadcast (I hadn't eaten since brunch).","exam":"混成詞練習答案（breakfast + lunch）；閱讀理解構詞法題常見。","err":"港生易當作普通餐點，實為 breakfast + lunch 合併，指較晚吃的早午餐。","coll":"have brunch; a weekend brunch; go for brunch","ex1":"I hadn't eaten since brunch, so I felt hangry by dinnertime.","ex2":"We usually have a big brunch together every Sunday."},{"en":"hangry","pos":"adj.","zh":"餓到發脾氣的","cat":"日常實用","src":"詞彙練習","sent":"I was a bit hangry during my final dinnertime broadcast and embarrassed myself by making the teleprompter scroll too fast.","exam":"混成詞練習答案（hungry + angry）；口語及非正式書面語常見。","err":"非正式用語，正式寫作不宜；由 hungry + angry 合成，港生易誤拼為 hungry。","coll":"feel hangry; get hangry; a bit hangry","ex1":"I was a bit hangry during my final broadcast because I hadn't eaten since brunch.","ex2":"Have a snack before the meeting so you don't get hangry."},{"en":"fortnight","pos":"n.","zh":"兩星期；十四天","cat":"日常實用","src":"詞彙練習","sent":"I also spent a fortnight interning at a local TV station and helping them with their daily newscast.","exam":"詞彙練習答案；英式常用時間詞，聽力及閱讀常見。","err":"fortnight = two weeks，港生不熟悉此英式用法易誤解；形容詞是 fortnightly。","coll":"a fortnight; every fortnight; for a fortnight","ex1":"I spent a fortnight interning at a local TV station.","ex2":"The magazine is published once a fortnight."},{"en":"teleprompter","pos":"n.","zh":"提詞機","cat":"日常實用","src":"詞彙練習","sent":"I assisted the newsreaders by operating the teleprompter for them - that's the machine that shows the news anchors the script they need to follow.","exam":"混成詞及傳媒主題詞；閱讀理解細節題可考其功能。","err":"拼寫較長（tele-prompter），港生易漏字母；與 telegram、telescope 同前綴 tele-。","coll":"operate a teleprompter; read from a teleprompter; a teleprompter screen","ex1":"I assisted the newsreaders by operating the teleprompter for them.","ex2":"The speaker read her whole speech from a teleprompter."},{"en":"leadership skills","pos":"phr.","zh":"領導才能","cat":"口語常用","src":"聽力對話","sent":"I believe leadership skills are more important for playing this game.","exam":"聽力填空原答案；團隊合作及溝通主題高頻詞，銜接高中面試詞彙。","err":"skills 用複數；leadership 是不可數名詞，port生易誤加 -s 於 leadership。","coll":"leadership skills; develop leadership skills; strong leadership","ex1":"Players will need leadership skills to untangle the human knot.","ex2":"The workshop helps student leaders develop their leadership skills."},{"en":"problem-solving","pos":"adj.","zh":"解難的；解決問題的","cat":"口語常用","src":"聽力對話","sent":"Considering the nature of the game, I think they'll need problem-solving skills too.","exam":"聽力填空原答案；21世紀技能主題詞，銜接高中及面試常見。","err":"須加連字號（problem-solving）作定語；port生易分開寫或漏連字號。","coll":"problem-solving skills; a problem-solving approach; problem-solving ability","ex1":"Players will need problem-solving skills to 'untie' the knot.","ex2":"Group projects help students build their problem-solving skills."},{"en":"straightforward","pos":"adj.","zh":"簡單直接的；淺白的","cat":"口語常用","src":"聽力對話","sent":"It's called 'Back-to-Back Drawing', and it's a pretty straightforward game.","exam":"聽力口語常用詞；閱讀理解同義詞題常考 straightforward = simple / easy。","err":"連寫一個字（straightforward），port生易誤拼 straight forward；亦可指人「坦率」。","coll":"a straightforward task; fairly straightforward; straightforward instructions","ex1":"It's a pretty straightforward game that is easy to understand.","ex2":"The instructions were straightforward, so everyone finished quickly."},{"en":"expertise","pos":"n.","zh":"專業知識；專長","cat":"口語常用","src":"聽力對話","sent":"What we must mention is her expertise and her works.","exam":"聽力填空相關詞；詞形轉換考 expert（n.）→ expertise（n. 專業）。","err":"不可數名詞，不加 -s；重音在最後音節（ex-per-TISE），port生易讀錯。","coll":"her expertise; expertise in; technical expertise","ex1":"What we must mention in the biography is her expertise and her works.","ex2":"The facilitator has years of expertise in effective communication."},{"en":"zoologist","pos":"n.","zh":"動物學家","cat":"日常實用","src":"聽力對話","sent":"Sitting here with me is Vera Miller, a zoologist most famous for her research on marine animals.","exam":"綜合技能聽力職業詞；-ologist 結尾表「學家」屬詞形轉換考點（zoology → zoologist）。","err":"zoo 讀 /zəʊ/，zoologist 讀 /zəʊˈɒlədʒɪst/；port生易讀錯或漏音。","coll":"a marine zoologist; a famous zoologist; work as a zoologist","ex1":"Vera Miller is a zoologist famous for her research on marine animals.","ex2":"The zoologist studies the social lives of marine mammals."}],"phrases":[{"phrase":"having said that","zh":"話雖如此；儘管這樣","type":"寫作句式","sent":"Godwin's vocabulary is far too limited for a person of his age, but having said that, his knowledge of internet lingo is second to none.","note":"轉折連接語，相當於 nevertheless；用於先讓步後轉折，議論文平衡論點時實用。","ex":"Emojis and memes are fantastic at communicating feelings; having said that, they are not very useful in formal situations."},{"phrase":"in context","zh":"在特定語境中；就上下文而言","type":"課文短語","sent":"Lorna's stories made perfect sense in context, even though they would be too creative for most of her readers.","note":"置於句末的狀語，強調須結合上下文理解；反義為 out of context（斷章取義）。","ex":"Sometimes there's no right or wrong way of communicating, as long as your message is accurately understood in context."},{"phrase":"no cap","zh":"不騙你；說真的","type":"口語短語","sent":"I'm actually going to finish the script for my speech today, no cap.","note":"網絡潮語，意為 'no lie' / 'no joke'，非正式；只用於朋友間閒聊，考試作文切勿使用。","ex":"I accidentally used internet lingo in my English oral exam - no cap."},{"phrase":"things are (not) looking good","zh":"情況（不）樂觀","type":"口語短語","sent":"Things are looking good for Tom, whose dream of becoming a motivational speaker seems to be coming true.","note":"口語慣用語，描述形勢好壞；否定式 things aren't looking good 表示前景不妙。","ex":"Things aren't looking good for short-form journalists - AI writers are catching up fast!"},{"phrase":"touch base","zh":"聯繫；交流近況","type":"課文短語","sent":"Please touch base with Gabe before taking the next steps in developing your grammar checker app.","note":"商務及日常常用，後接 with sb；意為簡短聯絡或核對進度，較 contact 隨意。","ex":"I need to touch base with Sarah about our joint presentation, but she's so hard to reach."},{"phrase":"as a result","zh":"因此；結果","type":"寫作句式","sent":"My knowledge of slang has improved as a result of my joining an online pop culture forum.","note":"因果連接語；as a result 單獨用作句首，as a result of + 名詞／動名詞。","ex":"Many teens rely on emojis and gifs to express themselves and their vocabularies have shrunk as a result."},{"phrase":"look forward to","zh":"期待；盼望","type":"課文短語","sent":"The Student Union looks forward to any advice you may have regarding the proposal.","note":"書信結尾常用；to 是介詞，後接名詞或動名詞（look forward to hearing），港生極易誤用原形。","ex":"Every weekend I look forward to corresponding with my pen pal."},{"phrase":"come in handy","zh":"派上用場；管用","type":"課文短語","sent":"This little regional slang dictionary could come in handy during our trip.","note":"口語常用，主語多為工具或知識；表示日後可能有用。","ex":"Ellipses come in handy when you want to communicate that you're lost for words."},{"phrase":"cut to the chase","zh":"直入正題；開門見山","type":"口語短語","sent":"I don't have time to beat around the bush so I'm just going to cut to the chase.","note":"口語慣用語，意為省去廢話直說重點；與 beat around the bush（兜圈子）為反義。","ex":"Some of you have started feeling restless, so I'll cut to the chase."},{"phrase":"drive sb around the bend","zh":"使某人抓狂；把某人逼瘋","type":"口語短語","sent":"Joyce's non-responsiveness was driving her tutor around the bend.","note":"非正式，表示令人極度惱火；亦可說 drive sb crazy / mad；bend 前用 the。","ex":"The slowness of the library's old computer was driving Caleb around the bend."},{"phrase":"enough is enough","zh":"夠了；不能再這樣下去","type":"口語短語","sent":"After two months of waiting for his delivery to arrive, Douglas decided that enough was enough and sent a long email of complaint.","note":"固定句式，表示忍無可忍、決定採取行動；過去語境用 enough was enough。","ex":"Although she had been patient with the telemarketers at first, Veera eventually decided that enough was enough and blocked the numbers."},{"phrase":"go haywire","zh":"失靈；出亂子","type":"口語短語","sent":"His laptop went haywire as soon as he opened the strange email.","note":"非正式，多形容機器或系統突然故障、失控；haywire 連寫一字。","ex":"Elle's phone went haywire in the middle of Kirk's livestream, so she couldn't catch the end of his speech."},{"phrase":"have an itch to do sth","zh":"很想做某事；按捺不住","type":"課文短語","sent":"Brianna had an itch to correct her brother and explain the miscommunication over text, but she knew that these kinds of things are more easily explained in person.","note":"表示一時衝動、渴望做某事；後接 to + 原形動詞。","ex":"Eli had an itch to interrupt the speaker but he held his tongue out of politeness."},{"phrase":"picture the scene","zh":"想像一下那個畫面","type":"寫作句式","sent":"Picture the scene: you, an experienced digital communicator, are in the middle of writing a social media post when your internet crashes mid-sentence.","note":"祈使句式，常置於段首引導讀者代入情境，演講及記敘文開頭實用；後常接冒號。","ex":"Picture the scene: a translator app insists that it knows more about punctuation than you, a professional linguist."},{"phrase":"play a part","zh":"起作用；參與其中","type":"課文短語","sent":"Although he's new to journalism, Kyle plays a big part in the running of the newspaper.","note":"可加 big / important / vital 強調程度；play a part in + 名詞／動名詞。","ex":"Freya played a part in preparing Tobias for his oral test by helping him perfect his pronunciation."},{"phrase":"to the point","zh":"簡潔切題的","type":"口語短語","sent":"It needs to be short and to the point, as I doubt anyone would care to read a long article in a programme.","note":"形容說話或文字扼要不囉嗦；常與 short and to the point 連用。","ex":"Keep the introduction short and to the point so that readers stay interested."},{"phrase":"You summed it up nicely.","zh":"你總結得很好。","type":"日常表達","sent":"You summed it up pretty nicely. Let me type it in.","note":"口語回應同伴意見的實用句；sum up 意為「概括、總結」，是實用片語動詞。","ex":"You summed it up nicely - that's exactly what the game is about."}]},{"key":"3B_U8","form":"F3","book":"3B","num":8,"theme":"The world and us","theme_zh":"世界與我們","words":[{"en":"ethical shopping","pos":"phr.","zh":"道德消費；良心購物","cat":"核心詞彙","src":"Text 1","sent":"In fact, I thought ethical shopping was something only fancy rich people could afford - not me!","exam":"單元主題詞，閱讀理解及選詞填空高頻；銜接高中社會議題寫作。","err":"ethical 拼寫 -th-，港生易誤拼 ethnical（種族的）；ethical shopping 指顧及道德與環境的消費方式。","coll":"ethical shopping; practise ethical shopping; ethical consumers","ex1":"Ethical shopping is the practice of adjusting your shopping habits so they don't harm people, wildlife or the environment.","ex2":"Ethical shopping doesn't have to be about buying only super expensive sustainable products."},{"en":"fast fashion","pos":"phr.","zh":"快速時裝","cat":"核心詞彙","src":"Text 1","sent":"It becomes pretty easy to resist the ever-changing trends of fast fashion, skincare and what have you.","exam":"Text 1 核心概念詞；閱讀理解常考其定義（短時間內設計、製造並售賣新衣）。","err":"fast fashion 是不可數概念名詞，不加 -s；港生易誤解為「快速的時尚潮流」而非行業模式。","coll":"fast fashion; the fast fashion industry; boycott fast fashion","ex1":"Fast fashion is a system in which retailers design, manufacture and sell new clothing lines within a short span.","ex2":"This environmentalist hopes to combat fast fashion by introducing sustainable brands."},{"en":"sweatshop","pos":"n.","zh":"血汗工廠","cat":"核心詞彙","src":"詞彙練習","sent":"Many big corporations and employers in developing countries are guilty of mistreating children by hiring them to work in factories and sweatshops at a very low cost.","exam":"勞工議題核心詞；閱讀理解及寫作常見，銜接高中全球化議題。","err":"複合詞連寫（sweatshop）；港生易望文生義只想到「出汗」，實指剝削勞工的工廠。","coll":"work in a sweatshop; a sweatshop worker; sweatshop labour","ex1":"Countries are pushing for regulations so that sweatshops can no longer exploit their workers.","ex2":"Although the sweatshop he works at makes warm clothes, Tyson cannot afford any himself."},{"en":"exploitation","pos":"n.","zh":"剝削","cat":"核心詞彙","src":"詞彙練習","sent":"Child labour is a form of exploitation that continues to plague our world today.","exam":"詞彙練習填空答案；詞形轉換考 exploit（v.）→ exploitation（n.）。","err":"拼寫 exploitation（-oita-）易錯；不可數名詞，指不公平地利用他人。","coll":"labour exploitation; the exploitation of; worker exploitation","ex1":"Child labour is a form of exploitation that continues to plague our world.","ex2":"The exploitation of poor labourers from developing countries is no doubt a serious issue."},{"en":"exploit","pos":"v.","zh":"剝削；利用","cat":"考試重點詞","src":"詞彙練習","sent":"Companies must be held accountable for the children they have exploited and for their supply chain.","exam":"詞彙練習填空答案；詞形轉換考 exploit（v.）→ exploited（adj.）→ exploitation（n.）。","err":"exploit 直接接受詞（exploit workers），港生易加介詞；名詞重音在前，動詞重音在後。","coll":"exploit workers; be exploited; exploit resources","ex1":"Countries are pushing for regulations so sweatshops can no longer exploit and mistreat their workers.","ex2":"Most retailers sell products made by exploited labourers working in poor conditions."},{"en":"unethical","pos":"adj.","zh":"不道德的","cat":"考試重點詞","src":"詞彙練習","sent":"It is important for governments around the world to establish regulations to prevent the unethical treatment of children.","exam":"詞彙練習及單元評估填空答案；un- 前綴反義詞屬詞形轉換考點（ethical → unethical）。","err":"port生易漏中間音節；反義詞為 ethical，注意 -th- 拼寫。","coll":"unethical treatment; unethical practices; unethical companies","ex1":"We don't want unethical companies to benefit from our purchases.","ex2":"Making unnecessary purchases is unethical as it leads to the overuse of natural resources."},{"en":"mistreat","pos":"v.","zh":"虐待；苛待","cat":"考試重點詞","src":"詞彙練習","sent":"Many big corporations and employers in developing countries are guilty of mistreating children.","exam":"詞彙練習及單元評估填空答案；mis- 前綴詞屬詞形轉換考點（treat → mistreat）。","err":"mistreat 直接接受詞；港生易與 maltreat 混用（兩者同義，但課本用 mistreat）。","coll":"mistreat workers; be mistreated; mistreatment of","ex1":"Sweatshops can no longer exploit and mistreat their workers under the new regulations.","ex2":"Employers are guilty of mistreating children by hiring them at very low cost."},{"en":"corporation","pos":"n.","zh":"大公司；企業","cat":"高頻基礎詞","src":"詞彙練習","sent":"Many big corporations and employers in developing countries are guilty of mistreating children.","exam":"詞彙練習填空答案；勞工及全球化議題高頻詞。","err":"拼寫雙 r（corporation）；port生易與 cooperation（合作）混淆。","coll":"a multinational corporation; big corporations; a large corporation","ex1":"Many big corporations are guilty of mistreating children in developing countries.","ex2":"The multinational corporation that runs the sweatshop received a letter of complaint."},{"en":"regulation","pos":"n.","zh":"規例；規管","cat":"高頻基礎詞","src":"詞彙練習","sent":"It is important for governments around the world to establish regulations to prevent the unethical treatment of children.","exam":"詞彙練習及單元評估填空答案；詞形轉換考 regulate（v.）→ regulation（n.）。","err":"多用複數 regulations；港生易與 regularly（定期地）混淆。","coll":"establish regulations; strict regulations; safety regulations","ex1":"Countries are pushing for regulations to improve working conditions.","ex2":"Governments should establish regulations to prevent the unethical treatment of children."},{"en":"workplace injuries","pos":"phr.","zh":"工傷","cat":"核心詞彙","src":"詞彙練習","sent":"This puts child labourers at risk of workplace injuries due to the nature of their working environment.","exam":"勞工議題主題詞；閱讀理解及寫作常見。","err":"injury 複數為 injuries（-y 變 -ies）；workplace 連寫一字。","coll":"workplace injuries; prevent injuries; suffer an injury","ex1":"Children are put at risk of workplace injuries due to their working environment.","ex2":"Let's talk about what we can do to prevent workplace injuries in the here and now."},{"en":"poor working conditions","pos":"phr.","zh":"惡劣的工作環境","cat":"核心詞彙","src":"詞彙練習","sent":"These children are often denied education and forced to work under poor working conditions to help their families make ends meet.","exam":"勞工議題核心搭配詞；閱讀理解及議論文寫作實用。","err":"conditions 用複數；port生易受中文影響漏 working 或用 bad 代 poor。","coll":"poor working conditions; work under poor conditions; improve working conditions","ex1":"Children are forced to work under poor working conditions to help their families.","ex2":"Most retailers sell products made by labourers who work long hours in poor working conditions."},{"en":"low wages","pos":"phr.","zh":"低工資","cat":"高頻基礎詞","src":"詞彙練習","sent":"Over thousands of children in poverty work disproportionately for long hours every day in exchange for low wages.","exam":"勞工議題高頻搭配詞；wage 與 salary 辨析屬閱讀考點。","err":"wage 多指按時／週計的工資，salary 指月薪；港生易混用。低工資用 low wages，非 small wages。","coll":"low wages; earn low wages; a living wage","ex1":"Children work long hours every day in exchange for low wages.","ex2":"When the boss refuses to pay a living wage, workers cannot pay for their basic needs."},{"en":"pollution","pos":"n.","zh":"污染","cat":"高頻基礎詞","src":"詞彙練習","sent":"The impact of plastic pollution on the food chain could soon force us to let the material go.","exam":"環境議題高頻詞；不可數名詞，選詞填空不加 -s。","err":"不可數名詞；詞形轉換 pollute（v.）→ pollution（n.）→ pollutant（n.）港生易混。","coll":"plastic pollution; air pollution; cause pollution","ex1":"The impact of plastic pollution on the food chain is a serious threat.","ex2":"CBP is an alluring alternative that avoids deforestation and pollution."},{"en":"pollutant","pos":"n.","zh":"污染物","cat":"考試重點詞","src":"詞彙練習","sent":"An alarming number of micro-plastic pollutants end up in the ocean.","exam":"詞彙練習填空答案；可數名詞（pollutants），與不可數的 pollution 辨析常考。","err":"pollutant 是可數名詞、指污染「物」，pollution 是不可數、指污染「現象」；港生極易混淆。","coll":"harmful pollutants; micro-plastic pollutants; release pollutants","ex1":"An alarming number of micro-plastic pollutants end up in the ocean each day.","ex2":"Factories should reduce the pollutants they release into rivers."},{"en":"synthetic","pos":"adj.","zh":"合成的；人造的","cat":"考試重點詞","src":"詞彙練習","sent":"About 3.2 billion pieces of micro-plastics - most commonly from synthetic fabrics, plastic packaging and bottles - travel into the ocean each day.","exam":"詞彙練習填空答案；閱讀理解常考 synthetic = man-made / artificial，反義 natural。","err":"拼寫 synthetic（-th-）易錯；港生易與 sympathetic（有同情心的）混淆。","coll":"synthetic fabrics; synthetic materials; synthetic fibres","ex1":"Micro-plastics most commonly come from synthetic fabrics and plastic packaging.","ex2":"Many cheap clothes are made from synthetic materials that do not biodegrade."},{"en":"biodegradable","pos":"adj.","zh":"可生物降解的","cat":"核心詞彙","src":"詞彙練習","sent":"Until and unless a biodegradable and eco-friendly alternative to plastic is found, the long-term wellbeing of the planet will depend on a drastic change in our consumption habits.","exam":"可持續發展核心詞；bio- 前綴詞屬詞形轉換考點，銜接高中環境議題。","err":"拼寫較長（bio-de-grad-able），港生易漏字母；反義為 non-biodegradable。","coll":"biodegradable materials; a biodegradable alternative; biodegradable packaging","ex1":"Until a biodegradable alternative to plastic is found, we must change our habits.","ex2":"Your experience developing biodegradable alternatives to plastic will no doubt come in handy."},{"en":"consumption","pos":"n.","zh":"消耗；消費","cat":"核心詞彙","src":"詞彙練習","sent":"The long-term wellbeing of the city - and the planet - will depend on a drastic change in our consumption habits.","exam":"詞彙練習及單元評估填空答案；詞形轉換考 consume（v.）→ consumption（n.）→ consumer（n.）。","err":"不可數名詞；港生易與 consumerism（消費主義）混淆；動詞 consume 拼寫留意。","coll":"consumption habits; reduce consumption; meat consumption","ex1":"The planet's wellbeing depends on a drastic change in our consumption habits.","ex2":"The pace of production is fast, so consumption too has to be fast."},{"en":"disposal","pos":"n.","zh":"棄置；處置","cat":"考試重點詞","src":"詞彙練習","sent":"Already, the improper disposal of plastic waste is emerging as a serious threat to public health.","exam":"詞彙練習填空答案；詞形轉換考 dispose（v.）→ disposal（n.）。","err":"動詞 dispose of sth（丟棄）須加 of；名詞 disposal 拼寫 -sal 結尾。","coll":"waste disposal; improper disposal; the disposal of","ex1":"The improper disposal of plastic waste is a serious threat to public health.","ex2":"Proper disposal of electronic waste prevents harmful chemicals from leaking."},{"en":"recycled","pos":"adj.","zh":"回收再造的","cat":"高頻基礎詞","src":"詞彙練習","sent":"The burning of plastic that can't be recycled has been identified as a cause of breathing problems and heart disease worldwide.","exam":"環境議題高頻詞；詞形轉換考 recycle（v.）→ recycled（adj.）→ recycling（n.）。","err":"被動 be recycled；港生易漏字母或混淆 recycle / reuse / reduce（3Rs）。","coll":"recycled materials; can be recycled; recycled paper","ex1":"The burning of plastic that can't be recycled causes health problems.","ex2":"Paper is easy to recycle but paper cups are another story."},{"en":"landfill","pos":"n.","zh":"堆填區；垃圾填埋場","cat":"核心詞彙","src":"詞彙練習","sent":"Plastic that goes into landfills is known to break down into micro-plastics and become a contaminant in our food and water.","exam":"詞彙練習填空答案；可持續發展核心詞，閱讀及寫作常見。","err":"複合詞連寫（landfill）；port生易分開寫或誤拼 landfil。","coll":"go into landfills; end up in a landfill; landfill waste","ex1":"Plastic that goes into landfills breaks down into micro-plastics.","ex2":"Empty bottles that don't make it to the landfill often end up in the ocean."},{"en":"contaminant","pos":"n.","zh":"污染物；雜質","cat":"考試重點詞","src":"詞彙練習","sent":"Plastic that goes into landfills is known to break down into micro-plastics and become a contaminant in our food and water.","exam":"詞彙練習填空答案；詞形轉換考 contaminate（v.）→ contaminant（n.）→ contamination（n.）。","err":"拼寫較長（con-tam-in-ant），港生易錯；與 pollutant 近義但更強調滲入食物、水源的雜質。","coll":"a contaminant in; harmful contaminants; water contaminant","ex1":"Micro-plastics can become a contaminant in our food and water.","ex2":"Scientists found harmful contaminants in the river near the factory."},{"en":"inconvenient truth","pos":"phr.","zh":"難以面對的真相","cat":"核心詞彙","src":"詞彙練習","sent":"City University's discovery is one of many recent reports that express the same inconvenient truth.","exam":"詞彙練習填空答案；閱讀理解修辭用詞，指令人不願接受卻真實的事情。","err":"inconvenient 拼寫 -ven- 易錯；此為固定搭配，指「不願面對但屬實的事」。","coll":"an inconvenient truth; face an inconvenient truth; reveal the truth","ex1":"Recent reports express the same inconvenient truth about plastic pollution.","ex2":"An inconvenient truth is that we simply have to reduce our consumption."},{"en":"mindlessly","pos":"adv.","zh":"不經思考地；盲目地","cat":"考試重點詞","src":"詞彙練習","sent":"We will not be able to mindlessly wrap and store everything in plastic much longer.","exam":"詞彙練習填空答案；-less + -ly 詞族屬詞形轉換考點（mind → mindless → mindlessly）。","err":"mindlessly 指「毫不思索地」，非「沒有頭腦」；與名詞 mindless purchases 搭配常見。","coll":"mindlessly wrap; mindless purchases; mindlessly scroll","ex1":"We will not be able to mindlessly wrap everything in plastic much longer.","ex2":"Habitual shoppers are driven to make mindless purchases and over-consume."},{"en":"habitual shopper","pos":"phr.","zh":"習慣性購物者","cat":"日常實用","src":"詞彙練習","sent":"I used to be a habitual shopper. Three years ago I would buy things on a whim just because they were on sale.","exam":"詞彙練習填空答案；消費議題主題詞。","err":"habitual 拼寫 -tual 結尾；港生易與 habit（習慣）詞性混淆，此處為形容詞。","coll":"a habitual shopper; a habitual liar; a habitual behaviour","ex1":"I used to be a habitual shopper who bought things on a whim.","ex2":"With fashion trends coming and going, habitual shoppers are driven to over-consume."},{"en":"trend","pos":"n.","zh":"潮流；趨勢","cat":"高頻基礎詞","src":"詞彙練習","sent":"Three years ago I would buy things on a whim just because they were on sale or part of a new trend.","exam":"高頻基礎詞；詞形轉換考 trend（n.）→ trendy（adj.）；圖表作文描述趨勢常用。","err":"trend 後接 of / towards；形容詞 trendy 指「時髦的」，港生易混詞性。","coll":"a new trend; follow a trend; the latest trend","ex1":"I used to buy things just because they were part of a new trend.","ex2":"Green trends come and go but the problems our planet faces remain ever-present."},{"en":"acquire","pos":"v.","zh":"獲得；購置","cat":"考試重點詞","src":"詞彙練習","sent":"I wouldn't think twice about acquiring things that I didn't strictly need, even if they might be bad for the environment.","exam":"詞彙練習填空答案；閱讀理解常考 acquire = obtain / get，屬DSE高頻詞。","err":"拼寫 acquire（-cq-）易錯，港生常漏 c；名詞是 acquisition。","coll":"acquire things; acquire knowledge; acquire a skill","ex1":"I wouldn't think twice about acquiring things I didn't strictly need.","ex2":"Student leaders can acquire the tools they need to work with each other."},{"en":"retailer","pos":"n.","zh":"零售商","cat":"高頻基礎詞","src":"詞彙練習","sent":"Reducing unnecessary purchases also helps you save enough money to support the 'expensive' ethical retailers.","exam":"詞彙練習填空答案；詞形轉換考 retail（n./v.）→ retailer（n.）。","err":"retailer 拼寫 -ai-；port生易與 retail（零售業）詞性混淆。","coll":"ethical retailers; online retailers; a major retailer","ex1":"Reducing purchases helps you support ethical retailers.","ex2":"Fast fashion is a system in which retailers design and sell new clothing lines quickly."},{"en":"consumer","pos":"n.","zh":"消費者","cat":"高頻基礎詞","src":"詞彙練習","sent":"It can be about consumers reducing the number of things they buy and sticking to the bare necessities.","exam":"詞彙練習及單元評估填空答案；詞形轉換考 consume → consumer → consumption。","err":"consumer（消費者，人）與 consumption（消費，行為）易混；港生答詞形轉換時須看語意。","coll":"ethical consumers; consumer habits; a savvy consumer","ex1":"Ethical shopping is about consumers reducing the number of things they buy.","ex2":"Ethical shopping is a good way for consumers to make a positive impact."},{"en":"cheaply","pos":"adv.","zh":"便宜地；廉價地","cat":"高頻基礎詞","src":"詞彙練習","sent":"What changed my mind about green buying was the realisation that it can be done cheaply.","exam":"詞彙練習填空答案；詞形轉換考 cheap（adj.）→ cheaply（adv.）。","err":"cheap 去 -p 直接加 -ly（cheaply）；副詞修飾動詞（done cheaply）。","coll":"done cheaply; buy cheaply; cheaply made","ex1":"Ethical shopping can be done cheaply, not only by buying expensive products.","ex2":"Cheaply made garments are not made to last."},{"en":"cellular agriculture","pos":"phr.","zh":"細胞農業","cat":"核心詞彙","src":"Text 2","sent":"Julia Au touts the potential of cellular agriculture - the production of milk, eggs and particularly meat in laboratories using stem cells.","exam":"Text 2 核心科技詞；閱讀理解主旨題關鍵詞，銜接高中科技議題。","err":"cellular 拼寫 -llu-；此為專業概念詞，閱讀時須靠上下文理解其定義。","coll":"cellular agriculture; large-scale cellular agriculture; the potential of","ex1":"Cellular agriculture is the production of meat in laboratories using stem cells.","ex2":"Julia Au touts the potential of cellular agriculture to mitigate environmental damage."},{"en":"mitigate","pos":"v.","zh":"緩解；減輕","cat":"考試重點詞","src":"Text 2","sent":"Julia Au touts the potential of cellular agriculture to mitigate the damage caused by intensive industrial agriculture.","exam":"Text 2 閱讀理解關鍵動詞；閱讀常考 mitigate = reduce / lessen，屬DSE高階詞。","err":"拼寫 mitigate（-tig-）易錯；直接接受詞（mitigate the damage），無需加介詞。","coll":"mitigate the damage; mitigate the crisis; mitigate the effects","ex1":"Cellular agriculture could mitigate the damage caused by industrial agriculture.","ex2":"We should focus on tools we can use to mitigate the climate crisis in the here and now."},{"en":"advocate","pos":"v.","zh":"提倡；主張","cat":"考試重點詞","src":"Text 2","sent":"The fashion designer advocates ethical manufacturing practices in the fashion industry.","exam":"單元評估填空答案；詞形轉換考 advocate（v./n.）；閱讀理解常考作者立場。","err":"advocate 直接接受詞或 advocate for；作動詞讀 /ˈædvəkeɪt/，作名詞讀 /ˈædvəkət/。","coll":"advocate a change; advocate for; a strong advocate","ex1":"Au advocates a fundamental dietary shift from animal-based to cell-based protein.","ex2":"The fashion designer advocates ethical manufacturing practices."},{"en":"idealistic","pos":"adj.","zh":"理想化的；不切實際的","cat":"考試重點詞","src":"Text 2","sent":"It is too idealistic to expect this 50-storey building to be built in only three months.","exam":"單元評估填空答案；詞形轉換考 ideal（n./adj.）→ idealistic（adj.）→ idealism（n.）。","err":"idealistic 帶「不切實際」的貶義；港生易與 ideal（理想的、完美的）褒義混淆。","coll":"too idealistic; idealistic promises; an idealistic vision","ex1":"It is too idealistic to expect the building to be finished in three months.","ex2":"These idealistic pie-in-the-sky promises are not to be trusted."},{"en":"affluent","pos":"adj.","zh":"富裕的；富有的","cat":"考試重點詞","src":"Text 2","sent":"People living in this district are generally known to be affluent, so there are lots of fancy cars in this area.","exam":"單元評估填空答案；閱讀理解常考 affluent = wealthy / rich，屬DSE高階詞。","err":"拼寫 affluent（雙 f）易錯；港生易與 influent / fluent 混淆。","coll":"affluent consumers; an affluent district; affluent families","ex1":"The scant CBP meat is marketed as a pricey product for affluent ethical consumers.","ex2":"People living in this affluent district own lots of fancy cars."},{"en":"abundant","pos":"adj.","zh":"豐富的；大量的","cat":"考試重點詞","src":"Text 2","sent":"Thanks to our grandpa's generosity, we were given an abundant supply of snacks and goodies to enjoy on our family trip.","exam":"單元評估填空答案；詞形轉換考 abundant（adj.）→ abundance（n.）。","err":"abundant 拼寫 -und-；反義為 scarce / scant；港生易讀錯重音。","coll":"an abundant supply; abundant resources; in abundance","ex1":"We were given an abundant supply of snacks for the trip.","ex2":"Decades from now, I hope to be gorging myself on an abundant bounty of lab-grown steak."},{"en":"limited","pos":"adj.","zh":"有限的","cat":"高頻基礎詞","src":"Text 2","sent":"There's a limited quantity of collector's items available, so consumers have lined up outside the shop.","exam":"單元評估填空答案；詞形轉換考 limit（n./v.）→ limited（adj.）→ limitation（n.）。","err":"limited 指「數量有限」；反義為 unlimited / abundant；港生易混 limited / limiting。","coll":"a limited quantity; limited in number; a limited supply","ex1":"Current CBP output is limited in variety as well as volume.","ex2":"There's a limited quantity of collector's items available."},{"en":"alluring","pos":"adj.","zh":"誘人的；吸引人的","cat":"考試重點詞","src":"Text 2","sent":"CBP is no doubt an alluring, greener alternative to ABP that also avoids animal abuse.","exam":"Text 2 閱讀理解形容詞；閱讀常考 alluring = attractive / tempting。","err":"拼寫 alluring（雙 l）易錯；動詞是 allure，名詞亦作 allure（吸引力）。","coll":"an alluring alternative; an alluring offer; alluring promises","ex1":"CBP is no doubt an alluring, greener alternative to animal-based protein.","ex2":"The low prices of fast fashion are alluring to habitual shoppers."},{"en":"aversion","pos":"n.","zh":"厭惡；反感","cat":"考試重點詞","src":"Text 2","sent":"Consumers may be even less prepared for a CBP future than the technology is, given their apparent aversion to preservatives, GMOs and anything that involves unnatural modifications.","exam":"Text 2 閱讀理解答案詞（消費者抗拒的原因）；aversion to 搭配常考。","err":"aversion 後接 to（aversion to sth），港生易漏或誤用 of；拼寫 -sion 結尾。","coll":"an aversion to; a strong aversion; show aversion","ex1":"Consumers show an apparent aversion to anything that involves unnatural modifications.","ex2":"Her aversion to plastic packaging led her to shop at a zero-waste store."},{"en":"greenwashing","pos":"n.","zh":"漂綠（假環保宣傳）","cat":"核心詞彙","src":"單元評估","sent":"Greenwashing occurs when businesses claim to be environmentally friendly, often through superficial gestures or marketing tactics, without implementing meaningful sustainable practices.","exam":"單元評估閱讀主題詞；True/False/NG 題常考其定義，銜接高中媒體素養。","err":"複合詞連寫（greenwashing）；港生易誤解為「用綠色清潔」，實指企業假環保。","coll":"avoid greenwashing; greenwashing tactics; guilty of greenwashing","ex1":"Greenwashing occurs when businesses claim to be eco-friendly without real action.","ex2":"Conscious travelers should look for green certifications in order to avoid greenwashing."},{"en":"emissions","pos":"n.","zh":"排放（物）","cat":"考試重點詞","src":"單元評估","sent":"Aviation emissions account for approximately 2.5% of global CO2 emissions.","exam":"單元評估閱讀理解關鍵詞；詞形轉換考 emit（v.）→ emission（n.）。","err":"多用複數 emissions；拼寫雙 s；港生易漏字母或與 omission（遺漏）混淆。","coll":"carbon emissions; reduce emissions; CO2 emissions","ex1":"Aviation emissions account for about 2.5% of global CO2 emissions.","ex2":"The government continues to implement policies to reduce carbon emissions."},{"en":"carbon footprint","pos":"phr.","zh":"碳足跡","cat":"核心詞彙","src":"單元評估","sent":"Many conscious travelers still find it tough to reduce their carbon footprint during travel.","exam":"環境議題核心詞；閱讀理解及寫作常見，銜接高中可持續發展題。","err":"footprint 連寫一字；固定搭配 reduce / lower one's carbon footprint。","coll":"reduce your carbon footprint; a low carbon footprint; a large carbon footprint","ex1":"Conscious travelers find it tough to reduce their carbon footprint during travel.","ex2":"Following a green diet is about making do with food that has a lower carbon footprint."},{"en":"transparency","pos":"n.","zh":"透明度；公開性","cat":"考試重點詞","src":"單元評估","sent":"Initiatives such as stricter enforcement of regulations, increased transparency and sustainable transportation alternatives are steps towards a more eco-conscious future.","exam":"單元評估閱讀理解答案詞；詞形轉換考 transparent（adj.）→ transparency（n.）。","err":"拼寫 transparency（-rency）易錯；此處指企業運作公開透明，非物理上的「透明」。","coll":"increased transparency; greater transparency; a lack of transparency","ex1":"Increased transparency is a step towards a more eco-conscious future.","ex2":"Consumers demand greater transparency about how their clothes are made."},{"en":"overtourism","pos":"n.","zh":"過度旅遊","cat":"核心詞彙","src":"單元評估","sent":"However, striking a balance between authentic cultural experiences and overtourism can be challenging.","exam":"單元評估閱讀主題詞；over- 前綴詞屬詞形轉換考點，銜接高中旅遊議題。","err":"over + tourism 連寫；港生易分開寫；指旅客過多對當地造成的負面影響。","coll":"overtourism; the problem of overtourism; combat overtourism","ex1":"Striking a balance between authentic experiences and overtourism can be challenging.","ex2":"Excessive tourism, or overtourism, can lead to social and cultural degradation."},{"en":"accommodation","pos":"n.","zh":"住宿","cat":"日常實用","src":"單元評估","sent":"Access to eco-friendly accommodation options is another obstacle faced by conscious travelers.","exam":"單元評估閱讀及填空詞；不可數名詞，旅遊主題聽力常見。","err":"拼寫雙 c 雙 m（accommodation），港生極常拼錯；英式為不可數名詞，一般不加 -s。","coll":"eco-friendly accommodation; find accommodation; sustainable accommodation","ex1":"Access to eco-friendly accommodation is another obstacle for conscious travelers.","ex2":"Sustainable hotels and lodges are on the rise but limited in number."},{"en":"fair trade","pos":"phr.","zh":"公平貿易","cat":"核心詞彙","src":"聽力對話","sent":"Fair trade is an arrangement that allows producers to get better pay.","exam":"綜合技能聽力主題詞；閱讀及聽力常見，銜接高中全球化議題。","err":"fair 拼寫（非 fare）；固定搭配 fair trade products / labels。","coll":"fair trade products; a fair trade label; support fair trade","ex1":"Fair trade is an arrangement that allows producers to get better pay.","ex2":"Some of the most common fair trade products are coffee, chocolate and cotton."},{"en":"poverty","pos":"n.","zh":"貧窮","cat":"口語常用","src":"聽力對話","sent":"Studies have found that fair trade helps reduce poverty especially in developing countries.","exam":"聽力填空相關詞；詞形轉換考 poor（adj.）→ poverty（n.）；社會議題高頻詞。","err":"拼寫 poverty（-ver-）易錯；不可數名詞；固定搭配 reduce / tackle poverty。","coll":"reduce poverty; live in poverty; tackle poverty","ex1":"Fair trade helps reduce poverty especially in developing countries.","ex2":"Over thousands of children in poverty work long hours for low wages."},{"en":"trade union","pos":"phr.","zh":"工會","cat":"口語常用","src":"聽力對話","sent":"This is achieved with the help of trade unions and many other people and organizations.","exam":"綜合技能聽力答案詞；勞工權益主題詞。","err":"trade union 兩字，複數 trade unions；港生易漏 trade 或誤拼 union。","coll":"trade unions; join a trade union; a labour union","ex1":"Working adults are protected under fair trade with the help of trade unions.","ex2":"Trade unions are important in safeguarding workers' rights."},{"en":"child labour","pos":"phr.","zh":"童工","cat":"口語常用","src":"聽力對話","sent":"Fair trade also tries to tackle the issue of child labour. This is done by monitoring suppliers.","exam":"聽力填空原答案；勞工議題核心詞，銜接高中社會議題寫作。","err":"labour 英式拼法（美式 labor）；child labour 是不可數概念，不加 -s。","coll":"tackle child labour; combat child labour; the issue of child labour","ex1":"Fair trade tries to tackle the issue of child labour by monitoring suppliers.","ex2":"Child labour is a form of exploitation that continues to plague our world."},{"en":"basic needs","pos":"phr.","zh":"基本需要","cat":"口語常用","src":"聽力對話","sent":"Earning a living wage is important in that it allows workers to meet their basic needs.","exam":"綜合技能聽力答案詞；社會議題實用搭配（food, housing and clothing）。","err":"needs 用複數；固定搭配 meet / pay for one's basic needs。","coll":"meet basic needs; pay for basic needs; basic necessities","ex1":"A living wage allows workers to meet their basic needs.","ex2":"Basic needs generally include food, housing and clothing."}],"phrases":[{"phrase":"a new lease of life","zh":"新生；重獲生機","type":"課文短語","sent":"Upcycling old or worn out clothes can give them a new lease of life.","note":"常與 give sth 搭配（give sth a new lease of life）；英式亦作 a new lease on life（美式）。","ex":"My dusty old computer got a new lease of life after being upgraded at the repair shop."},{"phrase":"be another story","zh":"是另一回事","type":"口語短語","sent":"Paper is easy to recycle but paper cups are another story.","note":"口語慣用語，表示情況不同、另當別論；常用於對比兩件事之後。","ex":"Harold is very particular about recycling but his brother is another story."},{"phrase":"come and go","zh":"來去匆匆；時有時無","type":"課文短語","sent":"Green trends come and go but the problems our planet faces remain ever-present.","note":"描述潮流、事物短暫易變；常與 remain / stay 作對比，突出恆常不變者。","ex":"As fashion trends come and go so often, it can be difficult to create environmentally friendly clothes that people want to wear for years."},{"phrase":"make it to some place","zh":"成功到達某地","type":"課文短語","sent":"Empty bottles that don't make it to the landfill often end up in the ocean.","note":"口語常用，表示成功抵達或及時趕到；亦可指出席活動（make it to the party）。","ex":"Jimmy didn't make it to work on time today because his local train service was suspended due to a strike."},{"phrase":"out of fashion","zh":"過時的；不再流行","type":"日常表達","sent":"It is not sustainable to throw away wearable clothes just because they're out of fashion.","note":"與 go out of fashion 搭配；反義為 in fashion / in style。","ex":"Gregory felt guilty because he'd thrown his jumper away just because it had gone out of fashion."},{"phrase":"in any case","zh":"無論如何；反正","type":"寫作句式","sent":"In any case, Harmony learnt a lot from collaborating with the NGO.","note":"連接語，相當於 anyhow / anyway；用於總結或轉換話題，議論文實用。","ex":"In any case, we have a lot to learn when it comes to recycling."},{"phrase":"in its infancy","zh":"處於初始階段；尚未成熟","type":"寫作句式","sent":"This technology is still in its infancy but, if successfully developed, it could provide a genuinely sustainable source of energy.","note":"比喻某事物剛起步、尚未成熟；主語為技術、行業等，須配對應的所有格（in its / their infancy）。","ex":"Vertical farming is still in its infancy and will require more research before it is commercially viable."},{"phrase":"make do","zh":"將就；勉強應付","type":"課文短語","sent":"Following a green diet is about making do with food products that have a lower carbon footprint.","note":"固定搭配 make do with sth（用現有的將就）；port生易誤寫成 make do of。","ex":"In the meantime, we simply have to make do with less meat."},{"phrase":"no doubt","zh":"無疑；毫無疑問","type":"寫作句式","sent":"The exploitation of poor labourers from developing countries is no doubt a serious issue.","note":"作插入語加強語氣；比 without doubt 隨意，議論文表達確信時常用。","ex":"Your experience developing biodegradable alternatives to plastic will no doubt come in handy when you join our company."},{"phrase":"over the horizon","zh":"即將到來；在不遠處","type":"課文短語","sent":"For years, the Smith siblings have worked long hours in this factory for little reward, all the while believing prosperity to be just over the horizon.","note":"比喻某事看似臨近卻遲遲未至；常與 just 連用強調「近在眼前」。","ex":"DeAndre is an optimist who believes that a green future is just over the horizon."},{"phrase":"pie in the sky","zh":"空中樓閣；不切實際的空想","type":"口語短語","sent":"The idea that the public would happily accept higher prices if companies guaranteed a fair living wage is pie in the sky.","note":"貶義慣用語，指美好卻無法實現的想法；可作定語（pie-in-the-sky promises）。","ex":"The student's plan to replace petrol cars with electricity-generating bikes overnight was pie in the sky."},{"phrase":"the here and now","zh":"當下；此時此地","type":"寫作句式","sent":"Moving on from the subject of future workplace innovations, let's talk about what we can do in the here and now.","note":"名詞短語，強調眼前、當前；與遙遠的未來作對比，議論文轉折段實用。","ex":"Instead of imagining new technologies that could mitigate the climate crisis, we should focus on tools we can use in the here and now."},{"phrase":"in the meantime","zh":"與此同時；在這期間","type":"寫作句式","sent":"For now, you can send a letter of complaint to the multinational company that runs the sweatshop.","note":"連接語，表示在等待某事期間；常與未來計劃對比，敘述及議論文皆常用。","ex":"We have agreed to boycott all plastic products in the meantime."},{"phrase":"nothing more than","zh":"只不過是；僅僅","type":"寫作句式","sent":"Even after ten years of experience making clothes in a sweatshop, Claudia was dismissed as nothing more than an amateur.","note":"強調「僅此而已」，帶輕視或貶低意味；後接名詞。","ex":"The powerful company looked down on sweatshop workers as nothing more than cheap labour."},{"phrase":"thanks to","zh":"多虧；由於","type":"寫作句式","sent":"Thanks to Pamela's efforts, Mr Ng was able to get compensation after his workplace injury.","note":"後接名詞或動名詞，表示原因，多用於正面結果（亦可反諷）；port生易誤加 the。","ex":"Erica didn't have to work ridiculously long hours anymore thanks to the new workers' safety laws introduced by the union."},{"phrase":"make ends meet","zh":"維持生計；收支相抵","type":"日常表達","sent":"These children are often denied education and forced to work under poor working conditions to help their families make ends meet.","note":"固定慣用語，指勉強維持生活開支；ends 用複數，港生易漏 s。","ex":"Many low-wage workers struggle to make ends meet despite working long hours."},{"phrase":"hit the books","zh":"用功讀書；埋頭苦讀","type":"口語短語","sent":"Let's not waste too much time talking. It's time to hit the books!","note":"非正式口語，意為認真溫習；books 用複數，屬固定搭配。","ex":"The exam is next week, so I'd better stop procrastinating and hit the books."}]}]};

function toSimp(s){ let out=''; for(const ch of s) out += (T2S[ch]||ch); return out; }
const CMN_CHARS = [['嘅','的'],['喺','在'],['唔','不'],['嚟','來'],['咗','了'],['啲','些'],['嗰','那'],['俾','給'],['睇','看'],['揀','選'],['搵','找'],['冇','沒有'],['佢','它'],['咩','什麼'],['呢個','這個'],['呢度','這裡'],['而家','現在'],['聽日','明天'],['今日','今天'],['係','是'],['咁','這樣']];
function trText(s){
  if(store.lang!=='cmn' || !s) return s;
  let t = s;
  for(const [a,b] of CMN_PHRASES){ if(t.includes(a)) t = t.split(a).join(b); }
  for(const [a,b] of CMN_CHARS){ if(t.includes(a)) t = t.split(a).join(b); }
  t = toSimp(t);   // 普通話模式 = 簡體字
  return t;
}
function applyLangTree(root){
  if(store.lang!=='cmn' || !root) return;
  const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
  let n; while(n=walker.nextNode()){ const v=trText(n.nodeValue); if(v!==n.nodeValue) n.nodeValue=v; }
  (root.querySelectorAll? root.querySelectorAll('input[placeholder]') : []).forEach?.(el=>{
    const v=trText(el.placeholder); if(v!==el.placeholder) el.placeholder=v; });
}
new MutationObserver(muts=>{
  if(store.lang!=='cmn') return;
  muts.forEach(m=>m.addedNodes.forEach(node=>{
    if(node.nodeType===3){ const v=trText(node.nodeValue); if(v!==node.nodeValue) node.nodeValue=v; }
    else if(node.nodeType===1) applyLangTree(node);
  }));
}).observe(document.documentElement, {childList:true, subtree:true});

function loadUser(name){
  const u = dbLoad().users[name]; if(!u) return false;
  store.user=name; store.nick=u.nick||name; store.form=u.form||null; store.unitKey=u.unitKey||null;
  store.prog=u.prog||{}; store.gems=u.gems||0; store.streak=u.streak||1; store.sound=u.sound!==false;
  store.minutes=u.minutes||{}; store.history=u.history||[]; store.hats=u.hats||['teal']; store.hat=u.hat||'teal';
  store.lastDay=u.lastDay||''; store.freePlay=u.freePlay||''; store.lang=u.lang||storage.getItem('bobo_lang')||'yue';
  // 連續日數:昨天有學 → streak+1;斷開 → 重置(登入時判定)
  const t=today();
  if(store.lastDay && store.lastDay!==t){
    const diff=(new Date(t)-new Date(store.lastDay))/86400000;
    if(diff>1.5) store.streak=1;
  }
  return true;
}
function addMinutes(mins){
  const t=today();
  if(store.lastDay!==t){ if(store.lastDay){ const diff=(new Date(t)-new Date(store.lastDay))/86400000; store.streak = diff<=1.5? store.streak+1 : 1; } store.lastDay=t; }
  store.minutes[t]=Math.round(((store.minutes[t]||0)+mins)*10)/10;
}

function deviceLabel(){

  if(/iPad|Tablet|SM-T/i.test(ua) || (Math.min(screen.width,screen.height)>=600 && /Android|iPad/i.test(ua))) return '平板';

function getLicense(name){ const u=dbLoad().users[name]; return u? u.license||null : null; }
function licDaysLeft(lic){ if(!lic||!lic.exp) return Infinity; return Math.ceil((new Date(lic.exp)-Date.now())/86400000); }
function licExpired(lic){ return lic && lic.exp && Date.now() > new Date(lic.exp).getTime(); }
function unitInScope(u){
  const lic = getLicense(store.user); if(!lic) return true;
  if(lic.units && lic.units.length) return lic.units.includes(u.key);
  if(lic.stages && lic.stages.length) return lic.stages.includes(u.form);

function stageInScope(sid){
  const lic = getLicense(store.user); if(!lic) return true;
  if(lic.units && lic.units.length) return DATA.units.some(u=>u.form===sid && lic.units.includes(u.key));
  if(lic.stages && lic.stages.length) return lic.stages.includes(sid);
  return true;
}
function enforceLicense(){ // 每次進入主要頁面時檢查;到期/鎖定 → 鎖定畫面

  const lic = getLicense(store.user); if(!lic) return true;

  if(licExpired(lic)){ renderLocked('授權已到期'); return false; }

function genderAdj(v){ // 同等條件下:女聲優先 → 未知 → 男聲

function rankVoices(){
  let vs=[]; try{ vs = speechSynthesis.getVoices(); }catch(e){ return; }
  if(!vs.length) return;
  const en = v=>/^en/i.test(v.lang);
  const online = v=>/online|natural/i.test(v.name);   // Edge Online (Natural) 語音需連線,本機檔案下常 synthesis-failed
  const tier = v =>
    (v.localService && /en[-_]GB/i.test(v.lang) ? 0 :
     v.localService && en(v) ? 1 :
     en(v) && !online(v) ? 2 :
     /en[-_]GB/i.test(v.lang) ? 3 :
     en(v) ? 4 : 5);
  const score = v => (NOVELTY.test(v.name)?1000:0) + tier(v)*10 + genderAdj(v);
  __voiceList = vs.slice().sort((a,b)=>score(a)-score(b));
  // 上次成功嘅語音優先
  const saved = storage.getItem('bobo_voice');
  if(saved && saved!=='__default__'){ const i = __voiceList.findIndex(v=>v.name===saved);
    if(i>0){ const [v]=__voiceList.splice(i,1); __voiceList.unshift(v); } }

}

  if(!store.sound && !onstat) return;
  if(!('speechSynthesis' in window)){ if(onstat) onstat('❌ 此瀏覽器不支援語音合成'); return; }
  try{
    if(!__voicesReady) pickVoice();
    const go = ()=>{
      try{
        const u = new SpeechSynthesisUtterance(t);
        u.lang='en-GB'; u.rate=0.92; u.volume=1;
        const useDefault = storage.getItem('bobo_voice')==='__default__' && attempt===0;
        const v = useDefault? null : __voiceList[__voiceIdx];
        if(v){ u.voice=v; u.lang=v.lang||'en-GB'; }
        u.onstart = ()=>{ __ttsLog='ok'; __voice=v||null;
          if(v && storage.getItem('bobo_voice')!=='__default__'){ try{ storage.setItem('bobo_voice', v.name); }catch(e){} }
          if(onstat) onstat('✅ 發音正常!使用語音:'+((v&&v.name)||'系統預設(原版)')); };
        u.onerror = (ev)=>{ __ttsLog='err:'+ev.error;
          if(ev.error==='synthesis-failed' || ev.error==='synthesis-unavailable' || ev.error==='network'){
            if(attempt<6 && __voiceIdx<__voiceList.length-1){
              __voiceIdx++;                     // 自動換下一把語音重試
              if(onstat) onstat('🔄 該語音失敗,自動換緊第 '+(attempt+2)+' 把…');
              setTimeout(()=>speak(t, onstat, attempt+1), 120);
              return;
            }
          }
          if(onstat) onstat('❌ 語音引擎報錯:'+ev.error); };
        __uttRef = u;
        speechSynthesis.resume();
        speechSynthesis.speak(u);
        setTimeout(()=>{ try{ speechSynthesis.resume(); }catch(e){} }, 60);
      }catch(e){ if(onstat) onstat('❌ 呼叫失敗:'+e.message); }
    };
    if(speechSynthesis.speaking || speechSynthesis.pending){ speechSynthesis.cancel(); setTimeout(go, 100); }
    else go();
  }catch(e){ if(onstat) onstat('❌ '+e.message); }
}

/* ---------- 進度模型 ---------- */
function unitList(){ return DATA.units.filter(u=>u.form===store.form); }
function curUnit(){ return DATA.units.find(u=>u.key===store.unitKey); }
function wid(u,w){ return u.key+'|'+w.en; }
function pget(id){ if(!store.prog[id]) store.prog[id]={m:0,u:0,r:0,seen:false}; return store.prog[id]; }
function tierPassed(u,w,t){ const p=pget(wid(u,w)); return t===1? p.m>=NEED[1] : t===2? p.u>=NEED[2] : p.r>=NEED[3]; }
function wordStars(u,w){ return (tierPassed(u,w,1)?1:0)+(tierPassed(u,w,2)?1:0)+(tierPassed(u,w,3)?1:0); }

function groups(u){
  const g=[]; const ws=u.words;
  for(let i=0;i<ws.length;i+=GROUP_SIZE){
    let chunk = ws.slice(i,i+GROUP_SIZE);
    if(ws.length-i-GROUP_SIZE>0 && ws.length-i-GROUP_SIZE<5 && i+GROUP_SIZE<ws.length){ /*keep*/ }
    g.push(chunk);
  }
  if(g.length>1 && g[g.length-1].length<5){ g[g.length-2]=g[g.length-2].concat(g.pop()); }
  return g;
}
function tierProgress(u,gws,t){
  const n=gws.filter(w=>tierPassed(u,w,t)).length;
  let frac=0;
  gws.forEach(w=>{ const p=pget(wid(u,w)); const c= t===1?p.m : t===2?p.u : p.r; frac+=Math.min(c,NEED[t])/NEED[t]; });
  return {n, total:gws.length, pct:Math.round(100*frac/gws.length)};
}
function groupDone(u,gws){ return [1,2,3].every(t=>tierProgress(u,gws,t).n===gws.length); }
function currentPos(u){
  const gs = groups(u);
  for(let gi=0; gi<gs.length; gi++){
    if(!groupDone(u,gs[gi])){
      for(const t of [1,2,3]) if(tierProgress(u,gs[gi],t).n < gs[gi].length) return {gi, tier:t, gs};
    }
  }
  return {gi:gs.length-1, tier:3, gs, allDone:true};
}
function unitPct(u){
  let got=0; u.words.forEach(w=>{ got+=wordStars(u,w); });
  return Math.round(100*got/(u.words.length*3));
}

function doLogin(){
  const uname=$('#f-user').value.trim(), pw=$('#f-pw').value;
  const db=dbLoad();
  const acc = db.users[uname];
  if(!acc) return $('#f-err').textContent='帳號不存在,請聯絡管理員開通';
  if(acc.pw!==pwHash(pw)) return $('#f-err').textContent='密碼唔啱,再試下';
  if(acc.role==='admin'){ store.user='admin'; store.nick=acc.nick||'管理員'; db.last='admin'; dbSave(db); renderAdmin(); return; }
  const lic = acc.license;
  if(lic){
    if(lic.locked) return $('#f-err').textContent='此帳戶已被鎖定,請聯絡管理員';
    if(licExpired(lic)) return $('#f-err').textContent='授權已到期,請聯絡管理員續期';
    // 裝置綁定:兩個槽位(手機+平板),第三部裝置登入即鎖
    const did = deviceId();
    lic.devices = lic.devices||[];
    if(!lic.devices.some(d=>d.id===did)){
      if(lic.devices.length>=2){
        lic.locked=true; dbSave(db);
        return $('#f-err').textContent='偵測到第三部裝置登入,帳戶已自動鎖定';
      }
      lic.devices.push({id:did, label:deviceLabel(), at:today()});
      dbSave(db);
    }
  }
  loadUser(uname); saveUser(); haptic();
  if(!store.form||!store.unitKey){ renderOnboard(1); } else { $('#tabbar').style.display='flex'; switchTab('home'); }
}
