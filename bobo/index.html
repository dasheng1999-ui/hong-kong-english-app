ectly embodied Maria's journey on stage.","ex2":"She embodied the spirit of her character and made it seem like they were one and the same."},{"en":"captivate","pos":"v.","zh":"迷住；吸引","cat":"考試重點詞","src":"單元評估","sent":"She seamlessly transitioned from one emotion to the next, delivering a powerful performance that had the audience captivated.","exam":"單元評估閱讀詞彙填空答案（their performances captivated the audience）；影評寫作評價演出高階詞。","err":"被動用法 have sb captivated / the audience was captivated；形容詞 captivating（迷人的）；勿與 capture（捕捉）混淆。","coll":"captivate the audience; be captivated by; a captivating performance","ex1":"Her powerful performance had the audience captivated from start to finish.","ex2":"The cast's performances captivated everyone in the theatre."},{"en":"ensemble","pos":"n.","zh":"全體演員；合奏團","cat":"考試重點詞","src":"單元評估","sent":"The production adopts a minimalist approach and deploys a small ensemble of actors, two musicians, creative sound, lighting design, and costumes.","exam":"單元評估閱讀原文詞及廣告填空重點（a small ensemble of actors）；戲劇題材專有詞，銜接高中藝術賞析。","err":"ensemble 源自法語，讀音 /ɒnˈsɒmbl/，尾 -ble 不明顯發音；指「整組演員」，勿與 assemble（集合）混淆。","coll":"a small ensemble; an ensemble cast; the ensemble of actors","ex1":"The play uses a small ensemble of actors and just two musicians.","ex2":"This film boasts an impressive ensemble cast of award-winning stars."},{"en":"minimalist","pos":"adj.","zh":"極簡的；簡約的","cat":"考試重點詞","src":"單元評估","sent":"The production adopts a minimalist approach and deploys a small ensemble of actors, two musicians, creative sound, lighting design, and costumes.","exam":"單元評估閱讀原文詞；戲劇及設計題材形容詞；詞形轉換考 minimal（adj.）→ minimalist（adj./n.）。","err":"minimalist 指「刻意簡約的風格」，與 minimal（最少量的）程度不同；反義概念是 elaborate（精緻繁複的）。","coll":"a minimalist approach; minimalist design; a minimalist style","ex1":"The play adopts a minimalist approach with very few props.","ex2":"Her minimalist bedroom contains only a bed and a small desk."},{"en":"motif","pos":"n.","zh":"（重複的）主題；母題","cat":"考試重點詞","src":"單元評估","sent":"By the end of the play, the main recurring musical motif contains so much emotion that it packs a punch when played during the curtain call.","exam":"單元評估閱讀原文詞（recurring musical motif）；藝術賞析高階詞，銜接高中文學／音樂賞析。","err":"motif 源自法語，讀音 /məʊˈtiːf/，重音在後；指「反覆出現的元素」，勿與 motive（動機）混淆。","coll":"a recurring motif; a musical motif; a common motif","ex1":"The main recurring musical motif packs a punch when played during the curtain call.","ex2":"Loneliness is a common motif in the writer's short stories."},{"en":"intriguing","pos":"adj.","zh":"引人入勝的；耐人尋味的","cat":"考試重點詞","src":"單元評估","sent":"At first, the opening scene may seem a bit slow-paced, but it quickly picks up, and the play becomes more engaging and intriguing as the story unfolds.","exam":"單元評估閱讀原文詞；影評／書評評價正面用詞；詞形轉換考 intrigue（v./n.）→ intriguing（adj.）。","err":"intriguing（令人入迷的）形容事物；「感到好奇」用 be intrigued by；勿與 intruding（闖入的）混淆。","coll":"an intriguing plot; sound intriguing; intriguing and engaging","ex1":"The play becomes more engaging and intriguing as the story unfolds.","ex2":"That sounds intriguing - what inspired you to create this type of movie?"},{"en":"audience","pos":"n.","zh":"觀眾；讀者群","cat":"高頻基礎詞","src":"單元評估","sent":"She seamlessly transitioned from one emotion to the next, delivering a powerful performance that had the audience captivated.","exam":"全單元高頻基礎詞（識別 target audience 是 Pre-reading 技能）；聽力及寫作常用；集合名詞用法閱讀常考。","err":"audience 是集合名詞，指整體觀眾時配單數動詞（the audience was captivated）；「目標讀者群」是 target audience。","coll":"the target audience; captivate the audience; a wide audience","ex1":"Her performance had the audience captivated from the very first scene.","ex2":"A good film review helps the audience decide whether the movie suits their taste."},{"en":"character","pos":"n.","zh":"角色；人物","cat":"高頻基礎詞","src":"Text 1","sent":"Streaming apps use hyper-specific viewing data to develop addictive new shows with just the right characters and plot to hook their subscribers.","exam":"全單元高頻主題詞；閱讀理解人物分析題必見；影評寫作評價角色塑造常用。","err":"character 一詞多義：此處「角色」，亦可指「性格／字元」；「主角」是 main character；勿與 characteristic（特徵）混淆。","coll":"the main character; a likeable character; character development","ex1":"It won't work if the characters feel off or unrealistic.","ex2":"My heart sank when I saw that my favourite character had been wounded in the last episode."},{"en":"comedy","pos":"n.","zh":"喜劇","cat":"高頻基礎詞","src":"Text 1","sent":"Comedies with happy endings and humorous elements, tragedies that make people's hearts sink, horror to keep you up at night, and sci-fi to make your head spin.","exam":"詞彙練習（genres）選詞填空答案；閱讀理解文體辨識基礎詞；詞形轉換考 comedy → comedian → comic。","err":"comedy 複數 comedies（y→ies）；「浪漫喜劇」是 romantic comedy；勿與 comment（評論）混淆。","coll":"a romantic comedy; a comedy series; humorous comedy","ex1":"This cartoon comedy takes place in the fictional kingdom of Dreamland.","ex2":"Do you think this action comedy would be up his alley?"},{"en":"horror","pos":"n.","zh":"恐怖（片／小說）","cat":"高頻基礎詞","src":"Text 1","sent":"Comedies with happy endings and humorous elements, tragedies that make people's hearts sink, horror to keep you up at night, and sci-fi to make your head spin.","exam":"詞彙練習（genres）選詞填空答案；閱讀理解文體辨識基礎詞；grammar 練習（Frightened by the horror film）常見。","err":"horror（恐怖片類型）不可數；「一部恐怖片」是 a horror film / movie；勿與 error（錯誤）混淆。","coll":"a horror film; the horror genre; a horror story","ex1":"Watch in horror as student after student is transformed into a flesh-eating monster.","ex2":"Frightened by the horror film, Helen didn't sleep well last night."},{"en":"tragedy","pos":"n.","zh":"悲劇","cat":"高頻基礎詞","src":"Text 1","sent":"Comedies with happy endings and humorous elements, tragedies that make people's hearts sink, horror to keep you up at night, and sci-fi to make your head spin.","exam":"詞彙練習（genres）選詞填空答案；單元評估 True/False/NG 題涉及 the play is a tragedy；詞形轉換考 tragedy（n.）→ tragic（adj.）。","err":"tragedy 複數 tragedies（y→ies）；形容詞是 tragic（拼寫無 d）；反義是 comedy。","coll":"a Greek tragedy; a tragic ending; a family tragedy","ex1":"Tragedies are stories that make people's hearts sink.","ex2":"This Korean drama follows a teacher seeking revenge for the tragedy caused to her in her youth."},{"en":"dystopian","pos":"adj.","zh":"反烏托邦的；末世的","cat":"考試重點詞","src":"詞彙練習","sent":"Based on a video game, The Last of Us is set in a dystopian world in which the spread of a lethal fungus has destroyed civilization.","exam":"詞彙練習（genres）選詞填空答案；科幻題材高階形容詞，銜接高中閱讀；與 U4 太空／未來題材呼應。","err":"反義詞是 utopian（烏托邦的，理想的）；dystopian 描述「反烏托邦的黑暗未來」；拼寫留意 dys- 前綴。","coll":"a dystopian world; a dystopian society; a dystopian future","ex1":"The Last of Us is set in a dystopian world destroyed by a lethal fungus.","ex2":"Do you think this romantic thriller set in a dystopian society would be up his alley?"},{"en":"recommend","pos":"v.","zh":"推薦；建議","cat":"口語常用","src":"聽力對話","sent":"I'd like to recommend it to anyone who likes mystery novels.","exam":"聽力任務（forum post 推薦書籍）高頻動詞；口試表達推薦意見常用；詞形轉換考 recommend → recommendation。","err":"「推薦某物給某人」是 recommend sth to sb，勿寫 recommend sb sth；後接建議從句用 that + 原形（recommend that he go）。","coll":"recommend a book; recommend sth to sb; highly recommend","ex1":"I'd like to recommend this book to anyone who likes mystery novels.","ex2":"I strongly recommend it to anyone looking for an impactful and emotional play."},{"en":"page-turner","pos":"n.","zh":"引人入勝、令人愛不釋手的書","cat":"口語常用","src":"聽力對話","sent":"It's an intense page-turner that keeps you on the edge of your seat all the way through.","exam":"聽力任務書評情境詞；口語書評常用讚語；閱讀理解語境詞義推斷。","err":"page-turner 用連字號連寫；比喻「讓人一頁接一頁不停翻的書」，屬正面評價；勿逐字直譯。","coll":"an intense page-turner; a real page-turner; a gripping page-turner","ex1":"Dark Nights is an intense page-turner that keeps you on the edge of your seat.","ex2":"This thriller is a real page-turner - I finished it in one night."},{"en":"setting","pos":"n.","zh":"（故事的）背景；場景","cat":"口語常用","src":"聽力對話","sent":"So where is the story set? ... The setting is not contemporary, though. It's set in the year nineteen thirty.","exam":"聽力任務填空考點（story set in Indonesia, in 1930）；閱讀理解故事元素題常考；詞形轉換考 set（v.）→ setting（n.）。","err":"「故事設定於……」是 be set in（a place / time），介詞用 in；setting 指時空背景，勿與 plot（情節）混淆。","coll":"the setting of the story; be set in; an exotic setting","ex1":"The setting is not contemporary; the story is set in the year 1930.","ex2":"The exotic setting of the new romantic comedy series makes it right up your alley."},{"en":"fantasy","pos":"n.","zh":"奇幻（作品）；幻想","cat":"口語常用","src":"聽力對話","sent":"Oh! So it's also a fantasy novel? ... Yeah, the story is set in a magical world where the main character has to prevent a war.","exam":"聽力任務文體辨識詞；閱讀理解文體題常見（dark fantasy）；詞形轉換考 fantasy（n.）→ fantastic / fantastical（adj.）。","err":"fantasy 複數 fantasies（y→ies）；「奇幻小說」是 a fantasy novel；與 sci-fi（科幻）題材不同，勿混。","coll":"a fantasy novel; dark fantasy; a fantasy world","ex1":"So it's also a fantasy novel set in a magical world?","ex2":"Dahl's novel is a landmark work in the genre of dark fantasy for children."},{"en":"quest","pos":"n.","zh":"（漫長艱難的）追尋；探索","cat":"口語常用","src":"聽力對話","sent":"I suppose finding the book is a long and difficult quest.","exam":"聽力任務情節描述詞；奇幻／冒險故事高頻詞；閱讀理解語境詞義推斷。","err":"quest 指「艱辛的追尋」，常搭配 a long and difficult quest；「追尋某物」是 a quest for sth，介詞用 for。","coll":"a long quest; a quest for sth; go on a quest","ex1":"Finding the ancient book is a long and difficult quest.","ex2":"The hero goes on a quest to find the magical spells that will prevent a war."},{"en":"spoiler","pos":"n.","zh":"劇透；破壞情節的透露","cat":"口語常用","src":"聽力對話","sent":"You've got me interested in the book. Now I don't want spoilers!","exam":"聽力對話口語詞；追劇看書文化用語；閱讀理解語境詞義推斷。","err":"spoiler（劇透）通常用複數 spoilers；動詞是 spoil（劇透 = spoil the ending）；勿與 spoiled（寵壞的）混淆。","coll":"no spoilers; a spoiler warning; avoid spoilers","ex1":"You've got me interested - now I don't want spoilers!","ex2":"She learned how to describe the plot without spoiling the surprise."},{"en":"browse","pos":"v.","zh":"瀏覽；隨意觀看","cat":"日常實用","src":"詞彙練習","sent":"Whenever I browse the net or have a look at my recommendations list, I feel impressed by how well the algorithms work.","exam":"詞彙練習（online streaming）選詞填空答案；日常上網及煲劇場景高頻動詞，銜接綜合技能任務。","err":"browse 可直接接賓語（browse the net / browse the shows），亦可 browse through；勿與 brows（眉毛）混淆。","coll":"browse the net; browse through; browse the shows","ex1":"Henry browses streaming platforms all the time but can't find anything to watch.","ex2":"I like to browse the bookshop shelves on lazy afternoons."},{"en":"scroll","pos":"v.","zh":"滑動（畫面）；捲動","cat":"日常實用","src":"詞彙練習","sent":"Sometimes when I scroll through my social media feed, I spot ads for products that I was talking about mere seconds before.","exam":"詞彙練習（online streaming）選詞填空答案；日常使用手機／串流平台高頻動詞。","err":"「滑動瀏覽」是 scroll through sth，介詞用 through；scroll 亦作名詞「卷軸」；勿與 scowl（皺眉）混淆。","coll":"scroll through; scroll down; scroll a feed","ex1":"When I scroll through my social media feed, I spot ads for things I just mentioned.","ex2":"You scroll and browse through the featured shows but can't find anything to watch."},{"en":"costume","pos":"n.","zh":"戲服；服裝","cat":"日常實用","src":"Text 2","sent":"The film's scares are overshadowed by over-the-top special effects, costumes and sets.","exam":"Text 2 閱讀理解細節題答案（Name THREE examples of dazzling visuals：special effects, costumes and sets）；戲劇影視場景詞。","err":"costume 指「戲服／特定場合服裝」，與 clothes（日常衣服）不同；讀音 /ˈkɒstjuːm/；勿與 custom（習俗）混淆。","coll":"costume design; wear a costume; elaborate costumes","ex1":"The film's scares are overshadowed by over-the-top special effects, costumes and sets.","ex2":"The actors' colourful costumes brought the fairy-tale world to life."}],"phrases":[{"phrase":"leave sth for another time","zh":"留待改天再做／再看","type":"課文短語","sent":"It looks a bit similar to the one you've just finished, so you decide to leave it for the weekend.","note":"可換成 leave it for tomorrow / the weekend 等具體時間；賓語為代名詞時放中間（leave it for later）；口語化，適合日常對話。","ex":"I'm too tired to finish this episode of your favourite drama series, so I'm going to leave it for tomorrow."},{"phrase":"make one's head spin","zh":"使人頭昏腦脹；令人眼花繚亂","type":"課文短語","sent":"Tragedies that make people's hearts sink, horror to keep you up at night, and sci-fi to make your head spin.","note":"one's 須隨主語變化（make my / your head spin）；形容資訊或情節多得令人混亂；與 make sb feel dizzy 同義但更生動。","ex":"The plot of this mystery story is so complex that thinking about it makes my head spin."},{"phrase":"one's heart sinks","zh":"心一沉；感到失望沮喪","type":"課文短語","sent":"Tragedies that make people's hearts sink, horror to keep you up at night, and sci-fi to make your head spin.","note":"主語是「心」（one's heart sinks/sank），描述突然的失望；亦可用 make one's heart sink（使某人失望）；sink 過去式 sank。","ex":"My heart sank when I saw that my favourite character had been wounded in the last episode."},{"phrase":"take sth into account","zh":"把……考慮在內","type":"課文短語","sent":"The use of such data is not restricted to recommending existing shows - it is also taken into account to produce new shows so that they are more likely to be hot hits.","note":"賓語可放中間（take sth into account）或後置（take into account sth）；亦作 take account of sth；議論文分析因素時實用。","ex":"The studio executives took their market research into account before agreeing to produce the film."},{"phrase":"twists and turns","zh":"曲折離奇的情節；峰迴路轉","type":"課文短語","sent":"You aren't sure whether you have enough brainpower for all the complicated twists and turns and backstories.","note":"固定複數搭配，指故事的「曲折起伏」；亦可比喻人生際遇（the twists and turns of life）；影評描述情節常用。","ex":"Ahmed enjoyed adding unexpected twists and turns to his mystery novella."},{"phrase":"up one's alley","zh":"正合某人口味；某人的拿手範疇","type":"課文短語","sent":"A new romantic comedy series set in an exotic locale - that's right up your alley.","note":"常說 right up one's alley；one's 須隨人變化（up your / his alley）；單元評估閱讀原文亦出現（right up my alley）。","ex":"Do you think this romantic thriller set in a dystopian society would be up his alley?"},{"phrase":"fall short","zh":"未達標準；令人失望","type":"課文短語","sent":"When it comes to atmosphere, however, the film falls short, failing to capture the book's dark and creepy vibe.","note":"「未達到（期望）」是 fall short of sth（fall short of expectations），介詞用 of；影評指出缺點時常用。","ex":"The climax of the TV series fell short of expectations, disappointing many long-time fans."},{"phrase":"little does one know","zh":"殊不知；某人渾然不知","type":"寫作句式","sent":"Little do they know that numerous witches are gathering there later to discuss a scheme to transform children into mice.","note":"否定副詞 little 置句首引起倒裝（Little do/did + 主語 + 原形動詞）；用於製造懸念，後接 that 從句；記敘文常用。","ex":"Little did the protagonist know that that would be the last time she'd see her tarantula."},{"phrase":"pack a punch","zh":"極具感染力／衝擊力","type":"課文短語","sent":"The result is a movie that is technically impressive but packs no emotional punch.","note":"單元評估閱讀理解原題考此短語意思；可作正面（packs a punch）或否定（packs no punch）；影評評價感染力常用。","ex":"This low-budget series packs a punch due to its unique concept and action-packed narrative."},{"phrase":"pit sth/sb against sth/sb","zh":"使……與……對抗／較量","type":"課文短語","sent":"The Witches (2020) is a family-friendly affair pitting magic against friendship and love.","note":"固定結構 pit A against B；介詞用 against；常描述故事中的正邪／陣營對立。","ex":"This addictive television series centres around a competition that pits the rich against the poor."},{"phrase":"to say the least","zh":"至少可以這麼說；說得保守一點","type":"寫作句式","sent":"Dahl's novel is a landmark work in the genre of dark fantasy for children, and matching a classic is a challenge, to say the least.","note":"置句末，帶「輕描淡寫」的強調語氣，等於 that's an understatement；影評及議論文加強語氣時實用。","ex":"Recreating the magic of the original series will be demanding, to say the least."},{"phrase":"when it comes to sth","zh":"說到／論及……","type":"寫作句式","sent":"When it comes to atmosphere, however, the film falls short, failing to capture the book's dark and creepy vibe.","note":"to 是介詞，後接名詞或動名詞（when it comes to writing）；常用作段落過渡引出討論範疇，港生易誤接原形動詞。","ex":"When it comes to sci-fi, you can't go wrong with this classic."},{"phrase":"with the exception of sth","zh":"除了……之外","type":"寫作句式","sent":"It sticks more closely to Dahl's original story than the first adaptation (with the exception of its American setting).","note":"等於 except for；後接名詞；比 except 正式，適合書面比較；勿寫 with exception of（漏 the）。","ex":"Every end-of-episode cliffhanger in this drama series is thrilling with the exception of the one in the first episode."},{"phrase":"break free","zh":"掙脫；擺脫束縛","type":"課文短語","sent":"The protagonist repeatedly experiencing the same period of time until they can break free from the cycle of repetition.","note":"「擺脫……」是 break free from sth，介詞用 from；常搭配 a cycle / the past / control 等；記敘及議論皆可用。","ex":"This family-friendly animal story is about a zebra who wants to break free from the zoo and live in the wild."},{"phrase":"on the edge of one's seat","zh":"（緊張刺激得）屏息以待","type":"口語短語","sent":"It's an intense page-turner that keeps you on the edge of your seat all the way through.","note":"常搭配 keep sb on the edge of one's seat，形容情節緊張引人入勝；口試及書評描述懸疑感時實用。","ex":"The idea of creating dramatic tension to keep the audience on the edge of their seats truly excites me."},{"phrase":"keep you up at night","zh":"令你（緊張／害怕得）睡不着","type":"口語短語","sent":"Comedies with happy endings, tragedies that make people's hearts sink, horror to keep you up at night, and sci-fi to make your head spin.","note":"口語常用，形容恐怖或懸疑內容令人難以入睡；亦可指令人擔憂的事（worries that keep you up at night）。","ex":"This horror series is so terrifying that it will keep you up at night."},{"phrase":"I quite agree with you there","zh":"在這一點上我很同意你","type":"口語短語","sent":"I love novels with funny narration too, so I quite agree with you there.","note":"口語表示認同的禮貌句式；there 指「在那一點上」；口試小組討論表達贊同時實用，比 I agree 更自然。","ex":"Realistic characters really make a story better - I quite agree with you there."}]},{"key":"3A_U3","form":"F3","book":"3A","num":3,"theme":"Tech life","theme_zh":"科技生活","words":[{"en":"algorithm","pos":"n.","zh":"演算法","cat":"核心詞彙","src":"Text 1","sent":"Algorithms all over the place: are they friends or foes?","exam":"全單元核心主題詞（Text 1 標題）；詞彙練習語境詞；詞形轉換考 algorithm（n.）→ algorithmic（adj.）；閱讀理解主旨題常考。","err":"拼寫特別（al-go-rithm，尾為 -rithm 而非 -rythm）；讀音 /ˈælɡərɪðəm/，重音在前；複數 algorithms。","coll":"the algorithm; a recommendation algorithm; algorithmic decisions","ex1":"Algorithms can be a double-edged sword, and we must be mindful of how they impact the way we think and act.","ex2":"The algorithms used in these apps only show users things that they like or agree with."},{"en":"artificial intelligence","pos":"n.","zh":"人工智能","cat":"核心詞彙","src":"詞彙練習","sent":"With the advent of innovative new fields like artificial intelligence (AI), our phones are likely to be capable of even cooler things in the future.","exam":"全單元核心主題詞；詞彙練習（technology）選詞填空答案；縮寫 AI 是閱讀、聽力、寫作高頻詞，銜接DSE科技議題。","err":"artificial 拼寫易錯（arti-fi-cial，注意 -cial）；縮寫 AI 兩字皆大寫；「人工智能」不可數，不加 a。","coll":"artificial intelligence (AI); AI-powered; the rise of AI","ex1":"Thanks to the rise of AI, phones are slated to become the control centres for home automation.","ex2":"Analysts predict that AI robots will eventually replace most coders."},{"en":"automation","pos":"n.","zh":"自動化","cat":"核心詞彙","src":"Text 2","sent":"In 2021, the McKinsey Global Institute predicted that by 2030 mass unemployment could result in 100 million workers from eight major countries losing their jobs to automation.","exam":"詞彙練習（technology）選詞填空答案；閱讀理解就業議題高頻詞；詞形轉換考 automate（v.）→ automation（n.）→ automated / automatic（adj.）。","err":"「因自動化而失業」是 lose one's job to automation，介詞用 to；automatic（自動的，形容機器）與 automated（已自動化的，形容流程）易混。","coll":"home automation; lose jobs to automation; automation systems","ex1":"Phones are set to become the control centres for future home automation systems.","ex2":"Using computers to automate tasks can improve efficiency but may cost people their jobs."},{"en":"facial recognition","pos":"n.","zh":"面部識別","cat":"核心詞彙","src":"詞彙練習","sent":"Our phones now have internet access, high-resolution cameras, fingerprint scanners, and even facial recognition technology!","exam":"詞彙練習（technology）選詞填空答案；閱讀理解科技功能題常見；單元評估未來科技題材高頻詞組。","err":"facial（面部的）由 face 變化而來，拼寫留意 -cial；「面部識別」是 facial recognition，勿寫 face recognition。","coll":"facial recognition technology; a facial recognition system; use facial recognition","ex1":"Travellers are reaping the benefits of the airport's new facial recognition system.","ex2":"The AI will recognize our voice, facial expressions and behavioural patterns."},{"en":"innovative","pos":"adj.","zh":"創新的；革新的","cat":"核心詞彙","src":"詞彙練習","sent":"With the advent of innovative new fields like artificial intelligence (AI), our phones are likely to be capable of even cooler things in the future.","exam":"詞彙練習（technology）選詞填空答案；詞形轉換考 innovate（v.）→ innovation（n.）→ innovative（adj.）；科技寫作正面評價詞。","err":"拼寫留意雙 n（inno-）；重音在前（IN-no-va-tive）；名詞是 innovation，勿寫 innovativeness。","coll":"an innovative field; innovative ideas; innovative technology","ex1":"AI is one of the most innovative new fields in modern technology.","ex2":"The company is famous for its innovative approach to product design."},{"en":"interface","pos":"n.","zh":"（人機）介面","cat":"核心詞彙","src":"詞彙練習","sent":"The interface of future phones might also look wildly different.","exam":"詞彙練習（technology）選詞填空答案；Text 2 brain-machine interface 為主題詞；科技題材閱讀高頻詞。","err":"interface 連寫一字；「腦機介面」是 brain-machine interface；勿與 surface（表面）混淆。","coll":"a user interface; brain-machine interface; a simple interface","ex1":"The interface of future phones might look wildly different, with holographic displays.","ex2":"Brain-machine interfaces will let us search the internet with just our thoughts."},{"en":"echo chamber","pos":"n.","zh":"回音室（只接收相同觀點的環境）","cat":"核心詞彙","src":"Text 1","sent":"It inevitably creates echo chambers (spaces in which every post expresses similar beliefs).","exam":"Text 1 及詞彙練習（social media）主題關鍵詞；閱讀理解批判思考題常考；銜接高中社交媒體議論題材。","err":"echo chamber 分兩字寫，複數 echo chambers；比喻義指「觀點單一的封閉環境」，勿逐字直譯理解。","coll":"create echo chambers; an online echo chamber; trapped in an echo chamber","ex1":"Algorithms inevitably create echo chambers where every post expresses similar beliefs.","ex2":"Social media can make teens narrow-minded by trapping them in echo chambers."},{"en":"platform","pos":"n.","zh":"平台","cat":"核心詞彙","src":"詞彙練習","sent":"But are these online platforms really good vehicles for knowledge?","exam":"詞彙練習（social media）選詞填空答案；全單元高頻詞；閱讀理解社交媒體題材及寫作常用。","err":"platform 指「網上平台」時可數（online platforms）；勿與 program（程式）混淆；「在平台上」介詞用 on a platform。","coll":"an online platform; social media platforms; streaming platforms","ex1":"Are these online platforms really good vehicles for knowledge?","ex2":"Social-media companies use algorithms to keep users on their platforms longer."},{"en":"content","pos":"n.","zh":"內容","cat":"高頻基礎詞","src":"Text 1","sent":"Teens are likely to find it difficult to think for themselves if all the content they see online ignores opposing viewpoints.","exam":"詞彙練習（social media）選詞填空答案；全單元高頻詞；閱讀及寫作社交媒體題材必用。","err":"content 作「內容」不可數（用單數 content，勿加 s）；重音在前（CON-tent，名詞）與 conTENT（滿足的，形容詞）不同。","coll":"online content; harmful content; create content","ex1":"Social media companies automatically recommend popular content to increase traffic.","ex2":"The internet contains both harmful and useful content."},{"en":"cyborg","pos":"n.","zh":"生化人；改造人","cat":"核心詞彙","src":"Text 2","sent":"A staple of science fiction is the cyborg, a human with artificial or robotic elements integrated into their organic body.","exam":"Text 2 兩面論證文主題詞；閱讀理解定義題原題（what is a cyborg?）；銜接高中科技倫理議論題材。","err":"cyborg 讀音 /ˈsaɪbɔːɡ/；由 cybernetic + organism 合成；「生化人化」是 cyborgization。","coll":"a cyborg; mass cyborgization; a cyborg superclass","ex1":"A cyborg is a human with artificial or robotic elements integrated into their organic body.","ex2":"As our reliance on technology grows, cyborgization seems inevitable."},{"en":"implant","pos":"n. / v.","zh":"植入物；植入","cat":"核心詞彙","src":"Text 2","sent":"Perhaps it would be a good thing if everyone had some sort of tech implant in their body.","exam":"Text 2 主題詞；詞彙練習（technology）語境詞（cochlear implants）；閱讀理解科技醫療題材常見。","err":"implant 作名詞重音在前（IM-plant），作動詞重音在後（im-PLANT）；「植入某物」是 implant sth in / into sth。","coll":"a tech implant; cochlear implants; implant a device","ex1":"Perhaps it would be a good thing if everyone had some sort of tech implant.","ex2":"Doctors place electronic pacemakers into heart patients and cochlear implants into deaf people's ears."},{"en":"inevitable","pos":"adj.","zh":"不可避免的；必然的","cat":"考試重點詞","src":"Text 2","sent":"As our reliance on technology continues to grow, cyborgization seems inevitable.","exam":"Text 2 詞彙填空原題答案（flight delays were inevitable）；詞形轉換考 inevitable（adj.）→ inevitably（adv.）；議論文結論段高頻詞。","err":"拼寫長（in-ev-it-able），默書易錯；副詞 inevitably 常用於議論（inevitably creates echo chambers）；勿與 unavoidable 混拼。","coll":"seem inevitable; an inevitable result; inevitably","ex1":"Given the worsening weather conditions, flight delays were inevitable for all airlines.","ex2":"It inevitably creates echo chambers in which every post expresses similar beliefs."},{"en":"consequence","pos":"n.","zh":"後果；結果","cat":"考試重點詞","src":"Text 2","sent":"Such symbiosis could have unintended consequences.","exam":"Text 2 詞彙填空原題答案（face the consequences of his actions）；連接詞 as a consequence 為文法重點；詞形轉換考 consequence（n.）→ consequently / consequential。","err":"「承擔後果」是 face the consequences；連接副詞 as a consequence / consequently 引出結果；勿與 sequence（順序）混淆。","coll":"unintended consequences; face the consequences; as a consequence","ex1":"After being caught cheating, Ben now has to face the consequences of his actions.","ex2":"Such symbiosis between humans and machines could have unintended consequences."},{"en":"symbiosis","pos":"n.","zh":"共生（關係）","cat":"考試重點詞","src":"Text 2","sent":"Such symbiosis could have unintended consequences.","exam":"Text 2 閱讀理解高階詞（此處指人機共生）；銜接高中學科詞彙（Academic Use of English），閱讀理解詞義推斷題常考。","err":"拼寫長（sym-bi-o-sis），默書極易錯；形容詞是 symbiotic；此處比喻人與科技的緊密依存關係。","coll":"a symbiotic relationship; symbiosis between; unintended consequences of symbiosis","ex1":"The symbiosis between humans and machines could have unintended consequences.","ex2":"Smartphones and fitness trackers already form a kind of symbiosis with our bodies."},{"en":"betterment","pos":"n.","zh":"改善；改進","cat":"考試重點詞","src":"詞彙練習","sent":"Even if the tech is impressive, it's not being used for the betterment of the hiring process.","exam":"詞彙練習（applications）選詞填空答案；Text 2 Values & Attitudes（Betterment of humankind）主題詞；詞形轉換考 better（v.）→ betterment（n.）。","err":"betterment（改善）由 better + -ment 構成；固定搭配 for the betterment of sth；比 improvement 正式，多用於書面。","coll":"for the betterment of; the betterment of humankind; betterment of society","ex1":"The technology is not being used for the betterment of the hiring process.","ex2":"These small advancements contribute to the betterment of our lives."},{"en":"streamline","pos":"v.","zh":"使（流程）更精簡高效","cat":"考試重點詞","src":"詞彙練習","sent":"I understand that employers want to streamline the selection process so they can hire people quickly.","exam":"詞彙練習（applications）選詞填空答案；單元評估閱讀原文詞（streamlining workflows）；商業科技題材高頻動詞。","err":"streamline 連寫一字；直接接賓語（streamline the process），不加介詞；勿與 stream（串流）混淆。","coll":"streamline the process; streamline workflows; streamline operations","ex1":"Employers want to streamline the selection process so they can hire people quickly.","ex2":"Barcodes streamline workflows by reducing errors and improving efficiencies."},{"en":"manipulate","pos":"v.","zh":"操縱；巧妙處理","cat":"考試重點詞","src":"詞彙練習","sent":"I'm meeting my careers counsellor tomorrow to get some advice on how to manipulate my CV so it gets rated more highly by the robot-checkers.","exam":"詞彙練習（applications）及單元評估選詞填空答案；詞形轉換考 manipulate（v.）→ manipulation（n.）；閱讀理解語境詞義題。","err":"manipulate 可褒可貶：此處中性指「巧妙調整」，亦常帶「操控」貶義（manipulate their decision-making）；拼寫留意 -ip-。","coll":"manipulate data; manipulate decision-making; manipulate a CV","ex1":"Large corporations use algorithms to analyse people's preferences and manipulate their decision-making.","ex2":"Knowing how to manipulate that screening process could land you an interview."},{"en":"encrypt","pos":"v.","zh":"加密","cat":"考試重點詞","src":"詞彙練習","sent":"After that, I'm going to go to my IT class and learn how big firms encrypt messages - sounds cool, right?","exam":"詞彙練習（applications）選詞填空答案；資訊科技題材專有動詞；詞形轉換考 encrypt（v.）→ encryption（n.）。","err":"拼寫留意 en- 前綴 + crypt；反義是 decrypt（解密）；名詞 encryption；勿與 encounter 混淆。","coll":"encrypt messages; encrypt data; end-to-end encryption","ex1":"Big firms encrypt messages to keep them safe from hackers.","ex2":"All the data sent through the app is encrypted for security."},{"en":"transformative","pos":"adj.","zh":"帶來重大轉變的","cat":"考試重點詞","src":"單元評估","sent":"It's not just the significant advancements that have revolutionized the world, but also the smaller technological innovations that have proved to be equally transformative.","exam":"單元評估閱讀原文詞；詞形轉換考 transform（v.）→ transformation（n.）→ transformative（adj.）；科技議論寫作高階形容詞。","err":"transformative（帶來轉變的，形容影響）與 transformable（可變形的）意思不同；拼寫長，重音在 -form-。","coll":"equally transformative; a transformative impact; transformative technology","ex1":"Smaller technological innovations have proved to be equally transformative.","ex2":"The invention of the internet has had a transformative effect on society."},{"en":"disrupt","pos":"v.","zh":"顛覆；擾亂","cat":"考試重點詞","src":"單元評估","sent":"The invention of the sewing machine in the mid-19th century disrupted the entire textile industry, making clothing cheaper and more accessible.","exam":"單元評估閱讀原文詞；詞形轉換考 disrupt（v.）→ disruption（n.）→ disruptive（adj.）；科技商業題材高頻動詞。","err":"disrupt 此處指「徹底改變（行業）」，帶正面創新義；亦可指「打斷」（disrupt a meeting）；勿與 corrupt（腐敗）混淆。","coll":"disrupt an industry; disrupt the market; a disruptive technology","ex1":"The sewing machine disrupted the entire textile industry.","ex2":"New technologies are constantly disrupting the way we work and live."},{"en":"alternative","pos":"n. / adj.","zh":"替代品；替代的","cat":"考試重點詞","src":"單元評估","sent":"It was an excellent alternative to fountain pens, which required frequent refilling and blotting.","exam":"單元評估閱讀詞彙填空原題答案（An alternative to a car is a motorcycle）；閱讀理解語境選詞題；詞形轉換考 alter → alternative → alternatively。","err":"「……的替代品」是 an alternative to sth，介詞用 to，港生易誤用 of 或 for；拼寫留意 alter- 詞根。","coll":"an alternative to; a good alternative; alternative energy","ex1":"The ballpoint pen was an excellent alternative to fountain pens.","ex2":"An alternative to a car is a motorcycle."},{"en":"durability","pos":"n.","zh":"耐用性；耐久度","cat":"考試重點詞","src":"單元評估","sent":"It became the preferred method of opening and closing clothing due to its ease of use and durability.","exam":"單元評估閱讀及廣告填空重點（great durability, making it hard to break）；詞形轉換考 durable（adj.）→ durability（n.）。","err":"durability（耐用性，名詞）與 durable（耐用的，形容詞）勿混；拼寫 dura-bil-ity；勿與 duration（持續時間）混淆。","coll":"great durability; ease of use and durability; test the durability","ex1":"The zipper became popular due to its ease of use and durability.","ex2":"This backpack is known for its durability and can last for years."},{"en":"ongoing","pos":"adj.","zh":"持續進行中的","cat":"考試重點詞","src":"單元評估","sent":"The ongoing development of such advancements continues to drive our civilization further.","exam":"單元評估閱讀同義詞題原題：Find a word in paragraph 6 with a similar meaning to 'continuing'（答案 ongoing）；閱讀理解同義替換題。","err":"ongoing 連寫一字，只作定語（an ongoing process），一般不作表語；勿寫 on-going 加連字號。","coll":"ongoing development; an ongoing process; ongoing research","ex1":"The ongoing development of small advancements continues to drive our civilization further.","ex2":"Scientists are conducting ongoing research into renewable energy."},{"en":"inventory","pos":"n.","zh":"存貨；庫存","cat":"考試重點詞","src":"單元評估","sent":"Barcodes were first introduced in the early 1970's to help retailers and manufacturers keep track of their inventory.","exam":"單元評估閱讀關鍵詞（keep track of inventory）；商業科技題材名詞；閱讀理解細節題常考。","err":"inventory 讀音 /ˈɪnvəntri/，重音在前；「盤點／追蹤存貨」是 keep track of inventory；勿與 invention（發明）混淆。","coll":"keep track of inventory; manage inventory; inventory control","ex1":"Barcodes help retailers and manufacturers keep track of their inventory.","ex2":"The shop uses software to manage its inventory efficiently."},{"en":"decision-making","pos":"n.","zh":"決策；作決定的過程","cat":"考試重點詞","src":"詞彙練習","sent":"I mean, why leave all the decision-making to a machine?","exam":"詞彙練習（applications）選詞填空答案；閱讀理解 AI 決策議題常考；銜接高中科技倫理寫作。","err":"decision-making 用連字號連寫；「把決策交給」是 leave the decision-making to sb/sth；勿寫 decision making 分開。","coll":"leave the decision-making to; algorithmic decision-making; decision-making process","ex1":"Why leave all the decision-making to a machine?","ex2":"Important algorithmic decisions should not be made without human input in the decision-making process."},{"en":"efficiency","pos":"n.","zh":"效率","cat":"高頻基礎詞","src":"詞彙練習","sent":"They say it improves efficiency, but from my perspective as an interviewee, it just shows laziness and insensitivity.","exam":"詞彙練習（applications）選詞填空答案；詞形轉換考 efficient（adj.）→ efficiency（n.）→ efficiently（adv.）；科技寫作高頻詞。","err":"拼寫留意雙 f、-ency 結尾；「提高效率」是 improve efficiency；形容詞 efficient，勿與 effective（有效的）混淆。","coll":"improve efficiency; increase efficiency; energy efficiency","ex1":"Using computers to automate tasks can improve efficiency.","ex2":"Barcodes improve efficiencies in the supply chain by reducing errors."},{"en":"convenience","pos":"n.","zh":"方便；便利","cat":"高頻基礎詞","src":"詞彙練習","sent":"In my opinion, accuracy is more important than convenience.","exam":"詞彙練習（applications）選詞填空答案；聽力（online banking）原因選項（it's convenient）；詞形轉換考 convenient（adj.）→ convenience（n.）。","err":"拼寫易錯（con-ven-ience）；形容詞是 convenient（convenient 而非 convient）；「為方便起見」是 for convenience。","coll":"for convenience; more convenience; the convenience of","ex1":"Accuracy is more important than convenience when hiring people.","ex2":"The ballpoint pen allowed students to take notes with more convenience."},{"en":"advancement","pos":"n.","zh":"進步；發展","cat":"高頻基礎詞","src":"單元評估","sent":"Technology has advanced at an incredible pace and has had a significant impact on civilization.","exam":"單元評估閱讀高頻詞（technological advancements）；詞形轉換考 advance（v./n.）→ advancement（n.）→ advanced（adj.）；科技議論寫作必用。","err":"advancement（進步／發展）與 advance（進展／預先）意思相近但用法有別；「科技進步」是 technological advancements。","coll":"technological advancements; significant advancements; advances in science","ex1":"Small technological advancements have had a substantial impact on civilization.","ex2":"Advances in AI are changing the way we live and work."},{"en":"device","pos":"n.","zh":"裝置；設備","cat":"高頻基礎詞","src":"Handbook","sent":"To introduce the topic by having students discuss how often they use their digital devices.","exam":"全單元高頻基礎詞；聽力及閱讀科技題材必見；詞形轉換考 device（n.）→ devise（v. 設計）辨析。","err":"名詞 device /dɪˈvaɪs/ 與動詞 devise /dɪˈvaɪz/ 只差 c/s，拼寫與讀音都易混；「電子裝置」是 digital / electronic devices。","coll":"digital devices; electronic devices; a smart device","ex1":"Students discussed how much time they spend on their digital devices.","ex2":"Cloud storage comes in handy when you want to access your files from another device."},{"en":"recruiter","pos":"n.","zh":"招聘人員","cat":"核心詞彙","src":"詞彙練習","sent":"You want a recruiter to notice you and you want them to know why you'd be a good fit.","exam":"詞彙練習（jobs & careers）及單元評估選詞填空答案；求職題材主題詞；詞形轉換考 recruit（v.）→ recruitment（n.）→ recruiter（n.）。","err":"拼寫留意 -uit-（recruit）；「招聘」是 recruit（v.）／ recruitment（n.）；勿與 recluter 等錯拼混淆。","coll":"a recruiter; recruit employees; the recruitment process","ex1":"You want a recruiter to notice you and know why you'd be a good fit.","ex2":"The company hired more recruiters to speed up the hiring process."},{"en":"résumé","pos":"n.","zh":"履歷；簡歷","cat":"考試重點詞","src":"詞彙練習","sent":"I don't think their résumé-screening algorithms are doing me justice.","exam":"詞彙練習（applications/jobs）及單元評估選詞填空答案（résumé-screening）；求職題材高頻詞；與動詞 resume（恢復，U2）同拼異義，閱讀常考辨析。","err":"名詞 résumé /ˈrɛzjʊmeɪ/（履歷）與動詞 resume /rɪˈzjuːm/（恢復）同拼不同音義；美式亦作 resume/résumé，英式常用 CV。","coll":"a strong résumé; résumé-screening; submit a résumé","ex1":"The résumé-screening algorithm may also scan your social media posts.","ex2":"Your résumé should highlight your experience, skills and education."},{"en":"hiring process","pos":"n.","zh":"招聘流程","cat":"核心詞彙","src":"詞彙練習","sent":"The hiring process is tough for employers as well, and they want a candidate that could fit in with their workplace.","exam":"詞彙練習（jobs & careers）及單元評估選詞填空答案；求職題材高頻詞組；閱讀理解細節題常見。","err":"hiring process 分兩字寫；「招聘流程」亦作 recruitment process；勿把 hiring 誤寫 hireing。","coll":"the hiring process; streamline the hiring process; go through the hiring process","ex1":"The hiring process is tough for employers as well.","ex2":"AI is not being used for the betterment of the hiring process."},{"en":"aptitude test","pos":"n.","zh":"性向測驗；能力傾向測試","cat":"考試重點詞","src":"詞彙練習","sent":"I'm a bit stumped so I'm taking an aptitude test tomorrow to see what kinds of jobs I would be good at.","exam":"詞彙練習（jobs & careers）選詞填空答案；求職升學題材詞組；聽力及綜合任務常見。","err":"aptitude 讀音 /ˈæptɪtjuːd/；「做性向測驗」是 take an aptitude test，動詞用 take 而非 do；勿與 attitude（態度）混淆。","coll":"take an aptitude test; an aptitude for; a career aptitude test","ex1":"I'm taking an aptitude test tomorrow to see what kinds of jobs I would be good at.","ex2":"The results of the aptitude test suggested she should consider a career in engineering."},{"en":"workload","pos":"n.","zh":"工作量","cat":"高頻基礎詞","src":"Text 1","sent":"They can be used to automate work, decreasing workloads or even replacing employees.","exam":"詞彙練習（jobs & careers）語境詞；閱讀理解職場自動化議題常見；詞形轉換考 work + load 合成詞。","err":"workload 連寫一字，複數 workloads；「減輕工作量」是 decrease / reduce workloads；勿寫 work load 分開。","coll":"a heavy workload; decrease workloads; manage one's workload","ex1":"Algorithms can be used to automate work, decreasing workloads or even replacing employees.","ex2":"The new software helped reduce the team's workload significantly."},{"en":"spoon-feed","pos":"v.","zh":"填鴨式灌輸；一味餵養","cat":"考試重點詞","src":"詞彙練習","sent":"This can help teens increase their general knowledge naturally, without being spoon-fed facts in class.","exam":"詞彙練習（social media）選詞填空答案（spoon-fed）；教育題材比喻動詞；閱讀理解語境詞義推斷。","err":"spoon-feed 用連字號，過去分詞 spoon-fed（不規則，feed→fed）；被動 be spoon-fed sth；比喻「不加思考地灌輸」。","coll":"be spoon-fed facts; spoon-feed information; spoon-fed knowledge","ex1":"Social media helps teens learn naturally, without being spoon-fed facts in class.","ex2":"Students who are spoon-fed answers may struggle to think for themselves."},{"en":"narrow-minded","pos":"adj.","zh":"心胸狹窄的；固執己見的","cat":"考試重點詞","src":"Text 1","sent":"However, social media is also bad for teens because it can make them more narrow-minded.","exam":"詞彙練習（social media）語境詞；閱讀理解批判思考題常見；議論文描述負面影響高頻詞。","err":"narrow-minded 用連字號；反義是 open-minded（思想開明的）；描述人的思想，勿形容空間狹窄。","coll":"narrow-minded people; become narrow-minded; a narrow-minded view","ex1":"Social media can make teens more narrow-minded by only showing them things they agree with.","ex2":"We should stay open-minded rather than narrow-minded about new ideas."},{"en":"ground-breaking","pos":"adj.","zh":"開創性的；突破性的","cat":"考試重點詞","src":"詞彙練習","sent":"This would be ground-breaking because it would enable people to get screen time in remote locations, far away from any power sockets.","exam":"詞彙練習（technology）選詞填空答案；科技創新題材正面形容詞；閱讀理解詞義推斷及寫作高階詞。","err":"ground-breaking 用連字號；比喻「開創先河的」，勿逐字理解為「破土」；與 innovative、revolutionary 近義。","coll":"a ground-breaking discovery; ground-breaking technology; ground-breaking research","ex1":"Charging phones with radio waves would be ground-breaking.","ex2":"The scientists made a ground-breaking discovery about renewable energy."},{"en":"screen time","pos":"n.","zh":"屏幕使用時間","cat":"日常實用","src":"詞彙練習","sent":"This would be ground-breaking because it would enable people to get screen time in remote locations.","exam":"詞彙練習（technology）選詞填空答案；Warm-up 主題（避免上癮）；日常科技生活高頻詞，寫作議論常用。","err":"screen time 分兩字寫，不可數；「屏幕時間過長」是 sky-high / excessive screen time；勿寫 screentime。","coll":"sky-high screen time; reduce screen time; daily screen time","ex1":"It's no wonder everyone has sky-high screen time these days - screens are all over the place!","ex2":"Parents are worried about their children's increasing screen time."},{"en":"gadget","pos":"n.","zh":"小型電子器材；小玩意","cat":"日常實用","src":"Text 2","sent":"Consider the harm already caused by mere gadgets: one recent study found that 70% of people thought their smartphones frequently interfered with their relationships.","exam":"Text 2 語境詞；日常科技產品詞；閱讀理解科技生活題材常見。","err":"gadget 讀音 /ˈɡædʒɪt/，重音在前；指「新奇的小型裝置」，比 device 口語；複數 gadgets。","coll":"a handy gadget; the latest gadgets; tech gadgets","ex1":"Consider the harm already caused by mere gadgets like smartphones.","ex2":"He loves buying the latest gadgets as soon as they hit the shops."},{"en":"appliance","pos":"n.","zh":"（家用）電器","cat":"日常實用","src":"單元評估","sent":"The rise of the Internet of Things (IoT) will ensure that every appliance and gadget in our home is connected to the internet.","exam":"單元評估未來家居題材詞；日常家電詞；閱讀理解細節題（energy-efficient appliances）常見。","err":"拼寫留意 app-li-ance；「家用電器」是 home / household appliances；勿與 applicant（申請人）混淆。","coll":"home appliances; energy-efficient appliances; a kitchen appliance","ex1":"Every appliance and gadget in our home will be connected to the internet.","ex2":"Energy-efficient appliances will become standard, reducing our carbon footprint."},{"en":"register","pos":"v.","zh":"登記；註冊","cat":"口語常用","src":"聽力對話","sent":"Bailey is helping her grandfather register for online banking.","exam":"聽力任務（online banking registration）高頻動詞；詞形轉換考 register（v.）→ registration（n.）；綜合任務填表格必用。","err":"「登記／註冊……」是 register for sth，介詞用 for（register for online banking）；名詞 registration，勿寫 registeration。","coll":"register for; online registration; the registration form","ex1":"Bailey helped her grandfather register for online banking.","ex2":"You need to fill in the online registration form to open an account."},{"en":"occupation","pos":"n.","zh":"職業","cat":"口語常用","src":"聽力對話","sent":"As for occupation, you're retired, obviously. So let me just enter 'retired' for this field.","exam":"聽力任務填表格情境詞；日常表格及自我介紹常用；與 job / career 同義辨析屬詞彙題。","err":"拼寫留意雙 c 單 p（oc-cu-pa-tion）；填表格時 occupation 一欄指「職業」；比 job 正式。","coll":"one's occupation; occupation field; state your occupation","ex1":"As for occupation, you're retired, so I'll just enter 'retired'.","ex2":"Please write your name, age and occupation on the form."},{"en":"convenient","pos":"adj.","zh":"方便的；便利的","cat":"口語常用","src":"聽力對話","sent":"Personally I want to set up online banking mainly because it's convenient.","exam":"聽力任務原因選項答案（because it's convenient）；日常會話高頻形容詞；詞形轉換考 convenient（adj.）→ convenience（n.）。","err":"convenient 形容事物方便，不用來形容人（勿說 I am convenient）；「對某人方便」是 convenient for sb。","coll":"it's convenient; convenient for; a convenient time","ex1":"I want to set up online banking mainly because it's convenient.","ex2":"Managing your account online is much more convenient than queuing at the bank."},{"en":"time-consuming","pos":"adj.","zh":"耗時的","cat":"口語常用","src":"聽力對話","sent":"It's very time-consuming waiting in a long line to get something done to your account.","exam":"聽力對話評價用詞；日常會話及寫作描述效率問題常用；與 convenient 對比屬詞彙辨析。","err":"time-consuming 用連字號連寫；形容「花很多時間的事」，勿形容人；勿寫 time-consumed。","coll":"very time-consuming; a time-consuming task; time-consuming and tedious","ex1":"It's very time-consuming waiting in a long line at the bank.","ex2":"Filling in the forms by hand is a time-consuming task."},{"en":"password","pos":"n.","zh":"密碼","cat":"日常實用","src":"聽力對話","sent":"It says here that your password must contain upper case and lower case letters, numbers and symbols.","exam":"聽力任務填空情境詞；日常網上帳戶場景高頻詞；聽力拼寫／符號辨識題常考。","err":"password 連寫一字；「設定密碼」是 set up / create a password；「大小寫字母」是 upper case and lower case letters。","coll":"set a password; a strong password; enter your password","ex1":"Your password must contain upper case and lower case letters, numbers and symbols.","ex2":"Remember to write down your password in case you forget it."}],"phrases":[{"phrase":"a double-edged sword","zh":"雙刃劍（利弊並存的事物）","type":"課文短語","sent":"Algorithms can be a double-edged sword, and we must be mindful of how they impact the way we think and act.","note":"比喻「有利也有弊」的事物；常說 sth is a double-edged sword；議論文分析科技利弊時的萬用比喻。","ex":"Artificial intelligence is a double-edged sword because, despite being great for productivity, it could cost many people their jobs."},{"phrase":"all over the place","zh":"到處都是；四處散佈","type":"口語短語","sent":"Algorithms all over the place: are they friends or foes?","note":"口語化，形容某物「無處不在」；亦可形容「雜亂無章」（my notes are all over the place）；語境決定褒貶。","ex":"It's no wonder everyone has sky-high screen time these days - screens are all over the place!"},{"phrase":"friend or foe","zh":"是敵是友","type":"寫作句式","sent":"Algorithms all over the place: are they friends or foes?","note":"foe 是「敵人」的書面用語；常以問句形式引出兩面討論（Is it a friend or foe?），適合議論文標題或引言。","ex":"We were debating in school today whether big tech is our friend or foe."},{"phrase":"reap the benefits","zh":"獲益；收穫好處","type":"課文短語","sent":"When we finally achieve that, we will know we are truly reaping their benefits.","note":"reap 本義「收割」，比喻「得到回報」；常搭配 reap the benefits of sth；議論文正面論點常用。","ex":"Travellers are reaping the benefits of the airport's new facial recognition system, which has made passport checks hassle-free."},{"phrase":"be careful what you wish for","zh":"小心你的願望（可能會成真）","type":"口語短語","sent":"Be careful what you wish for, though.","note":"諺語，提醒「願望成真未必是好事」；主語隨人變化（be careful what they wish for）；議論文提出警示時實用。","ex":"People who think AIs would make fairer leaders than humans should be careful what they wish for - many will be just as biased as their creators."},{"phrase":"(whether you) like it or not","zh":"無論你喜歡與否","type":"寫作句式","sent":"The cyborgs are coming, like it or not.","note":"置句首或句末，強調「事情無可改變」；like it or not 為簡略式；議論文強調不可逆趨勢時實用。","ex":"At the end of the day, artificial intelligence is the future of work whether you like it or not."},{"phrase":"cause a stir","zh":"引起轟動；引起哄動","type":"課文短語","sent":"This success has unsurprisingly caused quite a stir in the art world.","note":"stir 此處是名詞「騷動」；常說 cause quite a stir；描述新事物引起關注時常用，介詞用 in（in the art world）。","ex":"The tech company's new AI-powered search engine caused a stir when it was first launched."},{"phrase":"change one's tune","zh":"改變態度／說法；改變立場","type":"課文短語","sent":"This new breakthrough, however, might cause them to change their tune.","note":"比喻「態度或看法轉變」；one's 隨主語變化（change his / their tune）；記敘及議論描述態度轉變時實用。","ex":"Betty often used to praise social media but she changed her tune when she realized how much it was distracting her from her studies."},{"phrase":"come in handy","zh":"派得上用場；很有用","type":"口語短語","sent":"Writing bots can come in handy too.","note":"口語常用，等於 be useful；handy 前不加 the；描述工具或技能實用時常用。","ex":"Cloud storage comes in handy when you want to access your files from another device."},{"phrase":"doom and gloom","zh":"悲觀絕望（的論調）","type":"課文短語","sent":"Though all this has made some people worry about their jobs, it does not have to be all doom and gloom.","note":"固定搭配，指「一片悲觀」；常說 all doom and gloom；議論文讓步或反駁悲觀論調時實用。","ex":"Isabel was tired of all the doom and gloom about the future of AI, and reminded her friends that most technology is controversial at first."},{"phrase":"hold off on sth","zh":"暫緩；押後（做某事）","type":"課文短語","sent":"In other words, artists can hold off on panicking - for now.","note":"後接名詞或動名詞（hold off on buying / panicking）；介詞用 on；表示「暫時不做某事」。","ex":"I think you should hold off on buying a robot vacuum cleaner until you've done your research."},{"phrase":"in other words","zh":"換句話說","type":"寫作句式","sent":"In other words, artists can hold off on panicking - for now.","note":"置句首並加逗號，用於改述或總結前句；等於 to put it differently；議論文解釋論點的過渡語。","ex":"In other words, teachers don't need to worry about being replaced by computers anytime soon."},{"phrase":"in the long run","zh":"從長遠來看","type":"寫作句式","sent":"In the long run, new tools are generally a good thing.","note":"置句首並加逗號，表示「長遠而言」；反義是 in the short term；議論文權衡長短期影響時實用。","ex":"In the long run, our increasing dependence on technology could have a negative effect on our health."},{"phrase":"in the shadow of sb/sth","zh":"活在……的陰影下；相形見絀","type":"課文短語","sent":"It's essentially what human artists do: they forge their own style in the shadow of their predecessors.","note":"比喻「被更出色的人事物比下去」；常說 live in the shadow of sb；記敘及議論描述壓力或比較時實用。","ex":"Thanks to the massive success of the pacemaker she designed, Maddie was no longer living in the shadow of her genius brother."},{"phrase":"jump for joy","zh":"欣喜若狂；高興得跳起來","type":"日常表達","sent":"(改編) The whole team jumped for joy when their invention finally worked.","note":"口語慣用語，形容「非常高興」；jump 後接 for joy；描述喜悅情緒時生動實用。","ex":"Ken jumped for joy when he found out his coding app had been downloaded a million times."},{"phrase":"the jury's out (on sth)","zh":"尚無定論；仍有爭議","type":"口語短語","sent":"We might one day be able to ring people and browse the web with our own bodies. The jury's out on whether that's cool or creepy.","note":"口語慣用語，指「仍未有結論」；常說 the jury's still out on sth；表達對爭議事物持保留態度時實用。","ex":"The jury's out on whether social media does more harm than good to teenagers."},{"phrase":"Sorry, I didn't quite catch that","zh":"抱歉，我沒聽清楚","type":"口語短語","sent":"Sorry, I didn't quite catch that. Could you say it again?","note":"禮貌請對方重複的口語句式；catch 此處指「聽清楚」；口試及日常電話溝通請求重複時實用。","ex":"Sorry, I didn't quite catch that - could you repeat your email address more slowly?"}]},{"key":"3A_U4","form":"F3","book":"3A","num":4,"theme":"Off to the future","theme_zh":"邁向未來","words":[{"en":"astronaut","pos":"n.","zh":"太空人；宇航員","cat":"核心詞彙","src":"Text 1","sent":"Given the immense challenges and unpredictable circumstances involved in space travel, only the best of the best can become astronauts.","exam":"全單元核心主題詞；詞彙練習及單元評估選詞填空答案；閱讀理解太空探索題材必見。","err":"拼寫 astro-（星）+ naut（航行者），易漏字母；「成為太空人」是 become an astronaut；勿與 astronomer（天文學家）混淆。","coll":"become an astronaut; astronaut training; a highly-decorated astronaut","ex1":"Only the best of the best can become astronauts.","ex2":"Even Dove, the most highly-decorated astronaut on the planet, was not told why the war had started."},{"en":"spacecraft","pos":"n.","zh":"太空船；宇宙飛船","cat":"核心詞彙","src":"詞彙練習","sent":"Your spacecraft was invented two years ago - It's the best of its kind!","exam":"詞彙練習（space exploration）及單元評估選詞填空答案；閱讀理解太空題材高頻詞。","err":"spacecraft 連寫一字，單複數同形（one spacecraft, two spacecraft）；與 spaceship 近義可互換。","coll":"a spacecraft; fly a spacecraft; an unmanned spacecraft","ex1":"Merely landing on Mars is difficult, even for an unmanned spacecraft without any passengers.","ex2":"I would love to take a ride in a spacecraft one day."},{"en":"solar system","pos":"n.","zh":"太陽系","cat":"核心詞彙","src":"Text 1","sent":"The objective of Dove's current solo mission was to ask other intelligent civilizations in the solar system for humanitarian aid.","exam":"詞彙練習（celestial bodies）及單元評估選詞填空答案；閱讀理解天體題材主題詞。","err":"solar system 分兩字寫；solar（太陽的）由 sun 而來，拼寫非 solor；「太陽系」定冠詞常用 the solar system。","coll":"the solar system; planets in the solar system; another solar system","ex1":"The mission was to ask other civilizations in the solar system for aid.","ex2":"He is curious about what is outside of our solar system."},{"en":"galaxy","pos":"n.","zh":"星系；銀河系","cat":"核心詞彙","src":"詞彙練習","sent":"All the major civilizations in the Milky Way galaxy had blacklisted Earthlings years ago for being a cruel and self-destructive species.","exam":"詞彙練習（celestial bodies）選詞填空答案；閱讀理解天體題材詞；詞形轉換考 galaxy（n.）→ galactic（adj.）。","err":"galaxy 複數 galaxies（y→ies）；「銀河系」是 the Milky Way galaxy；勿與 gallery（畫廊）混淆。","coll":"the Milky Way galaxy; across the galaxy; a distant galaxy","ex1":"All the major civilizations in the Milky Way galaxy had blacklisted Earthlings.","ex2":"Evan had searched all over the galaxy but there was no sign of Destiny Lo."},{"en":"universe","pos":"n.","zh":"宇宙","cat":"核心詞彙","src":"Text 1","sent":"Our terrestrial home is one of the very few habitable places in the vast reaches of the universe.","exam":"詞彙練習（celestial bodies）語境詞；閱讀理解天體題材主題詞；詞形轉換考 universe（n.）→ universal（adj.）。","err":"universe 讀音 /ˈjuːnɪvɜːs/；「在宇宙中」是 in the universe；勿與 university（大學）混淆。","coll":"the universe; the vast universe; explore the universe","ex1":"Our terrestrial home is one of the very few habitable places in the vast universe.","ex2":"It would be a strange twist of fate for humans to be the only advanced species in the universe."},{"en":"orbit","pos":"v. / n.","zh":"環繞（軌道）運行；軌道","cat":"核心詞彙","src":"詞彙練習","sent":"As Dove orbited the planet of the last intelligent civilization on her list, she couldn't help but feel bitter.","exam":"詞彙練習（space exploration）選詞填空答案；詞形轉換考 orbit（v./n.）；閱讀理解太空題材動詞。","err":"orbit 作動詞直接接賓語（orbit Earth，不加 around）；作名詞「進入軌道」是 go into orbit。","coll":"orbit the Earth; go into orbit; in orbit","ex1":"As Dove orbited the planet, she couldn't help but feel bitter.","ex2":"It blew Stacy's mind that she was about to orbit Earth while piloting her own spacecraft."},{"en":"atmosphere","pos":"n.","zh":"大氣層","cat":"核心詞彙","src":"詞彙練習","sent":"Earth's atmosphere had become too toxic for human life.","exam":"詞彙練習（celestial bodies）及單元評估選詞填空答案；一詞兩義（U2 指「氣氛」，本單元指「大氣層」）是閱讀理解常考辨析。","err":"atmosphere 此處指「大氣層」，與 U2「氣氛」義不同，須按語境判斷；拼寫留意 atmos-phere。","coll":"the Earth's atmosphere; a toxic atmosphere; enter the atmosphere","ex1":"Earth's atmosphere had become too toxic for human life.","ex2":"The spacecraft burned up as it re-entered the atmosphere."},{"en":"mission","pos":"n.","zh":"任務；使命","cat":"核心詞彙","src":"Text 1","sent":"The objective of Dove's current solo mission was to ask other intelligent civilizations in the solar system for humanitarian aid.","exam":"詞彙練習（space exploration）語境詞；閱讀理解太空題材高頻詞；solo mission（單人任務）為固定搭配。","err":"「執行任務」是 go on / carry out a mission；「單人任務」是 a solo mission；勿與 emission（排放）混淆。","coll":"a solo mission; a space mission; carry out a mission","ex1":"The Soviet Union sent a woman to space on a solo mission.","ex2":"Engineers are working on solving the immense challenges of a mission to build a space base on Mars."},{"en":"exploration","pos":"n.","zh":"探索；勘探","cat":"核心詞彙","src":"詞彙練習","sent":"World leaders had sworn to keep the cause a secret and focus instead on space exploration.","exam":"詞彙練習（space exploration）選詞填空答案；全單元主題詞；詞形轉換考 explore（v.）→ exploration（n.）→ explorer（n.）。","err":"拼寫 explor-ation（非 exploreation，去 e 加 -ation）；「太空探索」是 space exploration。","coll":"space exploration; deep-sea exploration; exploration of space","ex1":"World leaders decided to focus on space exploration.","ex2":"This text details some of the advancements made in space exploration."},{"en":"navigation","pos":"n.","zh":"導航；航行","cat":"核心詞彙","src":"詞彙練習","sent":"And you have excellent navigation abilities. You will survive.","exam":"詞彙練習（space exploration）選詞填空答案；聽力（robot guide dog）navigation map 語境詞；詞形轉換考 navigate（v.）→ navigation（n.）。","err":"拼寫 navi-ga-tion；動詞是 navigate；「導航系統／地圖」是 a navigation system / map。","coll":"navigation abilities; a navigation map; a navigation system","ex1":"You have excellent navigation abilities, so you will survive.","ex2":"There are sensors and a navigation map installed in the robot guide dog."},{"en":"uninhabitable","pos":"adj.","zh":"不適合居住的","cat":"考試重點詞","src":"Text 2","sent":"As you know, Earth is almost uninhabitable. The relentless increases in its surface temperature will soon turn it into an inferno.","exam":"Text 2 及詞彙練習選詞填空答案；詞形轉換考 inhabit（v.）→ habitable ↔ uninhabitable（un- + habit- + -able）；閱讀理解前綴詞族考點。","err":"un- + habit + -able 三部分，拼寫長易錯；反義是 habitable（適合居住的）；勿與 uninhabited（無人居住的）混淆——前者不能住，後者只是沒人住。","coll":"become uninhabitable; an uninhabitable wasteland; almost uninhabitable","ex1":"Half a century had passed since the Earth became uninhabitable due to a nuclear war.","ex2":"Earth is almost uninhabitable and will soon turn into an inferno."},{"en":"habitable","pos":"adj.","zh":"適合居住的","cat":"核心詞彙","src":"Text 1","sent":"It was considered the most habitable of the known blue planets in the universe and had the cleanest air, water, and food.","exam":"詞彙練習（future of humanity）選詞填空答案；詞形轉換考 habit → habitat → habitable；閱讀理解星球宜居題材詞。","err":"habitable（適合居住的）與 inhabitable（同義，適合居住）易混——兩者其實同義；反義才是 uninhabitable；拼寫 habit + -able。","coll":"a habitable planet; the most habitable; habitable settlements","ex1":"Earth was considered the most habitable of the known blue planets.","ex2":"Our terrestrial home is one of the very few habitable places in the universe."},{"en":"colony","pos":"n.","zh":"殖民地；聚居地","cat":"核心詞彙","src":"Text 1","sent":"Or we could all live in a colony in another solar system!","exam":"詞彙練習（future of humanity）選詞填空答案；閱讀理解太空移居題材詞；詞形轉換考 colony（n.）→ colonize（v.）→ colonial（adj.）。","err":"colony 複數 colonies（y→ies）；「太空殖民地」是 a space colony；settling on another planet as part of a space colony。","coll":"a space colony; a colony on Mars; settle in a colony","ex1":"Or we could all live in a colony in another solar system!","ex2":"Maybe I'll just wait until we construct a colony on Mars."},{"en":"civilization","pos":"n.","zh":"文明","cat":"核心詞彙","src":"Text 2","sent":"For centuries and millennia human civilization had been going from breakthrough to breakthrough and becoming stronger, smarter, and kinder with each new generation.","exam":"詞彙練習（future of humanity）選詞填空答案；單元評估閱讀高頻詞；詞形轉換考 civilize（v.）→ civilization（n.）→ civil（adj.）。","err":"拼寫 civil-iza-tion（英式亦作 civilisation）；「人類文明」是 human civilization；勿漏中間的 -iza-。","coll":"human civilization; an advanced civilization; the rise of civilization","ex1":"Human civilization had been going from breakthrough to breakthrough.","ex2":"The spread of a lethal fungus had destroyed civilization."},{"en":"teleportation","pos":"n.","zh":"瞬間移動；遠距傳送","cat":"核心詞彙","src":"Text 3","sent":"It was common for families to use teleportation to travel between planets - but for most, Earth was still home.","exam":"詞彙練習（future of humanity）及 Text 3 主題詞；閱讀理解未來科技題材詞；詞形轉換考 teleport（v.）→ teleportation（n.）。","err":"tele-（遠）+ port（運送）+ -ation，拼寫長易錯；動詞是 teleport；屬科幻概念詞。","coll":"use teleportation; teleportation technology; teleport between planets","ex1":"It was common for families to use teleportation to travel between planets.","ex2":"Some futurologists believe teleportation may be a reality as soon as 2080."},{"en":"deploy","pos":"v.","zh":"部署；調配","cat":"考試重點詞","src":"詞彙練習","sent":"The only way we can survive is by deploying our best and brightest astronaut - that's you!","exam":"詞彙練習（space exploration）選詞填空答案；Text 3 tropes commonly deployed 語境詞；詞形轉換考 deploy（v.）→ deployment（n.）。","err":"deploy 直接接賓語（deploy astronauts / troops）；名詞是 deployment；勿與 destroy（破壞）拼寫混淆。","coll":"deploy astronauts; deploy robots; deploy a strategy","ex1":"The only way we can survive is by deploying our best astronaut.","ex2":"We will deploy robotic assistants to help with house chores and office tasks."},{"en":"settlement","pos":"n.","zh":"聚居地；定居點","cat":"核心詞彙","src":"Text 1","sent":"In addition, they were now a multi-planetary species and had created settlements on planets that were previously uninhabited.","exam":"詞彙練習（future of humanity）選詞填空答案；閱讀理解太空移居題材詞；詞形轉換考 settle（v.）→ settlement（n.）→ settler（n.）。","err":"settlement 拼寫留意雙 t、-ement 結尾；「建立聚居地」是 build / create settlements；勿與 statement（陳述）混淆。","coll":"build settlements; a human settlement; settlements on other planets","ex1":"Humans had created settlements on planets that were previously uninhabited.","ex2":"Those tasked with building settlements on other planets will need excellent problem-solving skills."},{"en":"candidate","pos":"n.","zh":"候選人；申請者","cat":"核心詞彙","src":"詞彙練習","sent":"People often ask me how I managed to become an astronaut when it's such a competitive field that attracts thousands of highly-qualified candidates every year.","exam":"詞彙練習（astronaut training）及單元評估選詞填空答案；閱讀理解選拔題材高頻詞。","err":"拼寫 can-di-date，中間 d 常被漏（candidate 非 canidate）；「合資格的申請者」是 a qualified candidate。","coll":"a qualified candidate; a strong candidate; candidates for the job","ex1":"It's a competitive field that attracts thousands of highly-qualified candidates every year.","ex2":"Only the most determined and ambitious candidates are selected by NASA."},{"en":"competitive","pos":"adj.","zh":"競爭激烈的；有競爭力的","cat":"考試重點詞","src":"詞彙練習","sent":"People often ask me how I managed to become an astronaut when it's such a competitive field.","exam":"詞彙練習（astronaut training）及單元評估選詞填空答案；詞形轉換考 compete（v.）→ competition（n.）→ competitive（adj.）→ competitor（n.）。","err":"拼寫 com-pet-i-tive；「競爭激烈的領域」是 a competitive field；勿與 competent（能幹的）混淆。","coll":"a competitive field; highly competitive; competitive sports","ex1":"It's such a competitive field that it attracts thousands of applicants.","ex2":"I imagine it's very competitive to become one because many applicants are chasing one place."},{"en":"demanding","pos":"adj.","zh":"要求高的；費力的","cat":"考試重點詞","src":"詞彙練習","sent":"These programs can be very demanding for students, but if you stick to them, you will be rewarded with many exciting career opportunities.","exam":"詞彙練習（astronaut training）及單元評估選詞填空答案；Write-more（demanding, to say the least）；詞形轉換考 demand（v./n.）→ demanding（adj.）。","err":"demanding（要求高的，形容任務／工作）與 demanded 不同；「對……要求高」是 demanding for sb / on sb；勿與 demeaning（貶低的）混淆。","coll":"a demanding job; physically demanding; very demanding for students","ex1":"These programs can be very demanding for students.","ex2":"Astronaut training is demanding - you have to learn to live and work in space."},{"en":"determination","pos":"n.","zh":"決心；毅力","cat":"核心詞彙","src":"Text 1","sent":"That's what blows my mind about these people - their strong determination.","exam":"詞彙練習（astronaut training）選詞填空答案；Values & Attitudes（Resilience）呼應；詞形轉換考 determine（v.）→ determined（adj.）→ determination（n.）。","err":"拼寫 de-ter-mi-na-tion；「堅定的決心」是 strong determination；形容詞 determined（下定決心的）。","coll":"strong determination; sheer determination; determination to succeed","ex1":"That's what blows my mind about these people - their strong determination.","ex2":"I owe my career to two things: luck and my stubborn determination to live my dream."},{"en":"ambition","pos":"n.","zh":"抱負；志向","cat":"高頻基礎詞","src":"詞彙練習","sent":"But the strength of my ambition and determination helped me to get my fitness up.","exam":"詞彙練習（astronaut training）及單元評估選詞填空答案；詞形轉換考 ambition（n.）→ ambitious（adj.）；寫作勵志題材高頻詞。","err":"拼寫 am-bi-tion；形容詞 ambitious（有抱負的）；「懷有抱負」是 have an ambition to do sth。","coll":"a strong ambition; ambition and determination; an ambition to do sth","ex1":"The strength of my ambition and determination helped me get my fitness up.","ex2":"You need to have a lot of ambition to even try to become an astronaut."},{"en":"planet","pos":"n.","zh":"行星；星球","cat":"高頻基礎詞","src":"Text 1","sent":"The idea of flying a spaceship and walking on other planets is exciting.","exam":"全單元高頻基礎詞；詞彙練習及單元評估常見；詞形轉換考 planet（n.）→ planetary（adj.）。","err":"planet（行星）與 plant（植物）只差一個字母，拼寫易混；「其他星球」是 other planets；「這個星球」指地球 the planet。","coll":"other planets; a habitable planet; planet Earth","ex1":"The idea of walking on other planets is exciting.","ex2":"The planet, once feared to be a lost cause, was flourishing."},{"en":"scientist","pos":"n.","zh":"科學家","cat":"高頻基礎詞","src":"Text 2","sent":"A hologram of the planet's chief scientist appeared in the room.","exam":"Text 2 詞彙填空原題答案（The scientist was awarded a Nobel Prize）；全單元高頻基礎詞；詞形轉換考 science → scientist → scientific。","err":"拼寫 sci-en-tist（sc 發 /s/）；「首席科學家」是 chief scientist；勿與 scientific（科學的，形容詞）混淆。","coll":"a chief scientist; a team of scientists; a Nobel Prize scientist","ex1":"A hologram of the planet's chief scientist appeared in the room.","ex2":"Scientists are working hard to figure out how technology can create more fresh water."},{"en":"generation","pos":"n.","zh":"一代（人）；世代","cat":"高頻基礎詞","src":"Text 1","sent":"Human civilization had been going from breakthrough to breakthrough and becoming stronger, smarter, and kinder with each new generation.","exam":"詞彙練習（future of humanity）及單元評估選詞填空答案；詞形轉換考 generate（v.）→ generation（n.）；閱讀理解題材詞。","err":"「每一代」是 each new generation；「下一代」是 the next generation；勿與 generator（發電機）混淆。","coll":"each new generation; the next generation; future generations","ex1":"Human civilization became kinder with each new generation.","ex2":"Maybe we'll construct a colony on Mars in our generation."},{"en":"challenge","pos":"n. / v.","zh":"挑戰；艱難的任務","cat":"高頻基礎詞","src":"Text 1","sent":"Given the immense challenges and unpredictable circumstances involved in space travel, only the best of the best can become astronauts.","exam":"全單元高頻詞（immense challenges）；閱讀及寫作太空題材常用；詞形轉換考 challenge（n./v.）→ challenging（adj.）。","err":"「面對挑戰」是 face / meet a challenge；形容詞 challenging（有挑戰性的）；immense challenges（巨大挑戰）為固定搭配。","coll":"immense challenges; face a challenge; a challenging task","ex1":"Only the best of the best can handle the immense challenges of space travel.","ex2":"The challenges of landing on and exploring another world are still immense."},{"en":"desolate","pos":"adj.","zh":"荒涼的；杳無人煙的","cat":"考試重點詞","src":"Text 2","sent":"Now, in the year 2239, there was just a dry, desolate wasteland.","exam":"Text 2 詞彙填空原題答案（a desolate wasteland with no sign of life）；閱讀理解場景描寫詞；記敘文營造氣氛高階形容詞。","err":"desolate 讀音 /ˈdɛsələt/，重音在前；形容「荒涼、空無一物」；勿與 desperate（絕望的）拼寫混淆。","coll":"a desolate wasteland; a desolate landscape; desolate and empty","ex1":"In the year 2239, there was just a dry, desolate wasteland.","ex2":"The earthquake turned this once-beautiful park into a desolate wasteland with no sign of life."},{"en":"perish","pos":"v.","zh":"喪生；死亡","cat":"考試重點詞","src":"Text 2","sent":"If he stayed there for more than fifteen minutes, he too would perish.","exam":"Text 2 記敘文高階動詞；Creative Use of English（Other ways to express「die」）；閱讀理解語境詞義推斷。","err":"perish 是不及物動詞（sb/sth perishes），比 die 正式書面；勿與 punish（懲罰）拼寫混淆。","coll":"perish in a disaster; would perish; perishable goods","ex1":"If he stayed there for more than fifteen minutes, he too would perish.","ex2":"Without water, all life on the planet would soon perish."},{"en":"relentless","pos":"adj.","zh":"無情的；持續不斷的","cat":"考試重點詞","src":"Text 2","sent":"The relentless increases in its surface temperature will soon turn it into an inferno.","exam":"Text 2 閱讀理解高階形容詞；記敘及描寫營造緊張感常用；銜接高中閱讀進階詞。","err":"relentless（持續不減、無情的）由 relent（心軟）+ -less 構成；重音在中（re-LENT-less）；勿與 restless（不安寧的）混淆。","coll":"relentless increases; relentless pressure; a relentless heatwave","ex1":"The relentless increases in surface temperature will soon turn Earth into an inferno.","ex2":"She kept working despite the relentless pressure and long hours."},{"en":"beloved","pos":"adj.","zh":"摯愛的；深受喜愛的","cat":"考試重點詞","src":"Text 2","sent":"Every time Bryn missed his beloved brother, he would play that recording.","exam":"Text 2 詞彙填空原題答案（my most beloved and treasured possession）；閱讀理解語境選詞題；記敘文抒情用詞。","err":"beloved 作定語讀 /bɪˈlʌvɪd/（三音節），須留意；意思是「深愛的」，比 loved 更帶感情；勿與 below 混淆。","coll":"a beloved brother; a beloved classic; beloved by all","ex1":"Every time Bryn missed his beloved brother, he would play that recording.","ex2":"My most beloved and treasured possession is my Most Valuable Player trophy."},{"en":"familiar","pos":"adj.","zh":"熟悉的","cat":"考試重點詞","src":"Text 2","sent":"'You're not moping again, are you?' a familiar voice said.","exam":"Text 2 詞彙填空原題答案（The software interface was familiar to him）；詞形轉換考 familiar（adj.）→ familiarity（n.）；閱讀理解語境選詞題。","err":"「對某人熟悉」是 be familiar to sb（某物為某人所熟悉）；「熟悉某物」是 be familiar with sth，兩個介詞用法易混。","coll":"a familiar voice; be familiar with; look familiar","ex1":"'You're not moping again, are you?' a familiar voice said.","ex2":"The software interface was familiar to him, as he had used similar programs before."},{"en":"outlive","pos":"v.","zh":"比……活得長；存活過（某事物）","cat":"考試重點詞","src":"Text 1","sent":"Do we want to outlive the sun - and maybe even the moon?","exam":"詞彙練習（future of humanity）選詞填空答案；詞形轉換考 out- 前綴詞族（outlive, outnumber, outrun）；閱讀理解構詞題。","err":"out- 前綴表「超過、勝過」；outlive sth 指「比……存在得久」；勿逐字理解，非「活在外面」。","coll":"outlive the sun; outlive one's usefulness; outlive expectations","ex1":"Do we want to outlive the sun - and maybe even the moon?","ex2":"Some ancient buildings have outlived the civilizations that built them."},{"en":"life expectancy","pos":"n.","zh":"預期壽命；平均壽命","cat":"核心詞彙","src":"Text 1","sent":"Humans also had the longest life expectancy of any highly intelligent creature and now lived to a healthy 800 years.","exam":"詞彙練習（future of humanity）選詞填空答案；閱讀理解人類未來題材詞組；銜接高中人口／健康議題。","err":"life expectancy 分兩字寫；expectancy 由 expect 變化而來，拼寫非 expectency；「壽命長」是 a long life expectancy。","coll":"a long life expectancy; average life expectancy; increase life expectancy","ex1":"Humans had the longest life expectancy of any intelligent creature, living to 800 years.","ex2":"Better healthcare has greatly increased the average life expectancy."},{"en":"renewable","pos":"adj.","zh":"可再生的","cat":"核心詞彙","src":"單元評估","sent":"We will rely heavily on renewable energy such as solar, wind and hydroelectricity.","exam":"單元評估閱讀及廣告填空重點（renewable sources including solar, wind and hydro）；詞形轉換考 renew（v.）→ renewable（adj.）；環保題材高頻詞。","err":"renewable energy（可再生能源）是固定搭配；反義是 non-renewable；拼寫 re-new-able。","coll":"renewable energy; renewable sources; renewable resources","ex1":"We will rely heavily on renewable energy such as solar, wind and hydroelectricity.","ex2":"Renewable sources including solar and wind will power our future homes."},{"en":"sustainability","pos":"n.","zh":"可持續性；永續發展","cat":"核心詞彙","src":"聽力／綜合","sent":"Welcome to Love Our Planet, a podcast about environmental issues, green technology and sustainability.","exam":"綜合任務（future of water）主題詞；Writing Task（sustainability issues）核心詞；詞形轉換考 sustain（v.）→ sustainable（adj.）→ sustainability（n.），銜接DSE環保議題。","err":"拼寫長（sus-tain-a-bil-ity），默書易錯；形容詞 sustainable（可持續的）；環保議論寫作萬用高階詞。","coll":"environmental sustainability; sustainability issues; promote sustainability","ex1":"This podcast is about environmental issues, green technology and sustainability.","ex2":"We should reflect on sustainability issues regarding our water resources."},{"en":"conservation","pos":"n.","zh":"保育；節約","cat":"考試重點詞","src":"聽力／綜合","sent":"Also, let's not forget that water conservation is as important as water generation.","exam":"綜合任務（future of water）關鍵詞；詞形轉換考 conserve（v.）→ conservation（n.）；環保題材寫作高頻詞。","err":"conservation（保育／節約）與 conversation（對話）只差一個字母，拼寫與讀音都極易混；「節約用水」是 water conservation。","coll":"water conservation; energy conservation; wildlife conservation","ex1":"Water conservation is as important as water generation.","ex2":"The campaign promotes energy conservation to fight climate change."},{"en":"panoramic","pos":"adj.","zh":"全景的；廣闊的","cat":"考試重點詞","src":"單元評估","sent":"Drones patrol our houses and give us a panoramic view of our surroundings.","exam":"單元評估閱讀同義詞題原題：Find a word in paragraph 5 with a similar meaning to 'wide'（答案 panoramic）；閱讀理解同義替換題。","err":"panoramic 由 panorama（全景）變化而來；「全景視野」是 a panoramic view；重音在 -ram-（pano-RAM-ic）。","coll":"a panoramic view; panoramic windows; a panoramic photo","ex1":"Drones give us a panoramic view of our surroundings.","ex2":"The hotel room offered a panoramic view of the harbour."},{"en":"prevalent","pos":"adj.","zh":"普遍的；盛行的","cat":"考試重點詞","src":"單元評估","sent":"Virtual and Augmented Reality will also become prevalent in our homes.","exam":"單元評估閱讀原文詞；科技普及題材高階形容詞；詞形轉換考 prevail（v.）→ prevalent（adj.）→ prevalence（n.），銜接高中閱讀。","err":"prevalent（普遍存在的）重音在前（PREV-a-lent）；「變得普遍」是 become prevalent；勿與 relevant（相關的）混淆。","coll":"become prevalent; widely prevalent; a prevalent problem","ex1":"Virtual and Augmented Reality will become prevalent in our homes.","ex2":"Smartphone addiction has become increasingly prevalent among teenagers."},{"en":"evolve","pos":"v.","zh":"演變；逐步發展","cat":"考試重點詞","src":"單元評估","sent":"We look forward to seeing our homes transform as human civilization continues to evolve.","exam":"單元評估閱讀原文詞；詞形轉換考 evolve（v.）→ evolution（n.）→ evolutionary（adj.）；科技發展題材高頻動詞。","err":"evolve 多作不及物（sth evolves）或 evolve into sth；名詞 evolution；勿與 involve（涉及）拼寫混淆。","coll":"continue to evolve; evolve into; evolve over time","ex1":"We look forward to seeing our homes transform as civilization continues to evolve.","ex2":"Mobile phones have evolved dramatically over the last few decades."},{"en":"drone","pos":"n.","zh":"無人機","cat":"日常實用","src":"單元評估","sent":"Drones patrol our houses and give us a panoramic view of our surroundings.","exam":"單元評估未來家居及綜合任務（use drones to monitor water use）語境詞；科技生活高頻詞；聽力可能出現。","err":"drone 讀音 /drəʊn/；複數 drones；「用無人機監察」是 use drones to monitor sth；勿與 drown（淹死）混淆。","coll":"use drones; a delivery drone; drones patrol","ex1":"Drones patrol our houses and give us a panoramic view.","ex2":"In some countries, drones are used to collect data about how much water is used in agriculture."},{"en":"carbon footprint","pos":"n.","zh":"碳足跡；碳排放量","cat":"日常實用","src":"單元評估","sent":"Energy-efficient appliances and devices will become standard, ensuring that we reduce our carbon footprint and hence our impact on planet Earth.","exam":"單元評估環保題材詞組；綜合任務及議論寫作環保議題高頻詞，銜接DSE環保寫作。","err":"carbon footprint 分兩字寫；「減少碳足跡」是 reduce one's carbon footprint；比喻對環境的影響，勿逐字理解為腳印。","coll":"reduce one's carbon footprint; a large carbon footprint; lower carbon footprint","ex1":"Energy-efficient appliances ensure that we reduce our carbon footprint.","ex2":"Taking public transport is a simple way to lower your carbon footprint."},{"en":"moisture","pos":"n.","zh":"水分；濕氣","cat":"日常實用","src":"聽力／綜合","sent":"The concept is simple: what you have to do is to convert moisture in the air into water.","exam":"綜合任務（future of water）關鍵詞；閱讀及聽力科學題材詞；詞形轉換考 moist（adj.）→ moisture（n.）。","err":"moisture 讀音 /ˈmɔɪstʃə/；「空氣中的水分」是 moisture in the air；形容詞 moist（潮濕的），勿與 mixture（混合物）混淆。","coll":"moisture in the air; absorb moisture; convert moisture into water","ex1":"What you have to do is to convert moisture in the air into water.","ex2":"The device absorbs moisture from the air and turns it into drinking water."},{"en":"warehouse","pos":"n.","zh":"倉庫","cat":"口語常用","src":"聽力對話","sent":"The warehouse robot is designed to reduce injuries in warehouses.","exam":"聽力任務（robot expo）填空語境詞（warehouse robot）；日常職場詞；聽力細節題常見。","err":"warehouse 連寫一字，複數 warehouses；讀音 /ˈweəhaʊs/；勿與 wherehouse 等錯拼混淆。","coll":"a warehouse robot; a storage warehouse; work in a warehouse","ex1":"The warehouse robot is designed to reduce injuries in warehouses.","ex2":"The goods are stored in a large warehouse near the port."},{"en":"viral","pos":"adj.","zh":"（在網上）瘋傳的","cat":"口語常用","src":"聽力對話","sent":"You may have already watched it since it has gone viral on the internet.","exam":"聽力任務（robot expo）口語詞；固定搭配 go viral；日常網絡文化用語，聽力及寫作社交媒體題材常見。","err":"「（影片）瘋傳」是 go viral，動詞用 go；viral 原義「病毒的」，此處引申「像病毒般擴散」；勿與 virus（n.）混用。","coll":"go viral; a viral video; viral on social media","ex1":"You may have already watched it since it has gone viral on the internet.","ex2":"The funny clip went viral and was shared millions of times overnight."},{"en":"destination","pos":"n.","zh":"目的地","cat":"日常實用","src":"聽力對話","sent":"It can determine the safest path to take to the user's destination.","exam":"聽力任務（robot guide dog）語境詞；日常旅遊及導航題材高頻詞；詞形轉換考 destine（v.）→ destination（n.）。","err":"拼寫 des-ti-na-tion；「前往目的地」是 to one's destination；勿與 destiny（命運）混淆。","coll":"reach a destination; a popular destination; the final destination","ex1":"The robot guide dog can determine the safest path to the user's destination.","ex2":"Japan is a popular travel destination for Hong Kong tourists."},{"en":"sophisticated","pos":"adj.","zh":"精密複雜的；先進的","cat":"考試重點詞","src":"詞彙練習","sent":"I do believe aliens exist but sadly I don't have a very sophisticated answer for you as to why I think that.","exam":"詞彙練習（Word Power: connotations）選詞題；Word Power 教授詞語褒貶連帶意義；閱讀理解及寫作高階形容詞，銜接DSE。","err":"sophisticated 帶正面褒義（精密、成熟），與中性的 complicated（複雜的）連帶意義不同——Word Power 考點；拼寫長，重音在 -phis-。","coll":"a sophisticated system; sophisticated technology; a sophisticated answer","ex1":"I don't have a very sophisticated answer for you as to why I think aliens exist.","ex2":"The spacecraft is fitted with sophisticated navigation technology."},{"en":"resilience","pos":"n.","zh":"韌性；復原力","cat":"考試重點詞","src":"Handbook","sent":"(改編) The story of the two brothers shows great resilience in the face of a dying planet.","exam":"Text 2 Values & Attitudes（Resilience）主題詞；詞形轉換考 resilient（adj.）→ resilience（n.）；記敘文品格描寫及DSE寫作高階詞。","err":"拼寫 re-sil-ience；形容詞 resilient（有韌性的）；指「逆境中復原的能力」，勿與 reliance（依賴）混淆。","coll":"show resilience; great resilience; resilience in the face of","ex1":"The two brothers show great resilience in the face of a dying planet.","ex2":"Her resilience helped her recover quickly from the setback."}],"phrases":[{"phrase":"at the time","zh":"在當時","type":"課文短語","sent":"A group of American women underwent and passed some physical fitness examinations for space travel, but NASA wouldn't consider any women for astronaut positions at the time.","note":"指「過去某一時刻」，常置句末；與 at that time 同義；記敘過去事件時實用，勿與 on time（準時）混淆。","ex":"Neil Armstrong became the first man to walk on the moon in 1969; he was 38 years old at the time."},{"phrase":"blow one's mind","zh":"使某人震驚／驚歎不已","type":"課文短語","sent":"That's what blows my mind about these people - their strong determination.","note":"口語化，形容「極為震撼、驚歎」；one's 隨主語變化（blow my / your mind）；主語為令人驚歎的事物。","ex":"The fact that humans landed on the moon before the internet was even invented blows my mind."},{"phrase":"it's never too late","zh":"永遠不會太遲","type":"寫作句式","sent":"It's never too late to chase the dream of space travel.","note":"勵志句式，後接 to + 原形動詞（it's never too late to do sth）；演講及勵志寫作結尾常用。","ex":"It's never too late to switch careers and enter the exciting world of space travel."},{"phrase":"take sth further","zh":"把……更進一步；深化","type":"課文短語","sent":"Some even take things a step further and study for a space-related degree at university.","note":"常說 take sth a step further；指「在原基礎上更進一步」；描述進一步發展或深化興趣時實用。","ex":"Zoey took her interest in rockets further by studying aerospace engineering at university."},{"phrase":"the best of the best","zh":"最頂尖的一群；精英中的精英","type":"課文短語","sent":"Given the immense challenges and unpredictable circumstances involved in space travel, only the best of the best can become astronauts.","note":"強調「最頂尖」；常說 only the best of the best；描述精英選拔時實用，帶最高級強調意味。","ex":"If you want to go into space, you must be the best of the best academically as well as having a sense of adventure."},{"phrase":"to say nothing of sth","zh":"更不用說……","type":"寫作句式","sent":"Merely landing on Mars is notoriously difficult, even for an unmanned spacecraft - to say nothing of landing and sustaining a human crew.","note":"用於補充「更嚴重／更困難的一點」，後接名詞或動名詞；等於 not to mention；議論加強語氣時實用。","ex":"Getting all the right qualifications to become an astronaut is enormously difficult, to say nothing of the challenging physical fitness requirements that also need to be met."},{"phrase":"come to one's rescue","zh":"前來拯救某人","type":"課文短語","sent":"'Wait for me - I'll come to your rescue.'","note":"one's 隨人變化（come to your / his rescue）；亦作 come to the rescue；記敘文描述救援情節時實用。","ex":"Nia came to Quentin's rescue when his spaceship spontaneously burst into flames in the middle of his spacewalk."},{"phrase":"light years away","zh":"遠在光年之外；相距極遠","type":"課文短語","sent":"'That sure is one weird way to greet your brother who's flown through wormholes to bring you water from light years away.'","note":"字面指「距離數光年」，亦比喻「相差極遠」；科幻題材及誇張比喻時實用。","ex":"Alone, out of fuel and light years away from home, Tristan was in no position to negotiate with the extraterrestrials."},{"phrase":"no sign of sb/sth","zh":"毫無……的蹤影","type":"課文短語","sent":"The cr
