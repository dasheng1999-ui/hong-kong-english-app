<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>波波英語 BoBo English — 中一至中三詞彙訓練</title>
<style>
:root{
  --teal:#0EB5A3; --teal-dk:#0A8E80; --teal-lt:#E0F5F2;
  --coral:#FF7A59; --coral-dk:#E05A3A; --coral-lt:#FFEDE7;
  --ink:#1E3A5C; --ink-lt:#5B7391;
  --cream:#FDF6EC; --card:#FFFFFF;
  --mango:#FFC93F; --mango-dk:#E0A820;
  --berry:#8B7CF6; --berry-dk:#6C5CE0;
  --ok:#0EB5A3; --bad:#FF5A5A; --bad-dk:#D93B3B;
  --line:#EFE5D6; --radius:18px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
#screens{flex:1;min-height:0;display:flex;flex-direction:column}
html,body{height:100%}
body{font-family:"PingFang HK","PingFang TC","Microsoft JhengHei","Noto Sans TC",system-ui,-apple-system,sans-serif;
  background:var(--cream);color:var(--ink);overflow:hidden;user-select:none}
#app{max-width:480px;margin:0 auto;height:100vh;height:100dvh;display:flex;flex-direction:column;position:relative;background:var(--cream)}
.screen{flex:1;min-height:0;display:none;flex-direction:column;overflow-y:auto;overflow-x:hidden;padding-bottom:96px;scroll-padding-bottom:120px}
.screen.active{display:flex}
.screen.no-tab{padding-bottom:0}

/* ===== 3D buttons ===== */
.btn{display:block;width:100%;border:none;cursor:pointer;font-family:inherit;font-weight:800;
  border-radius:16px;padding:15px 18px;font-size:17px;color:#fff;background:var(--teal);
  box-shadow:0 5px 0 var(--teal-dk);transition:transform .07s ease,box-shadow .07s ease,filter .15s;position:relative}
.btn:active{transform:translateY(4px);box-shadow:0 1px 0 var(--teal-dk)}
.btn.coral{background:var(--coral);box-shadow:0 5px 0 var(--coral-dk)}
.btn.coral:active{box-shadow:0 1px 0 var(--coral-dk)}
.btn.mango{background:var(--mango);box-shadow:0 5px 0 var(--mango-dk);color:var(--ink)}
.btn.mango:active{box-shadow:0 1px 0 var(--mango-dk)}
.btn.ghost{background:#fff;color:var(--ink);box-shadow:0 5px 0 var(--line);border:2px solid var(--line)}
.btn.ghost:active{box-shadow:0 1px 0 var(--line)}
.btn.berry{background:var(--berry);box-shadow:0 5px 0 var(--berry-dk)}
.btn.berry:active{box-shadow:0 1px 0 var(--berry-dk)}
.btn:disabled{filter:grayscale(.5) opacity(.55);pointer-events:none}
.btn.small{padding:10px 14px;font-size:15px;border-radius:13px;width:auto;display:inline-block}

/* ===== choice buttons ===== */
.choice{display:block;width:100%;text-align:left;background:#fff;border:2px solid var(--line);
  border-radius:16px;box-shadow:0 4px 0 var(--line);padding:14px 16px;font-size:17px;font-weight:700;color:var(--ink);
  margin-bottom:12px;cursor:pointer;font-family:inherit;transition:transform .07s,box-shadow .07s,background .15s,border-color .15s}
.choice:active{transform:translateY(3px);box-shadow:0 1px 0 var(--line)}
.choice.sel{border-color:var(--teal);background:var(--teal-lt);box-shadow:0 4px 0 var(--teal)}
.choice.right{border-color:var(--ok);background:#E4F8F0;box-shadow:0 4px 0 var(--ok);animation:pop .3s}
.choice.wrong{border-color:var(--bad);background:#FFECEC;box-shadow:0 4px 0 var(--bad);animation:shake .35s}
.choice.dim{opacity:.45;pointer-events:none}

/* ===== letter tiles ===== */
.tiles,.slots{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.tile{min-width:44px;height:50px;padding:0 12px;border-radius:12px;background:#fff;border:2px solid var(--line);
  box-shadow:0 4px 0 var(--line);font-size:22px;font-weight:800;color:var(--ink);cursor:pointer;font-family:inherit;
  transition:transform .07s,opacity .15s}
.tile:active{transform:translateY(3px)}
.tile.used{opacity:.25;pointer-events:none}
.slotrow{min-height:56px;background:var(--teal-lt);border-radius:14px;display:flex;align-items:center;
  justify-content:center;gap:6px;padding:8px;margin-bottom:18px;flex-wrap:wrap;border:2px dashed #9ED9D1}
.slotchar{font-size:26px;font-weight:800;letter-spacing:1px}

/* ===== layout bits ===== */
.pad{padding:20px}
.topbar{display:flex;align-items:center;gap:12px;padding:14px 18px}
.chip{display:flex;align-items:center;gap:5px;font-weight:800;font-size:15px;background:#fff;
  border:2px solid var(--line);border-radius:999px;padding:5px 12px}
.card{background:var(--card);border-radius:var(--radius);border:2px solid var(--line);box-shadow:0 4px 0 var(--line);padding:18px}
h1{font-size:22px;font-weight:900}
h2{font-size:19px;font-weight:900}
.sub{color:var(--ink-lt);font-size:14px;font-weight:600}
.center{text-align:center}

/* progress bar */
.pbarwrap{flex:1;height:14px;background:#EFE5D6;border-radius:999px;overflow:hidden}
.pbar{height:100%;width:0%;background:linear-gradient(90deg,var(--teal),#3BD0BF);border-radius:999px;transition:width .4s cubic-bezier(.22,1,.36,1)}
.quitx{font-size:22px;font-weight:900;color:var(--ink-lt);background:none;border:none;cursor:pointer;padding:4px 8px}

/* feedback banner */
#banner{position:absolute;left:0;right:0;bottom:0;transform:translateY(110%);transition:transform .28s cubic-bezier(.22,1,.36,1);
  background:#E4F8F0;border-top:3px solid var(--ok);padding:18px 20px calc(30px + env(safe-area-inset-bottom));z-index:1000;border-radius:22px 22px 0 0;
  max-height:48vh;overflow-y:auto;overscroll-behavior:contain;touch-action:manipulation}
#banner.show{transform:translateY(0)}
#banner.bad{background:#FFECEC;border-top-color:var(--bad)}
#banner h3{font-size:18px;font-weight:900;margin-bottom:4px}
#banner .tip{font-size:14px;color:var(--ink);margin-top:6px;line-height:1.55;background:rgba(255,255,255,.7);border-radius:10px;padding:8px 10px}
#banner .btn{margin-top:12px}

/* tab bar */
#tabbar{position:absolute;bottom:0;left:0;right:0;background:#fff;border-top:2px solid var(--line);
  display:flex;z-index:30;padding-bottom:env(safe-area-inset-bottom)}
.tab{flex:1;padding:9px 0 7px;text-align:center;border:none;background:none;cursor:pointer;font-family:inherit}
.tab .ico{font-size:22px;display:block;transition:transform .15s}
.tab .lbl{font-size:11px;font-weight:800;color:var(--ink-lt)}
.tab.on .lbl{color:var(--teal)}
.tab.on .ico{transform:scale(1.15)}

/* mascot + animations */
.mascot{animation:bob 2.6s ease-in-out infinite}
.mascot .blink{animation:blink 4.5s infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes blink{0%,94%,100%{transform:scaleY(1)}96%,98%{transform:scaleY(.08)}}
@keyframes pop{0%{transform:scale(1)}45%{transform:scale(1.06)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
@keyframes slidein{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@keyframes fadeup{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes starpop{0%{transform:scale(0) rotate(-30deg)}70%{transform:scale(1.25)}100%{transform:scale(1)}}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:.9}}
.anim-in{animation:slidein .3s cubic-bezier(.22,1,.36,1)}
.fadeup{animation:fadeup .35s ease}

/* word big display */
.bigword{font-size:34px;font-weight:900;letter-spacing:.5px}
.zh-big{font-size:20px;font-weight:800;color:var(--teal-dk)}
.sent{font-size:16px;line-height:1.65;background:#fff;border:2px solid var(--line);border-radius:14px;padding:12px 14px}
.sent b{color:var(--coral);font-weight:900}
.speak{border:none;background:var(--teal-lt);color:var(--teal-dk);border-radius:999px;width:44px;height:44px;
  font-size:20px;cursor:pointer;box-shadow:0 3px 0 #9ED9D1;transition:transform .07s}
.speak:active{transform:translateY(2px)}

/* stars */
.stars{color:var(--mango);font-size:14px;letter-spacing:1px}
.stars .off{color:#E3D9C8}

/* word list */
.wrow{display:flex;align-items:center;gap:10px;background:#fff;border:2px solid var(--line);border-radius:14px;
  padding:10px 14px;margin-bottom:9px;cursor:pointer;box-shadow:0 3px 0 var(--line)}
.wrow:active{transform:translateY(2px);box-shadow:0 1px 0 var(--line)}
.wrow .w{font-weight:900;font-size:16px}
.wrow .m{font-size:13px;color:var(--ink-lt);font-weight:600}
.cattag{font-size:10px;font-weight:800;color:#fff;border-radius:6px;padding:2px 6px;white-space:nowrap}

/* modal */
#modal{position:absolute;inset:0;background:rgba(30,58,92,.45);display:none;align-items:flex-end;z-index:50}
#modal.show{display:flex}
#modal .sheet{background:var(--cream);width:100%;max-height:82%;overflow-y:auto;border-radius:24px 24px 0 0;padding:22px 20px 30px;animation:fadeup .25s ease}
.kv{margin-bottom:10px;font-size:14px;line-height:1.6}
.kv .k{font-weight:900;color:var(--teal-dk);font-size:13px}

/* unit picker */
.ugrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.ucard{background:#fff;border:2px solid var(--line);border-radius:16px;box-shadow:0 4px 0 var(--line);padding:14px;cursor:pointer;transition:transform .07s}
.ucard:active{transform:translateY(3px);box-shadow:0 1px 0 var(--line)}
.ucard.cur{border-color:var(--teal);box-shadow:0 4px 0 var(--teal);background:var(--teal-lt)}
.ucard .un{font-weight:900;font-size:15px}
.ucard .ut{font-size:12px;color:var(--ink-lt);font-weight:600;margin-top:2px}

.confetti{position:absolute;top:-20px;font-size:18px;animation:fall linear forwards;z-index:5;pointer-events:none}
.ring{transform:rotate(-90deg)}
.ring .fg{transition:stroke-dashoffset .6s ease}

/* water cup */
.cupwrap{display:flex;align-items:center;gap:16px;justify-content:center}
.cup{position:relative;width:74px;height:96px;border:4px solid var(--ink);border-top:none;border-radius:0 0 22px 22px;overflow:hidden;background:#fff}
.cup .water{position:absolute;left:0;right:0;bottom:0;background:linear-gradient(180deg,#3BD0BF,var(--teal));transition:height .8s cubic-bezier(.22,1,.36,1)}
.cup .wave{position:absolute;left:-20%;width:140%;height:8px;border-radius:50%;background:#7FE3D7;top:-4px;animation:wob 2.4s ease-in-out infinite}
@keyframes wob{0%,100%{transform:translateX(0)}50%{transform:translateX(9px)}}
.cup .pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:16px;color:var(--ink);text-shadow:0 1px 0 #fff}
/* level map */
.lvlrow{display:flex;gap:10px;overflow-x:auto;padding:6px 2px 10px}
.lvl{min-width:86px;background:#fff;border:2px solid var(--line);border-radius:16px;box-shadow:0 4px 0 var(--line);padding:10px 8px;text-align:center;cursor:pointer;transition:transform .07s}
.lvl:active{transform:translateY(3px)}
.lvl.cur{border-color:var(--coral);box-shadow:0 4px 0 var(--coral);background:var(--coral-lt)}
.lvl.lock{opacity:.5;filter:grayscale(.6);pointer-events:none}
.lvl.done{border-color:var(--mango);box-shadow:0 4px 0 var(--mango-dk);background:#FFF6DC}
.lvl .n{font-weight:900;font-size:15px}
.lvl .pips{margin-top:4px;font-size:13px;letter-spacing:2px;color:var(--mango)}
.lvl .pips .off{color:#E3D9C8}
.tierbadge{display:inline-block;font-size:12px;font-weight:900;color:#fff;border-radius:999px;padding:4px 12px;margin:2px}
.t1{background:var(--teal)} .t2{background:var(--coral)} .t3{background:var(--berry)}
.tierbadge.off{background:#D8CEBD}

/* login */
.field{width:100%;border:2px solid var(--line);border-radius:14px;padding:13px 14px;font-size:16px;font-family:inherit;
  background:#fff;color:var(--ink);margin-bottom:12px;box-shadow:0 3px 0 var(--line)}
.field:focus{outline:none;border-color:var(--teal);box-shadow:0 3px 0 var(--teal)}
.authtabs{display:flex;gap:8px;margin-bottom:16px}
.authtabs .btn{flex:1}
/* profile stats bars */
.barrow{display:flex;align-items:flex-end;gap:7px;height:74px;padding:4px 2px}
.bar{flex:1;background:linear-gradient(180deg,#3BD0BF,var(--teal));border-radius:6px 6px 0 0;min-height:4px;position:relative}
.bar .bl{position:absolute;bottom:-16px;left:0;right:0;text-align:center;font-size:9px;color:var(--ink-lt);font-weight:700}
.bar .bv{position:absolute;top:-15px;left:0;right:0;text-align:center;font-size:9px;color:var(--teal-dk);font-weight:800}
/* history */
.hrow{display:flex;gap:8px;align-items:center;background:#fff;border:2px solid var(--line);border-radius:12px;padding:8px 12px;margin-bottom:8px;font-size:13px}
/* arcade */
.gamecard{display:flex;gap:12px;align-items:center;background:#fff;border:2px solid var(--line);border-radius:18px;
  box-shadow:0 4px 0 var(--line);padding:14px;margin-bottom:14px}
.gamecard .gi{font-size:34px}
.gamecard .gt{font-weight:900;font-size:16px}
.gamecard .gd{font-size:12px;color:var(--ink-lt);font-weight:600}
/* falling word game */
#rainzone{position:relative;height:52vh;background:linear-gradient(180deg,#E0F5F2,#FFF8EF);border-radius:18px;overflow:hidden;border:2px solid var(--line)}
.drop{position:absolute;top:-46px;padding:9px 13px;background:#fff;border:2px solid var(--teal);border-radius:999px;
  font-weight:900;font-size:15px;color:var(--ink);box-shadow:0 3px 0 var(--teal);cursor:pointer;user-select:none;white-space:nowrap}
.drop.bad{animation:shake .3s}
.drop.good{background:var(--teal);color:#fff;transform:scale(1.15)}
/* memory match */
.mmgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.mmcard{aspect-ratio:3/2.1;border-radius:12px;background:var(--teal);border:2px solid var(--teal-dk);box-shadow:0 4px 0 var(--teal-dk);
  display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;color:#fff;cursor:pointer;padding:4px;text-align:center;
  transition:transform .18s}
.mmcard.open{background:#fff;color:var(--ink);border-color:var(--line);box-shadow:0 4px 0 var(--line)}
.mmcard.matched{background:#E4F8F0;color:var(--teal-dk);border-color:var(--ok);box-shadow:0 4px 0 var(--ok);pointer-events:none}
/* shop */
.hatopt{display:flex;flex-direction:column;align-items:center;gap:6px;background:#fff;border:2px solid var(--line);
  border-radius:14px;padding:10px;cursor:pointer;box-shadow:0 3px 0 var(--line)}
.hatopt.on{border-color:var(--teal);box-shadow:0 3px 0 var(--teal);background:var(--teal-lt)}
.timerbar{height:10px;border-radius:999px;background:#EFE5D6;overflow:hidden;margin:10px 0}
.timerbar>div{height:100%;background:var(--coral);border-radius:999px;transition:width .2s linear}
</style>
</head>
<body>
<div id="app">
  <div id="screens"></div>
  <div id="banner"></div>
  <div id="modal" onclick="if(event.target===this)this.classList.remove('show')"><div class="sheet" id="modalbody"></div></div>
  <div id="tabbar" style="display:none">
    <button class="tab on" data-tab="home" onclick="switchTab('home')"><span class="ico">🏝️</span><span class="lbl">今日島</span></button>
    <button class="tab" data-tab="arcade" onclick="switchTab('arcade')"><span class="ico">🎡</span><span class="lbl">遊樂場</span></button>
    <button class="tab" data-tab="words" onclick="switchTab('words')"><span class="ico">📚</span><span class="lbl">字庫</span></button>
    <button class="tab" data-tab="me" onclick="switchTab('me')"><span class="ico">🙂</span><span class="lbl">我</span></button>
  </div>
</div>
<script>
const DATA = {"stages":[{"id":"F1","label":"中一 · F1"},{"id":"F2","label":"中二 · F2"},{"id":"F3","label":"中三 · F3"}],"units":[{"key":"1A_U1","form":"F1","book":"1A","num":1,"theme":"Me and my world","theme_zh":"我與我的世界","words":[{"en":"campus","pos":"n.","zh":"校園","cat":"核心詞彙","src":"Text 1 / 單元評估","sent":"On campus, there is a huge playground for all kinds of ball games.","exam":"閱讀理解常考同義詞配對（school ground = campus）；選詞填空高頻答案；注意搭配用 on campus 而非 in campus","err":"易與 camp（營）混淆；港生常誤說 in the campus，正確為 on campus","coll":"on campus; campus life; school campus","ex1":"Our campus has a big library and two basketball courts.","ex2":"Students are not allowed to use mobile phones on campus during lessons."},{"en":"librarian","pos":"n.","zh":"圖書館管理員","cat":"核心詞彙","src":"Reading Focus / Text 1 (Write more)","sent":"The librarian lent me a hand when I couldn't find a book.","exam":"詞形轉換常考：library(n. 地方) → librarian(n. 人)；聽力常出現的校園職員名稱","err":"串法易漏 -ian；重音在 -bra- (li-BRA-rian)，港生常錯讀成 LI-brarian","coll":"school librarian; ask the librarian","ex1":"The librarian helped me borrow three storybooks.","ex2":"If you cannot find the book, you can always ask the librarian for help."},{"en":"canteen","pos":"n.","zh":"飯堂","cat":"高頻基礎詞","src":"單元評估 / 詞彙練習","sent":"If we don't feel like getting all sweaty, we will go to the canteen to get some snacks.","exam":"單元評估考過定義題：A school canteen is where students buy meals and snacks；選詞填空高頻","err":"拼寫注意雙 e（canteen）；勿與 cartoon 混淆讀音","coll":"school canteen; eat in the canteen; canteen food","ex1":"I have lunch with my classmates in the canteen every day.","ex2":"The canteen sells sandwiches, noodles and drinks at recess."},{"en":"playground","pos":"n.","zh":"操場；遊樂場","cat":"高頻基礎詞","src":"詞彙練習 / 單元評估","sent":"On campus, there is a huge playground for all kinds of ball games.","exam":"校園場所選詞填空常見答案；複合名詞 play + ground","err":"港生易受中文影響說 play in playground，須加冠詞：in the playground","coll":"in the playground; school playground","ex1":"We play badminton in the playground during recess.","ex2":"The playground is next to the basketball court."},{"en":"classmate","pos":"n.","zh":"同班同學","cat":"高頻基礎詞","src":"單元評估 / 詞彙練習","sent":"During recess, my classmates and I sometimes play badminton there.","exam":"閱讀理解及聽力高頻詞；複合名詞 class + mate，同類有 roommate、teammate","err":"可數名詞，說多位同學時記得加 -s；勿與 classroom 混淆","coll":"my classmates and I; get along with classmates","ex1":"My classmates are friendly and helpful.","ex2":"I made friends with all my classmates in the first week of school."},{"en":"timetable","pos":"n.","zh":"時間表；課堂時間表","cat":"日常實用","src":"詞彙練習","sent":"(改編) Even though my timetable is quite demanding, I enjoy the variety of experiences it offers.","exam":"選詞填空常見答案；複合名詞 time + table","err":"一個字，中間不分開寫；港生易誤說 time table 或用 schedule 而拼錯","coll":"school timetable; check the timetable; a busy timetable","ex1":"According to the timetable, we have PE on Wednesday.","ex2":"My timetable is full this term, so I have to manage my time well."},{"en":"assignment","pos":"n.","zh":"功課；作業","cat":"考試重點詞","src":"詞彙練習","sent":"(改編) Secondary school is more than just homework and assignments.","exam":"選詞填空高頻；注意 assignment 可數、homework 不可數，是常考對比","err":"串法注意 -ss- 及 -ment；港生常仿照 homework 誤作不可數，其實可說 two assignments","coll":"hand in an assignment; finish the assignment; a demanding assignment","ex1":"I finished my English assignment before dinner.","ex2":"Remember to hand in your assignments on time, or the teacher will be unhappy."},{"en":"noticeboard","pos":"n.","zh":"佈告板；告示板","cat":"核心詞彙","src":"單元評估 / Reading Focus","sent":"There are many cartoon drawings on the noticeboard.","exam":"閱讀理解找細節題常見；複合名詞 notice + board，Word Power 複合詞考點","err":"介詞用 on the noticeboard（在板上），勿用 in；一個字寫法","coll":"on the noticeboard; put up a notice on the noticeboard","ex1":"The class monitor put the new timetable on the noticeboard.","ex2":"Every week there is an interesting activity advertised on the school noticeboard."},{"en":"stairway","pos":"n.","zh":"樓梯","cat":"核心詞彙","src":"Reading Focus / 詞彙練習","sent":"(改編) You'll often bump into each other while walking up and down the stairways.","exam":"校園場所選詞填空答案；同義詞 stairs / staircase 常互換考","err":"字尾 -way 勿寫成 -weigh；walk up/down the stairway 的介詞搭配易漏","coll":"walk up and down the stairways; a narrow stairway","ex1":"Please do not run on the stairways.","ex2":"I met my class teacher on the stairway this morning and said good morning to her."},{"en":"facilities","pos":"n.","zh":"設施","cat":"考試重點詞","src":"Text 1","sent":"He cannot wait to see the returning students and show them his facilities.","exam":"閱讀理解常考：List the facilities mentioned…；通常用複數 facilities","err":"港生常誤作單數 a facility 指整體設施；讀音 fa-CI-li-ties 重音易錯","coll":"school facilities; sports facilities; modern facilities","ex1":"Our school has good facilities like a computer lab and a science lab.","ex2":"The new sports centre provides excellent facilities for students."},{"en":"laboratory","pos":"n.","zh":"實驗室（簡稱 lab）","cat":"核心詞彙","src":"詞彙練習","sent":"(改編) Just this past week I burnt things and mixed chemicals in the science lab.","exam":"選詞填空常以縮寫 lab 出現；science lab / computer lab 為固定搭配","err":"全寫 laboratory 串法長且易錯（注意 -ora-）；口語多用 lab","coll":"science lab; computer lab; in the laboratory","ex1":"We did an experiment in the science lab yesterday.","ex2":"You must follow the teacher's instructions carefully in the laboratory."},{"en":"recess","pos":"n.","zh":"小息","cat":"日常實用","src":"單元評估","sent":"During recess, my classmates and I sometimes play badminton there.","exam":"閱讀理解時間細節題常見；during recess 為固定搭配","err":"香港學校常用詞，勿與 rest 混淆；不可數，勿說 a recess time","coll":"during recess; at recess; recess time","ex1":"I eat snacks and chat with my friends during recess.","ex2":"During recess, I pass the time by playing football with my friends."},{"en":"newcomer","pos":"n.","zh":"新來的人；新生","cat":"考試重點詞","src":"單元評估 / Reading Focus","sent":"As a newcomer to Drama Club, I attend the weekly after-school meeting on Thursday and learn things about the theatre that I didn't know before.","exam":"單元評估考過：Find ONE word that indicates it is Jessie's first time joining Drama Club（答案 newcomer）；同義詞 newbie","err":"複合名詞 new + comer，勿寫成 new comer 兩個字；同義口語 newbie 較不正式","coll":"a newcomer to the club/school; welcome newcomers","ex1":"As a newcomer, Amy was a little nervous on her first day.","ex2":"The teachers were very kind to the newcomers to the school."},{"en":"lonely","pos":"adj.","zh":"孤獨的；寂寞的","cat":"高頻基礎詞","src":"Reading Focus / Text 1","sent":"Campus is excited about the reopening of the school because he has been lonely for the whole summer.","exam":"感受類形容詞選詞填空高頻；注意 lonely（感到孤獨）與 alone（獨自）意思不同","err":"lonely 以 -ly 結尾但是形容詞不是副詞；港生常與 alone 混用","coll":"feel lonely; a lonely summer","ex1":"I felt lonely when my best friend moved to another school.","ex2":"Newcomers may feel lonely at first, so we should lend them a hand."},{"en":"struggle","pos":"v.","zh":"掙扎；艱難應付","cat":"考試重點詞","src":"詞彙練習","sent":"My parents, my brother and I often struggle to find time to do activities together as a family.","exam":"選詞填空常見；搭配 struggle to do sth / struggle with sth 是文法考點","err":"串法注意雙 g；後接 to + 原形動詞，港生易誤接 -ing","coll":"struggle to do sth; struggle with homework","ex1":"Some students struggle to wake up early for school.","ex2":"He struggled with maths at first, but his teacher lent him a hand."},{"en":"ignore","pos":"v.","zh":"忽視；不理睬","cat":"考試重點詞","src":"詞彙練習","sent":"I remember feeling lonely and ignored when I was little because all the adults were too busy to play with me or pay attention to me.","exam":"詞形轉換考點：ignore(v.) → ignored(adj. 被忽視的)；感受類選詞填空常見","err":"作「感到被忽視」須用被動 feel ignored，港生易漏 -d；勿與 ignorant（無知的）混淆","coll":"feel ignored; ignore someone's advice","ex1":"Don't ignore your classmates when they say hello to you.","ex2":"She felt ignored because nobody listened to her ideas."},{"en":"miss","pos":"v.","zh":"想念；錯過","cat":"高頻基礎詞","src":"詞彙練習 / 單元評估","sent":"Sure, I miss socializing with my schoolmates and I find it challenging sometimes to concentrate in class.","exam":"一詞多義常考：miss（想念）/ miss the bus（錯過）；後接動詞須用 -ing（miss doing sth）","err":"miss doing sth 勿誤作 miss to do sth；與稱呼 Miss（老師/小姐）同形，靠語境分辨","coll":"miss my friends; miss the bus; miss a chance","ex1":"I miss my primary school teachers very much.","ex2":"Hurry up, or we will miss the school bus!"},{"en":"relax","pos":"v.","zh":"放鬆","cat":"高頻基礎詞","src":"Text 2","sent":"While April's the centre of attention, I can sit back and relax.","exam":"詞形轉換：relax(v.) → relaxed(感到放鬆的) / relaxing(令人放鬆的)，-ed/-ing 分辨是高頻考點","err":"港生常混淆 I feel relaxing（誤）與 I feel relaxed（正）；串法只有一個 x","coll":"sit back and relax; relax at home","ex1":"After the exam, I relaxed by listening to music.","ex2":"Reading in the library helps me relax after a busy day."},{"en":"exciting","pos":"adj.","zh":"令人興奮的","cat":"高頻基礎詞","src":"詞彙練習","sent":"But even so, the idea of spending time at home with my family is exciting to me.","exam":"-ed / -ing 形容詞分辨為 HK 考試經典考點：exciting（事物令人興奮）vs excited（人感到興奮）","err":"港生常誤說 I am so exciting，正確是 I am so excited；事情才用 exciting","coll":"an exciting activity; sound exciting","ex1":"Joining a new club sounds exciting!","ex2":"The first day of secondary school was exciting but a little scary."},{"en":"welcoming","pos":"adj.","zh":"熱情好客的","cat":"核心詞彙","src":"詞彙練習 / Reading Focus","sent":"My buddy is welcoming to everybody!","exam":"性格形容詞選詞填空常見；搭配 be welcoming to sb","err":"勿與動詞 welcome 混用：She is welcoming（形容詞）vs We welcome you（動詞）；雙 l 錯串常見（正確只有一個 l）","coll":"welcoming to everybody; a welcoming smile","ex1":"Our class teacher is warm and welcoming.","ex2":"The senior students were welcoming to all the newcomers."},{"en":"relieved","pos":"adj.","zh":"鬆一口氣的；如釋重負的","cat":"考試重點詞","src":"詞彙練習","sent":"When my younger brother was born, I felt so relieved to have someone of a similar age to play and chill out with.","exam":"感受形容詞選詞填空；-ed/-ing 分辨：relieved（人）vs relieving（事）","err":"串法注意 -ie-（relieved 不是 releaved）；讀音 /rɪˈliːvd/ 字尾 -vd 港生易吞音","coll":"feel relieved; relieved to hear the news","ex1":"I was relieved when I found my lost wallet.","ex2":"She felt relieved after finishing all her assignments."},{"en":"involved","pos":"adj.","zh":"投入的；參與的","cat":"考試重點詞","src":"詞彙練習","sent":"I like my parents being more involved in my school life and daily routine because it makes it easier for me to reach out to them when I need help or advice.","exam":"固定搭配 be involved in 是選詞填空與寫作常用句式","err":"介詞必須用 in（involved in），港生易漏或誤用 at；勿與 involve(v.) 原形混用","coll":"be involved in school life; get involved in activities","ex1":"I want to get involved in more school activities this year.","ex2":"Parents who are involved in their children's studies can give timely help."},{"en":"cheerful","pos":"adj.","zh":"開朗的；樂觀愉快的","cat":"核心詞彙","src":"詞彙練習 / Reading Focus","sent":"He is a cheerful person, the kind that tells many jokes and always has a smile on his face.","exam":"性格描寫（personal description）寫作必用詞；單元評估選詞填空考過","err":"詞形轉換 cheer(v.) → cheerful(adj.) → cheerfully(adv.)；-ful 只有一個 l","coll":"a cheerful person; a cheerful smile","ex1":"Emily is a cheerful girl and makes me laugh a lot.","ex2":"His cheerful personality makes him popular among classmates."},{"en":"sociable","pos":"adj.","zh":"善於交際的；好社交的","cat":"核心詞彙","src":"詞彙練習 / Reading Focus","sent":"On top of that, he is very sociable and always makes time to hang out with his friends.","exam":"性格形容詞選詞填空高頻；寫 personal description 常用","err":"串法 socia-ble 勿寫成 socialable；勿與 social（社會的）混淆","coll":"a sociable person; sociable and outgoing","ex1":"Kitty is sociable and has many friends in different classes.","ex2":"Being sociable helps newcomers settle into their new school quickly."},{"en":"hard-working","pos":"adj.","zh":"勤奮的","cat":"核心詞彙","src":"Reading Focus / 詞彙練習","sent":"But he's actually a rather dedicated and hard-working student.","exam":"性格描寫必備；注意連字號複合形容詞寫法（hard-working）","err":"勿與 work hard（動詞短語）混淆：He works hard = He is hard-working；hardly 是「幾乎不」，意思完全不同","coll":"a hard-working student; hard-working and determined","ex1":"May is a hard-working student who always finishes her homework on time.","ex2":"Hard-working people usually get better results in exams."},{"en":"athletic","pos":"adj.","zh":"擅長運動的；健壯的","cat":"核心詞彙","src":"Reading Focus / 詞彙練習","sent":"He is extremely athletic and has already broken several swimming records at our school.","exam":"詞形轉換：athlete(n. 運動員) → athletic(adj.)，是 Word Power 詞性考點","err":"讀音 ath-LE-tic 重音在中間；th 音港生易讀成 f 音","coll":"an athletic student; athletic and sporty","ex1":"My sister is athletic and plays on the school basketball team.","ex2":"April is a talented and athletic girl who loves hiking."},{"en":"ambitious","pos":"adj.","zh":"有抱負的；野心勃勃的","cat":"考試重點詞","src":"Text 2","sent":"I am a slacker, the happy-go-lucky type (just like Mum), while April is an ambitious achiever.","exam":"Text 2 練習考過語境填詞：It is too ambitious to expect the building to be completed in only three months；一詞兩義（有抱負／不切實際地過高）","err":"串法 -tious 結尾；中文「野心」帶貶義，但英文 ambitious 多為褒義，語感易錯","coll":"an ambitious student; ambitious plans","ex1":"He is very ambitious and dreams of representing Hong Kong at the Olympics.","ex2":"It is too ambitious to finish the whole project in one day."},{"en":"determined","pos":"adj.","zh":"意志堅定的","cat":"核心詞彙","src":"詞彙練習 / Text 2","sent":"Even though he doesn't get outstanding grades, he is determined to improve.","exam":"搭配 be determined to do sth 為寫作加分句式；詞形轉換 determine → determined → determination","err":"後接 to + 原形動詞；串法注意 -mined，港生易漏 e","coll":"be determined to improve; tough and determined","ex1":"She is determined to do better in the next exam.","ex2":"Thanks to Dad's DNA, my sister is tough and determined."},{"en":"outstanding","pos":"adj.","zh":"出色的；傑出的","cat":"考試重點詞","src":"Text 2","sent":"I may not be as tall, smart or outstanding as April, but I've got my own gifts, so I'm happy being me.","exam":"閱讀理解同義替換常見（outstanding = excellent）；選詞填空高頻","err":"複合詞 out + standing，勿分開寫；比較句 as...as 中間用原級 outstanding","coll":"outstanding grades; an outstanding performance","ex1":"Winnie got outstanding results in the English exam.","ex2":"He is an outstanding athlete and a straight-A student."},{"en":"proactive","pos":"adj.","zh":"積極主動的","cat":"核心詞彙","src":"詞彙練習","sent":"I think teachers appreciate having him around because he is very proactive in class.","exam":"性格形容詞選詞填空；前綴 pro-（向前）構詞法考點","err":"勿與 active 混用：proactive 強調主動出擊；串法 pro + active","coll":"proactive in class; a proactive attitude","ex1":"Be proactive and put your hand up to answer questions.","ex2":"Proactive students often volunteer during class discussions."},{"en":"happy-go-lucky","pos":"adj.","zh":"無憂無慮的；隨遇而安的","cat":"口語常用","src":"Text 2","sent":"I am a slacker, the happy-go-lucky type (just like Mum), while April is an ambitious achiever.","exam":"性格描寫選詞填空考過；三字連字號複合形容詞","err":"連字號寫法 happy-go-lucky 勿漏；意思是「樂天」而非「幸運」","coll":"a happy-go-lucky type; happy-go-lucky about schoolwork","ex1":"Ken is happy-go-lucky and never worries about small problems.","ex2":"I thought he would be happy-go-lucky about exams, but he actually works very hard."},{"en":"personality","pos":"n.","zh":"性格；個性","cat":"考試重點詞","src":"Text 2","sent":"Although we are just two years apart, our personalities are exact opposites.","exam":"本單元寫作重點（describing personality）；詞形轉換 person → personal → personality","err":"重音在 -NA-（perso-NA-lity）；表達「他性格好」應說 He has a good personality，勿直譯 His personality is good（可接受但不地道）","coll":"a cheerful personality; opposite personalities","ex1":"My best friend and I have very different personalities.","ex2":"Her friendly personality makes everyone feel comfortable."},{"en":"sibling","pos":"n.","zh":"兄弟姊妹","cat":"核心詞彙","src":"Text 2","sent":"As her sibling, I get reminded every day how unlike her I've turned out to be.","exam":"閱讀理解同義替換：sibling = brother or sister；家庭描寫常用","err":"不分性別，可指兄或姊或弟或妹；港生易誤以為只指「弟妹」","coll":"an elder sibling; sibling rivalry","ex1":"Do you have any siblings? I have an elder sister.","ex2":"My sibling and I share a room, so we chat every night."},{"en":"jealous","pos":"adj.","zh":"妒忌的","cat":"核心詞彙","src":"Text 2","sent":"Please don't think I'm jealous - I love her to death.","exam":"Text 2 閱讀理解直接考過：people think May might be jealous of April；搭配 jealous of sb","err":"介詞用 of（jealous of her sister）；串法 jea- 開頭易錯，讀音 /ˈdʒeləs/","coll":"jealous of someone; feel jealous","ex1":"Don't be jealous of your classmates' good results; work hard instead.","ex2":"He felt a little jealous when his best friend won the prize."},{"en":"peer","pos":"n.","zh":"同輩；同儕","cat":"考試重點詞","src":"Text 2","sent":"I don't mind when my peers compare me to her.","exam":"閱讀理解直接考過：Find a word that means 'people of the same age'（答案 peers）；多用複數","err":"讀音與 pier（碼頭）相同，靠語境分辨；peer pressure（同輩壓力）為常見搭配","coll":"peers; peer pressure; compare with one's peers","ex1":"Teenagers care a lot about what their peers think.","ex2":"We should not compare ourselves with our peers all the time."},{"en":"buddy","pos":"n.","zh":"好朋友；夥伴（口語）","cat":"口語常用","src":"Text 2","sent":"(My family and buddies never do that though.)","exam":"閱讀理解考過：Find words that refer to 'friends'（答案 buddies / besties）；口語同義詞","err":"複數變 buddies（y 變 ies）；屬口語，正式寫作宜用 friend","coll":"my buddy; best buddies","ex1":"Sam is my buddy - we do everything together.","ex2":"I played video games with my buddies at the weekend."},{"en":"bestie","pos":"n.","zh":"死黨；閨蜜（口語）","cat":"口語常用","src":"Text 2","sent":"I pass the time playing my favourite online games and chatting with my besties on video calls.","exam":"閱讀理解同義替換考過（besties = friends）；辨析口語與正式用語","err":"複數 besties；屬非正式用語，作文正文避免使用，日記/網誌可用","coll":"my bestie; chat with my besties","ex1":"Sue is my bestie and we walk to school together every day.","ex2":"I video call my besties every weekend to chill out."},{"en":"chore","pos":"n.","zh":"家務；雜務","cat":"核心詞彙","src":"Text 2","sent":"She loves me too, and often helps me with my homework and my chores.","exam":"Text 2 語境填詞考過：I prefer doing all my chores and school work before I play；常用複數","err":"讀音 /tʃɔː/ 勿讀成 core；do the chores 搭配動詞用 do 不用 make","coll":"do the chores; household chores","ex1":"I help my mum with the chores every Saturday.","ex2":"Washing dishes is my least favourite chore."},{"en":"remind","pos":"v.","zh":"提醒","cat":"考試重點詞","src":"Text 2","sent":"As her sibling, I get reminded every day how unlike her I've turned out to be.","exam":"語境填詞考過：our teacher reminded us not to leave anything behind；句式 remind sb to do / remind sb of sth","err":"簡單過去式 reminded 字尾 -ed 港生說話易吞音；勿與 remember（自己記得）混淆：remind 是提醒別人","coll":"remind someone to do something; remind someone of something","ex1":"Please remind me to bring my textbook tomorrow.","ex2":"The teacher reminded us to check our answers before handing in the paper."},{"en":"attention","pos":"n.","zh":"注意；關注","cat":"高頻基礎詞","src":"Text 2","sent":"While April's the centre of attention, I can sit back and relax.","exam":"語境填詞考過：I paid special attention to the signs so I would not get lost；固定搭配 pay attention to","err":"pay attention to 動詞用 pay，港生易誤說 give attention；the centre of attention 為常用短語","coll":"pay attention to; the centre of attention","ex1":"Please pay attention to the teacher in class.","ex2":"The new student became the centre of attention on his first day."},{"en":"equally","pos":"adv.","zh":"同樣地；平等地","cat":"考試重點詞","src":"Text 2","sent":"April makes our parents proud, but I'm equally their pride and joy.","exam":"語境填詞考過：Physical health and mental well-being are equally important；詞形轉換 equal → equally","err":"形容詞 equal 加 -ly 變副詞須雙寫 l（equally）；修飾形容詞時放其前面","coll":"equally important; love someone equally","ex1":"Our parents love my brother and me equally.","ex2":"Reading and listening are equally important in learning English."},{"en":"talented","pos":"adj.","zh":"有天賦的","cat":"核心詞彙","src":"Text 2","sent":"As a straight-A student and a talented athlete, she is well-liked and popular.","exam":"詞形轉換：talent(n.) → talented(adj.)；人物描寫寫作常用","err":"talented 修飾人，勿說 a talent student；搭配介詞 talented in/at sth","coll":"a talented athlete; talented in music","ex1":"Vincent is a talented swimmer who has broken several school records.","ex2":"Our class has many talented students who are good at art and music."},{"en":"popular","pos":"adj.","zh":"受歡迎的","cat":"高頻基礎詞","src":"Text 2 / 詞彙練習","sent":"Vincent may be new to our school but he is already one of the most popular people in class.","exam":"詞形轉換：popular → popularity；比較級 more popular、最高級 the most popular 為文法考點","err":"搭配 popular with/among sb；港生易誤說 more popular than 漏 than 或誤加 -er","coll":"popular with classmates; a popular student","ex1":"Basketball is very popular among the boys in my class.","ex2":"She is popular because she is kind and always lends a hand."},{"en":"locker","pos":"n.","zh":"儲物櫃","cat":"日常實用","src":"單元評估","sent":"Maybe I can keep my skateboard in my school locker, like my bestie Sue does.","exam":"閱讀理解細節題常見校園設施詞","err":"詞形轉換 lock(v. 鎖) → locker(n. 櫃)；勿與 rocker 混淆讀音 l/r","coll":"school locker; keep something in the locker","ex1":"I keep my PE uniform in my locker.","ex2":"Remember to lock your locker before you leave."},{"en":"hobby","pos":"n.","zh":"嗜好","cat":"高頻基礎詞","src":"聽力對話","sent":"I suppose I can also talk about my hobbies, don't you think?","exam":"聽力及個人簡介（profile）寫作必用；複數 hobbies（y 變 ies）","err":"複數串法 hobbies 易錯寫成 hobbys；My hobby is playing…（動詞加 -ing）","coll":"my hobbies; share the same hobby","ex1":"My hobbies are playing the guitar and cooking.","ex2":"Talking about your hobbies helps you make friends who share your interests."},{"en":"goal","pos":"n.","zh":"目標","cat":"高頻基礎詞","src":"聽力對話","sent":"My goal is becoming a teacher.","exam":"聽力常考（career goal / life goal）；寫作結尾表達目標常用","err":"勿與 gold（金）串錯；一詞多義：目標／足球入球","coll":"career goal; life goal; achieve a goal","ex1":"My goal is to improve my English this year.","ex2":"He worked hard to achieve his goal of becoming a pilot."},{"en":"profile","pos":"n.","zh":"個人簡介","cat":"日常實用","src":"聽力對話 / 綜合任務","sent":"I'm creating my profile for our class's social media page.","exam":"綜合任務要求完成 social media profile，屬單元核心任務詞","err":"讀音 /ˈprəʊfaɪl/，重音在前；勿與 file 混淆","coll":"create a profile; social media profile","ex1":"Please complete your profile with your name, class and birthday.","ex2":"Her profile says her favourite colour is orange."},{"en":"administrator","pos":"n.","zh":"管理員","cat":"口語常用","src":"聽力對話","sent":"Maybe I'll talk to our administrator later.","exam":"聽力細節題考過（Who's the page administrator?）；網絡與校園常用詞","err":"字長易串錯（ad-mi-nis-tra-tor）；勿與 admin（口語縮寫）混用於正式寫作","coll":"page administrator; the administrator of the group","ex1":"Tony is the administrator of our class's social media page.","ex2":"The administrator can remove posts that break the rules."},{"en":"assembly","pos":"n.","zh":"週會；集會","cat":"考試重點詞","src":"詞彙練習","sent":"The winners of the competition will be announced during the whole school assembly the following Monday.","exam":"詞彙練習詞性標注題考過（noun）；香港校園高頻情境詞","err":"串法雙 s 加 -bly；morning assembly（早會）為港校常用說法","coll":"school assembly; morning assembly; during assembly","ex1":"We sing the school song during morning assembly.","ex2":"The principal made an announcement at the school assembly."},{"en":"raise","pos":"v.","zh":"籌集；舉起","cat":"考試重點詞","src":"詞彙練習","sent":"Members of the gardening club will be selling a range of delicious home-baked treats to raise money for the school garden.","exam":"詞彙練習詞性標注題考過（verb）；raise money（籌款）為選詞填空高頻搭配","err":"勿與 rise（自己上升，不及物）混淆：raise 須接受詞；raise your hand 舉手為課堂用語","coll":"raise money; raise your hand","ex1":"Our class raised money for charity by selling cookies.","ex2":"Raise your hand if you know the answer."}],"phrases":[{"phrase":"lend (someone) a hand","zh":"幫忙；伸出援手","type":"課文短語","sent":"I would say, 'Chill out!' Teachers and senior students will happily lend a hand.","note":"表示主動幫助別人，可加對象：lend me/him a hand。語氣友善，口語書面皆可用。","ex":"When I face challenges, my class teacher is always there to lend a hand."},{"phrase":"rain or shine","zh":"風雨不改；無論如何","type":"課文短語","sent":"Rain or shine, she shows up and buries herself in books in the library.","note":"字面指「下雨或晴天」，引申為「無論情況如何都堅持做」，常放句首，後面加逗號。","ex":"Rain or shine, the fundraising fun fair will be held next week."},{"phrase":"living in sb's shadow","zh":"活在某人的陰影下","type":"課文短語","sent":"Well, do I mind living in April's shadow? As her sibling, I get reminded every day how unlike her I've turned out to be.","note":"指經常被拿來與更出色的人比較、被比下去。閱讀理解曾考此語意（May is compared to April negatively）。","ex":"I am tired of always living in Melody's shadow at school."},{"phrase":"pass the time","zh":"消磨時間","type":"課文短語","sent":"I pass the time playing my favourite online games and chatting with my besties on video calls.","note":"後接 doing sth 或 by doing sth；指做事打發時間，非「路過」。","ex":"During recess, I pass the time by playing football with my friends."},{"phrase":"roll one's eyes","zh":"翻白眼（表示不耐煩或不以為然）","type":"課文短語","sent":"Still, I can't help rolling my eyes when teachers try to 'encourage' me by saying things like, 'It's okay - someday you'll be just like your sister.'","note":"描寫人物反應的生動短語；常與 can't help doing（忍不住）連用。","ex":"I couldn't help but roll my eyes when my classmate kept talking in class."},{"phrase":"sit back and relax","zh":"安坐放鬆；置身事外地輕鬆","type":"課文短語","sent":"While April's the centre of attention, I can sit back and relax.","note":"三個字常連用，指舒舒服服地放鬆、不用操心；聽力及口語亦常見。","ex":"After finishing her homework, Jenny sat back and relaxed for the rest of the weekend."},{"phrase":"sb's pride and joy","zh":"某人的心肝寶貝；引以為傲的人或物","type":"課文短語","sent":"April makes our parents proud, but I'm equally their pride and joy.","note":"pride and joy 次序固定，不可倒轉；前面配所有格（our school's pride and joy）。","ex":"The state-of-the-art laboratory we have is our school's pride and joy."},{"phrase":"spoil sb rotten","zh":"極度寵愛某人；把某人寵壞","type":"課文短語","sent":"Please don't think I'm jealous - I love her to death. She loves me too, and she spoils me rotten.","note":"rotten 在此作程度補語，指「寵到不得了」，多帶親暱、幽默語氣。","ex":"The staff in the cafeteria spoil us rotten by giving us free puddings with every meal."},{"phrase":"take things easy","zh":"從容面對；不緊張","type":"課文短語","sent":"I don't want to be like April! I'm satisfied with being a so-so student who takes things easy.","note":"也可說 take it easy（口語道別或安慰用語）；主詞第三身單數時動詞加 -s：takes things easy。","ex":"I just finished an exam this morning, so I'm taking it easy for the rest of the day."},{"phrase":"blood, sweat and tears","zh":"血汗與淚水；艱辛努力","type":"課文短語","sent":"The growth of e-learning from theory to everyday practice is happening quickly, with blood, sweat and tears along the way.","note":"三個名詞次序固定；指付出極大努力，常與 take / cost 連用。","ex":"It took a lot of blood, sweat and tears for the Red House to win the relay race on Sports Day."},{"phrase":"(only) time will tell","zh":"唯有時間能證明；日後自有分曉","type":"課文短語","sent":"Will e-learning widen the learning gap among students? Only time will tell.","note":"常獨立成句作結語，或接 if/whether 子句：Time will tell if...；寫作結尾好用句式。","ex":"Only time will tell how well secondary school has prepared us for the future."},{"phrase":"widen the gap","zh":"擴大差距","type":"課文短語","sent":"Will e-learning widen the learning gap among students? Only time will tell.","note":"gap 前可加修飾語：the learning gap / the achievement gap；反義為 narrow/close the gap。","ex":"Neglecting weaker students will widen the gap in ability between stronger students and weaker students."},{"phrase":"chill out","zh":"放鬆；別緊張（口語）","type":"口語短語","sent":"I would say, 'Chill out!' Teachers and senior students will happily lend a hand.","note":"非正式口語，可單獨用作安慰語「Chill out!」，也可作動詞短語 chill out with sb（與某人輕鬆消遣）。","ex":"I chill out with my brother by playing board games at weekends."},{"phrase":"Pretty well.","zh":"挺好的；相當順利","type":"口語短語","sent":"Pretty well. I've just put the name of the page at the top.","note":"回答 How is it going? / How are you? 的常用口語；pretty 在此解「頗、相當」，非「漂亮」。","ex":"A: How is your project going? B: Pretty well, thanks!"},{"phrase":"loads of fun","zh":"非常好玩；樂趣多多（口語）","type":"口語短語","sent":"Every Monday, I meet other club members at the computer room to watch an anime movie or learn how to animate. It's loads of fun!","note":"loads of = lots of，口語用法；亦可說 a lot of fun。fun 是不可數名詞，勿說 many funs。","ex":"The school picnic was loads of fun!"},{"phrase":"take part in","zh":"參加；參與","type":"日常表達","sent":"At school, there are many extra-curricular activities I take part in.","note":"後接活動名稱：take part in a competition/activity；同義 join / participate in。介詞 in 不可漏。","ex":"I am going to take part in the singing contest next month."},{"phrase":"bump into","zh":"偶遇；碰見","type":"日常表達","sent":"(改編) You'll often bump into each other while walking up and down the stairways.","note":"指無意中遇到認識的人（= run into）；也可解「撞到」實物，靠語境分辨。","ex":"I bumped into my primary school classmate at the bus stop yesterday."}]},{"key":"1A_U2","form":"F1","book":"1A","num":2,"theme":"Under the sky","theme_zh":"天空之下","words":[{"en":"landscape","pos":"n.","zh":"風景；地貌","cat":"核心詞彙","src":"Reading Focus / 詞彙練習 / 單元評估","sent":"The surrounding landscape was glorious, and there were wild creatures that you normally won't find in urban areas.","exam":"選詞填空高頻答案；landscape photography（風景攝影）為本單元核心搭配；閱讀理解同義替換 landscape = scenery","err":"串法注意 -scape 結尾勿寫成 -scap；勿與 landform（地形）混淆：landscape 指整體景觀","coll":"landscape photography; desert landscape; the surrounding landscape","ex1":"The landscape of Sai Kung is famous for its clear water and green hills.","ex2":"He takes landscape photos every weekend in the country parks."},{"en":"scenery","pos":"n.","zh":"風景；景色","cat":"核心詞彙","src":"Reading Focus / 詞彙練習 / 單元評估","sent":"It was definitely physically tiring, but the breath-taking scenery around us made it all worthwhile.","exam":"單元評估考過 beautiful scenery 為細節題選項；選詞填空高頻；同義詞 view / landscape 常互換考","err":"不可數名詞，勿說 a scenery 或 sceneries；港生常誤用複數，正確說 the scenery is beautiful","coll":"breath-taking scenery; enjoy the scenery; natural scenery","ex1":"We stopped to enjoy the scenery on our way up the mountain.","ex2":"The scenery along the MacLehose Trail is simply amazing."},{"en":"waterfall","pos":"n.","zh":"瀑布","cat":"核心詞彙","src":"Reading Focus / 詞彙練習","sent":"We hiked through the magnificent Khangai Mountain Range to see Ulaan Tsutgalan, the beautiful waterfall on the Orkhon River.","exam":"自然景觀選詞填空常見答案；複合名詞 water + fall，Word Power 複合詞考點","err":"一個字寫法，勿分開寫成 water fall；複數直接加 -s（waterfalls）","coll":"a beautiful waterfall; hike to the waterfall","ex1":"There is a small waterfall near the campsite.","ex2":"We took lots of photos of the waterfall at Bride's Pool."},{"en":"stream","pos":"n.","zh":"小溪；溪流","cat":"核心詞彙","src":"Reading Focus / 詞彙練習","sent":"I remember feeling completely in awe of the beauty of the waterfall and the crystal clear river and streams around it.","exam":"自然詞彙選詞填空高頻；閱讀理解常與 river（河）作大小對比","err":"勿與 steam（蒸氣）混淆串法（stream 有 r）；一詞多義：現今亦解網上「串流」，靠語境分辨","coll":"a winding stream; a crystal clear stream; cross a stream","ex1":"We washed our hands in the cool stream during the hike.","ex2":"The photographer grabbed her camera to take photos of the winding stream."},{"en":"ravine","pos":"n.","zh":"深谷；溪谷","cat":"核心詞彙","src":"Reading Focus / 詞彙練習","sent":"We passed by many different landforms, including sand hills, mountain slopes, ravines, and dry riverbeds.","exam":"詞彙練習選詞填空考過（landforms 一類）；閱讀理解利用上下文猜詞義的目標詞","err":"讀音 /rəˈviːn/ 重音在後，港生易錯讀成 RA-vine；勿與 raven（烏鴉）混淆","coll":"a deep ravine; steep-sided ravines","ex1":"Be careful when you walk near the ravine.","ex2":"The hikers looked down into the deep ravine from the bridge."},{"en":"vegetation","pos":"n.","zh":"植被；植物（總稱）","cat":"考試重點詞","src":"Reading Focus / 單元評估","sent":"That way you won't trample vegetation and cause damage to the habitats of wild animals.","exam":"單元評估選詞填空直接考過；環保主題閱讀理解常見；與 trample、destroy 搭配是常考語境","err":"不可數名詞，不加 -s；勿與 vegetable（蔬菜）混淆：vegetation 指整體植物","coll":"trample the vegetation; dense vegetation; harm the vegetation","ex1":"Hikers should stay on the trail to protect the vegetation.","ex2":"The hillside is covered with thick green vegetation."},{"en":"habitat","pos":"n.","zh":"（動植物的）棲息地","cat":"考試重點詞","src":"Reading Focus / 詞彙練習 / 單元評估","sent":"It was interesting to see the different habitats in which Mongolia's native species live.","exam":"單元評估選詞填空考過（the habitats of wild animals）；環保與自然主題閱讀理解高頻詞","err":"串法注意 -tat 結尾勿寫成 -tate；勿與 habit（習慣）混淆，意思完全不同","coll":"animal habitats; natural habitat; destroy habitats","ex1":"Country parks provide habitats for many wild animals.","ex2":"When too many people visit a nature site, creatures' habitats are destroyed."},{"en":"wilderness","pos":"n.","zh":"荒野；未開發的自然地區","cat":"核心詞彙","src":"詞彙練習 / Text 3","sent":"My friend Janet and I began our trek around the Mongolian wilderness.","exam":"選詞填空考過；閱讀理解同義替換 the wild = the wilderness；Text 3 出現 feel alive out in the wilderness","err":"串法長且易錯（wil-der-ness，雙 s 結尾）；與 the wild 同義但 wilderness 較正式","coll":"in the wilderness; explore the wilderness","ex1":"Thru-hikers spend weeks walking through the wilderness.","ex2":"Some people prefer reading books at home while others prefer exploring the wilderness."},{"en":"horizon","pos":"n.","zh":"地平線","cat":"考試重點詞","src":"詞彙練習 / Text 2","sent":"We learnt about desert life and watched the sun rise and set over the horizon.","exam":"選詞填空考過；Text 2 名句 It began creeping over the horizon；固定搭配 over/on the horizon","err":"重音在 -RI-（ho-RI-zon）；介詞用 over the horizon（升過地平線），勿用 above 以外亂配","coll":"over the horizon; on the horizon; watch the sun set over the horizon","ex1":"The sun slowly rose over the horizon.","ex2":"We sat on the beach and watched the ships disappear over the horizon."},{"en":"landform","pos":"n.","zh":"地形；地貌形態","cat":"核心詞彙","src":"Reading Focus / 詞彙練習","sent":"We passed by many different landforms, including sand hills, mountain slopes, ravines, and dry riverbeds.","exam":"詞彙練習選詞填空考過；地理跨科詞彙（LaC），閱讀理解列舉題常見","err":"可數名詞，多用複數 landforms；勿與 landscape（風景）混淆：landform 指具體地形","coll":"different landforms; unusual landforms","ex1":"The Hong Kong Geopark is famous for its special landforms.","ex2":"We saw many interesting landforms, such as sea caves and rock columns."},{"en":"creature","pos":"n.","zh":"生物；動物","cat":"考試重點詞","src":"詞彙練習 / 單元評估","sent":"The surrounding landscape was glorious, and there were wild creatures that you normally won't find in urban areas.","exam":"單元評估細節題考過（wild animals = wild creatures 同義替換）；選詞填空高頻","err":"串法 crea-ture，讀音 /ˈkriːtʃə/ 勿讀成 create-ure；泛指一切生物，不限於怪物","coll":"wild creatures; sea creatures; unique creatures","ex1":"You can see many small creatures like crabs on the rocks.","ex2":"We got to know some of the unique creatures that live in the wetlands."},{"en":"summit","pos":"n.","zh":"山頂；頂峰","cat":"核心詞彙","src":"Text 2","sent":"After hiking through the early morning darkness, we made it to the summit at around 5 am.","exam":"Text 2 閱讀理解時間題考過（從山屋到山頂用了多久）；同義替換 summit = the top of the mountain","err":"串法雙 m（summit）；勿與 submit（提交）混淆串法與讀音","coll":"reach the summit; make it to the summit","ex1":"We reached the summit of Lantau Peak before sunrise.","ex2":"The view from the summit was well worth the hard climb."},{"en":"altitude","pos":"n.","zh":"海拔；高度","cat":"考試重點詞","src":"Text 2","sent":"Dad spread the hike over two days to allow me to get used to the altitude.","exam":"Text 2 閱讀理解直接考過：what caused the writer to feel sick?（答案 the high altitude）","err":"串法 alti-tude 勿寫成 attitude（態度），兩字外形極似是經典陷阱；at an altitude of + 數字","coll":"high altitude; at an altitude of 2 300 metres; get used to the altitude","ex1":"At a high altitude, the air is thin and it is hard to breathe.","ex2":"The plane was flying at an altitude of 10 000 metres."},{"en":"trail","pos":"n.","zh":"小徑；遠足徑","cat":"核心詞彙","src":"Text 3 / 單元評估","sent":"For hikers, hiking is all about the challenge - how far they can push their physical and mental limits on a trail.","exam":"單元評估閱讀出現 stay on the trail / go off-trail；香港遠足徑名稱常考（the MacLehose Trail）","err":"勿與 trial（審訊；試驗）調亂字母次序；hiking trail 為固定搭配","coll":"hiking trail; stay on the trail; the Hong Kong Trail","ex1":"The Lantau Trail is a popular hiking trail in Hong Kong.","ex2":"Never go off-trail while hiking, or you may get lost."},{"en":"hike","pos":"v./n.","zh":"遠足；行山","cat":"高頻基礎詞","src":"Text 2 / 詞彙練習","sent":"Last week, Dad took me to hike Mount Fuji, Japan's best-known mountain.","exam":"本單元主題詞，閱讀理解與聽力必出；詞形轉換 hike → hiker（人）→ hiking（活動）","err":"go hiking 的動詞用 go 加 -ing；港生易誤說 go to hiking；hike 亦可作名詞：an exhausting hike","coll":"go hiking; hike a mountain; an exhausting hike","ex1":"My family likes to hike in the country parks at weekends.","ex2":"We went on a long hike along the Wilson Trail last Sunday."},{"en":"campsite","pos":"n.","zh":"營地；露營地點","cat":"高頻基礎詞","src":"文法練習 / 單元評估","sent":"It all started well when we arrived at the campsite.","exam":"單元評估閱讀篇章場景詞；文法練習例句常見（arrived at the campsite）；複合名詞 camp + site","err":"介詞搭配 at the campsite；一個字寫法勿分開；勿與 camping（露營活動）混用","coll":"arrive at the campsite; a popular campsite","ex1":"It started to rain shortly after we arrived at the campsite.","ex2":"The campsite has toilets and barbecue pits for campers."},{"en":"campfire","pos":"n.","zh":"營火","cat":"日常實用","src":"詞彙練習 / 單元評估","sent":"After dinner, everyone sat around the campfire eagerly and took turns singing songs.","exam":"單元評估閱讀細節題場景（sing songs around the campfire）；戶外活動選詞填空常見","err":"介詞搭配 around the campfire（圍着營火）；複合名詞一個字寫法","coll":"sit around the campfire; start a campfire","ex1":"We sang songs around the campfire at night.","ex2":"You'll see citizens starting campfires and roasting corn in the campsites."},{"en":"photographer","pos":"n.","zh":"攝影師","cat":"核心詞彙","src":"Reading Focus / 詞彙練習","sent":"I've spent the past few days taking photos around Sai Kung with other amateur photographers in my photography club.","exam":"詞形轉換高頻：photograph(n./v.) → photographer(人) → photography(活動)；選詞填空考過","err":"重音在 -TO-（pho-TO-grapher），與 photograph（重音在首）不同，港生極易錯讀；串法 -er 結尾","coll":"a landscape photographer; an amateur photographer","ex1":"The photographer grabbed her camera to take photos of the winding stream.","ex2":"My uncle is a professional photographer who loves shooting sunsets."},{"en":"photography","pos":"n.","zh":"攝影（活動／藝術）","cat":"核心詞彙","src":"Text 1 / 詞彙練習","sent":"Photography can feel like a chore when you are just doing it for followers and likes.","exam":"詞形轉換三兄弟 photograph / photographer / photography 為 Word Power 經典考點；不可數名詞","err":"不可數，勿說 a photography；重音在 -TO-；landscape photography（風景攝影）為固定搭配","coll":"landscape photography; take up photography; a photography club","ex1":"Landscape photography is all about capturing the beauty of the natural world.","ex2":"She took up photography as a hobby last year."},{"en":"capture","pos":"v.","zh":"拍攝下來；捕捉（畫面）","cat":"考試重點詞","src":"Reading Focus / 單元評估","sent":"Everyone loves to capture images of beautiful, stunning landscapes in nature.","exam":"單元評估選詞填空直接考過（capture images）；一詞多義：捕捉／拍攝，Word Power 字典多義詞考點","err":"串法 -ture 結尾讀 /tʃə/；攝影語境解「拍下」，勿只記「捉住」一義","coll":"capture images; capture the beauty of nature; capture the moment","ex1":"Larry wanted us to try capturing the essence of the uninhabited island.","ex2":"She captured the sunrise with her new camera."},{"en":"foreground","pos":"n.","zh":"（畫面的）前景","cat":"核心詞彙","src":"Reading Focus / 詞彙練習","sent":"The viewer can see their tiny forms climbing the cliff in the foreground as a large wave approaches from the background.","exam":"攝影主題選詞填空考過；與 background（背景）成對記憶，前綴 fore-（前）構詞法考點","err":"介詞用 in the foreground；fore- 勿串成 four-；與 background 意思相反勿調亂","coll":"in the foreground; the foreground of a photo","ex1":"There are some wild flowers in the foreground of the picture.","ex2":"Put your friend in the foreground and the mountains in the background."},{"en":"angle","pos":"n.","zh":"角度","cat":"考試重點詞","src":"Reading Focus / 詞彙練習","sent":"The best photos are always those that inspire emotion, either by being especially creative or showing something from a new angle.","exam":"選詞填空考過（from a new angle）；一詞多義：攝影角度／數學角，LaC 跨科詞義考點","err":"勿與 angel（天使）調亂字母次序，經典串法陷阱；from a different angle 介詞用 from","coll":"from a new angle; camera angle; adjust the angle","ex1":"Try taking the photo from a lower angle.","ex2":"Looking at the problem from a different angle helps you find new ideas."},{"en":"viewer","pos":"n.","zh":"觀看者；觀眾","cat":"核心詞彙","src":"Text 1 / 詞彙練習","sent":"At the end of the day, it's all about having a good time in nature and getting your viewers to feel joy through your photos.","exam":"詞形轉換：view(v. 觀看) → viewer(n. 人)；選詞填空考過；社交媒體主題常用","err":"勿與 view（景色；觀看）混用：viewer 指人；複數加 -s","coll":"get your viewers to feel joy; attract viewers","ex1":"A good photo makes viewers stop and look twice.","ex2":"The video has attracted millions of viewers online."},{"en":"stunning","pos":"adj.","zh":"極美的；令人驚嘆的","cat":"考試重點詞","src":"Reading Focus / Text 1 / 單元評估","sent":"These stunning images of nature are not only a feast for the eyes; they also make us want to grab a camera and start photographing outdoors.","exam":"單元評估文法選擇題直接考過（The views there were stunning，分辨 stunned/stunning/stunningly）；描寫景色寫作必備","err":"-ed/-ing 分辨：景色用 stunning，人被震撼用 stunned；雙 n 串法易漏","coll":"stunning views; a stunning landscape; absolutely stunning","ex1":"You can visit the Peak and get a stunning view of the harbour.","ex2":"The sunrise over the sea was absolutely stunning."},{"en":"misty","pos":"adj.","zh":"薄霧籠罩的","cat":"核心詞彙","src":"Reading Focus","sent":"(改編) The misty mountains looked like a Chinese painting in the early morning.","exam":"描寫景色形容詞選詞填空常見；詞形轉換 mist(n. 霧) → misty(adj.)，同類有 fog → foggy","err":"詞形轉換 y 結尾規則：mist + y；勿與 mystery（神秘）混淆；misty 與 foggy 近義但 mist 較薄","coll":"a misty morning; misty mountains","ex1":"The peak was misty, so we could not see the view clearly.","ex2":"We set off on a cool and misty morning."},{"en":"winding","pos":"adj.","zh":"蜿蜒的；彎彎曲曲的","cat":"核心詞彙","src":"Reading Focus / Text 1 活動","sent":"The photographer grabbed her camera to take photos of the winding stream.","exam":"描寫景色形容詞選詞填空常見；常修飾 road / path / stream","err":"讀音 /ˈwaɪndɪŋ/ 與 wind（風 /wɪnd/）不同，港生極易讀錯；來自動詞 wind（蜿蜒）","coll":"a winding stream; a winding road; winding trails","ex1":"We walked slowly along the winding mountain path.","ex2":"The winding road up the hill made me feel car-sick."},{"en":"steep","pos":"adj.","zh":"陡峭的","cat":"高頻基礎詞","src":"Reading Focus / Write more","sent":"Having mastered the skill of climbing, I scaled the steep cliff in no time.","exam":"描寫地形形容詞高頻；Reading Focus 出現 steep-sided（陡壁的）複合形容詞","err":"雙 e 串法（steep）勿與 step（腳步）混淆；比較級 steeper 直接加 -er","coll":"a steep cliff; a steep slope; steep-sided ravines","ex1":"The last part of the trail is very steep, so take your time.","ex2":"We climbed up the steep slope carefully."},{"en":"stamina","pos":"n.","zh":"耐力；體力","cat":"考試重點詞","src":"Text 2 / 單元評估","sent":"'It's a test of my strength and stamina,' he says.","exam":"單元評估選詞填空語境（boost your strength and endurance）同類詞；運動主題閱讀高頻","err":"不可數名詞，不加 -s；串法 sta-mi-na，重音在首；勿與 stamp 混淆","coll":"build up stamina; a test of strength and stamina","ex1":"Climbing Mount Fuji is a real test of strength and stamina.","ex2":"Jogging every morning helps you build up your stamina."},{"en":"aspire","pos":"v.","zh":"渴望；有志（做某事）","cat":"考試重點詞","src":"Text 2","sent":"They aspire to do it at least once during their lifetime.","exam":"Text 2 語境填詞直接考過：They aspire to win the championship one day；固定句式 aspire to do sth","err":"後接 to + 原形動詞（aspire to do），勿接 -ing；勿與 inspire（啟發）混淆，前綴不同意思不同","coll":"aspire to do sth; aspire to become a doctor","ex1":"Many hikers aspire to climb Mount Fuji at least once.","ex2":"She aspires to represent Hong Kong in swimming one day."},{"en":"eagerly","pos":"adv.","zh":"熱切地；急切地","cat":"考試重點詞","src":"Text 2 / 單元評估","sent":"We waited eagerly for the famous sunrise.","exam":"單元評估同義詞題考過（excitedly = eagerly）；Text 2 語境填詞考過：He waited eagerly for the summer holiday to begin；情狀副詞考點","err":"詞形轉換 eager(adj.) + -ly；wait eagerly for sth 介詞用 for；勿漏 -ly 誤作形容詞用","coll":"wait eagerly for; eagerly look forward to","ex1":"Everyone sat around the campfire eagerly and took turns singing songs.","ex2":"The students waited eagerly for the school picnic."},{"en":"creep","pos":"v.","zh":"緩慢地移動；躡手躡腳地走","cat":"考試重點詞","src":"Text 2","sent":"It began creeping over the horizon.","exam":"Text 2 語境填詞直接考過：The thief was caught creeping out of the store；擬人法（personification）修辭考點——太陽 creep 過地平線","err":"不規則過去式 crept（勿寫 creeped）；雙 e 串法；描寫太陽緩慢升起屬擬人手法","coll":"creep over the horizon; creep out of the room","ex1":"The cat crept quietly towards the bird.","ex2":"Morning light slowly crept into the tent."},{"en":"glow","pos":"v.","zh":"發出柔和光芒","cat":"考試重點詞","src":"Text 2","sent":"In no time, its rays painted the slopes yellow and orange, and the sky glowed purple and pink.","exam":"Text 2 語境填詞直接考過：I didn't know that my watch glowed in the dark；描寫日出日落寫作好用詞","err":"勿與 grow（生長）混淆 l/r 讀音；glow 指柔光，shine 指強光，選詞填空須分辨","coll":"glow in the dark; the sky glowed purple and pink","ex1":"The campfire glowed warmly in the dark night.","ex2":"Her face glowed with joy when she reached the summit."},{"en":"reward","pos":"n.","zh":"獎賞；回報","cat":"考試重點詞","src":"Text 2","sent":"This was our reward for our exhausting hike, and it was well worth it!","exam":"Text 2 語境填詞直接考過：We were given a reward for being punctual the entire school year；搭配 a reward for sth","err":"介詞用 for（a reward for hard work）；勿與 award（獎項，多指頒發的獎）混淆；rewarding(adj.) 解「有意義的」","coll":"a reward for sth; get a reward; a well-deserved reward","ex1":"The beautiful sunrise was a reward for our hard climb.","ex2":"The students received a reward for keeping the classroom clean."},{"en":"barely","pos":"adv.","zh":"幾乎不；僅僅","cat":"考試重點詞","src":"Text 2 / 單元評估","sent":"Surprisingly, it was foggy and we could barely see anything.","exam":"Text 2 同義詞題直接考過（hardly = barely）；單元評估出現 I can barely sing；閱讀理解否定語意判斷題常考","err":"barely 本身含否定意味，勿再加 not（can barely see 已表示幾乎看不見）；與 bare（赤裸的）詞義不同","coll":"can barely see; barely enough; barely sing","ex1":"I was so tired that I could barely walk.","ex2":"I can barely sing, but I managed to sing a simple song."},{"en":"worn out","pos":"adj.","zh":"筋疲力盡的","cat":"考試重點詞","src":"Text 2","sent":"By the time we reached our mountain hut that evening, I was so worn out that I was ready to collapse.","exam":"Text 2 同義詞題直接考過（tired = worn out）；閱讀理解同義替換高頻；so...that 句式一併考","err":"worn 是 wear 的過去分詞，勿寫成 wore out；亦可形容物件「穿破的」，一詞多義","coll":"feel worn out; completely worn out","ex1":"After the five-hour hike, we were all worn out.","ex2":"She felt worn out after running the marathon."},{"en":"drowsy","pos":"adj.","zh":"昏昏欲睡的","cat":"考試重點詞","src":"單元評估","sent":"I enjoyed them, but I was starting to feel drowsy after all the activities.","exam":"單元評估段落填詞直接考過（felt tired and drowsy）；感受形容詞同義替換：drowsy = sleepy","err":"串法 drow-sy 勿寫成 drousy；feel drowsy 搭配 feel；比 sleepy 程度相近但較書面","coll":"feel drowsy; make someone drowsy","ex1":"The big dinner made me feel drowsy.","ex2":"Some medicine can make you drowsy, so don't take it before class."},{"en":"trample","pos":"v.","zh":"踩踏；踐踏","cat":"考試重點詞","src":"Text 1 活動 / 單元評估","sent":"When too many people visit a nature site, vegetation gets trampled upon and creatures' habitats are destroyed.","exam":"單元評估選詞填空直接考過（won't trample vegetation）；環保主題寫作實用動詞","err":"搭配 trample (upon/on) sth；被動式 gets trampled upon 勿漏 -d；勿與 tremble（發抖）混淆","coll":"trample the vegetation; trample on the grass","ex1":"Please keep to the path and do not trample the flowers.","ex2":"The grass was trampled flat by the crowds of visitors."},{"en":"litter","pos":"n.","zh":"垃圾（亂拋的廢物）","cat":"日常實用","src":"Text 1 活動 / 單元評估","sent":"When landscape photographers visit nature, they should avoid touching things and take their litter home.","exam":"單元評估選詞填空語境（Take your litter home if there is no rubbish bin along the trail）；環保告示常用詞","err":"不可數名詞，勿加 -s；take your litter home 為香港郊野公園標語式固定說法；亦可作動詞「亂拋垃圾」","coll":"take your litter home; drop litter; pick up litter","ex1":"Take your litter home if there is no rubbish bin along the trail.","ex2":"We picked up the litter on the beach during the clean-up day."},{"en":"follower","pos":"n.","zh":"（社交媒體）追蹤者；粉絲","cat":"核心詞彙","src":"Reading Focus / Text 1 / 詞彙練習","sent":"Photography can feel like a chore when you are just doing it for followers and likes.","exam":"社交媒體主題選詞填空考過（gaining followers）；詞形轉換 follow(v.) → follower(n. 人)","err":"社交媒體語境多用複數 followers；勿與動詞 follow 混用；likes 在此語境指「讚好」","coll":"gain followers; do it for followers and likes","ex1":"She has more than ten thousand followers on social media.","ex2":"Don't take photos just for followers and likes - enjoy nature first."},{"en":"viral","pos":"adj.","zh":"（網上）瘋傳的","cat":"日常實用","src":"Reading Focus / 詞彙練習","sent":"(改編) The photo of the sunrise went viral and gained thousands of likes overnight.","exam":"社交媒體主題選詞填空詞庫詞；固定搭配 go viral（爆紅）為現代英語高頻用語","err":"固定搭配動詞用 go（go viral），勿說 become viral 以外亂配；與 virus（病毒）同源但詞性不同","coll":"go viral; a viral video; a viral post","ex1":"His hiking video went viral within a few days.","ex2":"The viral post attracted many visitors to the country park."},{"en":"post","pos":"v./n.","zh":"發帖；帖子","cat":"日常實用","src":"Reading Focus / 課文文法（網誌）","sent":"I've posted a photo of us together in my travel album.","exam":"網誌（blog entry）寫作任務核心詞；一詞多義：郵寄／發帖／帖子，Word Power 字典多義詞考點","err":"網上「發帖」與「郵寄」同形，靠語境分辨；名詞用法 in my next post（在下一篇帖文）","coll":"post a photo; my latest post; upload pictures in my next post","ex1":"She posted some stunning photos of the waterfall on her blog.","ex2":"I'll upload pictures in my next post - stay tuned!"},{"en":"equipment","pos":"n.","zh":"設備；裝備","cat":"考試重點詞","src":"聽力對話","sent":"What I like about the experience is that the equipment provided to us was clean and of good quality.","exam":"聽力任務評分表細節題考過（equipment: clean and of good quality）；不可數名詞為經典文法考點","err":"不可數！勿說 equipments 或 an equipment，可說 a piece of equipment；港生最常犯錯的不可數名詞之一","coll":"camping equipment; provide equipment; a piece of equipment","ex1":"The rock climbing centre provides all the equipment you need.","ex2":"Check your equipment carefully before you set out."},{"en":"instructor","pos":"n.","zh":"教練；導師","cat":"日常實用","src":"聽力對話","sent":"Gary Wong was the instructor of our session.","exam":"聽力細節題直接考過（Who was your instructor?）；詞形轉換 instruct(v.) → instructor(n. 人) → instructions(n. 指示)","err":"字尾是 -or 不是 -er（instructor）；勿與 instructions（指示）混淆詞義","coll":"a rock climbing instructor; an experienced instructor","ex1":"Our instructor showed us how to put on the safety ropes.","ex2":"Gary is one of the most experienced instructors at the centre."},{"en":"survey","pos":"n.","zh":"調查；問卷調查","cat":"日常實用","src":"聽力對話","sent":"Excuse me, do you have a minute for a quick survey?","exam":"聽力任務開場常用語境詞；跨學科學習（LWL）任務為 conducting a survey；搭配 do/conduct a survey","err":"名詞重音在首（SUR-vey）；動詞搭配用 do/conduct a survey，勿說 make a survey","coll":"a quick survey; conduct a survey; fill in a survey","ex1":"We conducted a survey on our classmates' favourite outdoor activities.","ex2":"Thank you for taking the time to complete our survey."},{"en":"backpack","pos":"n.","zh":"背囊；背包","cat":"高頻基礎詞","src":"綜合任務對話","sent":"I suppose it goes without saying that a backpack and hiking boots are essential items.","exam":"綜合任務裝備清單細節題考過；戶外裝備選詞填空高頻；同義詞 rucksack 在 Write more 出現","err":"複合名詞 back + pack 一個字寫法；同義詞 rucksack（英式）常互換考","coll":"carry a backpack; pack a backpack; a heavy backpack","ex1":"Remember to bring a backpack and wear hiking boots.","ex2":"My backpack was so heavy that my shoulders hurt."},{"en":"yummy","pos":"adj.","zh":"美味的（口語）","cat":"口語常用","src":"Text 2","sent":"We slurped down hot ramen noodles (so warming and yummy!) and went to bed early.","exam":"口語與網誌寫作常用；辨析語域：正式寫作用 delicious，口語／網誌可用 yummy","err":"雙 m 串法（yummy）；屬非正式用語，考試作文正文宜用 delicious/tasty","coll":"yummy noodles; so yummy","ex1":"The fish balls at the street stall were so yummy!","ex2":"We had some yummy hot chocolate after the night hike."},{"en":"gorgeous","pos":"adj.","zh":"極美的；很棒的","cat":"口語常用","src":"Text 2 / 文法練習","sent":"It was so gorgeous that I will never forget it.","exam":"描寫景色的高級形容詞，寫作加分詞；文法練習形容詞選擇題出現（The dress looks gorgeous on you）","err":"串法 gor-geous 極易錯（注意 -geous）；讀音 /ˈɡɔːdʒəs/；程度已極高，勿再加 very","coll":"a gorgeous sunrise; look gorgeous; absolutely gorgeous","ex1":"The sunrise from the summit was gorgeous.","ex2":"The weather was gorgeous, perfect for a picnic."},{"en":"spooky","pos":"adj.","zh":"怪異嚇人的；陰森的","cat":"口語常用","src":"單元評估","sent":"Then our camp guides shared their spooky ghost stories with us.","exam":"單元評估閱讀篇章細節詞（spooky ghost stories）；描寫氣氛形容詞","err":"雙 o 串法（spooky）；口語色彩較重，正式寫作可用 scary/frightening","coll":"spooky ghost stories; a spooky night","ex1":"We told spooky stories in the tent at night.","ex2":"The old house on the hill looks a bit spooky in the fog."},{"en":"sunrise","pos":"n.","zh":"日出","cat":"高頻基礎詞","src":"Text 2 / 詞彙練習","sent":"We waited eagerly for the famous sunrise.","exam":"Text 2 閱讀理解核心情節詞（看日出是爬富士山的獎賞）；複合名詞 sun + rise，反義 sunset","err":"watch the sunrise 前面用 the；與 sunset（日落）成對記憶勿調亂；一個字寫法","coll":"watch the sunrise; a famous sunrise; at sunrise","ex1":"We got up at 4 am to watch the sunrise on the beach.","ex2":"The sunrise painted the sky orange and pink."},{"en":"heavily","pos":"adv.","zh":"猛烈地；大量地（雨下得大）","cat":"高頻基礎詞","src":"文法練習 / 單元評估","sent":"It was raining heavily outside and, to my horror, there was water everywhere in our dormitory.","exam":"情狀副詞練習高頻答案（It is raining heavily）；rain heavily 為固定搭配，寫作描寫天氣必用","err":"港生受中文影響常說 rain big/rain hard 亂配，標準說法 rain heavily；詞形轉換 heavy → heavily（y 變 i 加 -ly）","coll":"rain heavily; breathe heavily","ex1":"You'd better stay at home. It is raining heavily.","ex2":"It rained heavily last night, so the trail is muddy today."},{"en":"collapse","pos":"v.","zh":"累垮；倒下","cat":"考試重點詞","src":"Text 2","sent":"By the time we reached our mountain hut that evening, I was so worn out that I was ready to collapse.","exam":"閱讀理解語意推斷詞（ready to collapse = 極度疲累）；so...that 結果句式一併考","err":"串法雙 l 加 -pse 結尾；一詞多義：人累倒／建築物倒塌，靠語境分辨","coll":"ready to collapse; collapse with exhaustion","ex1":"After running ten kilometres, he collapsed onto the sofa.","ex2":"I was so tired after the hike that I almost collapsed."}],"phrases":[{"phrase":"a feast for the eyes","zh":"賞心悅目的景象；視覺盛宴","type":"課文短語","sent":"These stunning images of nature are not only a feast for the eyes; they also make us want to grab a camera and start photographing outdoors.","note":"以「盛宴」比喻極美的景象；作補語用：sth is a feast for the eyes。寫作描寫風景時可代替 very beautiful。","ex":"The view from the Repulse Bay beach is a feast for the eyes."},{"phrase":"at the end of the day","zh":"說到底；歸根結底","type":"課文短語","sent":"At the end of the day, it's all about having a good time in nature and getting your viewers to feel joy through your photos.","note":"非指「一天結束時」，而是「總括而言」，用來帶出最重要的結論；多放句首，後加逗號，同義 all in all。","ex":"At the end of the day, spending time in nature is good for both body and spirit."},{"phrase":"feel like a chore","zh":"感覺像苦差事","type":"課文短語","sent":"Photography can feel like a chore when you are just doing it for followers and likes.","note":"feel like + 名詞（覺得像……）；chore 原指家務雜事，引申為「乏味的苦差」。主語是令人厭煩的活動。","ex":"Packing a large rucksack may feel like a chore, but it is essential for long-distance trekking."},{"phrase":"first off","zh":"首先（口語）","type":"課文短語","sent":"First off, it sends us out into the wild to exercise and discover new places.","note":"列舉理由時的開頭語，比 firstly / to start with 口語化；放句首，後加逗號。","ex":"First off, before setting off, we need to plan out our route and note down how long it will take."},{"phrase":"by the time","zh":"到……的時候","type":"寫作句式","sent":"By the time we reached our mountain hut that evening, I was so worn out that I was ready to collapse.","note":"引導時間子句，表示「到某事發生時（另一事已完成／已成狀態）」；描寫過去經歷時配簡單過去式，是本單元網誌寫作的重要句式。","ex":"Megan had already set up her tent by the time Kimmy reached the campsite."},{"phrase":"in no time","zh":"轉眼間；很快","type":"課文短語","sent":"In no time, its rays painted the slopes yellow and orange, and the sky glowed purple and pink.","note":"＝ very quickly；可放句首（後加逗號）或句尾。字面「不用時間」即「一下子」。","ex":"The cyclists at the back managed to catch up with the rest of the group in no time."},{"phrase":"without fail","zh":"風雨不改地；必定","type":"課文短語","sent":"Dad embarks on this journey every year without fail.","note":"強調某事必定發生、從不間斷，常與 every day / every year 等頻率語連用，放句尾；fail 在此不變形。","ex":"I wear sunblock and mosquito repellent before every hike without fail."},{"phrase":"(be well) worth it","zh":"值得的；不枉此行","type":"課文短語","sent":"This was our reward for our exhausting hike, and it was well worth it!","note":"it 指之前付出的辛勞；可加 well 加強語氣（well worth it）。亦可說 worth the effort。","ex":"Even though the weather was terribly hot on the way up, the view from the hill was worth it."},{"phrase":"be all about sth","zh":"關鍵全在於……；核心就是……","type":"課文短語","sent":"For hikers, hiking is all about the challenge - how far they can push their physical and mental limits on a trail.","note":"後接名詞或動名詞（is all about capturing...）；用來點出某活動最重要的意義，寫作主題句好用。","ex":"Landscape photography is all about capturing the beauty of the natural world."},{"phrase":"no matter the reason","zh":"無論原因為何","type":"課文短語","sent":"No matter their reason for hiking, thru-hikers are usually nature lovers who want to feel alive out in the wilderness.","note":"no matter + 名詞（不用完整子句），比 regardless of the reason 簡潔；可放句首或句尾。","ex":"No matter the reason, exercising outdoors brings endless benefits to one's health."},{"phrase":"one's fair share of sth","zh":"不少的……；相當多的……","type":"課文短語","sent":"While they are not proper thru-hikes, Hong Kong has its fair share of long-distance hiking adventures, namely the Hong Kong Trail, the MacLehose Trail, the Wilson Trail and the Lantau Trail.","note":"fair share 前的所有格須與主語一致（Hong Kong has its... / I've been on my...）；表示「數量不少」。","ex":"My school has its fair share of talented sailors, so we often win interschool sailing competitions."},{"phrase":"sharing is caring","zh":"分享就是關愛","type":"課文短語","sent":"Sharing is caring, as they say. Thru-hikers like to take care of each other on their challenging journeys.","note":"押韻俗語，常獨立成句或後接 so 帶出行動；可配 as they say（正如人們所說）。","ex":"Sharing is caring, so I decided to give some of my snacks to a fellow hiker in need."},{"phrase":"take sth to the next level","zh":"把……提升到更高層次","type":"課文短語","sent":"For those who are ready to take this hobby to the next level and push themselves far out of their comfort zone, there is thru-hiking.","note":"受詞放中間（take my stamina to the next level）；表示進一步挑戰、更上一層樓，勵志寫作常用。","ex":"To take my stamina to the next level, I have decided to go jogging four times a week."},{"phrase":"to each their own","zh":"各有所好；人各有志","type":"課文短語","sent":"There's no single 'correct' way to thru-hike. To each their own - or as thru-hikers say, 'hike your own hike'.","note":"固定說法，常獨立成句或用 but 帶出（..., but to each their own）；表示尊重不同人的喜好。","ex":"I think that hiking is more enjoyable than going to a theme park but to each their own."},{"phrase":"tag along","zh":"跟着一起去","type":"口語短語","sent":"I'm so glad he let me tag along this year!","note":"指跟隨別人同行（自己不是主角），口語用法；常說 let sb tag along / tag along with sb。","ex":"My little sister always wants to tag along when I go hiking with my friends."},{"phrase":"stay tuned","zh":"密切留意；請繼續關注","type":"日常表達","sent":"I'll upload pictures in my next post - stay tuned!","note":"原為電台用語「別轉台」，網誌／社交媒體借用作「請繼續留意更新」；多用祈使句放結尾，是 blog entry 寫作的地道收結語。","ex":"I'll share more photos of my trip next week - stay tuned!"},{"phrase":"have a word with sb","zh":"跟某人談一談","type":"口語短語","sent":"Hey Judy, do you think I could have a word with you about the upcoming orienteering event?","note":"禮貌地提出想私下談話；a word 用單數；聽力對話開場高頻用語。","ex":"Miss Chan, may I have a word with you about my project after class?"},{"phrase":"wrap it up","zh":"（把討論）結束；收尾","type":"口語短語","sent":"I'd like to carry on, but I'm running out of time, so let's wrap it up for now.","note":"會議或討論結束時的口語說法；let's wrap it up = 到此為止；聽力常作結尾訊號詞，提示重點已講完。","ex":"It's almost five o'clock, so let's wrap it up and go home."}]},{"key":"1A_U3","form":"F1","book":"1A","num":3,"theme":"Get your game on","theme_zh":"全力開賽","words":[{"en":"athlete","pos":"n.","zh":"運動員","cat":"核心詞彙","src":"Reading Focus / 詞彙練習 / 單元評估","sent":"To congratulate our young athletes on their amazing accomplishments the school is gifting each member of the team a new pair of softball gloves.","exam":"單元評估選詞填空直接考過（a professional athlete）；詞形轉換 athlete(n. 人) → athletic(adj.)，Word Power 詞族考點","err":"串法 ath-lete 勿多加 e 寫成 athelete；th 音港生易讀成 f 音；elite athletes（精英運動員）為固定搭配","coll":"elite athletes; a professional athlete; student athletes","ex1":"Hong Kong athletes did very well at the Tokyo Olympics.","ex2":"To play at high levels, athletes should give their muscles time to recover."},{"en":"spectator","pos":"n.","zh":"觀眾（現場觀賽者）","cat":"核心詞彙","src":"Reading Focus / Text 1","sent":"With spectators largely barred from attending the Games, athletes had to compete in mostly empty arenas and stadiums.","exam":"閱讀理解同義替換高頻：spectators = audience / viewers；Text 1 課文活動考過改寫此句","err":"重音在 -TA-（spec-TA-tor）；spectator 指現場觀眾，viewer 多指電視／網上觀眾，選詞須分辨","coll":"spectators at the stadium; a large crowd of spectators","ex1":"Thousands of spectators cheered for the runners.","ex2":"He could feel the spectators' excitement as soon as he stepped onto the field."},{"en":"medallist","pos":"n.","zh":"獎牌得主","cat":"核心詞彙","src":"Reading Focus / Text 1 / 詞彙練習","sent":"Medallists in particular often draw new public interest to and participation in their sports.","exam":"詞彙練習選詞填空考過（became medallists）；構詞法 medal + -list（人），同類 cyclist、finalist","err":"英式串法雙 l（medallist）；勿與 medal（獎牌）混用：medallist 指人","coll":"gold medallists; become medallists; Olympic medallists","ex1":"The gold medallist waved to her fans at the ceremony.","ex2":"Medallists often inspire more young people to take up their sports."},{"en":"compete","pos":"v.","zh":"比賽；競爭","cat":"核心詞彙","src":"Reading Focus / 詞彙練習 / 單元評估","sent":"The team travelled to the competition venue early on Saturday morning to compete with over 20 other school teams.","exam":"單元評估選詞填空直接考過（Everyone should compete on an equal footing）；詞族 compete → competition → competitor → competitive 為 Word Power 重點","err":"搭配 compete with/against sb、compete in an event；港生易誤說 compete sb（漏介詞）；重音 com-PETE","coll":"compete with other teams; compete in the Olympics; compete on an equal footing","ex1":"Our school team will compete against ten other schools next week.","ex2":"She competed in the 100m freestyle and won a silver medal."},{"en":"opponent","pos":"n.","zh":"對手","cat":"考試重點詞","src":"Text 2 / 聽力對話","sent":"In a fencing bout, two fencers try to strike their opponent for points, which are recorded electronically using swords with built-in sensors.","exam":"聽力細節題考過（participants should respect their opponents）；閱讀理解運動主題高頻詞","err":"串法 op-po-nent 雙 p 易漏；勿與 opinion（意見）混淆外形；respect your opponents 為運動精神常用句","coll":"respect your opponents; strike the opponent; beat an opponent","ex1":"No matter who wins a race, participants should respect their opponents.","ex2":"Study your opponent's weaknesses before the match."},{"en":"stadium","pos":"n.","zh":"體育場；運動場館","cat":"核心詞彙","src":"Reading Focus / Text 1 / 詞彙練習","sent":"Although they hadn't been to the stadium before, they quickly adjusted to the new environment.","exam":"詞彙練習選詞填空直接考過；比賽場地詞彙選詞填空高頻（stadium / arena / venue 三選一須辨析）","err":"重音在首（STA-dium）；複數 stadiums；stadium 多指大型露天／室內體育場","coll":"a football stadium; empty stadiums; at the stadium","ex1":"The final will be held at Hong Kong Stadium.","ex2":"Athletes had to compete in mostly empty arenas and stadiums."},{"en":"arena","pos":"n.","zh":"競技場；室內場館","cat":"核心詞彙","src":"Reading Focus / Text 1","sent":"With spectators largely barred from attending the Games, athletes had to compete in mostly empty arenas and stadiums.","exam":"比賽場地選詞填空詞庫詞；與 stadium 同類，閱讀理解列舉題常一同出現","err":"讀音 /əˈriːnə/ 重音在 -RE-；串法一個 r 一個 n；多指室內競技場","coll":"a sports arena; an empty arena","ex1":"The ice hockey match took place in a huge indoor arena.","ex2":"The new arena can hold ten thousand
