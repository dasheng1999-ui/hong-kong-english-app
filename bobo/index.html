":"考試重點詞","src":"Text 1 / 詞彙練習","sent":"Invasive animals are commonly killed because of how deadly they can be to vulnerable native wildlife.","exam":"選詞填空答案；-ly 結尾卻是形容詞（同類 lovely、friendly）為構詞考點","err":"deadly 以 -ly 結尾但是形容詞不是副詞，港生易誤當副詞用；勿與 dead（死的）混用","coll":"a deadly disease; deadly to wildlife; a deadly threat","ex1":"Some diseases are deadly to endangered animals.","ex2":"Invasive species can be deadly to native wildlife."},{"en":"nocturnal","pos":"adj.","zh":"夜行性的","cat":"核心詞彙","src":"Text 1 / 詞彙練習","sent":"These nocturnal animals can travel as much as 30km a night in search of food.","exam":"選詞填空答案；描述動物習性的主題詞；反義 diurnal（日行性的）","err":"串法 noc-tur-nal；讀音 /nɒkˈtɜːnl/ 重音在中間；勿與 natural 混淆串法","coll":"a nocturnal animal; nocturnal creatures; a nocturnal bird","ex1":"Owls and bats are nocturnal animals.","ex2":"The kākāpō is a flightless, nocturnal bird from New Zealand."},{"en":"camouflage","pos":"n.","zh":"偽裝；保護色","cat":"核心詞彙","src":"Text 1 / 詞彙練習","sent":"They have a thin coat of yellowish grey body hair that is perfect for camouflage in the savannah.","exam":"選詞填空答案；描述動物自衛方式的主題詞；亦可作動詞","err":"法語借詞串法難：ca-mou-flage（注意 -mou-）；讀音 /ˈkæməflɑːʒ/","coll":"perfect for camouflage; use camouflage; natural camouflage","ex1":"The animal's grey fur is perfect for camouflage.","ex2":"Many insects use camouflage to hide from predators."},{"en":"flightless","pos":"adj.","zh":"不能飛的","cat":"核心詞彙","src":"Text 1","sent":"The kākāpō is a flightless, nocturnal bird whose long-term survival has been threatened by humans' arrival.","exam":"描述動物特徵的主題詞；構詞 flight + -less（沒有…的）為字尾考點","err":"字尾 -less 表「沒有」（flightless = 不能飛）；一個字寫，勿分開","coll":"a flightless bird; flightless creatures","ex1":"The penguin is a flightless bird that swims very well.","ex2":"Kākāpōs are flightless, so they climb trees and parachute down."},{"en":"resilient","pos":"adj.","zh":"有適應力的；能復原的","cat":"考試重點詞","src":"Text 1 / 詞彙練習","sent":"Thus far the aardvark population has been resilient against human-caused climate change.","exam":"選詞填空答案；詞形轉換 resilient(adj.)→resilience(n.)；閱讀理解同義 tough / able to recover","err":"串法 re-sil-i-ent；讀音 /rɪˈzɪliənt/；搭配 resilient against/to sth","coll":"resilient against sth; a resilient species; show resilience","ex1":"The species has proved resilient against climate change.","ex2":"Each baby animal shows great bravery and resilience."},{"en":"creature","pos":"n.","zh":"生物；動物","cat":"高頻基礎詞","src":"Text 1 / Text 2 / 單元評估","sent":"Being rather solitary creatures, aardvarks are rarely ever seen by humans.","exam":"本單元高頻主題詞；閱讀理解同義 animal / living thing；描寫動物常用","err":"串法 crea-ture（注意 -ea-）；讀音 /ˈkriːtʃə/，港生易讀錯 -ture 尾音","coll":"living creatures; a lovable creature; solitary creatures","ex1":"The zoo lets visitors get up close with these lovable creatures.","ex2":"Kākāpōs are charming creatures with owl-like faces."},{"en":"claw","pos":"n.","zh":"爪","cat":"高頻基礎詞","src":"Text 1 / 詞彙練習","sent":"Kākāpōs cannot fly, but they can climb trees with their claws and then use their wings to parachute down.","exam":"動物身體部位主題詞；閱讀理解描述動物特徵常見","err":"串法 claw（勿與 crawl 爬行 混淆）；複數 claws；相關動詞 declaw（去爪）見 Text 2","coll":"sharp claws; powerful claws; use its claws","ex1":"The aardvark uses its sharp claws to dig underground homes.","ex2":"Some tigers are made 'safe' through declawing, a painful procedure."},{"en":"stocky","pos":"adj.","zh":"矮壯結實的","cat":"核心詞彙","src":"Text 1 / 詞彙練習","sent":"Allow me to give you the lowdown on this bird, a stocky creature with an owl-like face and green feathers.","exam":"選詞填空答案；描寫動物體型的形容詞","err":"串法 stock + y（stocky）；勿與 sticky（黏的）混淆；形容體型結實矮壯","coll":"a stocky creature; a stocky build; stocky legs","ex1":"Aardvarks are stocky pig-like mammals with long snouts.","ex2":"The kākāpō is a stocky bird that cannot fly."},{"en":"monitor","pos":"v.","zh":"監察；監測","cat":"考試重點詞","src":"詞彙練習 / 單元評估","sent":"Scientists monitoring the health of the forests have discovered that the islands lost the largest portion of primary forest area on the planet.","exam":"選詞填空答案；閱讀理解同義 keep track of / observe；亦可作名詞（顯示器）","err":"串法 mon-i-tor；及物動詞直接接受詞；勿只想到「顯示器」的名詞義","coll":"monitor the health of; monitor a population; closely monitor","ex1":"Zookeepers monitor the pandas' health around the clock.","ex2":"Scientists are monitoring the population of endangered species."},{"en":"track","pos":"v.","zh":"追蹤","cat":"考試重點詞","src":"Text 1 / 詞彙練習","sent":"Modern technology such as drones are useful for tracking and protecting critically endangered animals.","exam":"選詞填空答案；閱讀理解同義 follow / trace；保育科技主題詞","err":"作動詞「追蹤」時直接接受詞；勿只想到名詞「軌道／路徑」的意思","coll":"track an animal; track the population; track and protect","ex1":"Conservationists use drones to track the movement of the birds.","ex2":"Radio monitors help scientists track the kākāpō."},{"en":"exploit","pos":"v.","zh":"剝削；利用","cat":"考試重點詞","src":"Text 2","sent":"The true goal of these businesses is to exploit the animals for self-interest, greed and profit.","exam":"Text 2 閱讀理解主旨相關（商人剝削動物）；詞形轉換 exploit(v.)→exploitation(n.)","err":"串法 ex-ploit；讀音 /ɪkˈsplɔɪt/ 重音在後；及物動詞，搭配 exploit sb/sth for sth","coll":"exploit animals; exploit sb for profit; a non-exploitative environment","ex1":"Shady businesses exploit wild animals for money.","ex2":"Tour guides exploit the creatures by letting tourists touch them."},{"en":"greed","pos":"n.","zh":"貪婪","cat":"考試重點詞","src":"Text 2","sent":"The true goal of these businesses is to exploit the animals for self-interest, greed and profit.","exam":"Text 2 閱讀理解表格題答案（greed）；詞形轉換 greed(n.)→greedy(adj.)","err":"串法雙 e（greed）；不可數名詞；勿與 greedy（形容詞）混用詞性","coll":"driven by greed; human greed; greed and profit","ex1":"Many animals suffer because of human greed.","ex2":"The abuse is motivated by self-interest, greed and profit."},{"en":"profit","pos":"n.","zh":"利潤；利益","cat":"高頻基礎詞","src":"Text 2","sent":"Inevitably, the focus on profit means animal welfare comes second.","exam":"Text 2 閱讀理解相關；詞形轉換 profit(n.)→profitable(adj.)；搭配 make a profit / for profit","err":"串法 pro-fit；勿與 prophet（先知）同音混淆；搭配 make a profit（賺取利潤）","coll":"make a profit; for profit; the focus on profit","ex1":"The business cares only about profit, not animal welfare.","ex2":"Cinemas grew desperate for an increase in profits after the pandemic."},{"en":"welfare","pos":"n.","zh":"福利；安康","cat":"考試重點詞","src":"Text 2","sent":"Inevitably, the focus on profit means animal welfare comes second.","exam":"Text 2 選詞填空答案（welfare）；搭配 animal welfare 為本單元主題詞","err":"串法 wel-fare；不可數名詞，勿加 -s；animal welfare 為固定搭配","coll":"animal welfare; the welfare of animals; social welfare","ex1":"The animal shelter is dedicated to the welfare of abandoned pets.","ex2":"When profit comes first, animal welfare is often ignored."},{"en":"plight","pos":"n.","zh":"困境；苦況","cat":"考試重點詞","src":"Text 2","sent":"Visitors get to take selfies that are supposed to 'raise awareness' of their plight.","exam":"Text 2 選詞填空答案（plight）；閱讀理解同義 difficult situation / suffering","err":"串法 plight（gh 不發音，讀 /plaɪt/）；勿與 flight、slight 混淆","coll":"the plight of sth; raise awareness of the plight; a desperate plight","ex1":"The documentary shows the plight of endangered animals.","ex2":"An editorial tried to uncover the plight of abuse survivors."},{"en":"ignorant","pos":"adj.","zh":"無知的；不了解的","cat":"考試重點詞","src":"Text 2","sent":"They know ignorant or uncaring tourists will pay to touch, cuddle and photograph the creatures.","exam":"Text 2 選詞填空答案（ignorant）；詞形轉換 ignore(v.)→ignorant(adj.)→ignorance(n.)","err":"串法 ig-no-rant；搭配 ignorant of sth；勿與 ignore（動詞）混用","coll":"ignorant tourists; ignorant of sth; ignorant and naive","ex1":"Ignorant tourists may not know the harm they cause.","ex2":"If we don't stay up-to-date on current events, we will grow up ignorant and naive."},{"en":"superficial","pos":"adj.","zh":"表面的；膚淺的","cat":"考試重點詞","src":"Text 2","sent":"Behind the superficial cuteness, there is a grim reality.","exam":"Text 2 選詞填空答案（superficial）；閱讀理解語意題（表面 vs 真實）","err":"串法長且易錯：su-per-fi-cial；讀音 /ˌsuːpəˈfɪʃl/；反義 deep / profound","coll":"superficial cuteness; a superficial understanding; superficial charm","ex1":"The superficial cuteness of the photos hides a grim reality.","ex2":"This movie disguises itself as superficial and light-hearted."},{"en":"docile","pos":"adj.","zh":"馴服的；溫順的","cat":"考試重點詞","src":"Text 2","sent":"Smiling travellers touching or holding surprisingly docile wild animals, from elephants and lions to koalas.","exam":"Text 2 閱讀理解語意題相關（動物異常溫馴的原因）；描寫動物性情的形容詞","err":"串法 do-cile；讀音 /ˈdəʊsaɪl/；港生少見，易與 docile 及 fragile 讀音混淆","coll":"a docile animal; surprisingly docile; docile and gentle","ex1":"The wild animals in the photos look surprisingly docile.","ex2":"Drugged animals may appear docile in wildlife selfies."},{"en":"abuse","pos":"n.","zh":"虐待；濫用","cat":"核心詞彙","src":"Text 2","sent":"Worst of all, this animal abuse is driven by a vicious cycle.","exam":"Text 2 閱讀理解主旨相關；animal abuse 為主題詞；兼作動詞，讀音有別","err":"名詞 abuse 讀 /əˈbjuːs/，動詞讀 /əˈbjuːz/，詞尾清濁不同；animal abuse 為固定搭配","coll":"animal abuse; suffer abuse; a victim of abuse","ex1":"Wildlife selfies encourage animal abuse.","ex2":"The animal abuse is driven by greed and profit."},{"en":"captivity","pos":"n.","zh":"圈養；囚禁","cat":"考試重點詞","src":"Text 2","sent":"Visitors get to take selfies that are supposed to 'raise awareness' of their plight (excluding details of their captivity, of course).","exam":"閱讀理解語意題相關；詞形轉換 captive(adj./n.)→captivity(n.)；搭配 in captivity","err":"串法 cap-tiv-i-ty；不可數名詞；搭配 in captivity（被圈養）反義 in the wild","coll":"in captivity; animals in captivity; keep sth in captivity","ex1":"The animals live in captivity and cannot return to the wild.","ex2":"Many creatures suffer in captivity at these selfie farms."},{"en":"legislation","pos":"n.","zh":"法例；立法","cat":"考試重點詞","src":"Text 2","sent":"These include rigorously enforced social media policies to ban such photos, and even legislation to outlaw the selfie farms.","exam":"議論文寫作高分詞；閱讀理解解決方法（solutions）相關；詞形轉換 legislate(v.)→legislation(n.)","err":"串法長：leg-is-la-tion；不可數名詞；勿與 regulation（規例）混用","coll":"introduce legislation; legislation to ban sth; new legislation","ex1":"New legislation is needed to outlaw wildlife selfie farms.","ex2":"The government passed legislation to protect endangered species."},{"en":"deforestation","pos":"n.","zh":"砍伐森林；毀林","cat":"考試重點詞","src":"詞彙練習 / 單元評估","sent":"The exhibit features informative signage about the challenges pandas face in the wild due to deforestation and human activity.","exam":"選詞填空答案；環保及保育主題高頻詞；構詞 de- + forest + -ation","err":"串法長：de-for-est-a-tion；不可數名詞；港生易漏中間 -est-","coll":"cause deforestation; the threat of deforestation; stop deforestation","ex1":"Deforestation destroys the natural habitats of many animals.","ex2":"The islands' ecosystems face the threats of deforestation and poaching."},{"en":"poaching","pos":"n.","zh":"偷獵；非法捕獵","cat":"核心詞彙","src":"聽力對話 / 詞彙練習","sent":"Three out of the five species of rhino are critically endangered, and it's a result of poaching.","exam":"聆聽任務主題詞；詞形轉換 poach(v.)→poaching(n.)→poacher(n.)","err":"串法 poach + ing（poaching）；不可數名詞；勿與 poach（水煮）的烹飪義混淆","coll":"rhino poaching; illegal poaching; discourage poaching","ex1":"Rhino poaching is driven by the demand for rhino horn.","ex2":"Illegal poaching threatens the survival of many species."},{"en":"poacher","pos":"n.","zh":"偷獵者","cat":"核心詞彙","src":"聽力對話 / Text 1 (Write more)","sent":"Given the large rhino population, poachers in the country don't have to try very hard to find their targets.","exam":"聆聽任務主題詞；詞形轉換 poach(v.)→poacher(n. 人)；閱讀理解常見","err":"字尾 -er 表示「做…的人」；串法 poach + er；複數 poachers","coll":"discourage poachers; hunted by poachers; a rhino poacher","ex1":"Poachers hunt rhinos for their horns.","ex2":"Dehorned rhinos are less likely to become targets of poachers."},{"en":"perish","pos":"v.","zh":"死亡；喪生","cat":"考試重點詞","src":"詞彙練習","sent":"When you factor in that many millions perish in this manner each year, it is clear that we could do more to honour their rights.","exam":"選詞填空答案（perish）；閱讀理解同義 die；書面語色彩較重","err":"串法 per-ish；不及物動詞，直接用（perish 不接受詞）；比 die 較正式","coll":"perish each year; perish in large numbers","ex1":"Millions of animals perish because of human activities each year.","ex2":"Many creatures perish when their habitats are destroyed."},{"en":"invasive","pos":"adj.","zh":"入侵的；侵略性的","cat":"考試重點詞","src":"詞彙練習","sent":"Australia's native animals can become easy prey for invasive species, which is why the country has strict biosecurity restrictions.","exam":"選詞填空答案；生態主題詞；固定搭配 invasive species（外來入侵物種）","err":"串法 in-va-sive；詞形轉換 invade(v.)→invasion(n.)→invasive(adj.)；invasive species 為固定搭配","coll":"invasive species; an invasive plant; highly invasive","ex1":"Invasive species can harm the native wildlife of an area.","ex2":"The Burmese python is an invasive species in Florida."},{"en":"marvel","pos":"v.","zh":"驚歎；讚歎","cat":"考試重點詞","src":"單元評估","sent":"A new panda exhibit is now open at the local zoo, featuring two adorable giant pandas for visitors to marvel at.","exam":"單元評估閱讀理解找同義詞：be amazed by (答案 marvel at)；搭配 marvel at sth","err":"作動詞時搭配介詞 at（marvel at sth）；亦可作名詞解「奇蹟」；勿與 marble（雲石）混淆","coll":"marvel at sth; marvel at the view; a marvel of nature","ex1":"Visitors marvel at the beauty of the giant pandas.","ex2":"We marvelled at how the animals had adapted to their habitat."},{"en":"enclosure","pos":"n.","zh":"圍欄；圈養場地","cat":"日常實用","src":"單元評估","sent":"The enclosure includes a bamboo forest, a rock garden, and a stream for the pandas to play and relax in.","exam":"單元評估閱讀理解主題詞；動物園設施詞；詞形轉換 enclose(v.)→enclosure(n.)","err":"串法 en-clo-sure；讀音 /ɪnˈkləʊʒə/；勿與 exposure 混淆","coll":"an animal enclosure; a spacious enclosure; the panda enclosure","ex1":"The pandas live in a large enclosure that mimics their habitat.","ex2":"The zoo built a new enclosure with a stream and a bamboo forest."},{"en":"zookeeper","pos":"n.","zh":"動物園管理員","cat":"日常實用","src":"單元評估","sent":"The pandas are cared for by a team of trained zookeepers who monitor their health and behaviour around the clock.","exam":"單元評估閱讀理解主題詞；複合名詞 zoo + keeper；填空題答案","err":"複合名詞一個字寫（zookeeper）；勿分開寫成 zoo keeper；複數加 -s","coll":"a trained zookeeper; a team of zookeepers; experienced zookeepers","ex1":"The zookeepers feed the pandas fresh bamboo every day.","ex2":"Trained zookeepers monitor the animals' health around the clock."},{"en":"frolic","pos":"v.","zh":"嬉戲；歡快玩耍","cat":"考試重點詞","src":"單元評估","sent":"In addition to watching the pandas frolic and snack on bamboo, visitors can also learn about the conservation efforts.","exam":"單元評估閱讀理解找同義詞：similar meaning to 'play' (答案 frolic)","err":"串法 fro-lic；港生罕見，易與 frantic 混淆；描寫動物快樂玩耍","coll":"frolic in the field; watch sth frolic; frolic and play","ex1":"The baby pandas frolic and play in the enclosure.","ex2":"Visitors love watching the animals frolic in the stream."},{"en":"bravery","pos":"n.","zh":"勇敢；英勇","cat":"考試重點詞","src":"Word Power / 詞彙練習","sent":"The bravery and resilience each pup, calf, and cub shows is genuinely inspiring.","exam":"Word Power 名詞字尾練習答案（brave→bravery）；詞形轉換考點","err":"由 brave 去 e 加 -ry（bravery）；不可數名詞；港生易誤串 braverly","coll":"show bravery; great bravery; bravery and resilience","ex1":"The baby animals show great bravery as they grow up.","ex2":"Her bravery in facing danger inspired everyone."},{"en":"determination","pos":"n.","zh":"決心；毅力","cat":"考試重點詞","src":"Word Power / 詞彙練習","sent":"Each baby's antics, fears, vulnerabilities and determination to survive are both relatable and moving.","exam":"Word Power 名詞字尾練習答案（determine→determination）；詞形轉換考點","err":"串法長：de-ter-mi-na-tion；不可數名詞；搭配 determination to do sth","coll":"determination to survive; show determination; great determination","ex1":"The cub's determination to survive is truly moving.","ex2":"With determination, conservationists are saving the species."},{"en":"reliance","pos":"n.","zh":"依賴","cat":"考試重點詞","src":"Word Power / 詞彙練習","sent":"We see a baby orangutan that wants to reduce her reliance on her mother.","exam":"Word Power 名詞字尾練習答案（rely→reliance）；詞形轉換 rely(v.)→reliance(n.)→reliant(adj.)","err":"由 rely 變 reliance（y 變 i 加 -ance）；搭配 reliance on sth；港生易誤串 relyance","coll":"reliance on sth; reduce one's reliance; heavy reliance","ex1":"The young animal slowly reduces its reliance on its mother.","ex2":"Our reliance on technology helps us track endangered species."},{"en":"status symbol","pos":"n.","zh":"身分象徵","cat":"口語常用","src":"聽力對話","sent":"Some people buy rhino horn as they think rhino horn is a status symbol.","exam":"聆聽任務填空答案（status symbol）；閱讀理解相關（購買象牙、犀牛角的原因）","err":"兩個字分開寫（status symbol）；status 讀 /ˈsteɪtəs/；指顯示身分地位的物品","coll":"a status symbol; seen as a status symbol; a symbol of wealth","ex1":"Some people buy rhino horn because it is seen as a status symbol.","ex2":"Expensive cars are often used as a status symbol."}],"phrases":[{"phrase":"allow me to","zh":"請容許我；讓我","type":"課文短語","sent":"Allow me to give you the lowdown on this bird, a stocky creature with an owl-like face and green feathers.","note":"禮貌地引入介紹或動作，後接原形動詞（allow me to introduce...）；較 let me 正式，適合演講及正式介紹。","ex":"Allow me to show you the temporary habitat we've created for these injured red pandas."},{"phrase":"as luck would have it","zh":"湊巧；碰巧","type":"課文短語","sent":"As luck would have it, I've got a clip of one of the owlish creatures looking for food at night, captured by an infrared camera.","note":"指「碰巧、幸運地」發生某事，多放句首並加逗號；= luckily。","ex":"As luck would have it, my friend here is an expert on critically endangered marine animals."},{"phrase":"become easy prey","zh":"淪為容易獵殺的對象","type":"課文短語","sent":"When humans showed up bringing not-so-friendly predators such as dogs and cats, kākāpōs became easy prey.","note":"指變成容易被捕食或傷害的對象，後可接 for/to + 掠食者；prey 勿與 pray 混淆。","ex":"Without legal and conservation protection, endangered species like the black rhino become easy prey for poachers."},{"phrase":"in a minute","zh":"一會兒；稍後","type":"口語短語","sent":"We'll get to that in a minute.","note":"口語，指「很快、待會兒」；非字面「一分鐘內」，勿逐字直譯。","ex":"You're going to see a replica of an extinct dinosaur in a minute."},{"phrase":"to make matters worse","zh":"更糟的是；雪上加霜的是","type":"寫作句式","sent":"To make matters worse, human civilization began to clear and destroy their natural habitat to develop urban towns and cities.","note":"承接前文、帶出更壞情況的連接語，放句首並加逗號；議論文加強論點好用。","ex":"Poachers have been hunting endangered species to extinction for decades, and to make matters worse, they show no signs of stopping."},{"phrase":"worst of all","zh":"最糟糕的是","type":"寫作句式","sent":"Worst of all, this animal abuse is driven by a vicious cycle.","note":"帶出最嚴重的一點，常放句首並加逗號；亦可作倒裝 worst of all is + 名詞。","ex":"Worst of all, since shark pregnancies can last up to two years, rebuilding vulnerable populations is hard."},{"phrase":"be a symbol of sth","zh":"是……的象徵","type":"寫作句式","sent":"Glass towers are a symbol of urban magnificence, yet they are not perfect.","note":"指代表或象徵某事物；後接名詞（a symbol of power/culture）；描寫意義時常用。","ex":"The Inuit say the endangered bowhead whale is a symbol of their culture."},{"phrase":"have blood on one's hands","zh":"手上沾滿鮮血；須為死亡負責","type":"課文短語","sent":"We don't want blood on our hands - or on our glass.","note":"比喻須為某些死亡或傷害負責；所有格代名詞隨主語變（its/our hands）。","ex":"There is no doubt that the poaching industry has blood on its hands."},{"phrase":"by accident","zh":"意外地；不小心地","type":"課文短語","sent":"Even we, supposedly intelligent homo sapiens who understand the concept of glass, sometimes walk into it by accident.","note":"指「無意中、意外地」，反義是 on purpose（故意）；= by mistake。","ex":"Countless fish are killed by accident every day because they get caught in nets meant for another species."},{"phrase":"from scratch","zh":"從零開始；從頭做起","type":"課文短語","sent":"A structure built from scratch can incorporate even more cutting-edge contemporary technologies.","note":"指「由零開始、不靠現有基礎」做某事；常配 build / make / start from scratch。","ex":"The animal rights activist explained that polar bears can create their own dens from scratch."},{"phrase":"no pun intended","zh":"無意雙關；並非故意玩文字遊戲","type":"口語短語","sent":"It is therefore too much to expect bird brains (no pun intended) to figure out glass is a barrier.","note":"當句中偶然出現雙關語時使用，表示「並非故意」；多用括號或破折號插入句中。","ex":"Big cats often get the lion's share of conservation funding (no pun intended)."},{"phrase":"too much to expect","zh":"期望過高；要求太多","type":"寫作句式","sent":"It is therefore too much to expect bird brains to figure out glass is a barrier when it is transparent.","note":"指某要求或期望不切實際；常用句式 It is too much to expect sb to do sth。","ex":"It is too much to expect wild animals to be able to dodge traffic when crossing roads."},{"phrase":"despite / in spite of","zh":"儘管；縱使","type":"寫作句式","sent":"Despite increased public awareness, the population of some endangered species continues to decline.","note":"後接名詞、名詞片語或動名詞，不可接完整句子（要接句子須用 despite the fact that）；despite 之後勿加 of。","ex":"In spite of conservation efforts, many endangered species are still facing the threat of extinction due to habitat loss."},{"phrase":"raise awareness of sth","zh":"提高對……的意識","type":"寫作句式","sent":"The zoo hopes that the new exhibit will raise awareness about the importance of conservation efforts for giant pandas.","note":"議論文及報告寫作萬用短語；介詞用 of 或 about；awareness 為不可數名詞。","ex":"We can raise people's awareness of pollution in wetland areas by spreading the message on social media."},{"phrase":"the brink of extinction","zh":"瀕臨滅絕的邊緣","type":"課文短語","sent":"Saved from the brink of extinction by an intensive breeding programme, the Iberian lynx is a symbol of the power of conservation.","note":"固定搭配 on/from the brink of extinction；指「快要滅絕」，寫作描述瀕危狀況常用。","ex":"An intensive breeding programme saved the species from the brink of extinction."},{"phrase":"a vicious cycle","zh":"惡性循環","type":"課文短語","sent":"Worst of all, this animal abuse is driven by a vicious cycle.","note":"指問題不斷自我加劇的循環；固定搭配，vicious 讀 /ˈvɪʃəs/；議論文分析問題常用。","ex":"Wildlife selfies create a vicious cycle, as each new photo encourages more people to pose with the animals."},{"phrase":"drop sb a line","zh":"給某人留言／捎個信","type":"口語短語","sent":"If you have feedback on today's episode, feel free to drop us a line in the comments section.","note":"口語，指「留個短訊、簡短聯絡」；line 在此指短訊息，非「一行字」。","ex":"If you'd like to join our green group, just drop us a line in the comments below."}]},{"key":"3A_U1","form":"F3","book":"3A","num":1,"theme":"Do good. Feel better.","theme_zh":"行善助人，感覺更好","words":[{"en":"charitable","pos":"adj.","zh":"慈善的；樂善好施的","cat":"核心詞彙","src":"Text 1","sent":"Lending the underfed a helping hand, charitable organizations like the Tung Wah Group of Hospitals offer food assistance by handing out food and meal coupons to the needy.","exam":"單元主題詞；選詞填空常考 charitable causes / charitable organizations 搭配；詞形轉換考 charity（n.）→ charitable（adj.）。","err":"charity 的形容詞是 charitable，不是 charitible 或 charityful；「慈善機構」可說 charity 或 charitable organization，勿寫 charity organization 以外的自創組合。","coll":"charitable organizations; charitable causes; a charitable event","ex1":"Our school holds a charitable event every Christmas to help the elderly.","ex2":"Taking part in charitable activities helps students develop empathy for people in need."},{"en":"donation","pos":"n.","zh":"捐款；捐贈","cat":"核心詞彙","src":"Text 2","sent":"On Odd Socks Day, a minimum donation of $20 will earn you the fun of donning your wackiest, goofy clashing socks in class.","exam":"Text 2 閱讀理解填表題答案關鍵詞（a minimum donation of $20）；詞形轉換考 donate（v.）→ donation（n.）→ donor（n. 捐贈者）。","err":"「作出捐款」是 make a donation，不是 do a donation；「捐血」是 donate blood / blood donation，港生易誤寫 give blood donation。","coll":"make a donation; a minimum donation; blood donation; record donation total","ex1":"Every donation, no matter how small, helps the charity continue its work.","ex2":"Thank you all in advance for your kind donations to the Down syndrome charity."},{"en":"fundraising","pos":"n.","zh":"籌款","cat":"核心詞彙","src":"Text 2","sent":"This year, while students accessorize their normal uniforms with funky, mismatched footwear, we will be fundraising for a local Down syndrome charity called Dandelions.","exam":"單元評估選詞填空答案（Our major fundraising aim...）；邀請信寫作必用詞，銜接高中實用文。","err":"fundraising 連寫一字；動詞形式是 raise funds / raise money，勿寫 fundraise money；「籌款活動」是 fundraising event，不是 fundraise event。","coll":"a fundraising event; fundraising efforts; fundraise for a charity","ex1":"The class organized a fundraising bake sale for flood victims.","ex2":"Their fundraising efforts have earned the charity thousands of regular donors."},{"en":"volunteer","pos":"n. / v.","zh":"義工；自願參與","cat":"核心詞彙","src":"Text 2","sent":"Dandelion volunteers will also educate students about Down syndrome and the services the NGO provides.","exam":"全單元高頻詞，閱讀、聽力及綜合任務均出現；詞形轉換考 volunteer（n./v.）→ voluntary（adj.）→ volunteering（n.）。","err":"「做義工」是 do volunteer work / volunteer at a centre，不是 be a volunteer job；動詞用法 volunteer to do sth 後接不定式。","coll":"volunteer at a shelter; do volunteer work; recruit volunteers","ex1":"I'm volunteering at a dog shelter today and can't switch shifts.","ex2":"The NGO has over 27 000 volunteers that help serve the community."},{"en":"philanthropist","pos":"n.","zh":"慈善家","cat":"核心詞彙","src":"Text 1","sent":"You may want to do your bit, but saving the world feels impossible - how could ordinary people possibly do it when governments, NGOs, non-profits, celebrity activists and billionaire philanthropists are all struggling to set things right?","exam":"單元評估選詞填空答案（wealthy individuals, philanthropists and leaders）；閱讀理解詞義推斷常考。","err":"拼寫長（phil- + anthrop- 表「愛人類」）；重音在 -lan-（phiLANthropist）；勿與 philosopher（哲學家）混淆。","coll":"a billionaire philanthropist; generous philanthropists","ex1":"The philanthropist donated $1 million to the children's charity.","ex2":"Billionaire philanthropists alone cannot solve the world's problems - ordinary people must help too."},{"en":"activist","pos":"n.","zh":"社運人士；積極分子","cat":"核心詞彙","src":"Text 1","sent":"You may want to do your bit, but saving the world feels impossible - how could ordinary people possibly do it when governments, NGOs, non-profits, celebrity activists and billionaire philanthropists are all struggling to set things right?","exam":"單元評估選詞填空答案；詞形轉換考 act → active → activist；社會議題閱讀高頻詞，銜接DSE。","err":"activist 指為社會議題行動的人，與 actor（演員）無關；celebrity activist 指名人社運人士，兩字勿倒轉。","coll":"a celebrity activist; environmental activists; human rights activist","ex1":"The activists urged the government to provide free meals for poor students.","ex2":"As a speaker, you will be joined on stage by activists who have first-hand volunteering experience."},{"en":"advocacy","pos":"n.","zh":"倡議；提倡","cat":"考試重點詞","src":"詞彙練習","sent":"Given your expertise treating patients in many of our target countries, we believe that you will able to update our attendees on the situation on the ground and provide advocacy for better access to healthcare in the area.","exam":"詞彙練習及單元評估選詞填空答案；詞形轉換考 advocate（v./n.）→ advocacy（n.），銜接高中議論文。","err":"advocate 作動詞直接接名詞（advocate change），不加 for；名詞 advocacy 才配 for（advocacy for better healthcare）。","coll":"provide advocacy for; political advocacy; an advocacy group","ex1":"Marcus Rashford helps tackle child food poverty through charitable work and political advocacy.","ex2":"The NGO's advocacy for equal education has changed many children's lives."},{"en":"non-profit","pos":"adj. / n.","zh":"非牟利的；非牟利機構","cat":"核心詞彙","src":"詞彙練習","sent":"We are a non-profit charity that focuses on fighting lung-related diseases around the world.","exam":"詞彙練習選詞填空答案；閱讀理解常與 NGO、charity 同義互換；留意連字號寫法。","err":"須有連字號 non-profit；「非牟利」不是 no-profit 或 unprofit；作名詞可直接說 a non-profit。","coll":"a non-profit organization; non-profit funds; run a non-profit","ex1":"Donations to non-profit funds can make a difference for the frail and the sick.","ex2":"Most non-profits have to engage in fundraising in order to raise money."},{"en":"NGO","pos":"n.","zh":"非政府組織","cat":"核心詞彙","src":"Text 2","sent":"Dandelions is a local NGO that supports people with Down syndrome and their caregivers in Hong Kong.","exam":"閱讀理解常考 NGO 全寫 non-governmental organization；Text 2 指代題原題（Who are 'they'? 答案 Dandelions）。","err":"全寫是 non-governmental organization（注意 governmental 而非 government）；複數為 NGOs，s 為小寫。","coll":"a local NGO; work for an NGO; the services the NGO provides","ex1":"The NGO holds workshops to connect people within the Down syndrome community.","ex2":"Many NGOs in Hong Kong rely on donations and volunteers to keep running."},{"en":"underprivileged","pos":"adj. / n.","zh":"貧困的；弱勢的（人）","cat":"考試重點詞","src":"單元評估","sent":"The HKRC strives for a world in which people respect and protect human life and dignity, and where people are ready to offer impartial and voluntary aid to help improve the lives of the underprivileged.","exam":"單元評估段落填空答案；the + adj. 表一類人（the underprivileged = underprivileged people）是閱讀及寫作重要句式，銜接DSE。","err":"the underprivileged 本身已指一群人，後接複數動詞，勿再加 -s（不寫 the underprivilegeds）；under- 前綴表「不足」。","coll":"the underprivileged; underprivileged families; improve the lives of the underprivileged","ex1":"My teacher says that we should all do our bit to help improve the lives of the underprivileged.","ex2":"The fundraising aim is to finance free lung checks for underprivileged people in Africa and South Asia."},{"en":"needy","pos":"adj. / n.","zh":"貧困的；有需要的（人）","cat":"核心詞彙","src":"Text 1","sent":"Lending the underfed a helping hand, charitable organizations like the Tung Wah Group of Hospitals offer food assistance by handing out food and meal coupons to the needy.","exam":"詞彙練習選詞填空答案；與 the underprivileged、the poor、people in need 同義替換是閱讀理解常考點。","err":"the needy 指「貧困人士」整體，不可說 a needy；勿與 need（v./n.）的用法混淆，needy 是形容詞。","coll":"the needy; help the needy; needy families","ex1":"The charity hands out food and meal coupons to the needy every week.","ex2":"If a famine occurs, it will likely affect the marginalized groups and the needy the most."},{"en":"vulnerable","pos":"adj.","zh":"易受傷害的；脆弱的","cat":"考試重點詞","src":"詞彙練習","sent":"Hunger is a particularly pressing problem for vulnerable children, as being underfed can cause developmental delays, health problems and even stunt growth.","exam":"詞彙練習選詞填空答案（vulnerable children）；DSE高頻形容詞，社會議題寫作必備，銜接高中。","err":"拼寫易漏第一個 l（vulnerable）；後接 to 表「易受……影響」（vulnerable to disease），港生常誤用 for。","coll":"vulnerable children; vulnerable groups; vulnerable to disease","ex1":"Vulnerable children need extra protection during a food crisis.","ex2":"The elderly living alone are among the most vulnerable groups in our society."},{"en":"frail","pos":"adj.","zh":"體弱的；虛弱的","cat":"核心詞彙","src":"Text 1","sent":"Donations to non-profit funds can make a difference for the frail and the sick.","exam":"閱讀理解 the + adj. 結構考點（the frail and the sick 指體弱者和病人）；描寫長者健康狀況的常用詞。","err":"與 fail（失敗）拼寫相近易混淆；frail 多形容身體虛弱，「意志薄弱」用 weak-willed 而非 frail。","coll":"the frail; a frail old man; frail health","ex1":"Volunteers deliver hot meals to frail elderly people living alone.","ex2":"Donations can make a real difference for the frail and the sick."},{"en":"famine","pos":"n.","zh":"饑荒","cat":"核心詞彙","src":"詞彙練習","sent":"One of the most badly affected underdeveloped nations in 2021 was the war-torn country of Somalia, which has a strong possibility of falling into famine this year.","exam":"詞彙練習語境詞；閱讀理解世界糧食議題高頻詞；搭配 fall into famine（陷入饑荒）值得記憶。","err":"與 family、feminine 拼寫相近易混淆；famine 通常不可數，「一場饑荒」才用 a famine。","coll":"fall into famine; the ongoing famine; famine relief","ex1":"Many people have fallen victim to food insecurity due to the ongoing famine.","ex2":"The charity is raising funds for famine relief in East Africa."},{"en":"food insecurity","pos":"phr.","zh":"糧食不安全；糧食短缺問題","cat":"核心詞彙","src":"Text 1","sent":"You can support low-income households struggling with food insecurity by donating free meals.","exam":"Text 1 主題關鍵詞組；閱讀理解主旨題及寫作社會議題常用，銜接高中通識類題材。","err":"insecurity 這裡指「無保障」而非「無自信」；「糧食不足」勿直譯為 food shortage problem 濫用，food insecurity 更貼題。","coll":"struggle with food insecurity; tackle food insecurity; food insecurity in developing countries","ex1":"Many low-income households in the city struggle with food insecurity.","ex2":"Charities tackle food insecurity by handing out free meals and food coupons."},{"en":"malnourishment","pos":"n.","zh":"營養不良","cat":"核心詞彙","src":"Text 1","sent":"The underfed often experience health problems due to malnourishment, so fighting hunger is a way to fight disease.","exam":"Text 1 詞彙分類活動重點詞；詞形轉換考 nourish（v.）→ nourishment（n.）→ malnourishment（mal- 前綴表「不良」）。","err":"mal- 前綴表「壞」（malnourished, malfunction）；「營養不良的」是 malnourished，勿寫 malnutritioned。","coll":"suffer from malnourishment; child malnourishment; signs of malnourishment","ex1":"Doctors found signs of malnourishment among the refugee children.","ex2":"Being underfed for years can lead to serious malnourishment and stunted growth."},{"en":"underfed","pos":"adj. / n.","zh":"吃不飽的；捱餓的（人）","cat":"核心詞彙","src":"Text 1","sent":"Lending the underfed a helping hand, charitable organizations like the Tung Wah Group of Hospitals offer food assistance by handing out food and meal coupons to the needy.","exam":"詞彙練習選詞填空答案（being underfed can cause developmental delays）；under- 前綴詞族（underfed, underdeveloped, underprivileged）屬詞形轉換考點。","err":"the underfed 指捱餓的一群人，配複數動詞；勿與 unfed（沒餵食的）混淆，underfed 強調長期吃不夠。","coll":"the underfed; underfed children; badly underfed","ex1":"The underfed often experience health problems due to malnourishment.","ex2":"Soup kitchens provide hot meals for underfed children in the district."},{"en":"underdeveloped","pos":"adj.","zh":"低度發展的；不發達的","cat":"考試重點詞","src":"詞彙練習","sent":"One of the most badly affected underdeveloped nations in 2021 was the war-torn country of Somalia, which has a strong possibility of falling into famine this year.","exam":"詞彙練習選詞填空答案；與 developing（發展中）、developed（已發展）三級對照是閱讀理解常考辨析。","err":"developing country（發展中國家）與 underdeveloped country（低度發展國家）程度不同，港生易當同義詞；注意雙寫 p 之誤（developed 只有一個 p）。","coll":"underdeveloped nations; underdeveloped regions; economically underdeveloped","ex1":"Infectious diseases often run rampant in underdeveloped countries.","ex2":"The charity sends medical supplies to underdeveloped regions of the world."},{"en":"infectious","pos":"adj.","zh":"傳染性的","cat":"核心詞彙","src":"Text 1","sent":"Infectious diseases such as malaria and tuberculosis often run rampant in developing countries, while city dwellers in rich and poor countries alike fall victim to equally deadly issues such as cancer and heart diseases, partly due to urban pollution.","exam":"Text 1 健康議題關鍵詞；詞形轉換考 infect（v.）→ infection（n.）→ infectious（adj.）；閱讀理解科普題材常見。","err":"infectious disease（傳染病）是固定搭配；勿寫 infective disease；「傳染給某人」是 pass the infection to sb。","coll":"infectious diseases; highly infectious; an infectious smile","ex1":"Malaria and tuberculosis are infectious diseases common in developing countries.","ex2":"Wash your hands often to avoid catching infectious diseases."},{"en":"tuberculosis","pos":"n.","zh":"肺結核","cat":"核心詞彙","src":"詞彙練習","sent":"We would like to invite you to give a speech about your medical research on tuberculosis at a donor event we are hosting in April.","exam":"詞彙練習選詞填空答案；閱讀理解健康議題專有名詞，常以縮寫 TB 出現。","err":"拼寫極長（tu-ber-cu-lo-sis），默書易錯；屬不可數名詞，不加 a 或 -s。","coll":"suffer from tuberculosis; tuberculosis patients; research on tuberculosis","ex1":"Tuberculosis still runs rampant in some developing countries.","ex2":"The doctor has spent years doing medical research on tuberculosis."},{"en":"inclusivity","pos":"n.","zh":"共融；包容性","cat":"核心詞彙","src":"Text 2","sent":"Hopefully Odd Socks Day will help students learn about the importance of inclusivity and equality in society.","exam":"Text 2 主旨關鍵詞（Values & Attitudes: Equality）；閱讀理解主旨題及寫作社會共融議題常用，銜接DSE。","err":"詞形轉換 include（v.）→ inclusive（adj.）→ inclusivity（n.）；反義 exclude → exclusion；港生易寫成 inclusiveness（可接受但課本用 inclusivity）。","coll":"the importance of inclusivity; promote inclusivity; inclusivity and equality","ex1":"Odd Socks Day teaches students about inclusivity and equality.","ex2":"An inclusive school welcomes students of all abilities and backgrounds."},{"en":"equality","pos":"n.","zh":"平等","cat":"高頻基礎詞","src":"Text 2","sent":"Hopefully Odd Socks Day will help students learn about the importance of inclusivity and equality in society.","exam":"閱讀理解及寫作社會議題基礎詞；詞形轉換考 equal（adj.）→ equality（n.）→ equally（adv.）。","err":"反義詞是 inequality（不平等），勿寫 unequality；「性別平等」是 gender equality，詞序勿倒。","coll":"equality in society; gender equality; fight for equality","ex1":"Everyone deserves to be treated with equality and respect.","ex2":"The charity fights for equality for people with disabilities."},{"en":"caregiver","pos":"n.","zh":"照顧者","cat":"核心詞彙","src":"Text 2","sent":"Dandelions is a local NGO that supports people with Down syndrome and their caregivers in Hong Kong.","exam":"Text 2 閱讀理解細節題關鍵詞；社福議題寫作實用詞，銜接高中長者及照顧者題材。","err":"caregiver 連寫一字；英式亦作 carer；勿誤寫 care-taker（caretaker 多指大廈管理員）。","coll":"family caregivers; support caregivers; a full-time caregiver","ex1":"The NGO holds fun days to support people with Down syndrome and their caregivers.","ex2":"Being a full-time caregiver for a sick family member can be exhausting."},{"en":"syndrome","pos":"n.","zh":"綜合症","cat":"核心詞彙","src":"Text 2","sent":"I am delighted to announce that our school will be holding our annual Odd Socks Day on Friday 21 March 20__ - World Down Syndrome Day.","exam":"Text 2 主題詞（Down syndrome 唐氏綜合症）；閱讀理解專有名詞題常考；屬 Academic Use of English 學科詞彙。","err":"Down syndrome 的 Down 是人名，須大寫且不加 's；「唐氏綜合症患者」是 people with Down syndrome，比 Down syndrome patients 更尊重。","coll":"Down syndrome; people with Down syndrome; a rare syndrome","ex1":"People with Down syndrome are often misunderstood and excluded from full participation in society.","ex2":"World Down Syndrome Day falls on 21 March every year."},{"en":"outreach","pos":"n.","zh":"外展服務；社區服務","cat":"考試重點詞","src":"Text 2","sent":"The contributions collected on Odd Socks Day will be divided between Dandelion's community outreach programme and their general fund, which pays for staff, office space and other essential overhead.","exam":"Text 2 閱讀理解細節題關鍵詞（community outreach programme）；社福機構文章高頻詞。","err":"outreach 連寫一字且不可數；固定搭配 community outreach programme，勿寫 outreach community。","coll":"community outreach; an outreach programme; outreach workers","ex1":"Half of the money raised will go to the charity's community outreach programme.","ex2":"Outreach workers visit elderly people who live alone in the district."},{"en":"awareness","pos":"n.","zh":"意識；關注","cat":"考試重點詞","src":"Text 2","sent":"Besides raising money, Odd Socks Day is a way to bring the community together to raise awareness about the challenges of life with Down syndrome.","exam":"raise awareness 是DSE寫作萬用搭配；詞形轉換考 aware（adj.）→ awareness（n.）；閱讀理解目的題常考「活動目的是 raise awareness」。","err":"固定搭配 raise awareness of / about sth，勿寫 rise awareness 或 raise the awareness to；aware 後接 of（be aware of）。","coll":"raise awareness about; public awareness; spread awareness","ex1":"The event raises awareness about the challenges faced by people with Down syndrome.","ex2":"The world needs people who spread awareness on global problems and solutions."},{"en":"overhead","pos":"n.","zh":"營運開支；行政費用","cat":"考試重點詞","src":"Text 2","sent":"The contributions collected on Odd Socks Day will be divided between Dandelion's community outreach programme and their general fund, which pays for staff, office space and other essential overhead.","exam":"閱讀理解同義詞題原題：Which word in paragraph 4 means 'administrative costs'? 答案即 overhead。","err":"此處 overhead 是名詞（營運開支），不是「頭頂上的」形容詞義；作此義時通常不可數。","coll":"essential overhead; cover overhead; low overhead costs","ex1":"Part of every donation pays for the charity's overhead, such as staff and office space.","ex2":"The NGO keeps its overhead low so that more money goes directly to the needy."},{"en":"contribution","pos":"n.","zh":"貢獻；捐獻","cat":"考試重點詞","src":"Text 2","sent":"The contributions collected on Odd Socks Day will be divided between Dandelion's community outreach programme and their general fund, which pays for staff, office space and other essential overhead.","exam":"單元評估選詞填空答案（making their contribution to help）；詞形轉換考 contribute（v.）→ contribution（n.）。","err":"「作出貢獻」是 make a contribution to sth，介詞用 to；動詞 contribute to 後接名詞或動名詞，勿接不定式。","coll":"make a contribution to; a generous contribution; contributions collected","ex1":"Your contribution as a speaker could help make a difference in many lives.","ex2":"Emergency response personnel make their contribution by risking their lives to help others."},{"en":"relief","pos":"n.","zh":"救援；救濟","cat":"考試重點詞","src":"單元評估","sent":"After a 7.8 magnitude earthquake struck Türkiye in February 2023, many organizations from all over the globe sprang into action to help provide relief.","exam":"單元評估閱讀關鍵詞（disaster relief efforts）；閱讀理解災難救援題材高頻詞，銜接DSE。","err":"拼寫 -ief 結尾（relief），動詞是 relieve（-ieve）；「災難救援」是 disaster relief，勿寫 disaster rescue 混用。","coll":"disaster relief; provide relief; relief items; a sigh of relief","ex1":"The Red Cross provides disaster relief both locally and internationally.","ex2":"Volunteers packed relief items, including blankets and basic living necessities, for the earthquake victims."},{"en":"adequate","pos":"adj.","zh":"足夠的；充足的","cat":"考試重點詞","src":"單元評估","sent":"The organization is committed to ensuring that a safe and adequate blood supply is available to meet the needs of patients in Hong Kong.","exam":"單元評估閱讀理解原題：adequate = enough（circling 題答案）；同義替換高頻詞，銜接DSE閱讀。","err":"反義詞是 inadequate（不足的）；勿與 accurate（準確的）拼寫混淆；adequate 比 enough 正式。","coll":"an adequate supply; adequate funding; adequate for one's needs","ex1":"The blood banks must keep an adequate supply for patients in need.","ex2":"Without adequate funding, the charity cannot continue its outreach programmes."},{"en":"establish","pos":"v.","zh":"成立；建立","cat":"考試重點詞","src":"單元評估","sent":"They have been serving the Hong Kong community since they were established in 1950, over 70 years ago!","exam":"單元評估同義詞題原題：Find a word in paragraph 6 that has a similar meaning to 'started'（答案 established）；常考被動式 be established in + 年份。","err":"機構「成立」多用被動 was established / was founded；勿寫 the charity established in 1950（漏 was）。","coll":"be established in (year); establish an organization; a well-established charity","ex1":"The Hong Kong Red Cross was established in 1950.","ex2":"The two NGOs hope to establish a long-term partnership to fight hunger."},{"en":"humanitarian","pos":"adj.","zh":"人道主義的","cat":"考試重點詞","src":"單元評估","sent":"The HKRC also offers first aid and health training, social services for the elderly, youth and people with disabilities, as well as education and training programs that promote humanitarian values and principles.","exam":"單元評估段落填空答案（humanitarian aid）；閱讀理解救援題材高頻詞，銜接高中。","err":"詞根 human + -itarian，拼寫長易漏音節；humanitarian aid（人道救援）是固定搭配，勿寫 humanity aid。","coll":"humanitarian aid; humanitarian values; a humanitarian crisis","ex1":"Some non-profits focus on humanitarian aid for war-torn regions.","ex2":"The training programmes promote humanitarian values and principles among young people."},{"en":"impartial","pos":"adj.","zh":"公正的；不偏不倚的","cat":"考試重點詞","src":"單元評估","sent":"The HKRC strives for a world in which people respect and protect human life and dignity, and where people are ready to offer impartial and voluntary aid to help improve the lives of the underprivileged.","exam":"單元評估閱讀原文詞；im- 前綴反義詞屬詞形轉換考點（partial → impartial）；DSE閱讀高階形容詞。","err":"impartial = fair（公正），不是「不完整」；勿與 partial（偏袒的／部分的）意思搞反。","coll":"impartial aid; an impartial judge; remain impartial","ex1":"A good referee must remain impartial throughout the match.","ex2":"The Red Cross offers impartial aid to anyone in need, regardless of background."},{"en":"dignity","pos":"n.","zh":"尊嚴","cat":"考試重點詞","src":"單元評估","sent":"The HKRC strives for a world in which people respect and protect human life and dignity, and where people are ready to offer impartial and voluntary aid to help improve the lives of the underprivileged.","exam":"單元評估閱讀原文詞；人權與社會議題寫作高頻詞，銜接DSE議論文。","err":"固定搭配 human dignity / live with dignity；勿與 diginity 等錯拼混淆，注意 dig-ni-ty 三音節。","coll":"human dignity; live with dignity; protect one's dignity","ex1":"Everyone deserves to live with dignity, no matter how poor they are.","ex2":"The charity helps homeless people rebuild their lives with dignity."},{"en":"strive","pos":"v.","zh":"努力；力求","cat":"考試重點詞","src":"單元評估","sent":"The HKRC strives for a world in which people respect and protect human life and dignity, and where people are ready to offer impartial and voluntary aid to help improve the lives of the underprivileged.","exam":"單元評估閱讀原文詞（strive for）；寫作結尾段常用（we should all strive for...），提升用詞層次。","err":"配介詞 for（strive for a better world）或接不定式（strive to help）；過去式 strove / strived 不規則，易錯寫 strived only。","coll":"strive for; strive to do sth; strive for excellence","ex1":"A world where everyone helps each other sounds like something we should all strive for.","ex2":"The organization strives to improve the lives of vulnerable children."},{"en":"selfless","pos":"adj.","zh":"無私的","cat":"考試重點詞","src":"單元評估","sent":"They even won an award for all their selfless work at the 2021 Spirit of Hong Kong Awards.","exam":"單元評估閱讀原文詞；-less 後綴詞屬詞形轉換考點；描寫義工品格的寫作高頻詞。","err":"selfless（無私的）與 selfish（自私的）意思相反，只差後綴，港生極易看錯；「無私奉獻」是 selfless devotion。","coll":"selfless work; selfless devotion; a selfless volunteer","ex1":"The psychological support team won an award for their selfless work.","ex2":"Her selfless devotion to helping street sleepers inspired the whole class."},{"en":"ingrained","pos":"adj.","zh":"根深柢固的；深植的","cat":"考試重點詞","src":"單元評估","sent":"While some non-governmental organizations focus on specific areas of assistance, the HKRC have become ingrained into the community in so many different areas.","exam":"單元評估閱讀理解原題：解釋 'the HKRC have become ingrained into the community' 的意思，考文意推斷。","err":"be ingrained in / into 表「深深融入」；勿與 ingredient（材料）拼寫混淆；多形容習慣、觀念或機構的深層影響。","coll":"become ingrained into; deeply ingrained habits; ingrained beliefs","ex1":"The Red Cross has become ingrained into the community through its many services.","ex2":"The habit of helping others is deeply ingrained in her character."},{"en":"personnel","pos":"n.","zh":"人員；員工","cat":"考試重點詞","src":"單元評估","sent":"They provide assistance in these cases by fundraising for relief items including basic living necessities, and also by sending emergency response personnel.","exam":"單元評估閱讀及詞彙填空關鍵詞（emergency response personnel）；集合名詞用法屬閱讀理解考點。","err":"personnel（人員）與 personal（私人的）只差一個字母，重音也不同（personNEL）；作集合名詞配複數動詞。","coll":"emergency response personnel; medical personnel; trained personnel","ex1":"Emergency response personnel risk their lives to help disaster victims.","ex2":"The hospital urgently needs more medical personnel during the flu season."},{"en":"aftermath","pos":"n.","zh":"（災難等的）後果；餘波","cat":"考試重點詞","src":"單元評估","sent":"For example, in the aftermath of the Türkiye earthquake, they sent 3765 thermal blankets within days to help affected people brave the winter weather.","exam":"單元評估閱讀原文詞；固定搭配 in the aftermath of 是災難報道文章高頻語塊，銜接DSE閱讀。","err":"只用於負面事件之後（in the aftermath of the earthquake / war）；勿按字面理解為「之後的數學」。","coll":"in the aftermath of; the aftermath of the disaster","ex1":"In the aftermath of the typhoon, volunteers helped clear the fallen trees.","ex2":"The charity provided food and shelter in the aftermath of the earthquake."},{"en":"walkathon","pos":"n.","zh":"步行籌款活動","cat":"口語常用","src":"聽力對話","sent":"Hello, I'm a volunteer for the organizer of the Food-For-All Walkathon, and I'm doing a survey on the event.","exam":"聽力任務主題詞；-athon 後綴（marathon → walkathon, danceathon）表「長時間活動」，聽力常見。","err":"walkathon 連寫一字；「參加步行籌款」是 participate in / take part in a walkathon，勿寫 join in walkathon 漏冠詞。","coll":"participate in a walkathon; complete the walkathon; organize a walkathon","ex1":"Linda raised seven hundred and fifty dollars completing the walkathon.","ex2":"Our school is organizing a walkathon to raise funds for the food bank."},{"en":"survey","pos":"n. / v.","zh":"問卷調查；調查","cat":"口語常用","src":"聽力對話","sent":"Hello, I'm a volunteer for the organizer of the Food-For-All Walkathon, and I'm doing a survey on the event.","exam":"聽力任務情境詞（feedback survey）；綜合技能及報告寫作必用，銜接高中實用文。","err":"「做問卷調查」是 do / conduct a survey，不是 make a survey；survey on / about sth 的介詞易漏。","coll":"do a survey on; complete the survey; a feedback survey","ex1":"Could you spare a few minutes to complete our feedback survey?","ex2":"The survey shows that most participants heard about the event through online ads."},{"en":"participate","pos":"v.","zh":"參加；參與","cat":"高頻基礎詞","src":"聽力對話","sent":"Have you ever participated in our walkathon before?","exam":"聽力及寫作高頻動詞；詞形轉換考 participate（v.）→ participation（n.）→ participant（n. 參加者）。","err":"必須配介詞 in（participate in an event），港生常漏 in；比 join / take part in 正式。","coll":"participate in; active participation; participants of the event","ex1":"I've never participated in any walkathon before, so I thought I should give it a try.","ex2":"With your active participation, we have a shot at beating last year's record donation total."},{"en":"souvenir","pos":"n.","zh":"紀念品","cat":"口語常用","src":"聽力對話","sent":"Well, I wish they could give us event T-shirts as souvenirs instead.","exam":"聽力填空原答案語境詞；活動安排題材高頻詞，注意串法屬默書常錯字。","err":"拼寫源自法語（sou-ve-nir），易錯寫 suvenir / souvenier；「送紀念品」是 give out souvenirs。","coll":"event souvenirs; buy souvenirs; as a souvenir","ex1":"Participants received wrist bands as souvenirs after the walkathon.","ex2":"I think Kate will bring us some souvenirs when she gets back from Korea."},{"en":"arrangement","pos":"n.","zh":"安排","cat":"口語常用","src":"聽力對話","sent":"And were you satisfied with the arrangements of the walkathon?","exam":"聽力滿意度評分題關鍵詞；詞形轉換考 arrange（v.）→ arrangement（n.）；活動籌辦題材必用。","err":"「活動安排」常用複數 arrangements；「作出安排」是 make arrangements for sth，勿寫 do arrangement。","coll":"make arrangements for; be satisfied with the arrangements; seating arrangements","ex1":"Linda wasn't very happy with how things were arranged, so she gave the arrangements a two.","ex2":"We need to make arrangements for the upcoming bake sale at school."},{"en":"donate","pos":"v.","zh":"捐贈；捐出","cat":"高頻基礎詞","src":"Text 1","sent":"To get involved in the fight against hunger, we can donate cash, help raise funds or volunteer for charities which organize food assistance for low-income households.","exam":"全單元高頻基礎動詞；詞形轉換考 donate → donation → donor；聽力及寫作邀請信必用。","err":"donate sth to sb/sth 介詞用 to；「捐血」donate blood、「捐款」donate money，勿寫 donate for。","coll":"donate cash; donate blood; donate to a charity","ex1":"You can support low-income households by donating free meals.","ex2":"Thousands of people donate blood at the Red Cross centres every year."},{"en":"support","pos":"v. / n.","zh":"支持；支援","cat":"高頻基礎詞","src":"Text 2","sent":"Remember to show your support on 21 March and rock those kooky socks!","exam":"高頻基礎詞，聽力原文（I wanted to support the charity）及寫作均常用；show support for 是固定搭配。","err":"support 直接接賓語（support the charity），不加 to；「表示支持」是 show one's support for sth。","coll":"show your support; support a charity; psychological support","ex1":"I participated chiefly because I wanted to support the charity.","ex2":"The Red Cross has a psychological support team available around the clock."},{"en":"poverty","pos":"n.","zh":"貧窮","cat":"高頻基礎詞","src":"Text 1","sent":"Jonathan's heart went out to young people trapped in a cycle of joblessness and poverty and he was desperate to set things right.","exam":"社會議題基礎詞；固定搭配 child poverty、a cycle of poverty 常見於閱讀理解；詞形轉換考 poor → poverty。","err":"poverty 不可數，不加 a / -s；「脫貧」是 escape poverty，勿寫 escape from poor。","coll":"child poverty; escape poverty; a cycle of poverty; live in poverty","ex1":"Youngsters from poor families have a shot at escaping poverty through quality education.","ex2":"Marcus Rashford raises funds for charity groups to tackle child food poverty."},{"en":"disease","pos":"n.","zh":"疾病","cat":"高頻基礎詞","src":"Text 1","sent":"Advances in the fight are realized through vital medical research that develops strategies to combat diseases, or at least keep them at bay.","exam":"高頻基礎詞；搭配 combat / prevent / fight a disease 常見於閱讀及聽力；heart disease（心臟病）不可數用法須留意。","err":"disease 與 illness 意思相近，但 heart disease、infectious disease 為固定搭配；「患病」是 suffer from a disease。","coll":"combat diseases; infectious diseases; heart disease; disease prevention","ex1":"Medical research develops strategies to combat deadly diseases.","ex2":"Cyrus was proud that he had made a difference with his disease prevention app."},{"en":"desperate","pos":"adj.","zh":"極渴望的；絕望的","cat":"考試重點詞","src":"詞彙練習","sent":"Somalis are desperate to find a lasting solution to this crisis.","exam":"詞彙練習選詞填空答案；搭配 be desperate to do / in desperate need of 屬閱讀理解常考語塊。","err":"拼寫是 -per-（desperate），易錯寫 desparate；be desperate to do sth 接不定式，desperate for 接名詞。","coll":"desperate to do sth; in desperate need of; a desperate situation","ex1":"Many families have fallen victim to famine and are in desperate need of assistance.","ex2":"He was desperate to set things right for young people trapped in poverty."},{"en":"hunger","pos":"n.","zh":"飢餓","cat":"高頻基礎詞","src":"詞彙練習","sent":"A recent United Nations report has revealed that globally over 828 million people struggled with hunger in 2021, a figure that represents 31.9% of the world's women and girls and 27.9% of its men and boys.","exam":"詞彙練習選詞填空答案；fight hunger / struggle with hunger 是本單元核心語塊；閱讀理解糧食議題必見。","err":"hunger 不可數；「捱餓」是 go hungry（形容詞 hungry），勿寫 feel hunger 代替 feel hungry。","coll":"fight hunger; struggle with hunger; world hunger; keep hunger at bay","ex1":"In order to keep hunger at bay, underprivileged families sometimes seek help from local soup kitchens.","ex2":"Academics from around the world hope to make a dent in the problem of world hunger."},{"en":"cafeteria","pos":"n.","zh":"餐廳；飯堂","cat":"日常實用","src":"Text 2","sent":"Also, special Dandelion alphabet cookies will be available in the cafeteria for a $20 donation per pack.","exam":"Text 2 閱讀理解填表題答案位置詞；校園生活場景高頻詞，聽力常見。","err":"拼寫易錯（cafe-te-ria）；學校飯堂用 cafeteria 或 canteen 皆可，勿寫 restaurant。","coll":"the school cafeteria; in the cafeteria; cafeteria food","ex1":"Special alphabet cookies will be sold in the cafeteria on Odd Socks Day.","ex2":"We usually have lunch together in the school cafeteria."},{"en":"schedule","pos":"n. / v.","zh":"時間表；日程","cat":"日常實用","src":"聽力對話","sent":"I mean, an event like this is fun, but it'll depend on whether it suits my schedule.","exam":"聽力對話常見詞（suit my schedule）；日常會話及電郵寫作實用，銜接綜合技能任務。","err":"suit one's schedule（遷就時間表）是常用搭配；「按時」是 on schedule，「遲了」是 behind schedule。","coll":"suit my schedule; a busy schedule; on schedule; a rough schedule","ex1":"I'd love to volunteer again if it suits my schedule.","ex2":"The website has a rough schedule of the charity auction."},{"en":"mismatched","pos":"adj.","zh":"不相配的；不成對的","cat":"日常實用","src":"Text 2","sent":"This year, while students accessorize their normal uniforms with funky, mismatched footwear, we will be fundraising for a local Down syndrome charity called Dandelions.","exam":"Text 2 語境詞；mis- 前綴表「錯誤」（mismatched, misunderstood）屬詞形轉換考點；與 odd socks 呼應。","err":"mis- 前綴表「錯」；mismatched socks 即 odd socks（不成對襪子）；勿與 unmatched（無可匹敵的）混淆。","coll":"mismatched socks; mismatched footwear; a mismatched pair","ex1":"Students wear mismatched socks to school to support World Down Syndrome Day.","ex2":"His mismatched outfit made everyone smile at the party."},{"en":"coupon","pos":"n.","zh":"禮券；換領券","cat":"日常實用","src":"Text 1","sent":"Lending the underfed a helping hand, charitable organizations like the Tung Wah Group of Hospitals offer food assistance by handing out food and meal coupons to the needy.","exam":"Text 1 語境詞（meal coupons 餐券）；日常購物及慈善援助場景常見，聽力可能出現。","err":"coupon 讀音 /ˈkuːpɒn/，港生易照字面讀錯；「派發禮券」是 hand out coupons。","coll":"meal coupons; hand out coupons; a discount coupon","ex1":"The charity hands out meal coupons to needy families every month.","ex2":"I used a discount coupon to buy the gift at half price."}],"phrases":[{"phrase":"do one's bit","zh":"盡自己一分力","type":"課文短語","sent":"You may want to do your bit, but saving the world feels impossible - how could ordinary people possibly do it when governments, NGOs, non-profits, celebrity activists and billionaire philanthropists are all struggling to set things right?","note":"口語化短語，等於 do what you can to help；one's 須隨主語變化（do your / our / their bit），港生易漏改代名詞。","ex":"Please do your bit by fundraising for families affected by the recent earthquake."},{"phrase":"fall victim to sth","zh":"成為……的受害者","type":"課文短語","sent":"Infectious diseases such as malaria and tuberculosis often run rampant in developing countries, while city dwellers in rich and poor countries alike fall victim to equally deadly issues such as cancer and heart diseases, partly due to urban pollution.","note":"victim 前不加冠詞（fall victim to，不是 fall a victim to）；動詞不規則變化 fall–fell–fallen；後接災難、疾病、罪案等名詞。","ex":"We are raising money for people who have fallen victim to the volcanic eruption."},{"phrase":"keep sth at bay","zh":"使……不能靠近；遏制","type":"課文短語","sent":"Advances in the fight are realized through vital medical research that develops strategies to combat diseases, or at least keep them at bay.","note":"多與疾病、飢餓、危險等負面事物搭配（keep hunger / the disease at bay）；bay 前固定用 at，勿寫 in bay。","ex":"In order to keep hunger at bay, underprivileged families sometimes seek help from local soup kitchens."},{"phrase":"lend sb a helping hand","zh":"向某人伸出援手","type":"課文短語","sent":"Lending the underfed a helping hand, charitable organizations like the Tung Wah Group of Hospitals offer food assistance by handing out food and meal coupons to the needy.","note":"雙賓語結構 lend sb a helping hand，亦可說 lend a helping hand to sb；單元評估選詞填空曾考 lend a helping hand。","ex":"This organization lends children in need a helping hand by giving them access to high-quality education and food."},{"phrase":"make a difference","zh":"帶來改變；起作用","type":"課文短語","sent":"Donations to non-profit funds can make a difference for the frail and the sick.","note":"本單元標題句式（we can make a difference）；後接 to / for / in（make a difference to sb's life）；議論文結尾段萬用短語。","ex":"Ricky dreamed of making a difference to the lives of disabled citizens."},{"phrase":"put pressure on sb/sth","zh":"向……施壓","type":"課文短語","sent":"The idea of the latter was to put pressure on those in power to provide free meals to students from UK families facing financial difficulties.","note":"介詞固定用 on；後可接 to-不定式表示施壓目的（put pressure on the government to act）；議論社會議題時實用。","ex":"Organizations like this one are putting pressure on the government to improve the lives of the elderly."},{"phrase":"run rampant","zh":"猖獗；蔓延失控","type":"課文短語","sent":"Infectious diseases such as malaria and tuberculosis often run rampant in developing countries, while city dwellers in rich and poor countries alike fall victim to equally deadly health issues such as cancer and heart diseases, partly due to urban pollution.","note":"主語多為疾病、罪案、謠言等負面事物；rampant 在此作主語補語，run 不可換成 go；寫作描述社會問題嚴重程度時實用。","ex":"Unfortunately, crime and violence run rampant in this region."},{"phrase":"set sth right","zh":"糾正；把……變好","type":"課文短語","sent":"You may want to do your bit, but saving the world feels impossible - how could ordinary people possibly do it when governments, NGOs, non-profits, celebrity activists and billionaire philanthropists are all struggling to set things right?","note":"set things right（把事情糾正過來）是常見形式；賓語為代名詞時放中間（set it right）；與 make things better 同義但更地道。","ex":"Ethan and Valerie didn't like how the activity excluded youngsters with disabilities so they decided to set it right."},{"phrase":"have a shot at sth","zh":"有機會做到……；嘗試","type":"課文短語","sent":"With your active participation, we have a shot at beating last year's record donation total of HK$25 000.","note":"口語化短語，等於 have a chance of doing sth；at 後接名詞或動名詞（have a shot at beating / escaping），勿接不定式。","ex":"When given access to affordable housing and quality education, youngsters from poor families have a shot at escaping poverty."},{"phrase":"in advance","zh":"預先；提前","type":"課文短語","sent":"Thank you all in advance for your kind donations.","note":"Thank you in advance 是邀請信及電郵的禮貌結尾句式；亦可說 book tickets in advance；等於 ahead of time。","ex":"Let me know in advance if you're coming to the fundraising concert this weekend - I can save you a seat!"},{"phrase":"a drop in the ocean","zh":"滄海一粟；杯水車薪","type":"課文短語","sent":"That's a drop in the ocean, perhaps, considering the full scale of the issue.","note":"比喻數量相對於需求極小；常與 but 連用帶出「雖小仍有意義」的轉折，適合議論文讓步段。","ex":"The money we've raised today may be a drop in the ocean, but it will make a difference to somebody's life."},{"phrase":"make a dent in sth","zh":"使……減少；初見成效","type":"課文短語","sent":"Vision-related charities have begun to make a dent in the problem.","note":"dent 本義是「凹痕」，比喻在大問題上取得初步進展；介詞用 in（make a dent in child poverty）；常配 begin to。","ex":"This mover and shaker is beginning to make a dent in child poverty in his country."},{"phrase":"take sb/sth for granted","zh":"把……視為理所當然","type":"課文短語","sent":"Though many take eyeglasses for granted, the World Health Organization (WHO) estimates that a staggering 950 million people worldwide need glasses but cannot afford them, or otherwise lack access.","note":"賓語放 take 與 for granted 之間（take your health for granted）；DSE寫作反思類文章高頻短語，港生易漏 for。","ex":"I urge you not to take your access to clean water for granted. Things can change quickly."},{"phrase":"have a heart of gold","zh":"心地善良","type":"日常表達","sent":"Thanks! You have a heart of gold!","note":"Word Power「heart 與 mind」慣用語；讚美人樂於助人時用，口語及書面皆可；注意是 of gold 而非 golden heart。","ex":"Grandma has a heart of gold - she never turns away anyone who needs help."},{"phrase":"slip one's mind","zh":"一時忘記了","type":"口語短語","sent":"It completely slipped my mind that we might need an auction guide!","note":"主語是被忘記的事情（It slipped my mind that...），不是人；港生易誤說 I slipped my mind；口試道歉解釋時實用。","ex":"Sorry I didn't reply to your message - it completely slipped my mind."},{"phrase":"put one's mind at ease","zh":"令人安心","type":"口語短語","sent":"If it puts your mind at ease at all, we've already listed some of the items that have been donated in the poster.","note":"Word Power 慣用語；安慰別人時用，等於 make you feel less worried；at ease 為固定搭配，勿寫 in ease。","ex":"The doctor's explanation put my mind at ease before the operation."},{"phrase":"I was wondering if you could ...","zh":"不知你能否……（客氣請求）","type":"口語短語","sent":"I was wondering if you could spare a few minutes and answer some questions.","note":"禮貌請求句式，比 Can you...? 客氣得多；用過去進行式 was wondering 令語氣更委婉，口試及電郵請求皆適用。","ex":"I was wondering if you could tell me more about the volunteering opportunities at your centre."},{"phrase":"give it a try","zh":"試一試","type":"日常表達","sent":"In fact, I've never participated in any walkathon before, so I thought maybe I should give it a try.","note":"口語常用，等於 try it；固定搭配 give sth a try / give it a go；口試表達願意嘗試新事物時實用。","ex":"I've never done volunteer work before, but I'm willing to give it a try."}]},{"key":"3A_U2","form":"F3","book":"3A","num":2,"theme":"Stories new and old","theme_zh":"新舊故事縱橫談","words":[{"en":"genre","pos":"n.","zh":"（文藝作品的）類型；體裁","cat":"核心詞彙","src":"Text 1","sent":"They have been used to organize books in bookshops and libraries for centuries: comedies with happy endings and humorous elements, tragedies that make people's hearts sink, horror to keep you up at night, and sci-fi to make your head spin.","exam":"全單元主題核心詞；選詞填空常考（a healthy mix of genres）；閱讀理解辨識文體題必見，銜接高中文學賞析。","err":"genre 源自法語，讀音 /ˈʒɒnrə/，港生易照拼字讀錯；作可數名詞，複數 genres；勿與 gender（性別）混淆。","coll":"different genres; a mix of genres; the horror genre","ex1":"Doctor Who is a beloved British sci-fi classic with a healthy mix of genres like romance and comedy.","ex2":"This film is hard to classify because it blends several genres at once."},{"en":"plot","pos":"n.","zh":"情節；故事橋段","cat":"核心詞彙","src":"Text 1","sent":"Streaming apps use hyper-specific viewing data to develop addictive new shows with just the right characters and plot to hook their subscribers.","exam":"全單元高頻主題詞；閱讀理解及影評寫作必用；plot-wise（就情節而言）是 Text 2 常見用法。","err":"plot 作「情節」不可數；「劇透」是 spoiler，勿把 plot 當劇透用；「情節複雜」是 a complex plot，勿寫 a complicated storyline 濫用。","coll":"the plot of the story; a complex plot; plot elements; plot-wise","ex1":"The plot of this mystery story is so complex that thinking about it makes my head spin.","ex2":"Plot-wise, the 2020 movie is faithful to the original book."},{"en":"cliffhanger","pos":"n.","zh":"扣人心弦的懸念結尾","cat":"核心詞彙","src":"詞彙練習","sent":"The fourth season of Stranger Things ended on several huge cliffhangers, the biggest one being that, for the first time in the series, the kids of the fictional town of Hawkins did not get a happy ending.","exam":"詞彙練習（storytelling）選詞填空答案；單元評估影評詞彙填空重點詞；閱讀理解情節元素辨識常考。","err":"cliffhanger 連寫一字；固定搭配 end on a cliffhanger（介詞用 on）；勿誤解為「攀岩者」。","coll":"end on a cliffhanger; a huge cliffhanger; a thrilling cliffhanger","ex1":"Every end-of-episode cliffhanger in this drama series is thrilling.","ex2":"The season finale ended on a cliffhanger that left fans guessing all summer."},{"en":"protagonist","pos":"n.","zh":"主角；主人公","cat":"核心詞彙","src":"Text 3","sent":"Other mind-bending tropes commonly deployed in time travel stories include time loops (the protagonist repeatedly experiencing the same period of time until they can break free from the cycle of repetition).","exam":"詞彙練習及單元評估選詞填空答案；閱讀理解人物辨識題常考；與 main character 同義替換。","err":"拼寫長（pro-tag-o-nist），重音在 -tag-；反義詞是 antagonist（反派）；勿與 protester（抗議者）混淆。","coll":"the main protagonist; a likeable protagonist; the story's protagonist","ex1":"People adore the amazing supernatural powers of the show's major protagonist, Eleven.","ex2":"The protagonist did not realise that that would be the last time she would see her tarantula."},{"en":"backstory","pos":"n.","zh":"背景故事；前情","cat":"核心詞彙","src":"Text 1","sent":"You aren't sure whether you have enough brainpower for all the complicated twists and turns and backstories.","exam":"詞彙練習（storytelling）選詞填空答案；單元評估影評詞彙填空重點詞；閱讀理解情節元素題常考。","err":"backstory 連寫一字，複數 backstories（y→ies）；指角色的「過往經歷」，勿與 setting（場景）混淆。","coll":"reveal the backstory; a character's backstory; complicated backstories","ex1":"We really wanted to use flashbacks to reveal the backstories of our characters.","ex2":"The backstories of several major characters were finally revealed this season."},{"en":"climax","pos":"n.","zh":"高潮；最緊張處","cat":"核心詞彙","src":"詞彙練習","sent":"I'm so excited to see what happens in the climax of the fifth and final season.","exam":"詞彙練習（storytelling）選詞填空答案；單元評估閱讀原文詞（the play's heart-wrenching climax）；影評寫作結構詞。","err":"climax 指故事最高潮的一刻，與 ending（結局）不同；重音在前（CLI-max）；形容詞是 climactic。","coll":"the climax of the story; reach a climax; a heart-wrenching climax","ex1":"The climax of the TV series fell short of expectations, disappointing many long-time fans.","ex2":"The creative use of lighting helped set the tone for the play's heart-wrenching climax."},{"en":"storyline","pos":"n.","zh":"故事主線；劇情","cat":"核心詞彙","src":"Text 1","sent":"This sci-fi show set in the 22nd century is my favourite because of its creative and exciting storyline.","exam":"詞彙練習（storytelling）選詞填空答案；影評寫作評價劇情常用；閱讀理解主題句辨識。","err":"storyline 連寫一字；與 plot 意思相近，storyline 較強調「主線走向」；勿寫 story line 分開。","coll":"an exciting storyline; a weak storyline; the main storyline","ex1":"Although its storyline was interesting, the cartoon fell short in terms of animation quality.","ex2":"The storylines this season were not afraid to go deep into heavier themes."},{"en":"adaptation","pos":"n.","zh":"改編（作品）","cat":"核心詞彙","src":"Text 2","sent":"It sticks more closely to Dahl's original story than the first adaptation but it fails to capture the book's dark vibe and creepy atmosphere.","exam":"Text 2 影評主題詞；閱讀理解比較原著與改編題常考；詞形轉換考 adapt（v.）→ adaptation（n.）。","err":"「改編自」是 adapted from（a film adapted from a book）；勿與 adoption（領養）混淆，拼寫 adap- 而非 adop-。","coll":"a film adaptation; the first adaptation; adapted from a novel","ex1":"Overall, the writer thinks the 2020 adaptation of The Witches is decent but forgettable.","ex2":"This latest adaptation attempts to live up to the standard set by its predecessors."},{"en":"predecessor","pos":"n.","zh":"前作；前輩","cat":"考試重點詞","src":"Text 2","sent":"This latest take directed by Robert Zemeckis, which attempts to live up to the high standard set by its well-respected predecessors, yet lacks something of their magic.","exam":"Text 2 閱讀理解指代題原題（'its well-respected predecessors' refer to？）；銜接高中閱讀高階名詞。","err":"拼寫長（pre-de-ces-sor），默書易錯；反義詞是 successor（繼任者／續作）；此處指「前面的版本」。","coll":"its predecessors; live up to one's predecessor; a worthy predecessor","ex1":"The 2020 film tries to live up to the high standard set by its well-respected predecessors.","ex2":"This new smartphone is far more powerful than its predecessor."},{"en":"atmosphere","pos":"n.","zh":"氣氛；氛圍","cat":"核心詞彙","src":"Text 2","sent":"When it comes to atmosphere, however, the film falls short, failing to capture the book's dark and creepy vibe.","exam":"Text 2 影評關鍵詞；閱讀理解主旨題（作者批評電影未能營造氛圍）；影評寫作評價用詞。","err":"atmosphere 一詞兩義：此處指「氣氛」，亦可指「大氣層」（U4 主題）；「營造氣氛」是 create / capture an atmosphere。","coll":"a creepy atmosphere; create an atmosphere; a tense atmosphere","ex1":"The film fails to capture the book's dark and creepy atmosphere.","ex2":"The dim lighting created a spooky atmosphere throughout the play."},{"en":"scheme","pos":"n.","zh":"計謀；（陰謀）計劃","cat":"考試重點詞","src":"Text 2","sent":"Little do they know that numerous witches, including the Grand High Witch, are gathering there later to discuss a scheme to transform children into mice.","exam":"Text 2 詞彙填空原題答案（a scheme to transform children into mice）；閱讀理解語境選詞常考。","err":"scheme 讀音 /skiːm/，ch 發 /k/ 音；此處帶「陰謀」貶義，亦可中性指「計劃／方案」（a government scheme）。","coll":"a scheme to do sth; a cunning scheme; a government scheme","ex1":"The witches gathered to discuss a scheme to transform children into mice.","ex2":"The government is launching a new scheme that will encourage tourists to spend more."},{"en":"encounter","pos":"v. / n.","zh":"遭遇；偶遇","cat":"考試重點詞","src":"Text 2","sent":"The boy and his new friend Bruno encounter the High Witch and suffer that very fate.","exam":"Text 2 詞彙填空原題答案（did not encounter any problems）；閱讀理解語境選詞及詞形不變考點。","err":"encounter 作動詞直接接賓語，不加介詞（encounter problems，不寫 encounter with problems）；作名詞才用 an encounter with sb。","coll":"encounter problems; encounter difficulties; a chance encounter","ex1":"Since we had prepared thoroughly, we did not encounter any problems in the Q&A session.","ex2":"The boy encounters the High Witch and is turned into a mouse."},{"en":"conflict","pos":"n.","zh":"衝突；矛盾","cat":"考試重點詞","src":"Text 2","sent":"This sets up the movie's central conflict: can they defeat the evil witches and turn themselves back into humans?","exam":"Text 2 詞彙填空原題答案（a minor conflict over...）；閱讀理解情節結構題常考（central conflict）。","err":"conflict 作名詞重音在前（CON-flict），作動詞重音在後（con-FLICT）；「就……起衝突」是 a conflict over sth。","coll":"the central conflict; resolve a conflict; a conflict over sth","ex1":"Jim and Pam had a minor conflict over how the classroom should be decorated.","ex2":"The story's central conflict is whether the boys can turn back into humans."},{"en":"overshadow","pos":"v.","zh":"使黯然失色；蓋過","cat":"考試重點詞","src":"Text 2","sent":"The film's scares are overshadowed by over-the-top special effects, costumes and sets.","exam":"Text 2 詞彙填空原題答案（it overshadowed the taste of the shrimp）；閱讀理解語境詞義推斷題。","err":"overshadow 連寫一字；被動式常用 be overshadowed by sth；勿與 overlook（忽略）混淆。","coll":"be overshadowed by; overshadow the message; overshadow one's achievements","ex1":"The film's scares are overshadowed by over-the-top special effects.","ex2":"I put too much salt in the soup and it overshadowed the taste of the shrimp."},{"en":"narration","pos":"n.","zh":"旁白；敘述","cat":"核心詞彙","src":"聽力對話","sent":"And not only that. The book has funny narration.","exam":"聽力任務填空原答案（funny narration）；詞形轉換考 narrate（v.）→ narration（n.）→ narrator（n. 敘述者）。","err":"narration（敘述方式）與 narrator（敘述者）勿混；「第一人稱敘述」是 first-person narration。","coll":"funny narration; first-person narration; the narration of the story","ex1":"What's better than a perfect combination of mystery and comedy, with funny narration that makes you laugh?","ex2":"The filmmakers took Kirby's experience into account before hiring him as the narrator."},{"en":"spooky","pos":"adj.","zh":"陰森的；令人毛骨悚然的","cat":"核心詞彙","src":"Text 2","sent":"Fun-filled, spooky and visually striking, The Witches (2020) is a family-friendly affair pitting magic against friendship and love.","exam":"Text 2 影評形容詞；閱讀理解氣氛描寫詞；恐怖／奇幻題材寫作實用。","err":"spooky 屬口語，多形容鬼怪、陰森氣氛；與 creepy（令人不安的）意思相近可互換；勿與 spicy（辣的）混淆。","coll":"a spooky atmosphere; a spooky spectacle; spooky creatures","ex1":"The Witches (2020) is a fun-filled, spooky and visually striking family film.","ex2":"We told spooky ghost stories around the campfire at night."},{"en":"striking","pos":"adj.","zh":"醒目的；引人注目的","cat":"核心詞彙","src":"Text 2","sent":"Fun-filled, spooky and visually striking, The Witches (2020) is a family-friendly affair pitting magic against friendship and love.","exam":"Text 2 影評形容詞；閱讀理解評價用詞；visually striking（視覺上搶眼）是影評高頻搭配。","err":"striking 此處是形容詞「醒目的」，與 strike（罷工／擊打）動詞義不同；「視覺搶眼」是 visually striking。","coll":"visually striking; a striking resemblance; striking visuals","ex1":"The film is fun-filled and visually striking, but packs no emotional punch.","ex2":"The costumes in the play were striking and full of colour."},{"en":"faithful","pos":"adj.","zh":"忠實的（於原著）","cat":"核心詞彙","src":"Text 2","sent":"Plot-wise, the movie is faithful to the book.","exam":"Text 2 影評關鍵詞；閱讀理解比較原著與改編題常考；faithful to the book 是影評固定搭配。","err":"「忠於原著」是 faithful to the book，介詞用 to；faithful 亦可解「忠誠的」（a faithful friend）。","coll":"faithful to the book; a faithful adaptation; stay faithful to sth","ex1":"Plot-wise, the movie is faithful to the book and sticks closely to Dahl's story.","ex2":"The film is a faithful adaptation that keeps most of the original characters."},{"en":"subscriber","pos":"n.","zh":"訂閱者；用戶","cat":"核心詞彙","src":"Text 1","sent":"Streaming apps use hyper-specific viewing data to develop addictive new shows with just the right characters and plot to hook their subscribers.","exam":"詞彙練習（online streaming）選詞填空答案；詞形轉換考 subscribe（v.）→ subscription（n.）→ subscriber（n.）。","err":"「訂閱」是 subscribe to sth，介詞用 to（a subscriber to many platforms）；港生易漏 to。","coll":"a subscriber to; hook subscribers; paying subscribers","ex1":"As a subscriber to many streaming platforms, I do appreciate having so many recommendations.","ex2":"Streaming apps develop addictive shows to hook their subscribers."},{"en":"algorithm","pos":"n.","zh":"演算法","cat":"考試重點詞","src":"詞彙練習","sent":"Whenever I browse the net or have a look at my recommendations list, I feel impressed by how well the algorithms these tech firms use work.","exam":"詞彙練習（online streaming）語境詞；科技題材閱讀高頻詞，與 U3 主題呼應，銜接DSE通識類題材。","err":"拼寫特別（al-go-rithm，注意 -rithm 而非 -rythm）；讀音 /ˈælɡərɪðəm/；形容詞是 algorithmic。","coll":"the algorithm; a recommendation algorithm; how the algorithm works","ex1":"The algorithms used in these apps only show users things that they like or agree with.","ex2":"Streaming platforms rely on algorithms to make personalized recommendations."},{"en":"recommendation","pos":"n.","zh":"推薦；建議","cat":"高頻基礎詞","src":"詞彙練習","sent":"Whenever I browse the net or have a look at my recommendations list, I feel impressed by how well the algorithms these tech firms use work.","exam":"詞彙練習（online streaming）選詞填空答案；詞形轉換考 recommend（v.）→ recommendation（n.）；聽力書評任務高頻。","err":"拼寫留意雙 m（recommend）單 c；「推薦某人／某物」是 recommend sth to sb，勿寫 recommend sb sth。","coll":"a recommendations list; personalized recommendations; make a recommendation","ex1":"At the top of your personalized recommendations list is a Korean family drama.","ex2":"I appreciate having so many good recommendations from the streaming apps."},{"en":"binge","pos":"v.","zh":"煲劇；一口氣看完","cat":"口語常用","src":"詞彙練習","sent":"I feel like the only way to get closure is to binge on the whole series in one sitting.","exam":"詞彙練習（viewing behaviour）選詞填空答案；口語追劇文化詞；閱讀理解觀看行為題材常見。","err":"「煲劇」是 binge on sth 或 binge-watch，介詞用 on；港生易漏 on 或誤寫 binge watching without hyphen。","coll":"binge on a series; binge-watch; binge in one sitting","ex1":"Whether you enjoy horror or comedy, it's easier than ever to kill time by binging on TV and movies.","ex2":"I binged on the whole season in a single weekend."},{"en":"resume","pos":"v.","zh":"重新開始；恢復","cat":"考試重點詞","src":"詞彙練習","sent":"But nowadays, once I get started on a show, I really can't bring myself to resume my day to day activities at all.","exam":"詞彙練習（viewing behaviour）選詞填空答案；詞形轉換不變但與名詞 résumé（履歷，U3）同形異義，閱讀常考辨析。","err":"動詞 resume /rɪˈzjuːm/（恢復）與名詞 résumé /ˈrɛzjʊmeɪ/（履歷）同拼不同音義；此處是「恢復」。","coll":"resume activities; resume work; resume playing","ex1":"Once I get started on a show, I can't bring myself to resume my day-to-day activities.","ex2":"After the break, the players resumed the match."},{"en":"resolve","pos":"v.","zh":"解決；化解","cat":"考試重點詞","src":"詞彙練習","sent":"But it is perhaps because of the creators' bravery in not seeking to resolve all the show's conflicts that season four has become the series' most popular.","exam":"詞彙練習（storytelling）選詞填空答案；詞形轉換考 resolve（v.）→ resolution（n.）；閱讀理解情節結構詞。","err":"resolve a conflict（化解衝突）；名詞形式 resolution 兼指「決心」與「（情節的）結局」；勿與 dissolve（溶解）混淆。","coll":"resolve a conflict; resolve an issue; resolve differences","ex1":"The creators were brave in not seeking to resolve all the show's conflicts.","ex2":"By the end of the story, all the misunderstandings are finally resolved."},{"en":"thrilling","pos":"adj.","zh":"扣人心弦的；緊張刺激的","cat":"核心詞彙","src":"詞彙練習","sent":"The time spent adding a greater depth of emotion to the show paid off because it made the escalation of dramatic tension at every twist and turn all the more thrilling.","exam":"詞彙練習（storytelling）及單元評估選詞填空答案；詞形轉換考 thrill（v./n.）→ thrilling（adj.）→ thrilled（adj. 感到興奮的）。","err":"thrilling（令人興奮的，形容事物）與 thrilled（感到興奮的，形容人）勿混：a thrilling film / I was thrilled。","coll":"a thrilling plot; thrilling and suspenseful; all the more thrilling","ex1":"The escalation of dramatic tension at every twist and turn was all the more thrilling.","ex2":"The chase scene was the most thrilling part of the whole movie."},{"en":"review","pos":"n. / v.","zh":"評論；影評；書評","cat":"核心詞彙","src":"Text 2","sent":"Matilda has written a review of season 4 of the television show 'Stranger Things'.","exam":"全單元寫作文體（Focus on Text Type: Review）；單元評估閱讀語篇即為 a review；寫作卷影評／書評必用。","err":"review 作「評論」可數（a film review）；「寫評論」是 write a review of sth，介詞用 of；勿與 revise（溫習）混淆。","coll":"a film review; write a review of; bad reviews; a positive review","ex1":"The movie director's heart sank when he read all the bad reviews of his film.","ex2":"In this review, I will comment on both the plot and the acting."},{"en":"reclaim","pos":"v.","zh":"取回；重拾","cat":"考試重點詞","src":"單元評估","sent":"The local play 'The Sunflower Field' tells the story of a young woman's journey to reclaim her sense of identity, family, and purpose.","exam":"單元評估閱讀同義詞題原題：Which word in paragraph 1 shares a similar meaning to 'take back'？答案即 reclaim。","err":"re- 前綴表「重新」；reclaim（取回）與 claim（聲稱／索取）意思有別；亦可解「填海／回收（water/land）」（見U4）。","coll":"reclaim one's identity; reclaim land; reclaim what is lost","ex1":"The play tells the story of a woman's journey to reclaim her sense of identity.","ex2":"She fought hard to reclaim the title she had lost the previous year."},{"en":"embody","pos":"v.","zh":"體現；完美詮釋","cat":"考試重點詞","src":"單元評估","sent":"Sarah Ng, who played the lead role, perfectly embodied Maria's journey.","exam":"單元評估閱讀詞彙填空原題答案（She embodied the spirit of her character）；閱讀理解語境選詞題。","err":"embody 直接接賓語（embody the spirit），不加介詞；詞形轉換名詞是 embodiment；勿與 embrace（擁抱）混淆。","coll":"embody the spirit of; embody a character; embody an ideal","ex1":"Sarah Ng perf
