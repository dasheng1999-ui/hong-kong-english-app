h a lasting appeal."},{"en":"sci-fi","pos":"n./adj.","zh":"科幻（作品）","cat":"口語常用","src":"詞彙練習","sent":"I feel a bit drained from all the futuristic sci-fi shows I've been watching on TV lately.","exam":"science fiction 的縮略語，口語及聆聽常見；詞彙練習選詞填空答案","err":"中間有連字號 sci-fi；讀音 /ˈsaɪfaɪ/，兩個音節都讀 /aɪ/","coll":"a sci-fi show; sci-fi movies; the sci-fi genre","ex1":"Trixie has written a short story under the sci-fi genre.","ex2":"My brother loves sci-fi films about robots and space travel."},{"en":"romance","pos":"n.","zh":"愛情故事；浪漫","cat":"日常實用","src":"詞彙練習","sent":"I'm actually getting into the romance genre at the moment.","exam":"單元評估選詞填空答案（a romance novel）；詞形轉換 romance(n.)→romantic(adj.)","err":"romance 是名詞，「浪漫的」是 romantic；勿說 a romantic（漏名詞）當「愛情片」","coll":"the romance genre; a romance novel; a romantic tragedy","ex1":"Whether it is a mystery novel or a romance novel, there is something helpful to take away from reading them.","ex2":"These days I tend to go for sweet, wholesome romance movies."},{"en":"fiction","pos":"n.","zh":"小說；虛構作品","cat":"考試重點詞","src":"詞彙練習","sent":"That's one of the marks of great fiction - you never know what to expect.","exam":"單元評估選詞填空答案（an adaptation of an existing work of fiction）；不可數名詞","err":"不可數，勿說 a fiction / fictions；「非小說類」是 non-fiction；勿與 friction（摩擦）拼混","coll":"a work of fiction; literary fiction; science fiction","ex1":"Few people take advantage of the wide variety of literary fiction that can be borrowed for free from public libraries.","ex2":"Sherlock Holmes is one of the most famous characters in fiction."},{"en":"novelist","pos":"n.","zh":"小說家","cat":"考試重點詞","src":"Text 3","sent":"The debut novelist used his source material to great effect.","exam":"詞形轉換 novel(n. 小說)→novelist(n. 小說家)，字尾 -ist 表「從事……的人」","err":"novel 亦解「新奇的」（adj.），一詞多義是閱讀陷阱；novelist 指寫小說的人，不是「新手」","coll":"a great novelist; a debut novelist","ex1":"Mysteries adapted from the works of great novelists like Sir Arthur Conan Doyle are my favourite.","ex2":"The novelist keeps her readers guessing until the very last page."},{"en":"adaptation","pos":"n.","zh":"改編作品","cat":"考試重點詞","src":"詞彙練習","sent":"The good thing about original murder-mystery movies is that it's harder to get spoilers for them than film adaptations of works of literature.","exam":"詞形轉換 adapt(v. 改編)→adaptation(n.)；單元評估選詞填空答案；留意被動式 be adapted from","err":"adapt（改編；適應）與 adopt（領養；採納）一個字母之差，選詞填空經典陷阱","coll":"a film adaptation; be adapted from a novel","ex1":"The book has been adapted into many films and TV programmes.","ex2":"Start with some short stories or even an adaptation of an existing work of fiction."},{"en":"spoiler","pos":"n.","zh":"劇透","cat":"口語常用","src":"Text 1","sent":"The good thing about original murder-mystery movies is that it's harder to get spoilers for them than film adaptations of works of literature.","exam":"閱讀理解曾要求解釋 spoilers 的意思：information about what happens in a story that could ruin the experience","err":"詞根 spoil（破壞）+ -er；「不要劇透」口語說 No spoilers, please!","coll":"spoiler alert; avoid spoilers; get spoilers","ex1":"Please don't give me any spoilers - I haven't watched the final episode yet!","ex2":"Spoilers could ruin the reading or viewing experience of someone who has not yet seen the story."},{"en":"gripping","pos":"adj.","zh":"扣人心弦的；引人入勝的","cat":"考試重點詞","src":"詞彙練習","sent":"There are many villains and accomplices in this fast-paced and gripping story, but I think that's what makes it such a fun read.","exam":"詞彙練習選詞填空答案；評論故事的高分形容詞：gripping ≈ engaging / exciting","err":"-ing 分詞形容詞形容作品本身；雙寫 p：grip→gripping","coll":"a gripping story; a gripping plot","ex1":"Many readers love The Hound of the Baskervilles because the plot is gripping.","ex2":"I prefer reading detective stories with open endings because they are more gripping."},{"en":"ingenious","pos":"adj.","zh":"巧妙的；別出心裁的","cat":"考試重點詞","src":"Text 1","sent":"An ingenious plot twist, I must say.","exam":"詞彙練習選詞填空答案（ingenious twists and turns）；評論寫作高分詞 ≈ clever / brilliant","err":"勿與 genius（天才，名詞）混淆：ingenious 是形容詞；讀音 /ɪnˈdʒiːniəs/","coll":"an ingenious plot twist; an ingenious idea","ex1":"Many people think that And Then There Were None is the best mystery story because of the ingenious plot twist.","ex2":"The tale has so many ingenious twists and turns that it always subverts your understanding of what's going on."},{"en":"daunting","pos":"adj.","zh":"令人生畏的；使人卻步的","cat":"考試重點詞","src":"單元評估","sent":"It may seem daunting to write a whole novel at first, so start with some short stories or even an adaptation of an existing work of fiction.","exam":"詞彙練習及單元評估選詞填空答案；閱讀理解同義替換：daunting ≈ intimidating / frightening","err":"au 讀 /ɔː/：/ˈdɔːntɪŋ/；形容任務艱鉅令人卻步，程度比 difficult 強","coll":"a daunting challenge; a daunting task; seem daunting","ex1":"The daunting challenges the protagonist faced made my heart race.","ex2":"Death on the Nile is a page-turner that is not too daunting for the novice mystery reader."},{"en":"realistic","pos":"adj.","zh":"寫實的；切合現實的","cat":"考試重點詞","src":"Text 1","sent":"I find mysteries with an open ending much more realistic, and Iman Mahmood's You Don't Know Me fits the bill.","exam":"詞彙練習及單元評估選詞填空答案；詞形轉換 real→realistic→realistically","err":"realistic（寫實的）與 real（真實的）意思有別：故事可以 realistic 但不 real","coll":"a realistic ending; realistic characters","ex1":"More and more people enjoy open-ending mysteries because they are more realistic.","ex2":"Research is crucial if you want your stories to be realistic."},{"en":"profound","pos":"adj.","zh":"深刻的；深遠的","cat":"考試重點詞","src":"單元評估","sent":"As a writer, I understand the profound satisfaction that comes from creating a chilling and suspenseful story that leaves readers on the edge of their seats.","exam":"詞彙練習及單元評估選詞填空答案；閱讀理解同義替換：profound ≈ deep","err":"重音在第二音節 pro-FOUND；勿與 found（建立）或 profit 混淆","coll":"a profound effect; profound satisfaction","ex1":"The final reveal of the killers' identities is that much more profound.","ex2":"The story had a profound effect on how I see friendship."},{"en":"relevant","pos":"adj.","zh":"有關的；切合的","cat":"考試重點詞","src":"詞彙練習","sent":"The idea that we are all morally grey is as relevant today as it was when the story was first published.","exam":"詞彙練習及單元評估選詞填空答案；反義詞 irrelevant 以 ir- 開頭，字首轉換常考","err":"拼寫 rele-vant；搭配 relevant to sth 用介詞 to；勿串成 relevent","coll":"relevant to today's readers; a relevant example","ex1":"Make sure your sentences are logical and relevant to the content of the text.","ex2":"Classic stories often stay relevant because their themes never grow old."},{"en":"spooky","pos":"adj.","zh":"陰森的；令人毛骨悚然的","cat":"口語常用","src":"單元評估","sent":"There were figures of spooky dolls hanging from the walls, as well as discoloured and dirty clothing scattered across the floor as if it was left there by the victims.","exam":"口語評論恐怖故事常用；閱讀理解同義替換：spooky ≈ creepy / eerie","err":"詞根 spook（鬼）；比較級 spookier 要改 y 為 i；語氣較口語，作文可用 eerie 提升層次","coll":"a spooky legend; a spooky atmosphere; spooky dolls","ex1":"The story has a spooky legend about a demonic hound.","ex2":"Many readers love the book, but the atmosphere is too spooky for me."},{"en":"eerie","pos":"adj.","zh":"怪異可怕的；陰森的","cat":"考試重點詞","src":"單元評估","sent":"As I entered the house, I was met with an eerie silence, which seemed to be the only sound in the background.","exam":"單元評估閱讀曾考同義詞：eerie ≈ creepy；描寫氣氛的寫作高分詞","err":"拼寫特別：e-e-r-i-e，三個 e；讀音 /ˈɪəri/，勿讀成 /ˈeri/","coll":"an eerie silence; an eerie atmosphere","ex1":"An eerie silence filled the empty train carriage.","ex2":"The haunted house uses sound effects to create an eerie atmosphere."},{"en":"gruesome","pos":"adj.","zh":"恐怖的；令人不寒而慄的","cat":"考試重點詞","src":"單元評估","sent":"The first one had been decorated with gruesome decorations that portrayed the suffering of tortured souls.","exam":"描寫恐怖場面的高分詞；閱讀理解同義替換：gruesome ≈ horrible / shocking","err":"拼寫 grue-some，字尾 -some 如 awesome；勿串成 gruesom","coll":"a gruesome crime scene; gruesome decorations","ex1":"The sleuth arrived at the gruesome crime scene.","ex2":"Some readers find the murders in the novel too gruesome."},{"en":"haunted","pos":"adj.","zh":"鬧鬼的","cat":"核心詞彙","src":"單元評估","sent":"A peek into a haunted house always ignites a mix of fear and curiosity in most people.","exam":"單元評估閱讀篇章主題詞（a haunted house 鬼屋）；動詞 haunt 的過去分詞作形容詞","err":"au 讀 /ɔː/：/ˈhɔːntɪd/；勿與 hunted（被獵殺的）拼混，一個字母之差","coll":"a haunted house; be haunted by ghosts","ex1":"The haunted house had a reputation for being one of the most horrific places to visit.","ex2":"I would recommend this haunted house for those brave enough to venture into the unknown."},{"en":"hair-raising","pos":"adj.","zh":"使人毛髮直豎的；驚險的","cat":"口語常用","src":"詞彙練習","sent":"For me, the more hair-raising a movie, the better.","exam":"複合形容詞構詞（hair + raising）；單元評估亦出現 hair-raising sensations","err":"要有連字號 hair-raising；勿與 hair-rising 混淆——是 raise（使豎起）不是 rise","coll":"a hair-raising movie; hair-raising sensations","ex1":"The roller coaster ride was absolutely hair-raising.","ex2":"Visitors can experience the intense, hair-raising sensations of the haunted house firsthand."},{"en":"reputation","pos":"n.","zh":"名聲；聲譽","cat":"考試重點詞","src":"單元評估","sent":"I knew that the experience would indeed be unforgettable as the haunted house had a reputation for being one of the most horrific places to visit.","exam":"單元評估閱讀曾直接問 What reputation did the haunted house have；搭配 have a reputation for","err":"介詞用 for：a reputation for being scary；勿受粵語影響用 of 代替 for","coll":"have a reputation for; build a reputation; a stellar reputation","ex1":"The ostriches in the zoo have already built a reputation for pecking and biting visitors.","ex2":"Sherlock Holmes has it all: brains, wealth, a stellar reputation and a good friend."},{"en":"carriage","pos":"n.","zh":"車廂","cat":"高頻基礎詞","src":"Text 2","sent":"The rain began hitting the carriage window as he checked his watch: 23.45.","exam":"Text 2 場景詞；閱讀理解曾問 Where does the story take place（on board a train）","err":"拼寫雙 r：car-riage；勿與 garage（車房）或 cabbage（椰菜）混淆字尾","coll":"a train carriage; the only soul in the carriage","ex1":"The only other soul in the carriage was a man several rows ahead.","ex2":"We found two empty seats at the end of the carriage."},{"en":"mutter","pos":"v.","zh":"咕噥；低聲抱怨","cat":"考試重點詞","src":"Text 2","sent":"'Still ages to go', he muttered grumpily. 'Can't we go a bit faster?'","exam":"閱讀理解語氣題線索詞：muttered grumpily 反映人物不耐煩；寫作對話標籤高分詞","err":"雙 t：mut-ter；與 whisper（輕聲說）不同——mutter 帶不滿情緒","coll":"mutter grumpily; mutter to oneself","ex1":"He muttered something under his breath and walked away.","ex2":"'This train is so slow,' she muttered to herself."},{"en":"petrified","pos":"adj.","zh":"嚇呆的；嚇得動彈不得的","cat":"考試重點詞","src":"Text 2","sent":"Nearly petrified, Ron ran like the wind.","exam":"閱讀理解同義替換：petrified ≈ terrified / extremely frightened；程度比 scared 強得多","err":"-ed 分詞形容詞形容人的感受；原義是「石化」，引申為嚇得像石頭般不能動","coll":"be petrified with fear; nearly petrified","ex1":"She was petrified when she heard footsteps behind her in the dark.","ex2":"The petrified boy could not move or make a sound."},{"en":"uncomfortable","pos":"adj.","zh":"不舒服的；不自在的","cat":"高頻基礎詞","src":"Text 2","sent":"Emily's shoes felt uncomfortable because they were the wrong size.","exam":"Text 2 選詞填空答案；字首 un- + comfortable 構成反義詞，字首轉換常考","err":"拼寫長易漏音節：un-com-for-ta-ble；勿串成 uncomfatable","coll":"feel uncomfortable; an uncomfortable seat","ex1":"'Perhaps his seat was uncomfortable,' Ron thought, and fell back to sleep.","ex2":"I felt uncomfortable walking home alone at night."},{"en":"survivor","pos":"n.","zh":"生還者；倖存者","cat":"考試重點詞","src":"Text 2","sent":"The only survivor of the crash, caused by a speeding train, was Ron Green, who is still in a coma.","exam":"Text 2 選詞填空答案；詞形轉換 survive(v.)→survivor(n.)→survival(n. 生存)","err":"字尾 -or 不是 -er：survivor；survivor（人）與 survival（生存，抽象名詞）詞性要分清","coll":"the only survivor; a survivor of the crash","ex1":"Jose was the lone survivor of the massive traffic accident that killed three people yesterday.","ex2":"The survivors of the shipwreck were rescued after three days at sea."},{"en":"identical","pos":"adj.","zh":"完全相同的","cat":"考試重點詞","src":"Text 2","sent":"His identical twin, Martin, sadly did not survive.","exam":"Text 2 選詞填空答案；搭配 identical twin（同卵雙胞胎）、identical to sth","err":"identical to sth 用介詞 to；勿與 identity（身份）混淆詞性","coll":"an identical twin; identical to sth; nearly identical","ex1":"I bought a new wallet that looks nearly identical to my old one.","ex2":"The two paintings are identical - I cannot tell them apart."},{"en":"headline","pos":"n.","zh":"標題；頭條","cat":"考試重點詞","src":"Text 2","sent":"The headline read, 'Remembering the Victims on the Anniversary of the Bonnington Train Crash.'","exam":"Text 2 選詞填空答案；聆聽任務曾考雜誌封面 headlines 的編排","err":"一個字寫成 headline；「標題寫道」用 The headline read...，read 此處解「寫着」","coll":"a dramatic headline; make the headlines; the main headline","ex1":"The editor-in-chief was criticized for writing a dramatic headline that twisted the truth.","ex2":"'Online maps used by mystery hunters' sounds cool and it'll make a good headline."},{"en":"eventually","pos":"adv.","zh":"最終；終於","cat":"考試重點詞","src":"Text 2","sent":"Eventually, he sat down and saw yesterday's newspaper on the table before him.","exam":"Text 2 選詞填空答案；記敍文寫作連接詞：eventually ≈ in the end / finally","err":"eventually 指「經過一段時間後最終」，不是 event（事件）的副詞；勿與 actually 混用","coll":"eventually finish; eventually find out","ex1":"Even though it took some time, I eventually finished my homework and turned it in.","ex2":"The detective eventually worked out who the true mastermind was."},{"en":"scream","pos":"n./v.","zh":"尖叫","cat":"高頻基礎詞","src":"Text 2","sent":"He turned and let out a small scream.","exam":"記敍文及恐怖故事寫作常用；固定搭配 let out a scream（發出尖叫）","err":"勿與 stream（溪流）或 ice cream 拼混；scream 開頭是 scr-","coll":"let out a scream; scream fearfully; a voice screaming in pain","ex1":"When the lights went out, the lady screamed fearfully.","ex2":"The sound effects included a voice screaming in pain."},{"en":"breeze","pos":"n.","zh":"微風","cat":"高頻基礎詞","src":"單元評估","sent":"A chilly breeze swept through the hallway, sending chills down my spine.","exam":"描寫氣氛的場景詞；單元評估閱讀曾以 a cool breeze 出現在筆記填空","err":"雙 e 兩次：br-ee-ze；breeze 是輕柔的風，強風是 gale / strong wind","coll":"a chilly breeze; a gentle breeze","ex1":"A gentle breeze blew through the open window.","ex2":"The cool breeze in the dark hallway made everyone shiver."},{"en":"legend","pos":"n.","zh":"傳說","cat":"核心詞彙","src":"聽力對話","sent":"Most of the articles for this issue are about mysteries and legends that cannot be explained, remember?","exam":"聆聽任務答案語境（Legends of sea monsters in Victoria Harbour）；詞形轉換 legend(n.)→legendary(adj.)","err":"拼寫 le-gend；勿與 lengend 等錯拼混淆；「傳說中的」是 legendary","coll":"a spooky legend; legends of sea monsters; according to legend","ex1":"The story has a spooky legend about a demonic hound.","ex2":"'Legends of sea monsters in Victoria Harbour' will attract curiosity and spark imagination."},{"en":"issue","pos":"n.","zh":"（雜誌的）期；議題","cat":"口語常用","src":"聽力對話","sent":"The triangle in the top left corner is of course the place for the issue number, which is twenty-five, right?","exam":"聆聽數字題答案（issue number twenty-five）；一詞多義：期數／議題／問題","err":"一詞多義是聆聽及閱讀陷阱：the next issue（下一期）與 a serious issue（嚴重問題）意思不同","coll":"the next issue; issue number; raise an issue","ex1":"Barry and Dora are discussing the cover design of the next issue of the school magazine.","ex2":"I hope you will give due consideration to the issues raised in this letter."},{"en":"theme","pos":"n.","zh":"主題","cat":"口語常用","src":"聽力對話","sent":"What's the theme for this issue again?","exam":"聆聽筆記題答案（The unknown）；故事評論寫作常用：the theme of the story","err":"th 讀 /θ/：/θiːm/；勿與 team 讀音混淆；「主題公園」是 theme park","coll":"the theme of the story; a murder-mystery theme","ex1":"Simon has written a short story with a murder-mystery theme.","ex2":"The theme for this issue of the magazine is 'The unknown'."},{"en":"logo","pos":"n.","zh":"標誌；商標","cat":"日常實用","src":"聽力對話","sent":"The oval in the bottom left corner is, of course, where the logo of the school magazine goes.","exam":"聆聽平面圖題常考位置詞語境（the logo goes on the bottom left）","err":"眾數直接加 s：logos；讀音 /ˈləʊɡəʊ/，兩個 o 都讀 /əʊ/","coll":"the school logo; design a logo","ex1":"The logo of the school magazine is always placed on the bottom left.","ex2":"Our team designed a new logo for the reading club."}],"phrases":[{"phrase":"a fair share of sth","zh":"不少的……；相當多的……","type":"課文短語","sent":"I've read my fair share of horror stories but nothing has frightened me more than Stephen King's It.","note":"Write more 重點句式；fair share 前配所有格（my/their fair share of）；指經歷過的數量不少","ex":"The teenage heroes of this book series have met their fair share of ghosts and goblins."},{"phrase":"be prone to (do) sth","zh":"容易……；有……的傾向","type":"寫作句式","sent":"The narrator is fairly reliable but he is prone to exaggerate.","note":"Write more 重點句式；多指負面傾向；to 後可接原形動詞或名詞（prone to failure / prone to hysterics）","ex":"As events unfold, Hartright turns out to be naive and prone to failure."},{"phrase":"fit the bill","zh":"完全符合要求","type":"課文短語","sent":"I find mysteries with an open ending much more realistic, and Iman Mahmood's You Don't Know Me fits the bill.","note":"Write more 重點句式；bill 此處不是帳單；主語是符合條件的人或物，第三人稱單數加 -s","ex":"The only suspect who fit the bill was the story's protagonist."},{"phrase":"float one's boat","zh":"合某人的心意；令某人喜歡","type":"口語短語","sent":"No-escape and nowhere-to-hide scenarios in particular really float my boat.","note":"Write more 重點句式；口語慣用語，所有格隨主語改變；常用 whatever floats your boat（隨你喜歡）","ex":"Comedies that make viewers laugh out loud really float my boat."},{"phrase":"have it all","zh":"應有盡有；樣樣俱備","type":"課文短語","sent":"The story has it all: a suspicious death in the countryside, a spooky legend about a demonic hound, a fair share of family secrets and of course the detective mastermind himself.","note":"Write more 重點句式；常配冒號列舉齊備的元素，是書評／影評的實用開頭句式","ex":"Sherlock Holmes has it all: brains, wealth, a stellar reputation and a good friend who helps him fight crime."},{"phrase":"I must say","zh":"我必須說；不得不說","type":"口語短語","sent":"An ingenious plot twist, I must say.","note":"Write more 重點句式；置於句首或句尾加強語氣，表達個人強烈感想 ≈ I must admit","ex":"The final reveal of the culprit's true identity was a little underwhelming, I must say."},{"phrase":"in other words","zh":"換句話說","type":"寫作句式","sent":"In other words, he reacts to things just as an ordinary person would.","note":"Write more 重點句式；改寫或撮寫前文，後加逗號；閱讀理解找釋義題的訊號詞","ex":"In other words, box-office success doesn't mean that a movie will stand the test of time."},{"phrase":"let sb be the judge (of sth)","zh":"讓某人自行判斷","type":"課文短語","sent":"Guilty or not guilty? Mahmood lets you be the judge.","note":"Write more 重點句式；let + 受詞 + 原形動詞，勿加 to；閱讀理解曾考此句暗示開放式結局","ex":"The filmmaker lets the audience be the judge of whether justice has been served."},{"phrase":"no wonder","zh":"難怪","type":"口語短語","sent":"No wonder this suspenseful story has been adapted so many times since it came out in 1902.","note":"Write more 重點句式；No wonder / It's no wonder + 完整句子；表示結果在意料之中","ex":"No wonder youngsters love this comic series - all the heroes are teens and tweens!"},{"phrase":"race against time","zh":"分秒必爭；與時間競賽","type":"課文短語","sent":"The guests are then disposed of one by one as they race against time.","note":"Write more 重點句式；time 前不加冠詞；亦可作名詞 a race against time","ex":"The characters have to race against time to get to the underground bunker before the meteor hits."},{"phrase":"save the day","zh":"扭轉局面；化險為夷","type":"課文短語","sent":"The story has it all, and of course the detective mastermind himself, who saves the day by turning the villain's plot against him.","note":"Write more 重點句式；day 前必須用 the；常與 in the nick of time（在最後關頭）連用","ex":"Thankfully, the good guys were able to save the day in the nick of time."},{"phrase":"lull sb into/to sleep","zh":"使某人昏昏入睡","type":"課文短語","sent":"Soon after, the gentle rocking of the train lulled him, too, into sleep.","note":"Write more 重點句式；主語常是輕柔重複的事物（搖晃、音樂、故事）；lull 亦解「使放鬆警惕」","ex":"This cute bedtime story lulled my baby cousin to sleep."},{"phrase":"no sign of sb/sth","zh":"不見……的蹤影","type":"課文短語","sent":"The heroine waited at the airport for hours but there was no sign of her brother.","note":"Write more 重點句式；配 there was no sign of 使用；製造懸念的記敍文佳句","ex":"His friends searched for him in the aftermath of the explosion but there was no sign of the hero."},{"phrase":"run like the wind","zh":"飛奔；跑得飛快","type":"課文短語","sent":"Nearly petrified, Ron ran like the wind.","note":"Write more 重點句式；明喻（simile），跑得像風一樣快；wind 前必須有 the","ex":"Once the detective realised who the true mastermind was, she ran like the wind to warn her friends."},{"phrase":"can't get enough of sth","zh":"百看不厭；愛不釋手","type":"口語短語","sent":"Cinemagoers couldn't get enough of the musical's catchy songs and viral dance routines.","note":"Write more 重點句式；表達極度喜愛，多用否定式 can't/couldn't get enough of","ex":"Eliza couldn't get enough of the sitcom's highly original jokes."},{"phrase":"the truth is","zh":"事實上；其實","type":"寫作句式","sent":"The truth is, few people take advantage of the wide variety of literary fiction that can be borrowed for free from public libraries.","note":"Write more 重點句式；引出與期望相反的事實；後接逗號或 that 子句均可","ex":"The truth is that the plot is too predictable to be enjoyable."},{"phrase":"to great effect","zh":"效果顯著；十分奏效","type":"寫作句式","sent":"The debut novelist used his source material to great effect.","note":"Write more 重點句式；置於句尾修飾動詞 use / employ 等；effect 是名詞，勿寫成 affect","ex":"The cinematographer used natural light to great effect in this romantic tragedy."},{"phrase":"send chills down one's spine","zh":"使人不寒而慄","type":"課文短語","sent":"A chilly breeze swept through the hallway, sending chills down my spine.","note":"描寫恐懼氣氛的高分句式；spine 是脊骨；亦可說 send shivers down one's spine","ex":"The eerie silence in the haunted house sent chills down my spine."}]},{"key":"2A_U4","form":"F2","book":"2A","num":4,"theme":"Time to be festive (festivals around the world)","theme_zh":"歡度佳節——世界各地的節日","words":[{"en":"festival","pos":"n.","zh":"節日；慶典","cat":"高頻基礎詞","src":"Text 1 / 單元評估","sent":"Around the world in three festivals with Alexandra Williams","exam":"本單元主題核心詞；閱讀理解及選詞填空高頻；詞形轉換 festival(n.)→festive(adj.)→festivities(n.)","err":"串法 fes-ti-val；港生易與 festive、festivity 混用詞性；可數名詞說多個要加 -s","coll":"a music festival; hold a festival; attend a festival","ex1":"The Dragon Boat Festival is celebrated in many Asian countries.","ex2":"Every October, the city of Bacolod holds a festival called the MassKara Festival."},{"en":"celebrate","pos":"v.","zh":"慶祝","cat":"高頻基礎詞","src":"Text 1 / 詞彙練習","sent":"The Night of the Radishes has been celebrated in the city of Oaxaca every 23 December since 1987.","exam":"詞形轉換 celebrate(v.)→celebration(n.)；常以被動式 be celebrated 出現，考時態及語態","err":"串法 cel-e-brate（勿寫 celebrete）；celebrate 直接接受詞（celebrate the festival），勿加 for","coll":"celebrate a festival; celebrate the New Year; widely celebrated","ex1":"People celebrate the Mid-Autumn Festival by eating mooncakes.","ex2":"The Chinese Lantern Festival was widely celebrated yesterday."},{"en":"festive","pos":"adj.","zh":"節日的；喜慶的","cat":"核心詞彙","src":"Text 1 / 詞彙練習","sent":"The festive atmosphere reached its peak on 'Haturday', the first Saturday of September.","exam":"詞形轉換考點：festival(n.)→festive(adj.)；選詞填空常配 atmosphere / spirit / food","err":"港生易誤用名詞 festival 作形容詞（a festival atmosphere ✗，應為 festive）","coll":"a festive atmosphere; festive food; the festive season","ex1":"The whole town was full of a festive atmosphere.","ex2":"We enjoyed lots of festive food during the celebration."},{"en":"festivities","pos":"n.","zh":"慶祝活動","cat":"核心詞彙","src":"Text 1 / 詞彙練習","sent":"I'd love for you to join the festivities.","exam":"選詞填空答案（festivities）；閱讀理解同義替換 festivities ≈ celebrations","err":"指「慶祝活動」時多用複數 festivities；勿與 festival（節日本身）混淆","coll":"join the festivities; the festivities began; enjoy the festivities","ex1":"Thousands of people gathered to join the festivities.","ex2":"The festivities lasted for a whole week."},{"en":"tradition","pos":"n.","zh":"傳統","cat":"核心詞彙","src":"Text 1 / 單元評估","sent":"The city was buzzing with anticipation and excitement as people came together to celebrate this beautiful tradition.","exam":"本單元主題詞；詞形轉換 tradition(n.)→traditional(adj.)→traditionally(adv.)","err":"串法 tra-di-tion；港生易漏尾音 -tion；搭配 a long tradition / follow a tradition","coll":"a long tradition; follow a tradition; preserve traditions","ex1":"Giving red packets is a Chinese New Year tradition.","ex2":"It is important to preserve and celebrate our traditions and heritage."},{"en":"heritage","pos":"n.","zh":"文化遺產；傳統","cat":"考試重點詞","src":"單元評估 / 詞彙練習","sent":"I love the way the Lagos Carnival celebrates my heritage.","exam":"單元評估選詞填空答案；閱讀理解常與 tradition / culture 同場出現","err":"串法 her-i-tage；不可數名詞，勿加 -s；勿與 heritance/inherit 混淆","coll":"cultural heritage; celebrate one's heritage; preserve heritage","ex1":"The old temples are an important part of our cultural heritage.","ex2":"The festival is a way to celebrate the community's rich heritage."},{"en":"custom","pos":"n.","zh":"習俗","cat":"核心詞彙","src":"Reading Focus / Text 1","sent":"(改編) Carving radishes into figurines is an old custom in the town of Oaxaca.","exam":"選詞填空常見；閱讀理解同義替換 custom ≈ tradition / practice","err":"custom（習俗）與 customs（海關）及 costume（服裝）三者易混，串法及意思要分清","coll":"a local custom; an old custom; follow a custom","ex1":"Taking off your shoes indoors is a common custom in Japan.","ex2":"Each festival has its own special customs."},{"en":"commemorate","pos":"v.","zh":"紀念","cat":"考試重點詞","src":"Text 1 / 詞彙練習","sent":"The week-long festival is held every year to commemorate the first day of spring.","exam":"選詞填空答案（commemorate）；閱讀理解曾註釋詞義 to remember and pay respects to sb/sth in public","err":"串法雙 m（commemorate）易錯；及物動詞直接接受詞，勿加介詞","coll":"commemorate an event; commemorate a hero; held to commemorate","ex1":"The parade is held to commemorate the country's independence.","ex2":"This festival commemorates the beginning of the harvest season."},{"en":"parade","pos":"n.","zh":"巡遊；遊行","cat":"核心詞彙","src":"Text 1 / 詞彙練習 / 單元評估","sent":"People celebrate the Night of the Radishes with a parade.","exam":"本單元主題詞；聆聽及閱讀理解常見；亦可作動詞 parade around town","err":"串法 pa-rade；讀音 /pəˈreɪd/ 重音在後，港生易讀錯；可數名詞","coll":"a street parade; join the parade; a lantern parade","ex1":"We watched the colourful parade march through the streets.","ex2":"There was a parade of lanterns that lasted for hours."},{"en":"fireworks","pos":"n.","zh":"煙花","cat":"高頻基礎詞","src":"Text 1 / 詞彙練習","sent":"There will be fireworks during the parade at the festival.","exam":"節日主題高頻詞；聆聽及閱讀理解常見；固定搭配 a fireworks display","err":"指煙花表演時常用複數 fireworks；勿寫成一個字 fire works","coll":"a fireworks display; watch the fireworks; set off fireworks","ex1":"We watched a spectacular fireworks display over the harbour.","ex2":"There is a huge fireworks display on the last day of the festival."},{"en":"lantern","pos":"n.","zh":"燈籠","cat":"核心詞彙","src":"單元評估","sent":"Everywhere I looked, there were lanterns of all shapes and sizes hanging from buildings, trees, and street lamps.","exam":"單元評估閱讀理解主題詞；找細節題常見（水燈、龍燈等）","err":"串法 lan-tern（勿寫 lantan）；讀音 /ˈlæntən/","coll":"a paper lantern; light a lantern; a lantern festival","ex1":"Hundreds of paper lanterns were set afloat on the water.","ex2":"The red lanterns glowed brightly in the dark."},{"en":"atmosphere","pos":"n.","zh":"氣氛","cat":"核心詞彙","src":"Text 1 / 詞彙練習","sent":"The atmosphere is usually pretty vibrant and animated, which is perfect for an extrovert like you.","exam":"選詞填空高頻答案；描寫節日感受的寫作必用詞；常配 festive / vibrant / lively","err":"串法 at-mo-sphere（注意 -sphere）；讀音重音在 AT-；不可數常用單數","coll":"a festive atmosphere; a lively atmosphere; the atmosphere was electric","ex1":"The festival had a warm and lively atmosphere.","ex2":"I could feel the exciting atmosphere the moment I arrived."},{"en":"crowd","pos":"n.","zh":"人群","cat":"高頻基礎詞","src":"Text 1 / 詞彙練習 / 單元評估","sent":"As it was brought to life, the crowd cheered and clapped in joy.","exam":"節日主題高頻詞；詞形轉換 crowd(n.)→crowded(adj.)；閱讀理解常見","err":"crowd 是集合名詞；crowded（形容詞，擠迫的）港生易與名詞混用","coll":"a huge crowd; draw crowds; the crowd cheered","ex1":"A huge crowd gathered to watch the dragon boat race.","ex2":"The festival drew massive crowds from around the country."},{"en":"spectator","pos":"n.","zh":"觀眾；旁觀者","cat":"考試重點詞","src":"Text 1 / 單元評估","sent":"Thousands of spectators gathered in an open field where a massive dragon lantern was lit up.","exam":"選詞填空答案；詞形轉換 spectate(v.)→spectator(n.)→spectacle(n.)；閱讀理解同義 audience / onlookers","err":"串法 spec-ta-tor；勿與 spectacular（形容詞）混淆；多指運動或表演的現場觀眾","coll":"thousands of spectators; excited spectators; a spectator sport","ex1":"The spectators were thrilled by the exciting races.","ex2":"Thousands of spectators lined the streets to watch the parade."},{"en":"costume","pos":"n.","zh":"服裝；戲服","cat":"核心詞彙","src":"Text 3 / 詞彙練習","sent":"With its vibrant costumes, parades, music and food, Brazilian Carnival certainly comes close.","exam":"節日主題詞；閱讀理解常見；勿與 custom（習俗）混淆是常考陷阱","err":"costume（服裝）與 custom（習俗）只差一個字母，串法及意思極易混；讀音 /ˈkɒstjuːm/","coll":"colourful costumes; wear a costume; a traditional costume","ex1":"The dancers wore bright and eye-catching costumes.","ex2":"Contestants wear colourful costumes and masks during the street dance."},{"en":"delicacy","pos":"n.","zh":"美食；佳餚","cat":"考試重點詞","src":"詞彙練習 / 單元評估","sent":"The roads are lined with stalls full of tasty local delicacies.","exam":"選詞填空答案（delicacies）；閱讀理解同義 local food / treats","err":"複數 delicacies（y 變 ies）；串法 del-i-ca-cy；勿與 delicate（精緻的）混淆","coll":"local delicacies; a famous delicacy; taste the delicacies","ex1":"I couldn't resist trying some of the local delicacies.","ex2":"Egg waffles and fish balls are popular Hong Kong delicacies."},{"en":"vibrant","pos":"adj.","zh":"充滿活力的；色彩鮮艷的","cat":"考試重點詞","src":"Text 3 / 詞彙練習","sent":"With its vibrant costumes, parades, music and food, Brazilian Carnival certainly comes close.","exam":"選詞填空高頻；詞形轉換 vibrant(adj.)→vibrancy(n.)；描寫節日的高分形容詞","err":"串法 vi-brant；港生易與 vibrate（震動）混淆詞義","coll":"a vibrant atmosphere; vibrant colours; a vibrant festival","ex1":"The festival was full of vibrant colours and lively music.","ex2":"The city comes alive with a vibrant atmosphere during the celebrations."},{"en":"vibrancy","pos":"n.","zh":"活力；生氣勃勃","cat":"考試重點詞","src":"Text 1 / 詞彙練習","sent":"The sheer vibrancy of the celebrations has earnt Bacolod the nickname 'City of Smiles'.","exam":"詞形轉換考點：vibrant(adj.)→vibrancy(n.)；選詞填空答案","err":"由 vibrant 去 t 加 -cy（vibrancy）；不可數名詞","coll":"the vibrancy of the festival; full of vibrancy","ex1":"There was such vibrancy and energy in the air.","ex2":"The vibrancy of the celebrations attracted visitors from all over the world."},{"en":"dazzling","pos":"adj.","zh":"耀眼奪目的","cat":"考試重點詞","src":"詞彙練習 / 單元評估","sent":"The city of Bacolod is brought to life by a dazzling festival called the 'Festival of Many Faces'.","exam":"選詞填空答案（dazzling）；-ing 形容詞形容令人目眩的事物；詞形轉換 dazzle(v.)→dazzling(adj.)","err":"串法雙 z（dazzling）；港生易與 puzzling 混淆串法","coll":"a dazzling display; a dazzling smile; dazzling lights","ex1":"I was greeted with the dazzling glow of colourful lanterns.","ex2":"The festival puts on a dazzling display of lights and fireworks."},{"en":"spectacular","pos":"adj.","zh":"壯觀的；精彩的","cat":"考試重點詞","src":"Text 3 / 詞彙練習","sent":"One of the main events is a spectacular street dance competition in which contestants wear eye-catching costumes.","exam":"選詞填空答案；描寫節日場面的高分形容詞；詞形轉換 spectacle(n.)→spectacular(adj.)","err":"串法 spec-tac-u-lar；勿與 spectator（觀眾）、special 混淆","coll":"a spectacular show; spectacular scenery; a spectacular display","ex1":"The opening ceremony was a spectacular event.","ex2":"The night ended with a spectacular fireworks display."},{"en":"exhilaration","pos":"n.","zh":"興奮；歡欣鼓舞","cat":"考試重點詞","src":"Text 1 / 詞彙練習","sent":"It took me a moment to let myself feel the exhilaration and joy of the festival.","exam":"選詞填空答案；詞形轉換 exhilarate(v.)→exhilarating(adj.)→exhilaration(n.)","err":"串法長且易錯（ex-hil-a-ra-tion，注意 h 不發音）；不可數名詞","coll":"a sense of exhilaration; feel exhilaration; exhilaration and joy","ex1":"The riders screamed with exhilaration as the ride sped up.","ex2":"Spurred on by the exhilaration around me, I was on my feet cheering."},{"en":"significance","pos":"n.","zh":"意義；重要性","cat":"考試重點詞","src":"Text 1 / Text 1 activities","sent":"The radish displays contained scenes of historical and cultural significance.","exam":"詞形轉換考點：significant(adj.)→significance(n.)；選詞填空答案","err":"串法 sig-nif-i-cance；不可數名詞；勿與 significant（形容詞）混用詞性","coll":"cultural significance; historical significance; of great significance","ex1":"The festival carries great cultural significance for the local people.","ex2":"Each symbol in the celebration has a special significance."},{"en":"origin","pos":"n.","zh":"起源；由來","cat":"核心詞彙","src":"Handbook / Text 3","sent":"In this unit, students will develop a comprehensive understanding of the origin of festivals.","exam":"本單元閱讀重點（origin of festivals）；詞形轉換 origin(n.)→original(adj.)→originate(v.)","err":"串法 or-i-gin；讀音 /ˈɒrɪdʒɪn/；勿與 original（原本的）混用","coll":"the origin of a festival; ancient origins; explain the origin","ex1":"The origin of this festival can be traced back hundreds of years.","ex2":"Nobody is quite sure about the true origin of the custom."},{"en":"carnival","pos":"n.","zh":"嘉年華；狂歡節","cat":"核心詞彙","src":"Text 3 / 詞彙練習","sent":"As a Brazilian, I am proud of Carnival - our largest festival.","exam":"節日主題詞；聆聽及閱讀理解常見；亦見於 Ivrea Carnival、Lagos Carnival 等專有名詞","err":"串法 car-ni-val（勿寫 carnaval）；讀音 /ˈkɑːnɪvl/","coll":"a street carnival; the Brazilian Carnival; a carnival atmosphere","ex1":"The whole city joins the carnival with music and dancing.","ex2":"We wore colourful costumes for the carnival parade."},{"en":"figurine","pos":"n.","zh":"小雕像；小塑像","cat":"核心詞彙","src":"Text 1","sent":"In the old days, farmers would carve radishes into figurines to attract customers to the town square.","exam":"Text 1 閱讀理解主題詞（蘿蔔雕刻）；詞根 figure + -ine（小的）","err":"串法 fig-u-rine；讀音 /ˌfɪɡəˈriːn/ 重音在後；可數名詞，複數加 -s","coll":"carve a figurine; a small figurine; radish figurines","ex1":"The radishes were carved into bizarre figurines and scenes.","ex2":"She collects tiny figurines of animals."},{"en":"wilt","pos":"v.","zh":"枯萎；凋謝","cat":"考試重點詞","src":"Text 1","sent":"The displays didn't last long, as the radishes wilted and browned in just a few hours.","exam":"閱讀理解找細節題來源（為何展覽不能持久）；描寫植物枯萎的動詞","err":"串法 wilt（勿與 will、wild 混淆）；過去式 wilted","coll":"the flowers wilted; wilt in the heat; wilt quickly","ex1":"The flowers began to wilt in the hot sun.","ex2":"The carved radishes wilted and browned in just a few hours."},{"en":"deafening","pos":"adj.","zh":"震耳欲聾的","cat":"考試重點詞","src":"Text 1","sent":"(改編) The deafening drum beats echoed across the water during the dragon boat race.","exam":"閱讀理解曾註釋詞義 extremely loud；同義替換 deafening ≈ thunderous","err":"由 deaf（聾）+ -en + -ing 構成；串法注意 -ea-；讀音 /ˈdefnɪŋ/","coll":"a deafening noise; deafening applause; a deafening roar","ex1":"The music at the festival was almost deafening.","ex2":"The crowd gave a deafening cheer as the fireworks began."},{"en":"thunderous","pos":"adj.","zh":"雷鳴般的；轟隆作響的","cat":"考試重點詞","src":"Text 1","sent":"There was such vibrancy and energy in the air as rowers guided by thunderous drum beats paddled in unison.","exam":"閱讀理解同義替換 thunderous ≈ deafening（極大聲）；詞形轉換 thunder(n.)→thunderous(adj.)","err":"串法 thun-der-ous（注意 -ous 結尾）；th 音港生易讀成 /f/","coll":"thunderous applause; thunderous drum beats; a thunderous roar","ex1":"The performance ended to thunderous applause.","ex2":"The thunderous drum beats set the pace for the rowers."},{"en":"random","pos":"adj.","zh":"隨機的；隨意的","cat":"考試重點詞","src":"Text 1","sent":"(改編) At first, the festival seemed like a random collection of strange activities.","exam":"閱讀理解曾註釋詞義：chosen by chance rather than according to a plan","err":"串法 ran-dom；港生常誤用作副詞，副詞應為 randomly；搭配 at random（隨機地）","coll":"a random choice; at random; a random event","ex1":"The winners were chosen at random from all the entries.","ex2":"The activities looked random, but each had a special meaning."},{"en":"represent","pos":"v.","zh":"代表；象徵","cat":"核心詞彙","src":"Text 2","sent":"Although roses are popular gifts and are thought to represent love, they are not the standard Valentine's Day gift in many places.","exam":"Text 2 選詞填空答案（represent）；詞形轉換 represent(v.)→representative(n.)→representation(n.)","err":"串法雙 -re-（represent）；勿漏中間 -pre-；及物動詞直接接受詞","coll":"represent love; represent a group; represent one's country","ex1":"The red colour is used to represent good luck.","ex2":"Chandler was chosen to represent our class in the speech contest."},{"en":"desire","pos":"n.","zh":"渴望；慾望","cat":"考試重點詞","src":"Text 2","sent":"In Wales, people who are single desire something a bit more permanent than flowers.","exam":"Text 2 選詞填空答案（desire）；兼作動詞及名詞；閱讀理解一詞多用","err":"串法 de-sire；作名詞搭配 a desire for sth / a desire to do sth","coll":"a strong desire; desire for sth; desire to do sth","ex1":"People in the past had a desire for large families.","ex2":"She had a strong desire to attend the festival abroad."},{"en":"permanent","pos":"adj.","zh":"永久的；長久的","cat":"考試重點詞","src":"Text 2","sent":"People who are single desire something a bit more permanent than flowers.","exam":"Text 2 閱讀理解考過反義詞：opposite of 'short-lived' (permanent)；反義詞 temporary","err":"串法 per-ma-nent（注意兩個 -en-）；反義詞是 temporary，非 impermanent（雖存在但少用）","coll":"a permanent solution; permanent damage; a permanent home","ex1":"A carved wooden spoon is a more permanent gift than flowers.","ex2":"The festival left a permanent mark on the town's history."},{"en":"disastrous","pos":"adj.","zh":"災難性的；很糟糕的","cat":"考試重點詞","src":"Text 2","sent":"A mix-up in the gifts could be socially disastrous.","exam":"Text 2 選詞填空答案（disastrous）；詞形轉換 disaster(n.)→disastrous(adj.)","err":"串法 dis-as-trous（注意名詞 disaster 到形容詞去 e 加 -ous，中間無 e）；港生常誤串 disasterous","coll":"a disastrous mistake; socially disastrous; disastrous results","ex1":"Giving the wrong type of chocolate could be socially disastrous.","ex2":"The heavy rain had a disastrous effect on the outdoor parade."},{"en":"anonymous","pos":"adj.","zh":"匿名的","cat":"考試重點詞","src":"Text 2","sent":"They send anonymous cards with a funny poem to the person they admire.","exam":"Text 2 選詞填空答案（anonymous）；詞形轉換 anonymous(adj.)→anonymously(adv.)","err":"串法 a-non-y-mous 又長又易錯；讀音 /əˈnɒnɪməs/ 重音在 -NON-","coll":"an anonymous card; an anonymous donor; remain anonymous","ex1":"The Danes send anonymous cards to the person they admire.","ex2":"The charity received a large donation from an anonymous donor."},{"en":"hype","pos":"n.","zh":"大肆宣傳；炒作","cat":"考試重點詞","src":"Text 2","sent":"Don't want to fall prey to marketers' hype?","exam":"Text 2 選詞填空答案（hype）；閱讀理解常配 commercial / marketing","err":"串法 hype（讀 /haɪp/）；不可數名詞；口語色彩，作文議論商業化時可用","coll":"media hype; fall for the hype; create hype","ex1":"The new single created a lot of hype for the album.","ex2":"Don't fall prey to the marketers' hype during the festival sales."},{"en":"commercialized","pos":"adj.","zh":"商業化的","cat":"考試重點詞","src":"Text 2","sent":"These days, Valentine's Day is a highly commercialized affair in the United States.","exam":"閱讀理解主旨題相關（節日商業化）；詞形轉換 commerce(n.)→commercial(adj.)→commercialize(v.)","err":"英式亦可串 commercialised；串法注意雙 m；讀音重音在 -MER-","coll":"a commercialized festival; highly commercialized; become commercialized","ex1":"Many people feel that Christmas has become too commercialized.","ex2":"Valentine's Day is a highly commercialized affair these days."},{"en":"massive","pos":"adj.","zh":"巨大的；大量的","cat":"高頻基礎詞","src":"Text 1 / 詞彙練習 / 單元評估","sent":"The event has since become the area's most popular, drawing massive crowds from around the country and the globe.","exam":"選詞填空答案；閱讀理解同義替換 massive ≈ huge / enormous","err":"串法雙 s（massive）；港生易與 mass（大眾／質量）混用詞性","coll":"massive crowds; a massive dragon lantern; a massive success","ex1":"A massive dragon lantern was lit up in the open field.","ex2":"The festival drew massive crowds from all over the world."},{"en":"quirky","pos":"adj.","zh":"古怪有趣的；奇特的","cat":"核心詞彙","src":"Text 1 activities","sent":"The quirkiest festival is the Night of the Radishes.","exam":"描寫節日特色的形容詞；最高級 quirkiest（y 變 iest）為文法考點","err":"串法 quirk + y（quirky）；最高級去 y 加 -iest；口語色彩形容詞","coll":"a quirky festival; quirky hats; a quirky sense of humour","ex1":"The festival is famous for its quirky radish carvings.","ex2":"Making quirky hats requires a lot of creativity."},{"en":"nationality","pos":"n.","zh":"國籍","cat":"考試重點詞","src":"Text 3 / Word Power","sent":"The organizers welcome all festival-goers, regardless of their nationality.","exam":"Word Power 國籍字尾練習重點（America→American, Japan→Japanese）；詞形轉換 nation(n.)→national(adj.)→nationality(n.)","err":"串法 na-tion-al-i-ty；複數 nationalities；國籍字尾 -an/-ese/-ish/-i 各不同，易錯","coll":"different nationalities; regardless of nationality; state one's nationality","ex1":"People of all nationalities are welcome at the festival.","ex2":"The music festival welcomes musicians regardless of nationality."},{"en":"recipient","pos":"n.","zh":"接收者；收受人","cat":"考試重點詞","src":"Text 2","sent":"Women have to give chocolates according to the category of recipient.","exam":"Text 2 表格題相關（三類巧克力的 recipient）；詞形轉換 receive(v.)→recipient(n.)","err":"串法 re-cip-i-ent（注意 -cip-）；讀音 /rɪˈsɪpiənt/；勿與 receipt（收據）混淆","coll":"the recipient of a gift; an award recipient; the intended recipient","ex1":"The type of chocolate depends on the category of recipient.","ex2":"Each recipient of the award gave a short speech."},{"en":"well-being","pos":"n.","zh":"福祉；幸福安康","cat":"日常實用","src":"聽力對話","sent":"It's a day in Japan to celebrate the well-being of young children.","exam":"聆聽任務主題詞（celebrate the well-being of children）；複合名詞 well + being","err":"連字號寫法 well-being；不可數名詞；勿與 well being 分開寫","coll":"the well-being of children; physical well-being; mental well-being","ex1":"The festival celebrates the well-being of young children.","ex2":"Parents pray for the health and well-being of their kids."},{"en":"shrine","pos":"n.","zh":"神社；神龕","cat":"口語常用","src":"聽力對話","sent":"It says the major activity is to visit shrines to pray for good health.","exam":"聆聽任務填空答案（visit shrines）；日本節日文化詞","err":"串法 shrine（讀 /ʃraɪn/）；港生易與 shine（發光）混淆讀音","coll":"visit a shrine; pray at a shrine; an ancient shrine","ex1":"Families visit shrines to pray for good health.","ex2":"Most of the festival photos are taken in front of a shrine."},{"en":"blessing","pos":"n.","zh":"祝福；恩賜","cat":"口語常用","src":"聽力對話","sent":"They did so as a blessing for their children to live past seven years.","exam":"聆聽細節題相關（節日起源）；詞形轉換 bless(v.)→blessing(n.)","err":"串法雙 s（blessing）；港生易與 blessed（形容詞）混用","coll":"a blessing for sb; count one's blessings; give a blessing","ex1":"The festival began as a blessing for children's long life.","ex2":"Living past the age of seven was considered a blessing in the old days."},{"en":"noble","pos":"n.","zh":"貴族","cat":"口語常用","src":"聽力對話","sent":"But years ago, Shichi-Go-San was a festival for nobles and rich people.","exam":"聆聽填空答案（nobles and rich people）；亦可作形容詞 noble（高貴的）","err":"作「貴族」時是可數名詞，複數 nobles；勿與 Nobel（諾貝爾）混淆串法及讀音","coll":"nobles and rich people; a noble family; the nobles","ex1":"Long ago, only nobles and rich people celebrated the festival.","ex2":"The festival was once reserved for nobles."},{"en":"pray","pos":"v.","zh":"祈禱；祈求","cat":"口語常用","src":"聽力對話","sent":"On the fifteenth of November, parents will bring their children out to pray for their well-being.","exam":"聆聽任務高頻詞；固定搭配 pray for sth；勿與 prey（獵物）混淆","err":"pray（祈禱）與 prey（獵物，見 fall prey to）同音不同義，串法及意思要分清；搭配 pray for","coll":"pray for good health; pray for well-being; pray at a shrine","ex1":"Families go to shrines to pray for good health.","ex2":"People pray for a good harvest during the festival."},{"en":"street food","pos":"n.","zh":"街頭小食","cat":"日常實用","src":"Text 1 / 詞彙練習","sent":"Hawkers selling street food always set up shop around the festival area.","exam":"節日主題實用詞；閱讀理解曾找同義詞 street snacks = street food；複合名詞 street + food","err":"不可數名詞，勿加 -s；港生易與 snack（可數）混用","coll":"sell street food; delicious street food; a street food stall","ex1":"We tried lots of tasty street food at the night market.","ex2":"Hawkers selling street food set up shop around the festival area."}],"phrases":[{"phrase":"(be) brought to life","zh":"生動地呈現；活現眼前","type":"課文短語","sent":"The radish displays contained scenes of historical and cultural significance brought to life through carvings of animals, saints, dancers and cathedrals.","note":"指使某事物栩栩如生地呈現，常用被動 be brought to life by/through sth；亦可主動 bring sth to life。","ex":"This opera from the Hong Kong Arts Festival brings to life a fantastic script by an award-winning writer."},{"phrase":"in unison","zh":"一致地；齊聲地","type":"課文短語","sent":"There was such vibrancy and energy in the air as rowers guided by thunderous drum beats paddled in unison to compete for prizes and glory.","note":"指動作或聲音整齊一致；常配 sing / move / paddle / wave in unison。","ex":"The crowd members at the music festival waved their arms in unison as their idols performed."},{"phrase":"leg of one's journey","zh":"旅程的一段路程","type":"課文短語","sent":"The next leg of my journey took me to Mexico for the Night of the Radishes.","note":"leg 在此指旅程的其中一段；常說 the last/next leg of one's journey。","ex":"As the rowers entered the last leg of their journey, the cheers from the crowd became louder."},{"phrase":"on one's feet","zh":"站起來；起立（興奮地）","type":"課文短語","sent":"Spurred on by the exhilaration around me, I was on my feet and cheering for most of the event!","note":"指因興奮而起立；所有格隨主語變（on my/our feet）；與 dance / cheer / clap 連用。","ex":"The singer soon had us on our feet, clapping to the rhythm of her song."},{"phrase":"reach sth's peak","zh":"達到頂點；達到最高潮","type":"課文短語","sent":"The festive atmosphere reached its peak on 'Haturday', the first Saturday of September.","note":"指達到最高點或高潮；所有格代名詞 its/their 隨主語變化。","ex":"Attendance reached its peak on Friday when the circus artists were scheduled to perform."},{"phrase":"take some getting used to","zh":"需要一些時間才能習慣","type":"課文短語","sent":"Frankly, those bizarre-looking veggies took some getting used to.","note":"指某事物起初不習慣、需時適應；主語是令人不習慣的事物，getting 用動名詞。","ex":"The terrifying face paint worn by revellers does take some getting used to."},{"phrase":"in the old days","zh":"從前；昔日","type":"寫作句式","sent":"In the old days, farmers would carve radishes into figurines to attract customers to the town square.","note":"指過去的年代，常放句首並配過去式或 would（表過去習慣）；= in the past。","ex":"In the old days, there was no trick-or-treating during Halloween."},{"phrase":"after all","zh":"畢竟；歸根究底","type":"寫作句式","sent":"I think everyone can relate to the fun of festivals - after all, every culture has them.","note":"用於提出理由或補充說明，帶「畢竟」之意；常放句中或句首，前後加逗號。","ex":"I don't think she can have gone very far; after all, she was right behind us when the fireworks started."},{"phrase":"fall prey to sth","zh":"成為……的受害者；受……所害","type":"課文短語","sent":"Don't want to fall prey to marketers' hype?","note":"指落入圈套或受騙受害；後接名詞（fall prey to hype / discounts）；prey 勿與 pray 混淆。","ex":"Do not fall prey to the flashy advertising - Valentine's Day is not a big deal."},{"phrase":"on safe ground","zh":"穩妥；有把握；不會出錯","type":"課文短語","sent":"If that's you, you would be on safe ground in Ghana, which is one of the world's biggest producers of cocoa beans.","note":"指做某事穩妥、不易出錯；常說 be/stay on safe ground。","ex":"If you want to stay on safe ground on Mother's Day, send your mum a heartfelt card."},{"phrase":"at the core of","zh":"在……的核心；最重要的部分","type":"寫作句式","sent":"At the core of almost all festivals is fun.","note":"指某事物的核心或本質；at the core of + 名詞；可用倒裝句加強語氣。","ex":"The celebration of traditional art forms is at the core of this festival."},{"phrase":"be known to do sth","zh":"以（做某事）而為人所知；眾所周知會……","type":"寫作句式","sent":"Furthermore, dolphins and elephants are known to grieve the dead by tending to their bodies in primitive 'funerals'.","note":"指某事物普遍被認為會如何；be known to + 原形動詞（勿接 -ing）。","ex":"Noise pollution from festivals is known to be a danger to public health."},{"phrase":"bread and butter","zh":"主要收入來源；賴以維生之本","type":"課文短語","sent":"Some of them, such as music festivals and arts and cultural events, are multi-million dollar businesses and the bread and butter of their stakeholders.","note":"指主要收入或生計來源；固定搭配 the bread and butter of sb/sth，次序不可調轉。","ex":"These cultural showcases are the bread and butter of the traditional arts industry."},{"phrase":"have it all","zh":"應有盡有；樣樣俱全","type":"課文短語","sent":"It's rare for a single festival to have it all, but with its vibrant costumes, parades, music and food, Brazilian Carnival certainly comes close.","note":"指擁有一切優點或條件；it 是固定用法，不可改成其他受詞。","ex":"I want to create an arts festival that has it all - yummy food, breathtaking sights and powerful performances."},{"phrase":"regardless of sth","zh":"不論；不管","type":"寫作句式","sent":"The organizers welcome all festival-goers, regardless of their nationality.","note":"後接名詞，表示「不論……」；= no matter + wh-；議論文寫作常用連接語。","ex":"The international music festival welcomes applications from all musicians, regardless of genre."},{"phrase":"rooted in","zh":"根源於；源自","type":"課文短語","sent":"Although the festival of Kwanzaa is rooted in traditional African harvest festivals, it is chiefly an African-American celebration.","note":"指源於某文化或傳統；常用被動 be rooted in sth；描述節日起源的高分寫作用語。","ex":"This food and drink festival is rooted in the area's rich agricultural history."},{"phrase":"all walks of life","zh":"各行各業；社會各階層","type":"日常表達","sent":"The city was buzzing with anticipation and excitement as people from all walks of life came together to celebrate this beautiful tradition.","note":"固定搭配 people from all walks of life，指來自不同背景職業的人；單元評估曾考同義釋義。","ex":"The festival brought together people from all walks of life to celebrate as one community."},{"phrase":"a sight to behold","zh":"壯麗的景象；令人歎為觀止的一幕","type":"口語短語","sent":"The dragon was over 40 feet long and was a sight to behold.","note":"指令人驚歎、值得一看的景象；behold 為較文雅的「觀看」，常用於描寫節日場面。","ex":"The thousands of glowing lanterns floating on the water were a sight to behold."}]},{"key":"2B_U5","form":"F2","book":"2B","num":5,"theme":"Teen spirit","theme_zh":"青春活力","words":[{"en":"adolescence","pos":"n.","zh":"青春期","cat":"核心詞彙","src":"詞彙練習","sent":"First of all, please remember that people tend to be pretty insensitive and immature in their adolescence.","exam":"選詞填空常見答案；詞形轉換：adolescent（青少年，n./adj.）↔ adolescence","err":"港生易與 adolescent 混淆：adolescence 指「時期」，adolescent 指「人」；串字易漏中間的 -esc-","coll":"in one's adolescence; during adolescence; early/late adolescence","ex1":"Many changes happen to our bodies during adolescence.","ex2":"Adolescence is a period when teenagers face many personal struggles."},{"en":"peer","pos":"n.","zh":"同輩；同儕","cat":"考試重點詞","src":"Text 2","sent":"I have mediocre grades and pathetic athletic abilities - I'm a bit of a failure compared to my peers.","exam":"閱讀理解及選詞填空高頻詞；常見搭配 peer pressure（同輩壓力）為寫作常用","err":"peer 通常用複數 peers 指「同輩們」；勿與 pair（一對）混淆，讀音相近","coll":"peer pressure; compared to one's peers; fall behind one's peers","ex1":"Some students dye their hair because of peer pressure.","ex2":"Teenagers often compare themselves to their peers, which causes anxiety."},{"en":"appearance","pos":"n.","zh":"外表；外貌","cat":"高頻基礎詞","src":"詞彙練習","sent":"You mustn't take anything your peers say about your appearance to heart.","exam":"詞形轉換：appear（v.）→ appearance（n.）；選詞填空常考","err":"受中文影響易寫成 appearence（漏 a）；「外表」用單數，勿寫 appearances 表示樣貌","coll":"worry about one's appearance; changes in appearance; physical appearance","ex1":"Don't judge people by their appearance.","ex2":"According to the survey, many teens felt anxious about changes in their bodies and appearance."},{"en":"acne","pos":"n.","zh":"暗瘡；粉刺","cat":"核心詞彙","src":"詞彙練習","sent":"Everybody has blemishes and acne in their teens - I did too!","exam":"主題詞彙（青少年困擾）；聆聽及選詞填空常見","err":"acne 不可數，不可寫 an acne / acnes；讀音 /ˈækni/，尾音易讀錯","coll":"have acne; acne tips; acne and other skin problems","ex1":"Many teenagers feel self-conscious about their acne.","ex2":"40% of the respondents were concerned about acne and other skin problems."},{"en":"pimply","pos":"adj.","zh":"長滿暗瘡的","cat":"核心詞彙","src":"Text 2","sent":"I never showed my face in them because I had bad, pimply skin.","exam":"詞形轉換：pimple（n. 暗瘡）→ pimply（adj.）","err":"-y 結尾是形容詞，港生易誤作名詞使用；比較：pimple 是一粒暗瘡","coll":"pimply skin; a pimply teenager","ex1":"Being pimply is nothing to be ashamed of.","ex2":"The influencer used to hide her pimply skin in her early videos."},{"en":"weight","pos":"n.","zh":"體重","cat":"高頻基礎詞","src":"詞彙練習","sent":"As for the remarks about your weight, do not forget that your physique doesn't define you - you do.","exam":"聆聽及選詞填空基礎詞；lose/gain weight 為必識搭配","err":"串字易錯（gh 不發音）；「減肥」是 lose weight，不是 lose the weight 或 reduce body","coll":"lose weight; gain weight; anxiety about one's weight","ex1":"He exercises every day to lose weight.","ex2":"Many respondents experienced anxiety about their weight that was triggered by comments from other people."},{"en":"cyberbully","pos":"n.","zh":"網絡欺凌者","cat":"核心詞彙","src":"Text 2","sent":"There were also plenty of toxic trolls and cyberbullies causing me stress.","exam":"單元評估閱讀篇章主題詞；cyberbullying（網絡欺凌）為作文常用題材詞","err":"cyberbully 指「人」，cyberbullying 指「行為」，港生常混用；bully 亦可作動詞","coll":"report cyberbullies; victims of cyberbullying; online harassment","ex1":"You should report cyberbullies to your teachers or parents.","ex2":"Approximately 43% of teenagers have experienced cyberbullying at least once."},{"en":"mock","pos":"v.","zh":"嘲笑；取笑","cat":"考試重點詞","src":"詞彙練習","sent":"Your classmates are very wrong to mock you for the way you look.","exam":"選詞填空常見答案；同義詞配對：mock ≈ tease / make fun of","err":"mock 直接接賓語（mock sb），港生受「嘲笑於」影響易加 at；勿與 laugh at 的結構混淆","coll":"mock sb for sth; be mocked at school","ex1":"It is unkind to mock others for their appearance.","ex2":"Many teenagers are mocked at school because of their body shape."},{"en":"body image","pos":"phr.","zh":"身體形象","cat":"核心詞彙","src":"詞彙練習","sent":"Splurging on skincare is not going to improve your body image in the long run or lessen your anxiety about your size.","exam":"主題詞彙；閱讀理解及寫作（青少年議題）高頻","err":"是固定搭配，勿寫 body's image；positive/negative body image 前不加 the","coll":"positive body image; body image issues; improve one's body image","ex1":"This gold medallist swimmer used to struggle with body image.","ex2":"Schools should teach students how to develop a positive body image."},{"en":"anxiety","pos":"n.","zh":"焦慮","cat":"考試重點詞","src":"單元評估","sent":"Victims often experience heightened levels of stress, anxiety and depression.","exam":"詞形轉換必考：anxious（adj.）↔ anxiety（n.）；選詞填空高頻","err":"anxiety 一般不可數；港生易把 anxious 當名詞用，如 *feel anxiety about（應為 feel anxious about 或 have anxiety about）","coll":"anxiety about sth; stress, anxiety and depression; lessen anxiety","ex1":"She felt great anxiety before the speaking exam.","ex2":"Cyberbullying has been linked to heightened levels of stress, anxiety and depression among teenagers."},{"en":"anxious","pos":"adj.","zh":"焦慮的；擔心的","cat":"高頻基礎詞","src":"詞彙練習","sent":"I was so anxious about leaving the place because it feels like I've been around these people my whole life, but the way everyone said goodbye really left me feeling empowered instead of scared.","exam":"詞形轉換：anxious → anxiety / anxiously；搭配 be anxious about 常考","err":"be anxious about（擔心）與 be eager to（渴望）意思不同，港生易混；後接名詞或動名詞","coll":"be anxious about sth; feel anxious; anxious teens","ex1":"I feel anxious about tomorrow's dictation.","ex2":"Half of the respondents felt anxious about what other people said about them."},{"en":"empowered","pos":"adj.","zh":"充滿力量的；自主自信的","cat":"核心詞彙","src":"Text 1","sent":"Remember, YOU are the empowered teens out there on the scene.","exam":"詞形轉換：empower（v.）→ empowered / empowering；閱讀理解語氣題常涉及","err":"empowered 形容「感到有力量的人」，empowering 形容「令人有力量的事物」，-ed/-ing 分詞形容詞是港生易錯點","coll":"feel empowered; empowered teens; an empowering message","ex1":"Learning new skills makes me feel empowered.","ex2":"The magazine wants its readers to become empowered teens who can face their problems."},{"en":"preoccupied","pos":"adj.","zh":"全神貫注的；心不在焉的","cat":"考試重點詞","src":"詞彙練習","sent":"I was too preoccupied with video games to pay attention at school.","exam":"選詞填空常見答案；搭配 be preoccupied with 需背誦","err":"介詞用 with，勿寫 preoccupied in/on；勿與 occupied（被佔用）混淆","coll":"be preoccupied with sth; too preoccupied to do sth","ex1":"He was too preoccupied with his phone to hear the teacher.","ex2":"Students who are preoccupied with their appearance may find it hard to focus in class."},{"en":"worthless","pos":"adj.","zh":"無價值的；一無是處的","cat":"核心詞彙","src":"Text 2","sent":"What I'm saying is: no one starts out picture-perfect; everyone feels worthless sometimes; everyone fears falling behind their peers, me included.","exam":"詞形轉換：worth → worthless / worthwhile；閱讀理解情感語氣題常見","err":"worthless（毫無價值）與 priceless（無價、極珍貴）意思相反，港生極易掉轉","coll":"feel worthless; a worthless person","ex1":"Failing one test does not make you worthless.","ex2":"I had poor self-esteem and believed myself to be a worthless person."},{"en":"inspiring","pos":"adj.","zh":"鼓舞人心的","cat":"高頻基礎詞","src":"詞彙練習","sent":"It's all thanks to a couple of inspiring teachers who believed in my potential.","exam":"詞形轉換：inspire → inspiring / inspired / inspiration；-ed/-ing 分詞形容詞為選擇題常考","err":"inspiring 形容「令人受鼓舞的事物或人」，inspired 形容「受到鼓舞的人」；港生常寫 *I am inspiring","coll":"an inspiring teacher; an inspiring story","ex1":"The athlete's story is really inspiring.","ex2":"Respondents wanted an advice column penned by inspiring personalities who have overcome personal struggles."},{"en":"insensitive","pos":"adj.","zh":"不顧他人感受的；麻木不仁的","cat":"考試重點詞","src":"詞彙練習","sent":"Many kids are insensitive at this age but not them.","exam":"詞形轉換：sensitive ↔ insensitive（否定前綴 in-）；選詞填空常考","err":"sensitive（敏感）與 sensible（明智）本已易混，加上否定前綴後更易錯；insensitive remarks 指「涼薄的說話」","coll":"insensitive remarks; be insensitive to others' feelings","ex1":"It was insensitive of him to joke about her weight.","ex2":"People tend to be pretty insensitive and immature in their adolescence."},{"en":"gratitude","pos":"n.","zh":"感激；謝意","cat":"考試重點詞","src":"Text 1","sent":"On behalf of the editorial team, allow me to once again express our gratitude to you, our readers, for sparking creative ideas among us.","exam":"書信及電郵寫作常用：express one's gratitude to sb for sth；詞形轉換：grateful → gratitude","err":"gratitude 不可數；港生易寫 *express my gratefulness，正式寫作應用 gratitude","coll":"express gratitude to sb; feel gratitude for sth","ex1":"I felt so much gratitude for my friends' support.","ex2":"I would like to express my gratitude to Ms Tang on behalf of the entire student body."},{"en":"thrilled","pos":"adj.","zh":"極為興奮的","cat":"口語常用","src":"詞彙練習","sent":"I'll be absolutely thrilled if I find friends as good as them in my next school.","exam":"同義詞配對：thrilled ≈ very excited；聆聽對話中表達情緒常見","err":"thrilled 已含「非常」之意，慣用 absolutely thrilled 而非 very thrilled；-ed/-ing：thrilling 指令人興奮的事物","coll":"be thrilled about/with sth; absolutely thrilled","ex1":"I was thrilled when I got tickets to the concert.","ex2":"She was thrilled to learn that her article would be published in the school magazine."},{"en":"baffled","pos":"adj.","zh":"困惑不解的","cat":"考試重點詞","src":"詞彙練習","sent":"I am honestly baffled by how much better I've gotten at all my subjects since they encouraged me to believe in myself.","exam":"同義詞配對：baffled ≈ confused / puzzled；選詞填空常見","err":"搭配 be baffled by/as to；港生易誤寫主動式 *I baffle（應為 I am baffled）","coll":"be baffled by sth; leave sb baffled","ex1":"I was baffled by the last question in the maths test.","ex2":"The teacher was baffled as to why so many students had made the same mistake."},{"en":"frankly","pos":"adv.","zh":"坦白說；老實說","cat":"口語常用","src":"詞彙練習","sent":"Frankly, I feel like they saved my life.","exam":"聆聽對話中表達個人意見的信號詞；寫作可用作句首評註副詞","err":"句首用 Frankly, 需加逗號；勿與 friendly（友善的，是形容詞）混淆","coll":"frankly speaking; to be frank","ex1":"Frankly, I don't think this plan will work.","ex2":"Frankly speaking, seeking professional help was the best decision I ever made."},{"en":"counsellor","pos":"n.","zh":"輔導員","cat":"核心詞彙","src":"詞彙練習","sent":"If you want more tips on how to destress, I think you should talk to a counsellor.","exam":"主題詞彙（尋求協助）；聆聽及寫作（勸告電郵）常用","err":"英式串法 counsellor（雙 l），美式 counselor；勿與 councillor（議員）混淆","coll":"school counsellor; talk to a counsellor; guidance counsellor","ex1":"Our school counsellor is easy to talk to.","ex2":"Students who are stressed about relationship problems should get in touch with the school counsellor."},{"en":"nutritionist","pos":"n.","zh":"營養師","cat":"核心詞彙","src":"詞彙練習","sent":"I know I felt so much better after I consulted a nutritionist and doctor about my eating disorder.","exam":"主題詞彙（專業人士）；選詞填空常見；詞形轉換：nutrition → nutritionist","err":"串字長，注意 -tion-；-ist 表示「從事…的人」，如 scientist、dentist","coll":"consult a nutritionist; advice from nutritionists","ex1":"The nutritionist advised me to eat more vegetables.","ex2":"Young people need advice from counsellors and nutritionists to stay healthy."},{"en":"guidance","pos":"n.","zh":"指導；輔導","cat":"考試重點詞","src":"Text 2","sent":"I know you're incredibly busy, but any guidance would mean the world to me!","exam":"選詞填空常見答案；詞形轉換：guide（v.）→ guidance（n.）","err":"guidance 不可數，勿寫 a guidance / guidances；港生易誤串成 guidence","coll":"give/offer guidance; seek guidance from sb; guidance counsellor","ex1":"My teacher gave me a lot of guidance on my project.","ex2":"They'll be able to give you better guidance than I can."},{"en":"overcome","pos":"v.","zh":"克服","cat":"考試重點詞","src":"Text 2","sent":"Just keep working on being a better you and you'll overcome these hurdles in no time!","exam":"選詞填空及寫作高頻；不規則變化 overcome-overcame-overcome 為詞形轉換考點","err":"過去式是 overcame，過去分詞是 overcome，港生易寫 *overcomed；直接接賓語，不加 with","coll":"overcome difficulties/obstacles/hurdles; overcome personal struggles","ex1":"It takes courage to overcome your fears.","ex2":"Jacob thanked his class teacher for helping him overcome his shyness and make friends at school."},{"en":"practical","pos":"adj.","zh":"實用的；切實可行的","cat":"高頻基礎詞","src":"詞彙練習","sent":"I'm betting the professionals will be able to give me some really good practical suggestions.","exam":"選詞填空常見；詞形轉換：practice / practise / practical 三者辨析","err":"practical（實用的）與 practicable（可行的）意思有別；動詞 practise（英式）與名詞 practice 串法不同","coll":"practical advice/suggestions/tips","ex1":"Mixing and matching outfits is a practical way to save money.","ex2":"The counsellor gave me some practical advice on managing exam stress."},{"en":"insight","pos":"n.","zh":"洞察；深入了解","cat":"考試重點詞","src":"Text 1","sent":"First off, we want to give a huge shoutout to everyone who participated in the recent 'What's on your mind?' survey - it gave us some valuable insights into the personal concerns of our adolescent readers aged 13 to 19 years old.","exam":"閱讀理解及報告寫作常用；固定搭配 insights into sth 為填空考點","err":"介詞必須用 into，港生常誤用 *insight of/about；常以複數 insights 出現","coll":"valuable insights into sth; gain/offer insights","ex1":"Talking to my grandparents gave me insights into life in old Hong Kong.","ex2":"The survey gave the editors valuable insights into the concerns of teenage readers."},{"en":"tip","pos":"n.","zh":"貼士；小建議","cat":"日常實用","src":"詞彙練習","sent":"If you want more tips on how to destress, I think you should talk to a counsellor.","exam":"聆聽填空及勸告類寫作高頻；tips on sth 為常考搭配","err":"介詞用 on（tips on how to...）；tip 另有「小費、尖端」等意思，閱讀理解須按上下文判斷","coll":"tips on sth; skincare tips; give sb some tips","ex1":"Can you give me some tips on saving money?","ex2":"The issue includes skincare tips for readers concerned about acne."},{"en":"vibrant","pos":"adj.","zh":"充滿活力的","cat":"考試重點詞","src":"Text 2","sent":"How did you manage to garner that amount of attention and create such a vibrant fan community online?","exam":"課文詞彙填空原題：Our city is known for its vibrant and lively festivals and busy nightlife.（單元練習）","err":"與 vibrate（震動）同源但意思不同；形容城市、社群、色彩皆可，港生使用面較窄","coll":"a vibrant community; vibrant colours; vibrant and lively","ex1":"Mong Kok is one of the most vibrant districts in Hong Kong.","ex2":"She created a vibrant fan community with two million followers online."},{"en":"desperate","pos":"adj.","zh":"絕望的；極渴望的","cat":"考試重點詞","src":"Text 2","sent":"After being shut down for a year due to the pandemic, cinemas in the city grew desperate for an increase in profits.","exam":"課文詞彙填空原題答案；搭配 desperate for / desperate to do 常考","err":"串字易錯成 desparate；be desperate for + 名詞、be desperate to + 動詞原形","coll":"be desperate for sth; grow desperate; a desperate attempt","ex1":"The stray cat was desperate for food.","ex2":"You must think I'm desperate for asking you outright the secret to your success."},{"en":"mediocre","pos":"adj.","zh":"平庸的；普普通通的","cat":"考試重點詞","src":"Text 2","sent":"I have mediocre grades and pathetic athletic abilities - I'm a bit of a failure compared to my peers.","exam":"閱讀理解原題：以一個詞形容 Mel G 的學業表現（答案 mediocre）；詞形轉換：mediocre → mediocrity","err":"讀音 /ˌmiːdiˈəʊkə/ 易讀錯；名詞 mediocrity 在課文中出現，兩者詞性勿混","coll":"mediocre grades; a mediocre performance","ex1":"The food at that restaurant was mediocre.","ex2":"Believe it or not, mediocrity is something even successful influencers can relate to."},{"en":"pathetic","pos":"adj.","zh":"差勁的；可悲的","cat":"考試重點詞","src":"Text 2","sent":"I have mediocre grades and pathetic athletic abilities - I'm a bit of a failure compared to my peers.","exam":"閱讀理解原題：以一個詞形容 Mel G 的運動表現（答案 pathetic）","err":"口語中帶貶義，形容人時語氣頗重，寫作時慎用；勿與 sympathetic（同情的）混淆","coll":"pathetic athletic abilities; a pathetic excuse","ex1":"My first attempt at baking was pretty pathetic.","ex2":"He described his own athletic abilities as pathetic compared to his peers'."},{"en":"self-conscious","pos":"adj.","zh":"忸怩的；過分在意外表的","cat":"核心詞彙","src":"Text 2","sent":"I used to be a 'self-conscious' teen striking awkward poses in various outfits.","exam":"青少年議題寫作常用；搭配 feel self-conscious about 為填空考點","err":"不是「有自我意識」而是「怕別人目光、尷尬」；港生按字面直譯易誤解","coll":"feel self-conscious about sth; a self-conscious teen","ex1":"This home workout series piques my interest because I feel self-conscious about my weight.","ex2":"Many self-conscious teens are afraid to speak up in class."},{"en":"substitute","pos":"v.","zh":"以…代替","cat":"考試重點詞","src":"Text 2","sent":"Compare yourself to no one, and don't ever substitute someone else's standards for your own.","exam":"課文詞彙填空原題：Lena has substituted fast food with homemade sandwiches；搭配 substitute A for B 常考","err":"substitute A for B = 用 A 代替 B，方向極易掉轉；亦可作名詞解「代替品、代課老師」","coll":"substitute A for B; substitute sth with sth","ex1":"You can substitute honey for sugar in this recipe.","ex2":"Lena has substituted fast food with homemade sandwiches in order to make her diet healthier."},{"en":"sustainable","pos":"adj.","zh":"可持續的","cat":"考試重點詞","src":"Text 2","sent":"Back then, I posted short videos about green fashion items simply to encourage people to buy sustainable clothing.","exam":"跨單元高頻詞（環保、時裝、生活）；詞形轉換：sustain → sustainable → sustainability","err":"港生常誤串 sustainble（漏 a）；與 green、eco-friendly 為近義，寫作可交替使用","coll":"sustainable clothing/fashion; a sustainable lifestyle","ex1":"Our family tries to lead a more sustainable lifestyle by recycling.","ex2":"She posted videos to encourage people to buy sustainable clothing."},{"en":"hurdle","pos":"n.","zh":"障礙；難關","cat":"考試重點詞","src":"Text 2","sent":"Just keep working on being a better you and you'll overcome these hurdles in no time!","exam":"閱讀理解原題：List THREE hurdles mentioned in paragraph 6；同義詞配對 hurdle ≈ obstacle / difficulty","err":"本義是跨欄比賽的「欄」，引伸為「難關」；搭配動詞用 overcome / clear","coll":"overcome hurdles; face a hurdle","ex1":"Learning Cantonese was a big hurdle for the exchange student.","ex2":"Clara had to overcome many hurdles, such as trolls and cyberbullies, before becoming successful."},{"en":"troll","pos":"n.","zh":"網絡惡意留言者；網絡巨魔","cat":"口語常用","src":"Text 2","sent":"There were also plenty of toxic trolls and cyberbullies causing me stress.","exam":"網絡議題閱讀及寫作常見詞；常與 toxic、cyberbully 並列出現","err":"此處不是童話中的「巨人」，而是網上故意挑釁的人；online troll 為固定說法","coll":"toxic trolls; online trolls","ex1":"Believe it or not, sweet Aunt Pamela used to be an online troll.","ex2":"Ignoring toxic trolls is often the best way to deal with them."},{"en":"survey","pos":"n.","zh":"調查","cat":"高頻基礎詞","src":"Text 1","sent":"Here's an overview of the survey results and what's in store in this fabulous issue.","exam":"綜合能力（調查報告）核心詞；conduct a survey、survey results 為報告寫作必用","err":"動詞搭配用 conduct/carry out a survey，勿寫 *make a survey；respondents 指受訪者","coll":"conduct a survey; survey results; a survey about/on sth","ex1":"Our class conducted a survey on students' spending habits.","ex2":"The committee has recently conducted a survey about teen stress."},{"en":"respondent","pos":"n.","zh":"受訪者；回應者","cat":"考試重點詞","src":"Text 1","sent":"Speaking of seeking help, when asked what new types of column would pique their interest, 60% of respondents wanted an advice column penned by globally renowned personalities who have overcome personal struggles.","exam":"調查報告寫作必用詞；描述數據句式「60% of respondents...」為綜合卷評分重點","err":"詞形轉換：respond（v.）→ respondent（人）→ response（回應）；勿寫 *responders","coll":"60% of respondents; respondents to the survey","ex1":"Most respondents said they eat out a few times a week.","ex2":"Half of the respondents felt anxiety about what other people said about them."},{"en":"relentless","pos":"adj.","zh":"不間斷的；無情的","cat":"考試重點詞","src":"單元評估","sent":"The relentless ridicule and harassment via online platforms can erode self-esteem and cause self-doubt, as well as resulting in self-destructive behavior in more serious cases.","exam":"單元評估原題：Find a word in paragraph 2 that has a similar meaning to 'constant'（答案 relentless）","err":"同義詞配對題常設 constant / continuous 為提示；注意雙 s 結尾串法","coll":"relentless harassment; relentless pressure","ex1":"The relentless rain lasted for three days.","ex2":"The relentless ridicule online can seriously damage a teenager's self-esteem."},{"en":"self-esteem","pos":"n.","zh":"自尊；自我價值感","cat":"核心詞彙","src":"單元評估","sent":"The relentless ridicule and harassment via online platforms can erode self-esteem and cause self-doubt, as well as resulting in self-destructive behavior in more serious cases.","exam":"青少年議題閱讀及寫作高頻；搭配 low/poor self-esteem、boost self-esteem 常考","err":"不可數名詞；「自尊心低」是 low self-esteem，勿直譯 *small self-esteem","coll":"low/poor self-esteem; boost/erode self-esteem","ex1":"Praise from teachers can boost students' self-esteem.","ex2":"I had poor self-esteem and believed myself to be a worthless person."},{"en":"isolation","pos":"n.","zh":"孤立；孤獨","cat":"考試重點詞","src":"單元評估","sent":"Teenagers who are victimized by cyberbullying often face social isolation.","exam":"單元評估閱讀理解主題詞；詞形轉換：isolate（v.）→ isolation（n.）→ isolated（adj.）","err":"social isolation 為固定搭配；港生易誤串 isolasion","coll":"social isolation; face/combat isolation","ex1":"Moving to a new school can lead to feelings of isolation.","ex2":"Support from friends and family plays a crucial role in combating social isolation."},{"en":"harassment","pos":"n.","zh":"騷擾","cat":"考試重點詞","src":"單元評估","sent":"Continuous exposure to online harassment can lead to lowered concentration levels, limited productivity and diminished interest in school.","exam":"閱讀理解填空常見；online harassment 為網絡議題必識詞","err":"串字難點：單 r 雙 s（harassment）；動詞是 harass","coll":"online harassment; ridicule and harassment","ex1":"Schools should take reports of harassment seriously.","ex2":"Cyberbullying prevention programmes have shown promising results in reducing instances of harassment."},{"en":"victim","pos":"n.","zh":"受害者","cat":"高頻基礎詞","src":"單元評估","sent":"Victims often experience heightened levels of stress, anxiety and depression.","exam":"閱讀理解指代題常考（they 指 victims）；fall victim to 為固定短語","err":"victim of sth（某事的受害者）介詞用 of；勿與 witness（目擊者）混淆","coll":"victims of cyberbullying; fall victim to sth; support the victims","ex1":"The victims of the scam reported it to the police.","ex2":"Letting victims know that support is available can play a crucial role in combating isolation."},{"en":"budget","pos":"n.","zh":"預算","cat":"日常實用","src":"聽力對話","sent":"I'm sure you know I always spend a lot on snacks, even though I never blew my monthly budget before.","exam":"聆聽填空高頻（消費習慣主題）；keep one's budget in check、blow one's budget 為常見搭配","err":"on a budget = 精打細算；blow one's budget = 超出預算，港生易照字面誤解","coll":"monthly budget; blow one's budget; keep one's budget in check; on a budget","ex1":"I have a weekly budget of two hundred dollars.","ex2":"Not dining out on major holidays helps keep your budget in check."},{"en":"overspend","pos":"v.","zh":"超支；過度消費","cat":"日常實用","src":"聽力對話","sent":"Well, I just found out that I've been overspending for three months in a row.","exam":"聆聽對話（理財主題）關鍵詞；前綴 over-（過度）構詞法為詞形轉換考點","err":"over- 前綴詞如 overspend、overeat、oversleep 屬同一構詞規律；過去式 overspent","coll":"overspend on sth; three months in a row","ex1":"I always overspend during the holidays.","ex2":"She realized she had been overspending on snacks without being aware of it."},{"en":"stress","pos":"n.","zh":"壓力","cat":"高頻基礎詞","src":"聽力對話","sent":"It aims to find out the causes of teen stress.","exam":"全卷高頻詞；teen stress、exam stress 為聆聽及寫作主題詞；動詞短語 stress out 亦常見","err":"stress 表「壓力」不可數；「減壓」是 relieve stress / destress，勿寫 *release the stress out","coll":"teen stress; exam stress; deal with stress; stress sb out","ex1":"Listening to music helps me deal with stress.","ex2":"The survey found that family conflicts are a common source of teen stress."},{"en":"advice","pos":"n.","zh":"忠告；意見","cat":"高頻基礎詞","src":"Text 2","sent":"Lovely to hear from you! Thank you for coming to me for advice.","exam":"本單元文體（勸告電郵）核心詞；an email of advice、give advice 為寫作必用","err":"advice 不可數，港生極常錯寫 *an advice / advices；「一項建議」是 a piece of advice；動詞是 advise","coll":"give/offer advice; ask for advice; an advice column; a piece of advice","ex1":"My mum gave me some useful advice about making friends.","ex2":"Respondents requested an advice column written by famous people who had overcome personal struggles."},{"en":"retail therapy","pos":"phr.","zh":"購物減壓；購物療法","cat":"口語常用","src":"詞彙練習","sent":"Additionally, I don't think it's wise to rely on retail therapy to make yourself feel better.","exam":"主題詞彙（消費與快樂）；Text 3「'Buying' happiness」相關概念詞","err":"帶幽默或反諷語氣，非真正的「治療」；rely on retail therapy 中介詞用 on","coll":"rely on retail therapy; indulge in retail therapy","ex1":"A bit of retail therapy always cheers her up.","ex2":"Relying on retail therapy will not improve your body image in the long run."},{"en":"downward spiral","pos":"phr.","zh":"每況愈下；惡性循環","cat":"考試重點詞","src":"詞彙練習","sent":"I was on a bit of a downward spiral at the end of primary school.","exam":"選詞填空常見答案；描述情緒或狀況惡化的地道表達，寫作可提升用語層次","err":"固定搭配 be on a downward spiral，介詞用 on；勿逐字直譯","coll":"be on a downward spiral; a downward spiral of negativity","ex1":"After failing two tests, he felt he was on a downward spiral.","ex2":"Seeking help early can stop a downward spiral in a student's mental health."}],"phrases":[{"phrase":"first off","zh":"首先","type":"課文短語","sent":"First off, we want to give a huge shoutout to everyone who participated in the recent 'What's on your mind?' survey - it gave us some valuable insights into the personal concerns of our adolescent readers aged 13 to 19 years old.","note":"口語化的「首先」，比 firstly 輕鬆，適用於電郵、演講開首；正式報告宜用 firstly / first of all","ex":"First off, I want to draw your attention to the issue of school bullying, which affects many teens in Hong Kong."},{"phrase":"get in touch","zh":"聯絡；聯繫","type":"日常表達","sent":"Please don't hesitate to get in touch with more feedback and suggestions.","note":"get in touch (with sb) 常用於電郵結尾邀請對方聯絡；比 contact 更口語自然","ex":"If you are struggling with depression or anxiety, please get in touch."},{"phrase":"give a shoutout to sb","zh":"公開表揚／鳴謝某人","type":"口語短語","sent":"First off, we want to give a huge shoutout to everyone who participated in the recent 'What's on your mind?' survey - it gave us some valuable insights into the personal concerns of our adolescent readers aged 13 to 19 years old.","note":"源自網絡及電台文化的口語，公開向某人致謝或致意；正式書信應改用 express gratitude to","ex":"I'd like to give a shoutout to my grandma, who cheered me up when I was feeling down."},{"phrase":"have got sb covered","zh":"為某人準備妥當；有齊某人所需","type":"口語短語","sent":"Don't worry, we've got you covered in this issue.","note":"口語，意指「你需要的我們都準備好了」；主語是提供幫助的一方，賓語是受助者","ex":"If you're looking for acne tips for teens that actually work, our advice column has got you covered."},{"phrase":"in store","zh":"即將來臨；準備好（給某人）","type":"課文短語","sent":"Here's an overview of the survey results and what's in store in this fabulous issue.","note":"what's in store (for sb) 指「將會發生的事」；常與 future、surprise 連用","ex":"I don't know what the future has in store for me, but I hope I can face every challenge with positivity."},{"phrase":"on behalf of sb","zh":"代表某人","type":"寫作句式","sent":"On behalf of the editorial team, allow me to once again express our gratitude to you, our readers, for sparking creative ideas among us.","note":"正式書信及演講常用；on behalf of + 團體／他人，代表自己一方時可說 on my own behalf","ex":"Ms Tang, I would like to thank you on behalf of the entire student body for all that you do to improve mental health at our school."},{"phrase":"on the scene","zh":"在現場；活躍於圈子中","type":"課文短語","sent":"Remember, YOU are the empowered teens out there on the scene.","note":"既可指「到達現場」（警察、救援），亦可指「活躍於某圈子」；注意與 behind the scenes（幕後）不同","ex":"A crowd of bystanders were on the scene, but only two of them thought to alert a responsible adult about the bullying."},{"phrase":"pique sb's interest","zh":"引起某人的興趣","type":"課文短語","sent":"Speaking of seeking help, when asked what new types of column would pique their interest, 60% of respondents wanted an advice column penned by globally renowned personalities who have overcome personal struggles.","note":"pique 讀如 peak；比 interest sb 更地道，寫作加分用語；勿誤串為 peak/peek one's interest","ex":"The life skills course piqued many students' interest as several had been struggling with money management."},{"phrase":"speaking of sth","zh":"說起…；提到…","type":"口語短語","sent":"Speaking of seeking help, when asked what new types of column would pique their interest, 60% of respondents wanted an advice column penned by globally renowned personalities who have overcome personal struggles.","note":"轉接話題用語，承接剛提及的內容；聆聽考試中是話題轉換信號詞","ex":"Speaking of cyberbullying, many online bullies say harsher things on the internet than they would in real life."},{"phrase":"believe it or not","zh":"信不信由你","type":"口語短語","sent":"Believe it or not, mediocrity is something I can relate to.","note":"引出令人意外的事實，多置於句首並加逗號；語氣輕鬆，適合口語及非正式寫作","ex":"This gold medallist swimmer used to struggle with body image, believe it or not."},{"phrase":"cut one's teeth","zh":"初試身手；累積早期經驗","type":"課文短語","sent":"I cut my teeth posting short videos about green fashion items","note":"cut one's teeth (on/doing sth) 指在某範疇取得最初經驗；本義為嬰兒出牙，屬比喻用法","ex":"Our current principal cut her teeth on toxic bullying problems when she was a regular teacher."},{"phrase":"mean the world to sb","zh":"對某人極為重要","type":"日常表達","sent":"I know you're incredibly busy, but any guidance from you would mean the world to me!","note":"表達某人或某事「意義重大」；主語可以是人或事物，語氣真摯，適用於感謝及抒情寫作","ex":"Ballet means the world to Harry because it has helped him fight his anxiety disorder."},{"phrase":"pluck up one's courage","zh":"鼓起勇氣","type":"課文短語","sent":"I can't believe I finally managed to pluck up the courage to reach out to you for advice","note":"pluck up the/one's courage to do sth；後接 to + 動詞原形；記敘文寫作常用","ex":"It can be hard for bystanders to pluck up their courage and stand up to bullies."},{"phrase":"broaden one's horizons","zh":"擴闊視野","type":"寫作句式","sent":"For example, you can go on vacations abroad to broaden your horizons or take art jamming or music classes to stimulate your creativity.","note":"horizons 必須用
